<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'useWindowDimensions 详解'
        document.getElementById('article').innerHTML = 
        "<div><p><code>useWindowDimensions</code> 是 React Native 提供的一个内置 Hook，用于获取和监听设备窗口/屏幕的尺寸变化（如设备旋转、分屏等场景）。</p>\n<h2>基本用法</h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { useWindowDimensions } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;react-native&#x27;</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">MyComponent</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> { width, height, scale, fontScale } = <span class=\"hljs-title function_\">useWindowDimensions</span>();\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Text</span>&gt;</span>\n      当前窗口宽度: {width}, 高度: {height}, \n      像素比例: {scale}, 字体比例: {fontScale}\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Text</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<h2>返回值说明</h2>\n<table>\n<thead>\n<tr>\n<th>属性</th>\n<th>类型</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>width</code></td>\n<td>number</td>\n<td>窗口/屏幕的宽度（逻辑像素）</td>\n</tr>\n<tr>\n<td><code>height</code></td>\n<td>number</td>\n<td>窗口/屏幕的高度（逻辑像素）</td>\n</tr>\n<tr>\n<td><code>scale</code></td>\n<td>number</td>\n<td>设备像素密度比例（如 Retina 屏为 2 或 3）</td>\n</tr>\n<tr>\n<td><code>fontScale</code></td>\n<td>number</td>\n<td>字体缩放比例（受系统字体大小设置影响）</td>\n</tr>\n</tbody>\n</table>\n<h2>特点与优势</h2>\n<ol>\n<li><strong>自动更新</strong>  ：当屏幕尺寸变化时（如设备旋转），组件会自动重新渲染</li>\n<li><strong>无需事件监听</strong>  ：相比 <code>Dimensions</code> API 需要手动监听变化，Hook 方式更简洁</li>\n<li><strong>SSR 友好</strong>  ：在服务端渲染时也能安全使用</li>\n</ol>\n<h2>与 <code>Dimensions</code> API 对比</h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 传统 Dimensions 方式</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Dimensions</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;react-native&#x27;</span>;\n\n<span class=\"hljs-comment\">// 只获取一次，不会自动更新</span>\n<span class=\"hljs-keyword\">const</span> { width, height } = <span class=\"hljs-title class_\">Dimensions</span>.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&#x27;window&#x27;</span>);\n\n<span class=\"hljs-comment\">// 需要手动监听变化</span>\n<span class=\"hljs-title class_\">Dimensions</span>.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;change&#x27;</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">{ <span class=\"hljs-variable language_\">window</span> }</span>) =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;New dimensions:&#x27;</span>, <span class=\"hljs-variable language_\">window</span>);\n});\n</code></pre>\n<h2>实际应用场景</h2>\n<ol>\n<li><strong>响应式布局</strong>  ：</li>\n</ol>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> { width } = <span class=\"hljs-title function_\">useWindowDimensions</span>();\n<span class=\"hljs-keyword\">const</span> isMobile = width &lt; <span class=\"hljs-number\">768</span>;\n</code></pre>\n<ol start=\"2\">\n<li><strong>横竖屏适配</strong>  ：</li>\n</ol>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> { width, height } = <span class=\"hljs-title function_\">useWindowDimensions</span>();\n<span class=\"hljs-keyword\">const</span> isLandscape = width &gt; height;\n</code></pre>\n<ol start=\"3\">\n<li><strong>字体大小适配</strong>  ：</li>\n</ol>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> { fontScale } = <span class=\"hljs-title function_\">useWindowDimensions</span>();\n<span class=\"hljs-keyword\">const</span> fontSize = <span class=\"hljs-number\">16</span> * fontScale;\n</code></pre>\n<h2>注意事项</h2>\n<ol>\n<li><strong>性能优化</strong>  ：频繁的尺寸变化可能导致过多重渲染，可配合 <code>useMemo</code> 使用</li>\n<li><strong>Android 特殊处理</strong>  ：某些 Android 设备需要在 manifest 中配置 <code>android:configChanges</code></li>\n<li><strong>Web 端差异</strong>  ：在 React Native Web 中表现可能有所不同</li>\n</ol>\n<h2>最佳实践示例</h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">ResponsiveComponent</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> { width } = <span class=\"hljs-title function_\">useWindowDimensions</span>();\n  \n  <span class=\"hljs-keyword\">const</span> styles = <span class=\"hljs-title function_\">useMemo</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-title class_\">StyleSheet</span>.<span class=\"hljs-title function_\">create</span>({\n    <span class=\"hljs-attr\">container</span>: {\n      <span class=\"hljs-attr\">flexDirection</span>: width &gt; <span class=\"hljs-number\">600</span> ? <span class=\"hljs-string\">&#x27;row&#x27;</span> : <span class=\"hljs-string\">&#x27;column&#x27;</span>,\n      <span class=\"hljs-attr\">padding</span>: width &gt; <span class=\"hljs-number\">600</span> ? <span class=\"hljs-number\">20</span> : <span class=\"hljs-number\">10</span>\n    }\n  }), [width]);\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{styles.container}</span>&gt;</span>\n      {/* 内容 */}\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">View</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<p><code>useWindowDimensions</code> 是 React Native 中处理响应式 UI 的推荐方式，相比传统方法更加简洁和可靠。</p>\n</div>";</script></body></html>
