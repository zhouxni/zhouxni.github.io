<script>
            document.getElementById('article').innerHTML = 
            "<div><p>在 React Navigation 中，<code>&lt;Stack.Navigator&gt;</code> 的 <code>screenOptions</code> 属性用于为所有屏幕配置默认的导航选项。通过 <code>screenOptions</code>，你可以为整个导航堆栈中的屏幕设置统一的样式、按钮行为和其他导航选项，而无需在每个 <code>&lt;Stack.Screen&gt;</code> 中单独配置 <code>options</code>。</p>\n<p>以下是关于 <code>&lt;Stack.Navigator&gt;</code> 的 <code>screenOptions</code> 属性的详细说明和示例：</p>\n<hr>\n<p><strong>1. <code>screenOptions</code> 的作用</strong></p>\n<ul>\n<li>\n<p>全局默认选项：为所有屏幕提供默认的导航选项。</p>\n</li>\n<li>\n<p>减少重复代码：避免在每个 <code>&lt;Stack.Screen&gt;</code> 中重复配置相同的选项。</p>\n</li>\n<li>\n<p>动态选项：可以通过函数动态设置选项。</p>\n</li>\n</ul>\n<hr>\n<p><strong>2. 基本用法</strong></p>\n<p><strong>2.1 直接配置对象</strong><br>\n你可以直接将 <code>screenOptions</code> 定义为一个对象，包含所有屏幕的默认选项。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">React</span> <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;react&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">NavigationContainer</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;@react-navigation/native&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> { createStackNavigator } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;@react-navigation/stack&#x27;</span>;\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">Stack</span> = <span class=\"hljs-title function_\">createStackNavigator</span>();\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">HomeScreen</span> = (<span class=\"hljs-params\"></span>) =&gt; <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Text</span>&gt;</span>Home Screen<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Text</span>&gt;</span></span>;\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">DetailsScreen</span> = (<span class=\"hljs-params\"></span>) =&gt; <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Text</span>&gt;</span>Details Screen<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Text</span>&gt;</span></span>;\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">App</span> = (<span class=\"hljs-params\"></span>) =&gt; (\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">NavigationContainer</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Navigator</span>\n      <span class=\"hljs-attr\">screenOptions</span>=<span class=\"hljs-string\">{{</span>\n        <span class=\"hljs-attr\">title:</span> &#x27;<span class=\"hljs-attr\">Default</span> <span class=\"hljs-attr\">Title</span>&#x27;,\n        <span class=\"hljs-attr\">headerStyle:</span> { <span class=\"hljs-attr\">backgroundColor:</span> &#x27;<span class=\"hljs-attr\">lightblue</span>&#x27; },\n        <span class=\"hljs-attr\">headerTintColor:</span> &#x27;<span class=\"hljs-attr\">white</span>&#x27;,\n        <span class=\"hljs-attr\">headerTitleStyle:</span> { <span class=\"hljs-attr\">fontWeight:</span> &#x27;<span class=\"hljs-attr\">bold</span>&#x27; },\n      }}\n    &gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Home&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{HomeScreen}</span> /&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Details&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{DetailsScreen}</span> /&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Stack.Navigator</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">NavigationContainer</span>&gt;</span></span>\n);\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> <span class=\"hljs-title class_\">App</span>;\n</code></pre>\n<hr>\n<p><strong>2.2 使用函数动态配置</strong><br>\n<code>screenOptions</code> 也可以是一个函数，允许你根据 <code>route</code> 或 <code>navigation</code> 动态设置选项。</p>\n<pre><code class=\"language-javascript\">&lt;<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>\n  screenOptions={<span class=\"hljs-function\">(<span class=\"hljs-params\">{ route }</span>) =&gt;</span> ({\n    <span class=\"hljs-attr\">title</span>: route.<span class=\"hljs-property\">name</span> === <span class=\"hljs-string\">&#x27;Home&#x27;</span> ? <span class=\"hljs-string\">&#x27;Home&#x27;</span> : <span class=\"hljs-string\">&#x27;Details&#x27;</span>,\n    <span class=\"hljs-attr\">headerStyle</span>: { <span class=\"hljs-attr\">backgroundColor</span>: route.<span class=\"hljs-property\">name</span> === <span class=\"hljs-string\">&#x27;Home&#x27;</span> ? <span class=\"hljs-string\">&#x27;lightblue&#x27;</span> : <span class=\"hljs-string\">&#x27;lightgreen&#x27;</span> },\n  })}\n/&gt;\n</code></pre>\n<hr>\n<p><strong>3. 常用的 <code>screenOptions</code> 属性</strong></p>\n<p>以下是 <code>&lt;Stack.Navigator&gt;</code> 中常用的 <code>screenOptions</code> 属性及其功能：</p>\n<p><strong>3.1 标题相关</strong></p>\n<ul>\n<li><code>title</code>：为所有屏幕设置默认标题。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{ <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">&#x27;Default Title&#x27;</span> }}\n</code></pre>\n<ul>\n<li><code>headerTitleAlign</code>：设置标题的对齐方式（<code>left</code>、<code>center</code> 或 <code>right</code>）。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{ <span class=\"hljs-attr\">headerTitleAlign</span>: <span class=\"hljs-string\">&#x27;center&#x27;</span> }}\n</code></pre>\n<ul>\n<li><code>headerTitleStyle</code>：为所有屏幕的标题设置样式。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{\n  <span class=\"hljs-attr\">headerTitleStyle</span>: { <span class=\"hljs-attr\">fontWeight</span>: <span class=\"hljs-string\">&#x27;bold&#x27;</span>, <span class=\"hljs-attr\">fontSize</span>: <span class=\"hljs-number\">20</span>, <span class=\"hljs-attr\">color</span>: <span class=\"hljs-string\">&#x27;blue&#x27;</span> },\n}}\n</code></pre>\n<hr>\n<p><strong>3.2 头部按钮</strong></p>\n<ul>\n<li><code>headerLeft</code>：为所有屏幕设置默认的左侧按钮。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{\n  <span class=\"hljs-attr\">headerLeft</span>: <span class=\"hljs-function\">() =&gt;</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Button</span> <span class=\"hljs-attr\">title</span>=<span class=\"hljs-string\">&quot;Back&quot;</span> <span class=\"hljs-attr\">onPress</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> navigation.goBack()} /&gt;</span>\n  ),\n}}\n</code></pre>\n<ul>\n<li><code>headerRight</code>：为所有屏幕设置默认的右侧按钮。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{\n  <span class=\"hljs-attr\">headerRight</span>: <span class=\"hljs-function\">() =&gt;</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Button</span> <span class=\"hljs-attr\">title</span>=<span class=\"hljs-string\">&quot;Settings&quot;</span> <span class=\"hljs-attr\">onPress</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> alert(&#x27;Settings&#x27;)} /&gt;</span>\n  ),\n}}\n</code></pre>\n<ul>\n<li><code>headerBackTitleVisible</code>：控制返回按钮的标题是否可见（默认为 <code>true</code>）。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{ <span class=\"hljs-attr\">headerBackTitleVisible</span>: <span class=\"hljs-literal\">false</span> }}\n</code></pre>\n<ul>\n<li><code>headerBackTitle</code>：自定义返回按钮的标题。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{ <span class=\"hljs-attr\">headerBackTitle</span>: <span class=\"hljs-string\">&#x27;Back to Home&#x27;</span> }}\n</code></pre>\n<hr>\n<p><strong>3.3 头部样式</strong></p>\n<ul>\n<li><code>headerStyle</code>：为所有屏幕的头部设置默认样式。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{\n  <span class=\"hljs-attr\">headerStyle</span>: { <span class=\"hljs-attr\">backgroundColor</span>: <span class=\"hljs-string\">&#x27;lightblue&#x27;</span>, <span class=\"hljs-attr\">height</span>: <span class=\"hljs-number\">80</span> },\n}}\n</code></pre>\n<ul>\n<li><code>headerTintColor</code>：设置所有屏幕头部按钮和标题的颜色。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{ <span class=\"hljs-attr\">headerTintColor</span>: <span class=\"hljs-string\">&#x27;white&#x27;</span> }}\n</code></pre>\n<ul>\n<li><code>headerBackground</code>：为所有屏幕的头部设置默认背景组件。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{\n  <span class=\"hljs-attr\">headerBackground</span>: <span class=\"hljs-function\">() =&gt;</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">height:</span> <span class=\"hljs-attr\">50</span>, <span class=\"hljs-attr\">backgroundColor:</span> &#x27;<span class=\"hljs-attr\">green</span>&#x27; }} /&gt;</span></span>\n  ),\n}}\n</code></pre>\n<hr>\n<p><strong>3.4 隐藏头部</strong></p>\n<ul>\n<li><code>headerShown</code>：为所有屏幕隐藏头部。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{ <span class=\"hljs-attr\">headerShown</span>: <span class=\"hljs-literal\">false</span> }}\n</code></pre>\n<hr>\n<p><strong>3.5 其他选项</strong></p>\n<ul>\n<li><code>gestureEnabled</code>：启用或禁用所有屏幕的手势导航（如滑动返回）。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{ <span class=\"hljs-attr\">gestureEnabled</span>: <span class=\"hljs-literal\">false</span> }}\n</code></pre>\n<ul>\n<li><code>cardStyleInterpolator</code>：为所有屏幕设置默认的切换动画。</li>\n</ul>\n<pre><code class=\"language-javascript\">screenOptions={{\n  <span class=\"hljs-attr\">cardStyleInterpolator</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">{ current }</span>) =&gt;</span> ({\n    <span class=\"hljs-attr\">cardStyle</span>: {\n      <span class=\"hljs-attr\">transform</span>: [{ <span class=\"hljs-attr\">translateX</span>: current.<span class=\"hljs-property\">progress</span>.<span class=\"hljs-title function_\">interpolate</span>({ <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1</span>], <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-string\">&#x27;100%&#x27;</span>, <span class=\"hljs-string\">&#x27;0%&#x27;</span>]) }) }],\n    },\n  }),\n}}\n</code></pre>\n<hr>\n<p><strong>4. 示例代码</strong></p>\n<p><strong>4.1 基本配置</strong></p>\n<pre><code class=\"language-javascript\">&lt;<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>\n  screenOptions={{\n    <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">&#x27;Default Title&#x27;</span>,\n    <span class=\"hljs-attr\">headerStyle</span>: { <span class=\"hljs-attr\">backgroundColor</span>: <span class=\"hljs-string\">&#x27;lightblue&#x27;</span> },\n    <span class=\"hljs-attr\">headerTintColor</span>: <span class=\"hljs-string\">&#x27;white&#x27;</span>,\n    <span class=\"hljs-attr\">headerTitleStyle</span>: { <span class=\"hljs-attr\">fontWeight</span>: <span class=\"hljs-string\">&#x27;bold&#x27;</span> },\n  }}\n&gt;\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Home&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{HomeScreen}</span> /&gt;</span></span>\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Details&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{DetailsScreen}</span> /&gt;</span></span>\n&lt;/<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>&gt;\n</code></pre>\n<hr>\n<p><strong>4.2 自定义标题和按钮</strong></p>\n<pre><code class=\"language-javascript\">&lt;<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>\n  screenOptions={{\n    <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">&#x27;My App&#x27;</span>,\n    <span class=\"hljs-attr\">headerStyle</span>: { <span class=\"hljs-attr\">backgroundColor</span>: <span class=\"hljs-string\">&#x27;lightgreen&#x27;</span> },\n    <span class=\"hljs-attr\">headerTintColor</span>: <span class=\"hljs-string\">&#x27;black&#x27;</span>,\n    <span class=\"hljs-attr\">headerTitleStyle</span>: { <span class=\"hljs-attr\">fontSize</span>: <span class=\"hljs-number\">24</span> },\n    <span class=\"hljs-attr\">headerRight</span>: <span class=\"hljs-function\">() =&gt;</span> (\n      <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Button</span> <span class=\"hljs-attr\">title</span>=<span class=\"hljs-string\">&quot;Settings&quot;</span> <span class=\"hljs-attr\">onPress</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> alert(&#x27;Settings&#x27;)} /&gt;</span>\n    ),\n  }}\n&gt;\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Home&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{HomeScreen}</span> /&gt;</span></span>\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Details&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{DetailsScreen}</span> /&gt;</span></span>\n&lt;/<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>&gt;\n</code></pre>\n<hr>\n<p><strong>4.3 隐藏头部</strong></p>\n<pre><code class=\"language-javascript\">&lt;<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>\n  screenOptions={{ <span class=\"hljs-attr\">headerShown</span>: <span class=\"hljs-literal\">false</span> }}\n&gt;\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Home&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{HomeScreen}</span> /&gt;</span></span>\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Details&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{DetailsScreen}</span> /&gt;</span></span>\n&lt;/<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>&gt;\n</code></pre>\n<hr>\n<p><strong>4.4 动态标题</strong></p>\n<pre><code class=\"language-javascript\">&lt;<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>\n  screenOptions={<span class=\"hljs-function\">(<span class=\"hljs-params\">{ route }</span>) =&gt;</span> ({\n    <span class=\"hljs-attr\">title</span>: route.<span class=\"hljs-property\">name</span> === <span class=\"hljs-string\">&#x27;Home&#x27;</span> ? <span class=\"hljs-string\">&#x27;Home Screen&#x27;</span> : <span class=\"hljs-string\">&#x27;Details Screen&#x27;</span>,\n    <span class=\"hljs-attr\">headerStyle</span>: { <span class=\"hljs-attr\">backgroundColor</span>: route.<span class=\"hljs-property\">name</span> === <span class=\"hljs-string\">&#x27;Home&#x27;</span> ? <span class=\"hljs-string\">&#x27;lightblue&#x27;</span> : <span class=\"hljs-string\">&#x27;lightgreen&#x27;</span> },\n  })}\n&gt;\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Home&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{HomeScreen}</span> /&gt;</span></span>\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Details&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{DetailsScreen}</span> /&gt;</span></span>\n&lt;/<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>&gt;\n</code></pre>\n<hr>\n<p><strong>4.5 自定义返回按钮</strong></p>\n<pre><code class=\"language-javascript\">&lt;<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>\n  screenOptions={{\n    <span class=\"hljs-attr\">headerLeft</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">{ onPress }</span>) =&gt;</span> (\n      <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Button</span> <span class=\"hljs-attr\">title</span>=<span class=\"hljs-string\">&quot;Back&quot;</span> <span class=\"hljs-attr\">onPress</span>=<span class=\"hljs-string\">{onPress}</span> <span class=\"hljs-attr\">color</span>=<span class=\"hljs-string\">&quot;white&quot;</span> /&gt;</span></span>\n    ),\n  }}\n&gt;\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Home&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{HomeScreen}</span> /&gt;</span></span>\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Details&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{DetailsScreen}</span> /&gt;</span></span>\n&lt;/<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>&gt;\n</code></pre>\n<hr>\n<p><strong>4.6 自定义头部背景</strong></p>\n<pre><code class=\"language-javascript\">&lt;<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>\n  screenOptions={{\n    <span class=\"hljs-attr\">headerBackground</span>: <span class=\"hljs-function\">() =&gt;</span> (\n      <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">height:</span> <span class=\"hljs-attr\">50</span>, <span class=\"hljs-attr\">backgroundColor:</span> &#x27;<span class=\"hljs-attr\">purple</span>&#x27; }} /&gt;</span></span>\n    ),\n  }}\n&gt;\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Home&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{HomeScreen}</span> /&gt;</span></span>\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Details&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{DetailsScreen}</span> /&gt;</span></span>\n&lt;/<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>&gt;\n</code></pre>\n<hr>\n<p><strong>4.7 自定义过渡动画</strong></p>\n<pre><code class=\"language-javascript\">&lt;<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>\n  screenOptions={{\n    <span class=\"hljs-attr\">cardStyleInterpolator</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">{ current }</span>) =&gt;</span> ({\n      <span class=\"hljs-attr\">cardStyle</span>: {\n        <span class=\"hljs-attr\">transform</span>: [{ <span class=\"hljs-attr\">translateX</span>: current.<span class=\"hljs-property\">progress</span>.<span class=\"hljs-title function_\">interpolate</span>({ <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1</span>], <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-string\">&#x27;100%&#x27;</span>, <span class=\"hljs-string\">&#x27;0%&#x27;</span>]) }) }],\n      },\n    }),\n  }}\n&gt;\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Home&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{HomeScreen}</span> /&gt;</span></span>\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Details&quot;</span> <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{DetailsScreen}</span> /&gt;</span></span>\n&lt;/<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>&gt;\n</code></pre>\n<hr>\n<p><strong>5. <code>screenOptions</code> 与 <code>options</code> 的优先级</strong></p>\n<ul>\n<li>\n<p><code>screenOptions</code>：为所有屏幕提供默认选项。</p>\n</li>\n<li>\n<p><code>options</code>：为单个屏幕提供特定选项，优先级高于 <code>screenOptions</code>。</p>\n</li>\n</ul>\n<p><strong>示例</strong></p>\n<pre><code class=\"language-javascript\">&lt;<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>\n  screenOptions={{\n    <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">&#x27;Default Title&#x27;</span>,\n    <span class=\"hljs-attr\">headerStyle</span>: { <span class=\"hljs-attr\">backgroundColor</span>: <span class=\"hljs-string\">&#x27;lightblue&#x27;</span> },\n  }}\n&gt;\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span>\n    <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Home&quot;</span>\n    <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{HomeScreen}</span>\n    <span class=\"hljs-attr\">options</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">title:</span> &#x27;<span class=\"hljs-attr\">Custom</span> <span class=\"hljs-attr\">Home</span> <span class=\"hljs-attr\">Title</span>&#x27; }} // <span class=\"hljs-attr\">覆盖</span> <span class=\"hljs-attr\">screenOptions</span> <span class=\"hljs-attr\">的</span> <span class=\"hljs-attr\">title</span>\n  /&gt;</span></span>\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Stack.Screen</span>\n    <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;Details&quot;</span>\n    <span class=\"hljs-attr\">component</span>=<span class=\"hljs-string\">{DetailsScreen}</span>\n  /&gt;</span></span>\n&lt;/<span class=\"hljs-title class_\">Stack</span>.<span class=\"hljs-property\">Navigator</span>&gt;\n</code></pre>\n<ul>\n<li>\n<p>结果：</p>\n<ul>\n<li>\n<p><code>Home</code> 屏幕的标题为 <code>Custom Home Title</code>。</p>\n</li>\n<li>\n<p><code>Details</code> 屏幕的标题为 <code>Default Title</code>。</p>\n</li>\n</ul>\n</li>\n</ul>\n<hr>\n<p><strong>6. 常见问题及解决方法</strong></p>\n<p><strong>问题 1：<code>screenOptions</code> 不生效</strong></p>\n<ul>\n<li>\n<p>原因：可能是拼写错误或配置不正确。</p>\n</li>\n<li>\n<p>解决方法：</p>\n<ul>\n<li>\n<p>检查 <code>screenOptions</code> 的拼写是否正确。</p>\n</li>\n<li>\n<p>确保 <code>screenOptions</code> 的属性是 React Navigation 支持的。</p>\n</li>\n</ul>\n</li>\n</ul>\n<p><strong>问题 2：<code>screenOptions</code> 被 <code>options</code> 覆盖</strong></p>\n<ul>\n<li>\n<p>原因：单个屏幕的 <code>options</code> 优先级高于 <code>screenOptions</code>。</p>\n</li>\n<li>\n<p>解决方法：</p>\n<ul>\n<li>如果需要全局默认值，确保 <code>screenOptions</code> 中的配置不会被单个屏幕的 <code>options</code> 覆盖。</li>\n</ul>\n</li>\n</ul>\n<p><strong>问题 3：动态 <code>screenOptions</code> 不更新</strong></p>\n<ul>\n<li>\n<p>原因：动态配置未正确使用 <code>route</code> 或 <code>navigation</code>。</p>\n</li>\n<li>\n<p>解决方法：</p>\n<ul>\n<li>确保动态配置正确使用 <code>route</code> 或 <code>navigation</code> 参数。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<p><strong>7. 总结</strong></p>\n<ul>\n<li>\n<p><code>screenOptions</code> 的作用：为所有屏幕提供默认的导航选项，减少重复代码。</p>\n</li>\n<li>\n<p>常用属性：</p>\n<ul>\n<li>\n<p><code>title</code>：设置默认标题。</p>\n</li>\n<li>\n<p><code>headerStyle</code>：自定义头部样式。</p>\n</li>\n<li>\n<p><code>headerTintColor</code>：设置按钮和标题的颜色。</p>\n</li>\n<li>\n<p><code>headerTitleStyle</code>：自定义标题样式。</p>\n</li>\n<li>\n<p><code>headerLeft</code> 和 <code>headerRight</code>：自定义左侧和右侧按钮。</p>\n</li>\n<li>\n<p><code>headerShown</code>：隐藏或显示头部。</p>\n</li>\n</ul>\n</li>\n<li>\n<p>优先级：<code>options</code> &gt; <code>screenOptions</code>。</p>\n</li>\n<li>\n<p>动态配置：可以通过函数动态设置选项。</p>\n</li>\n</ul>\n</div>";
