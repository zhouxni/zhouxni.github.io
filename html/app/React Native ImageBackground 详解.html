<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="React Native ImageBackground 详解",document.getElementById("article").innerHTML='<div><p><code>ImageBackground</code> 是 React Native 提供的一个内置组件，用于在背景中显示图像，并在其上叠加其他内容。它是基于 <code>Image</code> 组件的封装，提供了更便捷的背景图片处理方式。</p>\n<h2>基本用法</h2>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> <span class="hljs-title class_">React</span> <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;react&#x27;</span>;\n<span class="hljs-keyword">import</span> { <span class="hljs-title class_">StyleSheet</span>, <span class="hljs-title class_">Text</span>, <span class="hljs-title class_">View</span>, <span class="hljs-title class_">ImageBackground</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;react-native&#x27;</span>;\n\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">App</span> = (<span class="hljs-params"></span>) =&gt; {\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">ImageBackground</span>\n      <span class="hljs-attr">source</span>=<span class="hljs-string">{require(</span>&#x27;<span class="hljs-attr">.</span>/<span class="hljs-attr">assets</span>/<span class="hljs-attr">background.jpg</span>&#x27;)}\n      <span class="hljs-attr">style</span>=<span class="hljs-string">{styles.background}</span>\n    &gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">View</span> <span class="hljs-attr">style</span>=<span class="hljs-string">{styles.content}</span>&gt;</span>\n        <span class="hljs-tag">&lt;<span class="hljs-name">Text</span> <span class="hljs-attr">style</span>=<span class="hljs-string">{styles.text}</span>&gt;</span>Hello on Background<span class="hljs-tag">&lt;/<span class="hljs-name">Text</span>&gt;</span>\n      <span class="hljs-tag">&lt;/<span class="hljs-name">View</span>&gt;</span>\n    <span class="hljs-tag">&lt;/<span class="hljs-name">ImageBackground</span>&gt;</span></span>\n  );\n};\n\n<span class="hljs-keyword">const</span> styles = <span class="hljs-title class_">StyleSheet</span>.<span class="hljs-title function_">create</span>({\n  <span class="hljs-attr">background</span>: {\n    <span class="hljs-attr">flex</span>: <span class="hljs-number">1</span>,\n    <span class="hljs-attr">justifyContent</span>: <span class="hljs-string">&#x27;center&#x27;</span>,\n  },\n  <span class="hljs-attr">content</span>: {\n    <span class="hljs-attr">padding</span>: <span class="hljs-number">20</span>,\n    <span class="hljs-attr">backgroundColor</span>: <span class="hljs-string">&#x27;rgba(0,0,0,0.5)&#x27;</span>,\n  },\n  <span class="hljs-attr">text</span>: {\n    <span class="hljs-attr">color</span>: <span class="hljs-string">&#x27;white&#x27;</span>,\n    <span class="hljs-attr">fontSize</span>: <span class="hljs-number">24</span>,\n  },\n});\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-title class_">App</span>;\n</code></pre>\n<h2>核心属性</h2>\n<h3>source (必需)</h3>\n<p>指定图片来源，可以是：</p>\n<ul>\n<li>本地资源：<code>require(\'./path/to/image.jpg\')</code></li>\n<li>网络图片：<code>{uri: \'https://example.com/image.jpg\'}</code></li>\n</ul>\n<h3>resizeMode</h3>\n<p>控制图片如何适应容器：</p>\n<ul>\n<li><code>cover</code> (默认) - 保持宽高比，填满容器，可能裁剪图片</li>\n<li><code>contain</code> - 保持宽高比，完整显示图片，可能有空白</li>\n<li><code>stretch</code> - 拉伸以填满容器，可能变形</li>\n<li><code>repeat</code> - 重复图片以填满容器 (iOS 不支持)</li>\n<li><code>center</code> - 居中显示，不缩放</li>\n</ul>\n<h3>imageStyle</h3>\n<p>应用于底层 <code>Image</code> 组件的样式</p>\n<h3>blurRadius (仅iOS)</h3>\n<p>添加模糊效果，值越大越模糊</p>\n<h2>样式注意事项</h2>\n<ol>\n<li><strong>必须指定尺寸</strong>  ：<code>ImageBackground</code> 需要明确的宽度和高度，通常使用 <code>flex: 1</code> 填满父容器</li>\n<li><strong>内容容器</strong>  ：建议为内容添加单独的 <code>View</code> 容器，便于布局控制</li>\n<li><strong>背景叠加</strong>  ：可以使用半透明背景增强文字可读性</li>\n</ol>\n<h2>高级用法</h2>\n<h3>动态背景图片</h3>\n<pre><code class="language-jsx">&lt;<span class="hljs-title class_">ImageBackground</span>\n  source={{<span class="hljs-attr">uri</span>: <span class="hljs-string">`https://example.com/images/<span class="hljs-subst">${season}</span>-bg.jpg`</span>}}\n  style={styles.<span class="hljs-property">background</span>}\n&gt;\n  {<span class="hljs-comment">/* 内容 */</span>}\n&lt;/<span class="hljs-title class_">ImageBackground</span>&gt;\n</code></pre>\n<h3>多背景层</h3>\n<pre><code class="language-jsx">&lt;<span class="hljs-title class_">ImageBackground</span> source={<span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;./bg1.jpg&#x27;</span>)} style={styles.<span class="hljs-property">background</span>}&gt;\n  <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">ImageBackground</span> <span class="hljs-attr">source</span>=<span class="hljs-string">{require(</span>&#x27;<span class="hljs-attr">.</span>/<span class="hljs-attr">bg2.png</span>&#x27;)} <span class="hljs-attr">style</span>=<span class="hljs-string">{styles.overlay}</span>&gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">Text</span>&gt;</span>多层背景<span class="hljs-tag">&lt;/<span class="hljs-name">Text</span>&gt;</span>\n  <span class="hljs-tag">&lt;/<span class="hljs-name">ImageBackground</span>&gt;</span></span>\n&lt;/<span class="hljs-title class_">ImageBackground</span>&gt;\n</code></pre>\n<h3>渐变叠加</h3>\n<p>结合 <code>react-native-linear-gradient</code> 使用：</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> <span class="hljs-title class_">LinearGradient</span> <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;react-native-linear-gradient&#x27;</span>;\n\n<span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">ImageBackground</span> <span class="hljs-attr">source</span>=<span class="hljs-string">{require(</span>&#x27;<span class="hljs-attr">.</span>/<span class="hljs-attr">bg.jpg</span>&#x27;)} <span class="hljs-attr">style</span>=<span class="hljs-string">{styles.background}</span>&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">LinearGradient</span> \n    <span class="hljs-attr">colors</span>=<span class="hljs-string">{[</span>&#x27;<span class="hljs-attr">rgba</span>(<span class="hljs-attr">0</span>,<span class="hljs-attr">0</span>,<span class="hljs-attr">0</span>,<span class="hljs-attr">0.8</span>)&#x27;, &#x27;<span class="hljs-attr">transparent</span>&#x27;]} \n    <span class="hljs-attr">style</span>=<span class="hljs-string">{styles.gradient}</span>\n  &gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">Text</span>&gt;</span>带渐变叠加的背景<span class="hljs-tag">&lt;/<span class="hljs-name">Text</span>&gt;</span>\n  <span class="hljs-tag">&lt;/<span class="hljs-name">LinearGradient</span>&gt;</span>\n<span class="hljs-tag">&lt;/<span class="hljs-name">ImageBackground</span>&gt;</span></span>\n</code></pre>\n<h2>性能优化</h2>\n<ol>\n<li><strong>本地图片优先</strong>  ：网络图片会有加载延迟</li>\n<li><strong>适当压缩</strong>  ：大图会影响性能</li>\n<li><strong>缓存网络图片</strong>  ：使用 <code>react-native-fast-image</code> 替代</li>\n<li><strong>避免频繁更新</strong>  ：动态背景图片变化时考虑过渡效果</li>\n</ol>\n<h2>常见问题</h2>\n<h3>图片不显示</h3>\n<ul>\n<li>检查路径是否正确</li>\n<li>网络图片需要指定尺寸</li>\n<li>确保图片格式被支持 (jpg, png 等)</li>\n</ul>\n<h3>内容布局问题</h3>\n<ul>\n<li>确保 <code>ImageBackground</code> 有明确的尺寸</li>\n<li>内容容器使用 <code>flex</code> 布局</li>\n</ul>\n<h3>内存问题</h3>\n<ul>\n<li>大图可能导致内存溢出，特别是 Android 设备</li>\n<li>考虑使用分辨率适当的图片</li>\n</ul>\n<p><code>ImageBackground</code> 是创建精美界面布局的强大工具，合理使用可以显著提升应用视觉效果。</p>\n</div>'</script></body></html>
