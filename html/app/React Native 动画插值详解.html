<script>
      document.title = 'React Native 动画插值详解'
        document.getElementById('article').innerHTML = 
        "<div><p>在 React Native 中，动画插值（interpolation）是 <code>Animated</code> API 的核心功能之一，它允许你将一个动画值范围映射到另一个范围，实现更灵活的动画效果。</p>\n<h2>基本概念</h2>\n<p>动画插值通过 <code>interpolate()</code> 方法实现，它可以将一个输入范围映射到一个输出范围：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> animatedValue = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Animated</span>.<span class=\"hljs-title class_\">Value</span>(<span class=\"hljs-number\">0</span>);\n\n<span class=\"hljs-keyword\">const</span> interpolatedValue = animatedValue.<span class=\"hljs-title function_\">interpolate</span>({\n  <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">100</span>]\n});\n</code></pre>\n<h2>基本用法</h2>\n<h3>1. 简单数值映射</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> fadeAnim = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Animated</span>.<span class=\"hljs-title class_\">Value</span>(<span class=\"hljs-number\">0</span>);\n\n<span class=\"hljs-comment\">// 将 0-1 的动画值映射到 0-100 的宽度变化</span>\n<span class=\"hljs-keyword\">const</span> widthInterpolate = fadeAnim.<span class=\"hljs-title function_\">interpolate</span>({\n  <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">100</span>]\n});\n\n<span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Animated.View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">width:</span> <span class=\"hljs-attr\">widthInterpolate</span> }} /&gt;</span></span>\n</code></pre>\n<h3>2. 颜色插值</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> colorInterpolate = fadeAnim.<span class=\"hljs-title function_\">interpolate</span>({\n  <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-string\">&#x27;rgb(255,0,0)&#x27;</span>, <span class=\"hljs-string\">&#x27;rgb(0,0,255)&#x27;</span>]\n});\n\n<span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Animated.View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">backgroundColor:</span> <span class=\"hljs-attr\">colorInterpolate</span> }} /&gt;</span></span>\n</code></pre>\n<h2>高级用法</h2>\n<h3>1. 多段插值</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> rotateInterpolate = fadeAnim.<span class=\"hljs-title function_\">interpolate</span>({\n  <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">0.5</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-string\">&#x27;0deg&#x27;</span>, <span class=\"hljs-string\">&#x27;90deg&#x27;</span>, <span class=\"hljs-string\">&#x27;180deg&#x27;</span>]\n});\n\n<span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Animated.View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">transform:</span> [{ <span class=\"hljs-attr\">rotate:</span> <span class=\"hljs-attr\">rotateInterpolate</span> }] }} /&gt;</span></span>\n</code></pre>\n<h3>2. 超出范围的插值</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> extrapolated = fadeAnim.<span class=\"hljs-title function_\">interpolate</span>({\n  <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">100</span>],\n  <span class=\"hljs-attr\">extrapolate</span>: <span class=\"hljs-string\">&#x27;extend&#x27;</span> <span class=\"hljs-comment\">// 或 &#x27;clamp&#x27; (默认)</span>\n});\n</code></pre>\n<h3>3. 弹性插值</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> elasticInterpolate = fadeAnim.<span class=\"hljs-title function_\">interpolate</span>({\n  <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">0.5</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1.2</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">extrapolateLeft</span>: <span class=\"hljs-string\">&#x27;clamp&#x27;</span>,\n  <span class=\"hljs-attr\">extrapolateRight</span>: <span class=\"hljs-string\">&#x27;clamp&#x27;</span>\n});\n</code></pre>\n<h2>实际应用示例</h2>\n<h3>1. 进度条动画</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> progressAnim = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Animated</span>.<span class=\"hljs-title class_\">Value</span>(<span class=\"hljs-number\">0</span>);\n\n<span class=\"hljs-keyword\">const</span> progressWidth = progressAnim.<span class=\"hljs-title function_\">interpolate</span>({\n  <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-string\">&#x27;0%&#x27;</span>, <span class=\"hljs-string\">&#x27;100%&#x27;</span>]\n});\n\n<span class=\"hljs-comment\">// 运行动画</span>\n<span class=\"hljs-title class_\">Animated</span>.<span class=\"hljs-title function_\">timing</span>(progressAnim, {\n  <span class=\"hljs-attr\">toValue</span>: <span class=\"hljs-number\">1</span>,\n  <span class=\"hljs-attr\">duration</span>: <span class=\"hljs-number\">2000</span>\n}).<span class=\"hljs-title function_\">start</span>();\n\n<span class=\"hljs-comment\">// 渲染</span>\n<span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{styles.progressBar}</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Animated.View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{[styles.progressFill,</span> { <span class=\"hljs-attr\">width:</span> <span class=\"hljs-attr\">progressWidth</span> }]} /&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">View</span>&gt;</span></span>\n</code></pre>\n<h3>2. 复杂变换组合</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> transformAnim = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Animated</span>.<span class=\"hljs-title class_\">Value</span>(<span class=\"hljs-number\">0</span>);\n\n<span class=\"hljs-keyword\">const</span> rotate = transformAnim.<span class=\"hljs-title function_\">interpolate</span>({\n  <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-string\">&#x27;0deg&#x27;</span>, <span class=\"hljs-string\">&#x27;360deg&#x27;</span>]\n});\n\n<span class=\"hljs-keyword\">const</span> scale = transformAnim.<span class=\"hljs-title function_\">interpolate</span>({\n  <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">0.5</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-number\">1</span>, <span class=\"hljs-number\">1.5</span>, <span class=\"hljs-number\">1</span>]\n});\n\n<span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Animated.View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{{</span>\n  <span class=\"hljs-attr\">transform:</span> [\n    { <span class=\"hljs-attr\">rotate</span> },\n    { <span class=\"hljs-attr\">scale</span> }\n  ]\n}} /&gt;</span></span>\n</code></pre>\n<h2>性能优化</h2>\n<ol>\n<li><strong>使用原生驱动</strong>  ：尽可能设置 <code>useNativeDriver: true</code><pre><code class=\"language-javascript\"><span class=\"hljs-title class_\">Animated</span>.<span class=\"hljs-title function_\">timing</span>(fadeAnim, {\n  <span class=\"hljs-attr\">toValue</span>: <span class=\"hljs-number\">1</span>,\n  <span class=\"hljs-attr\">duration</span>: <span class=\"hljs-number\">1000</span>,\n  <span class=\"hljs-attr\">useNativeDriver</span>: <span class=\"hljs-literal\">true</span>\n}).<span class=\"hljs-title function_\">start</span>();\n</code></pre>\n</li>\n<li><strong>避免不必要的插值</strong>  ：每个插值都会创建新的引用</li>\n<li><strong>复用动画值</strong>  ：多个样式属性可以使用同一个动画值</li>\n</ol>\n<h2>注意事项</h2>\n<ol>\n<li><strong>插值不支持所有样式属性</strong>  ：某些属性如 <code>flex</code> 不能用于插值</li>\n<li><strong>颜色插值限制</strong>  ：只能插值 RGB 颜色，不支持 RGBA</li>\n<li><strong>精度问题</strong>  ：复杂的插值可能会有精度损失</li>\n<li><strong>原生驱动限制</strong>  ：使用 <code>useNativeDriver: true</code> 时，某些插值可能不支持</li>\n</ol>\n<h2>替代方案：react-native-reanimated</h2>\n<p>对于更复杂的动画需求，可以考虑使用 <code>react-native-reanimated</code> 库，它提供了更强大的插值功能：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">Animated</span> <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;react-native-reanimated&#x27;</span>;\n\n<span class=\"hljs-keyword\">const</span> { interpolate, <span class=\"hljs-title class_\">Extrapolate</span> } = <span class=\"hljs-title class_\">Animated</span>;\n\n<span class=\"hljs-keyword\">const</span> progress = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Animated</span>.<span class=\"hljs-title class_\">Value</span>(<span class=\"hljs-number\">0</span>);\n\n<span class=\"hljs-keyword\">const</span> width = <span class=\"hljs-title function_\">interpolate</span>(progress, {\n  <span class=\"hljs-attr\">inputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1</span>],\n  <span class=\"hljs-attr\">outputRange</span>: [<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">100</span>],\n  <span class=\"hljs-attr\">extrapolate</span>: <span class=\"hljs-title class_\">Extrapolate</span>.<span class=\"hljs-property\">CLAMP</span>\n});\n</code></pre>\n<h2>总结</h2>\n<p>React Native 的动画插值功能非常强大，可以用于：</p>\n<ul>\n<li>数值范围转换</li>\n<li>颜色过渡</li>\n<li>复杂变换组合</li>\n<li>创建弹性/反弹效果</li>\n</ul>\n<p>通过合理使用插值，你可以创建出各种流畅、复杂的动画效果，同时保持应用的性能。</p>\n</div>";
      </script></body></html>
