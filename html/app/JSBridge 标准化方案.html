<script>
        document.getElementById('article').innerHTML = 
        "<div><pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// H5 统一调用入口</span>\n<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">JSBridge</span> = {\n  <span class=\"hljs-title function_\">call</span>(<span class=\"hljs-params\">method, params, callback</span>) {\n    <span class=\"hljs-keyword\">const</span> callbackId = <span class=\"hljs-string\">&quot;cb_&quot;</span> + <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>();\n    <span class=\"hljs-variable language_\">window</span>[callbackId] = callback;\n    <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">NativeBridge</span>) {\n      <span class=\"hljs-comment\">// Android 直接调用</span>\n      <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">NativeBridge</span>[method](<span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(params), callbackId);\n    } <span class=\"hljs-keyword\">else</span> <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">webkit</span>?.<span class=\"hljs-property\">messageHandlers</span>?.<span class=\"hljs-property\">nativeBridge</span>) {\n      <span class=\"hljs-comment\">// iOS 调用</span>\n      <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">webkit</span>.<span class=\"hljs-property\">messageHandlers</span>.<span class=\"hljs-property\">nativeBridge</span>.<span class=\"hljs-title function_\">postMessage</span>({\n        method,\n        params,\n        callbackId,\n      });\n    } <span class=\"hljs-keyword\">else</span> {\n      <span class=\"hljs-comment\">// 降级到 URL Scheme</span>\n      <span class=\"hljs-keyword\">const</span> url = <span class=\"hljs-string\">`myapp://<span class=\"hljs-subst\">${method}</span>?data=<span class=\"hljs-subst\">${<span class=\"hljs-built_in\">encodeURIComponent</span>(<span class=\"hljs-built_in\">JSON</span>.stringify(params))}</span>callbackId=callbackId`</span>;\n      <span class=\"hljs-keyword\">const</span> iframe = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">&quot;iframe&quot;</span>);\n      iframe.<span class=\"hljs-property\">src</span> = url;\n      <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">body</span>.<span class=\"hljs-title function_\">appendChild</span>(iframe);\n      <span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-function\">() =&gt;</span> iframe.<span class=\"hljs-title function_\">remove</span>(), <span class=\"hljs-number\">100</span>);\n    }\n  },\n};\n\n<span class=\"hljs-comment\">// 调用示例</span>\n<span class=\"hljs-title class_\">JSBridge</span>.<span class=\"hljs-title function_\">call</span>(<span class=\"hljs-string\">&quot;getUserInfo&quot;</span>, {}, <span class=\"hljs-function\">(<span class=\"hljs-params\">data</span>) =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;原生返回:&quot;</span>, data);\n});\n</code></pre>\n</div>";
      </script></body></html>
