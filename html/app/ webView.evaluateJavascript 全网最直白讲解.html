span class="hljs-variable language_">window</span>.<span class="hljs-property">onAppLogin</span> = <span class="hljs-function">(<span class="hljs-params">token</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;App 调用了我，token：&quot;</span>, token);\n};\n</code></pre>\n<hr>\n<h1>四、最常用场景：回调 H5（你一定会用到）</h1>\n<p>H5 调用 App getUserInfo<br>\nApp 拿完信息，用 <strong>evaluateJavascript</strong>   把结果还给 H5</p>\n<h2>1. H5 调用原生</h2>\n<pre><code class="language-js"><span class="hljs-variable language_">window</span>.<span class="hljs-property">webkit</span>.<span class="hljs-property">messageHandlers</span>.<span class="hljs-property">getUserInfo</span>.<span class="hljs-title function_">postMessage</span>({ <span class="hljs-attr">callbackId</span>: <span class="hljs-string">&quot;cb_123&quot;</span> });\n</code></pre>\n<h2>2. App 执行 JS 把结果返回</h2>\n<pre><code class="language-objc"><span class="hljs-comment">// iOS</span>\n<span class="hljs-built_in">NSString</span> *js = <span class="hljs-string">@&quot;cb_123({name:&#x27;张三&#x27;, age:20})&quot;</span>;\n[webView evaluateJavaScript:js completionHandler:<span class="hljs-literal">nil</span>];\n</code></pre>\n<pre><code class="language-java"><span class="hljs-comment">// Android</span>\n<span class="hljs-type">String</span> <span class="hljs-variable">js</span> <span class="hljs-operator">=</span> <span class="hljs-string">&quot;cb_123({name:&#x27;张三&#x27;, age:20})&quot;</span>;\nwebView.evaluateJavascript(js, <span class="hljs-literal">null</span>);\n</code></pre>\n<h2>3. H5 收到结果</h2>\n<pre><code class="language-js"><span class="hljs-variable language_">window</span>.<span class="hljs-property">cb_123</span> = <span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(res);\n};\n</code></pre>\n<hr>\n<h1>五、Android 注意事项（必看，否则报错）</h1>\n<ol>\n<li><strong>必须在主线程调用</strong><pre><code class="language-java">runOnUiThread(() -&gt; {\n    webView.evaluateJavascript(<span class="hljs-string">&quot;xxx()&quot;</span>, <span class="hljs-literal">null</span>);\n});\n</code></pre>\n</li>\n<li><strong>Android 4.4+ 才支持</strong>   （现在几乎全满足）</li>\n<li><strong>字符串要加引号，JSON 要转义</strong><pre><code class="language-java"><span class="hljs-type">String</span> <span class="hljs-variable">json</span> <span class="hljs-operator">=</span> <span class="hljs-string">&quot;{\\&quot;name\\&quot;:\\&quot;张三\\&quot;}&quot;</span>;\nwebView.evaluateJavascript(<span class="hljs-string">&quot;window.onResult(&quot;</span>+json+<span class="hljs-string">&quot;)&quot;</span>, <span class="hljs-literal">null</span>);\n</code></pre>\n</li>\n</ol>\n<hr>\n<h1>六、终极总结（你记这三句）</h1>\n<ol>\n<li>\n<p><strong>H5 → App</strong></p>\n<ul>\n<li>iOS：<code>window.webkit.messageHandlers</code></li>\n<li>安卓：<code>window.androidBridge</code></li>\n</ul>\n</li>\n<li>\n<p><strong>App → H5</strong></p>\n<ul>\n<li>全平台统一：<code>evaluateJavascript</code></li>\n</ul>\n</li>\n<li>\n<p><strong>这就是业界最标准、最稳定、最简单的双向通信</strong><br>\n不用 MessageChannel、不用 iframe、不用第三方库。</p>\n</li>\n</ol>\n<hr>\n<p>需要我给你 <strong>一套完整可直接上线的双向通信模板（iOS + Android + H5）</strong>   吗？\n你复制粘贴就能用，再也不用踩坑。</p>\n</div>'</script></body></html>
