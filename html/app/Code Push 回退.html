<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'Code Push 回退'
        document.getElementById('article').innerHTML = 
        "<div><p>在 Code Push 热更新中，如果新发布的版本出现问题（如崩溃、功能异常），可以通过 <strong>回退（Rollback）</strong>   机制快速恢复到之前的稳定版本。以下是具体方法和流程：</p>\n<hr>\n<h3><strong>1. 自动回退（默认行为）</strong></h3>\n<p>Code Push SDK 默认会检测更新后的应用是否崩溃或异常，若发生以下情况会自动回退到上一个版本：</p>\n<ul>\n<li><strong>启动崩溃</strong>  ：应用加载新版本后立即崩溃（如 JS 代码错误）。</li>\n<li><strong>更新失败</strong>  ：下载或安装更新包时出错。</li>\n</ul>\n<p><strong>触发条件</strong>  ：<br>\nSDK 会记录更新状态，若应用连续崩溃多次（如 2 次），则自动回滚到旧版本。</p>\n<hr>\n<h3><strong>2. 手动回退（开发者主动触发）</strong></h3>\n<h4><strong>方法 1：通过 Code Push CLI 回退</strong></h4>\n<ol>\n<li>\n<p><strong>查看已部署的版本</strong>  ：<br>\n使用以下命令列出当前应用的所有发布记录（需安装 <code>code-push-cli</code>）：</p>\n<pre><code class=\"language-sh\">code-push deployment <span class=\"hljs-built_in\">history</span> &lt;AppName&gt; &lt;DeploymentName&gt;\n<span class=\"hljs-comment\"># 示例：code-push deployment history MyApp Staging</span>\n</code></pre>\n<p>输出示例：</p>\n<pre><code>Label  Version  ReleaseTime          Description\nv1     1.0.0   2023-10-01 10:00:00  Initial release\nv2     1.1.0   2023-10-02 12:00:00  Bug fix\n</code></pre>\n</li>\n<li>\n<p><strong>回退到指定版本</strong>  ：<br>\n使用 <code>rollback</code> 命令回退到上一个版本（或指定版本）：</p>\n<pre><code class=\"language-sh\">code-push rollback &lt;AppName&gt; &lt;DeploymentName&gt; --targetRelease &lt;版本Label&gt;\n<span class=\"hljs-comment\"># 示例：回退到 v1</span>\ncode-push rollback MyApp Staging --targetRelease v1\n</code></pre>\n</li>\n</ol>\n<h4><strong>方法 2：通过 App Center 控制台回退</strong></h4>\n<ol>\n<li>登录 <a href=\"https://appcenter.ms/\">Microsoft App Center</a>。</li>\n<li>进入对应应用 → <strong>Distribute</strong>   → <strong>CodePush</strong>  。</li>\n<li>选择部署环境（如 <code>Staging</code> 或 <code>Production</code>）。</li>\n<li>点击历史版本右侧的 <strong>Rollback</strong>   按钮。</li>\n</ol>\n<hr>\n<h3><strong>3. 客户端强制回退（紧急情况）</strong></h3>\n<p>如果自动回退未触发，可以在客户端代码中强制忽略问题版本：</p>\n<pre><code class=\"language-javascript\">codePush.<span class=\"hljs-title function_\">sync</span>({\n  <span class=\"hljs-attr\">updateDialog</span>: <span class=\"hljs-literal\">true</span>,\n  <span class=\"hljs-attr\">installMode</span>: codePush.<span class=\"hljs-property\">InstallMode</span>.<span class=\"hljs-property\">IMMEDIATE</span>,\n  <span class=\"hljs-comment\">// 强制忽略当前失败的版本</span>\n  <span class=\"hljs-attr\">rollbackRetryOptions</span>: {\n    <span class=\"hljs-attr\">delayInHours</span>: <span class=\"hljs-number\">0</span>, <span class=\"hljs-comment\">// 立即重试</span>\n    <span class=\"hljs-attr\">maxRetryAttempts</span>: <span class=\"hljs-number\">1</span> <span class=\"hljs-comment\">// 只尝试一次</span>\n  }\n});\n</code></pre>\n<hr>\n<h3><strong>4. 回退后的行为</strong></h3>\n<ul>\n<li><strong>客户端</strong>  ：下次启动时会检测到回退指令，重新下载旧版本代码。</li>\n<li><strong>服务端</strong>  ：回退后，新版本的状态会被标记为 <code>Rolled Back</code>，避免其他用户继续更新。</li>\n</ul>\n<hr>\n<h3><strong>注意事项</strong></h3>\n<ol>\n<li><strong>版本兼容性</strong>  ：<br>\n回退的旧版本需与当前客户端原生代码兼容（如 React Native 版本一致）。</li>\n<li><strong>数据丢失风险</strong>  ：<br>\n如果新版本修改了本地存储结构（如 AsyncStorage），回退可能导致数据不一致。</li>\n<li><strong>灰度发布回退</strong>  ：<br>\n若更新是分阶段发布的（如 20% 用户），回退仅影响尚未更新的用户。</li>\n</ol>\n<hr>\n<h3><strong>总结</strong></h3>\n<table>\n<thead>\n<tr>\n<th>回退方式</th>\n<th>适用场景</th>\n<th>操作复杂度</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>自动回退</strong></td>\n<td>版本崩溃或安装失败时（默认触发）</td>\n<td>无需干预</td>\n</tr>\n<tr>\n<td><strong>CLI/控制台</strong></td>\n<td>需要主动回退指定版本</td>\n<td>中等</td>\n</tr>\n<tr>\n<td><strong>客户端配置</strong></td>\n<td>紧急情况下强制忽略问题版本</td>\n<td>简单</td>\n</tr>\n</tbody>\n</table>\n<p>建议在发布新版本时保持 <strong>分阶段发布</strong>  （如先推送到 <code>Staging</code> 环境测试），降低回退的影响范围。</p>\n</div>";</script></body></html>
