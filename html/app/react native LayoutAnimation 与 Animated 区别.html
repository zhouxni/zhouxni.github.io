<script>
            document.getElementById('article').innerHTML = 
            "<div><p><code>LayoutAnimation</code> 和 <code>Animated</code> 是 React Native 中用于实现动画的两个不同 API，它们在设计理念、使用场景和实现方式上有显著区别。以下是它们的核心对比：</p>\n<hr>\n<h3><strong>1. 设计目标</strong></h3>\n<ul>\n<li>\n<p><strong><code>Animated</code></strong></p>\n<ul>\n<li><strong>精细控制</strong>  ：专注于对单个组件的属性（如 <code>opacity</code>、<code>translateX</code>、<code>scale</code> 等）进行逐帧动画控制。</li>\n<li><strong>复杂动画</strong>  ：支持组合动画（顺序/并行）、插值、手势交互（如拖动后回弹）。</li>\n<li><strong>性能优化</strong>  ：动画逻辑在 JavaScript 端计算，但通过原生驱动（<code>useNativeDriver: true</code>）可提升性能。</li>\n</ul>\n</li>\n<li>\n<p><strong><code>LayoutAnimation</code></strong></p>\n<ul>\n<li><strong>布局变化动画</strong>  ：自动为组件<strong>布局变化</strong>  （如大小、位置调整）添加平滑过渡效果。</li>\n<li><strong>批量处理</strong>  ：适用于 <code>setState</code> 或 <code>Redux</code> 触发的布局批量更新（如列表项增删、折叠/展开）。</li>\n<li><strong>声明式</strong>  ：无需手动定义动画细节，系统自动处理过渡。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>2. 使用场景</strong></h3>\n<ul>\n<li>\n<p><strong><code>Animated</code> 更适合</strong>  ：</p>\n<ul>\n<li>需要精确控制动画过程（如路径、缓动函数）。</li>\n<li>交互式动画（如拖动、滑动）。</li>\n<li>复杂动画序列（如轮播图、复杂过渡）。</li>\n</ul>\n</li>\n<li>\n<p><strong><code>LayoutAnimation</code> 更适合</strong>  ：</p>\n<ul>\n<li>布局变化的简单过渡（如弹窗出现、列表重新排序）。</li>\n<li>快速实现“一气呵成”的视觉效果，减少样板代码。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>3. 代码示例对比</strong></h3>\n<h4><strong><code>Animated</code>（手动控制）</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> fadeAnim = <span class=\"hljs-title function_\">useRef</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Animated</span>.<span class=\"hljs-title class_\">Value</span>(<span class=\"hljs-number\">0</span>)).<span class=\"hljs-property\">current</span>;\n\n<span class=\"hljs-title function_\">useEffect</span>(<span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-title class_\">Animated</span>.<span class=\"hljs-title function_\">timing</span>(fadeAnim, {\n    <span class=\"hljs-attr\">toValue</span>: <span class=\"hljs-number\">1</span>,\n    <span class=\"hljs-attr\">duration</span>: <span class=\"hljs-number\">1000</span>,\n    <span class=\"hljs-attr\">useNativeDriver</span>: <span class=\"hljs-literal\">true</span>,\n  }).<span class=\"hljs-title function_\">start</span>();\n}, []);\n\n<span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Animated.View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">opacity:</span> <span class=\"hljs-attr\">fadeAnim</span> }} /&gt;</span></span>;\n</code></pre>\n<h4><strong><code>LayoutAnimation</code>（自动过渡）</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 在组件中直接触发布局变化</span>\n<span class=\"hljs-keyword\">const</span> [expanded, setExpanded] = <span class=\"hljs-title function_\">useState</span>(<span class=\"hljs-literal\">false</span>);\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">toggleExpansion</span> = (<span class=\"hljs-params\"></span>) =&gt; {\n  <span class=\"hljs-title class_\">LayoutAnimation</span>.<span class=\"hljs-title function_\">configureNext</span>(<span class=\"hljs-title class_\">LayoutAnimation</span>.<span class=\"hljs-property\">Presets</span>.<span class=\"hljs-property\">easeInEaseOut</span>);\n  <span class=\"hljs-title function_\">setExpanded</span>(!expanded);\n};\n\n<span class=\"hljs-keyword\">return</span> (\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">View</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">height:</span> <span class=\"hljs-attr\">expanded</span> ? <span class=\"hljs-attr\">200</span> <span class=\"hljs-attr\">:</span> <span class=\"hljs-attr\">100</span> }} <span class=\"hljs-attr\">onPress</span>=<span class=\"hljs-string\">{toggleExpansion}</span> /&gt;</span></span>\n);\n</code></pre>\n<hr>\n<h3><strong>4. 关键区别总结</strong></h3>\n<table>\n<thead>\n<tr>\n<th><strong>特性</strong></th>\n<th><strong><code>Animated</code></strong></th>\n<th><strong><code>LayoutAnimation</code></strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>控制粒度</strong></td>\n<td>精细到属性级别</td>\n<td>布局变化整体过渡</td>\n</tr>\n<tr>\n<td><strong>性能</strong></td>\n<td>依赖原生驱动优化</td>\n<td>原生实现，但复杂动画可能性能较差</td>\n</tr>\n<tr>\n<td><strong>复杂度</strong></td>\n<td>需手动定义动画细节</td>\n<td>声明式，自动处理</td>\n</tr>\n<tr>\n<td><strong>交互支持</strong></td>\n<td>支持手势响应</td>\n<td>仅响应布局变化</td>\n</tr>\n<tr>\n<td><strong>兼容性</strong></td>\n<td>全平台支持</td>\n<td>Android 可能需要额外配置</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>5. 如何选择？</strong></h3>\n<ul>\n<li>需要<strong>交互式</strong>  或<strong>复杂动画</strong>   → 选 <code>Animated</code>。</li>\n<li>需要<strong>快速实现布局变化动画</strong>   → 选 <code>LayoutAnimation</code>。</li>\n<li>在 <code>FlatList</code> 等列表操作中，<code>LayoutAnimation</code> 可能更简单；而 <code>Animated</code> 适合自定义列表项动画。</li>\n</ul>\n<p><strong>注意</strong>  ：在 Android 上使用 <code>LayoutAnimation</code> 时，需在 <code>UIManager</code> 中启用 <code>setLayoutAnimationEnabledExperimental</code>。</p>\n</div>";
          </script></body></html>
