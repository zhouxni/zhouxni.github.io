    <article id="article" class="markdown-body"></article>
  

<script>
        document.getElementById('article').innerHTML = 
        "<div><p>JavaScriptCore 是苹果公司提供的 JavaScript 引擎框架，它是 WebKit 的核心组件之一，也被 React Native 等跨平台框架用于在原生应用中执行 JavaScript 代码。</p>\n<h2>一、核心架构</h2>\n<p>JavaScriptCore 由三个主要层组成：</p>\n<ol>\n<li><strong>JavaScript VM</strong>   - 底层虚拟机，负责执行字节码</li>\n<li><strong>JavaScript Runtime</strong>   - 运行时环境，提供基础对象和类型</li>\n<li><strong>JavaScript API</strong>   - 开发者接口层</li>\n</ol>\n<h2>二、核心组件</h2>\n<h3>1. JSVirtualMachine</h3>\n<ul>\n<li>表示独立的 JavaScript 执行环境</li>\n<li>每个 VM 有自己的堆和垃圾回收器</li>\n<li>可创建多个 VM 实现隔离执行</li>\n</ul>\n<h3>2. JSContext</h3>\n<ul>\n<li>JavaScript 执行上下文</li>\n<li>相当于浏览器的 window 对象</li>\n<li>桥接 JavaScript 和原生代码的主要接口</li>\n</ul>\n<h3>3. JSValue</h3>\n<ul>\n<li>JavaScript 值的原生表示</li>\n<li>支持所有 JavaScript 类型到原生类型的转换</li>\n<li>提供类型检查和转换方法</li>\n</ul>\n<h2>三、基本使用</h2>\n<h3>1. 创建执行环境</h3>\n<pre><code class=\"language-objc\"><span class=\"hljs-comment\">// 创建虚拟机</span>\nJSVirtualMachine *vm = [[JSVirtualMachine alloc] init];\n\n<span class=\"hljs-comment\">// 创建上下文</span>\nJSContext *context = [[JSContext alloc] initWithVirtualMachine:vm];\n</code></pre>\n<h3>2. 执行 JavaScript 代码</h3>\n<pre><code class=\"language-objc\"><span class=\"hljs-comment\">// 执行简单表达式</span>\nJSValue *result = [context evaluateScript:<span class=\"hljs-string\">@&quot;1 + 2 * 3&quot;</span>];\n<span class=\"hljs-built_in\">NSLog</span>(<span class=\"hljs-string\">@&quot;Result: %@&quot;</span>, [result toNumber]); <span class=\"hljs-comment\">// 输出 7</span>\n\n<span class=\"hljs-comment\">// 执行函数</span>\n[context evaluateScript:<span class=\"hljs-string\">@&quot;function square(x) { return x * x; }&quot;</span>];\nJSValue *squareFunction = context[<span class=\"hljs-string\">@&quot;square&quot;</span>];\nJSValue *squareResult = [squareFunction callWithArguments:@[@<span class=\"hljs-number\">5</span>]];\n<span class=\"hljs-built_in\">NSLog</span>(<span class=\"hljs-string\">@&quot;5 squared is %@&quot;</span>, [squareResult toNumber]); <span class=\"hljs-comment\">// 输出 25</span>\n</code></pre>\n<h2>四、与原生代码交互</h2>\n<h3>1. 原生调用 JavaScript</h3>\n<pre><code class=\"language-objc\"><span class=\"hljs-comment\">// 获取全局变量</span>\nJSValue *globalValue = context[<span class=\"hljs-string\">@&quot;globalVariable&quot;</span>];\n\n<span class=\"hljs-comment\">// 调用 JavaScript 函数</span>\nJSValue *jsFunction = context[<span class=\"hljs-string\">@&quot;jsFunction&quot;</span>];\nJSValue *result = [jsFunction callWithArguments:@[@<span class=\"hljs-number\">42</span>]];\n</code></pre>\n<h3>2. JavaScript 调用原生</h3>\n<pre><code class=\"language-objc\"><span class=\"hljs-comment\">// 暴露原生 block 给 JavaScript</span>\ncontext[<span class=\"hljs-string\">@&quot;nativeLog&quot;</span>] = ^(<span class=\"hljs-built_in\">NSString</span> *message) {\n    <span class=\"hljs-built_in\">NSLog</span>(<span class=\"hljs-string\">@&quot;From JavaScript: %@&quot;</span>, message);\n};\n\n<span class=\"hljs-comment\">// 在 JavaScript 中调用</span>\n[context evaluateScript:<span class=\"hljs-string\">@&quot;nativeLog(&#x27;Hello from JS!&#x27;)&quot;</span>];\n</code></pre>\n<h3>3. 异常处理</h3>\n<pre><code class=\"language-objc\"><span class=\"hljs-comment\">// 设置异常处理器</span>\ncontext.exceptionHandler = ^(JSContext *ctx, JSValue *exception) {\n    <span class=\"hljs-built_in\">NSLog</span>(<span class=\"hljs-string\">@&quot;JS Error: %@&quot;</span>, exception);\n};\n\n<span class=\"hljs-comment\">// 执行有错误的代码</span>\n[context evaluateScript:<span class=\"hljs-string\">@&quot;invalid.code()&quot;</span>];\n</code></pre>\n<h2>五、在 React Native 中的应用</h2>\n<p>React Native 使用 JavaScriptCore 作为默认的 JavaScript 引擎（iOS上）：</p>\n<ol>\n<li><strong>执行环境初始化</strong>\n<ul>\n<li>应用启动时创建 JSContext</li>\n<li>加载 React Native 框架代码</li>\n</ul>\n</li>\n<li><strong>桥接机制</strong>\n<ul>\n<li>原生模块通过 JSContext 暴露给 JavaScript</li>\n<li>JavaScript 调用通过 JSC 转换为原生调用</li>\n</ul>\n</li>\n<li><strong>性能优化</strong>\n<ul>\n<li>使用 JIT 编译提升执行速度</li>\n<li>优化内存管理</li>\n</ul>\n</li>\n</ol>\n<h2>六、高级特性</h2>\n<h3>1. 内存管理</h3>\n<pre><code class=\"language-objc\"><span class=\"hljs-comment\">// 解决循环引用问题</span>\nJSManagedValue *managedValue = [JSManagedValue managedValueWithValue:jsValue];\n[vm addManagedReference:managedValue withOwner:<span class=\"hljs-keyword\">self</span>];\n</code></pre>\n<h3>2. 多线程执行</h3>\n<pre><code class=\"language-objc\"><span class=\"hljs-built_in\">dispatch_async</span>(dispatch_get_global_queue(<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">0</span>), ^{\n    JSVirtualMachine *vm = [[JSVirtualMachine alloc] init];\n    JSContext *ctx = [[JSContext alloc] initWithVirtualMachine:vm];\n    <span class=\"hljs-comment\">// 线程安全执行</span>\n});\n</code></pre>\n<h3>3. 调试支持</h3>\n<pre><code class=\"language-objc\"><span class=\"hljs-comment\">// 启用调试</span>\ncontext[<span class=\"hljs-string\">@&quot;_consoleLog&quot;</span>] = ^(JSValue *msg) {\n    <span class=\"hljs-built_in\">NSLog</span>(<span class=\"hljs-string\">@&quot;Console: %@&quot;</span>, msg);\n};\n</code></pre>\n<h2>七、性能优化技巧</h2>\n<ol>\n<li><strong>避免频繁跨界调用</strong>   - 批量处理数据</li>\n<li><strong>使用 JSExport 协议</strong>   - 更高效的对象桥接</li>\n<li><strong>预编译脚本</strong>   - 对重复执行的代码进行预编译</li>\n<li><strong>合理管理内存</strong>   - 及时释放不需要的 JSValue</li>\n</ol>\n<h2>八、常见问题解决方案</h2>\n<ol>\n<li><strong>内存泄漏</strong>  ：\n<ul>\n<li>检查 JavaScript 和原生间的循环引用</li>\n<li>使用 JSManagedValue 进行弱引用管理</li>\n</ul>\n</li>\n<li><strong>性能瓶颈</strong>  ：\n<ul>\n<li>减少跨界调用次数</li>\n<li>使用 JIT 优化热点代码</li>\n</ul>\n</li>\n<li><strong>线程冲突</strong>  ：\n<ul>\n<li>确保每个线程使用独立的 JSVirtualMachine</li>\n<li>避免多线程访问同一 JSContext</li>\n</ul>\n</li>\n</ol>\n<p>JavaScriptCore 为 iOS 平台提供了强大的 JavaScript 执行能力，是 React Native 等框架的核心基础，合理使用可以构建高性能的混合应用。</p>\n</div>";
      </script></body></html>
