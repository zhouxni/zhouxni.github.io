<script>
      document.title = 'React Native жң¬ең°ејҖеҸ‘и°ғиҜ•'
        document.getElementById('article').innerHTML = 
        "<div><p>еңЁ React Native жң¬ең°ејҖеҸ‘дёӯпјҢи°ғиҜ•жҳҜдҝқиҜҒеә”з”ЁиҙЁйҮҸзҡ„е…ій”®зҺҜиҠӮгҖӮд»ҘдёӢжҳҜе…Ёйқўзҡ„и°ғиҜ•жҢҮеҚ—пјҢж¶өзӣ–еёёз”Ёе·Ҙе…·гҖҒжҠҖе·§е’Ңй—®йўҳи§ЈеҶіж–№жЎҲпјҡ</p>\n<hr>\n<h3><strong>дёҖгҖҒеҹәзЎҖи°ғиҜ•е·Ҙе…·</strong></h3>\n<h4>1. <strong>Console ж—Ҙеҝ—иҫ“еҮә</strong></h4>\n<ul>\n<li><strong>жҹҘзңӢдҪҚзҪ®</strong>  пјҡ\n<ul>\n<li>Metro з»Ҳз«ҜпјҲ<code>npm start</code> еҗҜеҠЁзҡ„зӘ—еҸЈпјү</li>\n<li>Chrome ејҖеҸ‘иҖ…е·Ҙе…·пјҲйңҖејҖеҗҜ Debug жЁЎејҸпјү</li>\n<li>React Native Debugger жҲ– Flipper</li>\n</ul>\n</li>\n<li><strong>еўһејәж—Ҙеҝ—</strong>  пјҡ</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;жҷ®йҖҡж—Ҙеҝ—&#x27;</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">warn</span>(<span class=\"hljs-string\">&#x27;иӯҰе‘Ҡ&#x27;</span>);  <span class=\"hljs-comment\">// й»„иүІжҸҗзӨә</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;й”ҷиҜҜ&#x27;</span>); <span class=\"hljs-comment\">// зәўиүІжҸҗзӨәпјҢеҸҜжҚ•иҺ·е Ҷж Ҳ</span>\n</code></pre>\n<h4>2. <strong>Chrome ејҖеҸ‘иҖ…е·Ҙе…·</strong></h4>\n<ul>\n<li><strong>ејҖеҗҜжӯҘйӘӨ</strong>  пјҡ</li>\n</ul>\n<ol>\n<li>ж‘ҮеҠЁи®ҫеӨҮ/жҢү <code>Ctrl+M</code>пјҲAndroidпјүжҲ– <code>Cmd+D</code>пјҲiOSпјү вҶ’ йҖүжӢ© <strong>&quot;Debug&quot;</strong>  гҖӮ</li>\n<li>жөҸи§ҲеҷЁи®ҝй—® <code>http://localhost:8081/debugger-ui</code>гҖӮ</li>\n</ol>\n<ul>\n<li><strong>еҠҹиғҪ</strong>  пјҡ\n<ul>\n<li><strong>Console</strong>  пјҡжҹҘзңӢж—Ҙеҝ—гҖҒжү§иЎҢ JS д»Јз ҒгҖӮ</li>\n<li><strong>Sources</strong>  пјҡи°ғиҜ•жәҗз ҒпјҲж”ҜжҢҒж–ӯзӮ№пјүгҖӮ</li>\n<li><strong>Network</strong>  пјҡзӣ‘жҺ§ API иҜ·жұӮпјҲйңҖйўқеӨ–й…ҚзҪ®пјүгҖӮ</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// е…ҘеҸЈж–Үд»¶index.js</span>\n<span class=\"hljs-keyword\">if</span> (__DEV__) {\n  <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">XMLHttpRequest</span> = <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">originalXMLHttpRequest</span> || <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">XMLHttpRequest</span>;\n  <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">FormData</span> = <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">originalFormData</span> || <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">FormData</span>;\n  \n  <span class=\"hljs-comment\">// еҜ№дәҺRN 0.71+пјҢе»әи®®д№ҹеҠ дёҠfetchзҡ„polyfill</span>\n  <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">fetch</span>) {\n    <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">originalFetch</span> = <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">fetch</span>;\n  }\n}\n</code></pre>\n</li>\n</ul>\n<h4>3. <strong>React Native Debugger</strong></h4>\n<ul>\n<li><strong>е®үиЈ…</strong>  пјҡ</li>\n</ul>\n<pre><code class=\"language-sh\">brew install --cask react-native-debugger  <span class=\"hljs-comment\"># Mac</span>\n</code></pre>\n<ul>\n<li><strong>еҠҹиғҪ</strong>  пјҡ\n<ul>\n<li>йӣҶжҲҗ Redux зҠ¶жҖҒз®ЎзҗҶи°ғиҜ•гҖӮ</li>\n<li>ж”ҜжҢҒ React з»„д»¶ж ‘жЈҖжҹҘгҖӮ</li>\n<li>зҪ‘з»ңиҜ·жұӮзӣ‘жҺ§пјҲйңҖй…ҚзҪ® <code>XMLHttpRequest</code> д»ЈзҗҶпјүгҖӮ</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>дәҢгҖҒй«ҳзә§и°ғиҜ•жҠҖе·§</strong></h3>\n<h4>1. <strong>иҝңзЁӢи°ғиҜ• JS</strong></h4>\n<ul>\n<li><strong>iOS зңҹжңә</strong>  пјҡ</li>\n</ul>\n<ol>\n<li>йҖҡиҝҮ Xcode йғЁзҪІеә”з”ЁгҖӮ</li>\n<li>еңЁ Safari дёӯеҗҜз”Ё <strong>Develop вҶ’ [и®ҫеӨҮеҗҚ]</strong>   и°ғиҜ•гҖӮ</li>\n</ol>\n<ul>\n<li><strong>Android зңҹжңә</strong>  пјҡ</li>\n</ul>\n<pre><code class=\"language-sh\">adb reverse tcp:8081 tcp:8081  <span class=\"hljs-comment\"># з«ҜеҸЈиҪ¬еҸ‘</span>\n</code></pre>\n<h4>2. <strong>жҖ§иғҪеҲҶжһҗ</strong></h4>\n<ul>\n<li><strong>React Profiler</strong>  пјҡ\n<ul>\n<li>еңЁ React Native Debugger дёӯеҗҜз”Ё <strong>Profiler</strong>   ж ҮзӯҫйЎөгҖӮ</li>\n<li>жЈҖжөӢз»„д»¶жёІжҹ“жҖ§иғҪгҖӮ</li>\n</ul>\n</li>\n<li><strong>еҺҹз”ҹжҖ§иғҪе·Ҙе…·</strong>  пјҡ\n<ul>\n<li>AndroidпјҡAndroid Studio зҡ„ <strong>CPU Profiler</strong>  гҖӮ</li>\n<li>iOSпјҡXcode зҡ„ <strong>Instruments</strong>  гҖӮ</li>\n</ul>\n</li>\n</ul>\n<h4>3. <strong>зҪ‘з»ңиҜ·жұӮи°ғиҜ•</strong></h4>\n<ul>\n<li>дҪҝз”Ё <code>Flipper</code> жҲ–й…ҚзҪ®е…ЁеұҖжӢҰжҲӘпјҡ</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">XMLHttpRequest</span> = <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">originalXMLHttpRequest</span> || <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-property\">XMLHttpRequest</span>;\n</code></pre>\n<hr>\n<h3><strong>дёүгҖҒеёёи§Ғй—®йўҳи§ЈеҶі</strong></h3>\n<h4>1. <strong>Hot Reload еӨұж•Ҳ</strong></h4>\n<ul>\n<li><strong>и§ЈеҶіж–№жЎҲ</strong>  пјҡ\n<ul>\n<li>жЈҖжҹҘ Metro з»Ҳз«ҜжҳҜеҗҰжңүиҜӯжі•й”ҷиҜҜгҖӮ</li>\n<li>йҮҚеҗҜ Metro е№¶жё…зҗҶзј“еӯҳпјҡ<pre><code class=\"language-bash\">npm start -- --reset-cache\n</code></pre>\n</li>\n</ul>\n</li>\n</ul>\n<h4>2. <strong>зңҹжңәж— жі•иҝһжҺҘи°ғиҜ•</strong></h4>\n<ul>\n<li><strong>жЈҖжҹҘйЎ№</strong>  пјҡ\n<ul>\n<li>зЎ®дҝқз”өи„‘е’ҢжүӢжңәеңЁеҗҢдёҖ Wi-FiгҖӮ</li>\n<li>Android йңҖе…ій—ӯйҳІзҒ«еўҷжҲ–е…Ғи®ёз«ҜеҸЈ <code>8081</code>гҖӮ</li>\n<li>iOS йңҖдҝЎд»»ејҖеҸ‘иҖ…иҜҒд№ҰпјҲи®ҫзҪ® вҶ’ йҖҡз”Ё вҶ’ и®ҫеӨҮз®ЎзҗҶпјүгҖӮ</li>\n</ul>\n</li>\n</ul>\n<h4>3. <strong>еҺҹз”ҹжЁЎеқ—и°ғиҜ•</strong></h4>\n<ul>\n<li><strong>Android Logcat</strong>  пјҡ</li>\n</ul>\n<pre><code class=\"language-sh\">adb logcat | grep <span class=\"hljs-string\">&quot;ReactNative&quot;</span>\n</code></pre>\n<ul>\n<li><strong>iOS Console</strong>  пјҡ\n<ul>\n<li>йҖҡиҝҮ Xcode зҡ„ <strong>Debug Console</strong>   жҹҘзңӢгҖӮ</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>еӣӣгҖҒжҺЁиҚҗе·Ҙе…·й“ҫ</strong></h3>\n<table>\n<thead>\n<tr>\n<th>е·Ҙе…·</th>\n<th>з”ЁйҖ”</th>\n<th>е®үиЈ…ж–№ејҸ</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Flipper</strong></td>\n<td>йӣҶжҲҗж—Ҙеҝ—гҖҒзҪ‘з»ңгҖҒж•°жҚ®еә“и°ғиҜ•</td>\n<td><code>brew install --cask flipper</code></td>\n</tr>\n<tr>\n<td><strong>Wireshark</strong></td>\n<td>ж·ұеәҰзҪ‘з»ңжҠ“еҢ…пјҲSSL и§ЈеҜҶйңҖй…ҚзҪ®пјү</td>\n<td>е®ҳзҪ‘дёӢиҪҪ</td>\n</tr>\n<tr>\n<td><strong>Reactotron</strong></td>\n<td>жң¬ең°зҠ¶жҖҒз®ЎзҗҶзӣ‘жҺ§</td>\n<td><code>npm install reactotron-react-native</code></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>дә”гҖҒи°ғиҜ•жөҒзЁӢзӨәдҫӢ</strong></h3>\n<ol>\n<li><strong>еӨҚзҺ°й—®йўҳ</strong>  пјҡжҳҺзЎ®и§ҰеҸ‘жқЎд»¶пјҲеҰӮзү№е®ҡж“ҚдҪңгҖҒж•°жҚ®пјүгҖӮ</li>\n<li><strong>йҡ”зҰ»й—®йўҳ</strong>  пјҡ</li>\n</ol>\n<ul>\n<li>йҖҡиҝҮ <code>console.log</code> е®ҡдҪҚд»Јз ҒиҢғеӣҙгҖӮ</li>\n<li>дҪҝз”Ёж–ӯзӮ№пјҲChrome жҲ– RN DebuggerпјүйҖҗжӯҘжү§иЎҢгҖӮ</li>\n</ul>\n<ol start=\"3\">\n<li><strong>дҝ®еӨҚйӘҢиҜҒ</strong>  пјҡ</li>\n</ol>\n<ul>\n<li>дҝ®ж”№еҗҺжөӢиҜ• Hot Reload жҳҜеҗҰз”ҹж•ҲгҖӮ</li>\n<li>зңҹжңәеӨҚжөӢпјҲжЁЎжӢҹеҷЁеҸҜиғҪж— жі•еӨҚзҺ°жүҖжңүй—®йўҳпјүгҖӮ</li>\n</ul>\n<hr>\n<h3><strong>е…ӯгҖҒжіЁж„ҸдәӢйЎ№</strong></h3>\n<ul>\n<li><strong>з”ҹдә§зҺҜеўғзҰҒз”Ёи°ғиҜ•</strong>  пјҡ</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">if</span> (__DEV__) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;д»…ејҖеҸ‘зҺҜеўғжҳҫзӨә&#x27;</span>);\n}\n</code></pre>\n<ul>\n<li><strong>жҖ§иғҪжқғиЎЎ</strong>  пјҡиҝңзЁӢи°ғиҜ•дјҡеўһеҠ е»¶иҝҹпјҢеӨҚжқӮеҠЁз”»е»әи®®зңҹжңәжөӢиҜ•гҖӮ</li>\n</ul>\n<p>йҖҡиҝҮз»“еҗҲе·Ҙе…·й“ҫе’Ңзі»з»ҹеҢ–и°ғиҜ•жөҒзЁӢпјҢеҸҜд»Ҙй«ҳж•Ҳе®ҡдҪҚе’Ңи§ЈеҶі React Native ејҖеҸ‘дёӯзҡ„еҗ„зұ»й—®йўҳгҖӮ</p>\n</div>";
      </script></body></html>
