<script>
      document.title = 'window.NativeBridge 详解'
        document.getElementById('article').innerHTML = 
        "<div><p><code>window.NativeBridge</code> 是混合开发中 <strong>H5 调用原生功能</strong>   的常见实现方式，主要用于 Android 平台的 WebView 与原生代码通信。</p>\n<h2><strong>1. 基本原理</strong></h2>\n<p>Android 通过 <code>addJavascriptInterface</code> 将 Java/Kotlin 对象注入到 WebView 的 JavaScript 上下文中，使 H5 可以直接调用原生方法。</p>\n<h2><strong>2. Android 原生端实现</strong></h2>\n<pre><code class=\"language-java\"><span class=\"hljs-comment\">// Kotlin 示例</span>\nwebView.settings.javaScriptEnabled = <span class=\"hljs-literal\">true</span>\n\n<span class=\"hljs-comment\">// 创建 Bridge 对象</span>\n<span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">NativeBridge</span> {\n    <span class=\"hljs-meta\">@JavascriptInterface</span>\n    fun <span class=\"hljs-title function_\">showToast</span><span class=\"hljs-params\">(message: String)</span> {\n        Toast.makeText(context, message, Toast.LENGTH_SHORT).show()\n    }\n    \n    <span class=\"hljs-meta\">@JavascriptInterface</span>\n    fun <span class=\"hljs-title function_\">getDeviceInfo</span><span class=\"hljs-params\">()</span>: String {\n        <span class=\"hljs-keyword\">return</span> JSONObject()\n            .put(<span class=\"hljs-string\">&quot;os&quot;</span>, <span class=\"hljs-string\">&quot;Android&quot;</span>)\n            .put(<span class=\"hljs-string\">&quot;version&quot;</span>, Build.VERSION.RELEASE)\n            .toString()\n    }\n}\n\n<span class=\"hljs-comment\">// 注入到 WebView</span>\nwebView.addJavascriptInterface(NativeBridge(), <span class=\"hljs-string\">&quot;NativeBridge&quot;</span>)\n</code></pre>\n<h2><strong>3. H5 端调用方式</strong></h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 调用原生 Toast</span>\n<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">NativeBridge</span>.<span class=\"hljs-title function_\">showToast</span>(<span class=\"hljs-string\">&#x27;Hello from H5!&#x27;</span>);\n\n<span class=\"hljs-comment\">// 调用并获取返回值（同步）</span>\n<span class=\"hljs-keyword\">const</span> deviceInfo = <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">parse</span>(<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">NativeBridge</span>.<span class=\"hljs-title function_\">getDeviceInfo</span>());\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(deviceInfo.<span class=\"hljs-property\">os</span>); <span class=\"hljs-comment\">// &quot;Android&quot;</span>\n</code></pre>\n<h2><strong>4. 关键注意事项</strong></h2>\n<h3><strong>安全性</strong></h3>\n<ol>\n<li><strong>仅限 Android</strong>  ：iOS 需要使用 <code>WKScriptMessageHandler</code></li>\n<li><strong>API 暴露</strong>  ：只注入必要方法，避免敏感操作</li>\n<li><strong>版本限制</strong>  ：\n<ul>\n<li>Android 4.2+：必须添加 <code>@JavascriptInterface</code> 注解</li>\n<li>Android 4.2 以下：存在安全漏洞（可通过反射调用任意方法）</li>\n</ul>\n</li>\n</ol>\n<h3><strong>数据类型</strong></h3>\n<ul>\n<li>支持基本类型（String/Number/Boolean）和 JSON 字符串</li>\n<li>复杂对象需要序列化</li>\n</ul>\n<h2><strong>5. 完整通信方案（Android+iOS）</strong></h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 统一调用入口</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">callNative</span>(<span class=\"hljs-params\">method, params</span>) {\n    <span class=\"hljs-comment\">// Android</span>\n    <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">NativeBridge</span> &amp;&amp; <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">NativeBridge</span>[method]) {\n        <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">NativeBridge</span>[method](<span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(params));\n    } \n    <span class=\"hljs-comment\">// iOS</span>\n    <span class=\"hljs-keyword\">else</span> <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">webkit</span>?.<span class=\"hljs-property\">messageHandlers</span>?.<span class=\"hljs-property\">nativeBridge</span>) {\n        <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Promise</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">resolve</span>) =&gt;</span> {\n            <span class=\"hljs-keyword\">const</span> callbackId = <span class=\"hljs-string\">&#x27;cb_&#x27;</span> + <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>();\n            <span class=\"hljs-variable language_\">window</span>[callbackId] = resolve;\n            <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">webkit</span>.<span class=\"hljs-property\">messageHandlers</span>.<span class=\"hljs-property\">nativeBridge</span>.<span class=\"hljs-title function_\">postMessage</span>({\n                method,\n                params,\n                callbackId\n            });\n        });\n    }\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">&#x27;NativeBridge not available&#x27;</span>);\n}\n\n<span class=\"hljs-comment\">// 使用示例</span>\n<span class=\"hljs-title function_\">callNative</span>(<span class=\"hljs-string\">&#x27;scanQRCode&#x27;</span>, { <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">&#x27;qr&#x27;</span> })\n    .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">result</span> =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Scan result:&#x27;</span>, result));\n</code></pre>\n<h2><strong>6. 替代方案对比</strong></h2>\n<table>\n<thead>\n<tr>\n<th>方案</th>\n<th>平台</th>\n<th>同步支持</th>\n<th>安全性</th>\n<th>维护成本</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>window.NativeBridge</code></td>\n<td>Android</td>\n<td>✅</td>\n<td>中</td>\n<td>低</td>\n</tr>\n<tr>\n<td><code>WKScriptMessageHandler</code></td>\n<td>iOS</td>\n<td>❌</td>\n<td>高</td>\n<td>中</td>\n</tr>\n<tr>\n<td><code>JSBridge</code> 封装</td>\n<td>跨平台</td>\n<td>✅</td>\n<td>高</td>\n<td>高</td>\n</tr>\n</tbody>\n</table>\n<h2><strong>最佳实践建议</strong></h2>\n<ol>\n<li><strong>Android 4.2+</strong>   必须使用 <code>@JavascriptInterface</code></li>\n<li><strong>参数校验</strong>  ：原生端验证传入数据</li>\n<li><strong>错误处理</strong>  ：H5 捕获可能的调用异常</li>\n<li><strong>iOS 兼容</strong>  ：配合 <code>postMessage</code> 实现跨平台方案</li>\n</ol>\n<p><code>window.NativeBridge</code> 在 Android 混合开发中仍然是最高效的直接通信方案，但需要严格遵循安全规范。</p>\n</div>";
      </script></body></html>
