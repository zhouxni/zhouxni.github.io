<script>
      document.title = 'React Native WebView 的 injectedJavaScript 详解'
        document.getElementById('article').innerHTML = 
        "<div><p><code>injectedJavaScript</code> 是 React Native WebView 提供的一个强大属性，允许你在网页加载完成后注入并执行 JavaScript 代码。下面是对这个属性的全面解析：</p>\n<h2>基本用法</h2>\n<h3>1. 注入简单脚本</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://example.com&#x27;</span> }}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    alert(&#x27;页面已加载完成！&#x27;);\n    true; // 必须返回true以避免警告\n  `</span>}\n/&gt;\n</code></pre>\n<h3>2. 注入函数并调用</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://example.com&#x27;</span> }}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    function showMessage() {\n      document.body.style.backgroundColor = &#x27;yellow&#x27;;\n    }\n    showMessage();\n    true;\n  `</span>}\n/&gt;\n</code></pre>\n<h2>核心功能</h2>\n<h3>1. 与 React Native 通信</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://example.com&#x27;</span> }}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    window.ReactNativeWebView.postMessage(&#x27;来自网页的消息&#x27;);\n    true;\n  `</span>}\n  onMessage={<span class=\"hljs-function\">(<span class=\"hljs-params\">event</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;收到消息:&#x27;</span>, event.<span class=\"hljs-property\">nativeEvent</span>.<span class=\"hljs-property\">data</span>);\n  }}\n/&gt;\n</code></pre>\n<h3>2. 修改 DOM 内容</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://example.com&#x27;</span> }}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    document.querySelector(&#x27;h1&#x27;).innerText = &#x27;标题已被修改&#x27;;\n    document.querySelector(&#x27;h1&#x27;).style.color = &#x27;red&#x27;;\n    true;\n  `</span>}\n/&gt;\n</code></pre>\n<h3>3. 监听网页事件</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://example.com&#x27;</span> }}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    document.addEventListener(&#x27;click&#x27;, function(e) {\n      window.ReactNativeWebView.postMessage(&#x27;点击了: &#x27; + e.target.tagName);\n    });\n    true;\n  `</span>}\n/&gt;\n</code></pre>\n<h2>高级用法</h2>\n<h3>1. 注入外部脚本</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://example.com&#x27;</span> }}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    const script = document.createElement(&#x27;script&#x27;);\n    script.src = &#x27;https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js&#x27;;\n    document.head.appendChild(script);\n    \n    script.onload = function() {\n      window.ReactNativeWebView.postMessage(&#x27;Lodash已加载&#x27;);\n    };\n    true;\n  `</span>}\n/&gt;\n</code></pre>\n<h3>2. 异步操作处理</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://example.com&#x27;</span> }}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    async function fetchData() {\n      const response = await fetch(&#x27;/api/data&#x27;);\n      const data = await response.json();\n      window.ReactNativeWebView.postMessage(JSON.stringify(data));\n    }\n    fetchData();\n    true;\n  `</span>}\n/&gt;\n</code></pre>\n<h3>3. 结合 injectedJavaScriptBeforeContentLoaded</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://example.com&#x27;</span> }}\n  injectedJavaScriptBeforeContentLoaded={<span class=\"hljs-string\">`\n    window.myAppConfig = { debug: true };\n    true;\n  `</span>}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    console.log(&#x27;配置:&#x27;, window.myAppConfig);\n    true;\n  `</span>}\n/&gt;\n</code></pre>\n<h2>返回值要求</h2>\n<ul>\n<li><strong>必须返回字符串 <code>&quot;true&quot;</code></strong>   来避免警告</li>\n<li>可以返回其他值用于获取执行结果（通过 <code>injectJavaScript</code> 方法）</li>\n</ul>\n<pre><code class=\"language-jsx\"><span class=\"hljs-keyword\">const</span> webViewRef = <span class=\"hljs-title function_\">useRef</span>();\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">getResult</span> = (<span class=\"hljs-params\"></span>) =&gt; {\n  webViewRef.<span class=\"hljs-property\">current</span>.<span class=\"hljs-title function_\">injectJavaScript</span>(<span class=\"hljs-string\">`\n    const result = 2 + 2;\n    window.ReactNativeWebView.postMessage(result.toString());\n    true;\n  `</span>);\n};\n\n<span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">WebView</span>\n  <span class=\"hljs-attr\">ref</span>=<span class=\"hljs-string\">{webViewRef}</span>\n  <span class=\"hljs-attr\">source</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">uri:</span> &#x27;<span class=\"hljs-attr\">https:</span>//<span class=\"hljs-attr\">example.com</span>&#x27; }}\n  <span class=\"hljs-attr\">onMessage</span>=<span class=\"hljs-string\">{(e)</span> =&gt;</span> console.log(&#x27;结果:&#x27;, e.nativeEvent.data)}\n/&gt;</span>\n</code></pre>\n<h2>实际应用场景</h2>\n<h3>1. 自动填充表单</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://login.example.com&#x27;</span> }}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    document.getElementById(&#x27;username&#x27;).value = &#x27;myuser&#x27;;\n    document.getElementById(&#x27;password&#x27;).value = &#x27;mypass&#x27;;\n    true;\n  `</span>}\n/&gt;\n</code></pre>\n<h3>2. 移除页面元素</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://example.com&#x27;</span> }}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    const ads = document.querySelectorAll(&#x27;.ad&#x27;);\n    ads.forEach(ad =&gt; ad.remove());\n    true;\n  `</span>}\n/&gt;\n</code></pre>\n<h3>3. 跟踪用户行为</h3>\n<pre><code class=\"language-jsx\">&lt;<span class=\"hljs-title class_\">WebView</span>\n  source={{ <span class=\"hljs-attr\">uri</span>: <span class=\"hljs-string\">&#x27;https://example.com&#x27;</span> }}\n  injectedJavaScript={<span class=\"hljs-string\">`\n    let clicks = 0;\n    document.addEventListener(&#x27;click&#x27;, () =&gt; {\n      clicks++;\n      window.ReactNativeWebView.postMessage(&#x27;点击次数: &#x27; + clicks);\n    });\n    true;\n  `</span>}\n/&gt;\n</code></pre>\n<h2>注意事项</h2>\n<ol>\n<li><strong>执行时机</strong>  ：<code>injectedJavaScript</code> 在网页加载完成后执行</li>\n<li><strong>作用域</strong>  ：代码在网页的全局作用域中执行</li>\n<li><strong>性能影响</strong>  ：复杂的脚本可能影响页面性能</li>\n<li><strong>安全性</strong>  ：避免注入不受信任的代码</li>\n<li><strong>调试</strong>  ：使用 <code>webviewDebuggingEnabled={true}</code> 调试注入的脚本</li>\n</ol>\n<h2>替代方案比较</h2>\n<table>\n<thead>\n<tr>\n<th>方法</th>\n<th>执行时机</th>\n<th>能否访问DOM</th>\n<th>适用场景</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>injectedJavaScript</code></td>\n<td>页面加载后</td>\n<td>是</td>\n<td>修改已加载页面</td>\n</tr>\n<tr>\n<td><code>injectedJavaScriptBeforeContentLoaded</code></td>\n<td>页面加载前</td>\n<td>否</td>\n<td>初始化配置</td>\n</tr>\n<tr>\n<td><code>injectJavaScript</code> (通过ref)</td>\n<td>任意时间</td>\n<td>是</td>\n<td>动态交互</td>\n</tr>\n</tbody>\n</table>\n<p>通过合理使用 <code>injectedJavaScript</code>，你可以实现强大的网页定制和与React Native的深度集成。</p>\n</div>";
      </script></body></html>
