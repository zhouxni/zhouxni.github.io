<script>
            document.getElementById('article').innerHTML = 
            "<div><h2>一、全量更新的基本概念</h2>\n<p>全量更新是指客户端下载完整的应用包文件（而非差异包），通常在以下场景使用：</p>\n<ul>\n<li>大版本更新（如从1.x升级到2.0）</li>\n<li>增量更新不可用或失败时</li>\n<li>应用结构发生重大变化</li>\n<li>首次安装后的更新</li>\n</ul>\n<h2>二、发布全量更新的方法</h2>\n<h3>方法1：发布新基准版本</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># 发布明确版本号的全量包</span>\ncode-push release-react &lt;appName&gt; &lt;platform&gt; --targetBinaryVersion &lt;精确版本号&gt;\n\n<span class=\"hljs-comment\"># 示例：为1.2.0版本发布全量更新</span>\ncode-push release-react MyApp ios --targetBinaryVersion 1.2.0\n</code></pre>\n<h3>方法2：禁用增量更新</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># 使用--disableDuplicateReleaseError强制全量发布</span>\ncode-push release-react &lt;appName&gt; &lt;platform&gt; --disableDuplicateReleaseError\n\n<span class=\"hljs-comment\"># 示例</span>\ncode-push release-react MyApp android --disableDuplicateReleaseError\n</code></pre>\n<h3>方法3：清除历史版本</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># 先清除旧的增量基准</span>\ncode-push deployment <span class=\"hljs-built_in\">history</span> &lt;appName&gt; &lt;deploymentName&gt; clear\n\n<span class=\"hljs-comment\"># 再发布新包（会自动成为全量包）</span>\ncode-push release-react MyApp ios\n</code></pre>\n<h2>三、全量更新的最佳实践</h2>\n<h3>1. 版本控制策略</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># 主版本升级时发布全量包</span>\ncode-push release-react MyApp ios --targetBinaryVersion 2.0.0\n\n<span class=\"hljs-comment\"># 后续小版本使用增量更新</span>\ncode-push release-react MyApp ios --targetBinaryVersion <span class=\"hljs-string\">&quot;~2.0.0&quot;</span>\n</code></pre>\n<h3>2. 多部署环境配置</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># 测试环境使用全量更新</span>\ncode-push release-react MyApp ios -d Staging --disableDuplicateReleaseError\n\n<span class=\"hljs-comment\"># 生产环境使用增量更新</span>\ncode-push release-react MyApp ios -d Production --targetBinaryVersion <span class=\"hljs-string\">&quot;~2.0.0&quot;</span>\n</code></pre>\n<h3>3. 强制更新配置</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 在客户端代码中配置强制更新</span>\n<span class=\"hljs-title class_\">CodePush</span>.<span class=\"hljs-title function_\">sync</span>({\n  <span class=\"hljs-attr\">installMode</span>: <span class=\"hljs-title class_\">CodePush</span>.<span class=\"hljs-property\">InstallMode</span>.<span class=\"hljs-property\">IMMEDIATE</span>,\n  <span class=\"hljs-attr\">mandatoryInstallMode</span>: <span class=\"hljs-title class_\">CodePush</span>.<span class=\"hljs-property\">InstallMode</span>.<span class=\"hljs-property\">IMMEDIATE</span>,\n  <span class=\"hljs-attr\">updateDialog</span>: {\n    <span class=\"hljs-attr\">appendReleaseDescription</span>: <span class=\"hljs-literal\">true</span>,\n    <span class=\"hljs-attr\">mandatoryUpdateMessage</span>: <span class=\"hljs-string\">&quot;本次更新包含重要改进，请立即安装&quot;</span>,\n    <span class=\"hljs-attr\">mandatoryContinueButtonLabel</span>: <span class=\"hljs-string\">&quot;立即重启&quot;</span>\n  }\n});\n</code></pre>\n<h2>四、验证全量更新发布</h2>\n<h3>1. 检查发布类型</h3>\n<pre><code class=\"language-sh\">code-push deployment <span class=\"hljs-built_in\">history</span> MyApp Production\n\n<span class=\"hljs-comment\"># 输出示例</span>\nLabel: v10\nRelease Time: 2023-03-01\nApp Version: 1.2.0\nRelease Type: Update (全量包会显示为Full)\n</code></pre>\n<h3>2. 客户端调试命令</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># iOS查看当前包信息</span>\ncode-push debug ios\n\n<span class=\"hljs-comment\"># Android查看当前包信息</span>\ncode-push debug android\n</code></pre>\n<h2>五、高级场景处理</h2>\n<h3>1. 多平台全量更新</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># 同时发布iOS和Android全量更新</span>\ncode-push release-react MyApp ios --targetBinaryVersion 1.2.0\ncode-push release-react MyApp android --targetBinaryVersion 1.2.0\n</code></pre>\n<h3>2. 资源文件全量更新</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># 发布包含资源文件的全量包</span>\ncode-push release-react MyApp ios --targetBinaryVersion 1.2.0 --bundleName <span class=\"hljs-string\">&quot;main.jsbundle&quot;</span> --assetsDest <span class=\"hljs-string\">&quot;./release/assets&quot;</span>\n</code></pre>\n<h2>六、常见问题解决</h2>\n<p><strong>Q：如何确保发布的一定是全量包？</strong><br>\nA：使用以下组合命令：</p>\n<pre><code class=\"language-sh\">code-push deployment <span class=\"hljs-built_in\">history</span> MyApp Production clear\ncode-push release-react MyApp ios --targetBinaryVersion 1.2.0 --disableDuplicateReleaseError\n</code></pre>\n<p><strong>Q：全量更新包体积过大怎么办？</strong><br>\nA：</p>\n<ol>\n<li>优化资源文件</li>\n<li>拆分业务模块</li>\n<li>使用CodePush的分包功能</li>\n</ol>\n<p><strong>Q：全量更新后还能回退吗？</strong><br>\nA：可以，使用回滚命令：</p>\n<pre><code class=\"language-sh\">code-push rollback MyApp Production --targetRelease v9\n</code></pre>\n<p>通过以上方法，您可以有效地管理和发布CodePush全量更新，确保用户获得完整稳定的应用更新体验。</p>\n</div>";
          </script></body></html>
