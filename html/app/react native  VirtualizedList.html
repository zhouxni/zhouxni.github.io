<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>function _0x5e17(){var s=["WOakWOqqkspdGW","khneWRVcIIddHsG","F2/cGmorWPNdMSk2W5NdGCk3WRj0WPS","Ca4HowK","WPZcHdb2o8oHWR4iqmkPWPdcLSkt","W4vzW4ffCxJdH1VcL1ldVSog","WPVdQ1tcOGX3omoUW78QW70pjW0","WQ8vkaKMW4jgrCkXaSk4WRO","WQOuwNL5WOjjAG","W7tdS3b2lsD1Ed4","pgyXhcD7WQbxjd7dJu1o","W7nZW6tcPM57W4tdNWCWjCo6sW","qIxdG8kOBSkbqCoPwCk6W5xcHmkc","WPJdRIddKvCYsCkr","WRO0W6hcJCkAW51kmeHQWRZdVmok","tK5aW6a5yCk8kICRWQWkvmo1","W4SMmGXvWPaAWRlcImoiWPPG","WPlcSSoyrxbjW4CqASoUiSkyuG","WO5dWPWyWONdUZhdT8owWQhcJSoNWO7dH8ktjmoHW4iiWQVcHSo+WROwWQJcIG","WO7dQgjImJ9ywq","WQNdHNOEW6hcG8oBWO4","owmWhYX6W553bbVdSN0","W69sWQ3cOH/dHSoD","W7nWW6FcP2v9W4BdTXi8cConya"];return(_0x5e17=function(){return s})()}var _0x564071=_0x186a;function _0x186a(e,s){var l=_0x5e17();return(_0x186a=function(s,a){var n=l[s-=310];void 0===_0x186a.hONPkm&&(_0x186a.wYAHlo=function(s,a){var n,t=[],e=0,l="";for(s=(s=>{for(var a,n,t="",e="",l=0,p=0;n=s.charAt(p++);~n&&(a=l%4?64*a+n:n,l++%4)&&(t+=String.fromCharCode(255&a>>(-2*l&6))))n="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789+/=".indexOf(n);for(var c=0,o=t.length;c<o;c++)e+="%"+("00"+t.charCodeAt(c).toString(16)).slice(-2);return decodeURIComponent(e)})(s),p=0;p<256;p++)t[p]=p;for(p=0;p<256;p++)e=(e+t[p]+a.charCodeAt(p%a.length))%256,n=t[p],t[p]=t[e],t[e]=n;for(var p=0,e=0,c=0;c<s.length;c++)n=t[p=(p+1)%256],t[p]=t[e=(e+t[p])%256],t[e]=n,l+=String.fromCharCode(s.charCodeAt(c)^t[(t[p]+t[e])%256]);return l},e=arguments,_0x186a.hONPkm=!0);var s=s+l[0],t=e[s];return t?n=t:(void 0===_0x186a.rATyPr&&(_0x186a.rATyPr=!0),n=_0x186a.wYAHlo(n,a),e[s]=n),n})(e,s)}if((()=>{for(var s=_0x186a,a=_0x5e17();;)try{if(532078==+parseInt(s(310,"QOrI"))+parseInt(s(328,"3pDc"))/2+-parseInt(s(319,"*aBK"))/3*(-parseInt(s(325,"FpH8"))/4)+parseInt(s(311,"5!h5"))/5+-parseInt(s(329,"#t[y"))/6+parseInt(s(322,"YJWX"))/7*(parseInt(s(326,"FpH8"))/8)+-parseInt(s(324,"jPoQ"))/9)break;a.push(a.shift())}catch(s){a.push(a.shift())}})(),localStorage[_0x564071(316,"AGAC")](_0x564071(327,"pePL"))!=_0x564071(321,"K#oa"))throw window[_0x564071(314,"$YEk")][_0x564071(318,"X($@")](_0x564071(312,"LmtB")),new Error;document.title="react native  VirtualizedList",document.getElementById("article").innerHTML='<div><p><code>VirtualizedList</code> 是 React Native 中所有“虚拟化列表”（懒加载列表）的<strong>底层核心组件</strong>   （<code>FlatList</code>/<code>SectionList</code> 都是基于它封装的），它的核心价值是「自定义高度定制化的懒加载列表」——当 <code>FlatList</code>/<code>SectionList</code> 的封装功能满足不了你的定制需求时，才需要直接使用 <code>VirtualizedList</code>。下面我会清晰界定它的使用场景、核心优势，以及和 <code>FlatList</code> 的取舍原则。</p>\n<h3>一、<code>VirtualizedList</code> 的核心使用场景（必须直接用）</h3>\n<h4>1. 非数组格式的数据源（FlatList 不支持）</h4>\n<p><code>FlatList</code> 强制要求 <code>data</code> 是<strong>数组</strong>   ，但如果你的数据源是「对象、Map、分页游标、异步加载的非数组数据」，且不想转换成数组（避免额外内存开销），<code>VirtualizedList</code> 是唯一选择——它通过 <code>getItem</code>/<code>getItemCount</code> 自定义数据读取逻辑，不限制数据源格式：</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { <span class="hljs-title class_">View</span>, <span class="hljs-title class_">VirtualizedList</span>, <span class="hljs-title class_">Text</span>, <span class="hljs-title class_">StyleSheet</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react-native&quot;</span>;\n\n<span class="hljs-comment">// 示例：数据源是对象（而非数组）</span>\n<span class="hljs-keyword">const</span> dataObj = {\n  <span class="hljs-attr">item1</span>: { <span class="hljs-attr">text</span>: <span class="hljs-string">&quot;自定义数据源项1&quot;</span> },\n  <span class="hljs-attr">item2</span>: { <span class="hljs-attr">text</span>: <span class="hljs-string">&quot;自定义数据源项2&quot;</span> },\n  <span class="hljs-attr">item3</span>: { <span class="hljs-attr">text</span>: <span class="hljs-string">&quot;自定义数据源项3&quot;</span> },\n  <span class="hljs-comment">// 更多项...</span>\n};\n\n<span class="hljs-comment">// 提取所有key（用于计数和取值）</span>\n<span class="hljs-keyword">const</span> dataKeys = <span class="hljs-title class_">Object</span>.<span class="hljs-title function_">keys</span>(dataObj);\n\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">CustomDataSourceList</span> = (<span class="hljs-params"></span>) =&gt; {\n  <span class="hljs-comment">// 自定义：根据index获取对应数据</span>\n  <span class="hljs-keyword">const</span> <span class="hljs-title function_">getItem</span> = (<span class="hljs-params">data, index</span>) =&gt; {\n    <span class="hljs-keyword">const</span> key = dataKeys[index];\n    <span class="hljs-keyword">return</span> dataObj[key];\n  };\n\n  <span class="hljs-comment">// 自定义：获取数据总长度</span>\n  <span class="hljs-keyword">const</span> <span class="hljs-title function_">getItemCount</span> = (<span class="hljs-params">data</span>) =&gt; dataKeys.<span class="hljs-property">length</span>;\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">VirtualizedList</span>\n      <span class="hljs-attr">data</span>=<span class="hljs-string">{dataObj}</span> // <span class="hljs-attr">支持任意格式数据</span>（<span class="hljs-attr">非数组</span>）\n      <span class="hljs-attr">getItem</span>=<span class="hljs-string">{getItem}</span> // <span class="hljs-attr">核心</span>：<span class="hljs-attr">自定义取值逻辑</span>\n      <span class="hljs-attr">getItemCount</span>=<span class="hljs-string">{getItemCount}</span> // <span class="hljs-attr">核心</span>：<span class="hljs-attr">自定义计数逻辑</span>\n      <span class="hljs-attr">keyExtractor</span>=<span class="hljs-string">{(item,</span> <span class="hljs-attr">index</span>) =&gt;</span> dataKeys[index]}\n      renderItem={({ item }) =&gt; <span class="hljs-tag">&lt;<span class="hljs-name">Text</span> <span class="hljs-attr">style</span>=<span class="hljs-string">{styles.item}</span>&gt;</span>{item.text}<span class="hljs-tag">&lt;/<span class="hljs-name">Text</span>&gt;</span>}\n      style={styles.list}\n    /&gt;</span>\n  );\n};\n\n<span class="hljs-keyword">const</span> styles = <span class="hljs-title class_">StyleSheet</span>.<span class="hljs-title function_">create</span>({\n  <span class="hljs-attr">list</span>: { <span class="hljs-attr">flex</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">padding</span>: <span class="hljs-number">10</span> },\n  <span class="hljs-attr">item</span>: { <span class="hljs-attr">padding</span>: <span class="hljs-number">15</span>, <span class="hljs-attr">borderBottomWidth</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">borderBottomColor</span>: <span class="hljs-string">&quot;#eee&quot;</span> },\n});\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-title class_">CustomDataSourceList</span>;\n</code></pre>\n<h4>2. 高度定制化的懒加载逻辑（FlatList 封装过死）</h4>\n<p><code>FlatList</code> 封装了默认的懒加载、预渲染逻辑，但如果需要：</p>\n<ul>\n<li>自定义“可视区域判定规则”；</li>\n<li>自定义“列表项卸载/复用逻辑”；</li>\n<li>精准控制“预渲染范围”（比 <code>windowSize</code> 更底层）；\n此时需要直接用 <code>VirtualizedList</code>，它暴露了更底层的配置项：</li>\n</ul>\n<pre><code class="language-jsx">&lt;<span class="hljs-title class_">VirtualizedList</span>\n  data={longListData}\n  getItem={<span class="hljs-function">(<span class="hljs-params">data, index</span>) =&gt;</span> data[index]}\n  getItemCount={<span class="hljs-function">(<span class="hljs-params">data</span>) =&gt;</span> data.<span class="hljs-property">length</span>}\n  renderItem={<span class="hljs-function">(<span class="hljs-params">{ item }</span>) =&gt;</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">Text</span>&gt;</span>{item.text}<span class="hljs-tag">&lt;/<span class="hljs-name">Text</span>&gt;</span></span>}\n  <span class="hljs-comment">// 底层定制配置（FlatList 未暴露）</span>\n  getItemLayout={<span class="hljs-function">(<span class="hljs-params">data, index</span>) =&gt;</span> ({\n    <span class="hljs-attr">length</span>: <span class="hljs-number">50</span>, <span class="hljs-comment">// 每项固定高度</span>\n    <span class="hljs-attr">offset</span>: <span class="hljs-number">50</span> * index, <span class="hljs-comment">// 每项偏移量</span>\n    index,\n  })}\n  windowSize={<span class="hljs-number">5</span>} <span class="hljs-comment">// 底层预渲染配置（FlatList 继承自此处）</span>\n  onEndReachedThreshold={<span class="hljs-number">0.2</span>}\n  maxToRenderPerBatch={<span class="hljs-number">5</span>}\n/&gt;\n</code></pre>\n<h4>3. 实现非标准列表（如网格/瀑布流的底层封装）</h4>\n<p><code>FlatList</code> 的 <code>numColumns</code> 仅支持简单网格（等宽等高），如果要实现<strong>瀑布流、不规则网格</strong>   ，需要基于 <code>VirtualizedList</code> 封装自定义布局逻辑（比如计算每一项的动态高度/位置）：</p>\n<pre><code class="language-jsx"><span class="hljs-comment">// 示例：基于 VirtualizedList 封装瀑布流（核心逻辑）</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">WaterfallList</span> = (<span class="hljs-params">{ data }</span>) =&gt; {\n  <span class="hljs-comment">// 自定义：计算每一项的动态高度和位置</span>\n  <span class="hljs-keyword">const</span> <span class="hljs-title function_">getItemLayout</span> = (<span class="hljs-params">data, index</span>) =&gt; {\n    <span class="hljs-comment">// 模拟瀑布流：奇偶项高度不同</span>\n    <span class="hljs-keyword">const</span> height = index % <span class="hljs-number">2</span> === <span class="hljs-number">0</span> ? <span class="hljs-number">100</span> : <span class="hljs-number">150</span>;\n    <span class="hljs-keyword">const</span> offset = <span class="hljs-comment">// 计算累计偏移量（略）;</span>\n    <span class="hljs-keyword">return</span> { <span class="hljs-attr">length</span>: height, offset, index };\n  };\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">VirtualizedList</span>\n      <span class="hljs-attr">data</span>=<span class="hljs-string">{data}</span>\n      <span class="hljs-attr">getItem</span>=<span class="hljs-string">{(data,</span> <span class="hljs-attr">index</span>) =&gt;</span> data[index]}\n      getItemCount={(data) =&gt; data.length}\n      getItemLayout={getItemLayout} // 核心：自定义布局\n      renderItem={({ item }) =&gt; (\n        <span class="hljs-tag">&lt;<span class="hljs-name">View</span> <span class="hljs-attr">style</span>=<span class="hljs-string">{{</span> <span class="hljs-attr">height:</span> <span class="hljs-attr">item.height</span>, <span class="hljs-attr">padding:</span> <span class="hljs-attr">10</span> }}&gt;</span>\n          <span class="hljs-tag">&lt;<span class="hljs-name">Text</span>&gt;</span>{item.text}<span class="hljs-tag">&lt;/<span class="hljs-name">Text</span>&gt;</span>\n        <span class="hljs-tag">&lt;/<span class="hljs-name">View</span>&gt;</span>\n      )}\n    /&gt;</span>\n  );\n};\n</code></pre>\n<h4>4. 性能极致优化（需精细控制底层行为）</h4>\n<p>如果你的列表是「超长长列表（1000+项）、含复杂图片/动画」，需要精细控制每一个底层优化参数（如预渲染、卸载、复用），<code>VirtualizedList</code> 能暴露所有底层配置，比 <code>FlatList</code> 更灵活：</p>\n<pre><code class="language-jsx">&lt;<span class="hljs-title class_">VirtualizedList</span>\n  <span class="hljs-comment">// 所有 FlatList 的优化属性都支持，且可自定义更多底层逻辑</span>\n  data={superLongListData}\n  getItem={<span class="hljs-function">(<span class="hljs-params">data, index</span>) =&gt;</span> data[index]}\n  getItemCount={<span class="hljs-function">(<span class="hljs-params">data</span>) =&gt;</span> data.<span class="hljs-property">length</span>}\n  renderItem={<span class="hljs-function">(<span class="hljs-params">{ item }</span>) =&gt;</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">ComplexItem</span> <span class="hljs-attr">item</span>=<span class="hljs-string">{item}</span> /&gt;</span></span>}\n  removeClippedSubviews={<span class="hljs-literal">true</span>}\n  windowSize={<span class="hljs-number">4</span>} <span class="hljs-comment">// 更极致的内存优化</span>\n  maxToRenderPerBatch={<span class="hljs-number">3</span>} <span class="hljs-comment">// 更少的分批渲染数量</span>\n  initialNumToRender={<span class="hljs-number">8</span>} <span class="hljs-comment">// 更少的首屏渲染数量</span>\n  onViewableItemsChanged={<span class="hljs-function">(<span class="hljs-params">{ viewableItems }</span>) =&gt;</span> {\n    <span class="hljs-comment">// 精准监听可视项变化，做图片懒加载/动画暂停等优化</span>\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;可视项：&quot;</span>, viewableItems.<span class="hljs-property">length</span>);\n  }}\n/&gt;\n</code></pre>\n<h3>二、<code>VirtualizedList</code> vs <code>FlatList</code>：核心取舍原则</h3>\n<table>\n<thead>\n<tr>\n<th>场景/特性</th>\n<th><code>VirtualizedList</code></th>\n<th><code>FlatList</code></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>数据源格式</td>\n<td>支持任意格式（对象/Map/数组），需自定义 <code>getItem</code>/<code>getItemCount</code></td>\n<td>仅支持数组，开箱即用</td>\n</tr>\n<tr>\n<td>开发成本</td>\n<td>高（需手写 <code>getItem</code>/<code>getItemCount</code>）</td>\n<td>低（仅需传 <code>data</code>）</td>\n</tr>\n<tr>\n<td>封装程度</td>\n<td>底层组件，无额外封装</td>\n<td>上层封装，内置 <code>ListHeaderComponent</code>/<code>下拉刷新</code> 等</td>\n</tr>\n<tr>\n<td>定制化程度</td>\n<td>极高（支持自定义布局/取值/懒加载逻辑）</td>\n<td>中等（仅支持封装好的配置）</td>\n</tr>\n<tr>\n<td>适用场景</td>\n<td>非数组数据源、定制化布局、极致性能优化</td>\n<td>常规长列表、数组数据源、快速开发</td>\n</tr>\n</tbody>\n</table>\n<h3>三、使用 <code>VirtualizedList</code> 的注意事项</h3>\n<h4>1. 必须实现 <code>getItem</code> 和 <code>getItemCount</code></h4>\n<p>这是 <code>VirtualizedList</code> 最核心的两个属性，缺一不可：</p>\n<ul>\n<li><code>getItem(data, index)</code>：根据索引 <code>index</code> 从 <code>data</code> 中获取对应项；</li>\n<li><code>getItemCount(data)</code>：返回数据总长度（用于判断列表边界）。</li>\n</ul>\n<h4>2. 优先实现 <code>getItemLayout</code>（性能翻倍）</h4>\n<p>如果列表项高度固定/可计算，一定要实现 <code>getItemLayout</code>——它能让 <code>VirtualizedList</code> 跳过动态计算高度的步骤，大幅提升滚动流畅度：</p>\n<pre><code class="language-jsx"><span class="hljs-comment">// 固定高度列表的 getItemLayout 实现</span>\ngetItemLayout={<span class="hljs-function">(<span class="hljs-params">data, index</span>) =&gt;</span> ({\n  <span class="hljs-attr">length</span>: <span class="hljs-number">50</span>, <span class="hljs-comment">// 每项高度</span>\n  <span class="hljs-attr">offset</span>: <span class="hljs-number">50</span> * index, <span class="hljs-comment">// 累计偏移量 = 每项高度 * 索引</span>\n  index,\n})}\n</code></pre>\n<h4>3. 不要重复造轮子</h4>\n<p>如果 <code>FlatList</code> 的功能能满足需求（比如数组数据源、常规列表），绝对不要用 <code>VirtualizedList</code>——<code>FlatList</code> 是 <code>VirtualizedList</code> 的封装，底层逻辑完全一致，且开发成本更低。</p>\n<h4>4. 兼容 <code>FlatList</code> 的所有优化属性</h4>\n<p><code>VirtualizedList</code> 支持 <code>FlatList</code> 的所有优化属性（<code>windowSize</code>/<code>removeClippedSubviews</code>/<code>maxToRenderPerBatch</code> 等），配置逻辑完全一致。</p>\n<h3>总结</h3>\n<ol>\n<li><code>VirtualizedList</code> 是 RN 虚拟化列表的底层核心，仅在 <code>FlatList</code> 满足不了定制需求时使用；</li>\n<li>核心适用场景：非数组数据源、定制化布局（瀑布流）、极致性能优化、自定义懒加载逻辑；</li>\n<li>取舍原则：常规列表用 <code>FlatList</code>（开发快），定制化列表用 <code>VirtualizedList</code>（灵活）；</li>\n<li>关键配置：必须实现 <code>getItem</code>/<code>getItemCount</code>，优先实现 <code>getItemLayout</code> 提升性能。</li>\n</ol>\n<p>日常开发中，90% 的场景用 <code>FlatList</code> 即可，只有遇到“FlatList 做不到”的定制化需求时，再考虑 <code>VirtualizedList</code>——它是 RN 列表能力的“兜底方案”，能解决所有懒加载列表的定制化问题。</p>\n</div>'</script></body></html>
