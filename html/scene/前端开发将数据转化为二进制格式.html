<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,

      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'еүҚз«ҜејҖеҸ‘е°Ҷж•°жҚ®иҪ¬еҢ–дёәдәҢиҝӣеҲ¶ж јејҸ'
        document.getElementById('article').innerHTML = 
        "<div><p>еңЁеүҚз«ҜејҖеҸ‘дёӯпјҢе°Ҷж•°жҚ®иҪ¬еҢ–дёәдәҢиҝӣеҲ¶ж јејҸжҳҜеӨ„зҗҶж–Үд»¶гҖҒзҪ‘з»ңдј иҫ“жҲ–еә•еұӮж•°жҚ®ж“ҚдҪңзҡ„еёёи§ҒйңҖжұӮгҖӮд»ҘдёӢжҳҜеӨҡз§Қж•°жҚ®зұ»еһӢиҪ¬жҚўдёәдәҢиҝӣеҲ¶ж•°жҚ®зҡ„ж ёеҝғж–№жі•еҸҠе®һи·өеңәжҷҜпјҢз»“еҗҲJavaScriptж ҮеҮҶAPIдёҺе®һйҷ…еә”з”ЁеңәжҷҜеұ•ејҖиҜҙжҳҺпјҡ</p>\n<h3><strong>дёҖгҖҒеӯ—з¬ҰдёІиҪ¬дәҢиҝӣеҲ¶пјҲUint8Array/ArrayBufferпјү</strong></h3>\n<p>еӯ—з¬ҰдёІиҪ¬дәҢиҝӣеҲ¶йҖҡеёёз”ЁдәҺеӨ„зҗҶж–Үжң¬ж•°жҚ®зҡ„еә•еұӮдј иҫ“пјҲеҰӮWebSocketгҖҒFile APIпјүпјҢж ёеҝғйҖҡиҝҮ<strong>TextEncoder</strong>  жҲ–жүӢеҠЁзј–з Ғе®һзҺ°пјҡ</p>\n<h4>1. дҪҝз”ЁTextEncoderпјҲзҺ°д»ЈжөҸи§ҲеҷЁ/Node.jsпјү</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// еӯ—з¬ҰдёІиҪ¬Uint8ArrayпјҲUTF-8зј–з Ғпјү</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">stringToBinary</span>(<span class=\"hljs-params\">str</span>) {\n  <span class=\"hljs-keyword\">const</span> encoder = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">TextEncoder</span>();\n  <span class=\"hljs-keyword\">return</span> encoder.<span class=\"hljs-title function_\">encode</span>(str); <span class=\"hljs-comment\">// иҝ”еӣһUint8Arrayе®һдҫӢ</span>\n}\n\n<span class=\"hljs-keyword\">const</span> binaryData = <span class=\"hljs-title function_\">stringToBinary</span>(<span class=\"hljs-string\">&quot;еүҚз«ҜдәҢиҝӣеҲ¶иҪ¬жҚў&quot;</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(binaryData <span class=\"hljs-keyword\">instanceof</span> <span class=\"hljs-title class_\">Uint8Array</span>); <span class=\"hljs-comment\">// true</span>\n</code></pre>\n<h4>2. жүӢеҠЁзј–з ҒпјҲе…је®№ж—§жөҸи§ҲеҷЁпјү</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// еӯ—з¬ҰдёІиҪ¬ArrayBufferпјҲUTF-8пјү</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">stringToBuffer</span>(<span class=\"hljs-params\">str</span>) {\n  <span class=\"hljs-keyword\">const</span> buffer = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">ArrayBuffer</span>(str.<span class=\"hljs-property\">length</span>);\n  <span class=\"hljs-keyword\">const</span> view = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Uint8Array</span>(buffer);\n  <span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">let</span> i = <span class=\"hljs-number\">0</span>; i &lt; str.<span class=\"hljs-property\">length</span>; i++) {\n    view[i] = str.<span class=\"hljs-title function_\">charCodeAt</span>(i);\n  }\n  <span class=\"hljs-keyword\">return</span> buffer;\n}\n</code></pre>\n<h3><strong>дәҢгҖҒJSON/еҜ№иұЎж•°жҚ®иҪ¬дәҢиҝӣеҲ¶</strong></h3>\n<p>JSONж•°жҚ®иҪ¬дәҢиҝӣеҲ¶еёёз”ЁдәҺзҪ‘з»ңдј иҫ“пјҲеҰӮHTTPдәҢиҝӣеҲ¶жөҒпјүжҲ–ж–Үд»¶еӯҳеӮЁпјҢйңҖе…ҲеәҸеҲ—еҢ–еҶҚзј–з Ғпјҡ</p>\n<h4>1. JSON вҶ’ Uint8ArrayпјҲз»“еҗҲTextEncoderпјү</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// зӨәдҫӢпјҡе°ҶеҜ№иұЎиҪ¬дёәдәҢиҝӣеҲ¶е№¶еҸ‘йҖҒиҮіWebSocket</span>\n<span class=\"hljs-keyword\">const</span> data = { <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&quot;еүҚз«Ҝ&quot;</span>, <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">&quot;binary&quot;</span>, <span class=\"hljs-attr\">time</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>() };\n<span class=\"hljs-keyword\">const</span> jsonStr = <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(data);\n<span class=\"hljs-keyword\">const</span> binaryData = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">TextEncoder</span>().<span class=\"hljs-title function_\">encode</span>(jsonStr);\n\n<span class=\"hljs-comment\">// еҒҮи®ҫwsдёәWebSocketе®һдҫӢ</span>\nws.<span class=\"hljs-title function_\">send</span>(binaryData);\n</code></pre>\n<h4>2. дҪҝз”ЁArrayBufferеӯҳеӮЁз»“жһ„еҢ–ж•°жҚ®</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// зӨәдҫӢпјҡе°Ҷж•°еҖјж•°жҚ®жҢүдәҢиҝӣеҲ¶ж јејҸеӯҳеӮЁпјҲйҖӮз”ЁдәҺдәҢиҝӣеҲ¶еҚҸи®®пјү</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">objectToBinary</span>(<span class=\"hljs-params\">obj</span>) {\n  <span class=\"hljs-comment\">// еҒҮи®ҫobjеҢ…еҗ«еӣәе®ҡж јејҸж•°жҚ®</span>\n  <span class=\"hljs-keyword\">const</span> buffer = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">ArrayBuffer</span>(<span class=\"hljs-number\">8</span> + obj.<span class=\"hljs-property\">data</span>.<span class=\"hljs-property\">length</span> * <span class=\"hljs-number\">4</span>); <span class=\"hljs-comment\">// йў„з•ҷеӨҙйғЁ+ж•°жҚ®з©әй—ҙ</span>\n  <span class=\"hljs-keyword\">const</span> view = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">DataView</span>(buffer);\n  \n  <span class=\"hljs-comment\">// еҶҷе…ҘеӨҙйғЁдҝЎжҒҜпјҲеҰӮзүҲжң¬еҸ·гҖҒй•ҝеәҰпјү</span>\n  view.<span class=\"hljs-title function_\">setUint8</span>(<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1</span>); <span class=\"hljs-comment\">// зүҲжң¬еҸ·</span>\n  view.<span class=\"hljs-title function_\">setUint32</span>(<span class=\"hljs-number\">4</span>, obj.<span class=\"hljs-property\">data</span>.<span class=\"hljs-property\">length</span>, <span class=\"hljs-literal\">true</span>); <span class=\"hljs-comment\">// ж•°жҚ®й•ҝеәҰпјҲе°Ҹз«ҜеәҸпјү</span>\n  \n  <span class=\"hljs-comment\">// еҶҷе…Ҙж•°жҚ®пјҲеҰӮж•°з»„дёӯзҡ„ж•°еҖјпјү</span>\n  <span class=\"hljs-keyword\">const</span> floatView = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Float32Array</span>(buffer, <span class=\"hljs-number\">8</span>);\n  obj.<span class=\"hljs-property\">data</span>.<span class=\"hljs-title function_\">forEach</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">val, i</span>) =&gt;</span> {\n    floatView[i] = val;\n  });\n  \n  <span class=\"hljs-keyword\">return</span> buffer;\n}\n\n<span class=\"hljs-keyword\">const</span> binaryBuffer = <span class=\"hljs-title function_\">objectToBinary</span>({ <span class=\"hljs-attr\">data</span>: [<span class=\"hljs-number\">1.5</span>, <span class=\"hljs-number\">2.3</span>, <span class=\"hljs-number\">3.8</span>] });\n</code></pre>\n<h3><strong>дёүгҖҒж–Үд»¶/BlobиҪ¬дәҢиҝӣеҲ¶ж•°з»„</strong></h3>\n<p>еӨ„зҗҶз”ЁжҲ·дёҠдј зҡ„ж–Үд»¶ж—¶пјҢеёёйңҖе°ҶBlobеҜ№иұЎиҪ¬дёәдәҢиҝӣеҲ¶ж•°жҚ®иҝӣиЎҢж“ҚдҪңпјҡ</p>\n<h4>1. дҪҝз”ЁFileReaderиҜ»еҸ–ж–Үд»¶дёәArrayBuffer</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// зӨәдҫӢпјҡиҜ»еҸ–еӣҫзүҮж–Үд»¶дёәдәҢиҝӣеҲ¶ж•°жҚ®</span>\n<span class=\"hljs-keyword\">const</span> fileInput = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&quot;file-input&quot;</span>);\nfileInput.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&quot;change&quot;</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">event</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">const</span> file = event.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">files</span>[<span class=\"hljs-number\">0</span>];\n  <span class=\"hljs-keyword\">const</span> reader = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">FileReader</span>();\n  \n  reader.<span class=\"hljs-property\">onload</span> = <span class=\"hljs-function\">(<span class=\"hljs-params\">e</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">const</span> arrayBuffer = e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">result</span>; <span class=\"hljs-comment\">// ArrayBufferж јејҸзҡ„дәҢиҝӣеҲ¶ж•°жҚ®</span>\n    <span class=\"hljs-comment\">// еҗҺз»ӯеҸҜиҪ¬дёәUint8Arrayж“ҚдҪңпјҡconst uint8Array = new Uint8Array(arrayBuffer);</span>\n  };\n  \n  reader.<span class=\"hljs-title function_\">readAsArrayBuffer</span>(file);\n});\n</code></pre>\n<h4>2. BlobиҪ¬Uint8ArrayпјҲйҖӮз”ЁдәҺеҲҶзүҮеӨ„зҗҶпјү</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">blobToUint8Array</span>(<span class=\"hljs-params\">blob</span>) {\n  <span class=\"hljs-keyword\">const</span> arrayBuffer = <span class=\"hljs-keyword\">await</span> blob.<span class=\"hljs-title function_\">arrayBuffer</span>();\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Uint8Array</span>(arrayBuffer);\n}\n</code></pre>\n<h3><strong>еӣӣгҖҒдәҢиҝӣеҲ¶ж•°жҚ®зҡ„з»„еҗҲдёҺж“ҚдҪң</strong></h3>\n<p>е®һйҷ…ејҖеҸ‘дёӯеёёйңҖеҗҲе№¶еӨҡдёӘдәҢиҝӣеҲ¶ж•°жҚ®пјҢжҲ–еҜ№е·Іжңүж•°жҚ®иҝӣиЎҢдҝ®ж”№пјҡ</p>\n<h4>1. еҗҲе№¶еӨҡдёӘUint8Array</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">concatenateUint8Arrays</span>(<span class=\"hljs-params\">arrays</span>) {\n  <span class=\"hljs-keyword\">const</span> totalLength = arrays.<span class=\"hljs-title function_\">reduce</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">sum, arr</span>) =&gt;</span> sum + arr.<span class=\"hljs-property\">length</span>, <span class=\"hljs-number\">0</span>);\n  <span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Uint8Array</span>(totalLength);\n  <span class=\"hljs-keyword\">let</span> offset = <span class=\"hljs-number\">0</span>;\n  \n  arrays.<span class=\"hljs-title function_\">forEach</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">arr</span> =&gt;</span> {\n    result.<span class=\"hljs-title function_\">set</span>(arr, offset);\n    offset += arr.<span class=\"hljs-property\">length</span>;\n  });\n  \n  <span class=\"hljs-keyword\">return</span> result;\n}\n\n<span class=\"hljs-comment\">// зӨәдҫӢпјҡеҗҲе№¶еӯ—з¬ҰдёІдёҺж–Үд»¶ж•°жҚ®</span>\n<span class=\"hljs-keyword\">const</span> strBinary = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">TextEncoder</span>().<span class=\"hljs-title function_\">encode</span>(<span class=\"hljs-string\">&quot;еӨҙйғЁдҝЎжҒҜ&quot;</span>);\n<span class=\"hljs-keyword\">const</span> fileBinary = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">blobToUint8Array</span>(file);\n<span class=\"hljs-keyword\">const</span> combined = <span class=\"hljs-title function_\">concatenateUint8Arrays</span>([strBinary, fileBinary]);\n</code></pre>\n<h4>2. ж“ҚдҪңDataViewдҝ®ж”№дәҢиҝӣеҲ¶ж•°жҚ®</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// зӨәдҫӢпјҡеңЁArrayBufferдёӯеҶҷе…Ҙзү№е®ҡж јејҸзҡ„ж•°жҚ®</span>\n<span class=\"hljs-keyword\">const</span> buffer = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">ArrayBuffer</span>(<span class=\"hljs-number\">16</span>);\n<span class=\"hljs-keyword\">const</span> view = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">DataView</span>(buffer);\n\n<span class=\"hljs-comment\">// еҶҷе…Ҙж•ҙж•°пјҲеӨ§з«ҜеәҸпјү</span>\nview.<span class=\"hljs-title function_\">setInt32</span>(<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">1024</span>, <span class=\"hljs-literal\">false</span>); <span class=\"hljs-comment\">// дҪҚзҪ®0пјҢеҖј1024пјҢеӨ§з«ҜеәҸ</span>\n<span class=\"hljs-comment\">// еҶҷе…Ҙжө®зӮ№ж•°</span>\nview.<span class=\"hljs-title function_\">setFloat64</span>(<span class=\"hljs-number\">8</span>, <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-property\">PI</span>, <span class=\"hljs-literal\">true</span>); <span class=\"hljs-comment\">// дҪҚзҪ®8пјҢеҖјПҖпјҢе°Ҹз«ҜеәҸ</span>\n\n<span class=\"hljs-comment\">// иҜ»еҸ–ж•°жҚ®</span>\n<span class=\"hljs-keyword\">const</span> intValue = view.<span class=\"hljs-title function_\">getInt32</span>(<span class=\"hljs-number\">0</span>, <span class=\"hljs-literal\">false</span>); <span class=\"hljs-comment\">// 1024</span>\n<span class=\"hljs-keyword\">const</span> floatValue = view.<span class=\"hljs-title function_\">getFloat64</span>(<span class=\"hljs-number\">8</span>, <span class=\"hljs-literal\">true</span>); <span class=\"hljs-comment\">// ПҖ</span>\n</code></pre>\n<h3><strong>дә”гҖҒеә”з”ЁеңәжҷҜдёҺдјҳеҢ–е»әи®®</strong></h3>\n<h4>1. е…ёеһӢеңәжҷҜ</h4>\n<ul>\n<li><strong>зҪ‘з»ңдј иҫ“</strong>  пјҡWebSocketеҸ‘йҖҒдәҢиҝӣеҲ¶ж•°жҚ®пјҲеҮҸе°‘ж–Үжң¬еәҸеҲ—еҢ–ејҖй”ҖпјүгҖҒHTTP/2её§ж•°жҚ®дј иҫ“гҖӮ</li>\n<li><strong>ж–Үд»¶еӨ„зҗҶ</strong>  пјҡж–Үд»¶дёҠдј еүҚеҲҶзүҮеҺӢзј©гҖҒдәҢиҝӣеҲ¶ж јејҸж–Үд»¶з”ҹжҲҗпјҲеҰӮPDFгҖҒPNGпјүгҖӮ</li>\n<li><strong>еҠ еҜҶдёҺзј–з Ғ</strong>  пјҡBase64дёҺдәҢиҝӣеҲ¶дә’иҪ¬гҖҒеҠ еҜҶз®—жі•пјҲеҰӮAESпјүзҡ„дәҢиҝӣеҲ¶иҫ“е…ҘгҖӮ</li>\n</ul>\n<h4>2. жҖ§иғҪдјҳеҢ–</h4>\n<ul>\n<li><strong>дҪҝз”Ёзұ»еһӢеҢ–ж•°з»„</strong>  пјҡUint8Array/Int32ArrayзӯүжҜ”жҷ®йҖҡж•°з»„ж“ҚдҪңж•ҲзҺҮжӣҙй«ҳгҖӮ</li>\n<li><strong>йҒҝе…Қйў‘з№ҒиҪ¬жҚў</strong>  пјҡиӢҘж¶үеҸҠеӨ§йҮҸдәҢиҝӣеҲ¶ж•°жҚ®пјҢдјҳе…ҲдҪҝз”ЁArrayBufferдҪңдёәдёӯй—ҙеӯҳеӮЁгҖӮ</li>\n<li><strong>Web WorkerеӨ„зҗҶ</strong>  пјҡеӨҚжқӮдәҢиҝӣеҲ¶и®Ўз®—пјҲеҰӮи§Ҷйў‘зј–з ҒпјүеҸҜз§»дәӨWeb WorkerпјҢйҒҝе…Қйҳ»еЎһдё»зәҝзЁӢгҖӮ</li>\n</ul>\n<h3><strong>е…ӯгҖҒи·Ёе№іеҸ°е…је®№ж–№жЎҲ</strong></h3>\n<ul>\n<li><strong>Node.jsзҺҜеўғ</strong>  пјҡеҸҜдҪҝз”Ё<code>Buffer</code>зұ»пјҲжң¬иҙЁжҳҜUint8Arrayзҡ„жү©еұ•пјүпјҢж”ҜжҢҒ<code>Buffer.from(string)</code>зӯүдҫҝжҚ·ж–№жі•гҖӮ</li>\n<li><strong>WebAssembly</strong>  пјҡиӢҘйңҖй«ҳжҖ§иғҪдәҢиҝӣеҲ¶еӨ„зҗҶпјҲеҰӮи§Ҷйў‘и§Јз ҒпјүпјҢеҸҜз»“еҗҲWASMи°ғз”Ёеә•еұӮC/C++еә“гҖӮ</li>\n</ul>\n<p>йҖҡиҝҮд»ҘдёҠж–№жі•пјҢеүҚз«ҜеҸҜзҒөжҙ»еӨ„зҗҶеҗ„зұ»ж•°жҚ®еҲ°дәҢиҝӣеҲ¶зҡ„иҪ¬жҚўпјҢж»Ўи¶іж–Үд»¶ж“ҚдҪңгҖҒзҪ‘з»ңйҖҡдҝЎзӯүеңәжҷҜзҡ„еә•еұӮйңҖжұӮгҖӮе®һйҷ…еә”з”ЁдёӯйңҖж №жҚ®ж•°жҚ®зұ»еһӢгҖҒжҖ§иғҪиҰҒжұӮеҸҠе…је®№жҖ§йҖүжӢ©еҗҲйҖӮзҡ„APIгҖӮ</p>\n</div>";</script></body></html>
