<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="vue3 hasInjectionContext",document.getElementById("article").innerHTML='<div><p>在 Vue 3 中，<strong><code>hasInjectionContext()</code></strong>   是一个用于检查当前代码是否处于<strong>依赖注入上下文（Injection Context）</strong>   中的工具函数。它可以帮助你确定当前环境是否支持 <code>provide</code>/<code>inject</code> 或访问其他 Vue 的依赖注入 API。</p>\n<hr>\n<h3><strong>作用</strong></h3>\n<p><code>hasInjectionContext()</code> 返回一个布尔值：</p>\n<ul>\n<li><strong><code>true</code></strong>   ：当前代码在 Vue 的依赖注入上下文中（例如组件 <code>setup</code> 函数内、生命周期钩子等）。</li>\n<li><strong><code>false</code></strong>   ：当前代码不在注入上下文中（例如异步回调、普通函数、非 Vue 环境）。</li>\n</ul>\n<hr>\n<h3><strong>使用场景</strong></h3>\n<ol>\n<li><strong>安全地使用 <code>inject</code></strong>   ：<br>\n在不确定当前环境是否支持依赖注入时，可以用 <code>hasInjectionContext()</code> 检查，避免调用 <code>inject()</code> 时抛出错误。</li>\n<li><strong>开发工具或库</strong>   ：<br>\n在编写通用工具函数时，可能需要判断当前是否处于 Vue 上下文中。</li>\n</ol>\n<hr>\n<h3><strong>示例代码</strong></h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">import</span> { hasInjectionContext, inject } <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;vue&#x27;</span>;\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">safeInject</span>(<span class="hljs-params">key</span>) {\n  <span class="hljs-keyword">if</span> (<span class="hljs-title function_">hasInjectionContext</span>()) {\n    <span class="hljs-keyword">return</span> <span class="hljs-title function_">inject</span>(key);\n  } <span class="hljs-keyword">else</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">warn</span>(<span class="hljs-string">&#x27;当前不在 Vue 注入上下文中！&#x27;</span>);\n    <span class="hljs-keyword">return</span> <span class="hljs-literal">null</span>;\n  }\n}\n\n<span class="hljs-comment">// 在组件 setup 中使用（返回 true）</span>\n<span class="hljs-title function_">setup</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title function_">hasInjectionContext</span>()); <span class="hljs-comment">// true</span>\n  <span class="hljs-title function_">safeInject</span>(<span class="hljs-string">&#x27;some-key&#x27;</span>); <span class="hljs-comment">// 正常注入</span>\n}\n\n<span class="hljs-comment">// 在异步回调中（可能返回 false）</span>\n<span class="hljs-built_in">setTimeout</span>(<span class="hljs-function">() =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title function_">hasInjectionContext</span>()); <span class="hljs-comment">// false</span>\n  <span class="hljs-title function_">safeInject</span>(<span class="hljs-string">&#x27;some-key&#x27;</span>); <span class="hljs-comment">// 警告</span>\n}, <span class="hljs-number">1000</span>);\n</code></pre>\n<hr>\n<h3><strong>为什么需要它？</strong></h3>\n<p>Vue 的依赖注入（如 <code>inject()</code>）必须在一个<strong>有效的注入上下文</strong>   中调用（通常是组件实例的 <code>setup</code> 阶段）。如果在无效上下文中调用 <code>inject()</code>，Vue 会抛出错误。<code>hasInjectionContext()</code> 提供了一种安全的检查机制。</p>\n<hr>\n<h3><strong>注意事项</strong></h3>\n<ul>\n<li>该 API 从 <strong>Vue 3.3+</strong>   开始提供（确保你的 Vue 版本足够新）。</li>\n<li>即使返回 <code>true</code>，也可能因调用时机问题导致 <code>inject()</code> 失败（例如在异步代码中组件已卸载）。</li>\n</ul>\n<hr>\n<h3><strong>替代方案</strong></h3>\n<p>如果你无法使用 Vue 3.3+，可以通过 <code>getCurrentInstance()</code> 间接判断：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">import</span> { getCurrentInstance } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;vue&quot;</span>;\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">hasContext</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">return</span> !!<span class="hljs-title function_">getCurrentInstance</span>();\n}\n</code></pre>\n<p>但 <code>hasInjectionContext()</code> 是更准确的实现，推荐优先使用它。</p>\n</div>'</script></body></html>
