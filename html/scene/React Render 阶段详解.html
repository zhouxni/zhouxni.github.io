<script>
            document.getElementById('article').innerHTML = 
            "<div><p>React 的渲染流程分为两个主要阶段：<strong>Render 阶段</strong>  和<strong>Commit 阶段</strong>  。Render 阶段是 React 确定 UI 需要如何更新的关键过程，它负责计算变更但不直接操作 DOM。</p>\n<h2>1. Render 阶段概述</h2>\n<p>Render 阶段（也称为 Reconciliation 阶段）是 React 的核心工作流程，主要完成以下任务：</p>\n<ul>\n<li>调用组件渲染函数生成 React 元素树</li>\n<li>比较新旧虚拟 DOM（Diffing 算法）</li>\n<li>确定需要应用的变更（生成副作用列表）</li>\n</ul>\n<h2>2. Render 阶段的两个子阶段</h2>\n<p>Render 阶段本身又分为两个子阶段：</p>\n<h3>2.1 &quot;递&quot;阶段（Downward Phase）</h3>\n<p><strong>从父组件向子组件递归</strong>  ：</p>\n<ul>\n<li>执行组件的 <code>render</code> 方法（类组件）或函数组件本身</li>\n<li>生成子组件的 React 元素（虚拟 DOM）</li>\n<li>为每个组件创建/复用 Fiber 节点</li>\n</ul>\n<p>关键特点：</p>\n<ul>\n<li>深度优先遍历组件树</li>\n<li>纯计算过程，不产生副作用</li>\n<li>可中断（在并发模式下）</li>\n</ul>\n<h3>2.2 &quot;归&quot;阶段（Upward Phase）</h3>\n<p><strong>从子组件向父组件回溯</strong>  ：</p>\n<ul>\n<li>执行 Diff 算法比较新旧虚拟 DOM</li>\n<li>收集副作用（Effect List）</li>\n<li>标记需要更新的节点</li>\n</ul>\n<p>关键特点：</p>\n<ul>\n<li>完成协调（Reconciliation）过程</li>\n<li>确定哪些节点需要插入/更新/删除</li>\n<li>准备副作用列表供 Commit 阶段使用</li>\n</ul>\n<h2>3. Fiber 架构与 Render 阶段</h2>\n<p>React Fiber 架构使 Render 阶段具有以下特性：</p>\n<h3>3.1 增量渲染</h3>\n<ul>\n<li>将渲染工作分割成小块</li>\n<li>通过 <code>requestIdleCallback</code> 在浏览器空闲时执行</li>\n<li>允许高优先级更新中断低优先级渲染</li>\n</ul>\n<h3>3.2 双缓冲技术</h3>\n<ul>\n<li>当前树（Current Tree）：当前显示的 UI 状态</li>\n<li>工作树（WorkInProgress Tree）：正在构建的新状态</li>\n<li>两棵树交替使用，减少内存分配</li>\n</ul>\n<h2>4. 详细工作流程</h2>\n<ol>\n<li><strong>开始渲染</strong>  ：\n<ul>\n<li>从根 Fiber 节点开始</li>\n<li>创建 WorkInProgress 树</li>\n</ul>\n</li>\n<li><strong>递阶段工作</strong>  ：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">beginWork</span>(<span class=\"hljs-params\">current, workInProgress</span>) {\n  <span class=\"hljs-comment\">// 调用组件渲染函数</span>\n  <span class=\"hljs-comment\">// 生成子 Fiber 节点</span>\n}\n</code></pre>\n</li>\n<li><strong>完成单元工作</strong>  ：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">completeWork</span>(<span class=\"hljs-params\">current, workInProgress</span>) {\n  <span class=\"hljs-comment\">// 处理 DOM 节点</span>\n  <span class=\"hljs-comment\">// 收集副作用</span>\n}\n</code></pre>\n</li>\n<li><strong>副作用收集</strong>  ：\n<ul>\n<li>标记需要插入的节点（Placement）</li>\n<li>标记需要更新的节点（Update）</li>\n<li>标记需要删除的节点（Deletion）</li>\n</ul>\n</li>\n</ol>\n<h2>5. 并发模式下的 Render 阶段</h2>\n<p>在并发模式下，Render 阶段具有额外特性：</p>\n<ul>\n<li><strong>时间切片</strong>  ：将渲染工作分成5ms左右的小块</li>\n<li><strong>优先级调度</strong>  ：高优先级更新可以打断低优先级渲染</li>\n<li><strong>选择性水合</strong>  ：渐进式加载和渲染组件</li>\n</ul>\n<h2>6. 性能优化相关</h2>\n<p>React 在 Render 阶段采用多种优化策略：</p>\n<ol>\n<li><strong>Diffing 算法</strong>  ：\n<ul>\n<li>同级比较</li>\n<li>Key 值优化</li>\n<li>组件类型比较</li>\n</ul>\n</li>\n<li><strong>跳过不必要的渲染</strong>  ：\n<ul>\n<li><code>shouldComponentUpdate</code></li>\n<li><code>React.memo</code></li>\n<li><code>useMemo</code>/<code>useCallback</code></li>\n</ul>\n</li>\n<li><strong>批量更新</strong>  ：\n<ul>\n<li>自动批处理状态更新</li>\n<li>减少不必要的渲染次数</li>\n</ul>\n</li>\n</ol>\n<h2>7. 生命周期与 Render 阶段</h2>\n<p>Render 阶段涉及的生命周期方法：</p>\n<ul>\n<li><strong>类组件</strong>  ：\n<ul>\n<li><code>shouldComponentUpdate</code>（递阶段前）</li>\n<li><code>render</code>（递阶段）</li>\n<li><code>getDerivedStateFromProps</code>（递阶段前）</li>\n</ul>\n</li>\n<li><strong>函数组件</strong>  ：\n<ul>\n<li>函数体执行（递阶段）</li>\n<li>Hooks 逻辑执行（递阶段）</li>\n</ul>\n</li>\n</ul>\n<h2>8. 总结</h2>\n<p>React 的 Render 阶段是一个精心设计的协调过程，它：</p>\n<ol>\n<li>通过递归两阶段处理组件树</li>\n<li>使用 Fiber 架构实现增量渲染</li>\n<li>在并发模式下支持可中断渲染</li>\n<li>高效计算变更而不直接操作 DOM</li>\n</ol>\n<p>理解 Render 阶段的工作原理对于优化 React 应用性能和调试复杂问题至关重要。</p>\n</div>";
          </script></body></html>
