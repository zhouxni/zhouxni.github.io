<script>
        document.getElementById('article').innerHTML = 
        "<div><p>在 Vue3 中，<code>effectScope</code> 的嵌套机制通过 <strong><code>activeEffectScope</code> 栈</strong>   实现。当创建嵌套的 <code>effectScope</code> 时，内部的 effect 会被正确收集到 <strong>最近的活动作用域</strong>   中。以下是详细解析：</p>\n<h3><strong>1. 嵌套 EffectScope 的收集机制</strong></h3>\n<p>当调用 <code>scope.run(fn)</code> 时，Vue 会：</p>\n<ol>\n<li><strong>保存当前的 <code>activeEffectScope</code></strong>  （即父作用域）。</li>\n<li><strong>将 <code>activeEffectScope</code> 设置为当前作用域</strong>  （即子作用域）。</li>\n<li><strong>执行 <code>fn</code></strong>  ，此时内部创建的 effect 会被收集到子作用域。</li>\n<li><strong>恢复父作用域</strong>   为 <code>activeEffectScope</code>。</li>\n</ol>\n<p>这种机制确保了嵌套作用域中的 effect 会被正确分类到各自的作用域中。</p>\n<h3><strong>2. 源码级工作流程</strong></h3>\n<p>以下是简化的源码流程，展示嵌套作用域如何收集 effect：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 全局变量：当前活动的 effectScope</span>\n<span class=\"hljs-keyword\">let</span> activeEffectScope = <span class=\"hljs-literal\">null</span>;\n\n<span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">EffectScope</span> {\n  effects = []; <span class=\"hljs-comment\">// 存储收集的 effect</span>\n  active = <span class=\"hljs-literal\">true</span>;\n  \n  <span class=\"hljs-title function_\">run</span>(<span class=\"hljs-params\">fn</span>) {\n    <span class=\"hljs-keyword\">if</span> (!<span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">active</span>) <span class=\"hljs-keyword\">return</span>;\n    \n    <span class=\"hljs-comment\">// 1. 保存当前的活动作用域（父作用域）</span>\n    <span class=\"hljs-keyword\">const</span> parentScope = activeEffectScope;\n    \n    <span class=\"hljs-keyword\">try</span> {\n      <span class=\"hljs-comment\">// 2. 将当前作用域设为活动状态</span>\n      activeEffectScope = <span class=\"hljs-variable language_\">this</span>;\n      \n      <span class=\"hljs-comment\">// 3. 执行函数，内部创建的 effect 会被收集到 this.effects</span>\n      <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">fn</span>();\n    } <span class=\"hljs-keyword\">finally</span> {\n      <span class=\"hljs-comment\">// 4. 恢复父作用域为活动状态</span>\n      activeEffectScope = parentScope;\n    }\n  }\n  \n  <span class=\"hljs-title function_\">stop</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-comment\">// 停止所有收集的 effect</span>\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">effects</span>.<span class=\"hljs-title function_\">forEach</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">e</span> =&gt;</span> e.<span class=\"hljs-title function_\">stop</span>());\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">active</span> = <span class=\"hljs-literal\">false</span>;\n  }\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">effect</span>(<span class=\"hljs-params\">fn</span>) {\n  <span class=\"hljs-keyword\">const</span> effect = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">ReactiveEffect</span>(fn);\n  \n  <span class=\"hljs-comment\">// 将 effect 添加到当前活动作用域</span>\n  <span class=\"hljs-keyword\">if</span> (activeEffectScope) {\n    activeEffectScope.<span class=\"hljs-property\">effects</span>.<span class=\"hljs-title function_\">push</span>(effect);\n  }\n  \n  effect.<span class=\"hljs-title function_\">run</span>();\n  <span class=\"hljs-keyword\">return</span> effect;\n}\n</code></pre>\n<h3><strong>3. 示例：嵌套作用域的收集过程</strong></h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 创建父作用域</span>\n<span class=\"hljs-keyword\">const</span> parentScope = <span class=\"hljs-title function_\">effectScope</span>();\n\nparentScope.<span class=\"hljs-title function_\">run</span>(<span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-comment\">// 此时 activeEffectScope 是 parentScope</span>\n  \n  <span class=\"hljs-comment\">// Effect A 被收集到 parentScope</span>\n  <span class=\"hljs-title function_\">effect</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Parent Effect&#x27;</span>));\n  \n  <span class=\"hljs-comment\">// 创建子作用域</span>\n  <span class=\"hljs-keyword\">const</span> childScope = <span class=\"hljs-title function_\">effectScope</span>();\n  \n  childScope.<span class=\"hljs-title function_\">run</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-comment\">// 此时 activeEffectScope 是 childScope</span>\n    \n    <span class=\"hljs-comment\">// Effect B 被收集到 childScope</span>\n    <span class=\"hljs-title function_\">effect</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Child Effect&#x27;</span>));\n    \n    <span class=\"hljs-comment\">// 创建孙作用域</span>\n    <span class=\"hljs-keyword\">const</span> grandChildScope = <span class=\"hljs-title function_\">effectScope</span>();\n    \n    grandChildScope.<span class=\"hljs-title function_\">run</span>(<span class=\"hljs-function\">() =&gt;</span> {\n      <span class=\"hljs-comment\">// 此时 activeEffectScope 是 grandChildScope</span>\n      \n      <span class=\"hljs-comment\">// Effect C 被收集到 grandChildScope</span>\n      <span class=\"hljs-title function_\">effect</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;GrandChild Effect&#x27;</span>));\n    });\n    \n    <span class=\"hljs-comment\">// 此时 activeEffectScope 恢复为 childScope</span>\n  });\n  \n  <span class=\"hljs-comment\">// 此时 activeEffectScope 恢复为 parentScope</span>\n});\n</code></pre>\n<h3><strong>4. 内存管理与停止逻辑</strong></h3>\n<p>当调用 <code>scope.stop()</code> 时：</p>\n<ul>\n<li><strong>父作用域</strong>   会停止所有直接收集的 effect（如示例中的 Effect A）。</li>\n<li><strong>子作用域</strong>   会停止自己收集的 effect（如示例中的 Effect B 和 Effect C），但不会影响父作用域的 effect。</li>\n</ul>\n<p>这种层级结构确保了资源的正确释放，避免内存泄漏。</p>\n<h3><strong>5. 组件中的实际应用</strong></h3>\n<p>在 Vue3 组件中，每个组件实例都有一个关联的 <code>effectScope</code>：</p>\n<ul>\n<li>组件的渲染 effect 属于根作用域。</li>\n<li>组件内使用 <code>watch</code>、<code>watchEffect</code> 创建的 effect 属于根作用域。</li>\n<li>如果组件内部手动创建了新的 <code>effectScope</code>，则会形成嵌套结构。</li>\n</ul>\n<p>当组件卸载时，其根作用域会被停止，所有内部 effect 都会被自动清理。</p>\n<h3><strong>总结</strong></h3>\n<p><code>effectScope</code> 的嵌套收集机制通过 <strong><code>activeEffectScope</code> 栈</strong>   实现：</p>\n<ol>\n<li>每个 <code>scope.run()</code> 会临时修改 <code>activeEffectScope</code>。</li>\n<li>内部创建的 effect 会被收集到当前的 <code>activeEffectScope</code>。</li>\n<li>执行完成后，<code>activeEffectScope</code> 恢复为父作用域。</li>\n</ol>\n<p>这种设计使得 Vue3 能够精确管理复杂应用中的响应式副作用，确保每个作用域的 effect 独立可控，并且在组件卸载时正确释放资源。</p>\n</div>";
      </script></body></html>
