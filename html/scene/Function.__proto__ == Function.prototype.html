<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Function.__proto__ == Function.prototype",document.getElementById("article").innerHTML='<div><p>这是一个非常有趣的问题，涉及到 JavaScript 中函数对象的原型链设计。</p>\n<p>要理解为什么 <code>Function.__proto__ == Function.prototype</code>，我们需要从 JavaScript 的原型链机制说起。</p>\n<hr>\n<h3>1. 原型链回顾</h3>\n<p>在 JavaScript 中，每个对象都有一个内部属性 <code>[[Prototype]]</code>（通常通过 <code>__proto__</code> 访问），指向它的原型对象。当我们访问一个对象的属性时，如果该对象本身没有这个属性，就会沿着原型链向上查找。</p>\n<hr>\n<h3>2. 构造函数与原型对象</h3>\n<p>每个构造函数（比如 <code>Function</code>）都有一个 <code>prototype</code> 属性，指向它的原型对象。这个原型对象就是将来由该构造函数创建的实例的 <code>[[Prototype]]</code>。</p>\n<hr>\n<h3>3. Function 的特殊性</h3>\n<p><code>Function</code> 是一个构造函数，用于创建函数对象。同时，<code>Function</code> 本身也是一个函数（<code>typeof Function === \'function\'</code>），因此它也是由 <code>Function</code> 构造的。</p>\n<p>换句话说：</p>\n<pre><code class="language-javascript"><span class="hljs-title class_">Function</span>.<span class="hljs-property">constructor</span> === <span class="hljs-title class_">Function</span>; <span class="hljs-comment">// true</span>\n</code></pre>\n<p>这意味着：</p>\n<ul>\n<li><code>Function</code> 是由 <code>Function</code> 自身构造的。</li>\n<li>因此，<code>Function</code> 的 <code>[[Prototype]]</code> 就是 <code>Function.prototype</code>。</li>\n</ul>\n<hr>\n<h3>4. 结论</h3>\n<p>由于 <code>Function</code> 本身是一个函数，它的 <code>[[Prototype]]</code> 就是 <code>Function.prototype</code>，所以：</p>\n<pre><code class="language-javascript"><span class="hljs-title class_">Function</span>.<span class="hljs-property">__proto__</span> === <span class="hljs-title class_">Function</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>; <span class="hljs-comment">// true</span>\n</code></pre>\n<hr>\n<h3>5. 总结一句话</h3>\n<blockquote>\n<p><strong>因为 <code>Function</code> 是一个由自身构造的函数对象，所以它的原型链指向了它自己的 <code>prototype</code> 属性。</strong></p>\n</blockquote>\n<hr>\n<h3>6. 可视化结构（简化）</h3>\n<pre><code>Function\n├── constructor: Function\n├── __proto__ ─────┐\n└── prototype ─────┘\n</code></pre>\n<hr>\n<h3>7. 拓展：其他内置构造函数</h3>\n<p>类似地：</p>\n<pre><code class="language-javascript"><span class="hljs-title class_">Object</span>.<span class="hljs-property">__proto__</span> === <span class="hljs-title class_">Function</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>; <span class="hljs-comment">// true</span>\n<span class="hljs-title class_">Array</span>.<span class="hljs-property">__proto__</span> === <span class="hljs-title class_">Function</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>; <span class="hljs-comment">// true</span>\n<span class="hljs-title class_">RegExp</span>.<span class="hljs-property">__proto__</span> === <span class="hljs-title class_">Function</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>; <span class="hljs-comment">// true</span>\n</code></pre>\n<p>因为 <code>Object</code>、<code>Array</code>、<code>RegExp</code> 等都是由 <code>Function</code> 构造的函数对象。</p>\n</div>'</script></body></html>
