<script>
            document.getElementById('article').innerHTML = 
            "<div><p>处理Vue文件的Babel AST遍历需要结合Vue特定的解析方式，因为Vue文件包含多种语言块（template、script、style）。以下是具体步骤和示例代码：</p>\n<h3>1. <strong>解析Vue文件结构</strong></h3>\n<p>Vue文件需要先用<code>@vue/compiler-sfc</code>解析为SFC（单文件组件）结构，再分别处理各个语言块：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> { parse } = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;@vue/compiler-sfc&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> fs = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;fs&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> path = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;path&#x27;</span>);\n\n<span class=\"hljs-comment\">// 读取Vue文件并解析为SFC结构</span>\n<span class=\"hljs-keyword\">const</span> source = fs.<span class=\"hljs-title function_\">readFileSync</span>(path.<span class=\"hljs-title function_\">resolve</span>(<span class=\"hljs-string\">&#x27;Component.vue&#x27;</span>), <span class=\"hljs-string\">&#x27;utf8&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> { descriptor } = <span class=\"hljs-title function_\">parse</span>(source);\n\n<span class=\"hljs-comment\">// descriptor包含：</span>\n<span class=\"hljs-comment\">// - descriptor.script：JS/TS代码块</span>\n<span class=\"hljs-comment\">// - descriptor.template：HTML模板</span>\n<span class=\"hljs-comment\">// - descriptor.styles：CSS样式块</span>\n</code></pre>\n<h3>2. <strong>处理JavaScript/TypeScript代码块</strong></h3>\n<p>使用Babel处理<code>script</code>部分：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> parser = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;@babel/parser&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> traverse = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;@babel/traverse&#x27;</span>).<span class=\"hljs-property\">default</span>;\n\n<span class=\"hljs-keyword\">if</span> (descriptor.<span class=\"hljs-property\">script</span>) {\n  <span class=\"hljs-keyword\">const</span> scriptContent = descriptor.<span class=\"hljs-property\">script</span>.<span class=\"hljs-property\">content</span>;\n  \n  <span class=\"hljs-comment\">// 解析为Babel AST</span>\n  <span class=\"hljs-keyword\">const</span> ast = parser.<span class=\"hljs-title function_\">parse</span>(scriptContent, {\n    <span class=\"hljs-attr\">sourceType</span>: <span class=\"hljs-string\">&#x27;module&#x27;</span>,\n    <span class=\"hljs-attr\">plugins</span>: [<span class=\"hljs-string\">&#x27;jsx&#x27;</span>, <span class=\"hljs-string\">&#x27;typescript&#x27;</span>] <span class=\"hljs-comment\">// 根据项目添加插件</span>\n  });\n  \n  <span class=\"hljs-comment\">// 遍历AST（示例：查找所有method定义）</span>\n  <span class=\"hljs-title function_\">traverse</span>(ast, {\n    <span class=\"hljs-title class_\">MethodDefinition</span>(path) {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Found method:&#x27;</span>, path.<span class=\"hljs-property\">node</span>.<span class=\"hljs-property\">key</span>.<span class=\"hljs-property\">name</span>);\n    }\n  });\n}\n</code></pre>\n<h3>3. <strong>处理Vue模板（可选）</strong></h3>\n<p>使用<code>@vue/compiler-dom</code>解析模板：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> { compileTemplate } = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;@vue/compiler-dom&#x27;</span>);\n\n<span class=\"hljs-keyword\">if</span> (descriptor.<span class=\"hljs-property\">template</span>) {\n  <span class=\"hljs-keyword\">const</span> templateContent = descriptor.<span class=\"hljs-property\">template</span>.<span class=\"hljs-property\">content</span>;\n  \n  <span class=\"hljs-comment\">// 编译模板为渲染函数</span>\n  <span class=\"hljs-keyword\">const</span> { ast } = <span class=\"hljs-title function_\">compileTemplate</span>({\n    <span class=\"hljs-attr\">source</span>: templateContent\n  });\n  \n  <span class=\"hljs-comment\">// 遍历模板AST（示例：查找所有div标签）</span>\n  <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">walk</span>(<span class=\"hljs-params\">node</span>) {\n    <span class=\"hljs-keyword\">if</span> (node.<span class=\"hljs-property\">type</span> === <span class=\"hljs-number\">1</span> &amp;&amp; node.<span class=\"hljs-property\">tag</span> === <span class=\"hljs-string\">&#x27;div&#x27;</span>) {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Found div in template&#x27;</span>);\n    }\n    <span class=\"hljs-keyword\">if</span> (node.<span class=\"hljs-property\">children</span>) {\n      node.<span class=\"hljs-property\">children</span>.<span class=\"hljs-title function_\">forEach</span>(walk);\n    }\n  }\n  \n  <span class=\"hljs-title function_\">walk</span>(ast);\n}\n</code></pre>\n<h3>4. <strong>完整示例：遍历Vue文件所有部分</strong></h3>\n<p>下面是一个完整的脚本，演示如何遍历Vue文件的JavaScript代码和模板：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> { parse } = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;@vue/compiler-sfc&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> parser = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;@babel/parser&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> traverse = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;@babel/traverse&#x27;</span>).<span class=\"hljs-property\">default</span>;\n<span class=\"hljs-keyword\">const</span> { compileTemplate } = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;@vue/compiler-dom&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> fs = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;fs&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> path = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;path&#x27;</span>);\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">processVueFile</span>(<span class=\"hljs-params\">filePath</span>) {\n  <span class=\"hljs-keyword\">const</span> source = fs.<span class=\"hljs-title function_\">readFileSync</span>(filePath, <span class=\"hljs-string\">&#x27;utf8&#x27;</span>);\n  <span class=\"hljs-keyword\">const</span> { descriptor } = <span class=\"hljs-title function_\">parse</span>(source);\n\n  <span class=\"hljs-comment\">// 处理script部分</span>\n  <span class=\"hljs-keyword\">if</span> (descriptor.<span class=\"hljs-property\">script</span>) {\n    <span class=\"hljs-keyword\">const</span> scriptContent = descriptor.<span class=\"hljs-property\">script</span>.<span class=\"hljs-property\">content</span>;\n    <span class=\"hljs-keyword\">const</span> ast = parser.<span class=\"hljs-title function_\">parse</span>(scriptContent, {\n      <span class=\"hljs-attr\">sourceType</span>: <span class=\"hljs-string\">&#x27;module&#x27;</span>,\n      <span class=\"hljs-attr\">plugins</span>: [<span class=\"hljs-string\">&#x27;jsx&#x27;</span>, <span class=\"hljs-string\">&#x27;typescript&#x27;</span>]\n    });\n\n    <span class=\"hljs-title function_\">traverse</span>(ast, {\n      <span class=\"hljs-title class_\">MethodDefinition</span>(path) {\n        <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Method in script: <span class=\"hljs-subst\">${path.node.key.name}</span>`</span>);\n      }\n    });\n  }\n\n  <span class=\"hljs-comment\">// 处理template部分</span>\n  <span class=\"hljs-keyword\">if</span> (descriptor.<span class=\"hljs-property\">template</span>) {\n    <span class=\"hljs-keyword\">const</span> templateContent = descriptor.<span class=\"hljs-property\">template</span>.<span class=\"hljs-property\">content</span>;\n    <span class=\"hljs-keyword\">const</span> { ast } = <span class=\"hljs-title function_\">compileTemplate</span>({ <span class=\"hljs-attr\">source</span>: templateContent });\n\n    <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">walk</span>(<span class=\"hljs-params\">node</span>) {\n      <span class=\"hljs-keyword\">if</span> (node.<span class=\"hljs-property\">type</span> === <span class=\"hljs-number\">1</span> &amp;&amp; node.<span class=\"hljs-property\">tag</span>) {\n        <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Tag in template: <span class=\"hljs-subst\">${node.tag}</span>`</span>);\n      }\n      <span class=\"hljs-keyword\">if</span> (node.<span class=\"hljs-property\">children</span>) {\n        node.<span class=\"hljs-property\">children</span>.<span class=\"hljs-title function_\">forEach</span>(walk);\n      }\n    }\n\n    <span class=\"hljs-title function_\">walk</span>(ast);\n  }\n}\n\n<span class=\"hljs-comment\">// 使用示例</span>\n<span class=\"hljs-title function_\">processVueFile</span>(path.<span class=\"hljs-title function_\">resolve</span>(<span class=\"hljs-string\">&#x27;src/components/MyComponent.vue&#x27;</span>));\n</code></pre>\n<h3>关键依赖</h3>\n<p>确保安装以下依赖：</p>\n<pre><code class=\"language-sh\">npm install @vue/compiler-sfc @babel/parser @babel/traverse @vue/compiler-dom\n</code></pre>\n<h3>注意事项</h3>\n<ol>\n<li><strong>模板AST差异</strong>  ：Vue模板AST结构与Babel JS AST不同，需要使用Vue编译器API处理。</li>\n<li><strong>TypeScript支持</strong>  ：如果项目使用TypeScript，需添加<code>@babel/plugin-transform-typescript</code>插件。</li>\n<li><strong>插件生态</strong>  ：可结合<code>@babel/core</code>和Babel插件进行更复杂的转换。</li>\n</ol>\n<p>通过这种方式，你可以全面遍历Vue文件的各个部分并进行自定义处理。</p>\n</div>";
          </script></body></html>
