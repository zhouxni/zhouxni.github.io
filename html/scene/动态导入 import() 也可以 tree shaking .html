shake</h4>\n<pre><code class="language-js"><span class="hljs-comment">// big-module.js</span>\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">used</span> = (<span class="hljs-params"></span>) =&gt; <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;used&quot;</span>);\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">unused</span> = (<span class="hljs-params"></span>) =&gt; <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;unused&quot;</span>);\n</code></pre>\n<pre><code class="language-js"><span class="hljs-comment">// main.js</span>\n<span class="hljs-keyword">const</span> { used } = <span class="hljs-keyword">await</span> <span class="hljs-keyword">import</span>(<span class="hljs-string">&quot;./big-module.js&quot;</span>);\n<span class="hljs-title function_">used</span>();\n</code></pre>\n<ul>\n<li>虽然 <code>import(\'./big-module.js\')</code> 这个请求不会被移除，</li>\n<li>但如果打包器支持（如 Webpack 5 + ESM），<strong><code>unused</code> 函数仍可能被 tree shaking 掉</strong>   。</li>\n<li>也就是说：<strong>动态导入不会阻止模块内部的 tree shaking</strong>   。</li>\n</ul>\n<hr>\n<h3>✅ 实践建议：</h3>\n<table>\n<thead>\n<tr>\n<th>做法</th>\n<th>是否支持 tree shaking</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>import { used } from \'./module.js\'</code></td>\n<td>✅ 完全支持</td>\n<td>静态导入，可完全 tree shaking</td>\n</tr>\n<tr>\n<td><code>import(\'./module.js\').then(m =&gt; m.used)</code></td>\n<td>✅ 部分支持</td>\n<td>模块内部未使用的导出可被 tree shake</td>\n</tr>\n<tr>\n<td><code>require(\'./module.js\')</code></td>\n<td>❌ 不支持</td>\n<td>CommonJS 无法 tree shaking</td>\n</tr>\n<tr>\n<td><code>import()</code> + CommonJS</td>\n<td>❌ 不支持</td>\n<td>动态导入 CommonJS 模块无法 tree shake</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>✅ 总结一句话：</h3>\n<blockquote>\n<p><strong>动态导入不会阻止模块内部的 tree shaking，只要你导入的是 ES Module，且打包器支持。</strong><br>\n但它本身不会像静态导入那样“按需打包”，整个模块文件仍会被加载。</p>\n</blockquote>\n<hr>\n<p>如果你有具体的打包器（Webpack、Vite、Rollup）或配置场景，我可以帮你分析它是否真的能 tree shake。</p>\n</div>'</script></body></html>
