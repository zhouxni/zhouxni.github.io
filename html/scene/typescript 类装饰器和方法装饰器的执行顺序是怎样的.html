  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
        document.getElementById('article').innerHTML = 
        "<div><p>在 TypeScript 中，类装饰器和方法装饰器的执行顺序遵循一定的规则。具体来说：</p>\n<h3>执行顺序</h3>\n<ol>\n<li><strong>装饰器评估</strong>  ：\n<ul>\n<li>这一步会计算装饰器表达式的值，按照装饰器出现的顺序进行。首先是类装饰器，然后是类内部的装饰器（包括方法装饰器、属性装饰器等）。</li>\n</ul>\n</li>\n<li><strong>装饰器应用</strong>  ：\n<ul>\n<li>在应用装饰器时，顺序为：\n<ul>\n<li>方法装饰器</li>\n<li>属性装饰器</li>\n<li>类装饰器</li>\n</ul>\n</li>\n<li>也就是说，方法装饰器会先于属性装饰器和类装饰器执行。</li>\n</ul>\n</li>\n<li><strong>多个装饰器的执行顺序</strong>  ：\n<ul>\n<li>如果同一个类型的装饰器有多个，总是先执行后面的装饰器。这是因为装饰器的执行顺序与它们的声明顺序相反，类似于栈的行为（后进先出）。</li>\n</ul>\n</li>\n</ol>\n<h3>示例</h3>\n<p>以下是一个简单的示例，展示了类装饰器和方法装饰器的执行顺序：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">logClass</span>(<span class=\"hljs-params\"><span class=\"hljs-attr\">params</span>: <span class=\"hljs-built_in\">string</span></span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"><span class=\"hljs-attr\">target</span>: <span class=\"hljs-built_in\">any</span></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`类装饰器: <span class=\"hljs-subst\">${params}</span>`</span>);\n  };\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">logMethod</span>(<span class=\"hljs-params\"><span class=\"hljs-attr\">params</span>: <span class=\"hljs-built_in\">string</span></span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"><span class=\"hljs-attr\">target</span>: <span class=\"hljs-built_in\">any</span>, <span class=\"hljs-attr\">methodName</span>: <span class=\"hljs-built_in\">string</span>, <span class=\"hljs-attr\">desc</span>: <span class=\"hljs-title class_\">PropertyDescriptor</span></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`方法装饰器: <span class=\"hljs-subst\">${methodName}</span> - <span class=\"hljs-subst\">${params}</span>`</span>);\n  };\n}\n\n<span class=\"hljs-meta\">@logClass</span>(<span class=\"hljs-string\">&#x27;类装饰器1&#x27;</span>)\n<span class=\"hljs-meta\">@logClass</span>(<span class=\"hljs-string\">&#x27;类装饰器2&#x27;</span>)\n<span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">MyClass</span> {\n  <span class=\"hljs-meta\">@logMethod</span>(<span class=\"hljs-string\">&#x27;方法装饰器1&#x27;</span>)\n  <span class=\"hljs-title function_\">myMethod</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;方法执行&#x27;</span>);\n  }\n}\n\n<span class=\"hljs-keyword\">const</span> instance = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">MyClass</span>();\ninstance.<span class=\"hljs-title function_\">myMethod</span>();\n</code></pre>\n<h3>输出结果</h3>\n<p>执行上述代码时，控制台的输出顺序将是：</p>\n<pre><code>类装饰器: 类装饰器2\n类装饰器: 类装饰器1\n方法装饰器: myMethod - 方法装饰器1\n方法执行\n</code></pre>\n<h3>解释</h3>\n<ul>\n<li><strong>装饰器评估</strong>  ：首先计算 <code>@logClass('类装饰器1')</code> 和 <code>@logClass('类装饰器2')</code> 的值，得到两个装饰器函数。</li>\n<li><strong>装饰器应用</strong>  ：\n<ul>\n<li>先应用方法装饰器 <code>@logMethod('方法装饰器1')</code>，输出 <code>方法装饰器: myMethod - 方法装饰器1</code>。</li>\n<li>然后应用属性装饰器（本例中没有属性装饰器）。</li>\n<li>最后应用类装饰器，先执行 <code>@logClass('类装饰器2')</code>，输出 <code>类装饰器: 类装饰器2</code>，再执行 <code>@logClass('类装饰器1')</code>，输出 <code>类装饰器: 类装饰器1</code>。</li>\n</ul>\n</li>\n</ul>\n<h3>总结</h3>\n<p>在 TypeScript 中，装饰器的执行顺序是先评估后应用，且应用时遵循方法装饰器优先于属性装饰器和类装饰器的顺序。如果有多个同类型的装饰器，则后声明的装饰器先执行。</p>\n</div>";
      </script></body></html>
