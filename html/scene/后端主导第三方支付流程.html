<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="后端主导第三方支付流程",document.getElementById("article").innerHTML='<div><p>后端主导第三方支付时，前端的工作被压缩到“拿到一个 URL（或一段表单 HTML）→ 让浏览器跳过去→ 再回来”，但 C 端仍要把 4 件小事做到极致，否则照样掉单、客诉、审核被打回。</p>\n<hr>\n<ol>\n<li>后端主导的完整时序<br>\n① 前端：携带订单号调自家后台<br>\nGET /createPay?orderId=123<br>\n② 后台：\n<ul>\n<li>去第三方统一下单</li>\n<li>拿到 payUrl（或一段自动提交的 form）</li>\n<li>把 payUrl 302 给前端<br>\n③ 浏览器：直接跳到 payUrl，用户在第三方页面完成支付<br>\n④ 第三方：</li>\n<li>同步 redirect 回 <code>return_url</code>（仅作展示）</li>\n<li>异步 POST 到 <code>notify_url</code>（真正改订单状态）<br>\n⑤ 前端：在 return_url 页面轮询订单状态，展示结果</li>\n</ul>\n</li>\n</ol>\n<hr>\n<ol start="2">\n<li>前端必须做的 4 件小事\n<table>\n<thead>\n<tr>\n<th>小事</th>\n<th>触发场景</th>\n<th>前端动作</th>\n<th>兜底</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>防止多次跳转</td>\n<td>用户狂点支付按钮</td>\n<td>按钮置灰 + loading</td>\n<td>用 sessionStorage 标记 <code>pay_lock</code></td>\n</tr>\n<tr>\n<td>302 被拦截</td>\n<td>企业微信、QQ 内置浏览器会拦截外链</td>\n<td>先弹“即将跳转到微信/支付宝”确认框，用户点「继续」再 <code>location.href = payUrl</code></td>\n<td>提供“手动复制链接”按钮</td>\n</tr>\n<tr>\n<td>弱网空白</td>\n<td>跳转 3 秒没反应</td>\n<td>3 秒后 toast + 倒计时 5 秒后自动重试</td>\n<td>给出二维码备用</td>\n</tr>\n<tr>\n<td>回跳丢单</td>\n<td>用户支付完把浏览器杀掉，没回到 return_url</td>\n<td>return_url 页一加载就轮询订单接口 3 次，失败后提示“如已支付请稍等”</td>\n<td>短信 / push 补通知</td>\n</tr>\n</tbody>\n</table>\n</li>\n</ol>\n<hr>\n<ol start="3">\n<li>代码最小可运行片段</li>\n</ol>\n<pre><code class="language-js"><span class="hljs-comment">// 1. 防重复</span>\n<span class="hljs-keyword">if</span> (<span class="hljs-variable language_">sessionStorage</span>.<span class="hljs-title function_">getItem</span>(<span class="hljs-string">&quot;pay_lock&quot;</span>)) <span class="hljs-keyword">return</span>;\n<span class="hljs-variable language_">sessionStorage</span>.<span class="hljs-title function_">setItem</span>(<span class="hljs-string">&quot;pay_lock&quot;</span>, <span class="hljs-string">&quot;1&quot;</span>);\n\n<span class="hljs-comment">// 2. 拿跳转地址</span>\n<span class="hljs-title function_">fetch</span>(<span class="hljs-string">&quot;/createPay?orderId=123&quot;</span>)\n  .<span class="hljs-title function_">then</span>(<span class="hljs-function">(<span class="hljs-params">r</span>) =&gt;</span> r.<span class="hljs-title function_">json</span>())\n  .<span class="hljs-title function_">then</span>(<span class="hljs-function">(<span class="hljs-params">{ payUrl }</span>) =&gt;</span> {\n    <span class="hljs-comment">// 3. 用户确认再跳</span>\n    <span class="hljs-keyword">if</span> (<span class="hljs-title function_">confirm</span>(<span class="hljs-string">&quot;即将前往支付页面，是否继续？&quot;</span>)) {\n      location.<span class="hljs-property">href</span> = payUrl;\n    } <span class="hljs-keyword">else</span> {\n      <span class="hljs-variable language_">sessionStorage</span>.<span class="hljs-title function_">removeItem</span>(<span class="hljs-string">&quot;pay_lock&quot;</span>);\n    }\n  });\n</code></pre>\n<hr>\n<ol start="4">\n<li>一句话总结<br>\n后端主导时，前端看似只剩一行 <code>location.href = payUrl</code>，但真正决定成败的是：<br>\n<strong>跳转前防重、跳转中兼容、回跳后兜底，缺一环都会掉单。</strong></li>\n</ol>\n</div>'</script></body></html>
