<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="设备独立像素与物理像素",document.getElementById("article").innerHTML='<div><p><strong>设备独立像素（DIPs） vs. 物理像素（Physical Pixels）</strong></p>\n<p><strong>1. 定义</strong></p>\n<table>\n<thead>\n<tr>\n<th>概念</th>\n<th>描述</th>\n<th>示例</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>物理像素（Physical Pixels）</td>\n<td>屏幕实际的最小发光点（硬件决定），如 <code>1920×1080</code>。</td>\n<td>4K 屏有 <code>3840×2160</code> 物理像素。</td>\n</tr>\n<tr>\n<td>设备独立像素（DIPs/DIPs）</td>\n<td>由操作系统/浏览器定义的虚拟单位，用于在不同 DPI 设备上保持一致的视觉尺寸。</td>\n<td><code>1 DIP ≈ 1 CSS 像素</code>（标准 DPI 下）。</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<p><strong>2. 核心区别</strong></p>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th>物理像素</th>\n<th>设备独立像素（DIPs）</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决定因素</td>\n<td>屏幕硬件（如面板分辨率）。</td>\n<td>操作系统/浏览器（如 CSS 单位 <code>px</code>）。</td>\n</tr>\n<tr>\n<td>是否可变</td>\n<td>❌ 固定（硬件层）。</td>\n<td>✅ 可缩放（如高 DPI 屏下 1 DIP = 2 物理像素）。</td>\n</tr>\n<tr>\n<td>用途</td>\n<td>存储图像细节（如 Canvas 位图）。</td>\n<td>保证 UI/文字在不同设备上视觉大小一致。</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<p><strong>3. 关系公式</strong><br>\n设备像素比（DPR） = 物理像素 / 设备独立像素<br>\n（即 <code>window.devicePixelRatio</code>）</p>\n<ul>\n<li>\n<p>普通屏幕（DPR=1）:</p>\n<p><code>1 DIP = 1 物理像素</code>（如 <code>width: 100px</code> 占 100 物理像素）。</p>\n</li>\n<li>\n<p>Retina 屏（DPR=2）:</p>\n<p><code>1 DIP = 2 物理像素</code>（如 <code>width: 100px</code> 占 200 物理像素）。</p>\n</li>\n</ul>\n<hr>\n<p><strong>4. 对 Canvas 的影响</strong></p>\n<ul>\n<li>\n<p>Canvas 位图基于物理像素（由 <code>canvas.width/height</code> 直接设置）。</p>\n</li>\n<li>\n<p>若未适配 DPR：</p>\n<ul>\n<li>在 DPR=2 的屏幕上，<code>canvas.width=300</code> 仅占用 150 DIPs，导致图像模糊（位图像素不足）。</li>\n</ul>\n</li>\n<li>\n<p>解决方案：</p>\n</li>\n</ul>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> canvas = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">&#x27;canvas&#x27;</span>);\n<span class="hljs-keyword">const</span> dpr = <span class="hljs-variable language_">window</span>.<span class="hljs-property">devicePixelRatio</span> || <span class="hljs-number">1</span>;\ncanvas.<span class="hljs-property">width</span> = <span class="hljs-number">300</span> * dpr; <span class="hljs-comment">// 物理像素 = DIPs × DPR</span>\ncanvas.<span class="hljs-property">height</span> = <span class="hljs-number">150</span> * dpr;\n<span class="hljs-keyword">const</span> ctx = canvas.<span class="hljs-title function_">getContext</span>(<span class="hljs-string">&#x27;2d&#x27;</span>);\nctx.<span class="hljs-title function_">scale</span>(dpr, dpr); <span class="hljs-comment">// 保持绘图逻辑基于 DIPs</span>\n</code></pre>\n<hr>\n<p><strong>5. 总结</strong></p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>物理像素</th>\n<th>设备独立像素（DIPs）</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>定义</td>\n<td>硬件最小发光点。</td>\n<td>跨设备统一的视觉单位。</td>\n</tr>\n<tr>\n<td>Canvas 位图</td>\n<td>✅ 直接存储（<code>canvas.width/height</code>）。</td>\n<td>❌ 需通过 DPR 转换适配。</td>\n</tr>\n<tr>\n<td>CSS/UI 设计</td>\n<td>❌ 不直接使用。</td>\n<td>✅ 默认单位（如 <code>px</code> 实际是 DIPs）。</td>\n</tr>\n</tbody>\n</table>\n<p>关键结论：</p>\n<ul>\n<li>\n<p>物理像素是绝对的，决定图像细节。</p>\n</li>\n<li>\n<p>DIPs 是相对的，保证视觉一致性。</p>\n</li>\n<li>\n<p>Canvas 开发需主动处理 DPR，否则高清屏显示模糊。</p>\n</li>\n</ul>\n</div>'</script></body></html>
