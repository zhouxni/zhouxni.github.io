<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Object.assign() 和扩展运算符(...)的区别",document.getElementById("article").innerHTML='<div><p><code>Object.assign()</code> 和扩展运算符 <code>...</code> 都是 JavaScript 中用于对象合并的常用方法，但它们有一些重要的区别。</p>\n<h2>基本用法对比</h2>\n<h3>Object.assign()</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> obj1 = { <span class="hljs-attr">a</span>: <span class="hljs-number">1</span> };\n<span class="hljs-keyword">const</span> obj2 = { <span class="hljs-attr">b</span>: <span class="hljs-number">2</span> };\n<span class="hljs-keyword">const</span> result = <span class="hljs-title class_">Object</span>.<span class="hljs-title function_">assign</span>({}, obj1, obj2);\n<span class="hljs-comment">// result: { a: 1, b: 2 }</span>\n</code></pre>\n<h3>扩展运算符</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> obj1 = { <span class="hljs-attr">a</span>: <span class="hljs-number">1</span> };\n<span class="hljs-keyword">const</span> obj2 = { <span class="hljs-attr">b</span>: <span class="hljs-number">2</span> };\n<span class="hljs-keyword">const</span> result = { ...obj1, ...obj2 };\n<span class="hljs-comment">// result: { a: 1, b: 2 }</span>\n</code></pre>\n<h2>主要区别</h2>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th>Object.assign()</th>\n<th>扩展运算符 (...)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>语法简洁性</strong></td>\n<td>较冗长</td>\n<td>更简洁</td>\n</tr>\n<tr>\n<td><strong>原型属性</strong></td>\n<td>会复制</td>\n<td>不会复制</td>\n</tr>\n<tr>\n<td><strong>Symbol属性</strong></td>\n<td>会复制</td>\n<td>会复制</td>\n</tr>\n<tr>\n<td><strong>不可枚举属性</strong></td>\n<td>不会复制</td>\n<td>不会复制</td>\n</tr>\n<tr>\n<td><strong>性能</strong></td>\n<td>通常更快</td>\n<td>通常稍慢</td>\n</tr>\n<tr>\n<td><strong>浏览器兼容性</strong></td>\n<td>ES5+</td>\n<td>ES2018+</td>\n</tr>\n<tr>\n<td><strong>空值处理</strong></td>\n<td>会忽略null/undefined</td>\n<td>会抛出TypeError</td>\n</tr>\n</tbody>\n</table>\n<h2>详细区别说明</h2>\n<h3>1. 原型链处理</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">class</span> <span class="hljs-title class_">MyClass</span> {\n  <span class="hljs-title function_">constructor</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">a</span> = <span class="hljs-number">1</span>;\n  }\n}\n<span class="hljs-title class_">MyClass</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">b</span> = <span class="hljs-number">2</span>;\n\n<span class="hljs-keyword">const</span> obj = <span class="hljs-keyword">new</span> <span class="hljs-title class_">MyClass</span>();\n\n<span class="hljs-comment">// Object.assign() - 只复制自身属性</span>\n<span class="hljs-keyword">const</span> assignCopy = <span class="hljs-title class_">Object</span>.<span class="hljs-title function_">assign</span>({}, obj);\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(assignCopy); <span class="hljs-comment">// { a: 1 }</span>\n\n<span class="hljs-comment">// 扩展运算符 - 也只复制自身属性</span>\n<span class="hljs-keyword">const</span> spreadCopy = { ...obj };\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(spreadCopy); <span class="hljs-comment">// { a: 1 }</span>\n</code></pre>\n<h3>2. Symbol属性处理</h3>\n<p>两者都会复制Symbol属性：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> symbolKey = <span class="hljs-title class_">Symbol</span>(<span class="hljs-string">&#x27;key&#x27;</span>);\n<span class="hljs-keyword">const</span> obj = { [symbolKey]: <span class="hljs-string">&#x27;value&#x27;</span> };\n\n<span class="hljs-keyword">const</span> assignCopy = <span class="hljs-title class_">Object</span>.<span class="hljs-title function_">assign</span>({}, obj);\n<span class="hljs-keyword">const</span> spreadCopy = { ...obj };\n\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(assignCopy[symbolKey]); <span class="hljs-comment">// &#x27;value&#x27;</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(spreadCopy[symbolKey]); <span class="hljs-comment">// &#x27;value&#x27;</span>\n</code></pre>\n<h3>3. 不可枚举属性处理</h3>\n<p>两者都不会复制不可枚举属性：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> obj = {};\n<span class="hljs-title class_">Object</span>.<span class="hljs-title function_">defineProperty</span>(obj, <span class="hljs-string">&#x27;hidden&#x27;</span>, {\n  <span class="hljs-attr">value</span>: <span class="hljs-string">&#x27;secret&#x27;</span>,\n  <span class="hljs-attr">enumerable</span>: <span class="hljs-literal">false</span>\n});\n\n<span class="hljs-keyword">const</span> assignCopy = <span class="hljs-title class_">Object</span>.<span class="hljs-title function_">assign</span>({}, obj);\n<span class="hljs-keyword">const</span> spreadCopy = { ...obj };\n\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;hidden&#x27;</span> <span class="hljs-keyword">in</span> assignCopy); <span class="hljs-comment">// false</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;hidden&#x27;</span> <span class="hljs-keyword">in</span> spreadCopy); <span class="hljs-comment">// false</span>\n</code></pre>\n<h3>4. 空值处理差异</h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// Object.assign() 会忽略null和undefined源对象</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-title function_">assign</span>({}, <span class="hljs-literal">null</span>, <span class="hljs-literal">undefined</span>); <span class="hljs-comment">// {}</span>\n\n<span class="hljs-comment">// 扩展运算符会抛出错误</span>\n<span class="hljs-keyword">try</span> {\n  <span class="hljs-keyword">const</span> obj = { ...<span class="hljs-literal">null</span>, ...<span class="hljs-literal">undefined</span> };\n} <span class="hljs-keyword">catch</span> (e) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(e); <span class="hljs-comment">// TypeError: Cannot spread non-iterable objects</span>\n}\n</code></pre>\n<h3>5. 性能比较</h3>\n<p>在大多数JavaScript引擎中，<code>Object.assign()</code> 的性能略优于扩展运算符，特别是在处理大型对象时。</p>\n<h2>使用建议</h2>\n<ol>\n<li><strong>优先使用扩展运算符</strong>   - 语法更简洁，可读性更好（现代代码）</li>\n<li><strong>需要处理null/undefined时</strong>   - 使用<code>Object.assign()</code></li>\n<li><strong>需要支持旧浏览器时</strong>   - 使用<code>Object.assign()</code>或Babel转译</li>\n<li><strong>性能关键代码</strong>   - 考虑使用<code>Object.assign()</code></li>\n</ol>\n<h2>特殊用例</h2>\n<h3>深度合并</h3>\n<p>两者都只做浅拷贝，要实现深度合并需要递归或其他方法：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> obj1 = { <span class="hljs-attr">a</span>: { <span class="hljs-attr">b</span>: <span class="hljs-number">1</span> } };\n<span class="hljs-keyword">const</span> obj2 = { <span class="hljs-attr">a</span>: { <span class="hljs-attr">c</span>: <span class="hljs-number">2</span> } };\n\n<span class="hljs-comment">// 浅合并</span>\n<span class="hljs-keyword">const</span> shallowMerge = { ...obj1, ...obj2 };\n<span class="hljs-comment">// { a: { c: 2 } } - obj1.a被完全覆盖</span>\n\n<span class="hljs-comment">// 需要手动深度合并</span>\n<span class="hljs-keyword">const</span> deepMerge = {\n  ...obj1,\n  <span class="hljs-attr">a</span>: {\n    ...obj1.<span class="hljs-property">a</span>,\n    ...obj2.<span class="hljs-property">a</span>\n  }\n};\n<span class="hljs-comment">// { a: { b: 1, c: 2 } }</span>\n</code></pre>\n<p>总之，在大多数现代JavaScript开发中，扩展运算符是更受欢迎的选择，但在特定情况下<code>Object.assign()</code>仍有其用途。</p>\n</div>'</script></body></html>
