<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="为什么 Object 可以是构造函数",document.getElementById("article").innerHTML='<div><p>因为 <strong>“Object” 这个名字在 JavaScript 里同时指向两样东西：</strong></p>\n<ol>\n<li><strong>一个内置的函数对象</strong>   （<code>function Object() { [native code] }</code>）；</li>\n<li><strong>一个全局命名空间对象</strong>   （<code>Object.xxx</code> 提供的所有静态方法：create、keys、assign…）。</li>\n</ol>\n<p>只有第 1 个角色让它能够充当构造函数；第 2 个角色只是普通对象，用来挂载工具方法。<br>\n两个角色共用同一段内置函数，所以看上去“Object 既是对象又是函数”。</p>\n<hr>\n<h3>证明它真的是函数</h3>\n<pre><code class="language-js"><span class="hljs-keyword">typeof</span> <span class="hljs-title class_">Object</span>; <span class="hljs-comment">// &quot;function&quot;</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>; <span class="hljs-comment">// 存在，指向 Object 的 prototype 对象</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-title function_">hasOwnProperty</span>(<span class="hljs-string">&quot;prototype&quot;</span>); <span class="hljs-comment">// true</span>\n</code></pre>\n<ul>\n<li>作为函数，它天生带 <code>prototype</code> 属性；</li>\n<li>因此 <code>new Object()</code> 合法，内部会用这个 <code>prototype</code> 作为新对象的原型。</li>\n</ul>\n<hr>\n<h3>与 <code>new Object()</code> 返回的普通对象区别</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> o1 = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Object</span>(); <span class="hljs-comment">// 普通对象</span>\n<span class="hljs-keyword">const</span> o2 = <span class="hljs-title class_">Object</span>; <span class="hljs-comment">// 这是函数本身</span>\n\n<span class="hljs-keyword">typeof</span> o1; <span class="hljs-comment">// &quot;object&quot;</span>\n<span class="hljs-keyword">typeof</span> o2; <span class="hljs-comment">// &quot;function&quot;</span>\n\no1.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>; <span class="hljs-comment">// undefined</span>\no2.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>; <span class="hljs-comment">// [object Object]  (Object.prototype)</span>\n</code></pre>\n<hr>\n<h3>一句话总结</h3>\n<blockquote>\n<p><strong>Object 能当构造函数，是因为它就是一段内置函数；而 <code>new Object()</code> 返回的只是这段函数构造出来的普通对象，普通对象没有 <code>prototype</code>，自然不能再被 <code>new</code>。</strong></p>\n</blockquote>\n</div>'</script></body></html>
