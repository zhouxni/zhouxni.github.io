<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="window中 location 和 history 设置导航的区别",document.getElementById("article").innerHTML='<div><p>在前端开发中，<code>window.location</code> 和 <code>window.history</code> 都可以用于实现路由导航，但它们的工作方式和适用场景有显著区别：</p>\n<h3>1. <code>window.location</code> - 页面跳转式导航</h3>\n<p><code>window.location</code> 用于直接跳转到新的 URL，本质上是加载新页面，会导致浏览器重新请求资源并刷新页面。</p>\n<p><strong>常用方法</strong>   ：</p>\n<ul>\n<li><code>location.href = &quot;new-url&quot;</code>：跳转到新 URL（最常用）</li>\n<li><code>location.assign(&quot;new-url&quot;)</code>：与 <code>href</code> 效果相同</li>\n<li><code>location.replace(&quot;new-url&quot;)</code>：跳转到新 URL 并替换当前历史记录（无法通过后退回到原页面）</li>\n<li><code>location.reload()</code>：重新加载当前页面</li>\n</ul>\n<p><strong>特点</strong>   ：</p>\n<ul>\n<li>会触发页面刷新，所有 JavaScript 上下文和内存数据都会被重置</li>\n<li>会在浏览器历史记录中添加新条目（<code>replace</code> 方法除外）</li>\n<li>可以跨域跳转（跳转到不同域名的网站）</li>\n<li>跳转时可以携带查询参数（<code>?key=value</code>）</li>\n</ul>\n<h3>2. <code>window.history</code> - 无刷新式导航</h3>\n<p><code>window.history</code> 用于操作浏览器的历史记录栈，实现无刷新的页面导航，是单页应用（SPA）路由的基础。</p>\n<p><strong>常用方法</strong>   ：</p>\n<ul>\n<li><code>history.pushState(state, title, url)</code>：添加新历史记录条目，不刷新页面</li>\n<li><code>history.replaceState(state, title, url)</code>：替换当前历史记录条目，不刷新页面</li>\n<li><code>history.back()</code>：后退到上一页（相当于点击浏览器后退按钮）</li>\n<li><code>history.forward()</code>：前进到下一页（相当于点击浏览器前进按钮）</li>\n<li><code>history.go(n)</code>：跳转到历史记录中第 n 个位置的页面（n 为正数前进，负数后退）</li>\n</ul>\n<p><strong>特点</strong>   ：</p>\n<ul>\n<li>不会触发页面刷新，只是修改浏览器地址栏 URL 和历史记录</li>\n<li>可以存储相关状态数据（<code>state</code> 参数），供后续访问</li>\n<li>只能修改同源 URL（协议、域名、端口必须相同）</li>\n<li>不会发送新的网络请求，需要配合前端路由逻辑（如 React Router、Vue Router）来更新页面内容</li>\n</ul>\n<h3>核心区别对比</h3>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th><code>window.location</code></th>\n<th><code>window.history</code></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>页面刷新</td>\n<td>会刷新页面</td>\n<td>不会刷新页面</td>\n</tr>\n<tr>\n<td>历史记录</td>\n<td>添加新记录（<code>replace</code> 除外）</td>\n<td>可添加或替换记录</td>\n</tr>\n<tr>\n<td>跨域支持</td>\n<td>支持跨域跳转</td>\n<td>仅支持同源 URL</td>\n</tr>\n<tr>\n<td>数据保留</td>\n<td>会丢失页面内存数据</td>\n<td>可保留页面内存数据</td>\n</tr>\n<tr>\n<td>适用场景</td>\n<td>传统多页应用跳转</td>\n<td>单页应用（SPA）路由</td>\n</tr>\n</tbody>\n</table>\n<h3>应用场景建议</h3>\n<ul>\n<li>当需要跳转到全新页面（尤其是不同域名）时，使用 <code>window.location</code></li>\n<li>当开发单页应用（SPA），需要无刷新切换内容时，使用 <code>window.history</code> 配合前端路由库</li>\n<li>当需要避免用户通过后退按钮回到某个页面时，使用 <code>location.replace()</code> 或 <code>history.replaceState()</code></li>\n</ul>\n<p>例如，在单页应用中，我们通常使用 <code>history.pushState()</code> 来实现无刷新导航，并监听 <code>popstate</code> 事件来处理用户的前进/后退操作：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 添加新历史记录并更新页面内容</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">navigateTo</span>(<span class="hljs-params">path, data</span>) {\n  history.<span class="hljs-title function_">pushState</span>(data, <span class="hljs-string">&quot;&quot;</span>, path);\n  <span class="hljs-title function_">updatePageContent</span>(path); <span class="hljs-comment">// 自定义函数，更新页面内容</span>\n}\n\n<span class="hljs-comment">// 监听前进/后退按钮</span>\n<span class="hljs-variable language_">window</span>.<span class="hljs-title function_">addEventListener</span>(<span class="hljs-string">&quot;popstate&quot;</span>, <span class="hljs-function">(<span class="hljs-params">event</span>) =&gt;</span> {\n  <span class="hljs-title function_">updatePageContent</span>(<span class="hljs-variable language_">window</span>.<span class="hljs-property">location</span>.<span class="hljs-property">pathname</span>);\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;状态数据:&quot;</span>, event.<span class="hljs-property">state</span>);\n});\n</code></pre>\n</div>'</script></body></html>
