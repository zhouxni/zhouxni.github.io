<!DOCTYPE html><html lang="en"><head>

    <link rel="stylesheet" href="../../css/github.min.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;

      padding: 45px 15px;
    }
  </style></head>
  
  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p><code>document.designMode</code> 是一个用于控制整个文档是否可编辑的 HTML DOM 属性。以下是关于 <code>document.designMode</code> 的详细解析：</p>\n<h3>一、基本功能</h3>\n<ul>\n<li><strong>作用</strong>  ：<code>document.designMode</code> 允许开发者将整个文档设置为可编辑状态，类似于富文本编辑器。</li>\n<li><strong>有效值</strong>  ：\n<ul>\n<li><code>&quot;on&quot;</code>：将文档设置为可编辑状态。</li>\n<li><code>&quot;off&quot;</code>：将文档设置为不可编辑状态（默认值）。</li>\n</ul>\n</li>\n</ul>\n<h3>二、使用方法</h3>\n<ul>\n<li><strong>启用编辑模式</strong>  ：通过 JavaScript 将 <code>document.designMode</code> 设置为 <code>&quot;on&quot;</code>。<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">designMode</span> = <span class=\"hljs-string\">&quot;on&quot;</span>;\n</code></pre>\n</li>\n<li><strong>禁用编辑模式</strong>  ：通过 JavaScript 将 <code>document.designMode</code> 设置为 <code>&quot;off&quot;</code>。<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">designMode</span> = <span class=\"hljs-string\">&quot;off&quot;</span>;\n</code></pre>\n</li>\n</ul>\n<h3>三、浏览器兼容性</h3>\n<ul>\n<li><strong>现代浏览器</strong>  ：大多数现代浏览器（如 Chrome、Firefox、Edge、Safari 等）都支持 <code>document.designMode</code> 属性。</li>\n<li><strong>早期版本</strong>  ：早期版本的 Chrome 和 IE 默认为 <code>&quot;inherit&quot;</code>，但从 Chrome 43 开始，默认值为 <code>&quot;off&quot;</code>，并且不再支持 <code>&quot;inherit&quot;</code>。</li>\n<li><strong>IE 浏览器</strong>  ：IE 6 到 IE 10 中，<code>document.designMode</code> 的值被大写（如 <code>&quot;ON&quot;</code> 和 <code>&quot;OFF&quot;</code>）。</li>\n</ul>\n<h3>四、应用场景</h3>\n<ul>\n<li><strong>富文本编辑器</strong>  ：<code>document.designMode</code> 可以用于实现简单的富文本编辑器，允许用户在网页上直接编辑文本和格式。</li>\n<li><strong>内容复制</strong>  ：在遇到不好复制的内容时，可以通过启用编辑模式来方便地选择和复制文本。</li>\n</ul>\n<h3>五、注意事项</h3>\n<ul>\n<li><strong>安全性</strong>  ：启用编辑模式后，用户可以对文档进行任意修改，因此需要注意安全性问题，避免用户输入恶意代码。</li>\n<li><strong>性能</strong>  ：启用编辑模式可能会对页面性能产生一定影响，特别是在处理大量文本时。</li>\n<li><strong>兼容性</strong>  ：由于不同浏览器对 <code>document.designMode</code> 的支持可能存在差异，因此在使用时需要进行充分的测试。</li>\n</ul>\n<h3>六、示例代码</h3>\n<p>以下是一个简单的示例代码，展示了如何使用 <code>document.designMode</code> 启用和禁用编辑模式：</p>\n<pre><code class=\"language-html\"><span class=\"hljs-meta\">&lt;!DOCTYPE <span class=\"hljs-keyword\">html</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">&quot;en&quot;</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">head</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">charset</span>=<span class=\"hljs-string\">&quot;UTF-8&quot;</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;viewport&quot;</span> <span class=\"hljs-attr\">content</span>=<span class=\"hljs-string\">&quot;width=device-width, initial-scale=1.0&quot;</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>Document Design Mode Example<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">head</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">&quot;editableContent&quot;</span> <span class=\"hljs-attr\">style</span>=<span class=\"hljs-string\">&quot;border: 1px solid #ccc; padding: 10px; min-height: 200px;&quot;</span>&gt;</span>\n        这是一个可编辑的区域。\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onclick</span>=<span class=\"hljs-string\">&quot;enableEditMode()&quot;</span>&gt;</span>启用编辑模式<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onclick</span>=<span class=\"hljs-string\">&quot;disableEditMode()&quot;</span>&gt;</span>禁用编辑模式<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n        <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">enableEditMode</span>(<span class=\"hljs-params\"></span>) {\n            <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">designMode</span> = <span class=\"hljs-string\">&quot;on&quot;</span>;\n        }\n\n        <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">disableEditMode</span>(<span class=\"hljs-params\"></span>) {\n            <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">designMode</span> = <span class=\"hljs-string\">&quot;off&quot;</span>;\n        }\n    </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">html</span>&gt;</span>\n</code></pre>\n<p>在这个示例中，点击“启用编辑模式”按钮会将整个文档设置为可编辑状态，而点击“禁用编辑模式”按钮则会将文档恢复为不可编辑状态。</p>\n</div>";
      </script></body></html>
