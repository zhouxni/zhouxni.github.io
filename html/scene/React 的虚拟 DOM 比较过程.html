<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="React 的虚拟 DOM 比较过程",document.getElementById("article").innerHTML="<div><p>React 的虚拟 DOM 比较过程就是 <strong>Fiber Reconciler 的 Diff 算法</strong><br>\n核心目标：在「可中断」的前提下，把旧的 Fiber 树与新的 JSX（新的 VDOM）做最小化更新。</p>\n<p>下面用 3 个关键词 30 秒说清：</p>\n<ol>\n<li>\n<p><strong>单节点 Diff</strong><br>\n先比较 <code>key</code> + <code>type</code>（标签名或组件名）。</p>\n<ul>\n<li>相同 → 复用旧 Fiber，继续深入。</li>\n<li>不同 → 整棵子树标记为「删除」，然后新建整棵子树。</li>\n</ul>\n</li>\n<li>\n<p><strong>多节点 Diff（List）</strong><br>\n第一轮：遍历新旧子节点，按顺序比对 <code>key</code> 与 <code>type</code>，能复用就复用。<br>\n第二轮：对剩余节点建立 <strong>Map&lt;key, oldFiber&gt;</strong>   ，O(1) 查找复用。<br>\n第三轮：按顺序把「新增 / 移动 / 删除」打上 EffectTag。</p>\n</li>\n<li>\n<p><strong>组件 Diff</strong><br>\n把组件也当成一种「type」；若 type 变了直接卸载旧实例再 mount 新实例；type 不变则调用 <code>render → 继续 diff 子 Fiber</code>。</p>\n</li>\n</ol>\n<p>一句话总结：<br>\n<strong>React 的 diff 就是「key + type 作为开关」+「两轮遍历打补丁」+「可中断的 Fiber 遍历」，最终生成 Effect 链表在 commit 阶段一次性 DOM 操作。</strong></p>\n</div>"</script></body></html>
