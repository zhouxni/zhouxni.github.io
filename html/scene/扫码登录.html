<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="扫码登录",document.getElementById("article").innerHTML='<div><p>扫码登录是一种便捷的身份验证方式，用户通过扫描二维码完成登录，无需手动输入账号密码。以下是其核心流程和实现步骤：</p>\n<hr>\n<h3><strong>一、扫码登录的核心流程</strong></h3>\n<ol>\n<li><strong>生成二维码</strong>\n<ul>\n<li>服务端生成一个<strong>临时唯一令牌（Token）</strong>  ，并绑定当前设备/会话状态（如未登录）。</li>\n<li>将令牌编码为二维码内容（通常是一个带参数的URL，如 <code>https://example.com/login?token=xxx</code>）。</li>\n</ul>\n</li>\n<li><strong>用户扫码</strong>\n<ul>\n<li>用户使用<strong>已登录的移动端APP</strong>  （如微信、支付宝）扫描二维码。</li>\n<li>APP解析二维码中的令牌，并向服务端发送<strong>扫码确认请求</strong>  （携带令牌和用户身份）。</li>\n</ul>\n</li>\n<li><strong>服务端验证</strong>\n<ul>\n<li>服务端校验令牌的有效性（是否过期、是否未被使用）。</li>\n<li>确认后，将令牌状态更新为**“已扫描”**  ，并返回用户基本信息（如头像、昵称）给网页端展示。</li>\n</ul>\n</li>\n<li><strong>用户确认登录</strong>\n<ul>\n<li>移动端APP提示用户确认登录（防止误操作）。</li>\n<li>用户点击确认后，APP通知服务端<strong>授权登录</strong>  。</li>\n</ul>\n</li>\n<li><strong>网页端完成登录</strong>\n<ul>\n<li>服务端绑定令牌与用户账号，生成登录凭证（如Session或JWT）。</li>\n<li>网页端通过轮询或WebSocket获取凭证，完成登录跳转。</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h3><strong>二、技术实现步骤（以Web为例）</strong></h3>\n<h4><strong>1. 服务端准备</strong></h4>\n<ul>\n<li><strong>接口设计</strong>  ：\n<ul>\n<li><code>GET /api/qrcode/generate</code> → 生成令牌和二维码。</li>\n<li><code>POST /api/qrcode/scan</code> → 移动端扫码后调用。</li>\n<li><code>POST /api/qrcode/confirm</code> → 移动端确认登录。</li>\n<li><code>GET /api/qrcode/check?token=xxx</code> → 网页端轮询登录状态。</li>\n</ul>\n</li>\n<li><strong>令牌管理</strong>  ：<br>\n使用Redis存储临时令牌，设置过期时间（如300秒）：<pre><code class="language-python"><span class="hljs-comment"># Python示例（Redis）</span>\n<span class="hljs-keyword">import</span> redis\nr = redis.Redis()\ntoken = <span class="hljs-string">&quot;qrcode_123456&quot;</span>\nr.setex(token, <span class="hljs-number">300</span>, <span class="hljs-string">&quot;unscanned&quot;</span>)  <span class="hljs-comment"># 初始状态：未扫描</span>\n</code></pre>\n</li>\n</ul>\n<h4><strong>2. 网页端逻辑</strong></h4>\n<pre><code class="language-javascript"><span class="hljs-comment">// 1. 生成二维码</span>\n<span class="hljs-keyword">const</span> response = <span class="hljs-keyword">await</span> <span class="hljs-title function_">fetch</span>(<span class="hljs-string">&#x27;/api/qrcode/generate&#x27;</span>);\n<span class="hljs-keyword">const</span> { token, qrcodeUrl } = <span class="hljs-keyword">await</span> response.<span class="hljs-title function_">json</span>();\n\n<span class="hljs-comment">// 2. 显示二维码（使用第三方库如qrcode.js）</span>\n<span class="hljs-keyword">const</span> qrElement = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">getElementById</span>(<span class="hljs-string">&#x27;qrcode&#x27;</span>);\n<span class="hljs-title class_">QRCode</span>.<span class="hljs-title function_">toCanvas</span>(qrElement, qrcodeUrl);\n\n<span class="hljs-comment">// 3. 轮询检查登录状态</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">checkLogin</span> = <span class="hljs-keyword">async</span> (<span class="hljs-params"></span>) =&gt; {\n  <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> <span class="hljs-title function_">fetch</span>(<span class="hljs-string">`/api/qrcode/check?token=<span class="hljs-subst">${token}</span>`</span>);\n  <span class="hljs-keyword">const</span> data = <span class="hljs-keyword">await</span> res.<span class="hljs-title function_">json</span>();\n  <span class="hljs-keyword">if</span> (data.<span class="hljs-property">status</span> === <span class="hljs-string">&#x27;confirmed&#x27;</span>) {\n    <span class="hljs-comment">// 登录成功，跳转页面</span>\n    <span class="hljs-variable language_">window</span>.<span class="hljs-property">location</span>.<span class="hljs-property">href</span> = <span class="hljs-string">&#x27;/home&#x27;</span>;\n  }\n};\n<span class="hljs-built_in">setInterval</span>(checkLogin, <span class="hljs-number">2000</span>); <span class="hljs-comment">// 每2秒轮询一次</span>\n</code></pre>\n<h4><strong>3. 移动端逻辑（以微信为例）</strong></h4>\n<ul>\n<li>扫码后调用微信JS-SDK或原生API，向服务端发送扫码通知：<pre><code class="language-javascript"><span class="hljs-comment">// 微信内扫码后调用服务端接口</span>\nwx.<span class="hljs-title function_">scanQRCode</span>({\n  <span class="hljs-attr">success</span>: <span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n    <span class="hljs-keyword">const</span> token = <span class="hljs-title function_">extractTokenFromUrl</span>(res.<span class="hljs-property">result</span>); <span class="hljs-comment">// 从二维码URL提取token</span>\n    <span class="hljs-title function_">fetch</span>(<span class="hljs-string">&#x27;https://api.example.com/qrcode/scan&#x27;</span>, {\n      <span class="hljs-attr">method</span>: <span class="hljs-string">&#x27;POST&#x27;</span>,\n      <span class="hljs-attr">body</span>: <span class="hljs-title class_">JSON</span>.<span class="hljs-title function_">stringify</span>({ token, <span class="hljs-attr">user_id</span>: <span class="hljs-string">&#x27;当前用户ID&#x27;</span> })\n    });\n  }\n});\n</code></pre>\n</li>\n</ul>\n<h4><strong>4. 安全性措施</strong></h4>\n<ul>\n<li><strong>令牌防篡改</strong>  ：使用JWT签名或加密令牌。</li>\n<li><strong>限流控制</strong>  ：限制同一IP/用户的频繁请求。</li>\n<li><strong>短生命周期</strong>  ：令牌过期后自动失效。</li>\n</ul>\n<hr>\n<h3><strong>三、常见问题与优化</strong></h3>\n<ol>\n<li><strong>二维码过期</strong>   → 网页端实时更新二维码（重新生成）。</li>\n<li><strong>网络延迟</strong>   → 用WebSocket替代轮询，减少延迟。</li>\n<li><strong>跨平台兼容</strong>   → 确保移动端APP能解析二维码格式（如URL编码）。</li>\n</ol>\n<hr>\n<h3><strong>四、应用场景</strong></h3>\n<ul>\n<li><strong>微信网页扫码登录</strong></li>\n<li><strong>支付宝快捷登录</strong></li>\n<li><strong>企业内部系统（如钉钉）</strong></li>\n</ul>\n<hr>\n<p>通过以上步骤，可以实现安全、高效的扫码登录功能。如果需要具体语言（如Java/Go）的实现代码，可以进一步讨论！</p>\n</div>'</script></body></html>
