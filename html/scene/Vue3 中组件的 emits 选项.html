<script>
            document.getElementById('article').innerHTML = 
            "<div><p>在 Vue3 中，组件的 <code>emits</code> 选项用于声明该组件会触发哪些自定义事件。这一设计主要基于以下几个原因：</p>\n<h3>1. <strong>类型检查与 IDE 支持</strong></h3>\n<ul>\n<li>\n<p>Vue3 的 Composition API 支持 TypeScript，<code>emits</code> 声明能提供完整的类型推导，帮助 IDE 进行代码提示和类型检查。</p>\n</li>\n<li>\n<p>示例：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">const</span> emit = defineEmits&lt;{\n  (<span class=\"hljs-attr\">e</span>: <span class=\"hljs-string\">&#x27;submit&#x27;</span>, <span class=\"hljs-attr\">formData</span>: <span class=\"hljs-title class_\">FormData</span>): <span class=\"hljs-built_in\">void</span>\n}&gt;()\n</code></pre>\n<p>这里明确指定了 <code>submit</code> 事件携带的参数类型为 <code>FormData</code>。</p>\n</li>\n</ul>\n<h3>2. <strong>组件接口明确化</strong></h3>\n<ul>\n<li>\n<p>通过 <code>emits</code> 声明，组件的使用者可以清晰地知道该组件会触发哪些事件，就像明确的组件 API 文档一样。</p>\n</li>\n<li>\n<p>例如：</p>\n<pre><code class=\"language-html\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span> <span class=\"hljs-attr\">setup</span>&gt;</span><span class=\"language-javascript\">\n<span class=\"hljs-title function_\">defineEmits</span>([<span class=\"hljs-string\">&#x27;click&#x27;</span>, <span class=\"hljs-string\">&#x27;input&#x27;</span>])\n</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n</code></pre>\n<p>这表明组件会触发 <code>click</code> 和 <code>input</code> 事件，使用者可以安全地监听这些事件。</p>\n</li>\n</ul>\n<h3>3. <strong>性能优化</strong></h3>\n<ul>\n<li>Vue3 在编译时会对 <code>emits</code> 中声明的事件进行优化，未声明的事件会被视为普通 DOM 事件，可能导致意外的行为或性能损耗。</li>\n<li>声明事件后，Vue 可以更精确地处理事件传递，避免不必要的事件冒泡或代理。</li>\n</ul>\n<h3>4. <strong>与原生事件的区分</strong></h3>\n<ul>\n<li>\n<p>当组件触发的事件名与原生 DOM 事件名相同时（如 <code>click</code>），<code>emits</code> 声明能明确区分该事件是组件自定义事件还是原生事件。</p>\n</li>\n<li>\n<p>例如：</p>\n<pre><code class=\"language-html\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span> <span class=\"hljs-attr\">setup</span>&gt;</span><span class=\"language-javascript\">\n<span class=\"hljs-title function_\">defineEmits</span>([<span class=\"hljs-string\">&#x27;click&#x27;</span>])\n</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">template</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> @<span class=\"hljs-attr\">click</span>=<span class=\"hljs-string\">&quot;$emit(&#x27;click&#x27;)&quot;</span>&gt;</span>Click me<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">template</span>&gt;</span>\n</code></pre>\n<p>这里的 <code>click</code> 事件会被 Vue 识别为组件自定义事件，而非原生 DOM 事件。</p>\n</li>\n</ul>\n<h3>5. <strong>更好的代码组织与维护</strong></h3>\n<ul>\n<li>事件声明集中在 <code>emits</code> 选项中，使代码结构更清晰，便于维护和理解组件的行为。</li>\n<li>特别是在大型项目中，明确的事件声明有助于团队协作和代码审查。</li>\n</ul>\n<h3>对比 Vue2</h3>\n<p>在 Vue2 中，事件声明是可选的，但在 Vue3 中，推荐显式声明所有自定义事件，这与 Vue3 更加强调的类型安全和 Composition API 的设计理念一致。</p>\n<h3>总结</h3>\n<p><code>emits</code> 声明在 Vue3 中是一种最佳实践，它提供了类型安全、组件接口清晰化、性能优化等诸多好处，帮助开发者编写更健壮、更易维护的组件代码。</p>\n</div>";
          </script></body></html>
