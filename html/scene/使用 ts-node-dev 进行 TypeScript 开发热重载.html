<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="使用 ts-node-dev 进行 TypeScript 开发热重载",document.getElementById("article").innerHTML='<div><p><code>ts-node-dev</code> 是一个基于 <code>ts-node</code> 的开发工具，它结合了 <code>ts-node</code> 的即时 TypeScript 执行和 <code>nodemon</code> 的文件监视/热重载功能，非常适合 TypeScript 项目的开发调试。</p>\n<h2>基本用法</h2>\n<h3>安装</h3>\n<pre><code class="language-bash">npm install -D ts-node-dev\n<span class="hljs-comment"># 或</span>\nyarn add -D ts-node-dev\n</code></pre>\n<h3>运行项目</h3>\n<pre><code class="language-bash">ts-node-dev src/index.ts\n</code></pre>\n<h2>主要特性</h2>\n<ol>\n<li>\n<p><strong>文件更改时自动重启</strong></p>\n<ul>\n<li>默认会监视所有 <code>.ts</code> 文件的变化并自动重启应用</li>\n</ul>\n</li>\n<li>\n<p><strong>TypeScript 即时编译</strong></p>\n<ul>\n<li>无需手动编译，直接运行 <code>.ts</code> 文件</li>\n</ul>\n</li>\n<li>\n<p><strong>调试友好</strong></p>\n<ul>\n<li>支持 Node.js 的调试功能</li>\n</ul>\n</li>\n</ol>\n<h2>常用选项</h2>\n<table>\n<thead>\n<tr>\n<th>选项</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>--respawn</code></td>\n<td>保持进程运行，即使应用崩溃</td>\n</tr>\n<tr>\n<td><code>--transpile-only</code></td>\n<td>快速编译（跳过类型检查）</td>\n</tr>\n<tr>\n<td><code>--ignore-watch</code></td>\n<td>忽略特定文件/目录的更改</td>\n</tr>\n<tr>\n<td><code>--interval</code></td>\n<td>设置文件检查间隔（毫秒）</td>\n</tr>\n<tr>\n<td><code>--debounce</code></td>\n<td>设置重启延迟（毫秒）</td>\n</tr>\n<tr>\n<td><code>--debug</code></td>\n<td>启用调试模式</td>\n</tr>\n<tr>\n<td><code>--inspect</code></td>\n<td>启用 Node.js 检查器</td>\n</tr>\n</tbody>\n</table>\n<h2>示例命令</h2>\n<ol>\n<li>\n<p>基本使用：</p>\n<pre><code class="language-bash">ts-node-dev src/index.ts\n</code></pre>\n</li>\n<li>\n<p>忽略某些文件：</p>\n<pre><code class="language-bash">ts-node-dev --ignore-watch=<span class="hljs-string">&quot;*.test.ts&quot;</span> src/index.ts\n</code></pre>\n</li>\n<li>\n<p>快速编译模式（跳过类型检查）：</p>\n<pre><code class="language-bash">ts-node-dev --transpile-only src/index.ts\n</code></pre>\n</li>\n<li>\n<p>调试模式：</p>\n<pre><code class="language-bash">ts-node-dev --inspect src/index.ts\n</code></pre>\n</li>\n</ol>\n<h2>与 <code>ts-node</code> 和 <code>nodemon</code> 的比较</h2>\n<table>\n<thead>\n<tr>\n<th>工具</th>\n<th>类型检查</th>\n<th>热重载</th>\n<th>适用场景</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>ts-node</code></td>\n<td>是</td>\n<td>否</td>\n<td>简单运行 TS 文件</td>\n</tr>\n<tr>\n<td><code>nodemon</code> + <code>ts-node</code></td>\n<td>是</td>\n<td>是</td>\n<td>需要手动配置</td>\n</tr>\n<tr>\n<td><code>ts-node-dev</code></td>\n<td>可选</td>\n<td>是</td>\n<td>开箱即用的开发体验</td>\n</tr>\n</tbody>\n</table>\n<h2>配置建议</h2>\n<p>在 <code>package.json</code> 中添加脚本：</p>\n<pre><code class="language-json"><span class="hljs-punctuation">{</span>\n  <span class="hljs-attr">&quot;scripts&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n    <span class="hljs-attr">&quot;dev&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;ts-node-dev --respawn --transpile-only src/index.ts&quot;</span><span class="hljs-punctuation">,</span>\n    <span class="hljs-attr">&quot;dev:debug&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;ts-node-dev --inspect --respawn src/index.ts&quot;</span>\n  <span class="hljs-punctuation">}</span>\n<span class="hljs-punctuation">}</span>\n</code></pre>\n<h2>注意事项</h2>\n<ol>\n<li><strong>生产环境</strong>   ：不要使用 <code>ts-node-dev</code>，应该使用 <code>tsc</code> 编译后运行 <code>.js</code> 文件</li>\n<li><strong>性能</strong>   ：对于大型项目，<code>--transpile-only</code> 可以显著提高重启速度</li>\n<li><strong>调试</strong>   ：结合 VS Code 的调试配置可以获得更好的开发体验</li>\n</ol>\n<p><code>ts-node-dev</code> 是 TypeScript 项目开发的绝佳工具，能极大提升开发效率。</p>\n</div>'</script></body></html>
