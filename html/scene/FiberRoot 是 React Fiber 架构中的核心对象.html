<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {

      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'FiberRoot 是 React Fiber 架构中的核心对象'
        document.getElementById('article').innerHTML = 
        "<div><p><strong>FiberRoot 是 React Fiber 架构中的核心对象</strong>  ，它是 React 应用与真实渲染目标（如 DOM、React Native 等）之间的桥梁，负责协调和管理整个应用的渲染流程。以下是它的核心作用：</p>\n<hr>\n<h3><strong>1. 连接 React 与渲染环境</strong></h3>\n<ul>\n<li><strong>挂载点关联</strong>  ：<br>\nFiberRoot 在调用 <code>ReactDOM.createRoot()</code> 或 <code>ReactDOM.render()</code> 时创建，绑定到具体的 DOM 容器（如 <code>div#root</code>），成为 React 虚拟 DOM 和实际 DOM 之间的入口。</li>\n<li><strong>平台适配</strong>  ：<br>\n通过 FiberRoot，React 可以适配不同渲染环境（如浏览器 DOM、React Native、Canvas 等）。</li>\n</ul>\n<hr>\n<h3><strong>2. 管理 Fiber 树的根节点</strong></h3>\n<ul>\n<li><strong>维护 Fiber 树的根</strong>  ：<br>\nFiberRoot 内部通过 <code>current</code> 属性指向当前活跃的 <strong>Fiber 树根节点</strong>  （即 <code>HostRootFiber</code>），这是 React 协调（Reconciliation）的起点。</li>\n<li><strong>双缓存机制</strong>  ：<br>\nReact 使用双 Fiber 树（Current 和 WorkInProgress）实现增量渲染。FiberRoot 负责在两棵树之间切换，确保无缝更新。</li>\n</ul>\n<hr>\n<h3><strong>3. 调度与任务管理</strong></h3>\n<ul>\n<li><strong>协调任务优先级</strong>  ：<br>\nFiberRoot 与 <strong>Scheduler（调度器）</strong>   协作，处理高优先级更新（如用户交互）和低优先级任务（如数据预加载），实现时间切片（Time Slicing）和并发模式（Concurrent Mode）。</li>\n<li><strong>批处理更新</strong>  ：<br>\n多个状态更新会被合并，通过 FiberRoot 统一调度，减少不必要的渲染。</li>\n</ul>\n<hr>\n<h3><strong>4. 错误与副作用追踪</strong></h3>\n<ul>\n<li><strong>捕获渲染错误</strong>  ：<br>\nFiberRoot 配合 Error Boundaries 收集组件树中的错误，避免整个应用崩溃。</li>\n<li><strong>管理副作用</strong>  ：<br>\n存储所有 Fiber 节点的副作用（如生命周期调用、DOM 操作），在提交阶段（Commit Phase）统一执行。</li>\n</ul>\n<hr>\n<h3><strong>5. 支持并发渲染（Concurrent Mode）</strong></h3>\n<ul>\n<li><strong>可中断渲染</strong>  ：<br>\n在并发模式下，FiberRoot 允许 React 暂停/恢复渲染过程，优先响应用户交互，提升体验。</li>\n<li>** hydration（SSR 复用）**  ：<br>\n服务端渲染时，FiberRoot 协调客户端 hydrate 过程，复用已有的 DOM 结构。</li>\n</ul>\n<hr>\n<h3><strong>代码中的 FiberRoot 结构</strong></h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 通过 ReactDOM.createRoot() 创建 FiberRoot</span>\n<span class=\"hljs-keyword\">const</span> root = <span class=\"hljs-title class_\">ReactDOM</span>.<span class=\"hljs-title function_\">createRoot</span>(<span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&#x27;root&#x27;</span>));\nroot.<span class=\"hljs-title function_\">render</span>(<span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">App</span> /&gt;</span></span>);\n\n<span class=\"hljs-comment\">// FiberRoot 关键属性（简化版）</span>\n{\n  <span class=\"hljs-attr\">current</span>: <span class=\"hljs-title class_\">HostRootFiber</span>,      <span class=\"hljs-comment\">// 当前活动的 Fiber 树根</span>\n  <span class=\"hljs-attr\">containerInfo</span>: <span class=\"hljs-title class_\">DOMElement</span>,   <span class=\"hljs-comment\">// 绑定的 DOM 容器</span>\n  <span class=\"hljs-attr\">pendingUpdates</span>: [],          <span class=\"hljs-comment\">// 待处理的更新队列</span>\n  <span class=\"hljs-attr\">finishedWork</span>: <span class=\"hljs-literal\">null</span>,          <span class=\"hljs-comment\">// 已完成的 WorkInProgress 树</span>\n  <span class=\"hljs-attr\">expirationTimes</span>: <span class=\"hljs-title class_\">Map</span>,        <span class=\"hljs-comment\">// 任务过期时间标记</span>\n  <span class=\"hljs-comment\">// ...其他调度和配置信息</span>\n}\n</code></pre>\n<hr>\n<h3><strong>总结</strong></h3>\n<p>FiberRoot 是 React Fiber 架构的<strong>核心控制器</strong>  ，负责：</p>\n<ol>\n<li><strong>绑定渲染环境</strong>  （如 DOM）</li>\n<li><strong>管理 Fiber 树和双缓存机制</strong></li>\n<li><strong>调度任务优先级与并发更新</strong></li>\n<li><strong>处理错误与副作用</strong></li>\n<li><strong>实现高性能的异步渲染</strong></li>\n</ol>\n<p>理解 FiberRoot 有助于深入掌握 React 的渲染机制和性能优化原理。</p>\n</div>";</script></body></html>
