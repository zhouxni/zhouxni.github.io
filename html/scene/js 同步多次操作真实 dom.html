<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../css/github-markdown.min.css">
    <link rel="stylesheet" href="../../css/github.min.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }
  </style></head>
  
  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
        document.getElementById('article').innerHTML = 
        "<div><p>在 JavaScript 中，<strong>同步的多次 DOM 操作默认不会自动合并</strong>  ，但浏览器会通过一些优化机制（如渲染队列）来减少不必要的重排（Reflow）和重绘（Repaint）。以下是详细分析：</p>\n<hr>\n<h3><strong>一、核心结论</strong></h3>\n<ol>\n<li><strong>不会自动合并操作</strong>  ：每次同步的 DOM 修改都会触发浏览器的样式计算和布局更新。</li>\n<li><strong>但浏览器会优化渲染流程</strong>  ：通过 <strong>渲染队列（Render Queue）</strong>   延迟合并连续操作，避免多次重排。</li>\n<li><strong>强制同步布局（Forced Synchronous Layout）</strong>   会破坏优化：某些操作会强制立即重排，导致性能问题。</li>\n</ol>\n<hr>\n<h3><strong>二、关键机制解析</strong></h3>\n<h4><strong>1. 渲染队列（Render Queue）</strong></h4>\n<p>浏览器会将连续的 DOM 操作暂存到队列中，在下一个 <strong>渲染帧（Frame）</strong>   前批量处理。<br>\n<strong>示例</strong>  ：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 以下操作会被浏览器优化，只触发一次重排</span>\ndiv.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">width</span> = <span class=\"hljs-string\">&#x27;100px&#x27;</span>;\ndiv.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">height</span> = <span class=\"hljs-string\">&#x27;200px&#x27;</span>;\ndiv.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">color</span> = <span class=\"hljs-string\">&#x27;red&#x27;</span>;\n</code></pre>\n<ul>\n<li><strong>优化后</strong>  ：浏览器合并修改，仅触发一次重排。</li>\n</ul>\n<h4><strong>2. 强制同步布局（性能杀手）</strong></h4>\n<p>如果在读取布局属性（如 <code>offsetWidth</code>、<code>getComputedStyle</code>）前有未处理的 DOM 修改，浏览器会 <strong>立即强制重排</strong>  ，破坏队列优化。<br>\n<strong>反例</strong>  ：</p>\n<pre><code class=\"language-javascript\">div.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">width</span> = <span class=\"hljs-string\">&#x27;100px&#x27;</span>;  <span class=\"hljs-comment\">// 修改样式（加入渲染队列）</span>\n<span class=\"hljs-keyword\">const</span> width = div.<span class=\"hljs-property\">offsetWidth</span>; <span class=\"hljs-comment\">// 读取布局属性 → 强制立即重排！</span>\ndiv.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">height</span> = <span class=\"hljs-string\">&#x27;200px&#x27;</span>; <span class=\"hljs-comment\">// 再次触发重排</span>\n</code></pre>\n<ul>\n<li><strong>结果</strong>  ：触发 <strong>两次重排</strong>  （性能差）。</li>\n</ul>\n<hr>\n<h3><strong>三、如何主动合并 DOM 操作？</strong></h3>\n<h4><strong>方法 1：使用 <code>requestAnimationFrame</code></strong></h4>\n<p>将操作放到下一帧前统一处理：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">requestAnimationFrame</span>(<span class=\"hljs-function\">() =&gt;</span> {\n  div.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">width</span> = <span class=\"hljs-string\">&#x27;100px&#x27;</span>;\n  div.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">height</span> = <span class=\"hljs-string\">&#x27;200px&#x27;</span>;\n});\n</code></pre>\n<h4><strong>方法 2：使用 CSS <code>class</code> 或 <code>cssText</code></strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 一次性修改多个样式</span>\ndiv.<span class=\"hljs-property\">className</span> = <span class=\"hljs-string\">&#x27;new-style&#x27;</span>; \n\n<span class=\"hljs-comment\">// 或</span>\ndiv.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">cssText</span> = <span class=\"hljs-string\">&#x27;width: 100px; height: 200px; color: red;&#x27;</span>;\n</code></pre>\n<h4><strong>方法 3：使用文档片段（DocumentFragment）</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> fragment = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createDocumentFragment</span>();\n<span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">let</span> i = <span class=\"hljs-number\">0</span>; i &lt; <span class=\"hljs-number\">100</span>; i++) {\n  <span class=\"hljs-keyword\">const</span> item = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">&#x27;div&#x27;</span>);\n  fragment.<span class=\"hljs-title function_\">appendChild</span>(item);\n}\n<span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">body</span>.<span class=\"hljs-title function_\">appendChild</span>(fragment); <span class=\"hljs-comment\">// 仅一次重排</span>\n</code></pre>\n<hr>\n<h3><strong>四、性能对比测试</strong></h3>\n<table>\n<thead>\n<tr>\n<th><strong>操作方式</strong></th>\n<th>重排次数</th>\n<th>性能影响</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>同步多次修改样式</td>\n<td>1次（优化后）</td>\n<td>✅ 最佳</td>\n</tr>\n<tr>\n<td>强制同步布局（读取布局属性）</td>\n<td>多次</td>\n<td>❌ 最差</td>\n</tr>\n<tr>\n<td>使用 <code>requestAnimationFrame</code></td>\n<td>1次</td>\n<td>✅ 好</td>\n</tr>\n<tr>\n<td>使用 <code>DocumentFragment</code></td>\n<td>1次</td>\n<td>✅ 好</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>五、特殊情况：现代框架的优化</strong></h3>\n<p>React/Vue 等框架使用 <strong>虚拟 DOM</strong>   或 <strong>增量 DOM</strong>   技术，在内存中计算差异后批量更新真实 DOM，本质上也是合并操作。</p>\n<hr>\n<h3><strong>六、总结</strong></h3>\n<ol>\n<li><strong>默认情况</strong>  ：同步 DOM 操作会被浏览器优化，但需避免强制同步布局。</li>\n<li><strong>最佳实践</strong>  ：</li>\n</ol>\n<ul>\n<li>集中修改样式或类名。</li>\n<li>避免在修改后立即读取布局属性。</li>\n<li>复杂操作使用 <code>DocumentFragment</code> 或 <code>requestAnimationFrame</code>。</li>\n</ul>\n<ol start=\"3\">\n<li><strong>调试工具</strong>  ：用 Chrome DevTools 的 <strong>Performance 面板</strong>   检测重排（Recalculate Style 和 Layout 事件）。</li>\n</ol>\n<p>理解这些机制可以显著提升 Web 应用的渲染性能！</p>\n</div>";
      </script></body></html>
