<script>
    
        document.getElementById('article').innerHTML = 
        "<div><h3>如何在浏览器里裁剪图片？</h3>\n<p>在浏览器中裁剪图片可以通过 HTML5 的 <code>&lt;canvas&gt;</code> 元素和 JavaScript 来实现。以下是一个基本的实现步骤和示例代码：</p>\n<h4>实现步骤：</h4>\n<ol>\n<li><strong>加载图片</strong>  ：使用 <code>&lt;input type=&quot;file&quot;&gt;</code> 元素让用户选择图片，或者使用 <code>&lt;img&gt;</code> 元素加载已有图片。</li>\n<li><strong>绘制图片到 Canvas</strong>  ：将图片绘制到 <code>&lt;canvas&gt;</code> 元素上。</li>\n<li><strong>实现裁剪功能</strong>  ：通过鼠标事件（如 <code>mousedown</code>、<code>mousemove</code>、<code>mouseup</code>）确定裁剪区域，并使用 <code>canvas</code> 的 <code>drawImage</code> 方法裁剪图片。</li>\n<li><strong>导出裁剪后的图片</strong>  ：使用 <code>canvas</code> 的 <code>toDataURL</code> 方法导出裁剪后的图片。</li>\n</ol>\n<h4>示例代码：</h4>\n<pre><code class=\"language-html\"><span class=\"hljs-meta\">&lt;!DOCTYPE <span class=\"hljs-keyword\">html</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">&quot;zh&quot;</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">head</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">charset</span>=<span class=\"hljs-string\">&quot;UTF-8&quot;</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;viewport&quot;</span> <span class=\"hljs-attr\">content</span>=<span class=\"hljs-string\">&quot;width=device-width, initial-scale=1.0&quot;</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>图片裁剪示例<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">style</span>&gt;</span><span class=\"language-css\">\n        <span class=\"hljs-selector-tag\">canvas</span> {\n            <span class=\"hljs-attribute\">border</span>: <span class=\"hljs-number\">1px</span> solid <span class=\"hljs-number\">#ccc</span>;\n        }\n    </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">style</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">head</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">input</span> <span class=\"hljs-attr\">type</span>=<span class=\"hljs-string\">&quot;file&quot;</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">&quot;upload&quot;</span> <span class=\"hljs-attr\">accept</span>=<span class=\"hljs-string\">&quot;image/*&quot;</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">br</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">canvas</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">&quot;canvas&quot;</span>&gt;</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">canvas</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">br</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">&quot;crop&quot;</span>&gt;</span>裁剪<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">img</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">&quot;output&quot;</span> <span class=\"hljs-attr\">alt</span>=<span class=\"hljs-string\">&quot;裁剪后的图片&quot;</span>&gt;</span>\n\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n        <span class=\"hljs-keyword\">const</span> upload = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&#x27;upload&#x27;</span>);\n        <span class=\"hljs-keyword\">const</span> canvas = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&#x27;canvas&#x27;</span>);\n        <span class=\"hljs-keyword\">const</span> ctx = canvas.<span class=\"hljs-title function_\">getContext</span>(<span class=\"hljs-string\">&#x27;2d&#x27;</span>);\n        <span class=\"hljs-keyword\">const</span> output = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&#x27;output&#x27;</span>);\n        <span class=\"hljs-keyword\">let</span> img = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Image</span>();\n        <span class=\"hljs-keyword\">let</span> startX, startY, endX, endY, isDrawing = <span class=\"hljs-literal\">false</span>;\n\n        upload.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;change&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">e</span>) {\n            <span class=\"hljs-keyword\">const</span> file = e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">files</span>[<span class=\"hljs-number\">0</span>];\n            <span class=\"hljs-keyword\">const</span> reader = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">FileReader</span>();\n            reader.<span class=\"hljs-property\">onload</span> = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">event</span>) {\n                img.<span class=\"hljs-property\">src</span> = event.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">result</span>;\n            }\n            reader.<span class=\"hljs-title function_\">readAsDataURL</span>(file);\n        });\n\n        img.<span class=\"hljs-property\">onload</span> = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n            canvas.<span class=\"hljs-property\">width</span> = img.<span class=\"hljs-property\">width</span>;\n            canvas.<span class=\"hljs-property\">height</span> = img.<span class=\"hljs-property\">height</span>;\n            ctx.<span class=\"hljs-title function_\">drawImage</span>(img, <span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">0</span>);\n        }\n\n        canvas.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;mousedown&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">e</span>) {\n            startX = e.<span class=\"hljs-property\">offsetX</span>;\n            startY = e.<span class=\"hljs-property\">offsetY</span>;\n            isDrawing = <span class=\"hljs-literal\">true</span>;\n        });\n\n        canvas.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;mousemove&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">e</span>) {\n            <span class=\"hljs-keyword\">if</span> (isDrawing) {\n                endX = e.<span class=\"hljs-property\">offsetX</span>;\n                endY = e.<span class=\"hljs-property\">offsetY</span>;\n                ctx.<span class=\"hljs-title function_\">clearRect</span>(<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">0</span>, canvas.<span class=\"hljs-property\">width</span>, canvas.<span class=\"hljs-property\">height</span>);\n                ctx.<span class=\"hljs-title function_\">drawImage</span>(img, <span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">0</span>);\n                ctx.<span class=\"hljs-property\">strokeStyle</span> = <span class=\"hljs-string\">&#x27;red&#x27;</span>;\n                ctx.<span class=\"hljs-title function_\">strokeRect</span>(startX, startY, endX - startX, endY - startY);\n            }\n        });\n\n        canvas.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;mouseup&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n            isDrawing = <span class=\"hljs-literal\">false</span>;\n        });\n\n        <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&#x27;crop&#x27;</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;click&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n            <span class=\"hljs-keyword\">const</span> width = endX - startX;\n            <span class=\"hljs-keyword\">const</span> height = endY - startY;\n            <span class=\"hljs-keyword\">const</span> croppedCanvas = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">&#x27;canvas&#x27;</span>);\n            croppedCanvas.<span class=\"hljs-property\">width</span> = width;\n            croppedCanvas.<span class=\"hljs-property\">height</span> = height;\n            <span class=\"hljs-keyword\">const</span> croppedCtx = croppedCanvas.<span class=\"hljs-title function_\">getContext</span>(<span class=\"hljs-string\">&#x27;2d&#x27;</span>);\n            croppedCtx.<span class=\"hljs-title function_\">drawImage</span>(canvas, startX, startY, width, height, <span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">0</span>, width, height);\n            output.<span class=\"hljs-property\">src</span> = croppedCanvas.<span class=\"hljs-title function_\">toDataURL</span>();\n        });\n    </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">html</span>&gt;</span>\n</code></pre>\n<h3>如何裁剪视频，对视频做逐帧分析？</h3>\n<p>裁剪视频和对视频进行逐帧分析通常需要使用更专业的工具和库，因为浏览器本身不直接支持视频裁剪和逐帧处理。不过，可以通过以下方式实现：</p>\n<h4>裁剪视频：</h4>\n<ol>\n<li><strong>使用 FFmpeg</strong>  ：FFmpeg 是一个强大的多媒体处理工具，可以在服务器端或本地裁剪视频。可以通过上传视频到服务器，使用 FFmpeg 进行裁剪，然后将裁剪后的视频返回给浏览器。</li>\n<li><strong>使用 WebAssembly 版本的 FFmpeg</strong>  ：可以在浏览器中运行 WebAssembly 版本的 FFmpeg，但这需要较高的技术门槛和性能要求。</li>\n</ol>\n<h4>对视频做逐帧分析：</h4>\n<ol>\n<li><strong>使用 Canvas 提取帧</strong>  ：\n<ul>\n<li>使用 <code>&lt;video&gt;</code> 元素播放视频。</li>\n<li>使用 <code>canvas</code> 元素和 <code>drawImage</code> 方法从视频中提取帧。</li>\n<li>对提取的帧进行分析，如使用图像处理技术（如 OpenCV.js）进行特征检测、对象识别等。</li>\n</ul>\n</li>\n<li><strong>示例代码</strong>  （提取帧）：</li>\n</ol>\n<pre><code class=\"language-html\"><span class=\"hljs-meta\">&lt;!DOCTYPE <span class=\"hljs-keyword\">html</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">&quot;zh&quot;</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">head</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">charset</span>=<span class=\"hljs-string\">&quot;UTF-8&quot;</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;viewport&quot;</span> <span class=\"hljs-attr\">content</span>=<span class=\"hljs-string\">&quot;width=device-width, initial-scale=1.0&quot;</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>视频逐帧分析示例<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">head</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">video</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">&quot;video&quot;</span> <span class=\"hljs-attr\">width</span>=<span class=\"hljs-string\">&quot;640&quot;</span> <span class=\"hljs-attr\">height</span>=<span class=\"hljs-string\">&quot;360&quot;</span> <span class=\"hljs-attr\">controls</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">source</span> <span class=\"hljs-attr\">src</span>=<span class=\"hljs-string\">&quot;your-video-file.mp4&quot;</span> <span class=\"hljs-attr\">type</span>=<span class=\"hljs-string\">&quot;video/mp4&quot;</span>&gt;</span>\n        您的浏览器不支持 HTML5 视频。\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">video</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">canvas</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">&quot;canvas&quot;</span> <span class=\"hljs-attr\">width</span>=<span class=\"hljs-string\">&quot;640&quot;</span> <span class=\"hljs-attr\">height</span>=<span class=\"hljs-string\">&quot;360&quot;</span>&gt;</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">canvas</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">&quot;capture&quot;</span>&gt;</span>提取帧<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n        <span class=\"hljs-keyword\">const</span> video = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&#x27;video&#x27;</span>);\n        <span class=\"hljs-keyword\">const</span> canvas = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&#x27;canvas&#x27;</span>);\n        <span class=\"hljs-keyword\">const</span> ctx = canvas.<span class=\"hljs-title function_\">getContext</span>(<span class=\"hljs-string\">&#x27;2d&#x27;</span>);\n\n        <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&#x27;capture&#x27;</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;click&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n            ctx.<span class=\"hljs-title function_\">drawImage</span>(video, <span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">0</span>, canvas.<span class=\"hljs-property\">width</span>, canvas.<span class=\"hljs-property\">height</span>);\n            <span class=\"hljs-comment\">// 这里可以对 canvas 中的帧进行分析</span>\n        });\n    </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">html</span>&gt;</span>\n</code></pre>\n<h3>总结</h3>\n<ul>\n<li><strong>图片裁剪</strong>  ：可以使用 <code>&lt;canvas&gt;</code> 元素和 JavaScript 实现，通过鼠标事件确定裁剪区域，并使用 <code>drawImage</code> 方法裁剪图片。</li>\n<li><strong>视频裁剪</strong>  ：通常需要使用 FFmpeg 等工具在服务器端进行裁剪，或者使用 WebAssembly 版本的 FFmpeg 在浏览器中运行（性能要求较高）。</li>\n<li><strong>视频逐帧分析</strong>  ：可以使用 <code>&lt;canvas&gt;</code> 元素从视频中提取帧，并使用图像处理技术进行分析。</li>\n</ul>\n</div>";
      </script></body></html>
