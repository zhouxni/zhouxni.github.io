<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="为什么 Vue 3.5 改用双向链表结构",document.getElementById("article").innerHTML='<div><p>因为「<strong>双向链表</strong>   」是唯一能同时满足下面 3 个新需求的数据结构：</p>\n<ol>\n<li>依赖去重必须在 <strong>O(1)</strong></li>\n<li>清理过期依赖必须在 <strong>O(k)</strong>   （k = 该 watcher 实际挂接的 dep 数量，而非全部 dep）</li>\n<li>触发顺序必须 <strong>稳定</strong>   （按 track 时序）</li>\n</ol>\n<p>Set/数组、单向链表、甚至环形链表都做不到这三点同时成立，只有「双向链表」可以：</p>\n<hr>\n<ol>\n<li>单向链表为何不行</li>\n</ol>\n<ul>\n<li>只能从头到尾遍历 → 想删除某个节点必须从头找前驱 → O(n) 清理。</li>\n<li>做不到“节点自带所在链表入口”，因此无法在一次遍历里把自己从所有 dep 摘掉。</li>\n</ul>\n<ol start="2">\n<li>双向链表为何可以</li>\n</ol>\n<ul>\n<li>每个 watcher 在运行时生成一个全局唯一的 <strong>DepNode</strong>   ：</li>\n</ul>\n<pre><code>DepNode {\n  sub           // 指向 watcher\n  prevDep/next  // 双向指针\n  dep           // 反向指向当前所在的 Dep\n}\n</code></pre>\n<ul>\n<li><strong>去重</strong>   ：<code>track</code> 时检查 <code>activeSub === dep.head?.sub</code>，指针比较 O(1)。</li>\n<li><strong>清理</strong>   ：watcher 自己维护一个 <code>deps: DepNode[]</code>，里面就是所有挂接的节点；<br>\n组件卸载或 effect 重新执行时，对每个节点直接 <code>prev.next = next; next.prev = prev</code> —— 纯指针操作，O(k)。</li>\n<li><strong>顺序稳定</strong>   ：链表天然保持插入顺序，trigger 时遍历即可。</li>\n</ul>\n<ol start="3">\n<li>其他结构对比</li>\n</ol>\n<table>\n<thead>\n<tr>\n<th>结构</th>\n<th>去重</th>\n<th>清理</th>\n<th>顺序</th>\n<th>结论</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Set</td>\n<td>O(1)</td>\n<td>O(m·n)</td>\n<td>无序</td>\n<td>清理慢</td>\n</tr>\n<tr>\n<td>数组</td>\n<td>O(n)</td>\n<td>O(m·n)</td>\n<td>有序</td>\n<td>去重+清理都慢</td>\n</tr>\n<tr>\n<td>单向链表</td>\n<td>O(1)</td>\n<td>O(n)</td>\n<td>有序</td>\n<td>清理慢</td>\n</tr>\n<tr>\n<td>双向链表</td>\n<td>O(1)</td>\n<td>O(k)</td>\n<td>有序</td>\n<td>✅ 唯一满足</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<p>一句话：<br>\nVue 3.5 把“Set/数组”换成“双向链表”，不是为了链表本身，而是因为<strong>双向指针让每个 watcher 都能 O(1) 记录、O(1) 删除、O(k) 批量清理</strong>   ，而其他结构无法同时做到这三点。</p>\n</div>'</script></body></html>
