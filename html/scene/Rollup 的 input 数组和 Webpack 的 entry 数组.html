<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Rollup 的 input 数组和 Webpack 的 entry 数组",document.getElementById("article").innerHTML='<div><p>是的，Rollup 的 <code>input</code> 数组和 Webpack 的 <code>entry</code> 数组在概念上类似（都支持多入口打包），但在具体行为和底层机制上有显著区别。以下是两者的关键差异：</p>\n<hr>\n<h3><strong>1. 输出方式不同</strong></h3>\n<h4><strong>Rollup（<code>input: [...]</code>）</strong></h4>\n<ul>\n<li>\n<p><strong>必须配合 <code>output.dir</code></strong>  ：<br>\nRollup 的数组输入 <strong>必须</strong>   使用目录输出（<code>output.dir</code>），不能直接输出到单个文件（<code>output.file</code>）。<br>\n每个入口会生成独立的文件，文件名默认与入口名相同（可通过 <code>output.entryFileNames</code> 自定义）。</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// rollup.config.js</span>\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {\n  <span class="hljs-attr">input</span>: [<span class="hljs-string">&#x27;src/a.js&#x27;</span>, <span class="hljs-string">&#x27;src/b.js&#x27;</span>], <span class="hljs-comment">// 多入口</span>\n  <span class="hljs-attr">output</span>: {\n    <span class="hljs-attr">dir</span>: <span class="hljs-string">&#x27;dist&#x27;</span>,     <span class="hljs-comment">// 必须指定目录</span>\n    <span class="hljs-attr">format</span>: <span class="hljs-string">&#x27;esm&#x27;</span>,\n  },\n};\n</code></pre>\n<p><strong>输出结果</strong>  ：</p>\n<pre><code>dist/\n  ├── a.js  # 对应 src/a.js\n  └── b.js  # 对应 src/b.js\n</code></pre>\n</li>\n</ul>\n<h4><strong>Webpack（<code>entry: [...]</code>）</strong></h4>\n<ul>\n<li>\n<p><strong>默认合并为单一 bundle</strong>  ：<br>\nWebpack 的数组形式 <code>entry</code> 会将所有入口文件 <strong>合并到一个 bundle</strong>   中（除非配置 <code>splitChunks</code> 或动态导入）。</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// webpack.config.js</span>\n<span class="hljs-variable language_">module</span>.<span class="hljs-property">exports</span> = {\n  <span class="hljs-attr">entry</span>: [<span class="hljs-string">&#x27;src/a.js&#x27;</span>, <span class="hljs-string">&#x27;src/b.js&#x27;</span>], <span class="hljs-comment">// 多入口数组</span>\n  <span class="hljs-attr">output</span>: {\n    <span class="hljs-attr">filename</span>: <span class="hljs-string">&#x27;main.js&#x27;</span>, <span class="hljs-comment">// 所有入口合并到 main.js</span>\n  },\n};\n</code></pre>\n<p><strong>输出结果</strong>  ：</p>\n<pre><code>dist/\n  └── main.js  # 包含 a.js 和 b.js 的代码\n</code></pre>\n</li>\n<li>\n<p><strong>多入口独立输出需用对象形式</strong>  ：<br>\n如果希望每个入口生成独立文件，需改用对象语法：</p>\n<pre><code class="language-javascript"><span class="hljs-attr">entry</span>: {\n  <span class="hljs-attr">a</span>: <span class="hljs-string">&#x27;src/a.js&#x27;</span>,\n  <span class="hljs-attr">b</span>: <span class="hljs-string">&#x27;src/b.js&#x27;</span>,\n},\n<span class="hljs-attr">output</span>: {\n  <span class="hljs-attr">filename</span>: <span class="hljs-string">&#x27;[name].js&#x27;</span>, <span class="hljs-comment">// 输出 a.js 和 b.js</span>\n},\n</code></pre>\n</li>\n</ul>\n<hr>\n<h3><strong>2. 代码共享机制不同</strong></h3>\n<h4><strong>Rollup</strong></h4>\n<ul>\n<li><strong>自动优化共享依赖</strong>  ：<br>\nRollup 会分析入口之间的共享模块，并自动提取为公共 chunk（需启用代码分割）。<pre><code class="language-javascript"><span class="hljs-attr">output</span>: {\n  <span class="hljs-attr">dir</span>: <span class="hljs-string">&#x27;dist&#x27;</span>,\n  <span class="hljs-attr">chunkFileNames</span>: <span class="hljs-string">&#x27;shared-[hash].js&#x27;</span>, <span class="hljs-comment">// 共享代码块命名</span>\n},\n</code></pre>\n</li>\n</ul>\n<h4><strong>Webpack</strong></h4>\n<ul>\n<li><strong>依赖显式配置 <code>splitChunks</code></strong>  ：<br>\nWebpack 默认不会拆分入口之间的公共代码，除非通过 <code>optimization.splitChunks</code> 手动配置。<pre><code class="language-javascript"><span class="hljs-attr">optimization</span>: {\n  <span class="hljs-attr">splitChunks</span>: {\n    <span class="hljs-attr">chunks</span>: <span class="hljs-string">&#x27;all&#x27;</span>, <span class="hljs-comment">// 强制提取公共模块</span>\n  },\n},\n</code></pre>\n</li>\n</ul>\n<hr>\n<h3><strong>3. 设计哲学差异</strong></h3>\n<table>\n<thead>\n<tr>\n<th><strong>特性</strong></th>\n<th><strong>Rollup</strong></th>\n<th><strong>Webpack</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>核心目标</strong></td>\n<td>生成高效、扁平化的 ES 模块 bundle</td>\n<td>处理复杂应用依赖（如静态资源、HMR）</td>\n</tr>\n<tr>\n<td><strong>多入口行为</strong></td>\n<td>每个入口独立输出 + 自动共享优化</td>\n<td>默认合并，需配置才能分离</td>\n</tr>\n<tr>\n<td><strong>代码分割</strong></td>\n<td>原生支持，自动优化</td>\n<td>需手动配置 <code>splitChunks</code></td>\n</tr>\n<tr>\n<td><strong>适用场景</strong></td>\n<td>库开发、ES 模块优先项目</td>\n<td>大型应用（如 SPA 或多页面应用）</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>总结</strong></h3>\n<ul>\n<li><strong>Rollup 数组输入</strong>  ：<br>\n每个入口生成独立文件，自动处理共享代码，适合输出多个独立模块（如库的子包）。</li>\n<li><strong>Webpack 数组输入</strong>  ：<br>\n默认合并代码，需额外配置才能分离入口或提取公共依赖，适合复杂应用的多入口需求。</li>\n</ul>\n<p><strong>选择建议</strong>  ：</p>\n<ul>\n<li>用 Rollup 打包库或需要精细控制 ES 模块时，优先使用 <code>input</code> 数组。</li>\n<li>用 Webpack 构建应用时，若需多入口，建议使用对象形式的 <code>entry</code> 而非数组。</li>\n</ul>\n</div>'</script></body></html>
