<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="babel的 AST enter 和 exit 方法",document.getElementById("article").innerHTML='<div><p>Babel 的插件系统基于抽象语法树（AST）转换，其中 <code>enter</code> 和 <code>exit</code> 是访问器（Visitor）模式中的两个关键方法。理解它们的工作机制对于编写 Babel 插件至关重要。</p>\n<h3><strong>1. 访问器（Visitor）模式</strong></h3>\n<p>Babel 插件通过定义访问器对象来遍历和修改 AST。每个节点类型（如 <code>FunctionDeclaration</code>、<code>Identifier</code>）都可以有对应的 <code>enter</code> 和 <code>exit</code> 方法。</p>\n<h4><strong>基本结构</strong></h4>\n<pre><code class="language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">function</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">return</span> {\n    <span class="hljs-attr">visitor</span>: {\n      <span class="hljs-comment">// 节点类型（如 FunctionDeclaration）</span>\n      <span class="hljs-title class_">FunctionDeclaration</span>(path) {\n        <span class="hljs-comment">// 处理逻辑</span>\n      },\n      \n      <span class="hljs-comment">// 等价于</span>\n      <span class="hljs-title class_">FunctionDeclaration</span>: {\n        <span class="hljs-title function_">enter</span>(<span class="hljs-params">path</span>) { <span class="hljs-comment">/* 进入节点时执行 */</span> },\n        <span class="hljs-title function_">exit</span>(<span class="hljs-params">path</span>) { <span class="hljs-comment">/* 离开节点时执行 */</span> }\n      }\n    }\n  };\n}\n</code></pre>\n<h3><strong>2. <code>enter</code> 方法</strong></h3>\n<ul>\n<li><strong>触发时机</strong>  ：在遍历到节点的开始位置时调用。</li>\n<li><strong>用途</strong>  ：\n<ul>\n<li>收集信息（如变量定义、函数参数）。</li>\n<li>提前修改节点（如重命名标识符）。</li>\n<li>终止或跳过子节点的遍历（通过 <code>path.skip()</code>）。</li>\n</ul>\n</li>\n</ul>\n<h4><strong>示例：统计函数声明数量</strong></h4>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> counter = {\n  <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>,\n  <span class="hljs-attr">visitor</span>: {\n    <span class="hljs-title class_">FunctionDeclaration</span>: {\n      <span class="hljs-title function_">enter</span>(<span class="hljs-params">path</span>) {\n        <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span>++; <span class="hljs-comment">// 进入函数节点时计数</span>\n      }\n    }\n  }\n};\n</code></pre>\n<h3><strong>3. <code>exit</code> 方法</strong></h3>\n<ul>\n<li><strong>触发时机</strong>  ：在遍历完节点的所有子节点后调用。</li>\n<li><strong>用途</strong>  ：\n<ul>\n<li>确保子节点处理完成后再进行操作（如替换整个节点）。</li>\n<li>处理依赖子节点结果的逻辑（如计算表达式值）。</li>\n</ul>\n</li>\n</ul>\n<h4><strong>示例：替换箭头函数为普通函数</strong></h4>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> arrowFunctionTransformer = {\n  <span class="hljs-attr">visitor</span>: {\n    <span class="hljs-title class_">ArrowFunctionExpression</span>: {\n      <span class="hljs-title function_">exit</span>(<span class="hljs-params">path</span>) {\n        <span class="hljs-comment">// 在所有子节点处理完成后，将箭头函数转换为普通函数</span>\n        path.<span class="hljs-title function_">replaceWith</span>(<span class="hljs-comment">/* 转换后的节点 */</span>);\n      }\n    }\n  }\n};\n</code></pre>\n<h3><strong>4. 执行顺序</strong></h3>\n<p>当遍历一个嵌套的 AST 时，<code>enter</code> 和 <code>exit</code> 的调用顺序类似于递归：</p>\n<pre><code>父节点 enter\n  子节点 enter\n    孙节点 enter\n    孙节点 exit\n  子节点 exit\n父节点 exit\n</code></pre>\n<h4><strong>示例代码</strong></h4>\n<p>假设有以下 AST 结构：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">add</span>(<span class="hljs-params">a, b</span>) {\n  <span class="hljs-keyword">return</span> a + b;\n}\n</code></pre>\n<p>遍历顺序为：</p>\n<ol>\n<li><code>FunctionDeclaration</code> enter</li>\n<li><code>Identifier</code> (add) enter/exit</li>\n<li><code>Identifier</code> (a) enter/exit</li>\n<li><code>Identifier</code> (b) enter/exit</li>\n<li><code>ReturnStatement</code> enter</li>\n<li><code>BinaryExpression</code> enter</li>\n<li><code>Identifier</code> (a) enter/exit</li>\n<li><code>Identifier</code> (b) enter/exit</li>\n<li><code>BinaryExpression</code> exit</li>\n<li><code>ReturnStatement</code> exit</li>\n<li><code>FunctionDeclaration</code> exit</li>\n</ol>\n<h3><strong>5. 常见应用场景</strong></h3>\n<table>\n<thead>\n<tr>\n<th><strong>场景</strong></th>\n<th><strong>使用 <code>enter</code></strong></th>\n<th><strong>使用 <code>exit</code></strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>变量重命名</td>\n<td>直接修改标识符节点</td>\n<td>确保所有引用都被更新后再修改</td>\n</tr>\n<tr>\n<td>节点替换</td>\n<td>立即替换节点（可能影响子节点遍历）</td>\n<td>在子节点处理完成后替换</td>\n</tr>\n<tr>\n<td>收集作用域信息</td>\n<td>进入作用域时记录变量</td>\n<td>离开作用域时验证变量使用</td>\n</tr>\n<tr>\n<td>性能优化</td>\n<td>尽早终止不需要的遍历</td>\n<td>批量处理复杂转换</td>\n</tr>\n</tbody>\n</table>\n<h3><strong>6. 注意事项</strong></h3>\n<ul>\n<li><strong>修改节点</strong>  ：在 <code>enter</code> 中修改节点可能导致子节点无法正确遍历，而 <code>exit</code> 更适合替换整个节点。</li>\n<li><strong>状态管理</strong>  ：避免在 <code>enter</code>/<code>exit</code> 中使用全局状态，推荐通过 <code>path.scope</code> 或插件实例管理状态。</li>\n<li><strong>跳过遍历</strong>  ：使用 <code>path.skip()</code> 可终止当前节点的子节点遍历（仅影响 <code>enter</code>）。</li>\n</ul>\n<h3><strong>总结</strong></h3>\n<ul>\n<li><strong><code>enter</code></strong>  ：适合预处理、信息收集或快速修改。</li>\n<li><strong><code>exit</code></strong>  ：适合依赖子节点处理结果的操作或全局转换。</li>\n</ul>\n<p>合理使用 <code>enter</code> 和 <code>exit</code> 能让 Babel 插件更高效、更健壮。</p>\n</div>'</script></body></html>
