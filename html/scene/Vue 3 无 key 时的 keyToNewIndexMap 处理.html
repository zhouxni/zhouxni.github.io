<!DOCTYPE html><html lang="en"><head>

    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;

    }
  </style></head>
  
  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
            document.getElementById('article').innerHTML = 
            "<div><p>在 Vue 3 的 diff 算法中，当子元素没有绑定 <code>key</code> 时，处理方式与 React 类似但有一些关键区别：</p>\n<h2>无 key 时的处理机制</h2>\n<ol>\n<li><strong><code>keyToNewIndexMap</code> 不会被创建</strong>  ：\n<ul>\n<li>Vue 3 会完全跳过构建这个基于 key 的映射表</li>\n<li>改为使用<strong>顺序比较法</strong>  （类似于 React 的无 key 策略）</li>\n</ul>\n</li>\n<li><strong>替代的比较方式</strong>  ：\n<ul>\n<li>通过 <code>patchKeyedChildren</code> 函数的另一种逻辑路径处理</li>\n<li>直接按新旧子节点的<strong>位置顺序</strong>  进行比较</li>\n</ul>\n<pre><code class=\"language-typescript\"><span class=\"hljs-comment\">// 伪代码表示 Vue 3 的无 key 比较逻辑</span>\n<span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">let</span> i = <span class=\"hljs-number\">0</span>; i &lt; newChildren.<span class=\"hljs-property\">length</span>; i++) {\n  <span class=\"hljs-keyword\">const</span> newVNode = newChildren[i]\n  <span class=\"hljs-keyword\">const</span> oldVNode = oldChildren[i]\n  \n  <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-title function_\">sameVNodeType</span>(oldVNode, newVNode)) {\n    <span class=\"hljs-title function_\">patch</span>(oldVNode, newVNode) <span class=\"hljs-comment\">// 复用节点</span>\n  } <span class=\"hljs-keyword\">else</span> {\n    <span class=\"hljs-comment\">// 创建新节点</span>\n  }\n}\n</code></pre>\n</li>\n<li><strong>索引保存方式</strong>  ：\n<ul>\n<li>不会将无 key 节点的索引存入任何映射表</li>\n<li>比较时直接使用数组下标作为位置参考</li>\n<li>在 <code>newIndexToOldIndexMap</code> 中，无 key 节点会被当作&quot;可能可复用&quot;的节点处理</li>\n</ul>\n</li>\n</ol>\n<h2>与有 key 时的性能对比</h2>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>有 key (使用 keyToNewIndexMap)</th>\n<th>无 key</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>节点复用</td>\n<td>跨位置识别相同节点</td>\n<td>仅能识别相同位置的相同类型</td>\n</tr>\n<tr>\n<td>DOM 操作</td>\n<td>最小化移动</td>\n<td>可能大量销毁/重建</td>\n</tr>\n<tr>\n<td>复杂度</td>\n<td>O(n)</td>\n<td>O(n)但实际效率更低</td>\n</tr>\n</tbody>\n</table>\n<h2>特殊处理细节</h2>\n<ol>\n<li><strong>类型检查</strong>  ：\n<ul>\n<li>Vue 会通过 <code>sameVNodeType</code> 检查节点类型是否相同</li>\n<li>类型相同但无 key 的节点可能被复用（如果位置相同）</li>\n</ul>\n</li>\n<li><strong>移动优化</strong>  ：\n<ul>\n<li>无 key 时完全无法使用基于 LIS 的移动优化算法</li>\n<li>所有顺序变化都会导致节点重建</li>\n</ul>\n</li>\n</ol>\n<h2>最佳实践</h2>\n<p>Vue 官方同样建议：</p>\n<blockquote>\n<p>对于动态列表始终提供唯一 key\n避免依赖无 key 时的默认行为</p>\n</blockquote>\n<p>无 key 模式是 Vue 的降级策略，仅适用于简单静态列表，在动态列表中使用会导致性能显著下降。</p>\n</div>";
          </script></body></html>
