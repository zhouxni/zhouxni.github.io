    body {

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
        document.getElementById('article').innerHTML = 
        "<div><p>在 React 中，<strong>Commit 阶段</strong>   是协调（Reconciliation）过程的最后一步，负责将虚拟 DOM 的变化应用到真实 DOM 并执行相关副作用。这个阶段分为三个主要子阶段，每个阶段执行特定类型的操作：</p>\n<h3><strong>1. 三个阶段概述</strong></h3>\n<pre><code>┌───────────────────┐     ┌───────────────────┐     ┌───────────────────┐\n│  before mutation  │ →→→ │     mutation      │ →→→ │    layout         │\n└───────────────────┘     └───────────────────┘     └───────────────────┘\n</code></pre>\n<h3><strong>2. 各阶段具体工作</strong></h3>\n<h4><strong>（1）Before Mutation 阶段</strong></h4>\n<ul>\n<li><strong>主要任务</strong>   ：读取 DOM 布局信息（如滚动位置、尺寸），准备 DOM 更新。</li>\n<li><strong>执行内容</strong>   ：\n<ul>\n<li>调用 <code>getSnapshotBeforeUpdate</code>（类组件生命周期）。</li>\n</ul>\n</li>\n<li><strong>关键点</strong>   ：此时 DOM 尚未更新，可获取更新前的布局信息。</li>\n</ul>\n<h4><strong>（2）Mutation 阶段</strong></h4>\n<ul>\n<li><strong>主要任务</strong>   ：更新真实 DOM。</li>\n<li><strong>执行内容</strong>   ：\n<ul>\n<li>根据 Diff 结果批量更新 DOM（插入、删除、修改节点）。</li>\n<li>组件删除时调用 <code>componentWillUnmount</code>（类组件生命周期）。</li>\n<li>执行 <code>useLayoutEffect</code> 的清理函数</li>\n</ul>\n</li>\n<li><strong>关键点</strong>   ：DOM 已更新，但用户尚未看到变化（浏览器尚未绘制）。</li>\n</ul>\n<h4><strong>（3）Layout 阶段</strong></h4>\n<ul>\n<li><strong>主要任务</strong>   ：执行依赖 DOM 布局的操作，通知应用更新完成。</li>\n<li><strong>执行内容</strong>   ：\n<ul>\n<li>调用 <code>componentDidMount</code>/<code>componentDidUpdate</code>（类组件生命周期）。</li>\n<li>执行 <code>useLayoutEffect</code> 的回调函数（同步执行）。</li>\n<li>调度 <code>useEffect</code> 的清理和回调函数（异步执行）。</li>\n</ul>\n</li>\n<li><strong>关键点</strong>   ：DOM 已更新且用户可见，可读取最新布局信息。</li>\n</ul>\n<h3><strong>3. 阶段对比与设计目的</strong></h3>\n<table>\n<thead>\n<tr>\n<th>阶段</th>\n<th>执行时机</th>\n<th>是否阻塞渲染</th>\n<th>典型用途</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Before Mutation</td>\n<td>DOM 更新前</td>\n<td>是</td>\n<td>读取旧 DOM 布局信息</td>\n</tr>\n<tr>\n<td>Mutation</td>\n<td>DOM 更新中</td>\n<td>是</td>\n<td>修改真实 DOM</td>\n</tr>\n<tr>\n<td>Layout</td>\n<td>DOM 更新后，用户可见前</td>\n<td>是</td>\n<td>执行依赖新 DOM 布局的操作</td>\n</tr>\n<tr>\n<td>Effect</td>\n<td>异步（Layout 后）</td>\n<td>否</td>\n<td>执行副作用（如 API 调用、订阅）</td>\n</tr>\n</tbody>\n</table>\n<h3><strong>4. 性能优化建议</strong></h3>\n<ul>\n<li><strong>避免在 Layout 阶段执行耗时操作</strong>   ：<code>useLayoutEffect</code> 和生命周期方法会阻塞浏览器绘制。</li>\n<li><strong>优先使用 <code>useEffect</code></strong>   ：对于不依赖 DOM 布局的副作用（如数据获取），避免阻塞渲染。</li>\n<li><strong>批量 DOM 操作</strong>   ：React 会在 Mutation 阶段批量更新 DOM，减少重排重绘。</li>\n</ul>\n<h3><strong>总结</strong></h3>\n<p>Commit 阶段的三个子阶段通过分工协作，确保了 DOM 更新的高效性和一致性：</p>\n<ol>\n<li><strong>Before Mutation</strong>   ：准备 DOM 更新，读取旧布局。</li>\n<li><strong>Mutation</strong>   ：执行实际 DOM 变更。</li>\n<li><strong>Layout</strong>   ：同步执行依赖新 DOM 的操作，通知应用更新完成。</li>\n</ol>\n<p>这种设计使得 React 能够高效地处理复杂 UI 更新，并提供了明确的副作用执行时机。</p>\n</div>";
      </script></body></html>
