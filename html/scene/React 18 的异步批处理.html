<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="React 18 的异步批处理",document.getElementById("article").innerHTML='<div><p>React 18 的“异步批处理”（Automatic Batching）并不是简单地把 <code>batchedUpdates</code> 再包一层 Promise，而是把「<strong>更新何时 flush</strong>   」的决定权从<strong>同步调用栈结束</strong>   改成了「<strong>让 Scheduler 在微任务阶段统一调度</strong>   」。<br>\n核心链路只有 3 步：</p>\n<ol>\n<li>任何 setState → 2. 把 update 挂到 root 上 → 3. Scheduler 在微任务里 flush。<br>\n下面把关键源码（18.2.0）拆开给你看。</li>\n</ol>\n<hr>\n<ol>\n<li>入口：setState → scheduleUpdateOnFiber<br>\npackages/react-reconciler/src/ReactFiberWorkLoop.js</li>\n</ol>\n<pre><code class="language-js"><span class="hljs-keyword">export</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">scheduleUpdateOnFiber</span>(<span class="hljs-params">\n  root: FiberRoot,\n  fiber: Fiber,\n  lane: Lane,\n  eventTime: number\n</span>) {\n  <span class="hljs-comment">// 标记 root 有待处理工作</span>\n  <span class="hljs-title function_">markRootUpdated</span>(root, lane, eventTime);\n\n  <span class="hljs-comment">// 🔑 关键：不再区分 executionContext，统一走 ensureRootIsScheduled</span>\n  <span class="hljs-title function_">ensureRootIsScheduled</span>(root, eventTime);\n\n  <span class="hljs-comment">// flushSync 场景才立即 flush</span>\n  <span class="hljs-keyword">if</span> ((executionContext &amp; (<span class="hljs-title class_">RenderContext</span> | <span class="hljs-title class_">CommitContext</span>)) !== <span class="hljs-title class_">NoContext</span>) {\n    <span class="hljs-keyword">return</span>;\n  }\n}\n</code></pre>\n<ul>\n<li>Legacy 模式或 flushSync 场景会立即 flush；</li>\n<li>默认 Concurrent Root 会进入 <strong>ensureRootIsScheduled</strong>   ，把 flush 推迟到微任务。</li>\n</ul>\n<hr>\n<ol start="2">\n<li>ensureRootIsScheduled → scheduleCallback<br>\npackages/react-reconciler/src/ReactFiberWorkLoop.js</li>\n</ol>\n<pre><code class="language-js"><span class="hljs-keyword">function</span> <span class="hljs-title function_">ensureRootIsScheduled</span>(<span class="hljs-params">root: FiberRoot, currentTime: number</span>) {\n  <span class="hljs-keyword">const</span> existingCallbackNode = root.<span class="hljs-property">callbackNode</span>;\n\n  <span class="hljs-keyword">const</span> nextLanes = <span class="hljs-title function_">getNextLanes</span>(\n    root,\n    root === workInProgressRoot ? workInProgressRootRenderLanes : <span class="hljs-title class_">NoLanes</span>\n  );\n  <span class="hljs-keyword">if</span> (nextLanes === <span class="hljs-title class_">NoLanes</span>) {\n    <span class="hljs-comment">// 没有工作，取消已有 callback</span>\n    <span class="hljs-keyword">if</span> (existingCallbackNode !== <span class="hljs-literal">null</span>) {\n      <span class="hljs-title function_">cancelCallback</span>(existingCallbackNode);\n      root.<span class="hljs-property">callbackNode</span> = <span class="hljs-literal">null</span>;\n    }\n    <span class="hljs-keyword">return</span>;\n  }\n\n  <span class="hljs-keyword">const</span> priority = <span class="hljs-title function_">lanesToEventPriority</span>(nextLanes);\n  <span class="hljs-keyword">const</span> schedulerPriorityLevel = <span class="hljs-title function_">eventPriorityToSchedulerPriority</span>(priority);\n\n  <span class="hljs-keyword">const</span> newCallbackNode = <span class="hljs-title function_">scheduleCallback</span>(\n    schedulerPriorityLevel,\n    performConcurrentWorkOnRoot.<span class="hljs-title function_">bind</span>(<span class="hljs-literal">null</span>, root) <span class="hljs-comment">// ← 真正渲染函数</span>\n  );\n\n  root.<span class="hljs-property">callbackNode</span> = newCallbackNode;\n}\n</code></pre>\n<ul>\n<li><code>scheduleCallback</code> 来自 <code>scheduler</code> 包，内部用 <code>MessageChannel</code> / <code>setImmediate</code> / <code>setTimeout</code> 实现 <strong>微任务/宏任务调度</strong>   。</li>\n<li>因此更新被<strong>异步</strong>   （微任务后）执行，实现“自动批处理”。</li>\n</ul>\n<hr>\n<ol start="3">\n<li>Scheduler 调度 → performConcurrentWorkOnRoot<br>\npackages/scheduler/src/Scheduler.js</li>\n</ol>\n<pre><code class="language-js"><span class="hljs-keyword">function</span> <span class="hljs-title function_">unstable_scheduleCallback</span>(<span class="hljs-params">priorityLevel, callback</span>) {\n  <span class="hljs-keyword">const</span> currentTime = <span class="hljs-title function_">getCurrentTime</span>();\n  <span class="hljs-keyword">const</span> startTime = currentTime;\n\n  <span class="hljs-keyword">const</span> newTask = {\n    <span class="hljs-attr">id</span>: taskIdCounter++,\n    callback,\n    priorityLevel,\n    startTime,\n    <span class="hljs-attr">expirationTime</span>: startTime + <span class="hljs-title function_">timeoutForPriorityLevel</span>(priorityLevel),\n  };\n\n  <span class="hljs-comment">// 把任务 push 到 taskQueue，稍后 flush</span>\n  <span class="hljs-title function_">push</span>(taskQueue, newTask);\n  <span class="hljs-title function_">requestHostCallback</span>(flushWork); <span class="hljs-comment">// MessageChannel / setTimeout</span>\n}\n</code></pre>\n<ul>\n<li><code>requestHostCallback</code> 在下一次<strong>微任务/宏任务</strong>   里调用 <code>flushWork</code> → <code>performConcurrentWorkOnRoot</code>，真正完成 render + commit。</li>\n<li>因此<strong>所有 setState</strong>   无论写在 React 事件、setTimeout、Promise、原生事件里，都先被收集到同一个 <code>root</code>，然后<strong>统一</strong>   在微任务阶段 flush，实现“异步批处理”。</li>\n</ul>\n<hr>\n<ol start="4">\n<li>如何强制同步：flushSync<br>\npackages/react-dom/src/client/ReactDOM.js</li>\n</ol>\n<pre><code class="language-js"><span class="hljs-keyword">export</span> <span class="hljs-keyword">function</span> flushSync&lt;R&gt;(<span class="hljs-attr">fn</span>: <span class="hljs-function">() =&gt;</span> R): R {\n  <span class="hljs-comment">// 进入同步执行上下文</span>\n  <span class="hljs-keyword">const</span> prevExecutionContext = executionContext;\n  executionContext |= <span class="hljs-title class_">BatchedContext</span> | <span class="hljs-title class_">SyncContext</span>;\n  <span class="hljs-keyword">try</span> {\n    <span class="hljs-keyword">return</span> <span class="hljs-title function_">fn</span>(); <span class="hljs-comment">// 立即执行</span>\n  } <span class="hljs-keyword">finally</span> {\n    executionContext = prevExecutionContext;\n    <span class="hljs-title function_">flushSyncCallbacks</span>(); <span class="hljs-comment">// 立即 flush</span>\n  }\n}\n</code></pre>\n<ul>\n<li><code>flushSync</code> 会把 <code>executionContext</code> 打上 <code>SyncContext</code>，<code>scheduleUpdateOnFiber</code> 看到该标记就立刻 <code>flushSyncCallbacks</code>，跳出批处理。</li>\n</ul>\n<hr>\n<p>总结一句话<br>\nReact 18 的异步批处理 = <strong>Scheduler 微任务调度 + Lane 优先级模型</strong>   ：<br>\n任何 setState 都先挂到 root → <code>ensureRootIsScheduled</code> 用 <code>scheduleCallback</code> 把 flush 推迟到微任务 → 所有更新在一次渲染里完成；<br>\n需要同步时再用 <code>flushSync</code>。</p>\n</div>'</script></body></html>
