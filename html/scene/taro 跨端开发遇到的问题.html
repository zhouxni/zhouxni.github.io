<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="taro 跨端开发遇到的问题",document.getElementById("article").innerHTML='<div><ol>\n<li>\n<p>taro 版本升级后无法识别process.env.TARO_ENV<a href="https://github.com/NervJS/taro/issues/8900" target="_blank">fix</a></p>\n</li>\n<li>\n<p>多次跳转相同参数的同一页面时 componentDidShow生命周期不触发的问题<a href="https://github.com/NervJS/taro/issues/8874" target="_blank">fix</a></p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 假设页面栈如下</span>\n[A,B,A,B,A]\n<span class="hljs-comment">// 返回</span>\n[A,B,A,B] B 页面的 componentDidShow 触发\n<span class="hljs-comment">// 返回</span>\n[A,B,A] A 页面的 componentDidShow 触发\n<span class="hljs-comment">// 返回</span>\n[A,B] B 页面的 componentDidShow 不触发\n<span class="hljs-comment">// 返回</span>\n[A]A 页面的 componentDidShow 不触发\n</code></pre>\n<p>当在页面路径后面拼上一个时间戳,每次返回都可以触发当前页面的componentDidShow钩子</p>\n<p>3.Taro 3.X React 微信小程序 input 组件输入过快会出现闪烁的问题<a href="https://github.com/NervJS/taro/issues/9664" target="_blank">fix</a></p>\n</li>\n</ol>\n</div>'</script></body></html>
