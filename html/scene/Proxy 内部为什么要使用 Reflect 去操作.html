<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Proxy 内部为什么要使用 Reflect 去操作",document.getElementById("article").innerHTML='<div><p>&quot;完整保留原生行为&quot;指的是在使用 <code>Proxy</code> 拦截对象操作时，通过 <code>Reflect</code> 确保被拦截的操作与<strong>未被代理时的原生行为完全一致</strong>   ，不会因为拦截逻辑而改变对象的基础功能和特性。</p>\n<h3>具体表现</h3>\n<ol>\n<li>\n<p><strong>行为一致性</strong><br>\n例如对对象属性赋值时，原生行为包含：</p>\n<ul>\n<li>触发对象自身的 <code>setter</code>（如果定义了）</li>\n<li>遵循原型链查找规则</li>\n<li>正确处理 <code>receiver</code>（确保 <code>this</code> 指向正确）</li>\n<li>返回操作是否成功的结果</li>\n</ul>\n<p>使用 <code>Reflect.set(target, prop, value, receiver)</code> 可以完整保留这些行为，而手动操作（如 <code>target[prop] = value</code>）可能破坏其中某些特性。</p>\n</li>\n<li>\n<p><strong>异常与返回值一致</strong><br>\n原生操作抛出的异常、返回的结果，通过 <code>Reflect</code> 转发后完全相同。例如：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> obj = <span class="hljs-title class_">Object</span>.<span class="hljs-title function_">freeze</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;张三&quot;</span> }); <span class="hljs-comment">// 冻结对象，禁止修改</span>\n\n<span class="hljs-comment">// 原生操作：抛出错误</span>\n<span class="hljs-keyword">try</span> {\n  obj.<span class="hljs-property">name</span> = <span class="hljs-string">&quot;李四&quot;</span>;\n} <span class="hljs-keyword">catch</span> (e) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;原生操作失败：&quot;</span>, e);\n}\n\n<span class="hljs-comment">// 使用 Proxy + Reflect 拦截</span>\n<span class="hljs-keyword">const</span> proxy = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Proxy</span>(obj, {\n  <span class="hljs-title function_">set</span>(<span class="hljs-params">target, prop, value</span>) {\n    <span class="hljs-comment">// 通过 Reflect 保留原生的错误行为</span>\n    <span class="hljs-keyword">return</span> <span class="hljs-title class_">Reflect</span>.<span class="hljs-title function_">set</span>(target, prop, value);\n  },\n});\n\n<span class="hljs-keyword">try</span> {\n  proxy.<span class="hljs-property">name</span> = <span class="hljs-string">&quot;李四&quot;</span>;\n} <span class="hljs-keyword">catch</span> (e) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;代理操作失败：&quot;</span>, e);\n} <span class="hljs-comment">// 与原生错误一致</span>\n</code></pre>\n</li>\n<li>\n<p><strong>上下文正确</strong><br>\n<code>Reflect</code> 会正确处理 <code>receiver</code> 参数，确保对象方法中的 <code>this</code> 指向代理对象而非原始对象，这对原型链继承等场景至关重要：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> parent = {\n  <span class="hljs-keyword">get</span> <span class="hljs-title function_">value</span>() {\n    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">_value</span>;\n  },\n};\n\n<span class="hljs-keyword">const</span> child = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Proxy</span>(\n  { <span class="hljs-attr">_value</span>: <span class="hljs-number">10</span> },\n  {\n    <span class="hljs-title function_">get</span>(<span class="hljs-params">target, prop, receiver</span>) {\n      <span class="hljs-comment">// 使用 Reflect 确保 this 指向 proxy（receiver）</span>\n      <span class="hljs-keyword">return</span> <span class="hljs-title class_">Reflect</span>.<span class="hljs-title function_">get</span>(target, prop, receiver);\n    },\n  },\n);\n\n<span class="hljs-title class_">Object</span>.<span class="hljs-title function_">setPrototypeOf</span>(child, parent);\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(child.<span class="hljs-property">value</span>); <span class="hljs-comment">// 10（正确，this 指向 child）</span>\n</code></pre>\n<p>如果改用 <code>return target[prop]</code>，<code>this</code> 会指向原始对象 <code>target</code>，导致结果错误。</p>\n</li>\n</ol>\n<h3>为什么重要？</h3>\n<p>如果不使用 <code>Reflect</code> 保留原生行为，代理对象可能出现：</p>\n<ul>\n<li>原型链断裂</li>\n<li><code>this</code> 指向错误</li>\n<li>特殊对象（如冻结对象、密封对象）的特性失效</li>\n<li>与原生 API 交互时出现异常</li>\n</ul>\n<p>因此，<code>Reflect</code> 是 <code>Proxy</code> 实现&quot;增强不破坏&quot;的核心保障，让开发者可以安全地在拦截逻辑中扩展功能，同时不影响对象的基础行为。</p>\n</div>'</script></body></html>
