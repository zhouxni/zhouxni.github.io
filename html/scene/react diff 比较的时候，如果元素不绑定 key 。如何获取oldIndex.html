<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../css/github-markdown.min.css">
    <link rel="stylesheet" href="../../css/github.min.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }
  </style></head>
  
  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
    
        document.getElementById('article').innerHTML = 
        "<div><h1>React Diff 中无 key 元素的 oldIndex 获取方式</h1>\n<p>当 React 在进行虚拟 DOM 比较（reconciliation）时，如果子元素没有绑定 <code>key</code>，React 会采用不同的策略来确定 <code>oldIndex</code>（旧节点在旧列表中的位置索引）。</p>\n<h2>无 key 时的比较策略</h2>\n<ol>\n<li><strong>顺序比较法</strong>  ：\n<ul>\n<li>React 会<strong>按顺序</strong>  遍历新旧子节点列表</li>\n<li>直接通过<strong>位置索引</strong>  （数组下标）来对应新旧节点</li>\n<li><code>oldIndex</code> 就是当前遍历到的数组下标</li>\n</ul>\n</li>\n<li><strong>具体流程</strong>  ：<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 伪代码表示无 key 时的比较逻辑</span>\n<span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">let</span> i = <span class=\"hljs-number\">0</span>; i &lt; newChildren.<span class=\"hljs-property\">length</span>; i++) {\n  <span class=\"hljs-keyword\">const</span> newChild = newChildren[i];\n  <span class=\"hljs-keyword\">const</span> oldChild = oldChildren[i]; <span class=\"hljs-comment\">// 直接按相同位置获取</span>\n  \n  <span class=\"hljs-keyword\">if</span> (oldChild &amp;&amp; newChild.<span class=\"hljs-property\">type</span> === oldChild.<span class=\"hljs-property\">type</span>) {\n    <span class=\"hljs-comment\">// 复用节点</span>\n    oldIndex = i; <span class=\"hljs-comment\">// 直接使用循环索引作为 oldIndex</span>\n  } <span class=\"hljs-keyword\">else</span> {\n    <span class=\"hljs-comment\">// 创建新节点或销毁旧节点</span>\n  }\n}\n</code></pre>\n</li>\n</ol>\n<h2>与有 key 时的区别</h2>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>有 key</th>\n<th>无 key</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>oldIndex 获取</td>\n<td>通过 key 映射表查找</td>\n<td>直接使用数组下标</td>\n</tr>\n<tr>\n<td>复用效率</td>\n<td>高效（可识别跨位置移动）</td>\n<td>低效（仅能识别顺序不变情况）</td>\n</tr>\n<tr>\n<td>性能影响</td>\n<td>最小化 DOM 操作</td>\n<td>可能导致更多不必要的更新</td>\n</tr>\n</tbody>\n</table>\n<h2>潜在问题</h2>\n<ol>\n<li><strong>列表顺序变化时</strong>  ：\n<ul>\n<li>无 key 会导致 React 认为所有位置变化的节点都需要销毁重建</li>\n<li>即使实际只是顺序变了，也会触发完整卸载和重新挂载</li>\n</ul>\n</li>\n<li><strong>性能下降</strong>  ：\n<ul>\n<li>组件状态会丢失（因为节点被重建而非移动）</li>\n<li>触发不必要的生命周期方法（如 <code>componentDidMount</code>）</li>\n</ul>\n</li>\n</ol>\n<h2>最佳实践</h2>\n<p>React 官方强烈建议：</p>\n<blockquote>\n<p>对于动态列表的子元素，始终提供稳定且唯一的 key 值\n避免使用数组索引作为 key（除非列表完全静态）</p>\n</blockquote>\n<p>这种无 key 的比较方式是 React 的降级策略，仅在开发者未提供 key 时使用，性能上远不如正确使用 key 的优化算法。</p>\n</div>";
      </script></body></html>
