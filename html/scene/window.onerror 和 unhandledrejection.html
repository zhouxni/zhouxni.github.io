<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p>在Web开发中，<code>window.onerror</code> 和 <code>unhandledrejection</code> 是两个用于捕获和处理JavaScript运行时错误的重要机制。它们分别用于处理不同类型的错误场景。</p>\n<h3>window.onerror</h3>\n<p><code>window.onerror</code> 是一个全局错误处理事件，用于捕获运行时错误。这些错误通常包括语法错误、运行时异常等。通过为 <code>window.onerror</code> 分配一个处理函数，你可以捕获这些错误并进行相应的处理，比如记录错误日志、发送错误报告等。</p>\n<h4>使用方法</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">onerror</span> = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">message, source, lineno, colno, error</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;Error message:&#x27;</span>, message);\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;Source:&#x27;</span>, source);\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;Line number:&#x27;</span>, lineno);\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;Column number:&#x27;</span>, colno);\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;Error object:&#x27;</span>, error);\n  <span class=\"hljs-comment\">// 可以在这里发送错误报告到服务器或错误跟踪服务</span>\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-literal\">true</span>; <span class=\"hljs-comment\">// 返回true表示错误已被处理，会阻止浏览器的默认错误行为（如显示错误对话框）</span>\n};\n</code></pre>\n<h4>参数说明</h4>\n<ul>\n<li><code>message</code>: 错误信息。</li>\n<li><code>source</code>: 发生错误的脚本URL。</li>\n<li><code>lineno</code>: 发生错误的行号。</li>\n<li><code>colno</code>: 发生错误的列号。</li>\n<li><code>error</code>: Error对象（如果浏览器支持）。</li>\n</ul>\n<h3>unhandledrejection</h3>\n<p><code>unhandledrejection</code> 事件用于捕获未处理的Promise拒绝。在异步编程中，如果Promise被拒绝但没有相应的<code>.catch()</code>处理，就会触发<code>unhandledrejection</code>事件。这对于捕获异步代码中的错误非常有用。</p>\n<h4>使用方法</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;unhandledrejection&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">event</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;Unhandled rejection:&#x27;</span>, event.<span class=\"hljs-property\">reason</span>);\n  <span class=\"hljs-comment\">// 可以在这里发送错误报告到服务器或错误跟踪服务</span>\n  <span class=\"hljs-comment\">// event.preventDefault(); // 如果需要，可以调用此方法阻止默认行为（在某些浏览器中可能无效）</span>\n});\n</code></pre>\n<h4>参数说明</h4>\n<ul>\n<li><code>event</code>: 一个包含拒绝原因（<code>event.reason</code>）和Promise对象（<code>event.promise</code>）的事件对象。</li>\n</ul>\n<h3>区别与联系</h3>\n<ul>\n<li><strong>区别</strong>  :\n<ul>\n<li><code>window.onerror</code> 主要用于捕获同步代码中的运行时错误。</li>\n<li><code>unhandledrejection</code> 专门用于捕获未处理的Promise拒绝，即异步代码中的错误。</li>\n</ul>\n</li>\n<li><strong>联系</strong>  :\n<ul>\n<li>两者都是全局错误处理机制，用于提升应用的健壮性和用户体验。</li>\n<li>在实际应用中，通常会同时使用这两个机制来确保尽可能多地捕获和处理错误。</li>\n</ul>\n</li>\n</ul>\n<h3>实践建议</h3>\n<ol>\n<li><strong>结合使用</strong>  : 在项目中同时设置 <code>window.onerror</code> 和 <code>unhandledrejection</code> 处理函数，以全面捕获错误。</li>\n<li><strong>错误报告</strong>  : 将捕获到的错误发送到服务器或错误跟踪服务（如Sentry），以便进行后续分析和处理。</li>\n<li><strong>用户反馈</strong>  : 在捕获到错误后，向用户提供友好的反馈，避免显示技术性的错误信息。</li>\n<li><strong>调试与测试</strong>  : 在开发阶段充分利用调试工具，并编写单元测试和集成测试来预防错误的发生。</li>\n</ol>\n</div>";
      </script></body></html>
