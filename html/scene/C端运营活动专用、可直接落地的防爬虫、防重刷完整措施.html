心IP、代理IP → 禁止参与</li>\n<li>海外IP → 直接拦截（除非活动允许）</li>\n</ul>\n<h2>3. 请求头合法性校验</h2>\n<ul>\n<li>无UA、异常UA → 拦截</li>\n<li>Referer/Origin异常、跨域非法来源 → 拦截</li>\n<li>请求缺少必要Cookie/TrackID → 拦截</li>\n</ul>\n<h1>四、接口层：防抓包、防重放、防暴力刷接口</h1>\n<h2>1. 接口签名（防抓包直接刷）</h2>\n<p>前端用固定规则生成签名，后端校验：</p>\n<pre><code>sign = MD5( uid + activityId + timestamp + salt + nonce )\n</code></pre>\n<p>规则：</p>\n<ul>\n<li>timestamp 有效期 5~10 分钟</li>\n<li>nonce 随机串，<strong>一次性使用，不可重复</strong></li>\n<li>签名错误/过期/重复 → 直接拒绝</li>\n</ul>\n<h2>2. 防重放攻击</h2>\n<ul>\n<li>每个请求带唯一 <code>requestId</code></li>\n<li>后端存入Redis 10分钟过期</li>\n<li>重复requestId直接拒绝</li>\n</ul>\n<h2>3. 接口限流（必须做）</h2>\n<p>使用<strong>滑动窗口限流</strong>   ：</p>\n<ul>\n<li>单用户 1 秒 ≤ 2 次</li>\n<li>单用户 1 分钟 ≤ 10 次</li>\n<li>单IP 1 分钟 ≤ 30 次\n超过直接返回“操作频繁”。</li>\n</ul>\n<h2>4. 分布式锁（防并发重复领取）</h2>\n<p>对抽奖/领奖接口加锁：</p>\n<pre><code>lock_key = &quot;activity:lock:{uid}&quot;\n</code></pre>\n<ul>\n<li>加锁成功才执行发奖</li>\n<li>防止重复提交、并发刷单</li>\n</ul>\n<h1>五、行为层：识别爬虫/脚本（非常有效）</h1>\n<h2>1. 访问路径校验</h2>\n<p>正常用户行为：\n进入页面 → 浏览 → 点击 → 参与</p>\n<p>爬虫行为：\n无页面访问 → 直接调用接口</p>\n<p>规则：</p>\n<ul>\n<li>无页面轨迹直接调接口 → 高风险</li>\n<li>从进入页面到参与 &lt; 2~3秒 → 高风险</li>\n<li>无任何点击、滑动行为 → 高风险</li>\n</ul>\n<h2>2. 点击与操作行为校验</h2>\n<ul>\n<li>点击间隔极稳定（如固定1.2秒一次）→ 机器</li>\n<li>无鼠标移动、无停留、无焦点切换 → 机器</li>\n<li>短时间大量相同行为 → 机器</li>\n</ul>\n<h2>3. 人机验证（reCAPTCHA/防水墙/阿里云验证）</h2>\n<p>触发验证条件：</p>\n<ul>\n<li>频率超限</li>\n<li>IP异常</li>\n<li>设备异常</li>\n<li>新用户/无历史行为用户</li>\n<li>夜间高峰时段</li>\n</ul>\n<p>策略：</p>\n<ul>\n<li>低风险：无感通过</li>\n<li>中风险：弹出验证码</li>\n<li>高风险：直接拦截</li>\n</ul>\n<h1>六、业务风控层：活动专属防刷策略</h1>\n<h2>1. 次数硬限制</h2>\n<ul>\n<li>每人每日参与上限</li>\n<li>每人活动总参与上限</li>\n<li>每日总奖励发放上限</li>\n<li>单小时奖励发放上限</li>\n</ul>\n<h2>2. 中奖概率动态调整</h2>\n<ul>\n<li>正常用户：正常概率</li>\n<li>可疑用户：降低概率</li>\n<li>高危用户：概率=0</li>\n</ul>\n<h2>3. 奖励门槛</h2>\n<ul>\n<li>累计停留时长≥X秒才能参与</li>\n<li>必须完成简单任务（看广告、分享、答题）</li>\n<li>同一收货地址/姓名/电话限制领奖</li>\n</ul>\n<h2>4. 黑名单/灰名单</h2>\n<p>实时拉入：</p>\n<ul>\n<li>UID</li>\n<li>手机号</li>\n<li>IP</li>\n<li>设备指纹</li>\n<li>支付账号/收货信息</li>\n</ul>\n<p>策略：</p>\n<ul>\n<li>灰名单：限制次数、降低中奖</li>\n<li>黑名单：禁止参与、直接拦截</li>\n</ul>\n<h1>七、数据监控与应急层（运营必备）</h1>\n<h2>1. 实时监控大盘</h2>\n<ul>\n<li>参与人数突增</li>\n<li>中奖率异常</li>\n<li>IP/设备集中爆发</li>\n<li>夜间异常高峰</li>\n</ul>\n<h2>2. 自动熔断机制</h2>\n<ul>\n<li>5分钟内异常请求&gt;阈值 → 自动开启强验证</li>\n<li>奖池消耗过快 → 自动暂停活动或降低概率</li>\n<li>发现批量刷奖 → 立即拉黑并回滚奖励</li>\n</ul>\n<h2>3. 日志全记录</h2>\n<p>必须记录：</p>\n<ul>\n<li>uid、ip、设备、时间、接口、参数、结果</li>\n<li>风控触发原因\n方便事后追溯、定位黑产。</li>\n</ul>\n<h1>八、最简可落地组合（性价比最高）</h1>\n<p>如果你只想快速上线、效果又好，直接用这套：</p>\n<ol>\n<li>登录 + 短信验证</li>\n<li>每人每日次数限制</li>\n<li>IP+设备限流</li>\n<li>接口签名 + 防重放</li>\n<li>分布式锁防重复提交</li>\n<li>人机验证（中风险弹出）</li>\n<li>奖池上限 + 概率控制</li>\n</ol>\n<p>能挡住<strong>99%普通爬虫和小型黑产</strong>   。</p>\n<h1>九、高危活动（现金/红包/实物）额外加固</h1>\n<ul>\n<li>人脸实名认证</li>\n<li>收货信息人工审核</li>\n<li>同一地址限制次数</li>\n<li>大额奖励人工复核</li>\n<li>限制提现/到账延迟</li>\n</ul>\n<hr>\n<p>如果你需要，我可以再给你一份：\n<strong>运营活动防刷后端流程图 + 可直接复制的伪代码（Java/Go/PHP/Node任选）</strong></p>\n</div>"</script></body></html>
