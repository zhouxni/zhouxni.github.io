<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = '页面性能优化方法大全'
        document.getElementById('article').innerHTML = 
        "<div><p>页面性能优化是前端开发的核心任务之一，良好的性能可以显著提升用户体验和SEO排名。以下是全面的页面性能优化方法：</p>\n<h2>1. 资源加载优化</h2>\n<h3>1.1 减少HTTP请求</h3>\n<ul>\n<li><strong>合并文件</strong>  ：合并CSS/JS文件，减少请求次数</li>\n<li><strong>使用CSS Sprites</strong>  ：合并小图标为雪碧图</li>\n<li><strong>内联关键资源</strong>  ：关键CSS/JS直接内联在HTML中</li>\n</ul>\n<h3>1.2 资源压缩</h3>\n<ul>\n<li><strong>Gzip/Brotli压缩</strong>  ：服务器启用压缩</li>\n<li><strong>图片优化</strong>  ：\n<ul>\n<li>使用WebP格式替代JPEG/PNG</li>\n<li>使用工具压缩图片(TinyPNG, ImageOptim)</li>\n<li>响应式图片(srcset/sizes)</li>\n</ul>\n</li>\n<li><strong>代码压缩</strong>  ：去除空格、注释，变量名缩短</li>\n</ul>\n<h3>1.3 缓存策略</h3>\n<ul>\n<li><strong>强缓存</strong>  ：Cache-Control/Expires</li>\n<li><strong>协商缓存</strong>  ：ETag/Last-Modified</li>\n<li><strong>Service Worker缓存</strong>  ：实现离线访问</li>\n</ul>\n<h2>2. 渲染优化</h2>\n<h3>2.1 关键渲染路径优化</h3>\n<ul>\n<li><strong>减少关键资源数量</strong>  ：消除渲染阻塞资源</li>\n<li><strong>优化CSSOM构建</strong>  ：\n<ul>\n<li>将CSS放在头部</li>\n<li>避免@import</li>\n<li>内联关键CSS</li>\n</ul>\n</li>\n<li><strong>优化JavaScript执行</strong>  ：\n<ul>\n<li>将JS放在body底部</li>\n<li>使用async/defer属性</li>\n<li>避免长时间运行的JS任务</li>\n</ul>\n</li>\n</ul>\n<h3>2.2 DOM优化</h3>\n<ul>\n<li><strong>减少DOM数量</strong>  ：简化页面结构</li>\n<li><strong>批量DOM操作</strong>  ：使用文档片段(documentFragment)</li>\n<li><strong>避免强制同步布局</strong>  ：避免在JS中连续读写布局属性</li>\n</ul>\n<h2>3. JavaScript优化</h2>\n<h3>3.1 代码层面</h3>\n<ul>\n<li><strong>减少全局变量</strong>  ：避免污染全局作用域</li>\n<li><strong>事件委托</strong>  ：减少事件监听器数量</li>\n<li><strong>防抖节流</strong>  ：优化频繁触发的事件</li>\n<li><strong>Web Workers</strong>  ：将耗时任务放到后台线程</li>\n</ul>\n<h3>3.2 框架优化</h3>\n<ul>\n<li><strong>虚拟DOM优化</strong>  ：React/Vue中的key属性</li>\n<li><strong>组件懒加载</strong>  ：React.lazy/Suspense</li>\n<li><strong>避免不必要的重新渲染</strong>  ：React.memo/PureComponent</li>\n</ul>\n<h2>4. 网络优化</h2>\n<h3>4.1 CDN加速</h3>\n<ul>\n<li><strong>静态资源CDN</strong>  ：加速全球访问</li>\n<li><strong>边缘计算</strong>  ：减少网络延迟</li>\n</ul>\n<h3>4.2 协议优化</h3>\n<ul>\n<li><strong>HTTP/2</strong>  ：多路复用，头部压缩</li>\n<li><strong>QUIC/HTTP3</strong>  ：减少连接建立时间</li>\n</ul>\n<h3>4.3 预加载/预连接</h3>\n<ul>\n<li><code>&lt;link rel=&quot;preload&quot;&gt;</code>：提前加载关键资源</li>\n<li><code>&lt;link rel=&quot;preconnect&quot;&gt;</code>：提前建立连接</li>\n<li><code>&lt;link rel=&quot;dns-prefetch&quot;&gt;</code>：DNS预解析</li>\n</ul>\n<h2>5. 移动端优化</h2>\n<h3>5.1 触控优化</h3>\n<ul>\n<li><strong>fastclick</strong>  ：消除300ms延迟</li>\n<li><strong>touch-action</strong>  ：优化滚动性能</li>\n</ul>\n<h3>5.2 电量优化</h3>\n<ul>\n<li><strong>减少动画</strong>  ：优先使用CSS动画</li>\n<li><strong>减少传感器使用</strong>  ：谨慎使用GPS/陀螺仪</li>\n</ul>\n<h2>6. 监控与持续优化</h2>\n<h3>6.1 性能监控</h3>\n<ul>\n<li><strong>Lighthouse</strong>  ：全面性能评估</li>\n<li><strong>Web Vitals</strong>  ：核心用户体验指标</li>\n<li><strong>RUM(真实用户监控)</strong>  ：收集真实性能数据</li>\n</ul>\n<h3>6.2 性能预算</h3>\n<ul>\n<li>设定关键指标阈值(如LCP&lt;2.5s)</li>\n<li>CI/CD流程中加入性能检查</li>\n</ul>\n<h2>实施建议</h2>\n<ol>\n<li><strong>先测量后优化</strong>  ：使用Chrome DevTools/Lighthouse找出瓶颈</li>\n<li><strong>从关键指标入手</strong>  ：优先优化LCP、FID、CLS等核心指标</li>\n<li><strong>渐进式优化</strong>  ：从低成本高回报的优化开始</li>\n<li><strong>持续监控</strong>  ：性能优化是持续过程，不是一次性任务</li>\n</ol>\n<p>通过综合应用这些方法，可以显著提升页面加载速度和交互流畅度，提供更好的用户体验。</p>\n</div>";</script></body></html>
