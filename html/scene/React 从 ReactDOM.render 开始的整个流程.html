<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="React 从 ReactDOM.render 开始的整个流程",document.getElementById("article").innerHTML="<div><p>React 从 <code>ReactDOM.render</code> 开始的整个流程可以分为以下几个关键阶段（以 React 17+ 为例，React 18 的 <code>createRoot</code> 流程类似但引入了并发模式优化）：</p>\n<hr>\n<h3>1. <strong>初始化阶段</strong></h3>\n<h4>调用 <code>ReactDOM.render(element, container, callback)</code></h4>\n<ul>\n<li><strong>参数</strong>  ：根组件（如 <code>&lt;App /&gt;</code>）、挂载的 DOM 容器、可选的回调函数。</li>\n<li><strong>作用</strong>  ：将 React 组件树挂载到指定的 DOM 节点。</li>\n</ul>\n<h4>创建 Fiber 根节点（FiberRoot）</h4>\n<ul>\n<li>React 内部调用 <code>legacyRenderSubtreeIntoContainer</code>，创建 <code>FiberRoot</code>（整个应用的根节点）和 <code>RootFiber</code>（组件树的根节点）。</li>\n<li><code>FiberRoot</code> 管理应用的状态（如当前渲染的 Fiber 树、调度优先级等），<code>RootFiber</code> 是组件树的起点。</li>\n</ul>\n<hr>\n<h3>2. <strong>协调阶段（Reconciliation）</strong></h3>\n<h4>开始渲染流程</h4>\n<ul>\n<li>调用 <code>updateContainer</code>，将初始渲染任务加入调度队列。</li>\n<li>React 通过 <strong>Fiber 架构</strong>   构建或更新组件树：\n<ul>\n<li><strong>Fiber 节点</strong>  ：每个组件对应一个 Fiber 节点，存储组件的状态、props、副作用（如生命周期、DOM 更新）等信息。</li>\n<li><strong>工作循环</strong>  ：React 使用深度优先遍历（DFS）处理 Fiber 树，分为两个阶段：\n<ol>\n<li><strong>Render 阶段</strong>  （可中断）：\n<ul>\n<li>调用组件的 <code>render</code> 方法或函数组件本身，生成子组件的 Fiber 树。</li>\n<li>对比新旧 Fiber 树（Diffing 算法），标记需要更新的节点（如 <code>Placement</code>、<code>Update</code>、<code>Deletion</code>）。</li>\n</ul>\n</li>\n<li><strong>Commit 阶段</strong>  （不可中断）：\n<ul>\n<li>将标记的变更应用到 DOM（插入、更新、删除节点）。</li>\n<li>执行生命周期方法（如 <code>componentDidMount</code>）或 Hook 副作用（如 <code>useEffect</code>）。</li>\n</ul>\n</li>\n</ol>\n</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3>3. <strong>提交阶段（Commit）</strong></h3>\n<h4>应用变更到 DOM</h4>\n<ul>\n<li><strong>BeforeMutation</strong>  ：调用 <code>getSnapshotBeforeUpdate</code>（如果存在）。</li>\n<li><strong>Mutation</strong>  ：更新 DOM（插入、删除、修改节点）。</li>\n<li><strong>Layout</strong>  ：调用 <code>componentDidMount</code>、<code>componentDidUpdate</code>、<code>useLayoutEffect</code> 等同步副作用。</li>\n</ul>\n<h4>触发回调</h4>\n<ul>\n<li>执行 <code>ReactDOM.render</code> 的第三个参数（回调函数）。</li>\n</ul>\n<hr>\n<h3>4. <strong>调度与优先级机制</strong></h3>\n<ul>\n<li><strong>并发模式（React 18+）</strong>  ：通过 <code>Scheduler</code> 和 <code>Lane</code> 模型管理任务优先级，允许高优先级任务（如用户输入）打断低优先级渲染。</li>\n<li><strong>旧版同步模式</strong>  ：直接同步渲染整个树（可能阻塞主线程）。</li>\n</ul>\n<hr>\n<h3>5. <strong>后续更新流程</strong></h3>\n<ul>\n<li>当状态变更（如 <code>setState</code>、Redux 更新）时：\n<ol>\n<li>重新触发协调阶段，生成新的 Fiber 树。</li>\n<li>通过 Diffing 算法标记变更。</li>\n<li>提交阶段仅更新必要的 DOM。</li>\n</ol>\n</li>\n</ul>\n<hr>\n<h3>关键点总结</h3>\n<ul>\n<li><strong>Fiber 架构</strong>  ：将渲染拆分为可中断的单元，避免阻塞主线程。</li>\n<li><strong>双缓存技术</strong>  ：当前显示的 Fiber 树（<code>current</code>）和正在构建的树（<code>workInProgress</code>）交替使用，减少闪烁。</li>\n<li><strong>副作用列表</strong>  ：Commit 阶段一次性处理所有 DOM 变更和生命周期调用，保证一致性。</li>\n</ul>\n<hr>\n<h3>流程图简化版</h3>\n<pre><code>ReactDOM.render()\n  → 创建 FiberRoot 和 RootFiber\n  → 调度更新（updateContainer）\n  → Render 阶段（构建 Fiber 树，标记副作用）\n  → Commit 阶段（更新 DOM，执行生命周期）\n  → 完成渲染\n</code></pre>\n<p>React 18 的 <code>createRoot</code> 类似，但默认启用并发渲染（如时间切片、自动批处理）。</p>\n</div>"</script></body></html>
