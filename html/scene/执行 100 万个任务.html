    <article id="article" class="markdown-body"></article>
  

<script>
        document.getElementById('article').innerHTML = 
        "<div><p>当需要在浏览器中执行100万个任务并保证页面不卡顿时，可以采取以下策略：</p>\n<h3>一、任务拆分与异步调度</h3>\n<ol>\n<li><strong>任务拆分</strong>  ：将100万个任务分成较小的批次处理，每次处理一批任务，而不是一次性全部执行。这样可以减少单次任务执行对主线程的阻塞时间。</li>\n<li><strong>异步调度</strong>  ：使用<code>setTimeout</code>或<code>requestAnimationFrame</code>进行异步调度，把每个批次的执行分散到不同的事件循环中。这样可以确保浏览器在每一帧渲染之间都有时间处理其他任务，避免页面卡顿。\n<ul>\n<li><strong>示例代码</strong>  ：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> tasks = <span class=\"hljs-title class_\">Array</span>(<span class=\"hljs-number\">1000000</span>).<span class=\"hljs-title function_\">fill</span>(<span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-comment\">// 每个任务的逻辑</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Task executed&#x27;</span>);\n});\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">processBatch</span>(<span class=\"hljs-params\">tasks, batchSize = <span class=\"hljs-number\">1000</span></span>) {\n  <span class=\"hljs-keyword\">if</span> (tasks.<span class=\"hljs-property\">length</span> === <span class=\"hljs-number\">0</span>) {\n    <span class=\"hljs-keyword\">return</span>;\n  }\n  <span class=\"hljs-keyword\">const</span> batch = tasks.<span class=\"hljs-title function_\">splice</span>(<span class=\"hljs-number\">0</span>, batchSize);\n  <span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">let</span> task <span class=\"hljs-keyword\">of</span> batch) {\n    <span class=\"hljs-title function_\">task</span>();\n  }\n  <span class=\"hljs-title function_\">requestAnimationFrame</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-title function_\">processBatch</span>(tasks, batchSize));\n}\n\n<span class=\"hljs-title function_\">processBatch</span>(tasks);\n</code></pre>\n</li>\n</ul>\n</li>\n</ol>\n<h3>二、使用Web Workers</h3>\n<p>对于非常密集且计算量大的任务，考虑使用Web Workers。Web Workers允许在浏览器的后台线程中运行JavaScript代码，完全独立于主线程，不会阻塞页面。</p>\n<ul>\n<li>\n<p><strong>示例代码</strong>  ：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> worker = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Worker</span>(<span class=\"hljs-string\">&#x27;worker.js&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> tasks = <span class=\"hljs-title class_\">Array</span>.<span class=\"hljs-title function_\">from</span>({ <span class=\"hljs-attr\">length</span>: <span class=\"hljs-number\">1000000</span> }, <span class=\"hljs-function\">(<span class=\"hljs-params\">_, i</span>) =&gt;</span> i);\nworker.<span class=\"hljs-title function_\">postMessage</span>(tasks);\n\nworker.<span class=\"hljs-property\">onmessage</span> = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">event</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(event.<span class=\"hljs-property\">data</span>);\n};\n</code></pre>\n<p>在<code>worker.js</code>中：</p>\n<pre><code class=\"language-javascript\">onmessage = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">event</span>) {\n  <span class=\"hljs-keyword\">const</span> tasks = event.<span class=\"hljs-property\">data</span>;\n  <span class=\"hljs-keyword\">const</span> result = tasks.<span class=\"hljs-title function_\">map</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">item</span> =&gt;</span> item * item); <span class=\"hljs-comment\">// 示例任务：计算每个元素的平方</span>\n  <span class=\"hljs-title function_\">postMessage</span>(result);\n};\n</code></pre>\n</li>\n</ul>\n</div>";
      </script></body></html>
