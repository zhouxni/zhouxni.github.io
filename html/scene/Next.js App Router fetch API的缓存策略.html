  <body>

<script>
      document.title = 'Next.js App Router fetch APIзҡ„зј“еӯҳзӯ–з•Ҙ'
        document.getElementById('article').innerHTML = 
        "<div><p>жҳҜзҡ„пјҢNext.js App RouterйҖҡиҝҮ**<code>fetch</code> APIзҡ„зј“еӯҳзӯ–з•Ҙ**  жҸҗдҫӣдәҶжҜ”Pages RouterжӣҙзҒөжҙ»гҖҒжӣҙзӣҙи§Ӯзҡ„ж•°жҚ®иҺ·еҸ–ж–№ејҸгҖӮиҝҷз§Қи®ҫи®Ўи®©дҪ еҸҜд»Ҙж №жҚ®дёҚеҗҢйЎөйқўзҡ„йңҖжұӮпјҢ<strong>зІҫзЎ®жҺ§еҲ¶ж•°жҚ®зҡ„зј“еӯҳж—¶й—ҙе’Ңжӣҙж–°йў‘зҺҮ</strong>  пјҢд»ҺиҖҢеңЁжҖ§иғҪе’ҢеҶ…е®№ж–°йІңеәҰд№Ӣй—ҙеҸ–еҫ—е№іиЎЎгҖӮ</p>\n<h3><strong>1. App Routerдёӯ<code>fetch</code>зҡ„зј“еӯҳзӯ–з•Ҙ</strong></h3>\n<h4><strong>(1) йқҷжҖҒзј“еӯҳпјҲStatic Cachingпјү</strong></h4>\n<pre><code class=\"language-tsx\"><span class=\"hljs-comment\">// ж°ёд№…зј“еӯҳпјҲжһ„е»әж—¶жү§иЎҢдёҖж¬ЎпјҢж°ёиҝңдҪҝз”Ёзј“еӯҳпјү</span>\n<span class=\"hljs-keyword\">const</span> res = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/posts&#x27;</span>);\n<span class=\"hljs-comment\">// зӯүж•ҲдәҺпјҡ</span>\n<span class=\"hljs-keyword\">const</span> res = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/posts&#x27;</span>, {\n  <span class=\"hljs-attr\">cache</span>: <span class=\"hljs-string\">&#x27;force-cache&#x27;</span>, <span class=\"hljs-comment\">// й»ҳи®ӨеҖј</span>\n});\n</code></pre>\n<ul>\n<li><strong>иЎҢдёә</strong>  пјҡеңЁжһ„е»әж—¶жү§иЎҢдёҖж¬Ўж•°жҚ®иҺ·еҸ–пјҢз”ҹжҲҗйқҷжҖҒHTMLпјҢеҗҺз»ӯиҜ·жұӮзӣҙжҺҘдҪҝз”Ёзј“еӯҳгҖӮ</li>\n<li><strong>йҖӮз”ЁеңәжҷҜ</strong>  пјҡеҶ…е®№жһҒе°‘еҸҳеҢ–зҡ„йЎөйқўпјҲеҰӮеҚҡе®ўж–Үз« гҖҒдә§е“ҒиҜҰжғ…пјүгҖӮ</li>\n</ul>\n<h4><strong>(2) еўһйҮҸйқҷжҖҒеҶҚз”ҹпјҲISRпјү</strong></h4>\n<pre><code class=\"language-tsx\"><span class=\"hljs-comment\">// 5еҲҶй’ҹеҗҺйҮҚж–°йӘҢиҜҒпјҲзӯүж•ҲдәҺPages Routerзҡ„revalidate: 300пјү</span>\n<span class=\"hljs-keyword\">const</span> res = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/posts&#x27;</span>, {\n  <span class=\"hljs-attr\">next</span>: { <span class=\"hljs-attr\">revalidate</span>: <span class=\"hljs-number\">300</span> }, <span class=\"hljs-comment\">// з§’дёәеҚ•дҪҚ</span>\n});\n</code></pre>\n<ul>\n<li><strong>иЎҢдёә</strong>  пјҡ\n<ul>\n<li>жһ„е»әж—¶з”ҹжҲҗеҲқе§ӢHTMLгҖӮ</li>\n<li>йҰ–ж¬ЎиҜ·жұӮиҝ”еӣһзј“еӯҳзҡ„HTMLгҖӮ</li>\n<li>и¶…иҝҮ300з§’еҗҺпјҢдёӢдёҖдёӘиҜ·жұӮдјҡи§ҰеҸ‘еҗҺеҸ°йҮҚж–°йӘҢиҜҒе№¶жӣҙж–°зј“еӯҳгҖӮ</li>\n</ul>\n</li>\n</ul>\n<h4><strong>(3) жҜҸж¬ЎиҜ·жұӮйғҪйҮҚж–°иҺ·еҸ–пјҲSSRиЎҢдёәпјү</strong></h4>\n<pre><code class=\"language-tsx\"><span class=\"hljs-comment\">// зҰҒз”Ёзј“еӯҳпјҢжҜҸж¬ЎиҜ·жұӮйғҪйҮҚж–°иҺ·еҸ–ж•°жҚ®пјҲзӯүж•ҲдәҺgetServerSidePropsпјү</span>\n<span class=\"hljs-keyword\">const</span> res = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/posts&#x27;</span>, {\n  <span class=\"hljs-attr\">cache</span>: <span class=\"hljs-string\">&#x27;no-store&#x27;</span>,\n});\n</code></pre>\n<ul>\n<li><strong>иЎҢдёә</strong>  пјҡжҜҸж¬ЎиҜ·жұӮйғҪеңЁжңҚеҠЎеҷЁз«ҜйҮҚж–°жү§иЎҢж•°жҚ®иҺ·еҸ–пјҢз”ҹжҲҗж–°зҡ„HTMLгҖӮ</li>\n<li><strong>йҖӮз”ЁеңәжҷҜ</strong>  пјҡе®һж—¶ж•°жҚ®пјҲеҰӮиӮЎзҘЁд»·ж јгҖҒз”ЁжҲ·зү№е®ҡеҶ…е®№пјүгҖӮ</li>\n</ul>\n<h4><strong>(4) йқҷжҖҒз”ҹжҲҗдҪҶе…Ғи®ёжүӢеҠЁеҲ·ж–°</strong></h4>\n<pre><code class=\"language-tsx\"><span class=\"hljs-comment\">// йқҷжҖҒз”ҹжҲҗпјҢдҪҶеҸҜд»ҘйҖҡиҝҮAPIи·Ҝз”ұжүӢеҠЁи§ҰеҸ‘еҲ·ж–°</span>\n<span class=\"hljs-keyword\">const</span> res = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/posts&#x27;</span>, {\n  <span class=\"hljs-attr\">next</span>: { <span class=\"hljs-attr\">tags</span>: [<span class=\"hljs-string\">&#x27;posts&#x27;</span>] }, <span class=\"hljs-comment\">// ж·»еҠ зј“еӯҳж Үзӯҫ</span>\n});\n</code></pre>\n<ul>\n<li><strong>й…ҚеҗҲжүӢеҠЁеҲ·ж–°</strong>  пјҡ<pre><code class=\"language-tsx\"><span class=\"hljs-comment\">// app/api/revalidate/route.ts</span>\n<span class=\"hljs-keyword\">import</span> { revalidateTag } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;next/cache&#x27;</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">POST</span>(<span class=\"hljs-params\"><span class=\"hljs-attr\">request</span>: <span class=\"hljs-title class_\">Request</span></span>) {\n  <span class=\"hljs-title function_\">revalidateTag</span>(<span class=\"hljs-string\">&#x27;posts&#x27;</span>); <span class=\"hljs-comment\">// еҲ·ж–°жүҖжңүеёҰжңү&#x27;posts&#x27;ж Үзӯҫзҡ„зј“еӯҳ</span>\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Response</span>.<span class=\"hljs-title function_\">json</span>({ <span class=\"hljs-attr\">revalidated</span>: <span class=\"hljs-literal\">true</span> });\n}\n</code></pre>\n</li>\n</ul>\n<h3><strong>2. зј“еӯҳзӯ–з•ҘеҜ№жҜ”иЎЁ</strong></h3>\n<table>\n<thead>\n<tr>\n<th><strong>зӯ–з•Ҙ</strong></th>\n<th><strong>зј“еӯҳиЎҢдёә</strong></th>\n<th><strong>зӯүж•ҲPages RouterеҠҹиғҪ</strong></th>\n<th><strong>йҖӮз”ЁеңәжҷҜ</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>cache: 'force-cache'</code></td>\n<td>ж°ёд№…зј“еӯҳпјҲжһ„е»әж—¶жү§иЎҢдёҖж¬Ўпјү</td>\n<td><code>getStaticProps</code>ж— revalidate</td>\n<td>йқҷжҖҒеҶ…е®№пјҲеҰӮеҚҡе®ўгҖҒж–ҮжЎЈпјү</td>\n</tr>\n<tr>\n<td><code>next: { revalidate }</code></td>\n<td>е®ҡжңҹйҮҚж–°йӘҢиҜҒпјҲISRпјү</td>\n<td><code>getStaticProps</code> + revalidate</td>\n<td>еҶ…е®№е®ҡжңҹжӣҙж–°пјҲеҰӮж–°й—»гҖҒе•Ҷе“ҒеҲ—иЎЁпјү</td>\n</tr>\n<tr>\n<td><code>cache: 'no-store'</code></td>\n<td>жҜҸж¬ЎиҜ·жұӮйғҪйҮҚж–°иҺ·еҸ–пјҲж— зј“еӯҳпјү</td>\n<td><code>getServerSideProps</code></td>\n<td>е®һж—¶ж•°жҚ®пјҲеҰӮд»ӘиЎЁзӣҳгҖҒз”ЁжҲ·дјҡиҜқпјү</td>\n</tr>\n<tr>\n<td><code>next: { tags }</code></td>\n<td>еҹәдәҺж Үзӯҫзҡ„жүӢеҠЁеҲ·ж–°</td>\n<td>ж— зӣҙжҺҘзӯүж•ҲпјҲйңҖиҮӘе®ҡд№үAPIпјү</td>\n<td>еҶ…е®№жӣҙж–°дёҚйў‘з№ҒдҪҶйңҖжүӢеҠЁи§ҰеҸ‘пјҲеҰӮCMSжӣҙж–°пјү</td>\n</tr>\n</tbody>\n</table>\n<h3><strong>3. еҠЁжҖҒи·Ҝз”ұдёҺзј“еӯҳзӯ–з•Ҙз»“еҗҲ</strong></h3>\n<p>еҜ№дәҺеҠЁжҖҒи·Ҝз”ұпјҲеҰӮ<code>app/products/[id]/page.tsx</code>пјүпјҢеҸҜд»Ҙиҝҷж ·жҺ§еҲ¶зј“еӯҳпјҡ</p>\n<pre><code class=\"language-tsx\"><span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">generateStaticParams</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> products = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/products&#x27;</span>, {\n    <span class=\"hljs-attr\">cache</span>: <span class=\"hljs-string\">&#x27;force-cache&#x27;</span>, <span class=\"hljs-comment\">// жһ„е»әж—¶иҺ·еҸ–дёҖж¬Ў</span>\n  }).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">res</span>) =&gt;</span> res.<span class=\"hljs-title function_\">json</span>());\n\n  <span class=\"hljs-keyword\">return</span> products.<span class=\"hljs-title function_\">map</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">product</span>) =&gt;</span> ({ <span class=\"hljs-attr\">id</span>: product.<span class=\"hljs-property\">id</span> }));\n}\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">ProductPage</span>(<span class=\"hljs-params\">{ params }</span>) {\n  <span class=\"hljs-comment\">// жҜҸдёӘдә§е“ҒйЎөйқў5еҲҶй’ҹйҮҚж–°йӘҢиҜҒдёҖж¬Ў</span>\n  <span class=\"hljs-keyword\">const</span> product = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">`https://api.example.com/products/<span class=\"hljs-subst\">${params.id}</span>`</span>, {\n    <span class=\"hljs-attr\">next</span>: { <span class=\"hljs-attr\">revalidate</span>: <span class=\"hljs-number\">300</span> },\n  }).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">res</span>) =&gt;</span> res.<span class=\"hljs-title function_\">json</span>());\n\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>{/* жёІжҹ“дә§е“Ғ */}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span></span>;\n}\n</code></pre>\n<h3><strong>4. дёҺе®ўжҲ·з«Ҝз»„д»¶зҡ„ж•°жҚ®иҺ·еҸ–з»“еҗҲ</strong></h3>\n<p>еҜ№дәҺйңҖиҰҒе®ўжҲ·з«ҜдәӨдә’зҡ„ж•°жҚ®пјҲеҰӮз”ЁжҲ·зү№е®ҡеҶ…е®№пјүпјҢеҸҜд»ҘеңЁClient ComponentsдёӯдҪҝз”Ё<code>useEffect</code>жҲ–SWRзӯүеә“пјҡ</p>\n<pre><code class=\"language-tsx\"><span class=\"hljs-string\">&#x27;use client&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> { useEffect, useState } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;react&#x27;</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">UserDashboard</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> [userData, setUserData] = <span class=\"hljs-title function_\">useState</span>(<span class=\"hljs-literal\">null</span>);\n\n  <span class=\"hljs-title function_\">useEffect</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-comment\">// е®ўжҲ·з«ҜиҺ·еҸ–з”ЁжҲ·ж•°жҚ®пјҲдёҚеҸӮдёҺжңҚеҠЎеҷЁз«ҜжёІжҹ“пјү</span>\n    <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">&#x27;/api/user-data&#x27;</span>).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">res</span>) =&gt;</span> <span class=\"hljs-title function_\">setUserData</span>(res.<span class=\"hljs-title function_\">json</span>()));\n  }, []);\n\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>{/* жёІжҹ“з”ЁжҲ·д»ӘиЎЁзӣҳ */}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span></span>;\n}\n</code></pre>\n<h3><strong>5. жңҖдҪіе®һи·ө</strong></h3>\n<ol>\n<li><strong>дјҳе…ҲдҪҝз”ЁйқҷжҖҒзј“еӯҳ</strong>  пјҡеҜ№дәҺдёҚз»ҸеёёеҸҳеҢ–зҡ„еҶ…е®№пјҢй»ҳи®ӨдҪҝз”Ё<code>cache: 'force-cache'</code>гҖӮ</li>\n<li><strong>еҗҲзҗҶи®ҫзҪ®revalidateж—¶й—ҙ</strong>  пјҡж №жҚ®еҶ…е®№жӣҙж–°йў‘зҺҮи°ғж•ҙ<code>revalidate</code>еҖјпјҲеҰӮж–°й—»зҪ‘з«ҷи®ҫдёә60з§’пјҢеҚҡе®ўи®ҫдёә3600з§’пјүгҖӮ</li>\n<li><strong>ж··еҗҲдҪҝз”Ёзӯ–з•Ҙ</strong>  пјҡ\n<ul>\n<li>йЎөйқўйӘЁжһ¶е’Ңе…¬е…ұеҶ…е®№пјҡSSG/ISRгҖӮ</li>\n<li>е®һж—¶ж•°жҚ®пјҡе®ўжҲ·з«ҜиҺ·еҸ–жҲ–<code>cache: 'no-store'</code>гҖӮ</li>\n</ul>\n</li>\n<li><strong>зӣ‘жҺ§жҖ§иғҪ</strong>  пјҡдҪҝз”ЁNext.jsзҡ„еҶ…зҪ®еҲҶжһҗе·Ҙе…·жҲ–з¬¬дёүж–№е·Ҙе…·зӣ‘жҺ§зј“еӯҳе‘ҪдёӯзҺҮе’ҢйЎөйқўеҠ иҪҪж—¶й—ҙгҖӮ</li>\n</ol>\n<h3><strong>жҖ»з»“</strong></h3>\n<p>App RouterйҖҡиҝҮ<code>fetch</code>зҡ„зј“еӯҳзӯ–з•ҘжҸҗдҫӣдәҶ<strong>з»ҶзІ’еәҰзҡ„ж•°жҚ®иҺ·еҸ–жҺ§еҲ¶</strong>  пјҢи®©дҪ еҸҜд»Ҙпјҡ</p>\n<ul>\n<li>иҪ»жқҫе®һзҺ°SSGгҖҒISRе’ҢSSRпјҢж— йңҖи®°еҝҶдёҚеҗҢзҡ„APIпјҲеҰӮ<code>getStaticProps</code>е’Ң<code>getServerSideProps</code>пјүгҖӮ</li>\n<li>ж №жҚ®и·Ҝз”ұе’Ңз»„д»¶зҡ„йңҖжұӮпјҢзҒөжҙ»з»„еҗҲзј“еӯҳзӯ–з•ҘгҖӮ</li>\n<li>йҖҡиҝҮж Үзӯҫзі»з»ҹе®һзҺ°жӣҙеӨҚжқӮзҡ„зј“еӯҳз®ЎзҗҶгҖӮ</li>\n</ul>\n<p>иҝҷз§Қи®ҫи®ЎеӨ§еӨ§з®ҖеҢ–дәҶжёІжҹ“зӯ–з•Ҙзҡ„е®һзҺ°пјҢеҗҢж—¶дҝқжҢҒдәҶй«ҳжҖ§иғҪе’ҢзҒөжҙ»жҖ§гҖӮ</p>\n</div>";
      </script></body></html>
