<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Vue 的虚拟 DOM 比较流程",document.getElementById("article").innerHTML="<div><p>一句话：<br>\n<strong>Vue 的虚拟 DOM 比较就是“同层节点按 key+tag 做复用判定 → 再按节点类型做精细化 patch → 子节点用双端 diff 进行最小化变动”的三步闭环。</strong></p>\n<p>下面用极简步骤把“怎么比”拆开，只保留核心逻辑：</p>\n<ol>\n<li>\n<p><strong>入口：patch(oldVNode, newVNode, container)</strong><br>\n首次渲染时 <code>oldVNode</code> 为 <code>null</code>，直接 mount；更新时进入 diff。</p>\n</li>\n<li>\n<p><strong>能不能复用？sameVnode(oldVNode, newVNode)</strong><br>\n条件只有两条：</p>\n<ul>\n<li>key 相同</li>\n<li>tag 相同（组件就是组件名）<br>\n如果不同 → 直接 remove 旧节点，create 新节点；相同才继续。</li>\n</ul>\n</li>\n<li>\n<p><strong>节点类型分流</strong></p>\n<ul>\n<li>普通元素 → patch 属性 / 事件 / class / style</li>\n<li>组件 → 触发组件自身 update 生命周期（props → render → 递归 patch）</li>\n<li>文本 → 替换文本内容</li>\n</ul>\n</li>\n<li>\n<p><strong>子节点 diff（双端比较）</strong><br>\n只比较<strong>同级</strong>   children，算法如下：</p>\n<pre><code>旧首尾指针   新首尾指针\n↑           ↑\n[a, b, c]  [a, d, c]\n↓           ↓\n</code></pre>\n<ol>\n<li>头头、尾尾、头尾、尾头四路比较，命中即移动指针</li>\n<li>四路都不中 → 用 key 建立旧节点哈希表，O(1) 定位复用</li>\n<li>最终剩余新增节点插入，剩余旧节点删除</li>\n</ol>\n</li>\n<li>\n<p><strong>DOM 操作落盘</strong><br>\n把第 4 步算出的“新增 / 移动 / 删除”一次性映射为真实 DOM 操作。</p>\n</li>\n</ol>\n<hr>\n<p>记忆口诀：<br>\n<strong>“先比 key+tag，再比自身，最后比孩子；四指针扫一遍，O(n) 搞定同级树。”</strong></p>\n</div>"</script></body></html>
