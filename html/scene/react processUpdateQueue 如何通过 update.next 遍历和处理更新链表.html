<script>
        document.getElementById('article').innerHTML = 
        "<div><p><code>processUpdateQueue</code> 是 React 处理状态更新的核心函数，它通过 <strong>单向链表</strong>  （<code>update.next</code>）遍历 <code>updateQueue</code>，依次处理每个 <code>Update</code> 对象，最终计算出组件的 <code>memoizedState</code>。以下是其详细流程：</p>\n<hr>\n<h2><strong>1. 链表结构回顾</strong></h2>\n<p>每个 <code>Update</code> 对象的结构如下：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">Update</span>&lt;<span class=\"hljs-title class_\">State</span>&gt; = {\n  <span class=\"hljs-attr\">lane</span>: <span class=\"hljs-title class_\">Lane</span>,              <span class=\"hljs-comment\">// 优先级</span>\n  <span class=\"hljs-attr\">action</span>: <span class=\"hljs-title class_\">Action</span>&lt;<span class=\"hljs-title class_\">State</span>&gt;,   <span class=\"hljs-comment\">// 更新内容（对象或函数）</span>\n  <span class=\"hljs-attr\">next</span>: <span class=\"hljs-title class_\">Update</span>&lt;<span class=\"hljs-title class_\">State</span>&gt; | <span class=\"hljs-literal\">null</span>, <span class=\"hljs-comment\">// 指向下一个更新</span>\n  <span class=\"hljs-comment\">// ... 其他字段（如 callback）</span>\n};\n</code></pre>\n<p><code>updateQueue</code> 通过 <code>firstUpdate</code> 和 <code>lastUpdate</code> 维护链表头尾：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">UpdateQueue</span>&lt;<span class=\"hljs-title class_\">State</span>&gt; = {\n  <span class=\"hljs-attr\">baseState</span>: <span class=\"hljs-title class_\">State</span>,        <span class=\"hljs-comment\">// 当前基础状态</span>\n  <span class=\"hljs-attr\">firstUpdate</span>: <span class=\"hljs-title class_\">Update</span>&lt;<span class=\"hljs-title class_\">State</span>&gt; | <span class=\"hljs-literal\">null</span>, <span class=\"hljs-comment\">// 链表头</span>\n  <span class=\"hljs-attr\">lastUpdate</span>: <span class=\"hljs-title class_\">Update</span>&lt;<span class=\"hljs-title class_\">State</span>&gt; | <span class=\"hljs-literal\">null</span>,  <span class=\"hljs-comment\">// 链表尾</span>\n};\n</code></pre>\n<hr>\n<h2><strong>2. <code>processUpdateQueue</code> 的核心流程</strong></h2>\n<h3><strong>（1）初始化遍历指针</strong></h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">let</span> update = queue.<span class=\"hljs-property\">firstUpdate</span>; <span class=\"hljs-comment\">// 从链表头部开始</span>\n<span class=\"hljs-keyword\">let</span> resultState = queue.<span class=\"hljs-property\">baseState</span>; <span class=\"hljs-comment\">// 初始状态</span>\n</code></pre>\n<ul>\n<li><strong><code>queue.firstUpdate</code></strong>  ：链表的第一个 <code>Update</code>。</li>\n<li><strong><code>queue.baseState</code></strong>  ：当前状态的基准值（计算的起点）。</li>\n</ul>\n<h3><strong>（2）遍历链表（<code>while (update !== null)</code>）</strong></h3>\n<p>通过 <code>update.next</code> 依次访问每个更新：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">while</span> (update !== <span class=\"hljs-literal\">null</span>) {\n  <span class=\"hljs-comment\">// 1. 检查优先级（是否跳过？）</span>\n  <span class=\"hljs-keyword\">const</span> updateLane = update.<span class=\"hljs-property\">lane</span>;\n  <span class=\"hljs-keyword\">if</span> (!<span class=\"hljs-title function_\">isSubsetOfLanes</span>(renderLanes, updateLane)) {\n    <span class=\"hljs-comment\">// 跳过低优先级更新，保留到下次处理</span>\n    <span class=\"hljs-comment\">// ...（克隆并链接到新队列）</span>\n  } <span class=\"hljs-keyword\">else</span> {\n    <span class=\"hljs-comment\">// 2. 处理高优先级更新</span>\n    resultState = <span class=\"hljs-title function_\">getStateFromUpdate</span>(update, resultState);\n  }\n  update = update.<span class=\"hljs-property\">next</span>; <span class=\"hljs-comment\">// 移动到下一个节点</span>\n}\n</code></pre>\n<h3><strong>（3）计算新状态（<code>getStateFromUpdate</code>）</strong></h3>\n<p>根据 <code>action</code> 类型处理更新：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">getStateFromUpdate</span>(<span class=\"hljs-params\">update, prevState</span>) {\n  <span class=\"hljs-keyword\">const</span> action = update.<span class=\"hljs-property\">action</span>;\n  <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-keyword\">typeof</span> action === <span class=\"hljs-string\">&#x27;function&#x27;</span>) {\n    <span class=\"hljs-comment\">// 函数式更新（如 setState(prev =&gt; prev + 1)）</span>\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">action</span>(prevState);\n  }\n  <span class=\"hljs-comment\">// 对象式更新（如 setState({ count: 1 })）</span>\n  <span class=\"hljs-keyword\">return</span> { ...prevState, ...action };\n}\n</code></pre>\n<h3><strong>（4）更新链表和状态</strong></h3>\n<ul>\n<li><strong>处理完所有更新后</strong>  ：<pre><code class=\"language-javascript\">queue.<span class=\"hljs-property\">baseState</span> = resultState; <span class=\"hljs-comment\">// 更新基准状态</span>\nworkInProgress.<span class=\"hljs-property\">memoizedState</span> = resultState; <span class=\"hljs-comment\">// 最终状态</span>\n</code></pre>\n</li>\n<li><strong>如果有跳过的更新</strong>  ：将它们链接到新队列的尾部，等待下次处理。</li>\n</ul>\n<hr>\n<h2><strong>3. 关键细节</strong></h2>\n<h3><strong>（1）优先级过滤（Lane Model）</strong></h3>\n<ul>\n<li>如果当前渲染的优先级（<code>renderLanes</code>）不包含某个更新的优先级（<code>update.lane</code>），则跳过该更新。</li>\n<li>跳过的更新会被克隆并保留到 <code>firstBaseUpdate/lastBaseUpdate</code> 队列中。</li>\n</ul>\n<h3><strong>（2）批处理合并</strong></h3>\n<ul>\n<li><strong>连续的同优先级更新</strong>  ：会被顺序处理并合并到 <code>resultState</code>。<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 示例：连续 setState</span>\n<span class=\"hljs-title function_\">setCount</span>(<span class=\"hljs-number\">1</span>); <span class=\"hljs-comment\">// Update1</span>\n<span class=\"hljs-title function_\">setCount</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">prev</span> =&gt;</span> prev + <span class=\"hljs-number\">1</span>); <span class=\"hljs-comment\">// Update2</span>\n<span class=\"hljs-comment\">// 结果：count = 2</span>\n</code></pre>\n</li>\n</ul>\n<h3><strong>（3）副作用标记</strong></h3>\n<ul>\n<li>在遍历过程中，会标记需要 DOM 操作的副作用（如 <code>Update</code>、<code>Placement</code>），供 Commit 阶段使用。</li>\n</ul>\n<hr>\n<h2><strong>4. 完整示例</strong></h2>\n<h3><strong>场景：优先级混合更新</strong></h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 初始状态：baseState = { count: 0 }</span>\n<span class=\"hljs-title function_\">setCount</span>(<span class=\"hljs-number\">1</span>); <span class=\"hljs-comment\">// Update1（低优先级）</span>\n<span class=\"hljs-title function_\">setCount</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">prev</span> =&gt;</span> prev + <span class=\"hljs-number\">1</span>); <span class=\"hljs-comment\">// Update2（高优先级）</span>\n</code></pre>\n<ol>\n<li><strong>高优先级渲染时</strong>  ：\n<ul>\n<li>跳过 <code>Update1</code>（低优先级），保留到下次。</li>\n<li>处理 <code>Update2</code>，得到 <code>count = 1</code>。</li>\n</ul>\n</li>\n<li><strong>低优先级渲染时</strong>  ：\n<ul>\n<li>处理之前跳过的 <code>Update1</code>，覆盖为 <code>count = 1</code>。</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h2><strong>5. 源码关键片段</strong></h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">processUpdateQueue</span>(<span class=\"hljs-params\">workInProgress, renderLanes</span>) {\n  <span class=\"hljs-keyword\">const</span> queue = workInProgress.<span class=\"hljs-property\">updateQueue</span>;\n  <span class=\"hljs-keyword\">let</span> update = queue.<span class=\"hljs-property\">firstUpdate</span>;\n  <span class=\"hljs-keyword\">let</span> resultState = queue.<span class=\"hljs-property\">baseState</span>;\n\n  <span class=\"hljs-keyword\">while</span> (update !== <span class=\"hljs-literal\">null</span>) {\n    <span class=\"hljs-keyword\">const</span> updateLane = update.<span class=\"hljs-property\">lane</span>;\n    <span class=\"hljs-keyword\">if</span> (!<span class=\"hljs-title function_\">isSubsetOfLanes</span>(renderLanes, updateLane)) {\n      <span class=\"hljs-comment\">// 跳过低优先级更新</span>\n      <span class=\"hljs-keyword\">const</span> clone = <span class=\"hljs-title function_\">cloneUpdate</span>(update);\n      newLastBaseUpdate = newLastBaseUpdate ? newLastBaseUpdate.<span class=\"hljs-property\">next</span> = clone : clone;\n    } <span class=\"hljs-keyword\">else</span> {\n      <span class=\"hljs-comment\">// 处理更新</span>\n      resultState = <span class=\"hljs-title function_\">getStateFromUpdate</span>(update, resultState);\n    }\n    update = update.<span class=\"hljs-property\">next</span>; <span class=\"hljs-comment\">// 遍历链表</span>\n  }\n\n  <span class=\"hljs-comment\">// 更新最终状态</span>\n  workInProgress.<span class=\"hljs-property\">memoizedState</span> = resultState;\n}\n</code></pre>\n<hr>\n<h2><strong>6. 总结</strong></h2>\n<table>\n<thead>\n<tr>\n<th><strong>步骤</strong></th>\n<th><strong>操作</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>遍历链表</strong></td>\n<td>通过 <code>update.next</code> 依次访问每个 <code>Update</code>。</td>\n</tr>\n<tr>\n<td><strong>优先级过滤</strong></td>\n<td>跳过不匹配 <code>renderLanes</code> 的更新，保留到后续处理。</td>\n</tr>\n<tr>\n<td><strong>状态计算</strong></td>\n<td>根据 <code>action</code> 类型（对象或函数）合并状态。</td>\n</tr>\n<tr>\n<td><strong>结果保存</strong></td>\n<td>更新 <code>memoizedState</code> 和 <code>baseState</code>。</td>\n</tr>\n<tr>\n<td><strong>副作用标记</strong></td>\n<td>标记需要 DOM 操作的变更（如 <code>Update</code>）。</td>\n</tr>\n</tbody>\n</table>\n<p><code>processUpdateQueue</code> 通过链表遍历和优先级调度，实现了高效、一致的状态更新机制，是 React 渲染性能优化的核心之一。</p>\n</div>";
      </script></body></html>
