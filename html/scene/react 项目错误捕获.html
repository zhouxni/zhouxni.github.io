<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'react 项目错误捕获'
        document.getElementById('article').innerHTML = 
        "<div><p>React 项目错误捕获由 <code>componentDidCatch</code> 监听生命周期、渲染时期错误。同时结合 <code>window.addEventListener('error')</code> 和 <code>window.addEventListener('unhandledrejection')</code>。</p>\n<h3>window.addEventListener('error')</h3>\n<p>用来捕获事件处理函数内抛出的错误</p>\n<h3>window.addEventListener('unhandledrejection')</h3>\n<p>用来捕获生命周期、渲染时期、事件处理函数抛出的Promise 错误</p>\n<h3>componentDidCatch</h3>\n<p>只能捕获生命周期函数执行、渲染时期同步错误。异步错误由<code>window.addEventListener('error')</code>捕获</p>\n</div>";</script></body></html>
