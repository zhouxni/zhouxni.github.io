<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="微信小程序支持的 CSS 选择器",document.getElementById("article").innerHTML="<div><p>微信小程序的 WXSS（WeiXin Style Sheets）虽然语法类似 CSS，但在选择器支持上存在一些限制，主要是为了性能优化和简化实现。以下是微信小程序不支持或有限支持的 CSS 选择器：</p>\n<h3>1. 不支持的复杂选择器</h3>\n<ul>\n<li><strong>后代选择器的多层嵌套</strong>   ：虽然支持简单的父子/后代关系（如 <code>.parent .child</code>），但过度复杂的嵌套（如 <code>.a .b .c .d</code>）可能无法正常工作或性能不佳。</li>\n<li><strong>相邻兄弟选择器</strong>   ：<code>+</code>（如 <code>div + p</code> 选择 div 后的第一个 p 元素）不支持。</li>\n<li><strong>通用兄弟选择器</strong>   ：<code>~</code>（如 <code>div ~ p</code> 选择 div 后的所有 p 元素）不支持。</li>\n<li><strong>属性选择器</strong>   ：\n<ul>\n<li>不支持复杂的属性匹配（如 <code>[attr^=value]</code>、<code>[attr$=value]</code>、<code>[attr*=value]</code>）</li>\n<li>仅支持简单的属性存在匹配（如 <code>[disabled]</code>），但实际使用中兼容性较差。</li>\n</ul>\n</li>\n<li><strong>伪元素选择器</strong>   ：\n<ul>\n<li><code>::before</code> 和 <code>::after</code> 不支持（微信小程序不允许通过伪元素生成内容）。</li>\n<li><code>::first-letter</code>、<code>::first-line</code> 等文本相关伪元素不支持。</li>\n</ul>\n</li>\n</ul>\n<h3>2. 有限支持的选择器</h3>\n<ul>\n<li><strong>伪类选择器</strong>   ：\n<ul>\n<li>仅支持部分用户行为伪类，如 <code>:active</code>、<code>:focus</code>（但 <code>:focus</code> 支持度有限）。</li>\n<li>不支持 <code>:hover</code>（微信小程序在移动端通常通过触摸事件模拟 hover 效果）。</li>\n<li>不支持结构伪类，如 <code>:nth-child()</code>、<code>:first-child</code>、<code>:last-child</code> 等。</li>\n<li>不支持 <code>:not()</code> 否定伪类。</li>\n</ul>\n</li>\n<li><strong>通配符选择器</strong>   ：<code>*</code>（匹配所有元素）虽然语法上允许，但不建议使用，可能导致性能问题且行为不稳定。</li>\n</ul>\n<h3>3. 其他限制</h3>\n<ul>\n<li>不支持 CSS 变量（Custom Properties），无法通过 <code>var()</code> 函数使用变量。</li>\n<li>不支持 <code>@import</code> 导入外部样式表（需通过 <code>style</code> 标签或 <code>wxss</code> 文件本地定义）。</li>\n<li>部分选择器在不同基础库版本中支持度不一致，需注意兼容性。</li>\n</ul>\n<h3>替代方案</h3>\n<ul>\n<li>对于复杂选择器需求，可通过增加 class 或 id 简化选择逻辑。</li>\n<li>结构伪类（如 <code>nth-child</code>）的效果可通过在 JS 中动态添加 class 实现。</li>\n<li>伪元素效果可通过额外的 DOM 元素模拟。</li>\n</ul>\n<p>开发时建议优先使用简单的类选择器（<code>.class</code>）、ID 选择器（<code>#id</code>）和标签选择器（<code>tag</code>），并通过微信开发者工具的模拟器测试兼容性，避免因选择器问题导致样式异常。</p>\n</div>"</script></body></html>
