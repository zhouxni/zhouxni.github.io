<!DOCTYPE html><html lang="en"><head>

    body {

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
      document.title = '手写一个简易的 redux'
        document.getElementById('article').innerHTML = 
        "<div><p>下面是一个<strong>简易版 Redux</strong>   的实现，包含核心功能：</p>\n<ul>\n<li><code>createStore</code>（状态管理）</li>\n<li><code>combineReducers</code>（Reducer 合并）</li>\n<li><code>applyMiddleware</code>（中间件机制）</li>\n<li><code>bindActionCreators</code>（Action 创建器绑定）</li>\n</ul>\n<hr>\n<h2>1. <strong><code>createStore</code>（核心）</strong></h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createStore</span>(<span class=\"hljs-params\">reducer, enhancer</span>) {\n  <span class=\"hljs-comment\">// 如果传入了 enhancer（如 applyMiddleware），增强 store</span>\n  <span class=\"hljs-keyword\">if</span> (enhancer) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">enhancer</span>(createStore)(reducer);\n  }\n\n  <span class=\"hljs-keyword\">let</span> state = <span class=\"hljs-literal\">undefined</span>;\n  <span class=\"hljs-keyword\">const</span> listeners = [];\n\n  <span class=\"hljs-comment\">// 获取当前状态</span>\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">getState</span> = (<span class=\"hljs-params\"></span>) =&gt; state;\n\n  <span class=\"hljs-comment\">// 派发 Action，触发 Reducer 更新状态</span>\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">dispatch</span> = (<span class=\"hljs-params\">action</span>) =&gt; {\n    state = <span class=\"hljs-title function_\">reducer</span>(state, action);\n    listeners.<span class=\"hljs-title function_\">forEach</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">listener</span> =&gt;</span> <span class=\"hljs-title function_\">listener</span>());\n  };\n\n  <span class=\"hljs-comment\">// 订阅状态变化</span>\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">subscribe</span> = (<span class=\"hljs-params\">listener</span>) =&gt; {\n    listeners.<span class=\"hljs-title function_\">push</span>(listener);\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-function\">() =&gt;</span> {\n      <span class=\"hljs-keyword\">const</span> index = listeners.<span class=\"hljs-title function_\">indexOf</span>(listener);\n      listeners.<span class=\"hljs-title function_\">splice</span>(index, <span class=\"hljs-number\">1</span>);\n    };\n  };\n\n  <span class=\"hljs-comment\">// 初始化状态</span>\n  <span class=\"hljs-title function_\">dispatch</span>({ <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">&#x27;@@INIT&#x27;</span> });\n\n  <span class=\"hljs-keyword\">return</span> { getState, dispatch, subscribe };\n}\n</code></pre>\n<hr>\n<h2>2. <strong><code>combineReducers</code>（合并 Reducers）</strong></h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">combineReducers</span>(<span class=\"hljs-params\">reducers</span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-function\">(<span class=\"hljs-params\">state = {}, action</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">const</span> newState = {};\n    <span class=\"hljs-keyword\">let</span> hasChanged = <span class=\"hljs-literal\">false</span>;\n    \n    <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">keys</span>(reducers).<span class=\"hljs-title function_\">forEach</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">key</span> =&gt;</span> {\n      <span class=\"hljs-keyword\">const</span> reducer = reducers[key];\n      <span class=\"hljs-keyword\">const</span> prevState = state[key];\n      <span class=\"hljs-keyword\">const</span> nextState = <span class=\"hljs-title function_\">reducer</span>(prevState, action);\n      newState[key] = nextState;\n      hasChanged = hasChanged || nextState !== prevState;\n    });\n\n    <span class=\"hljs-keyword\">return</span> hasChanged ? newState : state;\n  };\n}\n</code></pre>\n<hr>\n<h2>3. <strong><code>applyMiddleware</code>（中间件机制）</strong></h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">applyMiddleware</span>(<span class=\"hljs-params\">...middlewares</span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-function\">(<span class=\"hljs-params\">createStore</span>) =&gt;</span> <span class=\"hljs-function\">(<span class=\"hljs-params\">reducer</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">const</span> store = <span class=\"hljs-title function_\">createStore</span>(reducer);\n    <span class=\"hljs-keyword\">let</span> dispatch = store.<span class=\"hljs-property\">dispatch</span>;\n\n    <span class=\"hljs-comment\">// 提供给中间件的 API</span>\n    <span class=\"hljs-keyword\">const</span> middlewareAPI = {\n      <span class=\"hljs-attr\">getState</span>: store.<span class=\"hljs-property\">getState</span>,\n      <span class=\"hljs-attr\">dispatch</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">action</span>) =&gt;</span> <span class=\"hljs-title function_\">dispatch</span>(action),\n    };\n\n    <span class=\"hljs-comment\">// 链式调用中间件</span>\n    <span class=\"hljs-keyword\">const</span> chain = middlewares.<span class=\"hljs-title function_\">map</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">middleware</span> =&gt;</span> <span class=\"hljs-title function_\">middleware</span>(middlewareAPI));\n    dispatch = <span class=\"hljs-title function_\">compose</span>(...chain)(store.<span class=\"hljs-property\">dispatch</span>);\n\n    <span class=\"hljs-keyword\">return</span> { ...store, dispatch };\n  };\n}\n\n<span class=\"hljs-comment\">// 组合函数（从右到左执行）</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">compose</span>(<span class=\"hljs-params\">...funcs</span>) {\n  <span class=\"hljs-keyword\">return</span> funcs.<span class=\"hljs-title function_\">reduce</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">a, b</span>) =&gt;</span> <span class=\"hljs-function\">(<span class=\"hljs-params\">...args</span>) =&gt;</span> <span class=\"hljs-title function_\">a</span>(<span class=\"hljs-title function_\">b</span>(...args)));\n}\n</code></pre>\n<hr>\n<h2>4. <strong><code>bindActionCreators</code>（绑定 Action 创建器）</strong></h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">bindActionCreators</span>(<span class=\"hljs-params\">actionCreators, dispatch</span>) {\n  <span class=\"hljs-keyword\">const</span> boundActions = {};\n  <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">keys</span>(actionCreators).<span class=\"hljs-title function_\">forEach</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">key</span> =&gt;</span> {\n    <span class=\"hljs-keyword\">const</span> actionCreator = actionCreators[key];\n    boundActions[key] = <span class=\"hljs-function\">(<span class=\"hljs-params\">...args</span>) =&gt;</span> <span class=\"hljs-title function_\">dispatch</span>(<span class=\"hljs-title function_\">actionCreator</span>(...args));\n  });\n  <span class=\"hljs-keyword\">return</span> boundActions;\n}\n</code></pre>\n<hr>\n<h2><strong>使用示例</strong></h2>\n<h3>定义 Reducer 和 Action</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// Reducer</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">counterReducer</span>(<span class=\"hljs-params\">state = <span class=\"hljs-number\">0</span>, action</span>) {\n  <span class=\"hljs-keyword\">switch</span> (action.<span class=\"hljs-property\">type</span>) {\n    <span class=\"hljs-keyword\">case</span> <span class=\"hljs-string\">&#x27;INCREMENT&#x27;</span>:\n      <span class=\"hljs-keyword\">return</span> state + <span class=\"hljs-number\">1</span>;\n    <span class=\"hljs-keyword\">case</span> <span class=\"hljs-string\">&#x27;DECREMENT&#x27;</span>:\n      <span class=\"hljs-keyword\">return</span> state - <span class=\"hljs-number\">1</span>;\n    <span class=\"hljs-attr\">default</span>:\n      <span class=\"hljs-keyword\">return</span> state;\n  }\n}\n\n<span class=\"hljs-comment\">// Action Creator</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">increment</span> = (<span class=\"hljs-params\"></span>) =&gt; ({ <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">&#x27;INCREMENT&#x27;</span> });\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">decrement</span> = (<span class=\"hljs-params\"></span>) =&gt; ({ <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">&#x27;DECREMENT&#x27;</span> });\n</code></pre>\n<h3>创建 Store 并测试</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 合并 Reducers（如果有多个）</span>\n<span class=\"hljs-keyword\">const</span> rootReducer = <span class=\"hljs-title function_\">combineReducers</span>({\n  <span class=\"hljs-attr\">counter</span>: counterReducer,\n});\n\n<span class=\"hljs-comment\">// 创建 Store</span>\n<span class=\"hljs-keyword\">const</span> store = <span class=\"hljs-title function_\">createStore</span>(rootReducer);\n\n<span class=\"hljs-comment\">// 订阅状态变化</span>\nstore.<span class=\"hljs-title function_\">subscribe</span>(<span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;State changed:&#x27;</span>, store.<span class=\"hljs-title function_\">getState</span>());\n});\n\n<span class=\"hljs-comment\">// 派发 Action</span>\nstore.<span class=\"hljs-title function_\">dispatch</span>(<span class=\"hljs-title function_\">increment</span>()); <span class=\"hljs-comment\">// State changed: { counter: 1 }</span>\nstore.<span class=\"hljs-title function_\">dispatch</span>(<span class=\"hljs-title function_\">decrement</span>()); <span class=\"hljs-comment\">// State changed: { counter: 0 }</span>\n</code></pre>\n<h3>使用中间件（如 Logger）</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 自定义中间件</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">logger</span> = (<span class=\"hljs-params\">store</span>) =&gt; <span class=\"hljs-function\">(<span class=\"hljs-params\">next</span>) =&gt;</span> <span class=\"hljs-function\">(<span class=\"hljs-params\">action</span>) =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Dispatching:&#x27;</span>, action);\n  <span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-title function_\">next</span>(action);\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;New state:&#x27;</span>, store.<span class=\"hljs-title function_\">getState</span>());\n  <span class=\"hljs-keyword\">return</span> result;\n};\n\n<span class=\"hljs-comment\">// 创建带中间件的 Store</span>\n<span class=\"hljs-keyword\">const</span> storeWithMiddleware = <span class=\"hljs-title function_\">createStore</span>(\n  rootReducer,\n  <span class=\"hljs-title function_\">applyMiddleware</span>(logger)\n);\n</code></pre>\n<hr>\n<h2><strong>功能对比</strong></h2>\n<table>\n<thead>\n<tr>\n<th>功能</th>\n<th>简易版 Redux</th>\n<th>完整版 Redux</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>createStore</code></td>\n<td>✅</td>\n<td>✅</td>\n</tr>\n<tr>\n<td><code>combineReducers</code></td>\n<td>✅</td>\n<td>✅</td>\n</tr>\n<tr>\n<td><code>applyMiddleware</code></td>\n<td>✅</td>\n<td>✅</td>\n</tr>\n<tr>\n<td><code>bindActionCreators</code></td>\n<td>✅</td>\n<td>✅</td>\n</tr>\n<tr>\n<td>异步 Action（Thunk）</td>\n<td>❌（需自行扩展）</td>\n<td>✅（需 <code>redux-thunk</code>）</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2><strong>总结</strong></h2>\n<ul>\n<li>这个简易版 Redux 实现了<strong>单向数据流</strong>  的核心逻辑。</li>\n<li>通过 <code>createStore</code> 管理状态，<code>combineReducers</code> 组合多个 Reducer。</li>\n<li>支持中间件机制（如日志、异步处理）。</li>\n<li>省略了错误处理、性能优化等细节，但足够理解 Redux 的工作原理。</li>\n</ul>\n<p>如果需要支持异步 Action，可以自行实现类似 <code>redux-thunk</code> 的中间件：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">thunk</span> = (<span class=\"hljs-params\">store</span>) =&gt; <span class=\"hljs-function\">(<span class=\"hljs-params\">next</span>) =&gt;</span> <span class=\"hljs-function\">(<span class=\"hljs-params\">action</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-keyword\">typeof</span> action === <span class=\"hljs-string\">&#x27;function&#x27;</span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">action</span>(store.<span class=\"hljs-property\">dispatch</span>, store.<span class=\"hljs-property\">getState</span>);\n  }\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">next</span>(action);\n};\n</code></pre>\n</div>";
      </script></body></html>
