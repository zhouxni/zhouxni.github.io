  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
            document.getElementById('article').innerHTML = 
            "<div><p>禁止别人调试自己的前端页面代码是一项具有挑战性的任务，因为前端代码运行在用户的浏览器中，用户有权访问和操作这些代码。然而，可以采取一些措施来增加调试的难度，尽管无法完全防止调试。以下是一些常见的方法：</p>\n<hr>\n<h3><strong>1. 代码混淆</strong></h3>\n<ul>\n<li><strong>原理</strong>  ：\n<ul>\n<li>代码混淆是通过重命名变量、函数和类，以及插入无用的代码等方式，使代码难以阅读和理解。</li>\n</ul>\n</li>\n<li><strong>实现方式</strong>  ：\n<ul>\n<li>使用代码混淆工具，如 UglifyJS、Terser、Obfuscator.io 等，对 JavaScript 代码进行混淆。</li>\n</ul>\n</li>\n<li><strong>优点</strong>  ：\n<ul>\n<li>增加代码的阅读难度，使调试变得更加困难。</li>\n</ul>\n</li>\n<li><strong>缺点</strong>  ：\n<ul>\n<li>混淆后的代码仍然可以被反混淆工具部分还原，无法完全防止调试。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>2. 检测调试工具</strong></h3>\n<ul>\n<li><strong>原理</strong>  ：\n<ul>\n<li>检测浏览器是否打开了开发者工具，如控制台、调试器等，并在检测到调试工具时采取措施，如终止执行、显示警告等。</li>\n</ul>\n</li>\n<li><strong>实现方式</strong>  ：\n<ul>\n<li>使用 <code>debugger</code> 语句或检测 <code>console</code> 面板的打开状态。</li>\n<li>监听 <code>window.ondevicemotion</code> 等事件的时间差，判断是否有调试工具存在（某些调试工具会影响事件触发时间）。</li>\n</ul>\n</li>\n<li><strong>示例代码</strong>  ：<pre><code class=\"language-javascript\">(<span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> threshold = <span class=\"hljs-number\">160</span>;\n  <span class=\"hljs-keyword\">let</span> lastTimestamp = <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>();\n\n  <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;devicemotion&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">event</span>) {\n    <span class=\"hljs-keyword\">const</span> currentTimestamp = <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>();\n    <span class=\"hljs-keyword\">if</span> (currentTimestamp - lastTimestamp &gt; threshold) {\n      <span class=\"hljs-comment\">// 检测到调试工具，采取措施</span>\n      <span class=\"hljs-title function_\">alert</span>(<span class=\"hljs-string\">&#x27;调试工具已检测到！&#x27;</span>);\n      <span class=\"hljs-comment\">// 可以选择重定向、终止执行等</span>\n    }\n    lastTimestamp = currentTimestamp;\n  });\n\n  <span class=\"hljs-comment\">// 另一种简单检测方式</span>\n  <span class=\"hljs-built_in\">setInterval</span>(<span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">const</span> start = performance.<span class=\"hljs-title function_\">now</span>();\n    <span class=\"hljs-keyword\">debugger</span>; <span class=\"hljs-comment\">// 如果开发者工具打开，会在此处暂停</span>\n    <span class=\"hljs-keyword\">const</span> end = performance.<span class=\"hljs-title function_\">now</span>();\n    <span class=\"hljs-keyword\">if</span> (end - start &gt; <span class=\"hljs-number\">100</span>) {\n      <span class=\"hljs-comment\">// 检测到调试工具</span>\n      <span class=\"hljs-title function_\">alert</span>(<span class=\"hljs-string\">&#x27;请不要尝试调试此页面！&#x27;</span>);\n    }\n  }, <span class=\"hljs-number\">1000</span>);\n})();\n</code></pre>\n</li>\n<li><strong>优点</strong>  ：\n<ul>\n<li>可以在一定程度上阻止普通用户的调试尝试。</li>\n</ul>\n</li>\n<li><strong>缺点</strong>  ：\n<ul>\n<li>专业的开发者可以绕过这些检测。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>3. 禁用右键和快捷键</strong></h3>\n<ul>\n<li><strong>原理</strong>  ：\n<ul>\n<li>禁用浏览器的右键菜单和常用快捷键（如 F12、Ctrl+Shift+I 等），防止用户轻松打开开发者工具。</li>\n</ul>\n</li>\n<li><strong>实现方式</strong>  ：\n<ul>\n<li>使用 JavaScript 监听 <code>contextmenu</code> 事件，阻止右键菜单的显示。</li>\n<li>监听键盘事件，阻止特定快捷键的默认行为。</li>\n</ul>\n</li>\n<li><strong>示例代码</strong>  ：<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;contextmenu&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">event</span>) {\n  event.<span class=\"hljs-title function_\">preventDefault</span>();\n  <span class=\"hljs-title function_\">alert</span>(<span class=\"hljs-string\">&#x27;右键菜单已禁用！&#x27;</span>);\n});\n\n<span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;keydown&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">event</span>) {\n  <span class=\"hljs-comment\">// 禁用 F12、Ctrl+Shift+I、Ctrl+U 等快捷键</span>\n  <span class=\"hljs-keyword\">if</span> (\n    event.<span class=\"hljs-property\">key</span> === <span class=\"hljs-string\">&#x27;F12&#x27;</span> ||\n    (event.<span class=\"hljs-property\">ctrlKey</span> &amp;&amp; event.<span class=\"hljs-property\">shiftKey</span> &amp;&amp; event.<span class=\"hljs-property\">key</span> === <span class=\"hljs-string\">&#x27;I&#x27;</span>) ||\n    (event.<span class=\"hljs-property\">ctrlKey</span> &amp;&amp; event.<span class=\"hljs-property\">key</span> === <span class=\"hljs-string\">&#x27;U&#x27;</span>)\n  ) {\n    event.<span class=\"hljs-title function_\">preventDefault</span>();\n    <span class=\"hljs-title function_\">alert</span>(<span class=\"hljs-string\">&#x27;快捷键已禁用！&#x27;</span>);\n  }\n});\n</code></pre>\n</li>\n<li><strong>优点</strong>  ：\n<ul>\n<li>防止普通用户通过常规方式打开开发者工具。</li>\n</ul>\n</li>\n<li><strong>缺点</strong>  ：\n<ul>\n<li>无法阻止有经验的开发者通过其他方式打开开发者工具。</li>\n</ul>\n</li>\n</ul>\n<hr>\n</div>";
          </script></body></html>
