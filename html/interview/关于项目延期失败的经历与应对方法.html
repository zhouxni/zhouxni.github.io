      box-sizing: border-box;

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
    
        document.getElementById('article').innerHTML = 
        "<div><h4><strong>1. 承认问题，快速归因</strong></h4>\n<ul>\n<li><strong>不回避责任</strong>  ：明确项目延期/失败的事实，避免找借口（如“确实因需求变更频繁导致延期”）。</li>\n<li><strong>根因分析</strong>  ：用 <strong>5 Why 分析法</strong>   定位核心问题（例如：\n<ul>\n<li>Why 延期？→ 测试阶段阻塞；</li>\n<li>Why 阻塞？→ 依赖的第三方接口延迟交付；</li>\n<li>Why 接口延迟？→ 初期未明确对接责任人）。</li>\n</ul>\n</li>\n</ul>\n<h4><strong>2. 制定应急计划（短期）</strong></h4>\n<ul>\n<li><strong>优先级调整</strong>  ：与团队/客户协商砍掉非核心功能（MVP 先行）。</li>\n<li><strong>资源协调</strong>  ：申请额外人力或延长工时（需评估可持续性）。</li>\n<li><strong>透明沟通</strong>  ：同步风险给利益相关方，更新预期时间表。</li>\n</ul>\n<h4><strong>3. 系统性改进（长期）</strong></h4>\n<ul>\n<li><strong>流程优化</strong>  ：例如引入每日站会跟踪阻塞问题，或要求第三方服务签署 SLA。</li>\n<li><strong>工具辅助</strong>  ：用 Jira 看板可视化进度，或自动化测试减少人工耗时。</li>\n<li><strong>复盘文档</strong>  ：记录教训（如“需求评审需强制技术参与”），避免重复踩坑。</li>\n</ul>\n<h4><strong>4. 将失败转化为价值</strong></h4>\n<ul>\n<li><strong>团队共识</strong>  ：强调“快速失败”胜过“隐藏问题”，鼓励透明文化。</li>\n<li><strong>个人成长</strong>  ：通过此事习得的关键能力（如风险预判、向上管理）。</li>\n</ul>\n<p><strong>示例回答框架</strong>  ：</p>\n<blockquote>\n<p>“曾有一个电商促销项目因第三方支付接口延迟导致延期。我们当天做了三件事：</p>\n<ol>\n<li><strong>止损</strong>  ：临时切换备用支付渠道保证活动上线；</li>\n<li><strong>归因</strong>  ：发现合同未明确接口交付时间，后续新增技术评审环节；</li>\n<li><strong>预防</strong>  ：对关键路径任务设置 buffer time。<br>\n最终活动达成 80% 目标，且后续类似项目再未出现同类问题。”</li>\n</ol>\n</blockquote>\n<p><strong>关键点</strong>  ：展现问题解决能力、责任担当和持续改进意识。</p>\n</div>";
      </script></body></html>
