<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="谷歌浏览器禁用自动升级",document.getElementById("article").innerHTML="<div><p>下面演示禁用自动升级的正确姿势。首先关闭Chrome浏览器，然后进入目录“/Library/Google/GoogleSoftwareUpdate”</p>\n<p>cd /Library/Google/GoogleSoftwareUpdate</p>\n<p>然后删除该目录下的GoogleSoftwareUpdate.bundle即可。可以通过命令行删除，或者Finder手动删除都可以。</p>\n<p>执行完成以后，再次重启chrome，就可以看到chrome的提示：</p>\n<p>表示我们禁用chrome的自动更新成功了。如果你点击了“设置自动更新”，则刚才的“GoogleSoftwareUpdate.bundle”文件就会再次出现了。点击“不再询问”大功告成。通过“帮助-&gt;关于Google Chrome”可以查看信息：</p>\n<p>正确姿势二\n可能在有些Mac上发现在“/Library”这个根目录下没有Google目录，那么其实在“~/Library”这个用户目录下也有一个Google目录。在该目录下执行操作同样可以禁用自动更新。请执行以下命令：</p>\n<p>cd ~/Library/Google</p>\n<p>sudo chown root:wheel GoogleSoftwareUpdate</p>\n<p>相当于修改了GoogleSoftwareUpdate这个文件夹的拥有者，而不仅仅是修改了权限，使Google对该文件夹没有写入权限。事实证明这种方式是可行的。重启Chrome完成以后通过“帮助-&gt;关于Google Chrome”可以查看信息：</p>\n<p>此处分割线。</p>\n<pre><code>    在进行正确姿势一时要注意，进入的是Mac系统目录下的“/Library/Google/GoogleSoftwareUpdate”这个目录，而不是“/Users/mac名/Library/Google/GoogleSoftwareUpdate”或者“~/Library/Google/GoogleSoftwareUpdate”。如果你进入了“~/Library/Google/GoogleSoftwareUpdate”，会发现其实这里根本就没有GoogleSoftwareUpdate.bundle这个文件，因为你走的方向就错了。\n\n    在进行正确姿势二时要注意，恰恰和正确姿势一相反，此时进入的是“/Users/mac名/Library/Google”目录或者“~/Library/Google”目录这个用户目录。\n\n    正确姿势一和正确姿势二都可以阻止Chrome的自动升级，我们可以通过查看GoogleSoftwareUpdate来查看这两种方式的共同点：\n</code></pre>\n<p>/Library/Google目录，可以发现GoogleSoftwareUpdate这个文件的所属为root:wheel</p>\n<p>~/Library/Google目录，可以发现GoogleSoftwareUpdate这个文件的所属同样为为root:wheel</p>\n<p>通过查看文件夹的所属，如果你发现上述的正确姿势一二都无法解决问题，那是不是应该先用chown命令来设置GoogleSoftwareUpdate目录的所属呢？</p>\n</div>"</script></body></html>
