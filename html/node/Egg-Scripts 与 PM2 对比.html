  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
      document.title = 'Egg-Scripts 与 PM2 对比'
        document.getElementById('article').innerHTML = 
        "<div><p>Egg-Scripts 和 PM2 都是 Node.js 应用部署工具，但设计目标和适用场景不同。以下是详细对比：</p>\n<hr>\n<h2><strong>1. 核心定位</strong></h2>\n<table>\n<thead>\n<tr>\n<th>工具</th>\n<th>定位</th>\n<th>适用场景</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Egg-Scripts</strong></td>\n<td>Egg.js <strong>官方</strong>  提供的轻量级部署脚本</td>\n<td>专为 Egg.js 应用优化，适合简单生产部署</td>\n</tr>\n<tr>\n<td><strong>PM2</strong></td>\n<td><strong>通用</strong>   Node.js 进程管理工具</td>\n<td>适用于任意 Node.js 应用，功能全面（集群、监控、日志等）</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2><strong>2. 功能对比</strong></h2>\n<table>\n<thead>\n<tr>\n<th>功能</th>\n<th>Egg-Scripts</th>\n<th>PM2</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>启动应用</strong></td>\n<td><code>egg-scripts start</code></td>\n<td><code>pm2 start app.js</code></td>\n</tr>\n<tr>\n<td><strong>停止应用</strong></td>\n<td><code>egg-scripts stop</code></td>\n<td><code>pm2 stop &lt;app&gt;</code></td>\n</tr>\n<tr>\n<td><strong>集群模式</strong></td>\n<td>❌ 不支持</td>\n<td>✅ 支持（<code>-i max</code>）</td>\n</tr>\n<tr>\n<td><strong>热重启</strong></td>\n<td>❌ 不支持</td>\n<td>✅ 支持（<code>pm2 reload</code>）</td>\n</tr>\n<tr>\n<td><strong>日志管理</strong></td>\n<td>仅基础输出</td>\n<td>✅ 支持日志分割、历史记录</td>\n</tr>\n<tr>\n<td><strong>监控面板</strong></td>\n<td>❌ 不支持</td>\n<td>✅ 支持（<code>pm2 monit</code>）</td>\n</tr>\n<tr>\n<td><strong>环境变量管理</strong></td>\n<td>需手动配置</td>\n<td>✅ 支持（<code>--env</code>）</td>\n</tr>\n<tr>\n<td><strong>开机自启</strong></td>\n<td>❌ 不支持</td>\n<td>✅ 支持（<code>pm2 startup</code>）</td>\n</tr>\n<tr>\n<td><strong>多应用管理</strong></td>\n<td>❌ 不支持</td>\n<td>✅ 支持（<code>ecosystem.config.js</code>）</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2><strong>3. 使用示例</strong></h2>\n<h3><strong>(1) Egg-Scripts</strong></h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># 启动（生产模式）</span>\negg-scripts start --daemon --title=<span class=\"hljs-string\">&quot;egg-app&quot;</span>\n\n<span class=\"hljs-comment\"># 停止</span>\negg-scripts stop\n</code></pre>\n<p><strong>配置项</strong>  （通过 <code>package.json</code> 指定）：</p>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;egg-scripts&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;port&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-number\">7001</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;workers&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-number\">4</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;title&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;egg-app&quot;</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<h3><strong>(2) PM2</strong></h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># 启动（集群模式）</span>\npm2 start app.js -i max --name <span class=\"hljs-string\">&quot;egg-app&quot;</span>\n\n<span class=\"hljs-comment\"># 监控</span>\npm2 monit\n\n<span class=\"hljs-comment\"># 开机自启</span>\npm2 startup &amp;&amp; pm2 save\n</code></pre>\n<p><strong>配置项</strong>  （通过 <code>ecosystem.config.js</code>）：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-property\">exports</span> = {\n  <span class=\"hljs-attr\">apps</span>: [{\n    <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&quot;egg-app&quot;</span>,\n    <span class=\"hljs-attr\">script</span>: <span class=\"hljs-string\">&quot;app.js&quot;</span>,\n    <span class=\"hljs-attr\">instances</span>: <span class=\"hljs-string\">&quot;max&quot;</span>,\n    <span class=\"hljs-attr\">env</span>: {\n      <span class=\"hljs-attr\">NODE_ENV</span>: <span class=\"hljs-string\">&quot;production&quot;</span>,\n    },\n  }]\n};\n</code></pre>\n<hr>\n<h2><strong>4. 优缺点分析</strong></h2>\n<h3><strong>Egg-Scripts</strong></h3>\n<ul>\n<li><strong>优点</strong>  ：\n<ul>\n<li>专为 Egg.js 优化，无需额外配置。</li>\n<li>轻量级，适合简单场景。</li>\n</ul>\n</li>\n<li><strong>缺点</strong>  ：\n<ul>\n<li>功能有限（无集群、监控等）。</li>\n<li>依赖 Egg.js 生态。</li>\n</ul>\n</li>\n</ul>\n<h3><strong>PM2</strong></h3>\n<ul>\n<li><strong>优点</strong>  ：\n<ul>\n<li>功能全面（集群、监控、日志、多应用管理）。</li>\n<li>通用性强，适用于任何 Node.js 应用。</li>\n</ul>\n</li>\n<li><strong>缺点</strong>  ：\n<ul>\n<li>配置略复杂（需学习 <code>ecosystem.config.js</code>）。</li>\n<li>内存占用略高。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h2><strong>5. 如何选择？</strong></h2>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>推荐工具</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>快速部署 Egg.js 应用</strong></td>\n<td>Egg-Scripts</td>\n</tr>\n<tr>\n<td><strong>需要集群/多核优化</strong></td>\n<td>PM2</td>\n</tr>\n<tr>\n<td><strong>需要监控/日志管理</strong></td>\n<td>PM2</td>\n</tr>\n<tr>\n<td><strong>混合技术栈（Node.js + Python 等）</strong></td>\n<td>PM2</td>\n</tr>\n<tr>\n<td><strong>简单 Demo 或测试环境</strong></td>\n<td>Egg-Scripts</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2><strong>6. 结合使用的最佳实践</strong></h2>\n<ol>\n<li><strong>开发环境</strong>  ：直接使用 <code>npm run dev</code>（Egg.js 内置开发模式）。</li>\n<li><strong>生产环境</strong>  ：\n<ul>\n<li>如果只需基础功能 → <strong>Egg-Scripts</strong>  。</li>\n<li>如果需要集群、监控 → <strong>PM2</strong>  （推荐）。</li>\n</ul>\n</li>\n<li><strong>容器化部署</strong>  ：\n<ul>\n<li>在 Docker 中优先使用 PM2（支持进程管理、优雅退出）。</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h2><strong>7. 总结</strong></h2>\n<ul>\n<li><strong>Egg-Scripts</strong>   是 Egg.js 的“开箱即用”方案，适合简单场景。</li>\n<li><strong>PM2</strong>   是专业级工具，适合复杂生产环境。</li>\n<li><strong>关键区别</strong>  ：PM2 提供 <strong>进程管理、集群、监控</strong>  ，而 Egg-Scripts 仅专注 <strong>启动/停止</strong>  。</li>\n</ul>\n<p>根据项目需求选择，大多数生产环境推荐 <strong>PM2</strong>  ！ 🚀</p>\n</div>";
      </script></body></html>
