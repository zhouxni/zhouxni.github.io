<script>
      document.title = 'Egg.js дёӯ EGG_SERVER_ENV'
        document.getElementById('article').innerHTML = 
        "<div><p>еңЁ Egg.js дёӯпјҢ<code>EGG_SERVER_ENV</code> жҳҜдёҖдёӘе…ій”®зҡ„зҺҜеўғеҸҳйҮҸпјҢз”ЁдәҺж ҮиҜҶеә”з”ЁиҝҗиЎҢзҡ„зҺҜеўғзұ»еһӢгҖӮе®ғзӣҙжҺҘеҪұе“Қ Egg.js зҡ„й…ҚзҪ®еҠ иҪҪйҖ»иҫ‘гҖҒжҸ’д»¶иЎҢдёәд»ҘеҸҠеә”з”Ёзҡ„ж•ҙдҪ“иҝҗиЎҢжЁЎејҸгҖӮд»ҘдёӢжҳҜеҜ№ <code>EGG_SERVER_ENV</code> зҡ„ж·ұеәҰи§Јжһҗпјҡ</p>\n<h3>дёҖгҖҒж ёеҝғжҰӮеҝөдёҺй»ҳи®ӨеҖј</h3>\n<h4>1. <strong>зҺҜеўғеҸҳйҮҸдҪңз”Ё</strong></h4>\n<ul>\n<li>еҶіе®ҡеҠ иҪҪе“Әз»„й…ҚзҪ®ж–Үд»¶пјҲеҰӮ <code>config.prod.js</code>гҖҒ<code>config.local.js</code>пјү</li>\n<li>еҪұе“ҚеҶ…зҪ®жҸ’д»¶е’ҢиҮӘе®ҡд№үд»Јз Ғзҡ„иЎҢдёәпјҲеҰӮж—Ҙеҝ—зә§еҲ«гҖҒзј“еӯҳзӯ–з•Ҙпјү</li>\n</ul>\n<h4>2. <strong>й»ҳи®ӨзҺҜеўғжҳ е°„</strong></h4>\n<table>\n<thead>\n<tr>\n<th>EGG_SERVER_ENV еҖј</th>\n<th>еҜ№еә”зҺҜеўғ</th>\n<th>иҜҙжҳҺ</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>local</code></td>\n<td>жң¬ең°ејҖеҸ‘зҺҜеўғ</td>\n<td>ејҖеҸ‘дәәе‘ҳжң¬ең°зҺҜеўғпјҢй»ҳи®ӨеҖј</td>\n</tr>\n<tr>\n<td><code>unittest</code></td>\n<td>еҚ•е…ғжөӢиҜ•зҺҜеўғ</td>\n<td>иҝҗиЎҢжөӢиҜ•з”ЁдҫӢж—¶зҡ„зҺҜеўғ</td>\n</tr>\n<tr>\n<td><code>prod</code></td>\n<td>з”ҹдә§зҺҜеўғ</td>\n<td>зәҝдёҠжӯЈејҸзҺҜеўғ</td>\n</tr>\n<tr>\n<td><code>staging</code></td>\n<td>йў„еҸ‘/зҒ°еәҰзҺҜеўғ</td>\n<td>з”ҹдә§зҺҜеўғзҡ„й•ңеғҸпјҢз”ЁдәҺеҸ‘еёғеүҚйӘҢиҜҒ</td>\n</tr>\n</tbody>\n</table>\n<h3>дәҢгҖҒй…ҚзҪ®ж–Үд»¶еҠ иҪҪи§„еҲҷ</h3>\n<h4>1. <strong>й…ҚзҪ®ж–Үд»¶дјҳе…Ҳзә§</strong></h4>\n<p>Egg.js жҢүд»ҘдёӢйЎәеәҸеҠ иҪҪй…ҚзҪ®ж–Үд»¶пјҲеҗҺеҠ иҪҪзҡ„иҰҶзӣ–е…ҲеҠ иҪҪзҡ„пјүпјҡ</p>\n<pre><code>config.default.js\nвҶ“\nconfig.{env}.js        // ж №жҚ® EGG_SERVER_ENV еҠ иҪҪ\nвҶ“\nconfig.{custom}.js     // иҮӘе®ҡд№үзҺҜеўғй…ҚзҪ®\nвҶ“\nconfig.local.js        // жң¬ең°ејҖеҸ‘зҺҜеўғдё“з”Ёй…ҚзҪ®пјҲе§Ӣз»ҲеҠ иҪҪпјү\n</code></pre>\n<h4>2. <strong>зӨәдҫӢй…ҚзҪ®ж–Үд»¶з»“жһ„</strong></h4>\n<pre><code>config/\nв”ңв”Җв”Җ config.default.js\nв”ңв”Җв”Җ config.local.js\nв”ңв”Җв”Җ config.unittest.js\nв”ңв”Җв”Җ config.prod.js\nв”ңв”Җв”Җ config.staging.js\nв””в”Җв”Җ plugin.js\n</code></pre>\n<h3>дёүгҖҒзҺҜеўғеҸҳйҮҸи®ҫзҪ®ж–№жі•</h3>\n<h4>1. <strong>е‘Ҫд»ӨиЎҢж–№ејҸ</strong></h4>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># Linux/macOS</span>\nEGG_SERVER_ENV=prod node server.js\n\n<span class=\"hljs-comment\"># Windows (cmd)</span>\n<span class=\"hljs-built_in\">set</span> EGG_SERVER_ENV=prod &amp;&amp; node server.js\n\n<span class=\"hljs-comment\"># Windows (PowerShell)</span>\n<span class=\"hljs-variable\">$env</span>:EGG_SERVER_ENV = <span class=\"hljs-string\">&quot;prod&quot;</span>; node server.js\n</code></pre>\n<h4>2. <strong>PM2 й…ҚзҪ®ж–№ејҸ</strong></h4>\n<pre><code class=\"language-json\"><span class=\"hljs-comment\">// pm2.json</span>\n<span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;apps&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span>\n    <span class=\"hljs-punctuation\">{</span>\n      <span class=\"hljs-attr\">&quot;name&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;egg-app&quot;</span><span class=\"hljs-punctuation\">,</span>\n      <span class=\"hljs-attr\">&quot;script&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;server.js&quot;</span><span class=\"hljs-punctuation\">,</span>\n      <span class=\"hljs-attr\">&quot;env&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n        <span class=\"hljs-attr\">&quot;EGG_SERVER_ENV&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;prod&quot;</span>\n      <span class=\"hljs-punctuation\">}</span>\n    <span class=\"hljs-punctuation\">}</span>\n  <span class=\"hljs-punctuation\">]</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<h4>3. <strong>Docker й…ҚзҪ®ж–№ејҸ</strong></h4>\n<pre><code class=\"language-dockerfile\"><span class=\"hljs-comment\"># Dockerfile</span>\n<span class=\"hljs-keyword\">ENV</span> EGG_SERVER_ENV=prod\n<span class=\"hljs-keyword\">CMD</span><span class=\"language-bash\"> [<span class=\"hljs-string\">&quot;node&quot;</span>, <span class=\"hljs-string\">&quot;server.js&quot;</span>]</span>\n</code></pre>\n<h3>еӣӣгҖҒдёҚеҗҢзҺҜеўғзҡ„е…ёеһӢй…ҚзҪ®е·®ејӮ</h3>\n<h4>1. <strong>ж•°жҚ®еә“й…ҚзҪ®</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// config/config.default.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">mysql</span> = {\n  <span class=\"hljs-attr\">client</span>: {\n    <span class=\"hljs-attr\">host</span>: <span class=\"hljs-string\">&#x27;127.0.0.1&#x27;</span>,\n    <span class=\"hljs-attr\">port</span>: <span class=\"hljs-string\">&#x27;3306&#x27;</span>,\n    <span class=\"hljs-attr\">user</span>: <span class=\"hljs-string\">&#x27;root&#x27;</span>,\n    <span class=\"hljs-attr\">password</span>: <span class=\"hljs-string\">&#x27;password&#x27;</span>,\n    <span class=\"hljs-attr\">database</span>: <span class=\"hljs-string\">&#x27;app_dev&#x27;</span>,\n  },\n};\n\n<span class=\"hljs-comment\">// config/config.prod.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">mysql</span> = {\n  <span class=\"hljs-attr\">client</span>: {\n    <span class=\"hljs-attr\">host</span>: <span class=\"hljs-string\">&#x27;prod-db.example.com&#x27;</span>,\n    <span class=\"hljs-attr\">password</span>: <span class=\"hljs-string\">&#x27;prod-password&#x27;</span>,  <span class=\"hljs-comment\">// з”ҹдә§зҺҜеўғеҜҶз Ғ</span>\n    <span class=\"hljs-attr\">database</span>: <span class=\"hljs-string\">&#x27;app_prod&#x27;</span>,\n  },\n};\n</code></pre>\n<h4>2. <strong>ж—Ҙеҝ—й…ҚзҪ®</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// config/config.local.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">logger</span> = {\n  <span class=\"hljs-attr\">consoleLevel</span>: <span class=\"hljs-string\">&#x27;DEBUG&#x27;</span>,  <span class=\"hljs-comment\">// ејҖеҸ‘зҺҜеўғиҫ“еҮәиҜҰз»Ҷж—Ҙеҝ—</span>\n  <span class=\"hljs-attr\">dir</span>: path.<span class=\"hljs-title function_\">join</span>(appInfo.<span class=\"hljs-property\">root</span>, <span class=\"hljs-string\">&#x27;logs&#x27;</span>),\n};\n\n<span class=\"hljs-comment\">// config/config.prod.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">logger</span> = {\n  <span class=\"hljs-attr\">consoleLevel</span>: <span class=\"hljs-string\">&#x27;WARN&#x27;</span>,   <span class=\"hljs-comment\">// з”ҹдә§зҺҜеўғеҸӘиҫ“еҮәиӯҰе‘Ҡд»ҘдёҠзә§еҲ«</span>\n  <span class=\"hljs-attr\">dir</span>: <span class=\"hljs-string\">&#x27;/mnt/logs/egg-app&#x27;</span>,\n};\n</code></pre>\n<h4>3. <strong>зј“еӯҳй…ҚзҪ®</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// config/config.local.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">cache</span> = {\n  <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">&#x27;memory&#x27;</span>,  <span class=\"hljs-comment\">// ејҖеҸ‘зҺҜеўғдҪҝз”ЁеҶ…еӯҳзј“еӯҳ</span>\n};\n\n<span class=\"hljs-comment\">// config/config.prod.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">cache</span> = {\n  <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">&#x27;redis&#x27;</span>,   <span class=\"hljs-comment\">// з”ҹдә§зҺҜеўғдҪҝз”Ё Redis</span>\n  <span class=\"hljs-attr\">host</span>: <span class=\"hljs-string\">&#x27;redis.prod.example.com&#x27;</span>,\n};\n</code></pre>\n<h3>дә”гҖҒиҮӘе®ҡд№үзҺҜеўғй…ҚзҪ®</h3>\n<h4>1. <strong>ж·»еҠ иҮӘе®ҡд№үзҺҜеўғ</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// config/config.uat.js (UAT жөӢиҜ•зҺҜеўғ)</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">redis</span> = {\n  <span class=\"hljs-attr\">host</span>: <span class=\"hljs-string\">&#x27;uat-redis.example.com&#x27;</span>,\n};\n\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">logger</span> = {\n  <span class=\"hljs-attr\">dir</span>: <span class=\"hljs-string\">&#x27;/data/logs/egg-uat&#x27;</span>,\n};\n</code></pre>\n<h4>2. <strong>и®ҫзҪ®иҮӘе®ҡд№үзҺҜеўғеҸҳйҮҸ</strong></h4>\n<pre><code class=\"language-sh\">EGG_SERVER_ENV=uat node server.js\n</code></pre>\n<h3>е…ӯгҖҒеёёи§Ғй—®йўҳдёҺжңҖдҪіе®һи·ө</h3>\n<h4>1. <strong>зҺҜеўғеҸҳйҮҸдёҺ NODE_ENV зҡ„е…ізі»</strong></h4>\n<ul>\n<li><code>NODE_ENV</code>пјҡз”ұ Node.js е®ҡд№үпјҢдё»иҰҒеҪұе“Қз¬¬дёүж–№еә“зҡ„иЎҢдёәпјҲеҰӮ ExpressгҖҒReactпјү</li>\n<li><code>EGG_SERVER_ENV</code>пјҡз”ұ Egg.js е®ҡд№үпјҢдё“й—ЁжҺ§еҲ¶й…ҚзҪ®еҠ иҪҪйҖ»иҫ‘</li>\n<li><strong>е»әи®®з»„еҗҲдҪҝз”Ё</strong>  пјҡ<pre><code class=\"language-sh\">NODE_ENV=production EGG_SERVER_ENV=prod node server.js\n</code></pre>\n</li>\n</ul>\n<h4>2. <strong>ж•Ҹж„ҹдҝЎжҒҜз®ЎзҗҶ</strong></h4>\n<ul>\n<li>з”ҹдә§зҺҜеўғеҜҶз Ғзӯүж•Ҹж„ҹдҝЎжҒҜдёҚеә”зЎ¬зј–з ҒеңЁй…ҚзҪ®ж–Үд»¶дёӯ</li>\n<li><strong>жҺЁиҚҗж–№жЎҲ</strong>  пјҡ<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// config/config.prod.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">mysql</span> = {\n  <span class=\"hljs-attr\">client</span>: {\n    <span class=\"hljs-attr\">password</span>: process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DB_PASSWORD</span>,  <span class=\"hljs-comment\">// д»ҺзҺҜеўғеҸҳйҮҸиҺ·еҸ–</span>\n  },\n};\n</code></pre>\n</li>\n</ul>\n<h4>3. <strong>зҺҜеўғзү№е®ҡд»Јз ҒйҖ»иҫ‘</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// еңЁд»Јз ҒдёӯиҺ·еҸ–еҪ“еүҚзҺҜеўғ</span>\n<span class=\"hljs-keyword\">const</span> isProd = app.<span class=\"hljs-property\">config</span>.<span class=\"hljs-property\">env</span> === <span class=\"hljs-string\">&#x27;prod&#x27;</span>;\n\n<span class=\"hljs-keyword\">if</span> (isProd) {\n  <span class=\"hljs-comment\">// з”ҹдә§зҺҜеўғйҖ»иҫ‘</span>\n  app.<span class=\"hljs-title function_\">use</span>(sentryMiddleware);\n} <span class=\"hljs-keyword\">else</span> {\n  <span class=\"hljs-comment\">// ејҖеҸ‘зҺҜеўғйҖ»иҫ‘</span>\n  app.<span class=\"hljs-title function_\">use</span>(debugMiddleware);\n}\n</code></pre>\n<h4>4. <strong>зҺҜеўғй…ҚзҪ®йӘҢиҜҒ</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// еңЁ app.js дёӯйӘҢиҜҒе…ій”®й…ҚзҪ®</span>\n<span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-property\">exports</span> = <span class=\"hljs-function\"><span class=\"hljs-params\">app</span> =&gt;</span> {\n  <span class=\"hljs-keyword\">if</span> (app.<span class=\"hljs-property\">config</span>.<span class=\"hljs-property\">env</span> === <span class=\"hljs-string\">&#x27;prod&#x27;</span>) {\n    <span class=\"hljs-title function_\">assert</span>(app.<span class=\"hljs-property\">config</span>.<span class=\"hljs-property\">redis</span>.<span class=\"hljs-property\">host</span>, <span class=\"hljs-string\">&#x27;з”ҹдә§зҺҜеўғеҝ…йЎ»й…ҚзҪ® Redis ең°еқҖ&#x27;</span>);\n    <span class=\"hljs-title function_\">assert</span>(app.<span class=\"hljs-property\">config</span>.<span class=\"hljs-property\">mysql</span>.<span class=\"hljs-property\">client</span>.<span class=\"hljs-property\">password</span>, <span class=\"hljs-string\">&#x27;з”ҹдә§зҺҜеўғеҝ…йЎ»й…ҚзҪ® MySQL еҜҶз Ғ&#x27;</span>);\n  }\n};\n</code></pre>\n<h3>дёғгҖҒжҖ»з»“</h3>\n<p><code>EGG_SERVER_ENV</code> жҳҜ Egg.js зҺҜеўғз®ЎзҗҶзҡ„ж ёеҝғжңәеҲ¶пјҢйҖҡиҝҮеҗҲзҗҶй…ҚзҪ®е’ҢдҪҝз”ЁпјҢеҸҜд»Ҙе®һзҺ°пјҡ</p>\n<ol>\n<li><strong>зҺҜеўғйҡ”зҰ»</strong>  пјҡејҖеҸ‘гҖҒжөӢиҜ•гҖҒз”ҹдә§зҺҜеўғй…ҚзҪ®еҲҶзҰ»</li>\n<li><strong>е®үе…Ёеўһејә</strong>  пјҡж•Ҹж„ҹдҝЎжҒҜдёҺд»Јз ҒеҲҶзҰ»</li>\n<li><strong>йғЁзҪІз®ҖеҢ–</strong>  пјҡйҖҡиҝҮзҺҜеўғеҸҳйҮҸеҝ«йҖҹеҲҮжҚўй…ҚзҪ®</li>\n<li><strong>й”ҷиҜҜйў„йҳІ</strong>  пјҡзҺҜеўғзү№е®ҡйӘҢиҜҒйҖ»иҫ‘йҒҝе…Қй…ҚзҪ®й”ҷиҜҜ</li>\n</ol>\n<p>е»әи®®ејҖеҸ‘иҖ…дёҘж јйҒөеҫӘ Egg.js зҡ„зҺҜеўғз®ЎзҗҶи§„иҢғпјҢдёәдёҚеҗҢзҺҜеўғеҲӣе»әдё“й—Ёзҡ„й…ҚзҪ®ж–Үд»¶пјҢе№¶йҖҡиҝҮзҺҜеўғеҸҳйҮҸжҺ§еҲ¶еә”з”ЁиҝҗиЎҢжЁЎејҸгҖӮ</p>\n</div>";
      </script></body></html>
