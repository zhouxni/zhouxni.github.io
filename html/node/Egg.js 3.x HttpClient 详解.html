<script>
            document.getElementById('article').innerHTML = 
            "<div><h2>一、HttpClient 简介</h2>\n<p>Egg.js 内置了基于 <a href=\"https://github.com/node-modules/urllib\">urllib</a> 的高性能 HttpClient，具有以下特点：</p>\n<ul>\n<li>内置 Promise 支持</li>\n<li>请求/响应拦截</li>\n<li>自动处理 JSON 格式</li>\n<li>超时重试机制</li>\n<li>DNS 缓存</li>\n<li>完善的错误处理</li>\n</ul>\n<h2>二、基本使用方式</h2>\n<h3>1. 通过 app 使用</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 在 service/controller 中使用</span>\n<span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">app</span>.<span class=\"hljs-title function_\">curl</span>(url, options);\n</code></pre>\n<h3>2. 通过 ctx 使用（推荐）</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 在 controller 中使用</span>\n<span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">ctx</span>.<span class=\"hljs-title function_\">curl</span>(url, options);\n</code></pre>\n<h2>三、核心 API</h2>\n<h3>1. 基本请求方法</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// GET 请求</span>\n<span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> ctx.<span class=\"hljs-title function_\">curl</span>(<span class=\"hljs-string\">&#x27;https://example.com/api/users&#x27;</span>, {\n  <span class=\"hljs-attr\">dataType</span>: <span class=\"hljs-string\">&#x27;json&#x27;</span> <span class=\"hljs-comment\">// 自动解析响应为 JSON</span>\n});\n\n<span class=\"hljs-comment\">// POST 请求</span>\n<span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> ctx.<span class=\"hljs-title function_\">curl</span>(<span class=\"hljs-string\">&#x27;https://example.com/api/users&#x27;</span>, {\n  <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">&#x27;POST&#x27;</span>,\n  <span class=\"hljs-attr\">contentType</span>: <span class=\"hljs-string\">&#x27;json&#x27;</span>, <span class=\"hljs-comment\">// 声明发送 JSON</span>\n  <span class=\"hljs-attr\">data</span>: {\n    <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&#x27;egg&#x27;</span>,\n    <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">&#x27;framework&#x27;</span>\n  },\n  <span class=\"hljs-attr\">dataType</span>: <span class=\"hljs-string\">&#x27;json&#x27;</span>\n});\n\n<span class=\"hljs-comment\">// PUT/DELETE 等其他方法类似</span>\n</code></pre>\n<h3>2. 响应结构</h3>\n<pre><code class=\"language-javascript\">{\n  <span class=\"hljs-attr\">status</span>: <span class=\"hljs-number\">200</span>,           <span class=\"hljs-comment\">// HTTP 状态码</span>\n  <span class=\"hljs-attr\">headers</span>: {},           <span class=\"hljs-comment\">// 响应头</span>\n  <span class=\"hljs-attr\">data</span>: {},              <span class=\"hljs-comment\">// 响应体（根据 dataType 处理后的数据）</span>\n  <span class=\"hljs-attr\">res</span>: {}                <span class=\"hljs-comment\">// 原始响应对象</span>\n}\n</code></pre>\n<h2>四、高级配置</h2>\n<h3>1. 全局配置</h3>\n<p>在 <code>config/config.default.js</code> 中：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">httpclient</span> = {\n  <span class=\"hljs-comment\">// 默认超时时间</span>\n  <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">3000</span>,\n  \n  <span class=\"hljs-comment\">// 请求重试次数</span>\n  <span class=\"hljs-attr\">retry</span>: <span class=\"hljs-number\">2</span>,\n  \n  <span class=\"hljs-comment\">// 是否在开发环境下缓存 DNS</span>\n  <span class=\"hljs-attr\">dnsCache</span>: <span class=\"hljs-literal\">true</span>,\n  \n  <span class=\"hljs-comment\">// 请求拦截器</span>\n  <span class=\"hljs-attr\">requestInterceptor</span>: <span class=\"hljs-function\"><span class=\"hljs-params\">req</span> =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(req.<span class=\"hljs-property\">url</span>);\n    <span class=\"hljs-keyword\">return</span> req;\n  },\n  \n  <span class=\"hljs-comment\">// 响应拦截器</span>\n  <span class=\"hljs-attr\">responseInterceptor</span>: <span class=\"hljs-function\"><span class=\"hljs-params\">resp</span> =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (resp.<span class=\"hljs-property\">status</span> !== <span class=\"hljs-number\">200</span>) {\n      <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">&#x27;request error&#x27;</span>);\n    }\n    <span class=\"hljs-keyword\">return</span> resp;\n  }\n};\n</code></pre>\n<h3>2. 请求级别配置</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> ctx.<span class=\"hljs-title function_\">curl</span>(url, {\n  <span class=\"hljs-comment\">// 超时时间（毫秒）</span>\n  <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">5000</span>,\n  \n  <span class=\"hljs-comment\">// 重试次数</span>\n  <span class=\"hljs-attr\">retries</span>: <span class=\"hljs-number\">3</span>,\n  \n  <span class=\"hljs-comment\">// 请求头</span>\n  <span class=\"hljs-attr\">headers</span>: {\n    <span class=\"hljs-string\">&#x27;X-Request-Id&#x27;</span>: <span class=\"hljs-string\">&#x27;12345&#x27;</span>\n  },\n  \n  <span class=\"hljs-comment\">// 查询参数</span>\n  <span class=\"hljs-attr\">data</span>: {\n    <span class=\"hljs-attr\">page</span>: <span class=\"hljs-number\">1</span>,\n    <span class=\"hljs-attr\">size</span>: <span class=\"hljs-number\">10</span>\n  },\n  \n  <span class=\"hljs-comment\">// 请求内容类型</span>\n  <span class=\"hljs-attr\">contentType</span>: <span class=\"hljs-string\">&#x27;json&#x27;</span>, <span class=\"hljs-comment\">// 可选：json, form, text 等</span>\n  \n  <span class=\"hljs-comment\">// 响应数据类型</span>\n  <span class=\"hljs-attr\">dataType</span>: <span class=\"hljs-string\">&#x27;json&#x27;</span>,   <span class=\"hljs-comment\">// 可选：json, text, buffer 等</span>\n  \n  <span class=\"hljs-comment\">// 是否自动处理 302 跳转</span>\n  <span class=\"hljs-attr\">followRedirect</span>: <span class=\"hljs-literal\">true</span>,\n  \n  <span class=\"hljs-comment\">// 是否自动处理 gzip 响应</span>\n  <span class=\"hljs-attr\">gzip</span>: <span class=\"hljs-literal\">true</span>,\n  \n  <span class=\"hljs-comment\">// 请求跟踪（用于日志）</span>\n  <span class=\"hljs-attr\">timing</span>: <span class=\"hljs-literal\">true</span>\n});\n</code></pre>\n<h2>五、最佳实践</h2>\n<h3>1. 封装 Service 层</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// app/service/http.js</span>\n<span class=\"hljs-keyword\">const</span> { <span class=\"hljs-title class_\">Service</span> } = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;egg&#x27;</span>);\n\n<span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">HttpService</span> <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-title class_ inherited__\">Service</span> {\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">request</span>(<span class=\"hljs-params\">url, options = {}</span>) {\n    <span class=\"hljs-keyword\">const</span> { ctx } = <span class=\"hljs-variable language_\">this</span>;\n    \n    <span class=\"hljs-keyword\">const</span> defaultOptions = {\n      <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">3000</span>,\n      <span class=\"hljs-attr\">dataType</span>: <span class=\"hljs-string\">&#x27;json&#x27;</span>,\n      <span class=\"hljs-attr\">headers</span>: {\n        <span class=\"hljs-string\">&#x27;X-Request-Id&#x27;</span>: ctx.<span class=\"hljs-property\">traceId</span>\n      }\n    };\n    \n    <span class=\"hljs-keyword\">const</span> mergedOptions = <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">assign</span>({}, defaultOptions, options);\n    \n    <span class=\"hljs-keyword\">try</span> {\n      <span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> ctx.<span class=\"hljs-title function_\">curl</span>(url, mergedOptions);\n      <span class=\"hljs-keyword\">return</span> result.<span class=\"hljs-property\">data</span>;\n    } <span class=\"hljs-keyword\">catch</span> (err) {\n      ctx.<span class=\"hljs-property\">logger</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;HttpClient request error&#x27;</span>, err);\n      <span class=\"hljs-keyword\">throw</span> err;\n    }\n  }\n}\n\n<span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-property\">exports</span> = <span class=\"hljs-title class_\">HttpService</span>;\n\n<span class=\"hljs-comment\">// 使用示例</span>\n<span class=\"hljs-keyword\">const</span> data = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">service</span>.<span class=\"hljs-property\">http</span>.<span class=\"hljs-title function_\">request</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/users&#x27;</span>);\n</code></pre>\n<h3>2. 错误处理</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">try</span> {\n  <span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> ctx.<span class=\"hljs-title function_\">curl</span>(url, options);\n  \n  <span class=\"hljs-keyword\">if</span> (result.<span class=\"hljs-property\">status</span> !== <span class=\"hljs-number\">200</span>) {\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Request failed with status code <span class=\"hljs-subst\">${result.status}</span>`</span>);\n  }\n  \n  <span class=\"hljs-keyword\">return</span> result.<span class=\"hljs-property\">data</span>;\n} <span class=\"hljs-keyword\">catch</span> (err) {\n  ctx.<span class=\"hljs-property\">logger</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;HttpClient error&#x27;</span>, err);\n  \n  <span class=\"hljs-comment\">// 根据错误类型处理</span>\n  <span class=\"hljs-keyword\">if</span> (err.<span class=\"hljs-property\">code</span> === <span class=\"hljs-string\">&#x27;ECONNREFUSED&#x27;</span>) {\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">&#x27;服务不可用&#x27;</span>);\n  }\n  \n  <span class=\"hljs-keyword\">throw</span> err;\n}\n</code></pre>\n<h3>3. 文件上传</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> ctx.<span class=\"hljs-title function_\">curl</span>(url, {\n  <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">&#x27;POST&#x27;</span>,\n  <span class=\"hljs-attr\">files</span>: {\n    <span class=\"hljs-attr\">file</span>: <span class=\"hljs-string\">&#x27;/path/to/file.jpg&#x27;</span> <span class=\"hljs-comment\">// 文件路径</span>\n  },\n  <span class=\"hljs-attr\">data</span>: {\n    <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">&#x27;test file&#x27;</span>\n  },\n  <span class=\"hljs-attr\">dataType</span>: <span class=\"hljs-string\">&#x27;json&#x27;</span>\n});\n</code></pre>\n<h3>4. 文件下载</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> ctx.<span class=\"hljs-title function_\">curl</span>(url, {\n  <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">&#x27;GET&#x27;</span>,\n  <span class=\"hljs-attr\">dataType</span>: <span class=\"hljs-string\">&#x27;stream&#x27;</span> <span class=\"hljs-comment\">// 获取文件流</span>\n});\n\n<span class=\"hljs-comment\">// 保存文件</span>\n<span class=\"hljs-keyword\">const</span> writeStream = fs.<span class=\"hljs-title function_\">createWriteStream</span>(<span class=\"hljs-string\">&#x27;/path/to/save&#x27;</span>);\nresult.<span class=\"hljs-property\">data</span>.<span class=\"hljs-title function_\">pipe</span>(writeStream);\n</code></pre>\n<h2>六、性能优化</h2>\n<h3>1. 连接池配置</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">httpclient</span> = {\n  <span class=\"hljs-comment\">// 每个 host 的最大连接数</span>\n  <span class=\"hljs-attr\">maxSockets</span>: <span class=\"hljs-number\">100</span>,\n  \n  <span class=\"hljs-comment\">// 每个 host 的最大空闲连接数</span>\n  <span class=\"hljs-attr\">maxFreeSockets</span>: <span class=\"hljs-number\">10</span>,\n  \n  <span class=\"hljs-comment\">// 空闲连接超时时间（毫秒）</span>\n  <span class=\"hljs-attr\">freeSocketTimeout</span>: <span class=\"hljs-number\">4000</span>\n};\n</code></pre>\n<h3>2. DNS 缓存</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">httpclient</span> = {\n  <span class=\"hljs-comment\">// 启用 DNS 缓存</span>\n  <span class=\"hljs-attr\">dnsCache</span>: <span class=\"hljs-literal\">true</span>,\n  \n  <span class=\"hljs-comment\">// DNS 缓存时间（毫秒）</span>\n  <span class=\"hljs-attr\">dnsCacheLookupInterval</span>: <span class=\"hljs-number\">10000</span>\n};\n</code></pre>\n<h2>七、常见问题</h2>\n<h3>1. 代理配置</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> ctx.<span class=\"hljs-title function_\">curl</span>(url, {\n  <span class=\"hljs-comment\">// 通过环境变量配置代理</span>\n  <span class=\"hljs-attr\">enableProxy</span>: <span class=\"hljs-literal\">true</span>,\n  \n  <span class=\"hljs-comment\">// 或直接指定代理</span>\n  <span class=\"hljs-attr\">proxy</span>: <span class=\"hljs-string\">&#x27;http://proxy.server.com:8080&#x27;</span>\n});\n</code></pre>\n<h3>2. HTTPS 证书问题</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> ctx.<span class=\"hljs-title function_\">curl</span>(url, {\n  <span class=\"hljs-comment\">// 忽略证书错误（不推荐生产环境使用）</span>\n  <span class=\"hljs-attr\">rejectUnauthorized</span>: <span class=\"hljs-literal\">false</span>,\n  \n  <span class=\"hljs-comment\">// 或指定 CA 证书</span>\n  <span class=\"hljs-attr\">ca</span>: fs.<span class=\"hljs-title function_\">readFileSync</span>(<span class=\"hljs-string\">&#x27;/path/to/ca.crt&#x27;</span>)\n});\n</code></pre>\n<h3>3. 大文件上传</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> form = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">FormStream</span>();\nform.<span class=\"hljs-title function_\">file</span>(<span class=\"hljs-string\">&#x27;file&#x27;</span>, <span class=\"hljs-string\">&#x27;/path/to/large-file.zip&#x27;</span>, {\n  <span class=\"hljs-attr\">filename</span>: <span class=\"hljs-string\">&#x27;upload.zip&#x27;</span>\n});\n\n<span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> ctx.<span class=\"hljs-title function_\">curl</span>(url, {\n  <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">&#x27;POST&#x27;</span>,\n  <span class=\"hljs-attr\">headers</span>: form.<span class=\"hljs-title function_\">headers</span>(),\n  <span class=\"hljs-attr\">stream</span>: form,\n  <span class=\"hljs-attr\">dataType</span>: <span class=\"hljs-string\">&#x27;json&#x27;</span>\n});\n</code></pre>\n<p>通过以上配置和使用方法，你可以在 Egg.js 中高效、可靠地使用 HttpClient 进行各种 HTTP 请求操作。</p>\n</div>";
          </script></body></html>
