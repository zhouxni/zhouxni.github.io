  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
            document.getElementById('article').innerHTML = 
            "<div><p>Egg.js 3.x 提供了全面的安全机制来保护应用免受常见 Web 攻击。以下是 Egg.js 3.x 的主要安全配置详解：</p>\n<h2>1. 内置安全插件</h2>\n<p>Egg.js 内置了 <code>egg-security</code> 插件，默认开启，提供以下安全防护：</p>\n<h3>1.1 CSRF 防护</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// config/config.default.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">security</span> = {\n  <span class=\"hljs-attr\">csrf</span>: {\n    <span class=\"hljs-attr\">enable</span>: <span class=\"hljs-literal\">true</span>, <span class=\"hljs-comment\">// 默认开启</span>\n    <span class=\"hljs-attr\">ignoreJSON</span>: <span class=\"hljs-literal\">false</span>, <span class=\"hljs-comment\">// 是否忽略 JSON 请求</span>\n    <span class=\"hljs-attr\">cookieName</span>: <span class=\"hljs-string\">&#x27;csrfToken&#x27;</span>, <span class=\"hljs-comment\">// Cookie 名称</span>\n    <span class=\"hljs-attr\">sessionName</span>: <span class=\"hljs-string\">&#x27;csrfToken&#x27;</span>, <span class=\"hljs-comment\">// Session 名称</span>\n    <span class=\"hljs-attr\">headerName</span>: <span class=\"hljs-string\">&#x27;x-csrf-token&#x27;</span>, <span class=\"hljs-comment\">// 请求头名称</span>\n    <span class=\"hljs-attr\">bodyName</span>: <span class=\"hljs-string\">&#x27;_csrf&#x27;</span>, <span class=\"hljs-comment\">// body 参数名称</span>\n    <span class=\"hljs-attr\">queryName</span>: <span class=\"hljs-string\">&#x27;_csrf&#x27;</span>, <span class=\"hljs-comment\">// query 参数名称</span>\n    <span class=\"hljs-comment\">// 白名单，配置后这些路径不会进行 CSRF 校验</span>\n    <span class=\"hljs-attr\">ignore</span>: [\n      <span class=\"hljs-string\">&#x27;/api/xxx&#x27;</span>,\n    ],\n  },\n};\n</code></pre>\n<h3>1.2 XSS 防护</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">security</span> = {\n  <span class=\"hljs-attr\">xssProtection</span>: {\n    <span class=\"hljs-attr\">enable</span>: <span class=\"hljs-literal\">true</span>, <span class=\"hljs-comment\">// 默认开启</span>\n    <span class=\"hljs-attr\">value</span>: <span class=\"hljs-string\">&#x27;1; mode=block&#x27;</span>, <span class=\"hljs-comment\">// XSS 防护模式</span>\n  },\n};\n</code></pre>\n<h3>1.3 其他 HTTP 头安全设置</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">security</span> = {\n  <span class=\"hljs-comment\">// 禁用 iframe 嵌入</span>\n  <span class=\"hljs-attr\">xframe</span>: {\n    <span class=\"hljs-attr\">enable</span>: <span class=\"hljs-literal\">true</span>,\n    <span class=\"hljs-attr\">value</span>: <span class=\"hljs-string\">&#x27;SAMEORIGIN&#x27;</span>,\n  },\n  \n  <span class=\"hljs-comment\">// 禁止 MIME 类型嗅探</span>\n  <span class=\"hljs-attr\">noSniff</span>: {\n    <span class=\"hljs-attr\">enable</span>: <span class=\"hljs-literal\">true</span>,\n  },\n  \n  <span class=\"hljs-comment\">// HSTS 安全传输</span>\n  <span class=\"hljs-attr\">hsts</span>: {\n    <span class=\"hljs-attr\">enable</span>: <span class=\"hljs-literal\">false</span>, <span class=\"hljs-comment\">// 默认关闭，HTTPS 站点建议开启</span>\n    <span class=\"hljs-attr\">maxAge</span>: <span class=\"hljs-number\">365</span> * <span class=\"hljs-number\">24</span> * <span class=\"hljs-number\">3600</span>,\n    <span class=\"hljs-attr\">includeSubdomains</span>: <span class=\"hljs-literal\">false</span>,\n  },\n  \n  <span class=\"hljs-comment\">// 禁用浏览器缓存敏感页面</span>\n  <span class=\"hljs-attr\">noCache</span>: {\n    <span class=\"hljs-attr\">enable</span>: <span class=\"hljs-literal\">false</span>, <span class=\"hljs-comment\">// 默认关闭</span>\n  },\n  \n  <span class=\"hljs-comment\">// 内容安全策略 CSP</span>\n  <span class=\"hljs-attr\">csp</span>: {\n    <span class=\"hljs-attr\">enable</span>: <span class=\"hljs-literal\">false</span>, <span class=\"hljs-comment\">// 默认关闭</span>\n    <span class=\"hljs-attr\">policy</span>: {\n      <span class=\"hljs-comment\">// &#x27;default-src&#x27;: &quot;&#x27;self&#x27;&quot;,</span>\n      <span class=\"hljs-comment\">// &#x27;script-src&#x27;: &quot;&#x27;self&#x27; &#x27;unsafe-inline&#x27; &#x27;unsafe-eval&#x27;&quot;,</span>\n      <span class=\"hljs-comment\">// ...</span>\n    }\n  },\n};\n</code></pre>\n<h2>2. 安全中间件</h2>\n<h3>2.1 安全头部中间件</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// config/config.default.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">middleware</span> = [<span class=\"hljs-string\">&#x27;securities&#x27;</span>];\n</code></pre>\n<h3>2.2 请求频率限制</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// config/config.default.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">ratelimiter</span> = {\n  <span class=\"hljs-attr\">enable</span>: <span class=\"hljs-literal\">true</span>,\n  <span class=\"hljs-attr\">client</span>: {\n    <span class=\"hljs-comment\">// 限制每个 IP 每分钟最多 60 个请求</span>\n    <span class=\"hljs-attr\">max</span>: <span class=\"hljs-number\">60</span>,\n    <span class=\"hljs-attr\">duration</span>: <span class=\"hljs-number\">60000</span>,\n  },\n};\n</code></pre>\n<h2>3. 安全实践</h2>\n<h3>3.1 输入验证</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 使用 egg-validate 插件</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">validate</span> = {\n  <span class=\"hljs-comment\">// convert: false,</span>\n  <span class=\"hljs-comment\">// validateRoot: false,</span>\n};\n</code></pre>\n<h3>3.2 SQL 注入防护</h3>\n<ul>\n<li>使用框架提供的 ORM（如 egg-sequelize）或 Query Builder</li>\n<li>避免直接拼接 SQL 语句</li>\n</ul>\n<h3>3.3 密码安全</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 使用 bcrypt 加密密码</span>\n<span class=\"hljs-keyword\">const</span> bcrypt = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;bcrypt&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> saltRounds = <span class=\"hljs-number\">10</span>;\n\n<span class=\"hljs-comment\">// 加密</span>\n<span class=\"hljs-keyword\">const</span> hash = <span class=\"hljs-keyword\">await</span> bcrypt.<span class=\"hljs-title function_\">hash</span>(password, saltRounds);\n\n<span class=\"hljs-comment\">// 验证</span>\n<span class=\"hljs-keyword\">const</span> match = <span class=\"hljs-keyword\">await</span> bcrypt.<span class=\"hljs-title function_\">compare</span>(password, hash);\n</code></pre>\n<h3>3.4 会话安全</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// config/config.default.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">session</span> = {\n  <span class=\"hljs-attr\">key</span>: <span class=\"hljs-string\">&#x27;EGG_SESS&#x27;</span>,\n  <span class=\"hljs-attr\">maxAge</span>: <span class=\"hljs-number\">24</span> * <span class=\"hljs-number\">3600</span> * <span class=\"hljs-number\">1000</span>, <span class=\"hljs-comment\">// 1 天</span>\n  <span class=\"hljs-attr\">httpOnly</span>: <span class=\"hljs-literal\">true</span>,\n  <span class=\"hljs-attr\">encrypt</span>: <span class=\"hljs-literal\">true</span>,\n  <span class=\"hljs-attr\">renew</span>: <span class=\"hljs-literal\">true</span>, <span class=\"hljs-comment\">// 每次访问会话时延长会话有效期</span>\n};\n</code></pre>\n<h2>4. 生产环境安全建议</h2>\n<ol>\n<li><strong>HTTPS</strong>  ：始终使用 HTTPS</li>\n<li><strong>敏感信息</strong>  ：不要将敏感信息（如密码、API密钥）提交到代码仓库</li>\n<li><strong>依赖安全</strong>  ：定期检查依赖项的安全漏洞（使用 <code>npm audit</code>）</li>\n<li><strong>错误处理</strong>  ：生产环境不要暴露详细的错误信息</li>\n<li><strong>日志管理</strong>  ：记录安全相关事件</li>\n<li><strong>CORS</strong>  ：合理配置跨域资源共享</li>\n</ol>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// config/config.default.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">cors</span> = {\n  <span class=\"hljs-attr\">origin</span>: <span class=\"hljs-string\">&#x27;https://yourdomain.com&#x27;</span>, <span class=\"hljs-comment\">// 限制允许的源</span>\n  <span class=\"hljs-attr\">allowMethods</span>: <span class=\"hljs-string\">&#x27;GET,HEAD,PUT,POST,DELETE,PATCH&#x27;</span>,\n  <span class=\"hljs-attr\">credentials</span>: <span class=\"hljs-literal\">true</span>, <span class=\"hljs-comment\">// 允许携带凭证</span>\n};\n</code></pre>\n<h2>5. 自定义安全中间件</h2>\n<p>可以创建自定义中间件来处理特定安全需求：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// app/middleware/security.js</span>\n<span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-property\">exports</span> = <span class=\"hljs-function\">(<span class=\"hljs-params\">options, app</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">securityMiddleware</span>(<span class=\"hljs-params\">ctx, next</span>) {\n    <span class=\"hljs-comment\">// 安全检查逻辑</span>\n    <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-comment\">/* 不安全条件 */</span>) {\n      ctx.<span class=\"hljs-keyword\">throw</span>(<span class=\"hljs-number\">403</span>, <span class=\"hljs-string\">&#x27;Forbidden&#x27;</span>);\n    }\n    <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">next</span>();\n  };\n};\n\n<span class=\"hljs-comment\">// config/config.default.js</span>\n<span class=\"hljs-built_in\">exports</span>.<span class=\"hljs-property\">middleware</span> = [<span class=\"hljs-string\">&#x27;securities&#x27;</span>, <span class=\"hljs-string\">&#x27;security&#x27;</span>];\n</code></pre>\n<p>通过合理配置这些安全选项，可以大大提高 Egg.js 应用的安全性。</p>\n</div>";
          </script></body></html>
