<script>
        document.getElementById('article').innerHTML = 
        "<div><p>Nginx 不仅可以作为 Web 服务器，还可以作为 <strong>反向代理</strong>   和 <strong>负载均衡器</strong>  ，将客户端请求分发到多个后端服务器，提高系统的 <strong>高可用性</strong>   和 <strong>性能</strong>  。</p>\n<hr>\n<h2><strong>1. 负载均衡的基本概念</strong></h2>\n<h3><strong>1.1 什么是负载均衡？</strong></h3>\n<p>负载均衡（Load Balancing）是指将客户端请求 <strong>均匀分发</strong>   到多个服务器，避免单个服务器过载，提高系统的 <strong>吞吐量</strong>   和 <strong>容错能力</strong>  。</p>\n<h3><strong>1.2 负载均衡的作用</strong></h3>\n<ul>\n<li><strong>提高性能</strong>  ：分散请求，避免单台服务器压力过大。</li>\n<li><strong>高可用性</strong>  ：如果某台服务器宕机，Nginx 会自动将请求转发到其他健康的服务器。</li>\n<li><strong>可扩展性</strong>  ：可以动态增加或减少后端服务器。</li>\n</ul>\n<hr>\n<h2><strong>2. Nginx 负载均衡的配置</strong></h2>\n<p>Nginx 通过 <code>upstream</code> 模块实现负载均衡，支持多种 <strong>负载均衡策略</strong>  。</p>\n<h3><strong>2.1 基本配置</strong></h3>\n<p>在 <code>nginx.conf</code> 或某个虚拟主机配置文件中添加：</p>\n<pre><code class=\"language-nginx\"><span class=\"hljs-section\">http</span> {\n    <span class=\"hljs-section\">upstream</span> backend {\n        <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.100:8080</span>;\n        <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.101:8080</span>;\n        <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.102:8080</span>;\n    }\n\n    <span class=\"hljs-section\">server</span> {\n        <span class=\"hljs-attribute\">listen</span> <span class=\"hljs-number\">80</span>;\n        <span class=\"hljs-attribute\">server_name</span> example.com;\n\n        <span class=\"hljs-section\">location</span> / {\n            <span class=\"hljs-attribute\">proxy_pass</span> http://backend;\n            <span class=\"hljs-attribute\">proxy_set_header</span> Host <span class=\"hljs-variable\">$host</span>;\n            <span class=\"hljs-attribute\">proxy_set_header</span> X-Real-IP <span class=\"hljs-variable\">$remote_addr</span>;\n        }\n    }\n}\n</code></pre>\n<ul>\n<li><code>upstream backend</code>：定义一组后端服务器。</li>\n<li><code>proxy_pass http://backend</code>：将请求转发到 <code>backend</code> 服务器组。</li>\n</ul>\n<hr>\n<h2><strong>3. 负载均衡策略</strong></h2>\n<p>Nginx 支持多种负载均衡算法：</p>\n<h3><strong>3.1 轮询（Round Robin，默认）</strong></h3>\n<p>请求按顺序依次分配到各个服务器：</p>\n<pre><code class=\"language-nginx\"><span class=\"hljs-section\">upstream</span> backend {\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.100:8080</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.101:8080</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.102:8080</span>;\n}\n</code></pre>\n<h3><strong>3.2 加权轮询（Weighted Round Robin）</strong></h3>\n<p>给不同的服务器分配不同的权重，权重越高，分配的请求越多：</p>\n<pre><code class=\"language-nginx\"><span class=\"hljs-section\">upstream</span> backend {\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.100:8080</span> weight=<span class=\"hljs-number\">3</span>;  <span class=\"hljs-comment\"># 3倍请求</span>\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.101:8080</span> weight=<span class=\"hljs-number\">2</span>;  <span class=\"hljs-comment\"># 2倍请求</span>\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.102:8080</span> weight=<span class=\"hljs-number\">1</span>;  <span class=\"hljs-comment\"># 1倍请求</span>\n}\n</code></pre>\n<h3><strong>3.3 IP 哈希（IP Hash）</strong></h3>\n<p>基于客户端 IP 计算哈希值，确保同一 IP 的请求始终访问同一台服务器（适用于 Session 保持）：</p>\n<pre><code class=\"language-nginx\"><span class=\"hljs-section\">upstream</span> backend {\n    ip_hash;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.100:8080</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.101:8080</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.102:8080</span>;\n}\n</code></pre>\n<h3><strong>3.4 最少连接（Least Connections）</strong></h3>\n<p>优先将请求分配给当前连接数最少的服务器：</p>\n<pre><code class=\"language-nginx\"><span class=\"hljs-section\">upstream</span> backend {\n    least_conn;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.100:8080</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.101:8080</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.102:8080</span>;\n}\n</code></pre>\n<h3><strong>3.5 随机（Random）</strong></h3>\n<p>随机选择一个服务器：</p>\n<pre><code class=\"language-nginx\"><span class=\"hljs-section\">upstream</span> backend {\n    random;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.100:8080</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.101:8080</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.102:8080</span>;\n}\n</code></pre>\n<hr>\n<h2><strong>4. 健康检查</strong></h2>\n<p>Nginx 可以检测后端服务器是否可用，自动剔除故障节点。</p>\n<h3><strong>4.1 被动健康检查</strong></h3>\n<p>如果请求失败，Nginx 会暂时标记该服务器为不可用：</p>\n<pre><code class=\"language-nginx\"><span class=\"hljs-section\">upstream</span> backend {\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.100:8080</span> max_fails=<span class=\"hljs-number\">3</span> fail_timeout=<span class=\"hljs-number\">30s</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.101:8080</span> max_fails=<span class=\"hljs-number\">3</span> fail_timeout=<span class=\"hljs-number\">30s</span>;\n}\n</code></pre>\n<ul>\n<li><code>max_fails=3</code>：允许失败 3 次。</li>\n<li><code>fail_timeout=30s</code>：30 秒后重新尝试。</li>\n</ul>\n<h3><strong>4.2 主动健康检查（Nginx Plus 支持）</strong></h3>\n<p>Nginx Plus（商业版）支持主动探测后端服务器：</p>\n<pre><code class=\"language-nginx\"><span class=\"hljs-section\">upstream</span> backend {\n    <span class=\"hljs-attribute\">zone</span> backend <span class=\"hljs-number\">64k</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.100:8080</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.101:8080</span>;\n\n    <span class=\"hljs-attribute\">health_check</span> interval=<span class=\"hljs-number\">5s</span> uri=/health_check;\n}\n</code></pre>\n<hr>\n<h2><strong>5. 高级配置</strong></h2>\n<h3><strong>5.1 长连接优化</strong></h3>\n<p>减少 TCP 连接开销：</p>\n<pre><code class=\"language-nginx\"><span class=\"hljs-section\">upstream</span> backend {\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.100:8080</span>;\n    <span class=\"hljs-attribute\">server</span> <span class=\"hljs-number\">192.168.1.101:8080</span>;\n    <span class=\"hljs-attribute\">keepalive</span> <span class=\"hljs-number\">32</span>;  <span class=\"hljs-comment\"># 保持 32 个长连接</span>\n}\n\n<span class=\"hljs-section\">server</span> {\n    <span class=\"hljs-section\">location</span> / {\n        <span class=\"hljs-attribute\">proxy_pass</span> http://backend;\n        <span class=\"hljs-attribute\">proxy_http_version</span> <span class=\"hljs-number\">1</span>.<span class=\"hljs-number\">1</span>;\n        <span class=\"hljs-attribute\">proxy_set_header</span> Connection <span class=\"hljs-string\">&quot;&quot;</span>;\n    }\n}\n</code></pre>\n<h3><strong>5.2 缓存优化</strong></h3>\n<p>缓存静态资源，减少后端压力：</p>\n<pre><code class=\"language-nginx\"><span class=\"hljs-attribute\">proxy_cache_path</span> /var/cache/nginx levels=<span class=\"hljs-number\">1</span>:<span class=\"hljs-number\">2</span> keys_zone=my_cache:<span class=\"hljs-number\">10m</span> inactive=<span class=\"hljs-number\">60m</span>;\n\n<span class=\"hljs-section\">server</span> {\n    <span class=\"hljs-section\">location</span> / {\n        <span class=\"hljs-attribute\">proxy_cache</span> my_cache;\n        <span class=\"hljs-attribute\">proxy_pass</span> http://backend;\n    }\n}\n</code></pre>\n<hr>\n<h2><strong>6. 总结</strong></h2>\n<table>\n<thead>\n<tr>\n<th>功能</th>\n<th>配置方式</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>基本负载均衡</strong></td>\n<td><code>upstream</code> + <code>proxy_pass</code></td>\n</tr>\n<tr>\n<td><strong>轮询</strong></td>\n<td>默认</td>\n</tr>\n<tr>\n<td><strong>加权轮询</strong></td>\n<td><code>weight=3</code></td>\n</tr>\n<tr>\n<td><strong>IP 哈希</strong></td>\n<td><code>ip_hash</code></td>\n</tr>\n<tr>\n<td><strong>最少连接</strong></td>\n<td><code>least_conn</code></td>\n</tr>\n<tr>\n<td><strong>健康检查</strong></td>\n<td><code>max_fails</code> + <code>fail_timeout</code></td>\n</tr>\n<tr>\n<td><strong>长连接优化</strong></td>\n<td><code>keepalive</code></td>\n</tr>\n<tr>\n<td><strong>缓存优化</strong></td>\n<td><code>proxy_cache</code></td>\n</tr>\n</tbody>\n</table>\n<p>Nginx 负载均衡功能强大，适用于 <strong>高并发、高可用</strong>   的 Web 服务架构。</p>\n</div>";
      </script></body></html>
