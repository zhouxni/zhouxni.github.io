<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="redis 作用",document.getElementById("article").innerHTML="<div><p>Redis 是一个高性能的 <strong>内存数据库</strong>  ，广泛应用于缓存、数据存储、消息队列等场景。它的核心作用可以总结为以下几点：</p>\n<hr>\n<h2><strong>1. 缓存（Cache）</strong></h2>\n<h3><strong>作用</strong>  ：</h3>\n<ul>\n<li><strong>加速数据访问</strong>  ：将热点数据存储在内存中，减少对数据库（如 MySQL、PostgreSQL）的查询压力。</li>\n<li><strong>降低延迟</strong>  ：内存读写速度远高于磁盘，适合高并发场景（如电商秒杀、社交动态）。</li>\n</ul>\n<h3><strong>典型场景</strong>  ：</h3>\n<ul>\n<li><strong>数据库查询缓存</strong>  ：缓存用户信息、商品详情等。</li>\n<li><strong>页面静态化</strong>  ：存储 HTML 片段或 API 响应，减少重复计算。</li>\n</ul>\n<hr>\n<h2><strong>2. 会话管理（Session Storage）</strong></h2>\n<h3><strong>作用</strong>  ：</h3>\n<ul>\n<li><strong>分布式会话存储</strong>  ：在微服务或集群环境中，替代本地 Session，实现多服务器共享登录状态。</li>\n<li><strong>快速身份验证</strong>  ：存储 JWT Token 或 Session ID，减少数据库查询。</li>\n</ul>\n<h3><strong>典型场景</strong>  ：</h3>\n<ul>\n<li>用户登录状态管理（如电商、社交 App）。</li>\n<li>单点登录（SSO）系统。</li>\n</ul>\n<hr>\n<h2><strong>3. 分布式锁（Distributed Lock）</strong></h2>\n<h3><strong>作用</strong>  ：</h3>\n<ul>\n<li><strong>防止并发冲突</strong>  ：在分布式系统中，确保同一时间只有一个进程能执行关键操作（如库存扣减）。</li>\n<li><strong>限流防刷</strong>  ：控制 API 调用频率（如短信验证码防刷）。</li>\n</ul>\n<h3><strong>典型实现</strong>  ：</h3>\n<ul>\n<li><code>SETNX</code>（SET if Not eXists）+ 过期时间。</li>\n<li>Redlock 算法（Redis 官方推荐的分布式锁方案）。</li>\n</ul>\n<h3><strong>典型场景</strong>  ：</h3>\n<ul>\n<li>秒杀库存控制。</li>\n<li>定时任务防重复执行。</li>\n</ul>\n<hr>\n<h2><strong>4. 消息队列（Message Queue）</strong></h2>\n<h3><strong>作用</strong>  ：</h3>\n<ul>\n<li><strong>异步任务处理</strong>  ：解耦系统，提高吞吐量（如发送邮件、日志记录）。</li>\n<li><strong>事件驱动架构</strong>  ：实现 Pub/Sub（发布-订阅）模式。</li>\n</ul>\n<h3><strong>典型实现</strong>  ：</h3>\n<ul>\n<li><code>List</code>（LPUSH/RPOP 实现简单队列）。</li>\n<li><code>Stream</code>（类似 Kafka 的消息流，支持消费者组）。</li>\n</ul>\n<h3><strong>典型场景</strong>  ：</h3>\n<ul>\n<li>订单支付后的异步通知。</li>\n<li>实时聊天消息推送。</li>\n</ul>\n<hr>\n<h2><strong>5. 实时数据存储（Real-time Data）</strong></h2>\n<h3><strong>作用</strong>  ：</h3>\n<ul>\n<li><strong>存储频繁变化的数据</strong>  ：如排行榜、计数器、实时在线用户列表。</li>\n<li><strong>支持复杂查询</strong>  ：通过 <code>Sorted Set</code>（ZSET）实现 Top N 查询。</li>\n</ul>\n<h3><strong>典型场景</strong>  ：</h3>\n<ul>\n<li>游戏排行榜（如玩家积分 Top 100）。</li>\n<li>实时在线用户统计。</li>\n</ul>\n<hr>\n<h2><strong>6. 数据库缓冲（Write-Behind Cache）</strong></h2>\n<h3><strong>作用</strong>  ：</h3>\n<ul>\n<li><strong>缓解数据库写入压力</strong>  ：先写入 Redis，再异步同步到数据库。</li>\n<li><strong>提高写入性能</strong>  ：适用于写入密集但实时性要求不高的场景（如日志、用户行为数据）。</li>\n</ul>\n<h3><strong>典型场景</strong>  ：</h3>\n<ul>\n<li>用户行为日志（如点击、浏览记录）。</li>\n<li>高并发写入场景（如微博点赞）。</li>\n</ul>\n<hr>\n<h2><strong>7. 地理空间索引（Geospatial Indexing）</strong></h2>\n<h3><strong>作用</strong>  ：</h3>\n<ul>\n<li><strong>存储和查询地理位置数据</strong>  ：如附近的人、商家推荐。</li>\n<li><strong>高效计算距离</strong>  ：使用 <code>GEOADD</code>、<code>GEORADIUS</code> 等命令。</li>\n</ul>\n<h3><strong>典型场景</strong>  ：</h3>\n<ul>\n<li>外卖/打车 App 的“附近商家”功能。</li>\n<li>社交 App 的“附近好友”推荐。</li>\n</ul>\n<hr>\n<h2><strong>8. 限流与速率控制（Rate Limiting）</strong></h2>\n<h3><strong>作用</strong>  ：</h3>\n<ul>\n<li><strong>防止 API 滥用</strong>  ：限制用户或 IP 的请求频率（如 1 秒最多 10 次）。</li>\n<li><strong>保护后端服务</strong>  ：避免突发流量击垮系统。</li>\n</ul>\n<h3><strong>典型实现</strong>  ：</h3>\n<ul>\n<li><code>INCR</code> + <code>EXPIRE</code>（基于计数器的限流）。</li>\n<li>令牌桶算法（Token Bucket）。</li>\n</ul>\n<h3><strong>典型场景</strong>  ：</h3>\n<ul>\n<li>短信验证码防刷。</li>\n<li>API 网关限流。</li>\n</ul>\n<hr>\n<h2><strong>总结</strong></h2>\n<table>\n<thead>\n<tr>\n<th><strong>作用</strong></th>\n<th><strong>典型场景</strong></th>\n<th><strong>Redis 数据结构</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>缓存</strong></td>\n<td>热点数据加速访问</td>\n<td>String, Hash</td>\n</tr>\n<tr>\n<td><strong>会话管理</strong></td>\n<td>分布式登录状态</td>\n<td>String</td>\n</tr>\n<tr>\n<td><strong>分布式锁</strong></td>\n<td>秒杀、防并发</td>\n<td>String (SETNX)</td>\n</tr>\n<tr>\n<td><strong>消息队列</strong></td>\n<td>异步任务、事件通知</td>\n<td>List, Stream</td>\n</tr>\n<tr>\n<td><strong>实时数据存储</strong></td>\n<td>排行榜、计数器</td>\n<td>Sorted Set (ZSET)</td>\n</tr>\n<tr>\n<td><strong>数据库缓冲</strong></td>\n<td>高并发写入缓冲</td>\n<td>String, List</td>\n</tr>\n<tr>\n<td><strong>地理空间索引</strong></td>\n<td>附近的人、商家推荐</td>\n<td>GEO (Geospatial)</td>\n</tr>\n<tr>\n<td><strong>限流</strong></td>\n<td>API 防刷、流量控制</td>\n<td>String (INCR)</td>\n</tr>\n</tbody>\n</table>\n<p>Redis 的核心优势在于 <strong>高性能（内存存储）</strong>   和 <strong>丰富的数据结构</strong>  ，使其成为现代分布式系统中的 <strong>“瑞士军刀”</strong>  ，适用于缓存、会话、消息、锁等多种场景。</p>\n</div>"</script></body></html>
