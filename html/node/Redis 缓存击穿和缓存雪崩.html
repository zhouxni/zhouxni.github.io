<script>
            document.getElementById('article').innerHTML = 
            "<div><p>在高并发场景下，Redis 缓存的稳定性对系统性能至关重要。缓存击穿和缓存雪崩是两种常见的缓存失效问题，虽然名称相似，但产生原因和解决方案有所不同。</p>\n<h3>一、缓存击穿（Cache Breakdown）</h3>\n<p><strong>定义</strong>  ：<br>\n指某个<strong>热点 key</strong>   在缓存中过期或失效的瞬间，大量并发请求同时访问该 key，这些请求直接穿透缓存访问数据库，导致数据库压力骤增，甚至可能引发数据库崩溃。</p>\n<p><strong>特点</strong>  ：</p>\n<ul>\n<li><strong>针对单个热点 key</strong>  ：通常是某个非常热门的数据（如秒杀商品、热门文章）。</li>\n<li><strong>时效性</strong>  ：发生在 key 过期的瞬间。</li>\n<li><strong>并发量大</strong>  ：大量请求同时访问该 key。</li>\n</ul>\n<p><strong>解决方案</strong>  ：</p>\n<ol>\n<li><strong>永不过期</strong>  ：<br>\n对热点 key 设置为永不过期（或超长过期时间），通过后台任务异步更新缓存。<pre><code class=\"language-python\"><span class=\"hljs-comment\"># 示例：设置热点 key 永不过期，定期异步更新</span>\n<span class=\"hljs-keyword\">def</span> <span class=\"hljs-title function_\">update_hot_key</span>():\n    data = db.query(<span class=\"hljs-string\">&quot;SELECT * FROM hot_data&quot;</span>)\n    redis.<span class=\"hljs-built_in\">set</span>(<span class=\"hljs-string\">&quot;hot_key&quot;</span>, data)\n    <span class=\"hljs-comment\"># 设置定时任务，每小时更新一次</span>\n    schedule.every(<span class=\"hljs-number\">1</span>).hours.do(update_hot_key)\n</code></pre>\n</li>\n<li><strong>互斥锁（Mutex）</strong>  ：<br>\n当发现缓存失效时，先获取分布式锁，只有拿到锁的请求才能访问数据库并更新缓存，其他请求等待。<pre><code class=\"language-java\"><span class=\"hljs-comment\">// 示例：使用 Redis 分布式锁解决缓存击穿</span>\n<span class=\"hljs-keyword\">public</span> String <span class=\"hljs-title function_\">getHotData</span><span class=\"hljs-params\">(String key)</span> {\n    <span class=\"hljs-type\">String</span> <span class=\"hljs-variable\">value</span> <span class=\"hljs-operator\">=</span> redis.get(key);\n    <span class=\"hljs-keyword\">if</span> (value == <span class=\"hljs-literal\">null</span>) {\n        <span class=\"hljs-comment\">// 获取分布式锁</span>\n        <span class=\"hljs-keyword\">if</span> (redis.setnx(<span class=\"hljs-string\">&quot;lock:&quot;</span> + key, <span class=\"hljs-string\">&quot;1&quot;</span>, <span class=\"hljs-number\">30</span>)) { \n            <span class=\"hljs-keyword\">try</span> {\n                value = db.query(key);\n                redis.set(key, value, <span class=\"hljs-number\">3600</span>); <span class=\"hljs-comment\">// 设置缓存</span>\n            } <span class=\"hljs-keyword\">finally</span> {\n                redis.del(<span class=\"hljs-string\">&quot;lock:&quot;</span> + key); <span class=\"hljs-comment\">// 释放锁</span>\n            }\n        } <span class=\"hljs-keyword\">else</span> {\n            Thread.sleep(<span class=\"hljs-number\">100</span>); <span class=\"hljs-comment\">// 等待重试</span>\n            <span class=\"hljs-keyword\">return</span> getHotData(key);\n        }\n    }\n    <span class=\"hljs-keyword\">return</span> value;\n}\n</code></pre>\n</li>\n<li><strong>限流熔断</strong>  ：<br>\n对访问热点 key 的请求进行限流或熔断，避免过多请求压垮数据库。</li>\n</ol>\n<h3>二、缓存雪崩（Cache Avalanche）</h3>\n<p><strong>定义</strong>  ：<br>\n指<strong>大量缓存 key 在同一时间集中过期</strong>  ，或 Redis 服务发生故障，导致大量请求直接访问数据库，引发数据库压力激增甚至崩溃。</p>\n<p><strong>特点</strong>  ：</p>\n<ul>\n<li><strong>范围广</strong>  ：涉及大量缓存 key 同时失效。</li>\n<li><strong>突发性</strong>  ：可能在某个时间点集中发生。</li>\n<li><strong>连锁反应</strong>  ：数据库压力过大可能导致整个系统崩溃。</li>\n</ul>\n<p><strong>解决方案</strong>  ：</p>\n<ol>\n<li><strong>随机过期时间</strong>  ：<br>\n为不同 key 的过期时间添加随机偏移量，避免集中过期。<pre><code class=\"language-python\"><span class=\"hljs-comment\"># 示例：设置随机过期时间（60 分钟 ± 10 分钟）</span>\n<span class=\"hljs-keyword\">import</span> random\n\n<span class=\"hljs-keyword\">def</span> <span class=\"hljs-title function_\">set_cache</span>(<span class=\"hljs-params\">key, value</span>):\n    expire_time = <span class=\"hljs-number\">3600</span> + random.randint(-<span class=\"hljs-number\">600</span>, <span class=\"hljs-number\">600</span>)  <span class=\"hljs-comment\"># 30-50 分钟</span>\n    redis.<span class=\"hljs-built_in\">set</span>(key, value, expire_time)\n</code></pre>\n</li>\n<li><strong>多级缓存</strong>  ：<br>\n使用多级缓存（如本地缓存 + Redis），当 Redis 失效时，先访问本地缓存。<pre><code class=\"language-java\"><span class=\"hljs-comment\">// 示例：Caffeine 本地缓存 + Redis</span>\n<span class=\"hljs-keyword\">private</span> LoadingCache&lt;String, String&gt; localCache = Caffeine.newBuilder()\n    .maximumSize(<span class=\"hljs-number\">1000</span>)\n    .expireAfterWrite(<span class=\"hljs-number\">10</span>, TimeUnit.MINUTES)\n    .build(key -&gt; {\n        <span class=\"hljs-type\">String</span> <span class=\"hljs-variable\">value</span> <span class=\"hljs-operator\">=</span> redis.get(key);\n        <span class=\"hljs-keyword\">if</span> (value == <span class=\"hljs-literal\">null</span>) {\n            value = db.query(key);\n            redis.set(key, value, <span class=\"hljs-number\">3600</span>);\n        }\n        <span class=\"hljs-keyword\">return</span> value;\n    });\n\n<span class=\"hljs-keyword\">public</span> String <span class=\"hljs-title function_\">getData</span><span class=\"hljs-params\">(String key)</span> {\n    <span class=\"hljs-keyword\">return</span> localCache.get(key);\n}\n</code></pre>\n</li>\n<li><strong>Redis 高可用</strong>  ：<br>\n部署 Redis 集群或哨兵模式，避免单点故障导致的缓存雪崩。</li>\n<li><strong>服务降级与熔断</strong>  ：<br>\n当检测到数据库压力过大时，部分请求进行降级处理（如返回默认值），或开启熔断机制暂时拒绝请求。</li>\n</ol>\n<h3>三、缓存击穿 vs 缓存雪崩</h3>\n<table>\n<thead>\n<tr>\n<th><strong>对比项</strong></th>\n<th><strong>缓存击穿</strong></th>\n<th><strong>缓存雪崩</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>失效对象</strong></td>\n<td>单个热点 key</td>\n<td>大量缓存 key 或整个 Redis</td>\n</tr>\n<tr>\n<td><strong>原因</strong></td>\n<td>热点 key 过期或失效</td>\n<td>集中过期或 Redis 故障</td>\n</tr>\n<tr>\n<td><strong>影响范围</strong></td>\n<td>局部（仅该热点 key）</td>\n<td>全局（整个系统）</td>\n</tr>\n<tr>\n<td><strong>解决方案</strong></td>\n<td>互斥锁、永不过期、限流</td>\n<td>随机过期、多级缓存、高可用</td>\n</tr>\n</tbody>\n</table>\n<h3>四、总结</h3>\n<ul>\n<li><strong>缓存击穿</strong>  ：聚焦于<strong>单个热点 key</strong>   的保护，通过锁机制或永不过期避免穿透。</li>\n<li><strong>缓存雪崩</strong>  ：关注<strong>整体缓存系统</strong>  的稳定性，通过分散过期时间、多级缓存和高可用架构来应对。</li>\n</ul>\n<p>实际应用中，需根据业务场景综合使用上述策略，确保 Redis 缓存系统在高并发下的可靠性。</p>\n</div>";
          </script></body></html>
