<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Whistle 根证书配置",document.getElementById("article").innerHTML="<div><p>这是Whistle中用于下载根证书的界面，下载和安装该根证书，是为了让Whistle能够解析和调试HTTPS请求。以下是具体使用步骤：</p>\n<h3>下载根证书</h3>\n<ul>\n<li><strong>点击下载</strong>   ：直接点击界面中链接地址右侧的下载图标（通常是一个向下的箭头 ），即可将 <code>rootCA.cer</code> 文件下载到本地指定位置，比如下载到电脑的“下载”文件夹。如果你想通过手机等移动设备调试HTTPS请求，也可以使用移动设备的扫码功能，扫描该二维码，在移动设备上完成证书下载。</li>\n</ul>\n<h3>安装根证书</h3>\n<h4>在Windows系统中安装</h4>\n<ol>\n<li><strong>找到证书文件</strong>   ：打开下载证书的文件夹，找到 <code>rootCA.cer</code> 文件。</li>\n<li><strong>双击证书文件</strong>   ：系统会弹出证书导入向导，点击“下一步”。</li>\n<li><strong>选择存储位置</strong>   ：选择“将所有的证书放入下列存储”，然后点击“浏览”，在弹出的窗口中选择“受信任的根证书颁发机构”，点击“确定”后再点击“下一步” 。</li>\n<li><strong>完成安装</strong>   ：确认信息无误后，点击“完成”，系统可能会提示你证书安装成功。</li>\n</ol>\n<h4>在macOS系统中安装</h4>\n<ol>\n<li><strong>找到证书文件</strong>   ：前往下载文件夹，双击 <code>rootCA.cer</code> 文件，证书会自动添加到“钥匙串访问”应用中。</li>\n<li><strong>打开“钥匙串访问”</strong>   ：在“应用程序 - 实用工具”中找到“钥匙串访问”并打开。</li>\n<li><strong>设置证书信任</strong>   ：在“钥匙串访问”左侧栏选择“系统”，在右侧找到刚添加的Whistle根证书，双击它，在弹出的证书信息窗口中，展开“信任”选项，将“使用此证书时”设置为“始终信任” 。</li>\n</ol>\n<h4>在浏览器中安装（以Chrome为例 ）</h4>\n<ol>\n<li><strong>进入设置</strong>   ：点击浏览器右上角的三点菜单，选择“设置”。</li>\n<li><strong>找到安全设置</strong>   ：在设置中搜索“安全”，点击“管理证书”。</li>\n<li><strong>导入证书</strong>   ：在弹出的“证书”窗口中，切换到“受信任的根证书颁发机构”选项卡，点击“导入”，按照提示找到下载的 <code>rootCA.cer</code> 文件并完成导入。</li>\n</ol>\n<h3>确认证书安装成功</h3>\n<p>完成证书安装后，回到Whistle控制台，确保“Enable HTTPS (Capture Tunnel Traffic)”选项处于勾选状态。此时，访问HTTPS网站，在Whistle的“Network”选项卡中，应该就能看到并解析HTTPS请求的详细内容了。</p>\n</div>"</script></body></html>
