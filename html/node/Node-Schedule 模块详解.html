<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Node-Schedule жЁЎеқ—иҜҰи§Ј",document.getElementById("article").innerHTML='<div><h1>Node-Schedule жЁЎеқ—иҜҰи§Ј</h1>\n<p>Node-Schedule жҳҜ Node.js дёӯдёҖдёӘеҠҹиғҪејәеӨ§зҡ„е®ҡж—¶д»»еҠЎи°ғеәҰжЁЎеқ—пјҢе®ғжҸҗдҫӣдәҶжҜ”еҺҹз”ҹ <code>setTimeout</code> е’Ң <code>setInterval</code> жӣҙзҒөжҙ»гҖҒжӣҙејәеӨ§зҡ„е®ҡж—¶еҠҹиғҪгҖӮ</p>\n<h2>е®үиЈ…</h2>\n<pre><code class="language-bash">npm install node-schedule\n</code></pre>\n<h2>еҹәжң¬з”Ёжі•</h2>\n<h3>1. дҪҝз”Ё Cron йЈҺж јиҜӯжі•</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> schedule = <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;node-schedule&quot;</span>);\n\n<span class="hljs-comment">// жҜҸеҲҶй’ҹзҡ„з¬¬30з§’жү§иЎҢ</span>\n<span class="hljs-keyword">const</span> job = schedule.<span class="hljs-title function_">scheduleJob</span>(<span class="hljs-string">&quot;30 * * * * *&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;жҜҸеҲҶй’ҹзҡ„з¬¬30з§’жү§иЎҢ:&quot;</span>, <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>());\n});\n\n<span class="hljs-comment">// жҜҸеӨ©зҡ„12:00жү§иЎҢ</span>\n<span class="hljs-keyword">const</span> dailyJob = schedule.<span class="hljs-title function_">scheduleJob</span>(<span class="hljs-string">&quot;0 12 * * *&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;жҜҸеӨ©дёӯеҚҲ12зӮ№жү§иЎҢ:&quot;</span>, <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>());\n});\n</code></pre>\n<h3>2. дҪҝз”Ё Date еҜ№иұЎжҢҮе®ҡе…·дҪ“ж—¶й—ҙ</h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// еңЁ2023е№ҙ12жңҲ25ж—Ҙ00:00жү§иЎҢ</span>\n<span class="hljs-keyword">const</span> christmas = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>(<span class="hljs-number">2023</span>, <span class="hljs-number">11</span>, <span class="hljs-number">25</span>, <span class="hljs-number">0</span>, <span class="hljs-number">0</span>, <span class="hljs-number">0</span>);\nschedule.<span class="hljs-title function_">scheduleJob</span>(christmas, <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;еңЈиҜһеҝ«д№җпјҒ&quot;</span>, <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>());\n});\n</code></pre>\n<h3>3. дҪҝз”Ё RecurrenceRule еҜ№иұЎ</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> rule = <span class="hljs-keyword">new</span> schedule.<span class="hljs-title class_">RecurrenceRule</span>();\nrule.<span class="hljs-property">hour</span> = <span class="hljs-number">14</span>; <span class="hljs-comment">// жҜҸеӨ©14зӮ№</span>\nrule.<span class="hljs-property">minute</span> = <span class="hljs-number">30</span>; <span class="hljs-comment">// 30еҲҶ</span>\nrule.<span class="hljs-property">dayOfWeek</span> = [<span class="hljs-keyword">new</span> schedule.<span class="hljs-title class_">Range</span>(<span class="hljs-number">1</span>, <span class="hljs-number">5</span>)]; <span class="hljs-comment">// е‘ЁдёҖеҲ°е‘Ёдә”</span>\n\n<span class="hljs-keyword">const</span> weekdayJob = schedule.<span class="hljs-title function_">scheduleJob</span>(rule, <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;е·ҘдҪңж—Ҙ14:30жү§иЎҢ:&quot;</span>, <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>());\n});\n</code></pre>\n<h2>Cron иЎЁиҫҫејҸиҜӯжі•</h2>\n<p>Node-Schedule дҪҝз”Ёзұ»дјј cron зҡ„иҜӯжі•пјҢдҪҶжңү6дёӘеӯ—ж®өпјҲз§’зә§зІҫеәҰпјүпјҡ</p>\n<pre><code>*    *    *    *    *    *\nв”¬    в”¬    в”¬    в”¬    в”¬    в”¬\nв”Ӯ    в”Ӯ    в”Ӯ    в”Ӯ    в”Ӯ    в”Ӯ\nв”Ӯ    в”Ӯ    в”Ӯ    в”Ӯ    в”Ӯ    в”” жҳҹжңҹеҮ  (0 - 7) (0е’Ң7йғҪд»ЈиЎЁе‘Ёж—Ҙ)\nв”Ӯ    в”Ӯ    в”Ӯ    в”Ӯ    в””в”Җв”Җв”Җв”Җв”Җ жңҲд»Ҫ (1 - 12)\nв”Ӯ    в”Ӯ    в”Ӯ    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ ж—Ҙ (1 - 31)\nв”Ӯ    в”Ӯ    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ е°Ҹж—¶ (0 - 23)\nв”Ӯ    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ еҲҶй’ҹ (0 - 59)\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ з§’ (0 - 59)\n</code></pre>\n<h2>й«ҳзә§еҠҹиғҪ</h2>\n<h3>1. еҸ–ж¶Ҳд»»еҠЎ</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> job = schedule.<span class="hljs-title function_">scheduleJob</span>(<span class="hljs-string">&quot;*/5 * * * * *&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;жҜҸ5з§’жү§иЎҢдёҖж¬Ў&quot;</span>);\n});\n\n<span class="hljs-comment">// 10з§’еҗҺеҸ–ж¶Ҳд»»еҠЎ</span>\n<span class="hljs-built_in">setTimeout</span>(<span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  job.<span class="hljs-title function_">cancel</span>();\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;д»»еҠЎе·ІеҸ–ж¶Ҳ&quot;</span>);\n}, <span class="hljs-number">10000</span>);\n</code></pre>\n<h3>2. жҹҘзңӢдёӢж¬Ўжү§иЎҢж—¶й—ҙ</h3>\n<pre><code class="language-javascript"><span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;дёӢж¬Ўжү§иЎҢж—¶й—ҙ:&quot;</span>, job.<span class="hljs-title function_">nextInvocation</span>());\n</code></pre>\n<h3>3. еҠЁжҖҒеҲӣе»әе’ҢеҸ–ж¶Ҳд»»еҠЎ</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">let</span> dynamicJob;\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">startJob</span>(<span class="hljs-params"></span>) {\n  dynamicJob = schedule.<span class="hljs-title function_">scheduleJob</span>(<span class="hljs-string">&quot;*/10 * * * * *&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;еҠЁжҖҒд»»еҠЎжү§иЎҢ:&quot;</span>, <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>());\n  });\n}\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">stopJob</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">if</span> (dynamicJob) {\n    dynamicJob.<span class="hljs-title function_">cancel</span>();\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;еҠЁжҖҒд»»еҠЎе·ІеҒңжӯў&quot;</span>);\n  }\n}\n</code></pre>\n<h3>4. дҪҝз”ЁеҜ№иұЎй…ҚзҪ®</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> jobConfig = {\n  <span class="hljs-attr">hour</span>: <span class="hljs-number">14</span>,\n  <span class="hljs-attr">minute</span>: <span class="hljs-number">30</span>,\n  <span class="hljs-attr">dayOfWeek</span>: [<span class="hljs-number">1</span>, <span class="hljs-keyword">new</span> schedule.<span class="hljs-title class_">Range</span>(<span class="hljs-number">3</span>, <span class="hljs-number">5</span>)],\n};\n\n<span class="hljs-keyword">const</span> configJob = schedule.<span class="hljs-title function_">scheduleJob</span>(jobConfig, <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;й…ҚзҪ®еҜ№иұЎж–№ејҸзҡ„д»»еҠЎжү§иЎҢ:&quot;</span>, <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>());\n});\n</code></pre>\n<h2>е®һйҷ…еә”з”ЁзӨәдҫӢ</h2>\n<h3>1. е®ҡж—¶еҸ‘йҖҒйӮ®д»¶</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> nodemailer = <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;nodemailer&quot;</span>);\n<span class="hljs-keyword">const</span> transporter = nodemailer.<span class="hljs-title function_">createTransport</span>({\n  <span class="hljs-comment">/* й…ҚзҪ® */</span>\n});\n\n<span class="hljs-comment">// жҜҸеӨ©дёҠеҚҲ9зӮ№еҸ‘йҖҒж—ҘжҠҘ</span>\nschedule.<span class="hljs-title function_">scheduleJob</span>(<span class="hljs-string">&quot;0 9 * * *&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  transporter.<span class="hljs-title function_">sendMail</span>({\n    <span class="hljs-attr">from</span>: <span class="hljs-string">&quot;report@example.com&quot;</span>,\n    <span class="hljs-attr">to</span>: <span class="hljs-string">&quot;team@example.com&quot;</span>,\n    <span class="hljs-attr">subject</span>: <span class="hljs-string">&quot;жҜҸж—ҘжҠҘе‘Ҡ - &quot;</span> + <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>().<span class="hljs-title function_">toLocaleDateString</span>(),\n    <span class="hljs-attr">text</span>: <span class="hljs-string">&quot;иҝҷйҮҢжҳҜжҜҸж—ҘжҠҘе‘ҠеҶ…е®№...&quot;</span>,\n  });\n});\n</code></pre>\n<h3>2. е®ҡж—¶ж•°жҚ®еә“еӨҮд»Ҫ</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> { exec } = <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;child_process&quot;</span>);\n\n<span class="hljs-comment">// жҜҸе‘Ёж—ҘеҮҢжҷЁ2зӮ№еӨҮд»Ҫж•°жҚ®еә“</span>\nschedule.<span class="hljs-title function_">scheduleJob</span>(<span class="hljs-string">&quot;0 2 * * 0&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> backupFile = <span class="hljs-string">`backup-<span class="hljs-subst">${<span class="hljs-keyword">new</span> <span class="hljs-built_in">Date</span>().toISOString()}</span>.sql`</span>;\n  <span class="hljs-title function_">exec</span>(<span class="hljs-string">`mysqldump -u root -p password mydb &gt; <span class="hljs-subst">${backupFile}</span>`</span>, <span class="hljs-function">(<span class="hljs-params">err</span>) =&gt;</span> {\n    <span class="hljs-keyword">if</span> (err) <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;еӨҮд»ҪеӨұиҙҘ:&quot;</span>, err);\n    <span class="hljs-keyword">else</span> <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;ж•°жҚ®еә“еӨҮд»Ҫе®ҢжҲҗ:&quot;</span>, backupFile);\n  });\n});\n</code></pre>\n<h2>жіЁж„ҸдәӢйЎ№</h2>\n<ol>\n<li>\n<p><strong>ж—¶еҢәй—®йўҳ</strong>   пјҡNode-Schedule й»ҳи®ӨдҪҝз”ЁжңҚеҠЎеҷЁжң¬ең°ж—¶й—ҙпјҢеҰӮжһңйңҖиҰҒеӨ„зҗҶж—¶еҢәпјҢеҸҜд»ҘдҪҝз”Ё <code>moment-timezone</code> зӯүеә“</p>\n</li>\n<li>\n<p><strong>й•ҝж—¶й—ҙиҝҗиЎҢ</strong>   пјҡеҜ№дәҺй•ҝж—¶й—ҙиҝҗиЎҢзҡ„еә”з”ЁпјҢзЎ®дҝқжӯЈзЎ®еӨ„зҗҶй”ҷиҜҜпјҢйҒҝе…ҚеҶ…еӯҳжі„жјҸ</p>\n</li>\n<li>\n<p><strong>йӣҶзҫӨзҺҜеўғ</strong>   пјҡеңЁеӨҡиҝӣзЁӢ/йӣҶзҫӨзҺҜеўғдёӯпјҢе®ҡж—¶д»»еҠЎеҸҜиғҪдјҡеңЁжҜҸдёӘиҝӣзЁӢдёӯйғҪжү§иЎҢпјҢйңҖиҰҒиҖғиҷ‘дҪҝз”ЁеӨ–йғЁй”ҒжҲ–дё“з”Ёи°ғеәҰжңҚеҠЎ</p>\n</li>\n<li>\n<p><strong>д»»еҠЎжү§иЎҢж—¶й—ҙ</strong>   пјҡеҰӮжһңд»»еҠЎжү§иЎҢж—¶й—ҙиҝҮй•ҝпјҢеҸҜиғҪдјҡеҪұе“ҚеҗҺз»ӯд»»еҠЎзҡ„еҮҶж—¶жү§иЎҢ</p>\n</li>\n</ol>\n<p>Node-Schedule жҸҗдҫӣдәҶејәеӨ§иҖҢзҒөжҙ»зҡ„е®ҡж—¶д»»еҠЎеҠҹиғҪпјҢйҖӮеҗҲеӨ§еӨҡж•° Node.js еә”з”Ёзҡ„е®ҡж—¶д»»еҠЎйңҖжұӮгҖӮ</p>\n</div>'</script></body></html>
