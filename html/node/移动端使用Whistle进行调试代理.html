<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="移动端使用Whistle进行调试代理",document.getElementById("article").innerHTML="<div><p>在移动端使用Whistle进行调试代理，除了像在电脑端那样配置代理和安装证书外，还有一些特定的操作步骤，以下以常见的iOS和安卓系统为例进行介绍：</p>\n<h3>iOS 系统</h3>\n<ol>\n<li><strong>配置网络代理</strong>\n<ul>\n<li>打开手机的“设置”应用，点击“无线局域网”，找到当前连接的Wi-Fi网络，点击其右侧的感叹号图标。</li>\n<li>在“HTTP代理”选项中，选择“手动”，然后在“服务器”栏输入运行Whistle的电脑的IP地址（可在电脑的网络设置中查看），“端口”输入Whistle的默认端口<code>8899</code>（如果没有修改过），点击“存储”。</li>\n</ul>\n</li>\n<li><strong>下载并安装根证书</strong>\n<ul>\n<li>打开手机的Safari浏览器，访问<code>http://127.0.0.1:8899</code>（如果是在本地局域网内，也可以使用运行Whistle电脑的局域网IP地址加上端口访问 ），进入Whistle控制台。</li>\n<li>点击“HTTPS”选项，在“Download RootCA”处，通过扫码或点击链接下载根证书。</li>\n<li>下载完成后，系统会提示已下载描述文件，前往“设置 - 已下载描述文件”，点击进入并安装证书。</li>\n<li>安装后，还需在“设置 - 通用 - 关于本机 - 证书信任设置”中，找到Whistle的根证书，开启信任。</li>\n</ul>\n</li>\n<li><strong>开始调试</strong>\n<ul>\n<li>完成上述步骤后，打开手机上需要调试的应用，相关网络请求就会经过Whistle代理。</li>\n<li>在电脑端的Whistle控制台中，切换到“Network”选项卡，就能查看和分析移动端应用产生的网络请求了。</li>\n</ul>\n</li>\n</ol>\n<h3>Android 系统</h3>\n<ol>\n<li><strong>配置网络代理</strong>\n<ul>\n<li>打开手机的“设置”，进入“Wi-Fi”设置界面，长按当前连接的Wi-Fi网络，选择“修改网络”（不同品牌手机表述可能略有不同）。</li>\n<li>在弹出的修改网络界面中，展开“高级选项”，将“代理”设置为“手动”，在“代理服务器主机名”处输入运行Whistle的电脑的IP地址，“代理服务器端口”输入<code>8899</code> ，点击“保存”。</li>\n</ul>\n</li>\n<li><strong>下载并安装根证书</strong>\n<ul>\n<li>打开手机上的浏览器（如Chrome等），访问Whistle控制台（<code>http://127.0.0.1:8899</code>或运行Whistle电脑的局域网IP地址加端口 ）。</li>\n<li>点击“HTTPS”选项，下载根证书。</li>\n<li>下载完成后，根据手机提示安装证书。不同手机安装证书的路径可能不同，常见路径如“设置 - 安全 - 从存储设备安装” 或“设置 - 系统 - 加密与凭据 - 从存储设备安装”等。按照指引完成证书安装，确保证书被系统信任。</li>\n</ul>\n</li>\n<li><strong>开始调试</strong>\n<ul>\n<li>配置和安装完成后，打开需要调试的App，其网络请求会被Whistle捕获。</li>\n<li>在电脑端的Whistle控制台“Network”选项卡中查看和处理这些请求，进行抓包、修改等调试操作。</li>\n</ul>\n</li>\n</ol>\n<h3>注意事项</h3>\n<ul>\n<li>确保手机和运行Whistle的电脑处于同一局域网内（连接同一个Wi-Fi网络 ），否则手机无法访问到Whistle服务。</li>\n<li>部分手机系统或应用可能对代理有特殊限制，比如一些银行类App出于安全考虑，可能无法在代理环境下正常工作。</li>\n<li>如果在调试过程中发现请求无法正常通过代理，可尝试关闭手机上的VPN、流量节省模式等功能，这些可能会干扰代理设置。</li>\n</ul>\n</div>"</script></body></html>
