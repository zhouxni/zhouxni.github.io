<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Whistle 完成配置后，如何调试",document.getElementById("article").innerHTML="<div><p>在 Whistle 完成配置后，可通过以下步骤进行调试：</p>\n<h3>一、基础调试流程（以抓包、查看请求响应为例）</h3>\n<ol>\n<li><strong>确认代理生效</strong><br>\n确保浏览器或系统已将代理设置为 Whistle（默认地址 <code>127.0.0.1:8899</code>）。比如在 Chrome 中，可通过「设置 - 系统 - 打开您的计算机的代理设置」来检查，确保 HTTP 和 HTTPS 代理都指向 Whistle 端口。</li>\n<li><strong>访问目标页面/接口</strong><br>\n在浏览器中访问需要调试的网页（如配置规则中涉及的 <code>https://v3.f58pk8.cc/pw/thread1022.php</code>），或发起相关接口请求。</li>\n<li><strong>在 Whistle 控制台查看</strong><br>\n打开 Whistle 控制台（<code>http://127.0.0.1:8899</code>），切换到「Network」选项卡。这里会列出所有经过代理的请求，点击具体请求，可查看请求头、响应头、请求体、响应体等详细信息，用于分析请求是否符合预期。</li>\n</ol>\n<h3>二、结合规则的调试（以转发、修改类规则为例）</h3>\n<ol>\n<li><strong>验证转发规则</strong><br>\n若配置了请求转发（如 <code>https://v3.f58pk8.cc/pw/thread1022.php localhost:3200</code>），可在本地 <code>localhost:3200</code> 启动对应服务，然后访问原地址，查看本地服务是否接收到请求，以及返回内容是否符合预期。同时在 Whistle「Network」中，可看到请求被转发的痕迹（目标地址变为 <code>localhost:3200</code> 相关）。</li>\n<li><strong>验证修改类规则</strong>\n<ul>\n<li>若配置了修改请求头/响应头，在「Network」中点击对应请求，查看「Headers」部分，确认头信息是否被修改。</li>\n<li>若配置了替换响应内容（如用本地文件或自定义内容替换接口返回），查看「Response」部分，确认返回内容是否为修改后的值。</li>\n</ul>\n</li>\n</ol>\n<h3>三、HTTPS 相关调试（若开启 HTTPS 解析）</h3>\n<ol>\n<li><strong>安装根证书</strong><br>\n若要调试 HTTPS 请求，需先在 Whistle 控制台「HTTPS」选项卡中，下载并安装 Whistle 的根证书（按照页面指引，不同系统/浏览器安装方式略有不同），确保证书被信任。</li>\n<li><strong>查看 HTTPS 请求详情</strong><br>\n完成证书安装后，HTTPS 请求也能像 HTTP 一样，在「Network」中查看完整的请求响应内容，进行抓包和修改等操作。</li>\n</ol>\n<h3>四、使用插件辅助调试（可选）</h3>\n<p>Whistle 支持丰富的插件（如 Weinre 用于前端调试、mock 插件用于模拟数据等）。以 Weinre 为例，点击界面上的「Weinre」按钮，可生成调试链接，在移动设备或其他页面中引入该链接，就能进行 DOM 检查、控制台输出查看等前端调试操作。</p>\n<p>通过以上步骤，可全面验证 Whistle 配置是否生效，并对网络请求、前端页面等进行细致调试。</p>\n</div>"</script></body></html>
