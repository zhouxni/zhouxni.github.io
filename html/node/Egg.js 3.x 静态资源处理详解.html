<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Egg.js 3.x жЮЎТђЂУхёТ║љтцёуљєУ»дУДБ",document.getElementById("article").innerHTML='<div><h2>СИђсђЂжЮЎТђЂУхёТ║љтЪ║уАђжЁЇуй«</h2>\n<p>Egg.js тєЁуй«С║єжЮЎТђЂУхёТ║љТЈњС╗Х <code>egg-static</code>№╝їж╗ўУ«цти▓у╗Јт╝ђтљ»сђѓС╗ЦСИІТў»тЪ║ТюгжЁЇуй«Тќ╣т╝Ј№╝џ</p>\n<h3>1. ж╗ўУ«цжЁЇуй«</h3>\n<p>тюе <code>config/config.default.js</code> СИГ№╝џ</p>\n<pre><code class="language-javascript"><span class="hljs-built_in">exports</span>.<span class="hljs-property">static</span> = {\n  <span class="hljs-attr">prefix</span>: <span class="hljs-string">&#x27;/public/&#x27;</span>, <span class="hljs-comment">// URL тЅЇу╝ђ</span>\n  <span class="hljs-attr">dir</span>: path.<span class="hljs-title function_">join</span>(appInfo.<span class="hljs-property">baseDir</span>, <span class="hljs-string">&#x27;app/public&#x27;</span>), <span class="hljs-comment">// жЮЎТђЂУхёТ║љуЏ«тйЋ</span>\n  <span class="hljs-attr">dynamic</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// Тў»тљдТћ»ТїЂтіеТђЂтіаУйй</span>\n  <span class="hljs-attr">preload</span>: <span class="hljs-literal">false</span>, <span class="hljs-comment">// Тў»тљджбётіаУйй</span>\n  <span class="hljs-attr">buffer</span>: <span class="hljs-literal">false</span>, <span class="hljs-comment">// Тў»тљду╝ЊтГўтѕ░тєЁтГў</span>\n  <span class="hljs-attr">maxFiles</span>: <span class="hljs-number">1000</span>, <span class="hljs-comment">// ТюђтцДТќЄС╗ХТЋ░</span>\n};\n</code></pre>\n<h3>2. уЏ«тйЋу╗ЊТъё</h3>\n<p>ж╗ўУ«цжЮЎТђЂУхёТ║љуЏ«тйЋСИ║ <code>app/public</code>№╝їСЙІтдѓ№╝џ</p>\n<pre><code>app\nРћюРћђРћђ public\nРћѓ   РћюРћђРћђ css\nРћѓ   Рћѓ   РћћРћђРћђ style.css\nРћѓ   РћюРћђРћђ js\nРћѓ   Рћѓ   РћћРћђРћђ app.js\nРћѓ   РћћРћђРћђ images\nРћѓ       РћћРћђРћђ logo.png\n</code></pre>\n<h2>С║їсђЂжФўу║ДжЁЇуй«жђЅжА╣</h2>\n<h3>1. тцџжЮЎТђЂуЏ«тйЋжЁЇуй«</h3>\n<pre><code class="language-javascript"><span class="hljs-built_in">exports</span>.<span class="hljs-property">static</span> = {\n  <span class="hljs-comment">// ж╗ўУ«цжЮЎТђЂУхёТ║љ</span>\n  {\n    <span class="hljs-attr">prefix</span>: <span class="hljs-string">&#x27;/public/&#x27;</span>,\n    <span class="hljs-attr">dir</span>: path.<span class="hljs-title function_">join</span>(appInfo.<span class="hljs-property">baseDir</span>, <span class="hljs-string">&#x27;app/public&#x27;</span>),\n  },\n  <span class="hljs-comment">// жбЮтцќжЮЎТђЂуЏ«тйЋ</span>\n  {\n    <span class="hljs-attr">prefix</span>: <span class="hljs-string">&#x27;/uploads/&#x27;</span>,\n    <span class="hljs-attr">dir</span>: path.<span class="hljs-title function_">join</span>(appInfo.<span class="hljs-property">baseDir</span>, <span class="hljs-string">&#x27;uploads&#x27;</span>),\n  }\n];\n</code></pre>\n<h3>2. у╝ЊтГўТјДтѕХ</h3>\n<pre><code class="language-javascript"><span class="hljs-built_in">exports</span>.<span class="hljs-property">static</span> = {\n  <span class="hljs-attr">maxAge</span>: <span class="hljs-number">31536000</span>, <span class="hljs-comment">// у╝ЊтГўСИђт╣┤</span>\n  <span class="hljs-attr">cacheControl</span>: <span class="hljs-string">&#x27;public, max-age=31536000&#x27;</span>, <span class="hljs-comment">// HTTP у╝ЊтГўтц┤</span>\n  <span class="hljs-attr">lastModified</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// тљ»уће Last-Modified</span>\n  <span class="hljs-attr">etag</span>: <span class="hljs-literal">true</span> <span class="hljs-comment">// тљ»уће ETag</span>\n};\n</code></pre>\n<h2>СИЅсђЂт╝ђтЈЉуј»тбЃСИјућЪС║Дуј»тбЃти«т╝ѓ</h2>\n<h3>1. т╝ђтЈЉуј»тбЃ</h3>\n<ul>\n<li>ж╗ўУ«цтљ»уће <code>dynamic</code> ТеАт╝Ј№╝їТќЄС╗ХС┐«Тћ╣С╝џт«ъТЌХућЪТЋѕ</li>\n<li>СИЇТјеУЇљт╝ђтљ» <code>buffer</code> жђЅжА╣</li>\n</ul>\n<h3>2. ућЪС║Дуј»тбЃ</h3>\n<p>ТјеУЇљжЁЇуй«№╝џ</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// config.prod.js</span>\n<span class="hljs-built_in">exports</span>.<span class="hljs-property">static</span> = {\n  <span class="hljs-attr">dynamic</span>: <span class="hljs-literal">false</span>,\n  <span class="hljs-attr">preload</span>: <span class="hljs-literal">true</span>,\n  <span class="hljs-attr">buffer</span>: <span class="hljs-literal">true</span>,\n  <span class="hljs-attr">maxAge</span>: <span class="hljs-number">31536000</span>\n};\n</code></pre>\n<h2>тЏЏсђЂТюђСй│т«ъУих</h2>\n<h3>1. тЅЇуФ»УхёТ║љТъёт╗║</h3>\n<p>ТјеУЇљСй┐уће Webpack уГЅТъёт╗║тиЦтЁи№╝їУЙЊтЄ║тѕ░жЮЎТђЂУхёТ║љуЏ«тйЋ№╝џ</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// Тъёт╗║жЁЇуй«уц║СЙІ</span>\n{\n  <span class="hljs-attr">output</span>: {\n    <span class="hljs-attr">path</span>: path.<span class="hljs-title function_">join</span>(__dirname, <span class="hljs-string">&#x27;../app/public&#x27;</span>),\n    <span class="hljs-attr">filename</span>: <span class="hljs-string">&#x27;js/[name].[chunkhash:8].js&#x27;</span>,\n    <span class="hljs-attr">publicPath</span>: <span class="hljs-string">&#x27;/public/&#x27;</span>\n  }\n}\n</code></pre>\n<h3>2. УхёТ║љуЅѕТюгТјДтѕХ</h3>\n<p>ТјеУЇљСй┐уће hash ТќЄС╗ХтљЇ№╝џ</p>\n<pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;/public/css/app.3e7a3b8a.css&quot;</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;stylesheet&quot;</span>&gt;</span>\n</code></pre>\n<h3>3. CDN жЁЇуй«</h3>\n<pre><code class="language-javascript"><span class="hljs-built_in">exports</span>.<span class="hljs-property">static</span> = {\n  <span class="hljs-attr">prefix</span>: <span class="hljs-string">&#x27;/public/&#x27;</span>,\n  <span class="hljs-attr">dir</span>: path.<span class="hljs-title function_">join</span>(appInfo.<span class="hljs-property">baseDir</span>, <span class="hljs-string">&#x27;app/public&#x27;</span>),\n  <span class="hljs-comment">// ућЪС║Дуј»тбЃжЁЇуй«CDN</span>\n  <span class="hljs-attr">dynamic</span>: <span class="hljs-literal">false</span>,\n  <span class="hljs-attr">buffer</span>: <span class="hljs-literal">true</span>,\n  <span class="hljs-comment">// УЄфт«џС╣ЅтіаУййтЄйТЋ░</span>\n  <span class="hljs-title function_">load</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-keyword">return</span> <span class="hljs-keyword">function</span>* (next) {\n      <span class="hljs-keyword">if</span> (<span class="hljs-variable language_">this</span>.<span class="hljs-property">path</span>.<span class="hljs-title function_">startsWith</span>(<span class="hljs-string">&#x27;/public/&#x27;</span>)) {\n        <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">redirect</span>(<span class="hljs-string">`https://cdn.yourdomain.com<span class="hljs-subst">${<span class="hljs-variable language_">this</span>.path}</span>`</span>)();\n        <span class="hljs-keyword">return</span>;\n      }\n      <span class="hljs-keyword">yield</span> next;\n    };\n  }\n};\n</code></pre>\n<h2>С║ћсђЂт«ЅтЁеТ│еТёЈС║ІжА╣</h2>\n<ol>\n<li><strong>уЏ«тйЋжЂЇтјєжў▓Тіц</strong>  №╝џ\n<ul>\n<li>Egg.js ти▓тєЁуй«жў▓Тіц№╝їудЂТГбУ«┐жЌ« <code>../</code> уГЅУи»тЙё</li>\n</ul>\n</li>\n<li><strong>ТЋЈТёЪТќЄС╗Х</strong>  №╝џ\n<ul>\n<li>СИЇУдЂт░єжЁЇуй«ТќЄС╗ХсђЂТ║љС╗БуаЂуГЅТћЙтюежЮЎТђЂуЏ«тйЋ</li>\n</ul>\n</li>\n<li><strong>СИіС╝аТќЄС╗Х</strong>  №╝џ\n<ul>\n<li>СИіС╝ауЏ«тйЋт║ћСИјжЮЎТђЂУхёТ║љуЏ«тйЋтѕєт╝ђ</li>\n<li>жЎљтѕХСИіС╝аТќЄС╗Ху▒╗тъІ</li>\n</ul>\n</li>\n</ol>\n<h2>тЁГсђЂУЄфт«џС╣ЅСИГжЌ┤С╗Хуц║СЙІ</h2>\n<p>тдѓТъюжюђУдЂуЅ╣Т«ітцёуљєжЮЎТђЂУхёТ║љ№╝їтЈ»С╗ЦУЄфт«џС╣ЅСИГжЌ┤С╗Х№╝џ</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// app/middleware/static.js</span>\n<span class="hljs-variable language_">module</span>.<span class="hljs-property">exports</span> = <span class="hljs-function">(<span class="hljs-params">options, app</span>) =&gt;</span> {\n  <span class="hljs-keyword">return</span> <span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">staticMiddleware</span>(<span class="hljs-params">ctx, next</span>) {\n    <span class="hljs-keyword">if</span> (ctx.<span class="hljs-property">path</span>.<span class="hljs-title function_">startsWith</span>(<span class="hljs-string">&#x27;/public/&#x27;</span>)) {\n      <span class="hljs-comment">// УЄфт«џС╣Ѕтцёуљєжђ╗УЙЉ</span>\n      <span class="hljs-keyword">if</span> (ctx.<span class="hljs-property">path</span>.<span class="hljs-title function_">endsWith</span>(<span class="hljs-string">&#x27;.js&#x27;</span>)) {\n        ctx.<span class="hljs-title function_">set</span>(<span class="hljs-string">&#x27;X-Content-Type-Options&#x27;</span>, <span class="hljs-string">&#x27;nosniff&#x27;</span>);\n      }\n    }\n    <span class="hljs-keyword">await</span> <span class="hljs-title function_">next</span>();\n  };\n};\n\n<span class="hljs-comment">// config/config.default.js</span>\n<span class="hljs-built_in">exports</span>.<span class="hljs-property">middleware</span> = [<span class="hljs-string">&#x27;static&#x27;</span>];\n</code></pre>\n<h2>СИЃсђЂтИИУДЂжЌ«жбўУДБтє│</h2>\n<h3>1. 404 жЌ«жбў</h3>\n<p>ТБђТЪЦ№╝џ</p>\n<ul>\n<li>ТќЄС╗ХТў»тљдтГўтюеС║јТГБуА«уЏ«тйЋ</li>\n<li>URL тЅЇу╝ђТў»тљдтї╣жЁЇжЁЇуй«</li>\n<li>ТќЄС╗ХТЮЃжЎљТў»тљдТГБуА«</li>\n</ul>\n<h3>2. ТђДУЃйС╝ўтїќ</h3>\n<ul>\n<li>ућЪС║Дуј»тбЃт╝ђтљ» <code>buffer</code> тњї <code>preload</code></li>\n<li>жЁЇуй«тљѕжђѓуџё <code>maxAge</code></li>\n<li>Сй┐уће CDN тіажђЪ</li>\n</ul>\n<h3>3. УиетЪЪжЌ«жбў</h3>\n<p>тдѓжюђТћ»ТїЂУиетЪЪ№╝џ</p>\n<pre><code class="language-javascript"><span class="hljs-built_in">exports</span>.<span class="hljs-property">static</span> = {\n  <span class="hljs-title function_">setHeaders</span>(<span class="hljs-params">res, path, stat</span>) {\n    res.<span class="hljs-title function_">set</span>(<span class="hljs-string">&#x27;Access-Control-Allow-Origin&#x27;</span>, <span class="hljs-string">&#x27;*&#x27;</span>);\n  }\n};\n</code></pre>\n<p>жђџУ┐ЄС╗ЦСИіжЁЇуй«тњїТюђСй│т«ъУих№╝їСйатЈ»С╗Цтюе Egg.js СИГжФўТЋѕсђЂт«ЅтЁетю░у«АуљєжЮЎТђЂУхёТ║љсђѓ</p>\n</div>'</script></body></html>
