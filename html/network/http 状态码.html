<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="http 状态码",document.getElementById("article").innerHTML="<div><p>HTTP状态码是服务器在响应客户端请求时返回的三位数字代码，用于表示请求的处理结果。以下是HTTP状态码及其含义的详细分类和说明：</p>\n<h3>一、1xx（信息性状态码）</h3>\n<ul>\n<li><strong>100 Continue</strong>  ：客户端应继续其请求。这通常用于大型请求，服务器在收到请求头后，会先返回100状态码，表示已经准备好接收请求体。</li>\n<li><strong>101 Switching Protocols</strong>  ：服务器同意切换协议，例如从HTTP切换到WebSocket。</li>\n</ul>\n<h3>二、2xx（成功状态码）</h3>\n<ul>\n<li><strong>200 OK</strong>  ：请求已成功，服务器已返回请求的数据。这是最常见的成功状态码。</li>\n<li><strong>201 Created</strong>  ：请求已成功，并且服务器已创建了新的资源。这通常用于POST请求创建新资源时。</li>\n<li><strong>202 Accepted</strong>  ：请求已接受，但尚未处理完成。这通常用于异步处理请求的场景。</li>\n<li><strong>204 No Content</strong>  ：请求已成功，但服务器没有返回任何内容。这通常用于DELETE请求删除资源时。</li>\n</ul>\n<h3>三、3xx（重定向状态码）</h3>\n<ul>\n<li><strong>301 Moved Permanently</strong>  ：请求的资源已永久移动到新位置。客户端应使用新的URL进行后续请求。</li>\n<li><strong>302 Found（或302 Moved Temporarily）</strong>  ：请求的资源临时移动到另一个位置。客户端应继续使用原URL进行后续请求，但当前请求应被重定向到新位置。</li>\n<li><strong>303 See Other</strong>  ：服务器返回此状态码，指示客户端应使用GET方法访问另一个URL来获取所需资源。这通常用于POST请求处理后的重定向。</li>\n<li><strong>304 Not Modified</strong>  ：客户端发送了条件请求（如使用If-Modified-Since头），服务器确认资源未修改，因此返回此状态码，表示客户端可以使用缓存的版本。</li>\n<li><strong>307 Temporary Redirect</strong>  ：与302类似，但要求客户端保持请求方法和请求体不变进行重定向。</li>\n<li><strong>308 Permanent Redirect</strong>  ：与301类似，但同样要求客户端保持请求方法和请求体不变进行重定向。</li>\n</ul>\n<h3>四、4xx（客户端错误状态码）</h3>\n<ul>\n<li><strong>400 Bad Request</strong>  ：客户端发送的请求有错误，服务器无法理解或处理。这通常是由于请求格式错误、参数缺失或无效等原因造成的。</li>\n<li><strong>401 Unauthorized</strong>  ：请求未经授权，客户端需要提供身份验证凭据才能访问资源。这通常与WWW-Authenticate头一起使用，指示客户端应如何进行身份验证。</li>\n<li><strong>403 Forbidden</strong>  ：服务器理解请求，但拒绝执行。这通常是由于客户端没有足够的权限访问资源造成的。</li>\n<li><strong>404 Not Found</strong>  ：请求的资源在服务器上不存在。这是最常见的客户端错误状态码之一。</li>\n<li><strong>405 Method Not Allowed</strong>  ：请求的方法（如GET、POST等）不被服务器支持或不允许用于请求的资源。</li>\n<li><strong>408 Request Timeout</strong>  ：客户端请求超时，服务器在等待请求时未收到任何响应。</li>\n<li><strong>409 Conflict</strong>  ：请求与服务器当前状态冲突，例如尝试创建已存在的资源。</li>\n<li><strong>410 Gone</strong>  ：请求的资源已永久删除，且不会再可用。与404不同，410明确表示资源曾经存在但现在已不存在。</li>\n<li><strong>413 Payload Too Large</strong>  ：请求体过大，服务器无法处理。这通常是由于客户端上传的文件过大造成的。</li>\n<li><strong>414 URI Too Long</strong>  ：请求的URI过长，服务器无法处理。</li>\n<li><strong>429 Too Many Requests</strong>  ：客户端在短时间内发送了太多请求，超出了服务器的处理能力。这通常用于限制客户端的请求频率。</li>\n</ul>\n<h3>五、5xx（服务器错误状态码）</h3>\n<ul>\n<li><strong>500 Internal Server Error</strong>  ：服务器遇到错误，无法完成请求。这通常是由于服务器内部代码错误、数据库连接失败等原因造成的。</li>\n<li><strong>501 Not Implemented</strong>  ：服务器不支持请求的功能或方法。这通常是由于服务器未实现客户端请求的功能造成的。</li>\n<li><strong>502 Bad Gateway</strong>  ：服务器作为网关或代理，从上游服务器收到无效响应。这通常是由于上游服务器出现故障或返回了错误响应造成的。</li>\n<li><strong>503 Service Unavailable</strong>  ：服务器当前无法处理请求，通常是由于服务器过载或维护造成的。客户端可以在稍后重试请求。</li>\n<li><strong>504 Gateway Timeout</strong>  ：服务器作为网关或代理，等待上游服务器响应时超时。这通常是由于上游服务器处理请求时间过长造成的。</li>\n</ul>\n<p>HTTP状态码是Web开发中不可或缺的一部分，它们帮助客户端和服务器之间进行有效的通信和错误处理。了解并正确使用HTTP状态码对于构建稳定、可靠的Web应用至关重要。</p>\n</div>"</script></body></html>
