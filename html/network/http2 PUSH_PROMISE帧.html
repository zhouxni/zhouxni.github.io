<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;

    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'http2 PUSH_PROMISE帧'
        document.getElementById('article').innerHTML = 
        "<div><p>PUSH_PROMISE帧是HTTP/2协议中用于实现服务器推送功能的关键帧。它的作用是让服务器告知客户端，即将在某个流上推送资源。相关介绍如下：</p>\n<ul>\n<li><strong>帧结构与关键属性</strong>  ：PUSH_PROMISE帧头里的流ID是与响应相关联的请求的流ID。这意味着一个推送的响应总是关联到客户端已经发送的一个请求。例如，若浏览器请求一个HTML页，服务器为页面上的JS对象构造的PUSH_PROMISE帧，就会基于该请求的流ID。</li>\n<li><strong>工作流程</strong>  ：当客户端的请求命中服务器推送规则后，服务器首先会发送一个PUSH_PROMISE帧，承诺会在一个新的流上推送资源。然后，服务器在当前请求的流上响应当前请求，最后在承诺的流上推送具体的资源。</li>\n<li><strong>客户端响应</strong>  ：如果客户端收到PUSH_PROMISE帧后，检测到本地已有对应资源缓存，那么客户端会发送RST_STREAM帧（Error Code = REFUSED_STREAM），拒绝该流，告知服务器无需推送。</li>\n<li><strong>发送顺序要求</strong>  ：理想情况下，PUSH_PROMISE应该先被推到客户端，然后再接收引用推送对象的DATA帧。若服务器在发送PUSH_PROMISE之前，就发送了完整的HTML等内容，导致客户端在收到PUSH_PROMISE之前已请求了相关对象，虽然HTTP/2协议能够处理这种情况，但会造成一定的资源浪费。</li>\n<li><strong>安全性考虑</strong>  ：PUSH_PROMISE帧推送的对象应是可缓存的，且:method头属性通常被认为是安全的，一般为幂等方法，如GET请求，因为幂等方法不会修改状态，能更好地保证推送过程的安全性和稳定性。</li>\n</ul>\n</div>";</script></body></html>
