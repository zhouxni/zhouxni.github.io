<!DOCTYPE html><html lang="en"><head>

    <link rel="stylesheet" href="../../css/github.min.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
      document.title = 'Cookie 会被浏览器自动携带'
        document.getElementById('article').innerHTML = 
        "<div><p>在Web开发中，<strong>Cookie 会被浏览器自动携带</strong>   ，这是其核心特性之一，也是实现身份认证、状态管理等功能的基础。以下是详细解释：</p>\n<h3>1. Cookie 自动携带的机制</h3>\n<p>当服务器通过 <code>Set-Cookie</code> 响应头向客户端（浏览器）设置Cookie后：</p>\n<ul>\n<li>浏览器会将Cookie保存在本地（内存或硬盘，取决于Cookie类型）。</li>\n<li>后续<strong>每次向该服务器发送请求时</strong>   ，浏览器会自动检查：\n<ul>\n<li>Cookie的 <code>Domain</code>（域名）是否匹配当前请求的域名。</li>\n<li>Cookie的 <code>Path</code>（路径）是否匹配当前请求的路径。</li>\n<li>Cookie是否过期（<code>Expires</code> 或 <code>Max-Age</code>）。</li>\n<li>是否满足 <code>Secure</code>（仅HTTPS传输）、<code>HttpOnly</code>（禁止JS访问）等属性限制。</li>\n</ul>\n</li>\n<li><strong>符合条件的Cookie</strong>   会被自动添加到请求头的 <code>Cookie</code> 字段中，发送给服务器。</li>\n</ul>\n<h3>2. 示例：自动携带的过程</h3>\n<h4>（1）服务器设置Cookie</h4>\n<pre><code class=\"language-http\">// 响应头（服务器 → 浏览器）\n<span class=\"hljs-meta\">HTTP/1.1</span> <span class=\"hljs-number\">200</span> OK\n<span class=\"hljs-attribute\">Set-Cookie</span><span class=\"hljs-punctuation\">: </span>sessionId=abc123; Domain=example.com; Path=/; HttpOnly; Secure\n<span class=\"hljs-attribute\">Set-Cookie</span><span class=\"hljs-punctuation\">: </span>theme=dark; Domain=example.com; Path=/; Max-Age=31536000\n</code></pre>\n<h4>（2）浏览器自动携带Cookie</h4>\n<p>当浏览器向 <code>https://example.com/user</code> 发送请求时，请求头会自动包含：</p>\n<pre><code class=\"language-http\">// 请求头（浏览器 → 服务器）\n<span class=\"hljs-keyword\">GET</span> <span class=\"hljs-string\">/user</span> <span class=\"hljs-meta\">HTTP/1.1</span>\n<span class=\"hljs-attribute\">Host</span><span class=\"hljs-punctuation\">: </span>example.com\n<span class=\"hljs-attribute\">Cookie</span><span class=\"hljs-punctuation\">: </span>sessionId=abc123; theme=dark  // 自动携带符合条件的Cookie\n</code></pre>\n<h3>3. 影响Cookie自动携带的关键属性</h3>\n<table>\n<thead>\n<tr>\n<th>属性</th>\n<th>作用</th>\n<th>对自动携带的影响</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>Domain</code></td>\n<td>指定Cookie所属域名（如 <code>example.com</code> 或 <code>.example.com</code>）</td>\n<td>仅当请求域名与 <code>Domain</code> 匹配时携带（子域名可继承，如 <code>blog.example.com</code> 匹配 <code>.example.com</code>）</td>\n</tr>\n<tr>\n<td><code>Path</code></td>\n<td>指定Cookie生效的路径（如 <code>/admin</code>）</td>\n<td>仅当请求路径包含 <code>Path</code> 时携带（如 <code>/admin/user</code> 匹配 <code>/admin</code>）</td>\n</tr>\n<tr>\n<td><code>Expires</code>/<code>Max-Age</code></td>\n<td>设置过期时间（<code>Expires</code> 是绝对时间，<code>Max-Age</code> 是秒数）</td>\n<td>过期的Cookie不会被携带</td>\n</tr>\n<tr>\n<td><code>Secure</code></td>\n<td>仅在HTTPS连接中携带</td>\n<td>若请求是HTTP协议，即使Cookie存在也不会携带</td>\n</tr>\n<tr>\n<td><code>HttpOnly</code></td>\n<td>禁止JavaScript通过 <code>document.cookie</code> 访问（仅浏览器自动携带）</td>\n<td>不影响自动携带，但限制前端脚本操作Cookie，增强安全性</td>\n</tr>\n<tr>\n<td><code>SameSite</code></td>\n<td>限制跨站请求时的携带（<code>Strict</code>/<code>Lax</code>/<code>None</code>）</td>\n<td>- <code>Strict</code>：仅同站请求携带&lt;br&gt;- <code>Lax</code>：部分跨站请求（如导航）携带&lt;br&gt;- <code>None</code>：需配合<code>Secure</code>，所有请求携带</td>\n</tr>\n</tbody>\n</table>\n<h3>4. 特殊场景：Cookie不会自动携带</h3>\n<ul>\n<li>\n<p><strong>跨域请求且未满足CORS条件</strong>   ：<br>\n例如，<code>a.com</code> 的页面请求 <code>b.com</code>，若 <code>b.com</code> 的Cookie <code>Domain</code> 为 <code>b.com</code>，且CORS配置未允许，浏览器默认不携带Cookie。需通过 <code>withCredentials: true</code>（前端）和 <code>Access-Control-Allow-Credentials: true</code>（后端）开启跨域携带。</p>\n</li>\n<li>\n<p><strong>Cookie属性限制</strong>   ：<br>\n如 <code>Secure: true</code> 的Cookie在HTTP请求中不携带，<code>Path: /admin</code> 的Cookie在访问 <code>/home</code> 时不携带。</p>\n</li>\n<li>\n<p><strong>Cookie已过期或被删除</strong>   ：<br>\n浏览器会自动清理过期Cookie，删除后的Cookie自然不会携带。</p>\n</li>\n</ul>\n<h3>5. 应用场景</h3>\n<p>Cookie的自动携带特性被广泛用于：</p>\n<ul>\n<li><strong>身份认证</strong>   ：登录后服务器设置 <code>sessionId</code> Cookie，后续请求自动携带以验证用户身份。</li>\n<li><strong>状态保持</strong>   ：记住用户偏好（如主题、语言）、购物车信息等。</li>\n<li><strong>追踪分析</strong>   ：记录用户行为（需遵守隐私法规）。</li>\n</ul>\n<p>总结：Cookie的自动携带是浏览器的内置机制，由其属性（<code>Domain</code>、<code>Path</code>、<code>SameSite</code>等）控制范围，开发者无需手动在请求中添加Cookie，极大简化了Web状态管理。</p>\n</div>";
      </script></body></html>
