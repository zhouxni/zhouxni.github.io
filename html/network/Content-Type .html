<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Content-Type ",document.getElementById("article").innerHTML='<div><p><code>Content-Type</code> 是 HTTP 协议中用于表示数据格式的头字段，在请求头和响应头中都可能出现，但用途略有不同：</p>\n<ul>\n<li><strong>请求头中的 <code>Content-Type</code></strong>   ：表示客户端发送给服务器的数据格式</li>\n<li><strong>响应头中的 <code>Content-Type</code></strong>   ：表示服务器返回给客户端的数据格式</li>\n</ul>\n<p>以下是常见的 <code>Content-Type</code> 类型：</p>\n<h3>1. 文本类型</h3>\n<ul>\n<li><code>text/plain</code>：纯文本（默认）</li>\n<li><code>text/html</code>：HTML 文档</li>\n<li><code>text/css</code>：CSS 样式表</li>\n<li><code>text/javascript</code>：JavaScript 代码</li>\n<li><code>text/xml</code>：XML 格式数据</li>\n</ul>\n<h3>2. 图片类型</h3>\n<ul>\n<li><code>image/jpeg</code>：JPEG 图片</li>\n<li><code>image/png</code>：PNG 图片</li>\n<li><code>image/gif</code>：GIF 图片</li>\n<li><code>image/svg+xml</code>：SVG 矢量图</li>\n<li><code>image/webp</code>：WebP 图片</li>\n</ul>\n<h3>3. 表单数据类型</h3>\n<ul>\n<li><code>application/x-www-form-urlencoded</code>：表单默认提交格式，数据会被编码为键值对</li>\n<li><code>multipart/form-data</code>：用于上传文件或包含二进制数据的表单</li>\n</ul>\n<h3>4. 应用程序数据类型</h3>\n<ul>\n<li><code>application/json</code>：JSON 格式数据（最常用）</li>\n<li><code>application/xml</code>：XML 格式数据</li>\n<li><code>application/pdf</code>：PDF 文档</li>\n<li><code>application/zip</code>：ZIP 压缩文件</li>\n<li><code>application/octet-stream</code>：二进制流数据（通常用于文件下载）</li>\n<li><code>application/x-json</code>：非标准 JSON 类型（不推荐使用）</li>\n</ul>\n<h3>5. 其他特殊类型</h3>\n<ul>\n<li><code>multipart/byteranges</code>：用于断点续传的部分响应</li>\n<li><code>application/x-protobuf</code>：Protocol Buffers 格式</li>\n<li><code>application/graphql</code>：GraphQL 请求</li>\n</ul>\n<h3>使用示例</h3>\n<pre><code class="language-http">// 请求头示例（提交JSON数据）\n<span class="hljs-attribute">Content-Type</span><span class="hljs-punctuation">: </span>application/json; charset=utf-8\n\n// 响应头示例（返回PNG图片）\n<span class="hljs-attribute">Content-Type</span><span class="hljs-punctuation">: </span>image/png\n\n// 表单提交文件\n<span class="hljs-attribute">Content-Type</span><span class="hljs-punctuation">: </span>multipart/form-data; boundary=----WebKitFormBoundaryabc123\n</code></pre>\n<p><code>Content-Type</code> 通常还会附带字符编码参数（如 <code>; charset=utf-8</code>），用于指定文本数据的编码方式，确保数据正确解析。</p>\n</div>'</script></body></html>
