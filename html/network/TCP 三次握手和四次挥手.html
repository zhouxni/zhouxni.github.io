<script>
    
        document.getElementById('article').innerHTML = 
        "<div><h3>TCP 三次握手和四次挥手详解</h3>\n<p>TCP（Transmission Control Protocol）是一种面向连接的、可靠的、基于字节流的传输层通信协议。在 TCP 协议中，三次握手用于建立连接，而四次挥手用于终止连接。以下是关于 TCP 三次握手和四次挥手的全面解析：</p>\n<hr>\n<h4>一、TCP 三次握手（建立连接）</h4>\n<p><strong>三次握手</strong>  是 TCP 协议用于建立可靠连接的过程，确保客户端和服务器双方都已准备好进行数据传输。具体步骤如下：</p>\n<ol>\n<li><strong>第一次握手（SYN）</strong>  ：\n<ul>\n<li>客户端向服务器发送一个 SYN（Synchronize Sequence Numbers）包，请求建立连接。</li>\n<li>该包中包含一个初始序列号（假设为 <code>x</code>），用于后续的数据传输。</li>\n</ul>\n</li>\n<li><strong>第二次握手（SYN-ACK）</strong>  ：\n<ul>\n<li>服务器收到 SYN 包后，向客户端发送一个 SYN-ACK（Synchronize-Acknowledgment）包，表示同意建立连接。</li>\n<li>该包中包含服务器的初始序列号（假设为 <code>y</code>）和对客户端序列号的确认号（<code>x+1</code>）。</li>\n</ul>\n</li>\n<li><strong>第三次握手（ACK）</strong>  ：\n<ul>\n<li>客户端收到 SYN-ACK 包后，向服务器发送一个 ACK（Acknowledgment）包，确认连接建立。</li>\n<li>该包中包含对服务器序列号的确认号（<code>y+1</code>）。</li>\n</ul>\n</li>\n</ol>\n<p><strong>为什么需要三次握手？</strong></p>\n<ul>\n<li><strong>防止旧连接请求</strong>  ：三次握手可以确保客户端收到的 SYN-ACK 包是针对当前请求的，而不是之前的旧请求。</li>\n<li><strong>同步序列号</strong>  ：通过三次握手，客户端和服务器可以协商并确认各自的初始序列号，确保后续数据传输的可靠性。</li>\n</ul>\n<hr>\n<h4>二、TCP 四次挥手（终止连接）</h4>\n<p><strong>四次挥手</strong>  是 TCP 协议用于终止可靠连接的过程，确保双方都已完成数据传输并准备好关闭连接。具体步骤如下：</p>\n<ol>\n<li><strong>第一次挥手（FIN）</strong>  ：\n<ul>\n<li>客户端向服务器发送一个 FIN（Finish）包，表示客户端已没有数据要发送，请求关闭连接。</li>\n</ul>\n</li>\n<li><strong>第二次挥手（ACK）</strong>  ：\n<ul>\n<li>服务器收到 FIN 包后，向客户端发送一个 ACK 包，确认收到关闭请求。</li>\n<li>此时，客户端到服务器的方向已经关闭，但服务器到客户端的方向仍然可以传输数据。</li>\n</ul>\n</li>\n<li><strong>第三次挥手（FIN）</strong>  ：\n<ul>\n<li>当服务器也没有数据要发送时，向客户端发送一个 FIN 包，表示服务器也请求关闭连接。</li>\n</ul>\n</li>\n<li><strong>第四次挥手（ACK）</strong>  ：\n<ul>\n<li>客户端收到服务器的 FIN 包后，向服务器发送一个 ACK 包，确认收到关闭请求。</li>\n<li>此时，连接完全关闭，双方都不再发送或接收数据。</li>\n</ul>\n</li>\n</ol>\n<p><strong>为什么需要四次挥手？</strong></p>\n<ul>\n<li><strong>确保数据完整性</strong>  ：四次挥手允许双方在关闭连接前完成所有数据的传输和确认。</li>\n<li><strong>半关闭状态</strong>  ：TCP 连接支持半关闭状态，即一方可以关闭发送方向，但继续接收数据。四次挥手可以处理这种半关闭情况。</li>\n</ul>\n<hr>\n<h4>三、TCP 三次握手和四次挥手的比较</h4>\n<table>\n<thead>\n<tr>\n<th><strong>特性</strong></th>\n<th><strong>三次握手</strong></th>\n<th><strong>四次挥手</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>目的</strong></td>\n<td>建立连接</td>\n<td>终止连接</td>\n</tr>\n<tr>\n<td><strong>包的数量</strong></td>\n<td>3 个包（SYN, SYN-ACK, ACK）</td>\n<td>4 个包（FIN, ACK, FIN, ACK）</td>\n</tr>\n<tr>\n<td><strong>状态变化</strong></td>\n<td>从 CLOSED 到 ESTABLISHED</td>\n<td>从 ESTABLISHED 到 CLOSED</td>\n</tr>\n<tr>\n<td><strong>关键点</strong></td>\n<td>同步序列号，防止旧连接请求</td>\n<td>确保数据完整性，处理半关闭状态</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h4>四、TCP 三次握手和四次挥手的类比</h4>\n<p><strong>三次握手类比</strong>  ：</p>\n<ul>\n<li>想象两个人在打电话，第一个人说“你好，我可以说话吗？”（SYN），第二个人回答“可以，你说吧。”（SYN-ACK），第一个人再说“好的，我开始说了。”（ACK）。</li>\n</ul>\n<p><strong>四次挥手类比</strong>  ：</p>\n<ul>\n<li>想象两个人在结束通话，第一个人说“我说完了，你还有什么要说吗？”（FIN），第二个人回答“我知道了，你等我说完。”（ACK），然后第二个人说“我也说完了。”（FIN），第一个人回答“好的，那挂了吧。”（ACK）。</li>\n</ul>\n<hr>\n<h4>五、总结</h4>\n<p>TCP 三次握手和四次挥手是 TCP 协议中用于建立可靠连接和终止连接的重要过程。三次握手确保双方都已准备好进行数据传输，并同步序列号；四次挥手确保双方都已完成数据传输，并安全地关闭连接。理解这两个过程对于掌握 TCP 协议的工作原理和网络编程至关重要。</p>\n</div>";
