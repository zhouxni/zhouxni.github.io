<!DOCTYPE html><html lang="en"><head>

    html,
    body {
      margin: 0;

    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;

    }

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
            document.getElementById('article').innerHTML = 
            "<div><p>在 Web 开发中，Cookie 是存储在用户浏览器中的小段数据，用于在客户端和服务器之间传递信息。设置 Cookie 时可以使用多个配置对象（或称为属性）来控制 Cookie 的行为，以下是常见的 Cookie 配置对象及其作用：</p>\n<h3>1. <code>name</code> 和 <code>value</code></h3>\n<ul>\n<li><strong><code>name</code></strong>  ：Cookie 的名称，是一个字符串，用于唯一标识该 Cookie。例如，用于存储用户登录状态的 Cookie 可能命名为 <code>user_session</code>。</li>\n<li><strong><code>value</code></strong>  ：Cookie 存储的值，也是字符串类型。它可以包含用户 ID、会话令牌等信息。</li>\n</ul>\n<h3>2. <code>domain</code></h3>\n<ul>\n<li><strong>作用</strong>  ：指定可以访问该 Cookie 的域名。默认情况下，Cookie 只能被设置它的域名访问。通过设置 <code>domain</code>，可以让子域名也能访问该 Cookie。</li>\n<li><strong>示例</strong>  ：如果 <code>domain</code> 设置为 <code>.example.com</code>，那么 <code>sub.example.com</code> 和 <code>example.com</code> 都可以访问该 Cookie。</li>\n</ul>\n<h3>3. <code>path</code></h3>\n<ul>\n<li><strong>作用</strong>  ：指定可以访问该 Cookie 的页面路径。只有当请求的路径与 <code>path</code> 匹配时，浏览器才会将该 Cookie 发送给服务器。</li>\n<li><strong>示例</strong>  ：如果 <code>path</code> 设置为 <code>/admin</code>，那么只有访问以 <code>/admin</code> 开头的路径时，浏览器才会发送该 Cookie。</li>\n</ul>\n<h3>4. <code>expires</code> 和 <code>max - age</code></h3>\n<ul>\n<li><strong><code>expires</code></strong>  ：\n<ul>\n<li><strong>作用</strong>  ：指定 Cookie 的过期时间，是一个 <code>Date</code> 对象。当达到过期时间后，浏览器会自动删除该 Cookie。</li>\n<li><strong>示例</strong>  ：</li>\n</ul>\n</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> date = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>();\ndate.<span class=\"hljs-title function_\">setTime</span>(date.<span class=\"hljs-title function_\">getTime</span>() + (<span class=\"hljs-number\">24</span> * <span class=\"hljs-number\">60</span> * <span class=\"hljs-number\">60</span> * <span class=\"hljs-number\">1000</span>)); <span class=\"hljs-comment\">// 设置为 24 小时后过期</span>\n<span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">cookie</span> = <span class=\"hljs-string\">&quot;name=value; expires=&quot;</span> + date.<span class=\"hljs-title function_\">toUTCString</span>();\n</code></pre>\n<ul>\n<li><strong><code>max - age</code></strong>  ：\n<ul>\n<li><strong>作用</strong>  ：指定 Cookie 的有效期，以秒为单位。设置 <code>max - age</code> 后，<code>expires</code> 属性会被忽略。</li>\n<li><strong>示例</strong>  ：</li>\n</ul>\n</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">cookie</span> = <span class=\"hljs-string\">&quot;name=value; max - age=3600&quot;</span>; <span class=\"hljs-comment\">// 设置为 1 小时后过期</span>\n</code></pre>\n<h3>5. <code>secure</code></h3>\n<ul>\n<li><strong>作用</strong>  ：一个布尔值，指定是否仅通过 HTTPS 协议传输该 Cookie。如果设置为 <code>true</code>，那么只有在使用 HTTPS 连接时，浏览器才会将该 Cookie 发送给服务器，从而提高 Cookie 的安全性。</li>\n<li><strong>示例</strong>  ：</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">cookie</span> = <span class=\"hljs-string\">&quot;name=value; secure&quot;</span>;\n</code></pre>\n<h3>6. <code>httpOnly</code></h3>\n<ul>\n<li><strong>作用</strong>  ：一个布尔值，指定该 Cookie 是否只能通过 HTTP 协议访问，不能通过 JavaScript 脚本访问。设置为 <code>true</code> 可以防止脚本攻击（如 XSS）窃取 Cookie 信息。</li>\n<li><strong>示例</strong>  ：</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">cookie</span> = <span class=\"hljs-string\">&quot;name=value; httpOnly&quot;</span>;\n</code></pre>\n<h3>7. <code>SameSite</code></h3>\n<ul>\n<li><strong>作用</strong>  ：控制 Cookie 在跨站请求时的发送行为，有三个可能的值：\n<ul>\n<li><strong><code>Strict</code></strong>  ：严格模式，只有在同站请求时才会发送该 Cookie，即请求的源和目标域名完全一致。</li>\n<li><strong><code>Lax</code></strong>  ：宽松模式，在大多数跨站请求中不会发送该 Cookie，但在一些安全的顶级导航（如链接跳转）中会发送。</li>\n<li><strong><code>None</code></strong>  ：允许跨站请求时发送该 Cookie，但必须同时设置 <code>secure</code> 属性为 <code>true</code>。</li>\n</ul>\n</li>\n<li><strong>示例</strong>  ：</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">cookie</span> = <span class=\"hljs-string\">&quot;name=value; SameSite=Strict&quot;</span>;\n</code></pre>\n<p>不同的编程语言和框架在设置 Cookie 时，对这些配置对象的使用方式可能会有所不同，但基本的概念和作用是一致的。</p>\n</div>";
          </script></body></html>
