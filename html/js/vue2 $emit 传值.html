<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../css/github-markdown.min.css">
    <link rel="stylesheet" href="../../css/github.min.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }
  </style></head>
  
  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
      document.title = 'vue2 $emit 传值'
        document.getElementById('article').innerHTML = 
        "<div><h3><strong>子组件传值，父组件也传值</strong></h3>\n<pre><code>// child组件，在子组件中触发事件\nthis.$emit('handleFather', '子参数对象')\n//father组件，在父组件中引用子组件\n&lt;child @handleFather=&quot;handleFather($event, fatherParam)&quot;&gt;&lt;/child&gt;\n \n&lt;script&gt;\n export default {\n   components: {\n    child,\n   }\n   methods: {\n     handleFather(childObj, fatherParam) {\n         console.log(childObj) // 打印子组件参数（对象）\n         console.log(fatherParam) // 父组件参数\n     }\n   }\n }\n&lt;/script&gt;\n\n\n// child组件，在子组件中触发事件并传多个参数\nthis.$emit('handleFather', param1, param2,)\n//father组件，在父组件中引用子组件\n&lt;child @handleFather=&quot;handleFather(arguments, fatherParam)&quot;&gt;&lt;/child&gt;\n \n&lt;script&gt;\n export default {\n   components: {\n    child,\n   }\n   methods: {\n     handleFather(childParam, fatherParam) {\n         console.log(childParam) //获取arguments数组参数\n         console.log(fatherParam) //获取fatherParam\n     }\n   }\n }\n&lt;/script&gt;\n\n</code></pre>\n</div>";
      </script></body></html>
