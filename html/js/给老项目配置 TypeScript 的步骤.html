<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../css/github-markdown.min.css">
    <link rel="stylesheet" href="../../css/github.min.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }
  </style></head>
  
  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
        document.getElementById('article').innerHTML = 
        "<div><p>为现有的 JavaScript 项目添加 TypeScript 支持是一个渐进的过程，可以按照以下步骤进行：</p>\n<h2>1. 初始化 TypeScript 配置</h2>\n<pre><code class=\"language-sh\">npm install --save-dev typescript\nnpx tsc --init\n</code></pre>\n<p>这会创建 <code>tsconfig.json</code> 文件，包含 TypeScript 的默认配置。</p>\n<h2>2. 配置 tsconfig.json</h2>\n<p>修改生成的 <code>tsconfig.json</code>，常见配置如下：</p>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;compilerOptions&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;target&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;es5&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;module&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;commonjs&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;strict&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">true</span></span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;esModuleInterop&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">true</span></span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;skipLibCheck&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">true</span></span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;forceConsistentCasingInFileNames&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">true</span></span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;outDir&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;./dist&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;rootDir&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;./src&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;allowJs&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">true</span></span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;checkJs&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">true</span></span>\n  <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">&quot;include&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-string\">&quot;src/**/*&quot;</span><span class=\"hljs-punctuation\">]</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">&quot;exclude&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-string\">&quot;node_modules&quot;</span><span class=\"hljs-punctuation\">]</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<h2>3. 逐步迁移策略</h2>\n<h3>渐进式迁移方法</h3>\n<ol>\n<li><strong>允许 JS 文件</strong>  ：设置 <code>allowJs: true</code> 和 <code>checkJs: true</code>，让 TypeScript 检查 JS 文件</li>\n<li><strong>重命名文件</strong>  ：将 <code>.js</code> 文件逐个改为 <code>.ts</code> 或 <code>.tsx</code>（如果是 React 组件）</li>\n<li><strong>添加类型定义</strong>  ：逐步为代码添加类型注解</li>\n</ol>\n<h3>混合模式运行</h3>\n<p>可以保持大部分文件为 <code>.js</code>，只将部分文件转为 <code>.ts</code>，TypeScript 会同时处理两种文件。</p>\n<h2>4. 安装类型定义</h2>\n<pre><code class=\"language-sh\">npm install --save-dev @types/node @types/react @types/react-dom <span class=\"hljs-comment\"># 根据项目需要</span>\n</code></pre>\n<h2>5. 配置构建脚本</h2>\n<p>修改 <code>package.json</code> 中的脚本：</p>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;scripts&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;build&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;tsc&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;watch&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;tsc -w&quot;</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<h2>6. 处理第三方库类型</h2>\n<p>对于没有类型定义的第三方库，可以：</p>\n<ol>\n<li>创建 <code>src/types</code> 目录</li>\n<li>添加 <code>declare module 'module-name'</code> 声明</li>\n<li>或在 <code>tsconfig.json</code> 中添加 <code>&quot;typeRoots&quot;: [&quot;./node_modules/@types&quot;, &quot;./src/types&quot;]</code></li>\n</ol>\n<h2>7. 配置 ESLint (可选)</h2>\n<pre><code class=\"language-sh\">npm install --save-dev @typescript-eslint/parser @typescript-eslint/eslint-plugin\n</code></pre>\n<p>然后更新 <code>.eslintrc.js</code>：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-property\">exports</span> = {\n  <span class=\"hljs-attr\">parser</span>: <span class=\"hljs-string\">&#x27;@typescript-eslint/parser&#x27;</span>,\n  <span class=\"hljs-attr\">plugins</span>: [<span class=\"hljs-string\">&#x27;@typescript-eslint&#x27;</span>],\n  <span class=\"hljs-attr\">extends</span>: [\n    <span class=\"hljs-string\">&#x27;eslint:recommended&#x27;</span>,\n    <span class=\"hljs-string\">&#x27;plugin:@typescript-eslint/recommended&#x27;</span>\n  ]\n};\n</code></pre>\n<h2>8. 配置 Webpack (如果需要)</h2>\n<p>安装 <code>ts-loader</code>：</p>\n<pre><code class=\"language-sh\">npm install --save-dev ts-loader\n</code></pre>\n<p>更新 <code>webpack.config.js</code>：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-property\">exports</span> = {\n  <span class=\"hljs-comment\">// ...</span>\n  <span class=\"hljs-attr\">module</span>: {\n    <span class=\"hljs-attr\">rules</span>: [\n      {\n        <span class=\"hljs-attr\">test</span>: <span class=\"hljs-regexp\">/\\.tsx?$/</span>,\n        <span class=\"hljs-attr\">use</span>: <span class=\"hljs-string\">&#x27;ts-loader&#x27;</span>,\n        <span class=\"hljs-attr\">exclude</span>: <span class=\"hljs-regexp\">/node_modules/</span>,\n      },\n    ],\n  },\n  <span class=\"hljs-attr\">resolve</span>: {\n    <span class=\"hljs-attr\">extensions</span>: [<span class=\"hljs-string\">&#x27;.tsx&#x27;</span>, <span class=\"hljs-string\">&#x27;.ts&#x27;</span>, <span class=\"hljs-string\">&#x27;.js&#x27;</span>],\n  },\n  <span class=\"hljs-comment\">// ...</span>\n};\n</code></pre>\n<h2>迁移技巧</h2>\n<ol>\n<li><strong>从关键模块开始</strong>  ：先迁移项目中最核心、最常用的模块</li>\n<li><strong>使用 <code>any</code> 过渡</strong>  ：对于复杂类型可以先使用 <code>any</code>，后续再细化</li>\n<li><strong>逐步启用严格模式</strong>  ：可以先关闭 <code>strict</code>，然后逐步启用严格检查选项</li>\n<li><strong>利用 JSDoc 注释</strong>  ：TypeScript 可以理解 JSDoc 类型注释，帮助平滑过渡</li>\n</ol>\n<p>通过这种方式，你可以逐步将老项目迁移到 TypeScript，而不需要一次性重写所有代码。</p>\n</div>";
      </script></body></html>
