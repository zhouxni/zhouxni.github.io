<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="前端组件库 package.json 常用字段",document.getElementById("article").innerHTML='<div><p>前端组件库的 package.json 文件有一些特定的字段配置，以下是最常用的字段及其说明：</p>\n<h2>基本信息字段</h2>\n<ul>\n<li><strong>name</strong>   : 组件库名称（必须唯一，遵循 npm 命名规则）</li>\n<li><strong>version</strong>   : 版本号（遵循语义化版本规范）</li>\n<li><strong>description</strong>   : 组件库描述</li>\n<li><strong>keywords</strong>   : 关键词数组，便于搜索</li>\n<li><strong>license</strong>   : 开源许可证（如 MIT、Apache-2.0 等）</li>\n<li><strong>author</strong>   : 作者信息（可包含 name, email, url）</li>\n<li><strong>repository</strong>   : 代码仓库信息（type 和 url）</li>\n<li><strong>homepage</strong>   : 项目主页 URL</li>\n<li><strong>bugs</strong>   : 问题追踪 URL</li>\n</ul>\n<h2>依赖管理字段</h2>\n<ul>\n<li><strong>dependencies</strong>   : 生产环境依赖</li>\n<li><strong>devDependencies</strong>   : 开发环境依赖</li>\n<li><strong>peerDependencies</strong>   : 对等依赖（组件库常用，如 React/Vue）</li>\n<li><strong>optionalDependencies</strong>   : 可选依赖</li>\n<li><strong>engines</strong>   : 指定 Node/npm 版本要求</li>\n</ul>\n<h2>组件库特有字段</h2>\n<ul>\n<li><strong>main</strong>   : 主入口文件（CommonJS）</li>\n<li><strong>module</strong>   : ES Module 入口文件</li>\n<li><strong>types</strong>   : TypeScript 类型定义文件</li>\n<li><strong>unpkg</strong>   : CDN 直接引用的 UMD 文件</li>\n<li><strong>jsdelivr</strong>   : jsDelivr CDN 文件</li>\n<li><strong>files</strong>   : 发布到 npm 的文件白名单</li>\n<li><strong>sideEffects</strong>   : 标记是否有副作用（用于 tree-shaking）</li>\n<li><strong>style</strong>   : 默认样式文件路径</li>\n</ul>\n<h2>脚本命令字段</h2>\n<ul>\n<li><strong>scripts</strong>   : 常用脚本如：<pre><code class="language-json"><span class="hljs-attr">&quot;scripts&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n  <span class="hljs-attr">&quot;build&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;构建命令&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;dev&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;开发模式&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;test&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;运行测试&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;lint&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;代码检查&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;prepublishOnly&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;发布前预处理&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;storybook&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;启动文档站点&quot;</span>\n<span class="hljs-punctuation">}</span>\n</code></pre>\n</li>\n</ul>\n<h2>组件库最佳实践配置示例</h2>\n<pre><code class="language-json"><span class="hljs-punctuation">{</span>\n  <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;my-component-library&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;version&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;1.0.0&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;A modern React component library&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;main&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;dist/index.js&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;module&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;dist/esm/index.js&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;types&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;dist/types/index.d.ts&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;files&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;dist&quot;</span><span class="hljs-punctuation">]</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;sideEffects&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">false</span></span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;scripts&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n    <span class="hljs-attr">&quot;build&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;rollup -c&quot;</span><span class="hljs-punctuation">,</span>\n    <span class="hljs-attr">&quot;dev&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;rollup -c -w&quot;</span><span class="hljs-punctuation">,</span>\n    <span class="hljs-attr">&quot;test&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;jest&quot;</span><span class="hljs-punctuation">,</span>\n    <span class="hljs-attr">&quot;lint&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;eslint src&quot;</span>\n  <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;peerDependencies&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n    <span class="hljs-attr">&quot;react&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;&gt;=16.8.0&quot;</span><span class="hljs-punctuation">,</span>\n    <span class="hljs-attr">&quot;react-dom&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;&gt;=16.8.0&quot;</span>\n  <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;devDependencies&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n    <span class="hljs-comment">// 开发依赖...</span>\n  <span class="hljs-punctuation">}</span>\n<span class="hljs-punctuation">}</span>\n</code></pre>\n<p>这些字段配置有助于确保组件库在各种环境中正确工作，并优化打包工具的 tree-shaking 能力。</p>\n</div>'</script></body></html>
