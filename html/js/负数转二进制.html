<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="负数转二进制",document.getElementById("article").innerHTML='<div><p>负数在计算机里<strong>不直接写“-”</strong>   ，而是按 <strong>补码</strong>   规则存储。<br>\n把负数变二进制，就是求它的 <strong>32 位补码</strong>   （JavaScript 内部固定 32 位）。</p>\n<hr>\n<h3>✅ 口诀（一步到位）</h3>\n<ol>\n<li><strong>写出绝对值的 32 位二进制</strong></li>\n<li><strong>按位取反</strong>   （0 ↔ 1）</li>\n<li><strong>结果 + 1</strong><br>\n→ 得到的 32 位就是补码，也就是负数的机器码。</li>\n</ol>\n<hr>\n<h3>✅ 实例：-5 转二进制</h3>\n<table>\n<thead>\n<tr>\n<th>步骤</th>\n<th>计算</th>\n<th>32 位结果</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>①绝对值</td>\n<td>5</td>\n<td><code>00000000 00000000 00000000 00000101</code></td>\n</tr>\n<tr>\n<td>②取反</td>\n<td>~</td>\n<td><code>11111111 11111111 11111111 11111010</code></td>\n</tr>\n<tr>\n<td>③+1</td>\n<td>+1</td>\n<td><code>11111111 11111111 11111111 11111011</code></td>\n</tr>\n</tbody>\n</table>\n<p>在补码运算中，当 “加 1” 导致结果溢出到固定位数的最高位（即超出当前整数的位数限制）时，超出的最高位会被直接舍弃。</p>\n<p>所以 <strong>-5 的 32 位补码</strong><br>\n= <code>11111111111111111111111111111011</code><br>\n= 十六进制 <code>0xFFFFFFFB</code></p>\n<hr>\n<h3>✅ JS 一行代码（直接看补码）</h3>\n<pre><code class="language-js">(-<span class="hljs-number">5</span> &gt;&gt;&gt; <span class="hljs-number">0</span>).<span class="hljs-title function_">toString</span>(<span class="hljs-number">2</span>); <span class="hljs-comment">// &quot;11111111111111111111111111111011&quot;</span>\n</code></pre>\n<ul>\n<li><code>&gt;&gt;&gt;</code> 无符号右移 0 位 → 把 -5 的 32 位补码当成无符号整数。</li>\n<li><code>.toString(2)</code> 再转成二进制字符串。</li>\n</ul>\n<hr>\n<h3>✅ 反过来：补码 → 十进制</h3>\n<pre><code class="language-js"><span class="hljs-built_in">parseInt</span>(<span class="hljs-string">&quot;11111111111111111111111111111011&quot;</span>, <span class="hljs-number">2</span>) &lt;&lt; <span class="hljs-number">0</span>;\n<span class="hljs-comment">// → -5</span>\n</code></pre>\n<p><code>&lt;&lt; 0</code> 让 JS 按有符号 32 位解释。</p>\n<hr>\n<h3>✅ 小结</h3>\n<table>\n<thead>\n<tr>\n<th>需求</th>\n<th>代码</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>负数 → 二进制补码</td>\n<td><code>(-n &gt;&gt;&gt; 0).toString(2)</code></td>\n</tr>\n<tr>\n<td>补码 → 十进制</td>\n<td><code>parseInt(\'补码\', 2) &lt;&lt; 0</code></td>\n</tr>\n</tbody>\n</table>\n<p>记住：<strong>补码 = 取反 + 1</strong>   ，32 位固定宽度。</p>\n</div>'</script></body></html>
