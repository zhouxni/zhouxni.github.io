<!DOCTYPE html><html lang="en"><head>

    body {
      margin: 0;

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
            document.getElementById('article').innerHTML = 
            "<div><p>HTML5 引入了自定义属性的概念，允许开发者在 HTML 元素上添加非标准的属性，以满足特定的需求。自定义属性通常以 <code>data-</code> 前缀开头，这是为了避免与未来可能出现的标准属性冲突。以下是对 HTML5 自定义属性的详细归纳：</p>\n<h3>一、定义与用途</h3>\n<ul>\n<li><strong>定义</strong>  ：自定义属性是以 <code>data-</code> 为前缀的属性，例如 <code>data-id</code>、<code>data-user-id</code>、<code>data-role</code> 等。</li>\n<li><strong>用途</strong>  ：自定义属性主要用于存储与元素相关的额外信息，这些信息可以在 JavaScript 中被访问和使用，而无需在 DOM 中添加额外的元素或结构。</li>\n</ul>\n<h3>二、使用场景</h3>\n<ol>\n<li><strong>存储额外信息</strong>  ：当需要在元素上存储一些额外的、与页面逻辑相关的信息时，可以使用自定义属性。</li>\n<li><strong>增强交互性</strong>  ：通过自定义属性，可以为元素添加特定的行为或样式，从而增强用户与页面的交互体验。</li>\n<li><strong>实现动态效果</strong>  ：结合 JavaScript，自定义属性可以用于实现动态效果，如根据用户行为改变元素的样式或内容。</li>\n</ol>\n<h3>三、访问自定义属性</h3>\n<ul>\n<li><strong>在 JavaScript 中访问</strong>  ：可以通过 <code>HTMLElement.dataset</code> 属性来访问自定义属性。<code>dataset</code> 是一个 DOMStringMap 对象，它包含了元素的所有以 <code>data-</code> 开头的属性，属性名中的 <code>data-</code> 前缀会被移除，并且连字符 <code>-</code> 会被转换为驼峰命名法。<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 假设有一个元素 &lt;div id=&quot;myElement&quot; data-user-id=&quot;12345&quot; data-role=&quot;admin&quot;&gt;&lt;/div&gt;</span>\n<span class=\"hljs-keyword\">var</span> element = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&#x27;myElement&#x27;</span>);\n<span class=\"hljs-keyword\">var</span> userId = element.<span class=\"hljs-property\">dataset</span>.<span class=\"hljs-property\">userId</span>; <span class=\"hljs-comment\">// 访问 data-user-id 属性</span>\n<span class=\"hljs-keyword\">var</span> role = element.<span class=\"hljs-property\">dataset</span>.<span class=\"hljs-property\">role</span>;     <span class=\"hljs-comment\">// 访问 data-role 属性</span>\n</code></pre>\n</li>\n</ul>\n<h3>四、最佳实践</h3>\n<ol>\n<li><strong>命名规范</strong>  ：自定义属性的命名应遵循小写字母和连字符的组合，以提高可读性和可维护性。</li>\n<li><strong>避免冲突</strong>  ：确保自定义属性的名称不会与现有的 HTML 属性或未来可能出现的标准属性冲突。</li>\n<li><strong>合理使用</strong>  ：虽然自定义属性提供了很大的灵活性，但应避免过度使用，以免导致 HTML 结构混乱和难以维护。</li>\n</ol>\n<h3>五、示例</h3>\n<p>以下是一个简单的示例，展示了如何在 HTML 中使用自定义属性，并在 JavaScript 中访问它们：</p>\n<pre><code class=\"language-html\"><span class=\"hljs-meta\">&lt;!DOCTYPE <span class=\"hljs-keyword\">html</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">&quot;en&quot;</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">head</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">charset</span>=<span class=\"hljs-string\">&quot;UTF-8&quot;</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>HTML5 自定义属性示例<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">head</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">&quot;myElement&quot;</span> <span class=\"hljs-attr\">data-user-id</span>=<span class=\"hljs-string\">&quot;12345&quot;</span> <span class=\"hljs-attr\">data-role</span>=<span class=\"hljs-string\">&quot;admin&quot;</span>&gt;</span>Hello, World!<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n    <span class=\"hljs-keyword\">var</span> element = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">&#x27;myElement&#x27;</span>);\n    <span class=\"hljs-keyword\">var</span> userId = element.<span class=\"hljs-property\">dataset</span>.<span class=\"hljs-property\">userId</span>;\n    <span class=\"hljs-keyword\">var</span> role = element.<span class=\"hljs-property\">dataset</span>.<span class=\"hljs-property\">role</span>;\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;User ID:&#x27;</span>, userId); <span class=\"hljs-comment\">// 输出: User ID: 12345</span>\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Role:&#x27;</span>, role);     <span class=\"hljs-comment\">// 输出: Role: admin</span>\n  </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">html</span>&gt;</span>\n</code></pre>\n</div>";
          </script></body></html>
