<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="二进制科学计数法和普通二进制",document.getElementById("article").innerHTML="<div><p>二进制科学计数法和普通二进制，本质都是表示二进制数的方式，但核心差异在于 <strong>“是否通过‘指数’调整数值量级”</strong>   ，就像十进制里“1234”（普通十进制）和“1.234×10³”（十进制科学计数法）的区别。我们用具体例子对比，就能清晰看出两者的不同：</p>\n<h3>一、普通二进制：“直接写全所有位”</h3>\n<p>普通二进制是最直观的表示方法，把数字直接拆成“2的幂次之和”，然后用 0 和 1 写出每一位，<strong>没有“指数”和“小数点固定位置”的概念</strong>   。</p>\n<ul>\n<li>特点：位数随数值大小变化，数值越大/越小，位数越多。</li>\n<li>示例：\n<ol>\n<li>十进制 8 → 普通二进制：<code>1000</code>（1×2³ + 0×2² + 0×2¹ + 0×2⁰）；</li>\n<li>十进制 0.125 → 普通二进制：<code>0.001</code>（0×2⁻¹ + 0×2⁻² + 1×2⁻³）；</li>\n<li>十进制 11.25 → 普通二进制：<code>1011.01</code>（1×2³ + 0×2² + 1×2¹ + 1×2⁰ + 0×2⁻¹ + 1×2⁻²）。</li>\n</ol>\n</li>\n</ul>\n<h3>二、二进制科学计数法：“固定小数点位置 + 指数调整量级”</h3>\n<p>为了统一表示“极大/极小的二进制数”（避免写大量 0），二进制科学计数法会先把数字标准化：<strong>让小数点前只有 1 个“1”</strong>   ，再用“×2^指数”调整到原数值，<strong>核心是“用指数代替多余的 0”</strong>   。(隐含首位 1 + 指数调整)</p>\n<ul>\n<li>特点：\n<ol>\n<li>固定格式：<code>1.xxxx... × 2^n</code>（<code>xxxx...</code> 是二进制小数，<code>n</code> 是整数指数）；</li>\n<li>位数更简洁，无论数值大小，“有效数字部分”（<code>1.xxxx...</code>）的格式固定。</li>\n</ol>\n</li>\n<li>示例（对应上面普通二进制的例子）：\n<ol>\n<li>十进制 8（普通二进制 <code>1000</code>）→ 标准化：把小数点左移 3 位，得到 <code>1.000 × 2³</code>；</li>\n<li>十进制 0.125（普通二进制 <code>0.001</code>）→ 标准化：把小数点右移 3 位，得到 <code>1.000 × 2⁻³</code>；</li>\n<li>十进制 11.25（普通二进制 <code>1011.01</code>）→ 标准化：把小数点左移 3 位，得到 <code>1.01101 × 2³</code>。</li>\n</ol>\n</li>\n</ul>\n<h3>三、核心区别：什么时候用哪种？</h3>\n<table>\n<thead>\n<tr>\n<th>对比维度</th>\n<th>普通二进制</th>\n<th>二进制科学计数法</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>格式</td>\n<td>直接写全位（如 <code>1011.01</code>）</td>\n<td>固定 <code>1.xxxx×2^n</code> 格式</td>\n</tr>\n<tr>\n<td>优势</td>\n<td>直观、适合小规模数值</td>\n<td>简洁、适合极大/极小数值</td>\n</tr>\n<tr>\n<td>用途</td>\n<td>日常简单二进制计算</td>\n<td>计算机浮点数存储（IEEE 754）</td>\n</tr>\n<tr>\n<td>多余 0 的处理</td>\n<td>必须写全（如 <code>1000</code> 要写 4 位）</td>\n<td>用指数代替（<code>1000</code> 写成 <code>1.0×2³</code>，省 3 个 0）</td>\n</tr>\n</tbody>\n</table>\n<h3>一句话总结</h3>\n<p>普通二进制是“把所有位都写出来”，二进制科学计数法是“先把小数点固定在‘1’后面，再用指数告诉别人‘小数点要移多少位’”—— 后者正是计算机存储浮点数（如 JavaScript 的 Number）的底层逻辑，目的是用有限的位数（64位）表示极大范围的数值。</p>\n</div>"</script></body></html>
