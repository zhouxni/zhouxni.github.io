<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="js 按位与",document.getElementById("article").innerHTML='<div><p>一句话<br>\n<code>&amp;</code> 把两个数的<strong>每一位二进制同时做“与”运算</strong>   ，只有对应两位都是 1 结果才为 1，否则为 0。</p>\n<hr>\n<h3>1. 真值表（单比特）</h3>\n<table>\n<thead>\n<tr>\n<th>a</th>\n<th>b</th>\n<th>a &amp; b</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>0</td>\n<td>0</td>\n<td>0</td>\n</tr>\n<tr>\n<td>0</td>\n<td>1</td>\n<td>0</td>\n</tr>\n<tr>\n<td>1</td>\n<td>0</td>\n<td>0</td>\n</tr>\n<tr>\n<td>1</td>\n<td>1</td>\n<td>1</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>2. 完整 32 位示例</h3>\n<pre><code class="language-js">  <span class="hljs-number">9</span>      →  <span class="hljs-number">0000</span> … <span class="hljs-number">0000</span> <span class="hljs-number">1001</span>\n&amp; <span class="hljs-number">5</span>      →  <span class="hljs-number">0000</span> … <span class="hljs-number">0000</span> <span class="hljs-number">0101</span>\n---------   ----------------\n  <span class="hljs-number">1</span>      ←  <span class="hljs-number">0000</span> … <span class="hljs-number">0000</span> <span class="hljs-number">0001</span>\n</code></pre>\n<pre><code class="language-js"><span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-number">9</span> &amp; <span class="hljs-number">5</span>); <span class="hljs-comment">// 1</span>\n</code></pre>\n<hr>\n<h3>3. 常见用途</h3>\n<ol>\n<li>\n<p><strong>取某一位</strong></p>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> bit2 = (value &amp; <span class="hljs-number">0b0100</span>) !== <span class="hljs-number">0</span>; <span class="hljs-comment">// 判断第 2 位是否为 1</span>\n</code></pre>\n</li>\n<li>\n<p><strong>清标志位</strong></p>\n<pre><code class="language-js">flags &amp;= ~<span class="hljs-number">2</span>; <span class="hljs-comment">// 把 bit1 置 0</span>\n</code></pre>\n</li>\n<li>\n<p><strong>网络 / 颜色掩码</strong></p>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> r = (color &amp; <span class="hljs-number">0xff0000</span>) &gt;&gt; <span class="hljs-number">16</span>; <span class="hljs-comment">// 提取红色通道</span>\n</code></pre>\n</li>\n</ol>\n<hr>\n<h3>4. 口诀</h3>\n<blockquote>\n<p>“有 0 则 0，全 1 才 1”。</p>\n</blockquote>\n</div>'</script></body></html>
