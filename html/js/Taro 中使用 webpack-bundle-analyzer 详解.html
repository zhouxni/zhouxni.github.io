quot;path&quot;</span>);\n<span class="hljs-comment">// 1. 引入插件</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title class_">BundleAnalyzerPlugin</span> =\n  <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;webpack-bundle-analyzer&quot;</span>).<span class="hljs-property">BundleAnalyzerPlugin</span>;\n\n<span class="hljs-variable language_">module</span>.<span class="hljs-property">exports</span> = {\n  <span class="hljs-comment">// ... 其他配置</span>\n  <span class="hljs-title function_">webpackChain</span>(<span class="hljs-params">chain, webpack</span>) {\n    <span class="hljs-comment">// 2. 注册分析插件</span>\n    chain.<span class="hljs-title function_">plugin</span>(<span class="hljs-string">&quot;webpack-bundle-analyzer&quot;</span>).<span class="hljs-title function_">use</span>(<span class="hljs-title class_">BundleAnalyzerPlugin</span>);\n  },\n};\n</code></pre>\n<h3>方法2：推荐配置（仅开发环境生效）</h3>\n<p>生产环境打包<strong>不需要</strong>   开启分析，避免影响构建速度，推荐按环境判断：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> <span class="hljs-title class_">BundleAnalyzerPlugin</span> =\n  <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;webpack-bundle-analyzer&quot;</span>).<span class="hljs-property">BundleAnalyzerPlugin</span>;\n\n<span class="hljs-variable language_">module</span>.<span class="hljs-property">exports</span> = {\n  <span class="hljs-comment">// ... 其他配置</span>\n  <span class="hljs-title function_">webpackChain</span>(<span class="hljs-params">chain, webpack</span>) {\n    <span class="hljs-comment">// 仅开发环境开启分析</span>\n    <span class="hljs-keyword">if</span> (process.<span class="hljs-property">env</span>.<span class="hljs-property">NODE_ENV</span> === <span class="hljs-string">&quot;development&quot;</span>) {\n      chain.<span class="hljs-title function_">plugin</span>(<span class="hljs-string">&quot;webpack-bundle-analyzer&quot;</span>).<span class="hljs-title function_">use</span>(<span class="hljs-title class_">BundleAnalyzerPlugin</span>, [\n        <span class="hljs-comment">// 插件自定义配置（可选）</span>\n        {\n          <span class="hljs-attr">analyzerPort</span>: <span class="hljs-number">8888</span>, <span class="hljs-comment">// 指定端口号，避免端口冲突</span>\n          <span class="hljs-attr">openAnalyzer</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 自动打开浏览器</span>\n          <span class="hljs-attr">reportTitle</span>: <span class="hljs-string">&quot;Taro 项目打包分析&quot;</span>, <span class="hljs-comment">// 报告标题</span>\n        },\n      ]);\n    }\n  },\n};\n</code></pre>\n<hr>\n<h2>三、插件常用配置项</h2>\n<p>可根据需求自定义插件行为，完整配置如下：</p>\n<pre><code class="language-javascript">{\n  <span class="hljs-attr">analyzerPort</span>: <span class="hljs-number">8888</span>,        <span class="hljs-comment">// 启动服务的端口（默认8888）</span>\n  <span class="hljs-attr">openAnalyzer</span>: <span class="hljs-literal">true</span>,        <span class="hljs-comment">// 打包完成后自动打开浏览器（默认true）</span>\n  <span class="hljs-attr">analyzerMode</span>: <span class="hljs-string">&#x27;server&#x27;</span>,    <span class="hljs-comment">// 模式：server(启动服务) / static(生成html) / json(生成json)</span>\n  <span class="hljs-attr">reportFilename</span>: <span class="hljs-string">&#x27;report.html&#x27;</span>, <span class="hljs-comment">// 静态报告文件名（analyzerMode=static时生效）</span>\n  <span class="hljs-attr">defaultSizes</span>: <span class="hljs-string">&#x27;parsed&#x27;</span>,    <span class="hljs-comment">// 展示体积类型：parsed(解析后)/stat(源文件)/gzip(gzip压缩后)</span>\n  <span class="hljs-attr">generateStatsFile</span>: <span class="hljs-literal">false</span>,  <span class="hljs-comment">// 是否生成stats.json文件</span>\n  <span class="hljs-attr">statsFilename</span>: <span class="hljs-string">&#x27;stats.json&#x27;</span> <span class="hljs-comment">// stats文件名称</span>\n}\n</code></pre>\n<hr>\n<h2>四、启动打包并查看分析报告</h2>\n<h3>1. 执行打包命令</h3>\n<p>Taro 执行<strong>生产环境打包</strong>   （分析生产体积最有意义）：</p>\n<pre><code class="language-bash"><span class="hljs-comment"># 微信小程序（最常用）</span>\nnpm run build:weapp\n\n<span class="hljs-comment"># 支付宝小程序</span>\nnpm run build:alipay\n\n<span class="hljs-comment"># H5</span>\nnpm run build:h5\n</code></pre>\n<h3>2. 查看报告</h3>\n<p>打包完成后，浏览器会<strong>自动打开</strong>   <code>http://127.0.0.1:8888</code>（端口以配置为准），展示可视化体积图：</p>\n<ul>\n<li><strong>方块越大</strong>   ：文件/依赖体积越大</li>\n<li><strong>颜色区分</strong>   ：不同模块/依赖包</li>\n<li><strong>鼠标悬浮</strong>   ：显示详细体积、路径、Gzip 体积</li>\n</ul>\n<hr>\n<h2>五、通过分析报告做体积优化（实战技巧）</h2>\n<p>这是使用插件的核心目的，结合报告快速优化：</p>\n<h3>1. 剔除冗余依赖</h3>\n<ul>\n<li>发现<strong>未使用的大库</strong>   （如 moment、lodash 全量包），直接卸载</li>\n<li>替换轻量库：<code>moment.js</code> → <code>day.js</code>、<code>lodash</code> → <code>lodash-es</code></li>\n</ul>\n<h3>2. 按需引入第三方库</h3>\n<p>避免全量引入，用 ES Module 按需加载：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 坏：全量引入（体积大）</span>\n<span class="hljs-keyword">import</span> _ <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;lodash&quot;</span>;\n<span class="hljs-comment">// 好：按需引入</span>\n<span class="hljs-keyword">import</span> { debounce } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;lodash-es&quot;</span>;\n</code></pre>\n<h3>3. 拆分大体积业务代码</h3>\n<ul>\n<li>方块超大的业务文件，拆分为多个小模块</li>\n<li>开启 Taro 路由<strong>懒加载</strong>   （H5/小程序通用）</li>\n</ul>\n<h3>4. 忽略无用文件</h3>\n<p>通过 Webpack 排除大体积无用文件（如语言包）：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// config/index.js</span>\n<span class="hljs-title function_">webpackChain</span>(<span class="hljs-params">chain</span>) {\n  <span class="hljs-comment">// 忽略 moment 语言包</span>\n  chain.<span class="hljs-title function_">plugin</span>(<span class="hljs-string">&#x27;ignore&#x27;</span>).<span class="hljs-title function_">use</span>(webpack.<span class="hljs-property">IgnorePlugin</span>, [<span class="hljs-regexp">/^\\.\\/locale$/</span>, <span class="hljs-regexp">/moment$/</span>])\n}\n</code></pre>\n<h3>5. 开启 Gzip 压缩</h3>\n<p>Taro 生产环境默认开启，分析报告可查看 Gzip 后体积，验证优化效果。</p>\n<hr>\n<h2>六、常见问题解决</h2>\n<h3>1. 端口被占用</h3>\n<p>修改配置中的 <code>analyzerPort</code> 为其他端口（如 9999）即可。</p>\n<h3>2. 插件不生效</h3>\n<ul>\n<li>检查依赖是否安装成功</li>\n<li>确认 <code>webpackChain</code> 配置正确</li>\n<li>清理缓存：<code>taro clean</code> 后重新打包</li>\n</ul>\n<h3>3. 小程序体积超限</h3>\n<p>重点分析 <code>node_modules</code> 下的大体积依赖，优先优化第三方库。</p>\n<hr>\n<h3>总结</h3>\n<ol>\n<li>安装 <code>webpack-bundle-analyzer</code> 开发依赖</li>\n<li>在 <code>config/index.js</code> 的 <code>webpackChain</code> 中注册插件（推荐仅开发环境开启）</li>\n<li>执行 <code>build</code> 命令，浏览器查看可视化体积报告</li>\n<li>根据报告定位大体积依赖，做按需引入、替换轻量库、代码拆分优化</li>\n</ol>\n<p>这套配置能帮你精准定位 Taro 项目打包体积问题，快速实现体积优化。</p>\n</div>'</script></body></html>
