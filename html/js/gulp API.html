<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="gulp API",document.getElementById("article").innerHTML="<div><p>Gulp 提供了多个 API 用于实现各种自动化构建任务，以下是 Gulp 常用的 API 归纳：</p>\n<h3>1. <strong>gulp.task()</strong></h3>\n<ul>\n<li><strong>作用</strong>  ：创建一个任务。</li>\n<li><strong>语法</strong>  ：<code>gulp.task(name[, deps], fn)</code>\n<ul>\n<li><code>name</code>：任务名称。</li>\n<li><code>deps</code>（可选）：依赖的任务数组，当前任务会在依赖任务完成后执行。</li>\n<li><code>fn</code>：任务函数，定义任务的具体操作。</li>\n</ul>\n</li>\n</ul>\n<h3>2. <strong>gulp.src()</strong></h3>\n<ul>\n<li><strong>作用</strong>  ：指定需要处理的源文件。</li>\n<li><strong>语法</strong>  ：<code>gulp.src(globs[, options])</code>\n<ul>\n<li><code>globs</code>：文件匹配模式，可以是字符串或数组。</li>\n<li><code>options</code>（可选）：配置对象，包含如 <code>buffer</code>、<code>read</code>、<code>base</code> 等选项。</li>\n</ul>\n</li>\n</ul>\n<h3>3. <strong>gulp.dest()</strong></h3>\n<ul>\n<li><strong>作用</strong>  ：指定处理后的文件输出路径。</li>\n<li><strong>语法</strong>  ：<code>gulp.dest(path[, options])</code>\n<ul>\n<li><code>path</code>：输出目录的路径。</li>\n<li><code>options</code>（可选）：配置对象，包含如 <code>cwd</code>、<code>mode</code> 等选项。</li>\n</ul>\n</li>\n</ul>\n<h3>4. <strong>gulp.watch()</strong></h3>\n<ul>\n<li><strong>作用</strong>  ：监视文件变化，并在文件变化时执行指定任务。</li>\n<li><strong>语法</strong>  ：<code>gulp.watch(glob[, opts], tasks)</code> 或 <code>gulp.watch(glob[, opts, cb])</code>\n<ul>\n<li><code>glob</code>：文件匹配模式。</li>\n<li><code>opts</code>（可选）：配置对象，包含如 <code>interval</code>、<code>debounceDelay</code> 等选项。</li>\n<li><code>tasks</code>：任务数组，文件变化后执行的任务。</li>\n<li><code>cb</code>（可选）：回调函数，文件变化时调用。</li>\n</ul>\n</li>\n</ul>\n<h3>5. <strong>gulp.series()</strong></h3>\n<ul>\n<li><strong>作用</strong>  ：按顺序执行多个任务。</li>\n<li><strong>语法</strong>  ：<code>gulp.series(task1, task2, ...)</code></li>\n</ul>\n<h3>6. <strong>gulp.parallel()</strong></h3>\n<ul>\n<li><strong>作用</strong>  ：并行执行多个任务。</li>\n<li><strong>语法</strong>  ：<code>gulp.parallel(task1, task2, ...)</code></li>\n</ul>\n<h3>7. <strong>pipe()</strong></h3>\n<ul>\n<li><strong>作用</strong>  ：将流从一个插件传递到另一个插件。</li>\n<li><strong>示例</strong>  ：<code>gulp.src().pipe(插件1()).pipe(插件2()).pipe(gulp.dest())</code></li>\n</ul>\n<h3>其他相关说明</h3>\n<ul>\n<li><strong>文件匹配模式</strong>  ：Gulp 使用类似正则表达式的文件匹配模式（glob），如 <code>*</code>、<code>**</code>、<code>?</code>、<code>[]</code>、<code>!</code> 等，用于匹配文件路径。</li>\n<li><strong>插件使用</strong>  ：Gulp 的插件生态丰富，可以通过 <code>require</code> 或 <code>import</code> 加载插件，并在任务中使用。</li>\n<li><strong>流式处理</strong>  ：Gulp 基于 Node.js 的流（stream）进行文件和数据的读取操作，能减少 I/O 次数，提高构建效率。</li>\n</ul>\n<p>这些 API 共同构成了 Gulp 的核心功能，使得开发者能够轻松实现各种自动化构建任务。</p>\n</div>"</script></body></html>
