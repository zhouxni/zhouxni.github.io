<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Object.is 与 === 区别",document.getElementById("article").innerHTML='<div><p><code>Object.is</code> 和严格相等运算符 <code>===</code> 的作用非常相似，但在处理 <strong>NaN、+0 和 -0</strong>   时有细微差异。下面用一句话先给出结论，再分点展开：</p>\n<blockquote>\n<p><code>Object.is</code> 是“更精确的 <code>===</code>”，唯一区别是：把 <code>NaN</code> 视为等于 <code>NaN</code>，把 <code>+0</code> 和 <code>-0</code> 视为不相等。</p>\n</blockquote>\n<h3>1. 行为对比表</h3>\n<table>\n<thead>\n<tr>\n<th>比较场景</th>\n<th><code>===</code></th>\n<th><code>Object.is</code></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>NaN === NaN</code></td>\n<td><code>false</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>+0 === -0</code></td>\n<td><code>true</code></td>\n<td><code>false</code></td>\n</tr>\n<tr>\n<td>其余情况</td>\n<td>与 <code>Object.is</code> 结果相同</td>\n<td>与 <code>===</code> 结果相同</td>\n</tr>\n</tbody>\n</table>\n<h3>2. 代码验证</h3>\n<pre><code class="language-js"><span class="hljs-comment">// NaN 场景</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title class_">NaN</span> === <span class="hljs-title class_">NaN</span>); <span class="hljs-comment">// false</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title class_">Object</span>.<span class="hljs-title function_">is</span>(<span class="hljs-title class_">NaN</span>, <span class="hljs-title class_">NaN</span>)); <span class="hljs-comment">// true</span>\n\n<span class="hljs-comment">// +0 -0 场景</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(+<span class="hljs-number">0</span> === -<span class="hljs-number">0</span>); <span class="hljs-comment">// true</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title class_">Object</span>.<span class="hljs-title function_">is</span>(+<span class="hljs-number">0</span>, -<span class="hljs-number">0</span>)); <span class="hljs-comment">// false</span>\n\n<span class="hljs-comment">// 其余情况完全一致</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-number">42</span> === <span class="hljs-number">42</span>); <span class="hljs-comment">// true</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title class_">Object</span>.<span class="hljs-title function_">is</span>(<span class="hljs-number">42</span>, <span class="hljs-number">42</span>)); <span class="hljs-comment">// true</span>\n\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;a&quot;</span> === <span class="hljs-string">&quot;a&quot;</span>); <span class="hljs-comment">// true</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title class_">Object</span>.<span class="hljs-title function_">is</span>(<span class="hljs-string">&quot;a&quot;</span>, <span class="hljs-string">&quot;a&quot;</span>)); <span class="hljs-comment">// true</span>\n\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-literal">null</span> === <span class="hljs-literal">null</span>); <span class="hljs-comment">// true</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title class_">Object</span>.<span class="hljs-title function_">is</span>(<span class="hljs-literal">null</span>, <span class="hljs-literal">null</span>)); <span class="hljs-comment">// true</span>\n\n<span class="hljs-keyword">const</span> obj = {};\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(obj === obj); <span class="hljs-comment">// true</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title class_">Object</span>.<span class="hljs-title function_">is</span>(obj, obj)); <span class="hljs-comment">// true</span>\n</code></pre>\n<h3>3. 何时用 <code>Object.is</code>？</h3>\n<ul>\n<li>需要“<strong>正确</strong>   ”判断 <code>NaN</code> 是否相等（例如算法、polyfill）。</li>\n<li>需要区分 <code>+0</code> 和 <code>-0</code>（在数学/数值库中偶尔有用）。</li>\n</ul>\n<p>日常业务代码里 99% 的场景，<code>===</code> 已足够；只有在你明确需要上述两种特殊语义时才选 <code>Object.is</code>。</p>\n</div>'</script></body></html>
