<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="React 19 有哪些重要更新",document.getElementById("article").innerHTML='<div><p>React 19 带来了多项重要更新，主要围绕简化状态管理、增强服务器组件能力、优化用户交互体验等方面，以下是关键新增内容：</p>\n<h3>1. 服务器组件增强</h3>\n<ul>\n<li>\n<p><strong>服务器操作（Server Actions）稳定化</strong>   ：允许在服务器组件中直接定义异步操作（如表单提交、数据修改），通过 <code>\'use server\'</code> 指令标记，自动处理客户端与服务器的通信，无需手动编写 API 调用。</p>\n<pre><code class="language-jsx"><span class="hljs-comment">// 服务器组件中定义</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">submitForm</span>(<span class="hljs-params">formData</span>) {\n  <span class="hljs-string">&quot;use server&quot;</span>;\n  <span class="hljs-keyword">await</span> <span class="hljs-title function_">saveToDatabase</span>(formData);\n}\n\n<span class="hljs-comment">// 客户端组件中直接调用</span>\n&lt;form action={submitForm}&gt;...&lt;/form&gt;;\n</code></pre>\n</li>\n<li>\n<p><strong>流式渲染（Streaming Rendering）优化</strong>   ：支持将渲染工作分块发送到客户端，优先显示页面骨架或关键内容，提升感知性能。</p>\n</li>\n</ul>\n<h3>2. 客户端状态管理简化</h3>\n<ul>\n<li>\n<p><strong><code>useState</code> 自动批处理优化</strong>   ：现在所有状态更新（包括 promise 回调、setTimeout 等异步场景）都会自动批处理，减少不必要的重渲染。</p>\n</li>\n<li>\n<p><strong><code>useTransition</code> 与 <code>useDeferredValue</code> 增强</strong>   ：更精准地控制状态更新优先级，区分紧急更新（如输入框）和非紧急更新（如列表过滤），避免界面卡顿。</p>\n</li>\n</ul>\n<h3>3. 表单与交互改进</h3>\n<ul>\n<li>\n<p><strong>内置表单处理</strong>   ：新增 <code>useFormStatus</code> 和 <code>useFormState</code> 钩子，简化表单提交状态（加载中、成功/失败）的管理：</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { useFormStatus } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react-dom&quot;</span>;\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">SubmitButton</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> { pending } = <span class="hljs-title function_">useFormStatus</span>();\n  <span class="hljs-keyword">return</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">disabled</span>=<span class="hljs-string">{pending}</span>&gt;</span>提交<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span></span>;\n}\n</code></pre>\n</li>\n<li>\n<p><strong>自动表单验证</strong>   ：支持通过 <code>formAction</code> 与 HTML5 验证属性（如 <code>required</code>、<code>pattern</code>）结合，简化验证逻辑。</p>\n</li>\n</ul>\n<h3>4. 其他重要更新</h3>\n<ul>\n<li>\n<p><strong><code>use</code> 钩子</strong>   ：用于在组件中处理异步数据（如 Promise），支持直接在 JSX 中等待异步结果，替代部分 <code>useEffect</code> + 状态的模式：</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">function</span> <span class="hljs-title function_">UserProfile</span>(<span class="hljs-params">{ userId }</span>) {\n  <span class="hljs-keyword">const</span> user = <span class="hljs-title function_">use</span>(<span class="hljs-title function_">fetchUser</span>(userId));\n  <span class="hljs-keyword">return</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{user.name}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>;\n}\n</code></pre>\n</li>\n<li>\n<p><strong>废弃与迁移</strong>   ：逐步废弃 <code>ReactDOM.render</code>，推荐使用 <code>createRoot</code>；<code>React.Suspense</code> 支持范围扩大，可用于更多异步场景。</p>\n</li>\n<li>\n<p><strong>性能优化</strong>   ：减少内存占用，优化重渲染逻辑，对大型列表渲染等场景有显著提升。</p>\n</li>\n</ul>\n<p>这些更新进一步模糊了客户端与服务器代码的界限，简化了数据交互流程，并强化了 React 在性能和用户体验方面的表现。升级时需注意部分 API 的废弃迁移，建议结合官方文档进行适配。</p>\n</div>'</script></body></html>
