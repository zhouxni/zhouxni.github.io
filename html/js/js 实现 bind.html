<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="js 实现 bind",document.getElementById("article").innerHTML='<div><p>在 JavaScript 中，<code>bind()</code> 方法用于创建一个新的函数，并将原函数的 <code>this</code> 绑定到指定的对象，同时可以预先传入部分参数（柯里化）。以下是手写实现 <code>bind</code> 的代码及详细解析：</p>\n<hr>\n<h3><strong>手写 <code>bind</code> 实现</strong></h3>\n<pre><code class="language-javascript"><span class="hljs-title class_">Function</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">myBind</span> = <span class="hljs-keyword">function</span>(<span class="hljs-params">context, ...args</span>) {\n  <span class="hljs-comment">// 1. 检查调用者是否为函数</span>\n  <span class="hljs-keyword">if</span> (<span class="hljs-keyword">typeof</span> <span class="hljs-variable language_">this</span> !== <span class="hljs-string">&#x27;function&#x27;</span>) {\n    <span class="hljs-keyword">throw</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">TypeError</span>(<span class="hljs-string">&#x27;Bind must be called on a function&#x27;</span>);\n  }\n\n  <span class="hljs-comment">// 2. 保存原函数的引用</span>\n  <span class="hljs-keyword">const</span> originalFunc = <span class="hljs-variable language_">this</span>;\n\n  <span class="hljs-comment">// 3. 返回一个新的绑定函数</span>\n  <span class="hljs-keyword">return</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">boundFunc</span>(<span class="hljs-params">...innerArgs</span>) {\n    <span class="hljs-comment">// 4. 判断是否通过 new 调用（绑定函数作为构造函数）</span>\n    <span class="hljs-keyword">const</span> isNewCall = <span class="hljs-keyword">new</span>.<span class="hljs-property">target</span> !== <span class="hljs-literal">undefined</span>;\n\n    <span class="hljs-comment">// 5. 动态绑定 this：</span>\n    <span class="hljs-comment">//    - 如果是 new 调用，this 指向新创建的对象（忽略绑定的 context）</span>\n    <span class="hljs-comment">//    - 否则 this 指向绑定的 context</span>\n    <span class="hljs-keyword">const</span> thisArg = isNewCall ? <span class="hljs-variable language_">this</span> : context;\n\n    <span class="hljs-comment">// 6. 执行原函数，合并预置参数和新参数</span>\n    <span class="hljs-keyword">return</span> originalFunc.<span class="hljs-title function_">apply</span>(thisArg, [...args, ...innerArgs]);\n  };\n};\n</code></pre>\n<hr>\n<h3><strong>关键点解析</strong></h3>\n<ol>\n<li><strong>绑定 <code>this</code> 和参数</strong>\n<ul>\n<li><code>context</code> 是绑定的 <code>this</code> 值，<code>args</code> 是预先传入的参数。</li>\n<li>返回的新函数 (<code>boundFunc</code>) 可以继续接收剩余参数 (<code>innerArgs</code>)。</li>\n</ul>\n</li>\n<li><strong>处理 <code>new</code> 调用</strong>\n<ul>\n<li>如果通过 <code>new</code> 调用绑定后的函数（如 <code>new boundFunc()</code>），<code>this</code> 应指向新创建的对象，而不是绑定的 <code>context</code>。</li>\n<li>通过 <code>new.target</code> 检测是否通过 <code>new</code> 调用。</li>\n</ul>\n</li>\n<li><strong>参数合并</strong>\n<ul>\n<li>将预置参数 (<code>args</code>) 和调用时传入的参数 (<code>innerArgs</code>) 合并后传递给原函数。</li>\n</ul>\n</li>\n<li><strong>类型检查</strong>\n<ul>\n<li>确保调用者 (<code>this</code>) 是函数，否则抛出错误。</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h3><strong>使用示例</strong></h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> person = {\n  <span class="hljs-attr">name</span>: <span class="hljs-string">&#x27;Alice&#x27;</span>\n};\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">greet</span>(<span class="hljs-params">greeting, punctuation</span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">`<span class="hljs-subst">${greeting}</span>, <span class="hljs-subst">${<span class="hljs-variable language_">this</span>.name}</span><span class="hljs-subst">${punctuation}</span>`</span>);\n}\n\n<span class="hljs-comment">// 绑定 this 和部分参数</span>\n<span class="hljs-keyword">const</span> boundGreet = greet.<span class="hljs-title function_">myBind</span>(person, <span class="hljs-string">&#x27;Hello&#x27;</span>);\n<span class="hljs-title function_">boundGreet</span>(<span class="hljs-string">&#x27;!&#x27;</span>); <span class="hljs-comment">// 输出: &quot;Hello, Alice!&quot;</span>\n\n<span class="hljs-comment">// 测试 new 调用</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title class_">BoundConstructor</span> = greet.<span class="hljs-title function_">myBind</span>(person, <span class="hljs-string">&#x27;Hi&#x27;</span>);\n<span class="hljs-keyword">const</span> obj = <span class="hljs-keyword">new</span> <span class="hljs-title class_">BoundConstructor</span>(<span class="hljs-string">&#x27;?&#x27;</span>); \n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(obj); <span class="hljs-comment">// 输出: {}（this 指向新对象，原函数未返回对象）</span>\n</code></pre>\n<hr>\n<h3><strong>与原版 <code>bind</code> 的差异</strong></h3>\n<ol>\n<li><strong>更简化的实现</strong>\n<ul>\n<li>原生 <code>bind</code> 还会设置函数的 <code>name</code> 和 <code>length</code> 属性（如 <code>bound greet</code>），此处未实现。</li>\n</ul>\n</li>\n<li><strong>无原型链处理</strong>\n<ul>\n<li>原生 <code>bind</code> 返回的函数没有 <code>prototype</code>，但手写版本未处理这一点（若需完全模拟，需额外判断 <code>new</code> 调用时的原型链）。</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h3><strong>完整实现（支持原型链）</strong></h3>\n<p>如需完全模拟原生 <code>bind</code>，可添加原型链处理：</p>\n<pre><code class="language-javascript"><span class="hljs-title class_">Function</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">myBind</span> = <span class="hljs-keyword">function</span>(<span class="hljs-params">context, ...args</span>) {\n  <span class="hljs-keyword">if</span> (<span class="hljs-keyword">typeof</span> <span class="hljs-variable language_">this</span> !== <span class="hljs-string">&#x27;function&#x27;</span>) {\n    <span class="hljs-keyword">throw</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">TypeError</span>(<span class="hljs-string">&#x27;Bind must be called on a function&#x27;</span>);\n  }\n\n  <span class="hljs-keyword">const</span> originalFunc = <span class="hljs-variable language_">this</span>;\n\n  <span class="hljs-keyword">const</span> boundFunc = <span class="hljs-keyword">function</span>(<span class="hljs-params">...innerArgs</span>) {\n    <span class="hljs-keyword">const</span> isNewCall = <span class="hljs-keyword">new</span>.<span class="hljs-property">target</span> !== <span class="hljs-literal">undefined</span>;\n    <span class="hljs-keyword">const</span> thisArg = isNewCall ? <span class="hljs-variable language_">this</span> : context;\n    <span class="hljs-keyword">return</span> originalFunc.<span class="hljs-title function_">apply</span>(thisArg, [...args, ...innerArgs]);\n  };\n\n  <span class="hljs-comment">// 维护原型链</span>\n  boundFunc.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span> = <span class="hljs-title class_">Object</span>.<span class="hljs-title function_">create</span>(originalFunc.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>);\n  <span class="hljs-keyword">return</span> boundFunc;\n};\n</code></pre>\n<hr>\n<h3><strong>总结</strong></h3>\n<ul>\n<li>手写 <code>bind</code> 的核心是<strong>闭包保存原函数</strong>  和<strong>动态绑定 <code>this</code></strong>  。</li>\n<li>需特别注意 <code>new</code> 调用时的 <code>this</code> 指向问题。</li>\n<li>完整实现还需处理函数属性（如 <code>name</code>、<code>length</code>）和原型链，但上述代码已覆盖核心功能。</li>\n</ul>\n</div>'</script></body></html>
