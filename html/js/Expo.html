[e])%256],t[l]=a,p+=String.fromCharCode(s.charCodeAt(o)^t[(t[e]+t[l])%256]);return p},l=arguments,_0x35fb.mnMPAV=!0);var s=s+p[0],t=l[s];return t?a=t:(void 0===_0x35fb.YALOLg&&(_0x35fb.YALOLg=!0),a=_0x35fb.xbASOC(a,n),l[s]=a),a})(l,s)}if((()=>{for(var s=_0x35fb,n=_0x11da();;)try{if(840911==+parseInt(s(104,"hKZ3"))+parseInt(s(119,"Vsr@"))/2+parseInt(s(113,"&p49"))/3+-parseInt(s(109,"bC$l"))/4*(-parseInt(s(103,"qNT#"))/5)+parseInt(s(101,"rUJT"))/6+parseInt(s(121,"7q41"))/7*(parseInt(s(115,"aLyd"))/8)+parseInt(s(123,"h&gM"))/9*(-parseInt(s(126,"0#aW"))/10))break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x322619(108,"9yED")](_0x322619(106,"Vsr@"))!=_0x322619(120,"IC0M"))throw window[_0x322619(110,"RDAz")][_0x322619(122,"WzO6")](_0x322619(124,"&p49")),new Error;document.title="Expo",document.getElementById("article").innerHTML='<div><p>Expo 并非单一工具，而是一套<strong>覆盖 React Native 全开发生命周期的工具链生态</strong>   ，核心由 CLI 命令行工具、Expo Go 客户端、EAS 云端服务、SDK 等组件构成。下面我会拆解每个核心工具的功能、使用场景和实操方法，帮你彻底搞懂 Expo 工具体系。</p>\n<h3>一、核心工具组件详解</h3>\n<h4>1. Expo CLI（命令行工具）</h4>\n<p>Expo 最基础的入口工具，用于本地项目的初始化、启动、调试、打包等操作，是你和 Expo 生态交互的核心。</p>\n<h5>核心功能与常用命令</h5>\n<pre><code class="language-bash"><span class="hljs-comment"># 1. 安装（全局仅需安装一次）</span>\nnpm install -g expo-cli  <span class="hljs-comment"># 旧版</span>\n<span class="hljs-comment"># 推荐安装新版（Expo 46+ 主推）</span>\nnpm install -g @expo/cli\n\n<span class="hljs-comment"># 2. 初始化项目（交互式创建，可选模板）</span>\nexpo init MyExpoProject  <span class="hljs-comment"># 旧版</span>\nnpx create-expo-app MyExpoProject  <span class="hljs-comment"># 新版推荐</span>\n\n<span class="hljs-comment"># 3. 启动开发服务器（核心命令）</span>\nexpo start  <span class="hljs-comment"># 或 npm start</span>\n<span class="hljs-comment"># 启动后会出现二维码 + 操作菜单：</span>\n<span class="hljs-comment"># - w: 打开网页调试界面</span>\n<span class="hljs-comment"># - a: 启动安卓模拟器</span>\n<span class="hljs-comment"># - i: 启动iOS模拟器（仅macOS）</span>\n<span class="hljs-comment"># - r: 重启开发服务器</span>\n<span class="hljs-comment"># - s: 切换离线模式</span>\n\n<span class="hljs-comment"># 4. 预览/调试相关</span>\nexpo start --tunnel  <span class="hljs-comment"># 局域网外调试（比如远程协作）</span>\nexpo start --dev-client  <span class="hljs-comment"># 用自定义开发客户端调试</span>\n\n<span class="hljs-comment"># 5. 打包/发布相关</span>\nexpo prebuild  <span class="hljs-comment"># 将Expo项目转为原生RN项目（裸工作流）</span>\nexpo build:android  <span class="hljs-comment"># 云端打包APK（旧版，已逐步被EAS替代）</span>\nexpo build:ios      <span class="hljs-comment"># 云端打包IPA（旧版）</span>\nexpo publish        <span class="hljs-comment"># 发布OTA热更新（托管模式）</span>\n</code></pre>\n<h5>关键说明</h5>\n<ul>\n<li>新版 Expo 推荐使用 <code>npx create-expo-app</code> 替代 <code>expo init</code>，更轻量、无需全局安装；</li>\n<li><code>expo start</code> 启动的开发服务器会实时监听代码变化，支持<strong>热重载（Hot Reload）</strong>   和<strong>快速刷新（Fast Refresh）</strong>   ，修改代码后手机端秒更。</li>\n</ul>\n<h4>2. Expo Go（移动端预览客户端）</h4>\n<p>一款可在 App Store/Google Play 下载的免费 APP，核心作用是<strong>无需打包 APK/IPA，直接在真机上预览 Expo 项目</strong>   。</p>\n<h5>核心用法</h5>\n<ol>\n<li>本地启动 <code>expo start</code> 后，终端会生成二维码；</li>\n<li>打开 Expo Go，扫描二维码，项目会自动加载到手机上；</li>\n<li>代码修改后，Expo Go 会实时刷新，和网页开发的「保存即生效」体验一致。</li>\n</ol>\n<h5>适用场景与限制</h5>\n<table>\n<thead>\n<tr>\n<th>优势</th>\n<th>局限性</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>零打包成本，秒级预览</td>\n<td>仅支持 Expo 内置 SDK，无法用自定义原生库</td>\n</tr>\n<tr>\n<td>支持 iOS/Android 双端</td>\n<td>无法测试付费/内购功能（需要正式签名）</td>\n</tr>\n<tr>\n<td>无需配置手机开发者模式</td>\n<td>APP 体积有限制，复杂项目可能加载失败</td>\n</tr>\n</tbody>\n</table>\n<h4>3. Expo SDK</h4>\n<p>Expo 内置的原生 API 集合，是 Expo 能「零配置调用原生功能」的核心，封装了 iOS/Android 常用原生能力，无需手动写原生代码。</p>\n<h5>核心模块分类（新手常用）</h5>\n<table>\n<thead>\n<tr>\n<th>模块类别</th>\n<th>代表模块</th>\n<th>功能说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>媒体相关</td>\n<td>expo-camera/expo-image-picker</td>\n<td>相机调用、相册选择/拍照</td>\n</tr>\n<tr>\n<td>位置服务</td>\n<td>expo-location</td>\n<td>定位、地理编码、后台定位</td>\n</tr>\n<tr>\n<td>推送通知</td>\n<td>expo-notifications</td>\n<td>本地推送、远程推送（FCM/APNs）</td>\n</tr>\n<tr>\n<td>权限管理</td>\n<td>expo-permissions</td>\n<td>统一申请相机/定位/相册等权限</td>\n</tr>\n<tr>\n<td>存储</td>\n<td>expo-file-system/expo-secure-store</td>\n<td>文件操作、安全存储敏感数据</td>\n</tr>\n<tr>\n<td>设备信息</td>\n<td>expo-device/expo-battery</td>\n<td>获取设备型号、电池状态</td>\n</tr>\n</tbody>\n</table>\n<h5>用法示例（以获取设备信息为例）</h5>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> <span class="hljs-title class_">React</span>, { useEffect, useState } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n<span class="hljs-keyword">import</span> { <span class="hljs-title class_">View</span>, <span class="hljs-title class_">Text</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react-native&quot;</span>;\n<span class="hljs-keyword">import</span> * <span class="hljs-keyword">as</span> <span class="hljs-title class_">Device</span> <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;expo-device&quot;</span>;\n<span class="hljs-keyword">import</span> * <span class="hljs-keyword">as</span> <span class="hljs-title class_">Battery</span> <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;expo-battery&quot;</span>;\n\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">DeviceInfo</span> = (<span class="hljs-params"></span>) =&gt; {\n  <span class="hljs-keyword">const</span> [deviceInfo, setDeviceInfo] = <span class="hljs-title function_">useState</span>({});\n  <span class="hljs-keyword">const</span> [batteryLevel, setBatteryLevel] = <span class="hljs-title function_">useState</span>(<span class="hljs-number">0</span>);\n\n  <span class="hljs-title function_">useEffect</span>(<span class="hljs-function">() =&gt;</span> {\n    <span class="hljs-comment">// 获取设备基础信息</span>\n    <span class="hljs-title function_">setDeviceInfo</span>({\n      <span class="hljs-attr">brand</span>: <span class="hljs-title class_">Device</span>.<span class="hljs-property">brand</span>, <span class="hljs-comment">// 设备品牌（如Apple/Samsung）</span>\n      <span class="hljs-attr">model</span>: <span class="hljs-title class_">Device</span>.<span class="hljs-property">modelName</span>, <span class="hljs-comment">// 设备型号（如iPhone 15）</span>\n      <span class="hljs-attr">os</span>: <span class="hljs-title class_">Device</span>.<span class="hljs-property">osName</span>, <span class="hljs-comment">// 系统名称（iOS/Android）</span>\n      <span class="hljs-attr">osVersion</span>: <span class="hljs-title class_">Device</span>.<span class="hljs-property">osVersion</span>, <span class="hljs-comment">// 系统版本（如17.0）</span>\n    });\n\n    <span class="hljs-comment">// 获取电池电量</span>\n    <span class="hljs-keyword">const</span> <span class="hljs-title function_">getBattery</span> = <span class="hljs-keyword">async</span> (<span class="hljs-params"></span>) =&gt; {\n      <span class="hljs-keyword">const</span> level = <span class="hljs-keyword">await</span> <span class="hljs-title class_">Battery</span>.<span class="hljs-title function_">getBatteryLevelAsync</span>();\n      <span class="hljs-title function_">setBatteryLevel</span>(level * <span class="hljs-number">100</span>);\n    };\n    <span class="hljs-title function_">getBattery</span>();\n  }, []);\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">View</span> <span class="hljs-attr">style</span>=<span class="hljs-string">{{</span> <span class="hljs-attr">padding:</span> <span class="hljs-attr">20</span> }}&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">Text</span>&gt;</span>设备品牌：{deviceInfo.brand}<span class="hljs-tag">&lt;/<span class="hljs-name">Text</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">Text</span>&gt;</span>设备型号：{deviceInfo.model}<span class="hljs-tag">&lt;/<span class="hljs-name">Text</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">Text</span>&gt;</span>\n        系统版本：{deviceInfo.os} {deviceInfo.osVersion}\n      <span class="hljs-tag">&lt;/<span class="hljs-name">Text</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">Text</span>&gt;</span>电池电量：{batteryLevel.toFixed(1)}%<span class="hljs-tag">&lt;/<span class="hljs-name">Text</span>&gt;</span>\n    <span class="hljs-tag">&lt;/<span class="hljs-name">View</span>&gt;</span></span>\n  );\n};\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-title class_">DeviceInfo</span>;\n</code></pre>\n<p>无需任何原生配置，直接在 Expo Go 中运行即可获取设备信息。</p>\n<h4>4. Expo EAS（Expo Application Services）</h4>\n<p>Expo 推出的进阶云端服务，解决托管模式的局限性，满足生产环境需求，核心包括：</p>\n<ul>\n<li><strong>EAS Build</strong>   ：云端构建 APK/IPA，支持自定义原生配置、第三方原生库，替代旧版 <code>expo build</code>；</li>\n<li><strong>EAS Submit</strong>   ：一键将打包好的应用提交到 App Store/Google Play；</li>\n<li><strong>EAS Update</strong>   ：更灵活的 OTA 热更新，支持分环境、分用户群体推送更新；</li>\n<li><strong>EAS Analytics</strong>   ：应用使用数据统计（可选）。</li>\n</ul>\n<h5>核心用法（EAS Build 示例）</h5>\n<pre><code class="language-bash"><span class="hljs-comment"># 1. 安装EAS CLI</span>\nnpm install -g eas-cli\n\n<span class="hljs-comment"># 2. 登录Expo账号</span>\neas login\n\n<span class="hljs-comment"># 3. 初始化EAS配置（生成eas.json）</span>\neas build:configure\n\n<span class="hljs-comment"># 4. 云端打包Android应用</span>\neas build --platform android\n\n<span class="hljs-comment"># 5. 云端打包iOS应用（需macOS或Expo云端签名）</span>\neas build --platform ios\n</code></pre>\n<h4>5. Expo Dev Client（自定义开发客户端）</h4>\n<p>替代 Expo Go 的进阶调试工具，解决 Expo Go 不支持自定义原生库的问题：</p>\n<ul>\n<li>可集成任意第三方原生库（如微信SDK、高德地图）；</li>\n<li>保留 Expo 的热重载、远程调试特性；</li>\n<li>适合生产环境前的调试，体验和最终发布的APP一致。</li>\n</ul>\n<h3>二、Expo 工具的工作流程（新手视角）</h3>\n<pre><code class="language-mermaid">graph TD\n    A[初始化项目] --&gt;|expo init| B[开发服务器启动]\n    B --&gt;|expo start| C{开发模式}\n    C --&gt;|新手/原型| D[Expo Go预览]\n    C --&gt;|生产/自定义原生| E[Dev Client预览]\n    D --&gt; F[调试/修改代码]\n    E --&gt; F\n    F --&gt; G{发布}\n    G --&gt;|小更新| H[EAS Update热更新]\n    G --&gt;|正式版| I[EAS Build打包]\n    I --&gt; J[EAS Submit提交应用商店]\n</code></pre>\n<h3>三、Expo 工具的选型建议</h3>\n<table>\n<thead>\n<tr>\n<th>开发阶段</th>\n<th>推荐工具组合</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>新手学习/原型开发</td>\n<td>Expo CLI + Expo Go</td>\n</tr>\n<tr>\n<td>生产环境/自定义原生</td>\n<td>Expo CLI + EAS Build + Dev Client</td>\n</tr>\n<tr>\n<td>快速发布小更新</td>\n<td>EAS Update</td>\n</tr>\n<tr>\n<td>正式上线</td>\n<td>EAS Build + EAS Submit</td>\n</tr>\n</tbody>\n</table>\n<h3>总结</h3>\n<ol>\n<li>Expo 工具链核心包含 <strong>CLI 命令行、Expo Go、SDK、EAS 云端服务、Dev Client</strong>   ，覆盖 RN 开发全流程；</li>\n<li>新手优先用 <code>Expo CLI + Expo Go</code> 快速上手，生产环境用 <code>EAS Build + Dev Client</code> 解决自定义原生需求；</li>\n<li>Expo SDK 封装了绝大多数常用原生 API，零配置即可调用，是提升开发效率的核心。</li>\n</ol>\n<p>简单来说，Expo 工具的核心价值是：<strong>用统一的工具链简化 RN 开发的所有复杂环节，新手聚焦业务，老手兼顾效率和定制化</strong>   。</p>\n</div>'</script></body></html>
