<script>
        document.getElementById('article').innerHTML = 
        "<div><p>在 Vue 中，<strong>异步组件</strong>  允许你按需加载组件，优化应用性能（如减少首屏加载时间）。Vue 2 和 Vue 3 都支持异步组件，但语法略有不同。以下是具体用法：</p>\n<hr>\n<h2><strong>Vue 2 异步组件</strong></h2>\n<h3><strong>1. 使用 <code>import()</code> 动态导入（推荐）</strong></h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">AsyncComponent</span> = (<span class=\"hljs-params\"></span>) =&gt; <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./AsyncComponent.vue&#x27;</span>);\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">components</span>: {\n    <span class=\"hljs-title class_\">AsyncComponent</span>,\n  },\n};\n</code></pre>\n<h3><strong>2. 使用 <code>resolve =&gt; require([], resolve)</code>（旧写法）</strong></h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">AsyncComponent</span> = (<span class=\"hljs-params\">resolve</span>) =&gt; {\n  <span class=\"hljs-built_in\">require</span>([<span class=\"hljs-string\">&#x27;./AsyncComponent.vue&#x27;</span>], resolve);\n};\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">components</span>: {\n    <span class=\"hljs-title class_\">AsyncComponent</span>,\n  },\n};\n</code></pre>\n<h3><strong>3. 高级配置（加载状态 &amp; 错误处理）</strong></h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">AsyncComponent</span> = (<span class=\"hljs-params\"></span>) =&gt; ({\n  <span class=\"hljs-attr\">component</span>: <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./AsyncComponent.vue&#x27;</span>),\n  <span class=\"hljs-attr\">loading</span>: <span class=\"hljs-title class_\">LoadingComponent</span>, <span class=\"hljs-comment\">// 加载时显示的组件</span>\n  <span class=\"hljs-attr\">error</span>: <span class=\"hljs-title class_\">ErrorComponent</span>,    <span class=\"hljs-comment\">// 加载失败时显示的组件</span>\n  <span class=\"hljs-attr\">delay</span>: <span class=\"hljs-number\">200</span>,              <span class=\"hljs-comment\">// 延迟显示 loading（ms）</span>\n  <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">3000</span>            <span class=\"hljs-comment\">// 超时时间（ms）</span>\n});\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">components</span>: {\n    <span class=\"hljs-title class_\">AsyncComponent</span>,\n  },\n};\n</code></pre>\n<hr>\n<h2><strong>Vue 3 异步组件</strong></h2>\n<p>Vue 3 推荐使用 <code>defineAsyncComponent</code> 定义异步组件：</p>\n<h3><strong>1. 基本用法</strong></h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { defineAsyncComponent } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vue&#x27;</span>;\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">AsyncComponent</span> = <span class=\"hljs-title function_\">defineAsyncComponent</span>(<span class=\"hljs-function\">() =&gt;</span>\n  <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./AsyncComponent.vue&#x27;</span>)\n);\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">components</span>: {\n    <span class=\"hljs-title class_\">AsyncComponent</span>,\n  },\n};\n</code></pre>\n<h3><strong>2. 高级配置（加载状态 &amp; 错误处理）</strong></h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { defineAsyncComponent } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vue&#x27;</span>;\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">AsyncComponent</span> = <span class=\"hljs-title function_\">defineAsyncComponent</span>({\n  <span class=\"hljs-attr\">loader</span>: <span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./AsyncComponent.vue&#x27;</span>),\n  <span class=\"hljs-attr\">loadingComponent</span>: <span class=\"hljs-title class_\">LoadingComponent</span>, <span class=\"hljs-comment\">// 加载时显示的组件</span>\n  <span class=\"hljs-attr\">errorComponent</span>: <span class=\"hljs-title class_\">ErrorComponent</span>,    <span class=\"hljs-comment\">// 加载失败时显示的组件</span>\n  <span class=\"hljs-attr\">delay</span>: <span class=\"hljs-number\">200</span>,                       <span class=\"hljs-comment\">// 延迟显示 loading（ms）</span>\n  <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">3000</span>,                    <span class=\"hljs-comment\">// 超时时间（ms）</span>\n  <span class=\"hljs-attr\">suspensible</span>: <span class=\"hljs-literal\">false</span>,               <span class=\"hljs-comment\">// 是否兼容 `&lt;Suspense&gt;`</span>\n});\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">components</span>: {\n    <span class=\"hljs-title class_\">AsyncComponent</span>,\n  },\n};\n</code></pre>\n<h3><strong>3. 结合 <code>&lt;Suspense&gt;</code>（Vue 3 特有）</strong></h3>\n<pre><code class=\"language-html\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">template</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Suspense</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">template</span> #<span class=\"hljs-attr\">default</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">AsyncComponent</span> /&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">template</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">template</span> #<span class=\"hljs-attr\">fallback</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>Loading...<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">template</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Suspense</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">template</span>&gt;</span>\n\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n<span class=\"hljs-keyword\">import</span> { defineAsyncComponent } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vue&#x27;</span>;\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">AsyncComponent</span> = <span class=\"hljs-title function_\">defineAsyncComponent</span>(<span class=\"hljs-function\">() =&gt;</span>\n  <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./AsyncComponent.vue&#x27;</span>)\n);\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">components</span>: {\n    <span class=\"hljs-title class_\">AsyncComponent</span>,\n  },\n};\n</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n</code></pre>\n<hr>\n<h2><strong>总结</strong></h2>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th>Vue 2</th>\n<th>Vue 3</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>基本异步组件</strong></td>\n<td><code>() =&gt; import()</code></td>\n<td><code>defineAsyncComponent(() =&gt; import())</code></td>\n</tr>\n<tr>\n<td><strong>高级配置</strong></td>\n<td><code>{ component: import(), loading, error }</code></td>\n<td><code>defineAsyncComponent({ loader, loadingComponent, errorComponent })</code></td>\n</tr>\n<tr>\n<td><strong>Suspense 支持</strong></td>\n<td>❌ 不支持</td>\n<td>✅ 支持</td>\n</tr>\n</tbody>\n</table>\n<h3><strong>最佳实践</strong></h3>\n<ul>\n<li><strong>Vue 2</strong>   → 直接使用 <code>import()</code> 动态导入。</li>\n<li><strong>Vue 3</strong>   → 使用 <code>defineAsyncComponent</code> + <code>Suspense</code>（如果需要更精细的加载控制）。</li>\n<li><strong>优化建议</strong>  ：\n<ul>\n<li>结合 <strong>Webpack 分包</strong>  （<code>/* webpackChunkName: &quot;async-component&quot; */</code>）。</li>\n<li>对大型组件或路由使用异步加载，减少首屏体积。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<p>如果你有更具体的需求（如结合 Vue Router 懒加载），可以进一步探讨！ 🚀</p>\n</div>";
      </script></body></html>
