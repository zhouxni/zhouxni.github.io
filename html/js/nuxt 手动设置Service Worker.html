<!DOCTYPE html><html lang="en"><head>

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
            document.getElementById('article').innerHTML = 
            "<div><p>在 Nuxt.js 项目中手动设置 Service Worker 可以让你完全控制缓存策略和离线行为。以下是手动设置 Service Worker 的详细步骤。</p>\n<h3>步骤 1：创建 Service Worker 文件</h3>\n<ol>\n<li>\n<p><strong>在 <code>static</code> 目录下创建 <code>sw.js</code> 文件</strong>  ：</p>\n<p>在 Nuxt.js 项目中，<code>static</code> 目录下的文件会被直接复制到生成的静态资源中。因此，我们可以在 <code>static</code> 目录下创建一个 <code>sw.js</code> 文件。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// static/sw.js</span>\n\nself.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;install&#x27;</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">event</span>) =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Service Worker installing.&#x27;</span>);\n  <span class=\"hljs-comment\">// 可以在这里预缓存资源</span>\n  event.<span class=\"hljs-title function_\">waitUntil</span>(\n    caches.<span class=\"hljs-title function_\">open</span>(<span class=\"hljs-string\">&#x27;my-cache-v1&#x27;</span>).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">cache</span>) =&gt;</span> {\n      <span class=\"hljs-keyword\">return</span> cache.<span class=\"hljs-title function_\">addAll</span>([\n        <span class=\"hljs-string\">&#x27;/&#x27;</span>,\n        <span class=\"hljs-string\">&#x27;/index.html&#x27;</span>,\n        <span class=\"hljs-string\">&#x27;/css/main.css&#x27;</span>,\n        <span class=\"hljs-string\">&#x27;/js/main.js&#x27;</span>,\n        <span class=\"hljs-comment\">// 添加其他需要缓存的资源</span>\n      ]);\n    })\n  );\n});\n\nself.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;activate&#x27;</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">event</span>) =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Service Worker activating.&#x27;</span>);\n  <span class=\"hljs-comment\">// 清理旧缓存</span>\n  event.<span class=\"hljs-title function_\">waitUntil</span>(\n    caches.<span class=\"hljs-title function_\">keys</span>().<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">cacheNames</span>) =&gt;</span> {\n      <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">all</span>(\n        cacheNames.<span class=\"hljs-title function_\">map</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">cacheName</span>) =&gt;</span> {\n          <span class=\"hljs-keyword\">if</span> (cacheName !== <span class=\"hljs-string\">&#x27;my-cache-v1&#x27;</span>) {\n            <span class=\"hljs-keyword\">return</span> caches.<span class=\"hljs-title function_\">delete</span>(cacheName);\n          }\n        })\n      );\n    })\n  );\n});\n\nself.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;fetch&#x27;</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">event</span>) =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Fetching:&#x27;</span>, event.<span class=\"hljs-property\">request</span>.<span class=\"hljs-property\">url</span>);\n  event.<span class=\"hljs-title function_\">respondWith</span>(\n    caches.<span class=\"hljs-title function_\">match</span>(event.<span class=\"hljs-property\">request</span>).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">response</span>) =&gt;</span> {\n      <span class=\"hljs-keyword\">return</span> response || <span class=\"hljs-title function_\">fetch</span>(event.<span class=\"hljs-property\">request</span>);\n    })\n  );\n});\n</code></pre>\n</li>\n</ol>\n<h3>步骤 2：注册 Service Worker</h3>\n<ol start=\"2\">\n<li>\n<p><strong>在 Nuxt.js 应用中注册 Service Worker</strong>  ：</p>\n<p>你可以在 <code>plugins</code> 目录下创建一个插件文件来注册 Service Worker，或者直接在 <code>layouts/default.vue</code> 中进行注册。</p>\n<p><strong>使用插件文件</strong>  ：</p>\n<ul>\n<li>在 <code>plugins</code> 目录下创建一个 <code>register-sw.js</code> 文件：<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// plugins/register-sw.js</span>\n\n<span class=\"hljs-keyword\">if</span> (process.<span class=\"hljs-property\">client</span>) {\n  <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-string\">&#x27;serviceWorker&#x27;</span> <span class=\"hljs-keyword\">in</span> navigator) {\n    <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;load&#x27;</span>, <span class=\"hljs-function\">() =&gt;</span> {\n      navigator.<span class=\"hljs-property\">serviceWorker</span>.<span class=\"hljs-title function_\">register</span>(<span class=\"hljs-string\">&#x27;/sw.js&#x27;</span>).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">registration</span>) =&gt;</span> {\n        <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Service Worker registered with scope:&#x27;</span>, registration.<span class=\"hljs-property\">scope</span>);\n      }).<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n        <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Service Worker registration failed:&#x27;</span>, error);\n      });\n    });\n  }\n}\n</code></pre>\n</li>\n<li>在 <code>nuxt.config.js</code> 中注册该插件：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">plugins</span>: [\n    <span class=\"hljs-string\">&#x27;~/plugins/register-sw.js&#x27;</span>\n  ]\n}\n</code></pre>\n</li>\n</ul>\n<p><strong>或者在 <code>layouts/default.vue</code> 中注册</strong>  ：</p>\n<p>如果你不想使用插件，可以直接在 <code>layouts/default.vue</code> 的 <code>&lt;script&gt;</code> 部分中添加注册代码：</p>\n<pre><code class=\"language-javascript\">&lt;template&gt;\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Nuxt</span> /&gt;</span></span>\n&lt;/template&gt;\n\n<span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-title function_\">mounted</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">if</span> (process.<span class=\"hljs-property\">client</span>) {\n      <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-string\">&#x27;serviceWorker&#x27;</span> <span class=\"hljs-keyword\">in</span> navigator) {\n        <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;load&#x27;</span>, <span class=\"hljs-function\">() =&gt;</span> {\n          navigator.<span class=\"hljs-property\">serviceWorker</span>.<span class=\"hljs-title function_\">register</span>(<span class=\"hljs-string\">&#x27;/sw.js&#x27;</span>).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">registration</span>) =&gt;</span> {\n            <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Service Worker registered with scope:&#x27;</span>, registration.<span class=\"hljs-property\">scope</span>);\n          }).<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n            <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Service Worker registration failed:&#x27;</span>, error);\n          });\n        });\n      }\n    }\n  }\n}\n</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span></span>\n</code></pre>\n</li>\n</ol>\n<h3>注意事项</h3>\n<ul>\n<li><strong>HTTPS</strong>  ：Service Worker 需要在 HTTPS 环境下运行（localhost 开发环境除外）。</li>\n<li><strong>缓存策略</strong>  ：根据你的应用需求，合理设置缓存策略，避免缓存过旧或无效的资源。</li>\n<li><strong>调试</strong>  ：使用浏览器的开发者工具（如 Chrome 的 DevTools）调试 Service Worker，查看缓存状态和请求拦截情况。</li>\n<li><strong>更新 Service Worker</strong>  ：当 <code>sw.js</code> 文件发生变化时，浏览器会自动检测到并更新 Service Worker，但你可以通过修改缓存名称（如 <code>my-cache-v1</code>）来强制更新缓存。</li>\n</ul>\n<p>通过以上步骤，你可以在 Nuxt.js 项目中手动设置 Service Worker，实现自定义的缓存策略和离线支持。</p>\n</div>";
          </script></body></html>
