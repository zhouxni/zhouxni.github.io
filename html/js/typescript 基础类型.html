<!DOCTYPE html><html lang="en"><head>

    html,
    body {
      margin: 0;

    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;

    }

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p>TypeScript 的基础类型包括以下几种：</p>\n<ol>\n<li><strong>布尔类型（boolean）</strong>  ：\n<ul>\n<li>用于表示逻辑值 <code>true</code> 或 <code>false</code>。</li>\n<li>示例：<code>let isDone: boolean = false;</code></li>\n</ul>\n</li>\n<li><strong>数字类型（number）</strong>  ：\n<ul>\n<li>用于表示所有数字，包括整数和浮点数。</li>\n<li>TypeScript 中的数字都是浮点数，支持十进制、十六进制、八进制、二进制。</li>\n<li>示例：<code>let decimal: number = 6; let hex: number = 0xf;</code></li>\n</ul>\n</li>\n<li><strong>字符串类型（string）</strong>  ：\n<ul>\n<li>用于表示文本数据，支持单引号、双引号和模板字符串。</li>\n<li>示例：<code>let color: string = &quot;blue&quot;; let greeting: string = \\</code>Hello, ${name}!`;`</li>\n</ul>\n</li>\n<li><strong>数组类型（Array）</strong>  ：\n<ul>\n<li>用于表示一组相同类型的元素。</li>\n<li>可以使用 <code>type[]</code> 或 <code>Array&lt;type&gt;</code> 两种方式表示。</li>\n<li>示例：<code>let list: number[] = [1, 2, 3]; let names: Array&lt;string&gt; = [&quot;Alice&quot;, &quot;Bob&quot;];</code></li>\n</ul>\n</li>\n<li><strong>元组类型（Tuple）</strong>  ：\n<ul>\n<li>表示一个已知数量和类型的数组，每个元素的类型不必相同。</li>\n<li>示例：<code>let person: [string, number] = [&quot;Alice&quot;, 25];</code></li>\n</ul>\n</li>\n<li><strong>枚举类型（enum）</strong>  ：\n<ul>\n<li>用于定义一组命名常量，默认从 0 开始递增，也可以手动指定数值。</li>\n<li>示例：<code>enum Color { Red, Green, Blue }; let favoriteColor: Color = Color.Green;</code></li>\n</ul>\n</li>\n<li><strong>任意类型（any）</strong>  ：\n<ul>\n<li>用于表示不确定数据类型的变量，绕过类型检查。</li>\n<li>示例：<code>let notSure: any = 4; notSure = &quot;hello&quot;;</code></li>\n</ul>\n</li>\n<li><strong>空类型（void）</strong>  ：\n<ul>\n<li>用于表示函数没有返回值。</li>\n<li>示例：<code>function logMessage(message: string): void { console.log(message); }</code></li>\n</ul>\n</li>\n<li><strong>null 和 undefined 类型</strong>  ：\n<ul>\n<li>分别表示空值和未定义的变量。</li>\n<li>示例：<code>let u: undefined = undefined; let n: null = null;</code></li>\n</ul>\n</li>\n<li><strong>never 类型</strong>  ：\n<ul>\n<li>表示永远不会出现的值的类型，常用于抛出异常或无限循环的函数。</li>\n<li>示例：<code>function throwError(message: string): never { throw new Error(message); }</code></li>\n</ul>\n</li>\n<li><strong>对象类型（object）</strong>  ：\n<ul>\n<li>表示非原始类型，即除 <code>number</code>、<code>string</code>、<code>boolean</code>、<code>symbol</code>、<code>null</code> 或 <code>undefined</code> 之外的类型。</li>\n<li>示例：<code>let obj: object = { name: &quot;Alice&quot; };</code></li>\n</ul>\n</li>\n<li><strong>联合类型（Union）</strong>  ：\n<ul>\n<li>表示一个变量可以是多种类型之一。</li>\n<li>示例：<code>let value: string | number = &quot;Hello&quot;; value = 123;</code></li>\n</ul>\n</li>\n<li><strong>未知类型（unknown）</strong>  ：\n<ul>\n<li>表示不确定的类型，需要进行类型检查后才能使用。</li>\n<li>示例：<code>let value: unknown = &quot;Hello&quot;;</code></li>\n</ul>\n</li>\n<li><strong>类型断言</strong>  ：类型断言可以让开发者明确告诉编译器变量的类型，常用于无法推断的情况。可以使用 as 或尖括号语法。<pre><code>let someValue: any = &quot;this is a string&quot;;\nlet strLength: number = (someValue as string).length;\n</code></pre>\n</li>\n<li><strong>字面量类型</strong>  ：字面量类型可以让变量只能拥有特定的值，用于结合联合类型定义变量的特定状态。<pre><code>let direction: &quot;up&quot; | &quot;down&quot; | &quot;left&quot; | &quot;right&quot;;\ndirection = &quot;up&quot;;\n</code></pre>\n</li>\n</ol>\n<p>这些基础类型构成了 TypeScript 类型系统的基础，允许开发者在编写代码时指定变量的类型，从而提高代码的可读性和可维护性。</p>\n</div>";
      </script></body></html>
