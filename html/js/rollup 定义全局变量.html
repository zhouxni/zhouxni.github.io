<script>
      document.title = 'rollup 定义全局变量'
        document.getElementById('article').innerHTML = 
        "<div><p>在 Rollup 中，你可以通过多种方式定义全局变量，以便在打包后的代码中使用。常见的方法包括使用插件（如 <code>@rollup/plugin-replace</code>）或在 Rollup 配置中直接注入全局变量。以下是一些常用的方法：</p>\n<h3>方法 1: 使用 <code>@rollup/plugin-replace</code></h3>\n<p><code>@rollup/plugin-replace</code> 插件允许你在构建过程中替换代码中的特定字符串，这对于定义全局变量非常有用。</p>\n<h4>安装插件</h4>\n<p>首先，安装 <code>@rollup/plugin-replace</code>：</p>\n<pre><code class=\"language-sh\">npm install @rollup/plugin-replace --save-dev\n</code></pre>\n<h4>配置插件</h4>\n<p>在 Rollup 配置文件中使用 <code>@rollup/plugin-replace</code> 插件：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> replace <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;@rollup/plugin-replace&#x27;</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">input</span>: <span class=\"hljs-string\">&#x27;src/main.js&#x27;</span>,\n  <span class=\"hljs-attr\">output</span>: {\n    <span class=\"hljs-attr\">file</span>: <span class=\"hljs-string\">&#x27;dist/bundle.js&#x27;</span>,\n    <span class=\"hljs-attr\">format</span>: <span class=\"hljs-string\">&#x27;cjs&#x27;</span>\n  },\n  <span class=\"hljs-attr\">plugins</span>: [\n    <span class=\"hljs-title function_\">replace</span>({\n      <span class=\"hljs-string\">&#x27;process.env.NODE_ENV&#x27;</span>: <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(<span class=\"hljs-string\">&#x27;production&#x27;</span>), <span class=\"hljs-comment\">// 定义全局变量</span>\n      <span class=\"hljs-attr\">__VERSION__</span>: <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(<span class=\"hljs-string\">&#x27;1.0.0&#x27;</span>) <span class=\"hljs-comment\">// 另一个示例</span>\n    })\n  ]\n};\n</code></pre>\n<h4>使用全局变量</h4>\n<p>在你的代码中，你可以直接使用这些全局变量：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">if</span> (process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">NODE_ENV</span> === <span class=\"hljs-string\">&#x27;production&#x27;</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;This is the production build.&#x27;</span>);\n}\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Version:&#x27;</span>, __VERSION__);\n</code></pre>\n<h3>方法 2: 使用 <code>output.globals</code></h3>\n<p>如果你需要将某些外部模块视为全局变量（通常用于 UMD 或 IIFE 格式的输出），可以使用 <code>output.globals</code> 配置。</p>\n<h4>示例</h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">input</span>: <span class=\"hljs-string\">&#x27;src/main.js&#x27;</span>,\n  <span class=\"hljs-attr\">output</span>: {\n    <span class=\"hljs-attr\">file</span>: <span class=\"hljs-string\">&#x27;dist/bundle.js&#x27;</span>,\n    <span class=\"hljs-attr\">format</span>: <span class=\"hljs-string\">&#x27;iife&#x27;</span>,\n    <span class=\"hljs-attr\">globals</span>: {\n      <span class=\"hljs-attr\">jquery</span>: <span class=\"hljs-string\">&#x27;$&#x27;</span> <span class=\"hljs-comment\">// 将 &#x27;jquery&#x27; 模块视为全局变量 &#x27;$&#x27;</span>\n    }\n  },\n  <span class=\"hljs-attr\">external</span>: [<span class=\"hljs-string\">&#x27;jquery&#x27;</span>] <span class=\"hljs-comment\">// 将 &#x27;jquery&#x27; 标记为外部依赖</span>\n};\n</code></pre>\n<h3>方法 3: 直接在代码中定义（不推荐）</h3>\n<p>虽然不推荐，但你也可以直接在代码中定义全局变量（例如，在入口文件中）。这种方法可能会导致代码难以维护和测试。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// src/main.js</span>\n<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">myGlobalVar</span> = <span class=\"hljs-string\">&#x27;This is a global variable&#x27;</span>;\n</code></pre>\n<h3>方法 4: 使用 <code>define</code> 插件（自定义实现）</h3>\n<p>你可以编写一个自定义插件来注入全局变量。以下是一个简单的示例：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">definePlugin</span>(<span class=\"hljs-params\">definitions</span>) {\n  <span class=\"hljs-keyword\">return</span> {\n    <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&#x27;define&#x27;</span>,\n    <span class=\"hljs-title function_\">transform</span>(<span class=\"hljs-params\">code, id</span>) {\n      <span class=\"hljs-keyword\">let</span> transformedCode = code;\n      <span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">const</span> [key, value] <span class=\"hljs-keyword\">of</span> <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">entries</span>(definitions)) {\n        <span class=\"hljs-keyword\">const</span> regex = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">RegExp</span>(<span class=\"hljs-string\">`\\\\b<span class=\"hljs-subst\">${key}</span>\\\\b`</span>, <span class=\"hljs-string\">&#x27;g&#x27;</span>);\n        transformedCode = transformedCode.<span class=\"hljs-title function_\">replace</span>(regex, <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(value));\n      }\n      <span class=\"hljs-keyword\">return</span> { <span class=\"hljs-attr\">code</span>: transformedCode, <span class=\"hljs-attr\">map</span>: <span class=\"hljs-literal\">null</span> };\n    }\n  };\n}\n\n<span class=\"hljs-comment\">// 在 Rollup 配置中使用</span>\n<span class=\"hljs-keyword\">import</span> definePlugin <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;./define-plugin.js&#x27;</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">input</span>: <span class=\"hljs-string\">&#x27;src/main.js&#x27;</span>,\n  <span class=\"hljs-attr\">output</span>: {\n    <span class=\"hljs-attr\">file</span>: <span class=\"hljs-string\">&#x27;dist/bundle.js&#x27;</span>,\n    <span class=\"hljs-attr\">format</span>: <span class=\"hljs-string\">&#x27;cjs&#x27;</span>\n  },\n  <span class=\"hljs-attr\">plugins</span>: [\n    <span class=\"hljs-title function_\">definePlugin</span>({\n      <span class=\"hljs-attr\">__API_URL__</span>: <span class=\"hljs-string\">&#x27;https://api.example.com&#x27;</span>,\n      <span class=\"hljs-attr\">__FEATURE_FLAG__</span>: <span class=\"hljs-literal\">true</span>\n    })\n  ]\n};\n</code></pre>\n<h3>总结</h3>\n<ul>\n<li><strong><code>@rollup/plugin-replace</code></strong>  : 适用于简单的字符串替换，定义全局常量。</li>\n<li><strong><code>output.globals</code></strong>  : 适用于将外部模块视为全局变量。</li>\n<li><strong>自定义插件</strong>  : 适用于更复杂的全局变量注入需求。</li>\n<li><strong>直接定义</strong>  : 不推荐，除非非常简单且没有其他选择。</li>\n</ul>\n<p>选择适合你项目需求的方法来定义全局变量，以保持代码的清晰和可维护性。</p>\n</div>";
      </script></body></html>
