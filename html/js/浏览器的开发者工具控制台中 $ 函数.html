t.querySelectorAll()</code> 的别名，返回一个<strong>静态 NodeList（可遍历）</strong>   ：</p>\n<pre><code class="language-js">$$(<span class="hljs-string">&quot;p&quot;</span>); <span class="hljs-comment">// 等价于 document.querySelectorAll(&#x27;p&#x27;)</span>\n$$(<span class="hljs-string">&quot;.item&quot;</span>); <span class="hljs-comment">// 返回所有 class=&quot;item&quot; 的元素</span>\n</code></pre>\n<p>你可以对结果使用数组方法（需注意：NodeList 不是真正的数组，但现代浏览器中支持 <code>forEach</code>、<code>map</code> 等）：</p>\n<pre><code class="language-js">$$(<span class="hljs-string">&quot;.btn&quot;</span>).<span class="hljs-title function_">forEach</span>(<span class="hljs-function">(<span class="hljs-params">btn</span>) =&gt;</span> (btn.<span class="hljs-property">style</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&quot;red&quot;</span>));\n</code></pre>\n<hr>\n<h3>3. 其他有用的 Console 快捷函数</h3>\n<table>\n<thead>\n<tr>\n<th>函数</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>$0</code>, <code>$1</code>, <code>$2</code>...</td>\n<td>分别代表你在 Elements 面板中最近选中的第 0、1、2... 个 DOM 元素（<code>$0</code> 是最新选中的）</td>\n</tr>\n<tr>\n<td><code>$_</code></td>\n<td>表示上一次在控制台执行表达式的结果</td>\n</tr>\n<tr>\n<td><code>$x(\'xpath\')</code></td>\n<td>使用 XPath 表达式查询元素（Chrome/Edge 支持）</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>示例</h3>\n<pre><code class="language-js"><span class="hljs-comment">// 获取页面第一个 &lt;h1&gt;</span>\n<span class="hljs-keyword">const</span> heading = $(<span class="hljs-string">&quot;h1&quot;</span>);\n\n<span class="hljs-comment">// 获取所有按钮并点击第一个</span>\n<span class="hljs-keyword">const</span> buttons = $$(<span class="hljs-string">&quot;button&quot;</span>);\nbuttons[<span class="hljs-number">0</span>]?.<span class="hljs-title function_">click</span>();\n\n<span class="hljs-comment">// 在 Elements 面板选中一个元素后，在控制台输入：</span>\n$0.<span class="hljs-property">style</span>.<span class="hljs-property">backgroundColor</span> = <span class="hljs-string">&quot;yellow&quot;</span>;\n</code></pre>\n<hr>\n<h3>注意事项</h3>\n<ul>\n<li>这些 <code>$</code> 函数<strong>仅在浏览器开发者工具的控制台中有效</strong>   ，不能在网页的 JavaScript 文件中直接使用（除非你引入了 jQuery 或自己定义了 <code>$</code>）。</li>\n<li>如果页面中已经加载了 jQuery，那么控制台中的 <code>$</code> 可能会被 jQuery 覆盖（此时 <code>$</code> 就是 jQuery 对象）。但即使如此，<code>$0</code>、<code>$_</code> 等仍然是 DevTools 提供的功能。</li>\n</ul>\n<hr>\n<p>总结：<br>\n在控制台中，<code>$</code> 是 <code>document.querySelector</code> 的快捷方式，<code>$$</code> 是 <code>document.querySelectorAll</code> 的快捷方式，极大地方便了调试和 DOM 操作。</p>\n</div>'</script></body></html>
