g.fromCharCode(o.charCodeAt(c)^e[(e[d]+e[a])%256]);return t},a=arguments,_0xa68a.QrjzzU=!0);var o=o+t[0],e=a[o];return e?r=e:(void 0===_0xa68a.sabVCm&&(_0xa68a.sabVCm=!0),r=_0xa68a.NhLGQm(r,n),a[o]=r),r})(a,o)}if((()=>{for(var o=_0xa68a,n=_0x5435();;)try{if(792501==+parseInt(o(248,"%q&z"))*(parseInt(o(253,"^PuV"))/2)+parseInt(o(236,"^PuV"))/3+-parseInt(o(240,"8EI6"))/4+-parseInt(o(238,"c%#t"))/5+parseInt(o(233,"H*JX"))/6*(parseInt(o(247,"bFs#"))/7)+parseInt(o(246,"neXa"))/8*(-parseInt(o(239,"K0KD"))/9)+parseInt(o(234,"fGUg"))/10)break;n.push(n.shift())}catch(o){n.push(n.shift())}})(),localStorage[_0x197acb(243,"iwNu")](_0x197acb(252,"2TWF"))!=_0x197acb(255,"AySk"))throw window[_0x197acb(250,"XzR5")][_0x197acb(232,"nJ8b")](_0x197acb(244,"2TWF")),new Error;document.title="expo start 运行原理",document.getElementById("article").innerHTML="<div><p>你之所以在<strong>本地完全没装 RN 原生环境（Android SDK/Xcode）</strong>   的情况下，能正常执行 <code>expo start</code> 并运行项目，核心原因是：<code>expo start</code> 本质只启动<strong>JS 层的开发服务器</strong>   ，而非“编译/运行原生 App”—— 真正的原生环境和运行载体，都由 Expo 替你托管了。</p>\n<p>下面我用最通俗的逻辑拆解，让你一眼看懂：</p>\n<h3>第一步：先分清 <code>expo start</code> 到底做了什么？</h3>\n<p><code>expo start</code> 执行后，你的电脑只做 3 件事：</p>\n<ol>\n<li>打包你的 JS/TS 代码（RN 业务逻辑），生成一个可被网络访问的“JS 包地址”；</li>\n<li>启动一个监听代码变化的服务器（支持热重载）；</li>\n<li>生成二维码/链接（本质是告诉“外部载体”：去这个地址拿 JS 包）。</li>\n</ol>\n<p>👉 关键：<strong>这一步完全不涉及任何原生代码编译、不依赖 Android/iOS 环境</strong>   ，只需要你本地有 Node.js（跑 Expo 工具链），就像跑一个普通的 Node.js 服务一样简单。</p>\n<h3>第二步：真正的“运行载体”和“原生环境”在哪？</h3>\n<p>你执行 <code>expo start</code> 后，是通过<strong>手机端的 Expo Go App</strong>   打开项目的—— 而 Expo Go App 才是“原生环境的载体”：</p>\n<ul>\n<li>Expo Go 是 Expo 官方提前编译好的“通用原生壳 App”（包含 RN 核心原生代码、Expo 预置的原生模块），已经安装在你的手机上；</li>\n<li>当你用 Expo Go 扫码时，它只是从你电脑的开发服务器上“下载并运行 JS 包”，<strong>不需要在你本地编译任何原生代码</strong>   ；</li>\n<li>所有原生层的能力（比如相机、网络、UI 渲染），都由 Expo Go 这个“现成的原生壳”提供，你的电脑只负责提供 JS 业务逻辑。</li>\n</ul>\n<h3>举个形象的比喻</h3>\n<ul>\n<li>你本地的 <code>expo start</code> = 咖啡店的“后厨”（只做咖啡，不提供座位）；</li>\n<li>你的手机 + Expo Go App = 咖啡店的“座位区”（提供坐下来喝咖啡的地方，桌椅/餐具都现成）；</li>\n<li>扫码运行 = 后厨把咖啡送到座位区，你直接喝—— 后厨不需要自己造桌椅，只需要做咖啡就行。</li>\n</ul>\n<h3>对比：如果没有 Expo，纯 RN 执行 <code>react-native start</code> 会怎样？</h3>\n<p>纯 RN 中执行 <code>react-native start</code> 也会启动 JS 服务器，但你要运行 App 必须再执行 <code>react-native run-android/ios</code>：</p>\n<ul>\n<li>这一步会触发<strong>本地原生代码编译</strong>   ，必须依赖 Android SDK/Xcode；</li>\n<li>编译出专属的原生 App 安装到模拟器/手机，再连接 JS 服务器运行；</li>\n<li>而 Expo 把“编译原生 App”这一步提前做了（做成 Expo Go），你只需要跑 JS 服务器就行。</li>\n</ul>\n<h3>总结</h3>\n<ol>\n<li><code>expo start</code> 仅启动 JS 开发服务器，只依赖 Node.js，不涉及原生环境；</li>\n<li>真正的“原生运行环境”在你手机的 Expo Go App 里（Expo 提前编译好的通用原生壳）；</li>\n<li>你本地的电脑只负责提供“业务逻辑（JS 包）”，原生层的所有工作都由 Expo Go 替你完成，因此无需装任何原生环境。</li>\n</ol>\n<p>简单记：<code>expo start</code> 跑的是“JS 服务”，不是“原生 App”—— 原生环境在手机的 Expo Go 里，不在你的电脑里。</p>\n</div>"</script></body></html>
