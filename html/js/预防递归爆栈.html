<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="预防递归爆栈",document.getElementById("article").innerHTML='<div><p>在 JavaScript 中，递归爆栈通常发生在递归调用层次过深，超过 JavaScript 引擎的调用栈限制（通常在几千层左右）。以下是几种预防递归爆栈的方法：</p>\n<ol>\n<li><strong>尾递归优化</strong><br>\n将递归函数改写成尾递归形式（递归调用是函数的最后一个操作），部分 JavaScript 引擎（如 Safari 的 JavaScriptCore）支持尾递归优化</li>\n</ol>\n<pre><code class="language-javascript"><span class="hljs-comment">// 普通递归（容易爆栈）</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">factorial</span>(<span class="hljs-params">n</span>) {\n  <span class="hljs-keyword">if</span> (n === <span class="hljs-number">0</span>) <span class="hljs-keyword">return</span> <span class="hljs-number">1</span>;\n  <span class="hljs-keyword">return</span> n * <span class="hljs-title function_">factorial</span>(n - <span class="hljs-number">1</span>); <span class="hljs-comment">// 递归调用后还有乘法操作</span>\n}\n\n<span class="hljs-comment">// 尾递归优化版本</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">factorial</span>(<span class="hljs-params">n, accumulator = <span class="hljs-number">1</span></span>) {\n  <span class="hljs-keyword">if</span> (n === <span class="hljs-number">0</span>) <span class="hljs-keyword">return</span> accumulator;\n  <span class="hljs-keyword">return</span> <span class="hljs-title function_">factorial</span>(n - <span class="hljs-number">1</span>, n * accumulator); <span class="hljs-comment">// 递归调用是最后一步</span>\n}\n</code></pre>\n<ol start="2">\n<li><strong>递归转迭代</strong><br>\n手动将递归逻辑改写成循环迭代形式，这是最可靠的避免爆栈的方法</li>\n</ol>\n<pre><code class="language-javascript"><span class="hljs-comment">// 递归版本</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">fibonacci</span>(<span class="hljs-params">n</span>) {\n  <span class="hljs-keyword">if</span> (n &lt;= <span class="hljs-number">1</span>) <span class="hljs-keyword">return</span> n;\n  <span class="hljs-keyword">return</span> <span class="hljs-title function_">fibonacci</span>(n - <span class="hljs-number">1</span>) + <span class="hljs-title function_">fibonacci</span>(n - <span class="hljs-number">2</span>);\n}\n\n<span class="hljs-comment">// 迭代版本</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">fibonacci</span>(<span class="hljs-params">n</span>) {\n  <span class="hljs-keyword">if</span> (n &lt;= <span class="hljs-number">1</span>) <span class="hljs-keyword">return</span> n;\n\n  <span class="hljs-keyword">let</span> a = <span class="hljs-number">0</span>,\n    b = <span class="hljs-number">1</span>,\n    c;\n  <span class="hljs-keyword">for</span> (<span class="hljs-keyword">let</span> i = <span class="hljs-number">2</span>; i &lt;= n; i++) {\n    c = a + b;\n    a = b;\n    b = c;\n  }\n  <span class="hljs-keyword">return</span> b;\n}\n</code></pre>\n<ol start="3">\n<li><strong>使用 trampoline 函数</strong><br>\n将递归调用包装成返回函数的形式，通过循环来执行，避免调用栈增长</li>\n</ol>\n<pre><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">trampoline</span>(<span class="hljs-params">fn</span>) {\n  <span class="hljs-keyword">return</span> <span class="hljs-keyword">function</span> (<span class="hljs-params">...args</span>) {\n    <span class="hljs-keyword">let</span> result = <span class="hljs-title function_">fn</span>(...args);\n    <span class="hljs-keyword">while</span> (<span class="hljs-keyword">typeof</span> result === <span class="hljs-string">&quot;function&quot;</span>) {\n      result = <span class="hljs-title function_">result</span>();\n    }\n    <span class="hljs-keyword">return</span> result;\n  };\n}\n\n<span class="hljs-comment">// 用trampoline包装的递归函数</span>\n<span class="hljs-keyword">const</span> sum = <span class="hljs-title function_">trampoline</span>(<span class="hljs-keyword">function</span> <span class="hljs-title function_">sumRecursive</span>(<span class="hljs-params">n, accumulator = <span class="hljs-number">0</span></span>) {\n  <span class="hljs-keyword">if</span> (n === <span class="hljs-number">0</span>) <span class="hljs-keyword">return</span> accumulator;\n  <span class="hljs-keyword">return</span> <span class="hljs-function">() =&gt;</span> <span class="hljs-title function_">sumRecursive</span>(n - <span class="hljs-number">1</span>, n + accumulator);\n});\n\n<span class="hljs-comment">// 可以安全计算很大的数</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title function_">sum</span>(<span class="hljs-number">100000</span>));\n</code></pre>\n<ol start="4">\n<li><strong>增加递归深度检查</strong><br>\n在递归函数中添加深度限制，超过限制时抛出错误或采取其他处理</li>\n</ol>\n<pre><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">deepRecursion</span>(<span class="hljs-params">n, depth = <span class="hljs-number">0</span></span>) {\n  <span class="hljs-comment">// 设置最大深度限制</span>\n  <span class="hljs-keyword">if</span> (depth &gt; <span class="hljs-number">10000</span>) {\n    <span class="hljs-keyword">throw</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Error</span>(<span class="hljs-string">&quot;递归深度超过限制&quot;</span>);\n  }\n\n  <span class="hljs-keyword">if</span> (n === <span class="hljs-number">0</span>) <span class="hljs-keyword">return</span>;\n  <span class="hljs-keyword">return</span> <span class="hljs-title function_">deepRecursion</span>(n - <span class="hljs-number">1</span>, depth + <span class="hljs-number">1</span>);\n}\n</code></pre>\n<ol start="5">\n<li><strong>使用异步递归</strong><br>\n通过 setTimeout、Promise 等将每次递归调用放入事件队列，避免调用栈累积</li>\n</ol>\n<pre><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">asyncRecursion</span>(<span class="hljs-params">n</span>) {\n  <span class="hljs-keyword">if</span> (n === <span class="hljs-number">0</span>) <span class="hljs-keyword">return</span> <span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">resolve</span>();\n\n  <span class="hljs-comment">// 使用setTimeout将递归调用放入下一个事件循环</span>\n  <span class="hljs-keyword">return</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Promise</span>(<span class="hljs-function">(<span class="hljs-params">resolve</span>) =&gt;</span> {\n    <span class="hljs-built_in">setTimeout</span>(<span class="hljs-function">() =&gt;</span> {\n      <span class="hljs-title function_">resolve</span>(<span class="hljs-title function_">asyncRecursion</span>(n - <span class="hljs-number">1</span>));\n    }, <span class="hljs-number">0</span>);\n  });\n}\n\n<span class="hljs-comment">// 使用</span>\n<span class="hljs-title function_">asyncRecursion</span>(<span class="hljs-number">100000</span>).<span class="hljs-title function_">then</span>(<span class="hljs-function">() =&gt;</span> <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;完成&quot;</span>));\n</code></pre>\n<p>实际开发中，最推荐的方法是将递归转换为迭代，因为它兼容性最好且性能通常更优。尾递归优化虽然优雅，但目前并非所有 JavaScript 引擎都支持。</p>\n</div>'</script></body></html>
