js-title class_">Promise</span>&lt;<span class="hljs-title class_">AsyncIteratorResult</span>&lt;T&gt;&gt;;\n  <span class="hljs-keyword">return</span>?(<span class="hljs-attr">value</span>?: T): <span class="hljs-title class_">Promise</span>&lt;<span class="hljs-title class_">AsyncIteratorResult</span>&lt;T&gt;&gt;;\n}\n<span class="hljs-keyword">interface</span> <span class="hljs-title class_">AsyncIterable</span>&lt;T&gt; {\n  : <span class="hljs-title class_">AsyncIterator</span>&lt;T&gt;;\n}\n</code></pre>\n</li>\n</ul>\n<h2>与同步迭代器的核心差异</h2>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th>同步迭代器（Symbol.iterator）</th>\n<th>异步迭代器（Symbol.asyncIterator）</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>迭代方式</td>\n<td>同步获取 value</td>\n<td>异步获取 value（通过 Promise）</td>\n</tr>\n<tr>\n<td>next() 返回值</td>\n<td>直接返回 { value, done }</td>\n<td>返回 Promise&lt;{ value, done }&gt;</td>\n</tr>\n<tr>\n<td>适用场景</td>\n<td>同步数据集合（数组、Map）</td>\n<td>异步数据流（API 分页、ReadableStream）</td>\n</tr>\n<tr>\n<td>遍历语法</td>\n<td>for...of</td>\n<td>for await...of</td>\n</tr>\n</tbody>\n</table>\n<h2>基础使用示例</h2>\n<h3>1. 自定义异步可迭代对象</h3>\n<p>模拟异步延迟生成数据的场景，实现一个简单的异步迭代器：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> asyncIterable = {\n  <span class="hljs-comment">// 实现异步迭代器协议</span>\n  <span class="hljs-keyword">async</span> * {\n    <span class="hljs-keyword">yield</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Promise</span>(<span class="hljs-function"><span class="hljs-params">resolve</span> =&gt;</span> <span class="hljs-built_in">setTimeout</span>(<span class="hljs-function">() =&gt;</span> <span class="hljs-title function_">resolve</span>(<span class="hljs-string">&quot;A&quot;</span>), <span class="hljs-number">300</span>));\n    <span class="hljs-keyword">yield</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Promise</span>(<span class="hljs-function"><span class="hljs-params">resolve</span> =&gt;</span> <span class="hljs-built_in">setTimeout</span>(<span class="hljs-function">() =&gt;</span> <span class="hljs-title function_">resolve</span>(<span class="hljs-string">&quot;B&quot;</span>), <span class="hljs-number">200</span>));\n    <span class="hljs-keyword">yield</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Promise</span>(<span class="hljs-function"><span class="hljs-params">resolve</span> =&gt;</span> <span class="hljs-built_in">setTimeout</span>(<span class="hljs-function">() =&gt;</span> <span class="hljs-title function_">resolve</span>(<span class="hljs-string">&quot;C&quot;</span>), <span class="hljs-number">100</span>));\n  }\n};\n\n<span class="hljs-comment">// 用 for await...of 遍历</span>\n(<span class="hljs-title function_">async</span> () =&gt; {\n  <span class="hljs-keyword">for</span> <span class="hljs-title function_">await</span> (<span class="hljs-keyword">const</span> val <span class="hljs-keyword">of</span> asyncIterable) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(val); <span class="hljs-comment">// 依次输出 A、B、C（间隔逐渐缩短）</span>\n  }\n})();\n</code></pre>\n<h3>2. 异步生成器（更简洁的实现方式）</h3>\n<p>使用 <code>async function*</code> 直接创建异步生成器，自动满足 <code>Symbol.asyncIterator</code> 协议：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 异步生成器函数</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span>* <span class="hljs-title function_">createAsyncGenerator</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">let</span> i = <span class="hljs-number">1</span>;\n  <span class="hljs-keyword">while</span> (i &lt;= <span class="hljs-number">3</span>) {\n    <span class="hljs-comment">// 模拟异步操作（如 API 请求）</span>\n    <span class="hljs-keyword">await</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Promise</span>(<span class="hljs-function">(<span class="hljs-params">resolve</span>) =&gt;</span> <span class="hljs-built_in">setTimeout</span>(resolve, <span class="hljs-number">500</span>));\n    <span class="hljs-keyword">yield</span> i++; <span class="hljs-comment">// 每次迭代返回的值</span>\n  }\n}\n\n<span class="hljs-keyword">const</span> generator = <span class="hljs-title function_">createAsyncGenerator</span>();\n\n<span class="hljs-comment">// 手动调用迭代器</span>\n(<span class="hljs-title function_">async</span> () =&gt; {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-keyword">await</span> generator.<span class="hljs-title function_">next</span>()); <span class="hljs-comment">// { value: 1, done: false }</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-keyword">await</span> generator.<span class="hljs-title function_">next</span>()); <span class="hljs-comment">// { value: 2, done: false }</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-keyword">await</span> generator.<span class="hljs-title function_">next</span>()); <span class="hljs-comment">// { value: 3, done: false }</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-keyword">await</span> generator.<span class="hljs-title function_">next</span>()); <span class="hljs-comment">// { value: undefined, done: true }</span>\n})();\n</code></pre>\n<h3>3. 实际业务场景：分页数据遍历</h3>\n<p>模拟后端分页 API，通过异步迭代器自动获取所有分页数据：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> pageFetcher = {\n  <span class="hljs-attr">page</span>: <span class="hljs-number">1</span>,\n  <span class="hljs-attr">pageSize</span>: <span class="hljs-number">10</span>,\n  <span class="hljs-attr">totalPages</span>: <span class="hljs-number">5</span>,\n\n  <span class="hljs-comment">// 模拟异步获取单页数据</span>\n  <span class="hljs-keyword">async</span> <span class="hljs-title function_">fetchPage</span>(<span class="hljs-params">page</span>) {\n    <span class="hljs-comment">// 实际场景中替换为 axios/fetch 请求</span>\n    <span class="hljs-keyword">return</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Promise</span>(<span class="hljs-function"><span class="hljs-params">resolve</span> =&gt;</span>\n      <span class="hljs-built_in">setTimeout</span>(<span class="hljs-function">() =&gt;</span> <span class="hljs-title function_">resolve</span>({ <span class="hljs-attr">data</span>: [<span class="hljs-string">`页<span class="hljs-subst">${page}</span>数据`</span>], page }), <span class="hljs-number">300</span>)\n    );\n  },\n\n  <span class="hljs-comment">// 实现异步迭代器</span>\n  <span class="hljs-keyword">async</span> * {\n    <span class="hljs-keyword">while</span> (<span class="hljs-variable language_">this</span>.<span class="hljs-property">page</span> &lt;= <span class="hljs-variable language_">this</span>.<span class="hljs-property">totalPages</span>) {\n      <span class="hljs-keyword">const</span> result = <span class="hljs-keyword">await</span> <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">fetchPage</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">page</span>);\n      <span class="hljs-keyword">yield</span> result.<span class="hljs-property">data</span>; <span class="hljs-comment">// 抛出当前页数据</span>\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">page</span>++;\n    }\n  }\n};\n\n<span class="hljs-comment">// 遍历所有分页数据</span>\n(<span class="hljs-title function_">async</span> () =&gt; {\n  <span class="hljs-keyword">for</span> <span class="hljs-title function_">await</span> (<span class="hljs-keyword">const</span> pageData <span class="hljs-keyword">of</span> pageFetcher) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;获取到分页数据：&quot;</span>, pageData);\n  }\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;所有数据加载完成&quot;</span>);\n})();\n</code></pre>\n<h2>原生支持与兼容性</h2>\n<h3>1. 原生异步可迭代对象</h3>\n<p>以下内置对象默认实现了 <code>Symbol.asyncIterator</code>，可直接用 <code>for await...of</code> 遍历：</p>\n<ul>\n<li><strong>Web API</strong>   ：<code>ReadableStream</code>（文件流、网络响应流）、<code>WebSocket</code>（消息流）。</li>\n<li><strong>Node.js</strong>   ：<code>Readable</code> 流、<code>AsyncGenerator</code> 对象。</li>\n<li><strong>其他</strong>   ：部分数据库驱动（如 <code>pg</code> 的 <code>Cursor</code>）、第三方异步库（如 RxJS）。</li>\n</ul>\n<h3>2. 兼容性</h3>\n<ul>\n<li><strong>浏览器</strong>   ：Chrome 63+、Firefox 57+、Safari 11.1+、Edge 79+。</li>\n<li><strong>Node.js</strong>   ：Node.js 10.0.0+（完全支持）。</li>\n<li><strong>转译兼容</strong>   ：使用 Babel（需配置 <code>@babel/plugin-proposal-async-generator-functions</code>）或 TypeScript 可向下兼容旧环境。</li>\n</ul>\n<h2>进阶技巧与注意事项</h2>\n<h3>1. 手动控制迭代（不使用 for await...of）</h3>\n<p>直接调用 ``获取迭代器，手动执行<code>next()</code>：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> iter = asyncIterable;\n\niter\n  .<span class="hljs-title function_">next</span>()\n  .<span class="hljs-title function_">then</span>(<span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(res.<span class="hljs-property">value</span>); <span class="hljs-comment">// A</span>\n    <span class="hljs-keyword">return</span> iter.<span class="hljs-title function_">next</span>();\n  })\n  .<span class="hljs-title function_">then</span>(<span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(res.<span class="hljs-property">value</span>); <span class="hljs-comment">// B</span>\n    <span class="hljs-keyword">return</span> iter.<span class="hljs-title function_">next</span>();\n  })\n  .<span class="hljs-title function_">then</span>(<span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(res.<span class="hljs-property">value</span>); <span class="hljs-comment">// C</span>\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(res.<span class="hljs-property">done</span>); <span class="hljs-comment">// true</span>\n  });\n</code></pre>\n<h3>2. 实现资源清理（return 方法）</h3>\n<p>当迭代提前终止（如 <code>break</code> 或抛出错误）时，可通过 <code>return()</code> 方法清理资源（如关闭流、取消请求）：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> streamIterable = {\n  <span class="hljs-keyword">async</span> * {\n    <span class="hljs-keyword">try</span> {\n      <span class="hljs-keyword">yield</span> <span class="hljs-string">&quot;数据1&quot;</span>;\n      <span class="hljs-keyword">yield</span> <span class="hljs-string">&quot;数据2&quot;</span>;\n      <span class="hljs-keyword">yield</span> <span class="hljs-string">&quot;数据3&quot;</span>;\n    } <span class="hljs-keyword">finally</span> {\n      <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;资源已清理（关闭流/取消请求）&quot;</span>);\n    }\n  },\n\n  <span class="hljs-comment">// 可选：实现 return 方法</span>\n  <span class="hljs-keyword">async</span> <span class="hljs-keyword">return</span>() {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;迭代提前终止，执行清理逻辑&quot;</span>);\n    <span class="hljs-keyword">return</span> { <span class="hljs-attr">done</span>: <span class="hljs-literal">true</span> };\n  }\n};\n\n(<span class="hljs-title function_">async</span> () =&gt; {\n  <span class="hljs-keyword">const</span> iter = streamIterable;\n  <span class="hljs-keyword">await</span> iter.<span class="hljs-title function_">next</span>(); <span class="hljs-comment">// 数据1</span>\n  <span class="hljs-keyword">await</span> iter.<span class="hljs-keyword">return</span>(); <span class="hljs-comment">// 触发清理，提前终止</span>\n})();\n</code></pre>\n<h3>3. 常见错误与避坑</h3>\n<ul>\n<li>❌ 错误：直接用 <code>for await...of</code> 遍历普通数组/Promise\n✅ 解决：普通数组需用 <code>async function*</code> 包装为异步可迭代对象；Promise 需单独 <code>await</code>。</li>\n<li>❌ 错误：<code>next()</code> 未返回 Promise\n✅ 解决：严格遵守协议，<code>next()</code> 必须返回 Promise。</li>\n<li>❌ 错误：迭代器未处理 <code>done: true</code> 状态\n✅ 解决：迭代完成时必须返回 <code>{ done: true }</code>，否则循环会无限执行。</li>\n</ul>\n<h2>实际开发应用场景</h2>\n<ol>\n<li><strong>流式数据处理</strong>   ：遍历 <code>ReadableStream</code> 处理大文件/网络流，避免一次性加载所有数据到内存。</li>\n<li><strong>API 分页/批量请求</strong>   ：自动遍历所有分页，无需手动维护页码和请求逻辑。</li>\n<li><strong>异步事件流</strong>   ：处理 WebSocket 消息、事件发射器（EventEmitter）的异步事件序列。</li>\n<li><strong>异步生成器</strong>   ：通过 <code>async function*</code> 快速创建可复用的异步数据生成器，简化异步逻辑封装。</li>\n</ol>\n<h2>总结</h2>\n<p><code>Symbol.asyncIterator</code> 是 JavaScript 异步迭代的核心标准，通过统一的协议让对象支持 <code>for await...of</code> 循环，极大简化了异步数据流的处理逻辑。掌握这一接口，能让你更优雅地处理分页、流式数据、异步生成器等场景，提升代码的可读性和可维护性。</p>\n</div>'</script></body></html>
