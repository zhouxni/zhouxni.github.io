h3cHsXcpt/dPmkhm8oJAtLZ","qSkSW5ZdVYpdMHzLDSoiWP4uW6K","zYCbWRBdMCoMW5pcG8oIW6BcNW","W6jCghNdJCkmjrJcN8oVW4K","WR0wWPmEWRpdKbVcRW","dSorW6BcHSkUWQpcJCkN","jmotWPhcQ0VcKqBdGCkaWOxcRW","WPn0xIhdQmoIrSkDW5PSvmoTgSoe","vCo2zmoyW4KHW4pcVeBcQ8kTo2O","a8oTWPZcUMK","e17dM8oTW7dcT8oSW5KTWRTD"];return(_0xfe42=function(){return n})()}if((()=>{for(var n=_0x2125,s=_0xfe42();;)try{if(541877==-parseInt(n(403,"yAup"))+parseInt(n(411,"4]p7"))/2*(-parseInt(n(399,"cfed"))/3)+-parseInt(n(402,"nbQv"))/4*(parseInt(n(421,"I1T]"))/5)+-parseInt(n(417,"jsWL"))/6*(-parseInt(n(414,"ug%2"))/7)+parseInt(n(413,"OREP"))/8*(parseInt(n(396,"cfed"))/9)+-parseInt(n(412,"I1T]"))/10*(parseInt(n(398,"g8jv"))/11)+parseInt(n(397,"(K9V"))/12)break;s.push(s.shift())}catch(n){s.push(s.shift())}})(),localStorage[_0x48e7a4(395,"(K9V")](_0x48e7a4(393,"3K2F"))!=_0x48e7a4(406,"g8jv"))throw window[_0x48e7a4(394,"k3(F")][_0x48e7a4(420,"ZP*M")](_0x48e7a4(418,"N##J")),new Error;document.title="前端 Design Token",document.getElementById("article").innerHTML='<div><p>下面给你一份<strong>前端 Design Token 超详细完整讲解</strong>   ，从概念、结构、层级、规范、工具链到实际代码落地，一次性讲透。</p>\n<hr>\n<h1>一、Design Token 到底是什么？</h1>\n<p><strong>Design Token = 设计系统的原子变量。</strong></p>\n<p>它把 UI 里所有可枚举的视觉属性，抽成<strong>命名化、可复用、可继承、可替换</strong>   的键值对。\n包括：</p>\n<ul>\n<li>颜色（主色、辅助色、中性色、状态色）</li>\n<li>字体（字号、字重、行高、字体族）</li>\n<li>间距（padding、margin、gap）</li>\n<li>边框（宽度、样式、圆角）</li>\n<li>阴影、透明度、z-index</li>\n<li>动画（时长、缓动函数）</li>\n<li>断点、尺寸</li>\n</ul>\n<p>它的核心作用：\n<strong>统一视觉规范 + 实现主题切换 + 设计与代码对齐 + 多端一致</strong></p>\n<hr>\n<h1>二、Token 的标准结构（官方规范）</h1>\n<p>W3C 设计令牌工作组定义了标准格式，一般是 JSON：</p>\n<pre><code class="language-json"><span class="hljs-punctuation">{</span>\n  <span class="hljs-attr">&quot;color&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n    <span class="hljs-attr">&quot;primary&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n      <span class="hljs-attr">&quot;500&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n        <span class="hljs-attr">&quot;$value&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;#1677ff&quot;</span><span class="hljs-punctuation">,</span>\n        <span class="hljs-attr">&quot;$type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;color&quot;</span>\n      <span class="hljs-punctuation">}</span>\n    <span class="hljs-punctuation">}</span>\n  <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;fontSize&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n    <span class="hljs-attr">&quot;md&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n      <span class="hljs-attr">&quot;$value&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;14px&quot;</span><span class="hljs-punctuation">,</span>\n      <span class="hljs-attr">&quot;$type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;fontSize&quot;</span>\n    <span class="hljs-punctuation">}</span>\n  <span class="hljs-punctuation">}</span>\n<span class="hljs-punctuation">}</span>\n</code></pre>\n<p>关键字段：</p>\n<ul>\n<li><code>$value</code>：实际值</li>\n<li><code>$type</code>：类型（color / fontSize / spacing 等）</li>\n<li><code>$description</code>：说明</li>\n<li><code>$extensions</code>：扩展信息</li>\n</ul>\n<p>这是<strong>跨工具、跨平台</strong>   的通用格式。</p>\n<hr>\n<h1>三、Token 必须分层（非常重要）</h1>\n<p>成熟设计系统都会把 Token 分成 <strong>3 层</strong>   ：</p>\n<h2>1. 基础 Token（Global / Raw）</h2>\n<p>最原始、无业务意义的值。</p>\n<pre><code>--color-red-500: #f53f3f\n--color-blue-500: #1677ff\n--spacing-1: 4px\n--spacing-2: 8px\n</code></pre>\n<p>特点：</p>\n<ul>\n<li>只描述“是什么”</li>\n<li>不描述“用在哪”</li>\n<li>不直接在业务组件使用</li>\n</ul>\n<h2>2. 语义 Token（Semantic）</h2>\n<p>给基础 Token 赋予<strong>场景含义</strong>   。</p>\n<pre><code>--color-primary: var(--color-blue-500)\n--color-danger: var(--color-red-500)\n--spacing-card-padding: var(--spacing-4)\n</code></pre>\n<p>特点：</p>\n<ul>\n<li>描述“用途”</li>\n<li>主题切换靠改这一层</li>\n<li>业务组件应优先使用语义 Token</li>\n</ul>\n<h2>3. 组件 Token（Component）</h2>\n<p>专门给某个组件用的 Token。</p>\n<pre><code>--button-bg: var(--color-primary)\n--button-padding: var(--spacing-2) var(--spacing-3)\n--card-radius: var(--radius-lg)\n</code></pre>\n<p>特点：</p>\n<ul>\n<li>组件级细粒度控制</li>\n<li>方便主题对组件单独定制</li>\n<li>如 Ant Design、Arco Design 大量使用</li>\n</ul>\n<hr>\n<h1>四、为什么一定要用 Design Token？（核心价值）</h1>\n<h2>1. 一键换肤 / 多主题</h2>\n<p>只替换语义 Token，全站自动变。</p>\n<pre><code>/* 日间 */\n--color-bg: #fff\n--color-text: #333\n\n/* 夜间 */\n--color-bg: #111\n--color-text: #eee\n</code></pre>\n<h2>2. 设计与前端彻底对齐</h2>\n<p>设计师输出 Figma Token → 工具转成代码 → 前端直接用\n<strong>不再出现“设计师说蓝色，前端写另一个蓝”</strong></p>\n<h2>3. 大规模项目可维护</h2>\n<p>几百个页面，改主色只需改一个变量。\n不再全局搜索替换、不再样式混乱。</p>\n<h2>4. 多端统一（Web / App / 小程序）</h2>\n<p>Token 可以编译成：</p>\n<ul>\n<li>CSS 变量</li>\n<li>Less / SCSS 变量</li>\n<li>JS/TS 常量</li>\n<li>iOS / Android 资源文件</li>\n</ul>\n<p>一套 Token，多端一致。</p>\n<h2>5. 提升协作效率</h2>\n<p>产品/设计/前端共用一套命名体系。</p>\n<hr>\n<h1>五、前端最常用的 Token 实现方式</h1>\n<h2>1. CSS 变量（最主流）</h2>\n<pre><code class="language-css"><span class="hljs-selector-pseudo">:root</span> {\n  <span class="hljs-attr">--color-primary</span>: <span class="hljs-number">#1677ff</span>;\n  <span class="hljs-attr">--font-size-md</span>: <span class="hljs-number">14px</span>;\n  <span class="hljs-attr">--spacing-md</span>: <span class="hljs-number">16px</span>;\n}\n\n<span class="hljs-selector-class">.button</span> {\n  <span class="hljs-attribute">background</span>: <span class="hljs-built_in">var</span>(--color-primary);\n  <span class="hljs-attribute">font-size</span>: <span class="hljs-built_in">var</span>(--font-size-md);\n  <span class="hljs-attribute">padding</span>: <span class="hljs-number">0</span> <span class="hljs-built_in">var</span>(--spacing-md);\n}\n</code></pre>\n<h2>2. CSS-in-JS（React 常用）</h2>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> theme = {\n  <span class="hljs-attr">colorPrimary</span>: <span class="hljs-string">&quot;#1677ff&quot;</span>,\n  <span class="hljs-attr">fontSizeMd</span>: <span class="hljs-string">&quot;14px&quot;</span>,\n};\n\n<span class="hljs-keyword">const</span> <span class="hljs-title class_">Button</span> = styled.<span class="hljs-property">button</span><span class="hljs-string">`\n  background: <span class="hljs-subst">${(props) =&gt; props.theme.colorPrimary}</span>;\n`</span>;\n</code></pre>\n<h2>3. Less / SCSS 变量（老项目常用）</h2>\n<pre><code class="language-scss"><span class="hljs-variable">$color-primary</span>: <span class="hljs-number">#1677ff</span>;\n<span class="hljs-selector-class">.button</span> {\n  <span class="hljs-attribute">background</span>: <span class="hljs-variable">$color-primary</span>;\n}\n</code></pre>\n<h2>4. JSON + 编译工具（现代大型项目）</h2>\n<ul>\n<li>style-dictionary</li>\n<li>token-transformer</li>\n<li>figma token</li>\n</ul>\n<p>可以把 JSON 自动转成 CSS、Less、JS、iOS、Android 资源。</p>\n<hr>\n<h1>六、真实企业级 Token 命名规范（可直接复制用）</h1>\n<h2>颜色</h2>\n<ul>\n<li><code>--color-primary-50</code> ~ <code>--color-primary-900</code></li>\n<li><code>--color-success</code></li>\n<li><code>--color-warning</code></li>\n<li><code>--color-danger</code></li>\n<li><code>--color-info</code></li>\n<li><code>--color-text-primary</code></li>\n<li><code>--color-text-secondary</code></li>\n<li><code>--color-bg-body</code></li>\n<li><code>--color-border</code></li>\n</ul>\n<h2>字号</h2>\n<ul>\n<li><code>--font-size-xs</code></li>\n<li><code>--font-size-sm</code></li>\n<li><code>--font-size-md</code></li>\n<li><code>--font-size-lg</code></li>\n<li><code>--font-size-xl</code></li>\n</ul>\n<h2>间距</h2>\n<ul>\n<li><code>--spacing-1: 4px</code></li>\n<li><code>--spacing-2: 8px</code></li>\n<li><code>--spacing-3: 12px</code></li>\n<li><code>--spacing-4: 16px</code></li>\n<li>以此类推</li>\n</ul>\n<h2>圆角</h2>\n<ul>\n<li><code>--radius-sm: 2px</code></li>\n<li><code>--radius-md: 4px</code></li>\n<li><code>--radius-lg: 8px</code></li>\n<li><code>--radius-full: 999px</code></li>\n</ul>\n<hr>\n<h1>七、和组件库的关系（AntD / Element / Arco）</h1>\n<p>现在所有主流组件库<strong>完全基于 Design Token 构建</strong>   ：</p>\n<ul>\n<li>Ant Design：<code>theme.defaultConfig</code>、<code>cssVar</code></li>\n<li>Element Plus：<code>ep-primary-color</code></li>\n<li>Arco Design：<code>token</code> 对象</li>\n<li>Tailwind：本质就是 Token 系统</li>\n</ul>\n<p>你能自定义主题，本质就是<strong>修改它内部的 Design Token</strong>   。</p>\n<hr>\n<h1>八、Design Token 工作流（现代前端标准流程）</h1>\n<ol>\n<li>设计师在 Figma 中建立 Token</li>\n<li>导出 Figma Token JSON</li>\n<li>使用 Style Dictionary 编译</li>\n<li>生成多端可用变量（CSS / Less / JS / iOS / Android）</li>\n<li>前端项目引入使用</li>\n<li>主题切换 = 替换变量</li>\n</ol>\n<hr>\n<h1>九、一句话终极总结</h1>\n<p><strong>Design Token 就是把所有视觉属性变成可管理、可继承、可替换的变量系统，\n是现代前端工程化、设计系统、主题切换、多端统一的基石。</strong></p>\n<hr>\n</div>'</script></body></html>
