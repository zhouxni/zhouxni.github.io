<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="双向链表",document.getElementById("article").innerHTML='<div><h3>一句话理解</h3>\n<p><strong>双向链表（Doubly Linked List）</strong>   是一种链式数据结构，每个节点包含 <strong>数据域 + 两个指针</strong>   （分别指向前一个节点和后一个节点），支持 <strong>双向遍历</strong>   （从头到尾或从尾到头）。</p>\n<hr>\n<h3>📌 核心结构图示</h3>\n<pre><code>┌─────┐    ┌─────┐    ┌─────┐\n│ A   │&lt;=&gt; │ B   │&lt;=&gt; │ C   │\n└─────┘    └─────┘    └─────┘\n  ↑          ↑          ↑\nprev       prev       prev\n  ↓          ↓          ↓\nnext       next       next\n</code></pre>\n<ul>\n<li><strong>节点（Node）</strong>   ：\n<ul>\n<li><code>data</code>：存储数据（如数字、对象等）。</li>\n<li><code>prev</code>：指向前一个节点（头节点为 <code>null</code>）。</li>\n<li><code>next</code>：指向后一个节点（尾节点为 <code>null</code>）。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3>🚀 双向链表 vs 单向链表</h3>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th>单向链表</th>\n<th>双向链表</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>指针方向</strong></td>\n<td>仅 <code>next</code>（单向）</td>\n<td><code>prev</code> + <code>next</code>（双向）</td>\n</tr>\n<tr>\n<td><strong>遍历方向</strong></td>\n<td>只能从头到尾</td>\n<td>可双向遍历</td>\n</tr>\n<tr>\n<td><strong>删除节点</strong></td>\n<td>需找到前一个节点</td>\n<td>直接通过 <code>prev</code> 定位</td>\n</tr>\n<tr>\n<td><strong>内存占用</strong></td>\n<td>较低（少一个指针）</td>\n<td>较高（多一个指针）</td>\n</tr>\n<tr>\n<td><strong>插入/删除效率</strong></td>\n<td>删除需 O(n) 找前驱</td>\n<td>删除仅需 O(1)（已知节点）</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>🔧 基本操作（伪代码）</h3>\n<h4>1. 节点定义（JavaScript 示例）</h4>\n<pre><code class="language-js"><span class="hljs-keyword">class</span> <span class="hljs-title class_">Node</span> {\n  <span class="hljs-title function_">constructor</span>(<span class="hljs-params">data</span>) {\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">data</span> = data;\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">prev</span> = <span class="hljs-literal">null</span>;\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">next</span> = <span class="hljs-literal">null</span>;\n  }\n}\n</code></pre>\n<h4>2. 插入节点到尾部</h4>\n<pre><code class="language-js"><span class="hljs-keyword">function</span> <span class="hljs-title function_">append</span>(<span class="hljs-params">head, data</span>) {\n  <span class="hljs-keyword">const</span> newNode = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Node</span>(data);\n  <span class="hljs-keyword">if</span> (!head) <span class="hljs-keyword">return</span> newNode;\n\n  <span class="hljs-keyword">let</span> tail = head;\n  <span class="hljs-keyword">while</span> (tail.<span class="hljs-property">next</span>) tail = tail.<span class="hljs-property">next</span>;\n  tail.<span class="hljs-property">next</span> = newNode;\n  newNode.<span class="hljs-property">prev</span> = tail;\n  <span class="hljs-keyword">return</span> head;\n}\n</code></pre>\n<h4>3. 删除指定节点</h4>\n<pre><code class="language-js"><span class="hljs-keyword">function</span> <span class="hljs-title function_">remove</span>(<span class="hljs-params">node</span>) {\n  <span class="hljs-keyword">if</span> (node.<span class="hljs-property">prev</span>) node.<span class="hljs-property">prev</span>.<span class="hljs-property">next</span> = node.<span class="hljs-property">next</span>;\n  <span class="hljs-keyword">if</span> (node.<span class="hljs-property">next</span>) node.<span class="hljs-property">next</span>.<span class="hljs-property">prev</span> = node.<span class="hljs-property">prev</span>;\n  <span class="hljs-comment">// 若删除头/尾节点，需额外处理 head/tail 指针</span>\n}\n</code></pre>\n<hr>\n<h3>📚 实际应用场景</h3>\n<ol>\n<li><strong>浏览器历史记录</strong>   （前进/后退双向导航）。</li>\n<li><strong>LRU 缓存淘汰算法</strong>   （快速移动节点到头部/尾部）。</li>\n<li><strong>音乐播放器的播放列表</strong>   （上一首/下一首快速切换）。</li>\n<li><strong>文本编辑器撤销/重做</strong>   （双向操作历史）。</li>\n</ol>\n<hr>\n<h3>🎯 总结一句话</h3>\n<p><strong>双向链表通过双向指针实现高效的双向遍历和节点操作，牺牲少量内存换取更高灵活性。</strong></p>\n</div>'</script></body></html>
