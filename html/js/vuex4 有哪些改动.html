  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
            document.getElementById('article').innerHTML = 
            "<div><p>Vuex 4 是专为 Vue 3 设计的版本，相比于 Vuex 3（用于 Vue 2），主要改动集中在兼容性、API 调整和 TypeScript 支持上。以下是核心改动点：</p>\n<hr>\n<h3>1. <strong>兼容 Vue 3</strong></h3>\n<ul>\n<li><strong>核心适配</strong>  ：Vuex 4 使用 Vue 3 的响应式系统（基于 <code>reactive</code>），而 Vuex 3 依赖 Vue 2 的 <code>Vue.observable</code>。</li>\n<li><strong>插件/DevTools</strong>  ：支持 Vue 3 的插件和开发者工具。</li>\n</ul>\n<hr>\n<h3>2. <strong>安装方式变化</strong></h3>\n<ul>\n<li><strong>Vue 3 的 <code>createApp</code> 适配</strong>  ：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { createApp } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vue&#x27;</span>\n<span class=\"hljs-keyword\">import</span> { createStore } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vuex&#x27;</span>\n\n<span class=\"hljs-keyword\">const</span> store = <span class=\"hljs-title function_\">createStore</span>({ <span class=\"hljs-comment\">/* options */</span> })\n<span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-title function_\">createApp</span>(<span class=\"hljs-title class_\">App</span>)\napp.<span class=\"hljs-title function_\">use</span>(store)\n</code></pre>\n</li>\n</ul>\n<hr>\n<h3>3. <strong>TypeScript 支持增强</strong></h3>\n<ul>\n<li><strong>更好的类型推断</strong>  ：Store、Action、Mutation 等类型定义更精确。</li>\n<li><strong>移除了 <code>this.$store</code> 的全局类型扩展</strong>  ，需手动声明：<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">declare</span> <span class=\"hljs-variable language_\">module</span> <span class=\"hljs-string\">&#x27;@vue/runtime-core&#x27;</span> {\n  <span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">ComponentCustomProperties</span> {\n    <span class=\"hljs-attr\">$store</span>: <span class=\"hljs-title class_\">Store</span>&lt;<span class=\"hljs-title class_\">State</span>&gt;\n  }\n}\n</code></pre>\n</li>\n</ul>\n<hr>\n<h3>4. <strong>API 调整</strong></h3>\n<ul>\n<li><strong><code>createStore</code> 替代 <code>new Store</code></strong>  ：更符合 Vue 3 的工厂函数风格。</li>\n<li><strong>模块的 <code>context</code> 类型</strong>  ：在 Actions 中，<code>context</code> 的类型更明确（如 <code>ActionContext&lt;State, RootState&gt;</code>）。</li>\n</ul>\n<hr>\n<h3>5. <strong>移除/废弃的功能</strong></h3>\n<ul>\n<li><strong>不再默认导出 <code>Store</code> 类</strong>  ：必须通过 <code>import { createStore } from 'vuex'</code> 使用。</li>\n<li><strong>部分 Vue 2 专属 API</strong>  ：如 <code>store.watch</code> 的行为调整以适配 Vue 3 的 <code>watch</code> API。</li>\n</ul>\n<hr>\n<h3>6. <strong>打包与构建</strong></h3>\n<ul>\n<li><strong>ES 模块支持</strong>  ：提供更现代的 ES 模块构建，支持 Tree-shaking。</li>\n<li><strong>体积优化</strong>  ：移除部分冗余代码，适配 Vue 3 的轻量化设计。</li>\n</ul>\n<hr>\n<h3>7. <strong>DevTools 集成</strong></h3>\n<ul>\n<li>需使用 Vue DevTools 5.x 及以上版本（兼容 Vue 3）。</li>\n</ul>\n<hr>\n<h3>迁移注意事项</h3>\n<ul>\n<li><strong>Vue 2 项目</strong>  ：继续使用 Vuex 3，Vuex 4 <strong>不兼容</strong>   Vue 2。</li>\n<li><strong>TypeScript 项目</strong>  ：需更新类型声明，尤其是全局 <code>$store</code> 的扩展。</li>\n<li><strong>插件检查</strong>  ：确保第三方插件（如持久化插件）支持 Vuex 4。</li>\n</ul>\n<hr>\n<h3>总结</h3>\n<p>Vuex 4 主要是为了适配 Vue 3 的核心机制，API 变化不大，但 TypeScript 支持和安装方式调整是重点。如果升级到 Vue 3，建议同步迁移到 Vuex 4；若仍在使用 Vue 2，则保持 Vuex 3 即可。</p>\n</div>";
          </script></body></html>
