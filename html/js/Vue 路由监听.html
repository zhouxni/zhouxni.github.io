<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/github-markdown.min.css">
    <link rel="stylesheet" href="../../css/github.min.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }
  </style></head>
  
  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p>在 Vue.js 中，你可以通过几种方式来监听路由变化。以下是常用的方法：</p>\n<h2>1. 使用 <code>watch</code> 监听 <code>$route</code> 对象</h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">watch</span>: {\n    <span class=\"hljs-string\">&#x27;$route&#x27;</span>(to, <span class=\"hljs-keyword\">from</span>) {\n      <span class=\"hljs-comment\">// to: 目标路由对象</span>\n      <span class=\"hljs-comment\">// from: 当前路由对象</span>\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;路由从&#x27;</span>, <span class=\"hljs-keyword\">from</span>.<span class=\"hljs-property\">path</span>, <span class=\"hljs-string\">&#x27;变化到&#x27;</span>, to.<span class=\"hljs-property\">path</span>)\n    }\n  }\n}\n</code></pre>\n<h2>2. 使用导航守卫</h2>\n<p>Vue Router 提供了几种导航守卫：</p>\n<h3>全局前置守卫</h3>\n<pre><code class=\"language-javascript\">router.<span class=\"hljs-title function_\">beforeEach</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">to, <span class=\"hljs-keyword\">from</span>, next</span>) =&gt;</span> {\n  <span class=\"hljs-comment\">// 必须调用 next() 才能继续路由跳转</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;全局前置守卫&#x27;</span>)\n  <span class=\"hljs-title function_\">next</span>()\n})\n</code></pre>\n<h3>全局解析守卫</h3>\n<pre><code class=\"language-javascript\">router.<span class=\"hljs-title function_\">beforeResolve</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">to, <span class=\"hljs-keyword\">from</span>, next</span>) =&gt;</span> {\n  <span class=\"hljs-comment\">// 在所有组件内守卫和异步路由组件被解析之后调用</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;全局解析守卫&#x27;</span>)\n  <span class=\"hljs-title function_\">next</span>()\n})\n</code></pre>\n<h3>全局后置钩子</h3>\n<pre><code class=\"language-javascript\">router.<span class=\"hljs-title function_\">afterEach</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">to, <span class=\"hljs-keyword\">from</span></span>) =&gt;</span> {\n  <span class=\"hljs-comment\">// 没有 next 函数，不会影响导航</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;全局后置钩子&#x27;</span>)\n})\n</code></pre>\n<h3>路由独享守卫</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> router = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">VueRouter</span>({\n  <span class=\"hljs-attr\">routes</span>: [\n    {\n      <span class=\"hljs-attr\">path</span>: <span class=\"hljs-string\">&#x27;/foo&#x27;</span>,\n      <span class=\"hljs-attr\">component</span>: <span class=\"hljs-title class_\">Foo</span>,\n      <span class=\"hljs-attr\">beforeEnter</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">to, <span class=\"hljs-keyword\">from</span>, next</span>) =&gt;</span> {\n        <span class=\"hljs-comment\">// 只对这个路由生效</span>\n        <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;路由独享守卫&#x27;</span>)\n        <span class=\"hljs-title function_\">next</span>()\n      }\n    }\n  ]\n})\n</code></pre>\n<h3>组件内守卫</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-title function_\">beforeRouteEnter</span>(<span class=\"hljs-params\">to, <span class=\"hljs-keyword\">from</span>, next</span>) {\n    <span class=\"hljs-comment\">// 在渲染该组件的对应路由被 confirm 前调用</span>\n    <span class=\"hljs-comment\">// 不能获取组件实例 `this`</span>\n    <span class=\"hljs-title function_\">next</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">vm</span> =&gt;</span> {\n      <span class=\"hljs-comment\">// 通过 `vm` 访问组件实例</span>\n    })\n  },\n  <span class=\"hljs-title function_\">beforeRouteUpdate</span>(<span class=\"hljs-params\">to, <span class=\"hljs-keyword\">from</span>, next</span>) {\n    <span class=\"hljs-comment\">// 在当前路由改变，但是该组件被复用时调用</span>\n    <span class=\"hljs-comment\">// 可以访问组件实例 `this`</span>\n    <span class=\"hljs-title function_\">next</span>()\n  },\n  <span class=\"hljs-title function_\">beforeRouteLeave</span>(<span class=\"hljs-params\">to, <span class=\"hljs-keyword\">from</span>, next</span>) {\n    <span class=\"hljs-comment\">// 导航离开该组件的对应路由时调用</span>\n    <span class=\"hljs-comment\">// 可以访问组件实例 `this`</span>\n    <span class=\"hljs-title function_\">next</span>()\n  }\n}\n</code></pre>\n<h2>3. 使用 <code>onReady</code> 和 <code>onError</code></h2>\n<pre><code class=\"language-javascript\">router.<span class=\"hljs-title function_\">onReady</span>(<span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;路由初始化完成&#x27;</span>)\n})\n\nrouter.<span class=\"hljs-title function_\">onError</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">error</span> =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;路由错误:&#x27;</span>, error)\n})\n</code></pre>\n<h2>4. 使用 Vue Router 4.x 的组合式 API</h2>\n<p>在 Vue 3 和 Vue Router 4 中，可以使用组合式 API：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { watch } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vue&#x27;</span>\n<span class=\"hljs-keyword\">import</span> { useRoute } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vue-router&#x27;</span>\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-title function_\">setup</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">const</span> route = <span class=\"hljs-title function_\">useRoute</span>()\n    \n    <span class=\"hljs-title function_\">watch</span>(<span class=\"hljs-function\">() =&gt;</span> route.<span class=\"hljs-property\">path</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">newPath, oldPath</span>) =&gt;</span> {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;路由路径从&#x27;</span>, oldPath, <span class=\"hljs-string\">&#x27;变化到&#x27;</span>, newPath)\n    })\n  }\n}\n</code></pre>\n<p>选择哪种方式取决于你的具体需求：</p>\n<ul>\n<li>简单的路由变化监听可以使用 <code>watch</code></li>\n<li>需要控制导航流程使用导航守卫</li>\n<li>全局逻辑使用全局守卫</li>\n<li>特定路由逻辑使用路由独享守卫</li>\n<li>组件特定逻辑使用组件内守卫</li>\n</ul>\n</div>";
      </script></body></html>
