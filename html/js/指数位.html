<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="指数位",document.getElementById("article").innerHTML="<div><p>我们换个更通俗的方式理解指数位，把浮点数想象成「科学计数法」的二进制版本：</p>\n<h3>先回忆：十进制的科学计数法</h3>\n<p>比如表示 <code>12345.67</code>，科学计数法会写成 <code>1.234567 × 10⁴</code><br>\n这里的 <code>10⁴</code> 就是「指数部分」，作用是：告诉我们小数点要向右移4位（放大10000倍）。</p>\n<h3>浮点数里的「指数位」就类似这个「10⁴」</h3>\n<p>在二进制中，一个数也会被写成类似 <code>1.xxxx × 2ⁿ</code> 的形式（<code>xxxx</code> 是二进制小数），其中：</p>\n<ul>\n<li><code>2ⁿ</code> 就是「指数部分」，决定了数值的大小（放大还是缩小）</li>\n<li>指数位（11位）的作用就是<strong>存储这个 <code>n</code> 的值</strong>   （但会加一个偏移值，后面说为什么）</li>\n</ul>\n<h3>举3个例子，一看就懂</h3>\n<p>假设我们有一个二进制数 <code>1011.01</code>（十进制是 11.25）：</p>\n<ol>\n<li>\n<p>先转换成「二进制科学计数法」：<br>\n<code>1011.01 = 1.01101 × 2³</code>（小数点向左移3位，所以乘 <code>2³</code>）</p>\n</li>\n<li>\n<p>这里的 <code>3</code> 就是「实际指数」，但指数位不能直接存 <code>3</code>，而是要加一个「偏移值1023」：<br>\n指数位存储的值 = 3 + 1023 = 1026</p>\n</li>\n<li>\n<p>所以这个数的指数位，就是 1026 的二进制（11位）：<code>10000000010</code></p>\n</li>\n</ol>\n<p>再看一个小数：<code>0.00101</code>（十进制是 0.15625）：</p>\n<ol>\n<li>\n<p>转换成「二进制科学计数法」：<br>\n<code>0.00101 = 1.01 × 2⁻³</code>（小数点向右移3位，所以乘 <code>2⁻³</code>）</p>\n</li>\n<li>\n<p>实际指数是 <code>-3</code>，指数位存储：<code>-3 + 1023 = 1020</code></p>\n</li>\n<li>\n<p>指数位就是 1020 的二进制（11位）：<code>01111111100</code></p>\n</li>\n</ol>\n<h3>为什么要加「偏移值1023」？</h3>\n<p>因为指数位是11位二进制，本质是 11 位二进制的物理限制 —— 11 位最多只能装下 2047，再大的数就 “塞不下” 了，只能表示 <code>0~2047</code> 的正数，加1023后：</p>\n<ul>\n<li>当实际指数是 <code>0</code> 时，指数位存 <code>1023</code></li>\n<li>实际指数是 <code>1023</code> 时，指数位存 <code>2046</code>（最大正数指数）</li>\n<li>实际指数是 <code>-1023</code> 时，指数位存 <code>0</code>（最小负数指数）</li>\n</ul>\n<p>这样就用正数范围「假装」表示了正负指数，不用额外加符号位，节省空间。</p>\n<h3>一句话总结</h3>\n<p>指数位就是<strong>二进制科学计数法里的「缩放倍数」</strong>   ，通过存储「实际指数+1023」，告诉我们这个数到底是很大（指数大）、很小（指数小），还是中等大小（指数接近1023）。</p>\n</div>"</script></body></html>
