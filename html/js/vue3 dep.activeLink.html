<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="vue3 dep.activeLink",document.getElementById("article").innerHTML='<div><p>在 Vue 3.5 的响应式系统中，<code>dep.activeLink</code> 是双向链表中的一个节点对象（<code>LinkNode</code>），它包含以下关键属性：</p>\n<hr>\n<h3><strong><code>dep.activeLink</code> 的属性列表</strong></h3>\n<table>\n<thead>\n<tr>\n<th>属性名</th>\n<th>类型</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>dep</code></td>\n<td><code>Dep</code></td>\n<td>当前节点关联的依赖集合（如 <code>obj.count</code> 的依赖）。</td>\n</tr>\n<tr>\n<td><code>effect</code></td>\n<td><code>ReactiveEffect</code></td>\n<td>当前节点关联的副作用函数（如组件渲染、计算属性等）。</td>\n</tr>\n<tr>\n<td><code>prevActiveLink</code></td>\n<td><code>LinkNode</code> | <code>null</code></td>\n<td>指向上一个活跃节点（用于维护链表历史记录）。</td>\n</tr>\n<tr>\n<td><code>nextDep</code></td>\n<td><code>LinkNode</code> | <code>null</code></td>\n<td>指向下一个依赖节点（在 <code>effect</code> 的依赖链表中）。</td>\n</tr>\n<tr>\n<td><code>version</code></td>\n<td><code>number</code></td>\n<td>当前节点的版本号，用于标记依赖是否需要更新（初始为 <code>-1</code>）。</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>属性详解</strong></h3>\n<h4>1. <strong><code>dep</code></strong></h4>\n<ul>\n<li><strong>作用</strong>   ：指向当前节点所属的依赖集合（<code>Dep</code> 对象）。</li>\n<li><strong>示例</strong>   ：<pre><code class="language-javascript"><span class="hljs-keyword">const</span> obj = <span class="hljs-title function_">reactive</span>({ <span class="hljs-attr">count</span>: <span class="hljs-number">1</span> });\n<span class="hljs-title function_">effect</span>(<span class="hljs-function">() =&gt;</span> <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(obj.<span class="hljs-property">count</span>));\n<span class="hljs-comment">// link.dep 指向 obj.count 的依赖集合</span>\n</code></pre>\n</li>\n</ul>\n<h4>2. <strong><code>effect</code></strong></h4>\n<ul>\n<li><strong>作用</strong>   ：指向关联的副作用函数（如组件渲染函数、计算属性等）。</li>\n<li><strong>访问方式</strong>   ：<pre><code class="language-javascript"><span class="hljs-keyword">const</span> effect = dep.<span class="hljs-property">activeLink</span>.<span class="hljs-property">effect</span>;\n</code></pre>\n</li>\n</ul>\n<h4>3. <strong><code>prevActiveLink</code></strong></h4>\n<ul>\n<li><strong>作用</strong>   ：指向上一个活跃的 <code>LinkNode</code>，用于维护依赖历史（类似“撤销栈”）。</li>\n<li><strong>场景</strong>   ：\n<ul>\n<li>动态依赖切换时（如 <code>v-if</code>），保留旧依赖引用以便清理。</li>\n</ul>\n</li>\n</ul>\n<h4>4. <strong><code>nextDep</code></strong></h4>\n<ul>\n<li><strong>作用</strong>   ：在 <code>effect</code> 的依赖链表中指向下一个节点。</li>\n<li><strong>链表结构示例</strong>   ：<pre><code class="language-javascript"><span class="hljs-title function_">effect</span>(<span class="hljs-function">() =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(obj.<span class="hljs-property">count</span>); <span class="hljs-comment">// link1</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(obj.<span class="hljs-property">name</span>); <span class="hljs-comment">// link2</span>\n});\n<span class="hljs-comment">// link1.nextDep = link2</span>\n</code></pre>\n</li>\n</ul>\n<h4>5. <strong><code>version</code></strong></h4>\n<ul>\n<li><strong>作用</strong>   ：\n<ul>\n<li><strong>初始值</strong>   ：<code>-1</code>（表示“待重新收集”）。</li>\n<li><strong>更新逻辑</strong>   ：\n<ul>\n<li>若依赖的响应式数据变化，<code>dep.version++</code>。</li>\n<li>重新收集依赖时，<code>link.version</code> 会更新为 <code>dep.version</code>。</li>\n</ul>\n</li>\n<li><strong>清理依据</strong>   ：\n<ul>\n<li>如果 <code>link.version !== dep.version</code>，说明依赖已失效，需要移除。</li>\n</ul>\n</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>完整类型定义（TypeScript）</strong></h3>\n<pre><code class="language-typescript"><span class="hljs-keyword">interface</span> <span class="hljs-title class_">LinkNode</span> {\n  <span class="hljs-attr">dep</span>: <span class="hljs-title class_">Dep</span>; <span class="hljs-comment">// 关联的依赖集合</span>\n  <span class="hljs-attr">effect</span>: <span class="hljs-title class_">ReactiveEffect</span>; <span class="hljs-comment">// 关联的副作用函数</span>\n  <span class="hljs-attr">prevActiveLink</span>: <span class="hljs-title class_">LinkNode</span> | <span class="hljs-literal">null</span>; <span class="hljs-comment">// 上一个活跃节点</span>\n  <span class="hljs-attr">nextDep</span>: <span class="hljs-title class_">LinkNode</span> | <span class="hljs-literal">null</span>; <span class="hljs-comment">// 下一个依赖节点</span>\n  <span class="hljs-attr">version</span>: <span class="hljs-built_in">number</span>; <span class="hljs-comment">// 版本号（初始为 -1）</span>\n}\n</code></pre>\n<hr>\n<h3><strong>为什么需要这些属性？</strong></h3>\n<ol>\n<li><strong>精准依赖追踪</strong><br>\n通过 <code>dep</code> 和 <code>effect</code> 的关联，明确数据与副作用的关系。</li>\n<li><strong>动态依赖管理</strong><br>\n<code>prevActiveLink</code> 和 <code>nextDep</code> 支持条件分支（如 <code>v-if</code>）的高效切换。</li>\n<li><strong>性能优化</strong><br>\n<code>version</code> 机制避免不必要的依赖更新和清理。</li>\n</ol>\n<hr>\n<h3><strong>示例：访问 <code>activeLink</code> 属性</strong></h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// 假设 obj.count 的依赖已收集</span>\n<span class="hljs-keyword">const</span> dep = obj.<span class="hljs-property">count</span>的dep;\n\n<span class="hljs-comment">// 访问当前活跃的 link 节点</span>\n<span class="hljs-keyword">const</span> activeLink = dep.<span class="hljs-property">activeLink</span>;\n\n<span class="hljs-comment">// 获取关联的 effect</span>\n<span class="hljs-keyword">const</span> currentEffect = activeLink.<span class="hljs-property">effect</span>;\n\n<span class="hljs-comment">// 检查版本号</span>\n<span class="hljs-keyword">if</span> (activeLink.<span class="hljs-property">version</span> === -<span class="hljs-number">1</span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;该依赖待重新收集&quot;</span>);\n}\n</code></pre>\n<hr>\n<h3><strong>总结</strong></h3>\n<ul>\n<li><code>dep.activeLink</code> 是<strong>链表节点</strong>   （<code>LinkNode</code>），不是 <code>effect</code> 本身。</li>\n<li>核心属性包括 <code>dep</code>、<code>effect</code>、<code>prevActiveLink</code>、<code>nextDep</code> 和 <code>version</code>。</li>\n<li>设计目标是<strong>高效管理动态依赖</strong>   ，尤其适合 Vue 3 的响应式更新机制。</li>\n</ul>\n</div>'</script></body></html>
