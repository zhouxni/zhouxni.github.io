<script>
            document.getElementById('article').innerHTML = 
            "<div><p><code>@vue/test-utils</code> 是 Vue.js 官方提供的单元测试工具库，它提供了一系列实用的 API 来简化 Vue 组件的测试过程。以下是一些常用的 API 及其功能介绍：</p>\n<h3>1. <strong>挂载组件</strong></h3>\n<ul>\n<li><strong><code>mount(component, options)</code></strong>  ：\n<ul>\n<li>用于完整地挂载一个 Vue 组件，包括其子组件。</li>\n<li>返回一个 <code>Wrapper</code> 对象，包含组件实例和测试方法。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { mount } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;@vue/test-utils&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">MyComponent</span> <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;@/components/MyComponent.vue&#x27;</span>;\n\n<span class=\"hljs-keyword\">const</span> wrapper = <span class=\"hljs-title function_\">mount</span>(<span class=\"hljs-title class_\">MyComponent</span>);\n</code></pre>\n</li>\n</ul>\n</li>\n<li><strong><code>shallowMount(component, options)</code></strong>  ：\n<ul>\n<li>用于浅挂载一个 Vue 组件，不渲染其子组件，子组件会被存根。</li>\n<li>适用于只测试组件本身的逻辑，而不关心子组件的实现。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { shallowMount } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;@vue/test-utils&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">MyComponent</span> <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;@/components/MyComponent.vue&#x27;</span>;\n\n<span class=\"hljs-keyword\">const</span> wrapper = <span class=\"hljs-title function_\">shallowMount</span>(<span class=\"hljs-title class_\">MyComponent</span>);\n</code></pre>\n</li>\n</ul>\n</li>\n</ul>\n<h3>2. <strong>操作组件状态</strong></h3>\n<ul>\n<li><strong><code>setData(data)</code></strong>  ：\n<ul>\n<li>用于设置组件的 <code>data</code> 属性。</li>\n<li>示例：<pre><code class=\"language-javascript\">wrapper.<span class=\"hljs-title function_\">setData</span>({ <span class=\"hljs-attr\">count</span>: <span class=\"hljs-number\">10</span> });\n</code></pre>\n</li>\n</ul>\n</li>\n<li><strong><code>setProps(props)</code></strong>  ：\n<ul>\n<li>用于设置组件的 <code>props</code> 属性。</li>\n<li>示例：<pre><code class=\"language-javascript\">wrapper.<span class=\"hljs-title function_\">setProps</span>({ <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">&#x27;Hello, World!&#x27;</span> });\n</code></pre>\n</li>\n</ul>\n</li>\n</ul>\n<h3>3. <strong>查找和操作 DOM 元素</strong></h3>\n<ul>\n<li><strong><code>find(selector)</code></strong>  ：\n<ul>\n<li>查找匹配选择器的第一个元素或组件。</li>\n<li>返回一个 <code>Wrapper</code> 对象。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> button = wrapper.<span class=\"hljs-title function_\">find</span>(<span class=\"hljs-string\">&#x27;button&#x27;</span>);\n</code></pre>\n</li>\n</ul>\n</li>\n<li><strong><code>findAll(selector)</code></strong>  ：\n<ul>\n<li>查找匹配选择器的所有元素或组件。</li>\n<li>返回一个 <code>WrapperArray</code> 对象。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> buttons = wrapper.<span class=\"hljs-title function_\">findAll</span>(<span class=\"hljs-string\">&#x27;button&#x27;</span>);\n</code></pre>\n</li>\n</ul>\n</li>\n<li><strong><code>trigger(eventName, options)</code></strong>  ：\n<ul>\n<li>触发组件上的事件。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">await</span> wrapper.<span class=\"hljs-title function_\">find</span>(<span class=\"hljs-string\">&#x27;button&#x27;</span>).<span class=\"hljs-title function_\">trigger</span>(<span class=\"hljs-string\">&#x27;click&#x27;</span>);\n</code></pre>\n</li>\n</ul>\n</li>\n</ul>\n<h3>4. <strong>获取组件信息</strong></h3>\n<ul>\n<li><strong><code>text()</code></strong>  ：\n<ul>\n<li>获取组件渲染后的纯文本内容。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">expect</span>(wrapper.<span class=\"hljs-title function_\">text</span>()).<span class=\"hljs-title function_\">toContain</span>(<span class=\"hljs-string\">&#x27;Hello, World!&#x27;</span>);\n</code></pre>\n</li>\n</ul>\n</li>\n<li><strong><code>html()</code></strong>  ：\n<ul>\n<li>获取组件渲染后的 HTML 字符串。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">expect</span>(wrapper.<span class=\"hljs-title function_\">html</span>()).<span class=\"hljs-title function_\">toContain</span>(<span class=\"hljs-string\">&#x27;&lt;h1&gt;Hello, World!&lt;/h1&gt;&#x27;</span>);\n</code></pre>\n</li>\n</ul>\n</li>\n<li><strong><code>exists()</code></strong>  ：\n<ul>\n<li>检查某个元素或组件是否存在。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">expect</span>(wrapper.<span class=\"hljs-title function_\">find</span>(<span class=\"hljs-string\">&#x27;h1&#x27;</span>).<span class=\"hljs-title function_\">exists</span>()).<span class=\"hljs-title function_\">toBe</span>(<span class=\"hljs-literal\">true</span>);\n</code></pre>\n</li>\n</ul>\n</li>\n</ul>\n<h3>5. <strong>事件处理</strong></h3>\n<ul>\n<li><strong><code>emitted(eventName?)</code></strong>  ：\n<ul>\n<li>获取组件触发的事件记录。</li>\n<li>如果不传参数，则返回所有事件记录；如果传参数，则返回指定事件名的记录。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">expect</span>(wrapper.<span class=\"hljs-title function_\">emitted</span>(<span class=\"hljs-string\">&#x27;click&#x27;</span>)).<span class=\"hljs-title function_\">toBeTruthy</span>();\n</code></pre>\n</li>\n</ul>\n</li>\n</ul>\n<h3>6. <strong>存根和模拟</strong></h3>\n<ul>\n<li><strong><code>stubs</code></strong>  ：\n<ul>\n<li>在挂载选项中使用，用于存根全局或局部注册的组件。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> wrapper = <span class=\"hljs-title function_\">mount</span>(<span class=\"hljs-title class_\">MyComponent</span>, {\n  <span class=\"hljs-attr\">stubs</span>: { <span class=\"hljs-title class_\">ChildComponent</span>: <span class=\"hljs-literal\">true</span> }\n});\n</code></pre>\n</li>\n</ul>\n</li>\n<li><strong><code>mocks</code></strong>  ：\n<ul>\n<li>在挂载选项中使用，用于模拟全局属性或插件。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> wrapper = <span class=\"hljs-title function_\">mount</span>(<span class=\"hljs-title class_\">MyComponent</span>, {\n  <span class=\"hljs-attr\">mocks</span>: { <span class=\"hljs-attr\">$route</span>: { <span class=\"hljs-attr\">path</span>: <span class=\"hljs-string\">&#x27;/home&#x27;</span> } }\n});\n</code></pre>\n</li>\n</ul>\n</li>\n</ul>\n<h3>7. <strong>其他实用方法</strong></h3>\n<ul>\n<li><strong><code>destroy()</code></strong>  ：\n<ul>\n<li>销毁组件实例，清理资源。</li>\n<li>示例：<pre><code class=\"language-javascript\">wrapper.<span class=\"hljs-title function_\">destroy</span>();\n</code></pre>\n</li>\n</ul>\n</li>\n<li><strong><code>classes()</code></strong>  ：\n<ul>\n<li>获取组件根 DOM 节点的 class 列表。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">expect</span>(wrapper.<span class=\"hljs-title function_\">classes</span>()).<span class=\"hljs-title function_\">toContain</span>(<span class=\"hljs-string\">&#x27;my-class&#x27;</span>);\n</code></pre>\n</li>\n</ul>\n</li>\n<li><strong><code>attributes()</code></strong>  ：\n<ul>\n<li>获取组件根 DOM 节点的属性对象。</li>\n<li>示例：<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">expect</span>(wrapper.<span class=\"hljs-title function_\">attributes</span>().<span class=\"hljs-property\">id</span>).<span class=\"hljs-title function_\">toBe</span>(<span class=\"hljs-string\">&#x27;my-id&#x27;</span>);\n</code></pre>\n</li>\n</ul>\n</li>\n</ul>\n<p>这些 API 提供了强大的功能，可以帮助开发者对 Vue 组件进行各种测试，包括单元测试、集成测试等。通过合理使用这些 API，可以确保组件的正确性和稳定性。</p>\n</div>";
          </script></body></html>
