<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = '预加载和预渲染'
        document.getElementById('article').innerHTML = 
        "<div><p><strong>link 标签的预加载和预渲染</strong></p>\n<h3>预加载（Preload）</h3>\n<ol>\n<li><strong>定义</strong>  ：\n<ul>\n<li>预加载是指通过 <code>&lt;link&gt;</code> 标签的 <code>rel=&quot;preload&quot;</code> 属性，告诉浏览器提前加载某个资源，以便在页面需要时能够立即使用。</li>\n</ul>\n</li>\n<li><strong>作用</strong>  ：\n<ul>\n<li>提高页面加载速度：预加载的资源在页面需要时能够立即使用，减少等待时间。</li>\n<li>优化用户体验：通过提前加载关键资源，避免用户在使用页面时遇到资源加载延迟。</li>\n</ul>\n</li>\n<li><strong>用法</strong>  ：\n<ul>\n<li><code>&lt;link rel=&quot;preload&quot; href=&quot;resource-url&quot; as=&quot;resource-type&quot;&gt;</code></li>\n<li><code>href</code> 指定要预加载的资源 URL。</li>\n<li><code>as</code> 指定资源的类型，如 <code>script</code>、<code>style</code>、<code>image</code> 等，帮助浏览器优化加载优先级。</li>\n</ul>\n</li>\n<li><strong>注意事项</strong>  ：\n<ul>\n<li>预加载的资源不会被自动执行，只是提前下载到缓存中。</li>\n<li>应避免滥用预加载，以免增加带宽消耗和浏览器负担。</li>\n</ul>\n</li>\n</ol>\n<h3>预渲染（Prerender）</h3>\n<ol>\n<li><strong>定义</strong>  ：\n<ul>\n<li>预渲染是指通过 <code>&lt;link&gt;</code> 标签的 <code>rel=&quot;prerender&quot;</code> 属性，告诉浏览器提前渲染一个页面，以便在用户点击链接时能够立即显示。</li>\n</ul>\n</li>\n<li><strong>作用</strong>  ：\n<ul>\n<li>实现瞬间加载：预渲染的页面在用户点击链接时能够立即显示，无需等待加载。</li>\n<li>提升用户体验：通过提前渲染页面，减少用户等待时间，提高页面响应速度。</li>\n</ul>\n</li>\n<li><strong>用法</strong>  ：\n<ul>\n<li><code>&lt;link rel=&quot;prerender&quot; href=&quot;page-url&quot;&gt;</code></li>\n<li><code>href</code> 指定要预渲染的页面 URL。</li>\n</ul>\n</li>\n<li><strong>注意事项</strong>  ：\n<ul>\n<li>预渲染会消耗额外的系统资源，包括 CPU 和内存。</li>\n<li>现代浏览器已经逐渐弃用 <code>prerender</code>，因为它可能导致性能问题，尤其是在移动设备上。</li>\n<li>如果需要实现类似预渲染的效果，可以考虑使用其他优化策略，如预加载关键资源、延迟加载非关键资源等。</li>\n</ul>\n</li>\n</ol>\n<h3>区别与联系</h3>\n<ul>\n<li><strong>区别</strong>  ：\n<ul>\n<li>预加载只是提前下载资源，不会执行或渲染页面。</li>\n<li>预渲染则会提前渲染整个页面，包括执行 JavaScript 和加载样式表等。</li>\n</ul>\n</li>\n<li><strong>联系</strong>  ：\n<ul>\n<li>两者都是为了提高页面加载速度和用户体验。</li>\n<li>在某些情况下，预加载可以作为预渲染的替代方案，尤其是在预渲染被弃用或不可用的情况下。</li>\n</ul>\n</li>\n</ul>\n<h3>总结</h3>\n<ul>\n<li><strong>预加载</strong>  适用于需要提前下载资源但不立即执行或渲染的场景。</li>\n<li><strong>预渲染</strong>  适用于需要提前渲染整个页面以实现瞬间加载的场景，但需注意其资源消耗和兼容性问题。</li>\n<li>在实际开发中，应根据具体需求和浏览器支持情况选择合适的优化策略。</li>\n</ul>\n</div>";</script></body></html>
