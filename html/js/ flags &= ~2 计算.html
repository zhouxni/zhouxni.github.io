<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title=" flags &= ~2 计算",document.getElementById("article").innerHTML="<div><p>把 <code>flags &amp;= ~2</code> 拆开一步步算一次就明白了。</p>\n<hr>\n<h3>1. 先把 2 转成二进制</h3>\n<pre><code>2  →  0b0000 0010\n</code></pre>\n<h3>2. 取反 <code>~</code></h3>\n<p>JavaScript 的 <code>~</code> 是 <strong>32 位按位取反</strong>   ：</p>\n<pre><code>~0b0000 0010\n= 0b1111 1101   （十进制 -3）\n</code></pre>\n<h3>3. 再与原值做按位与 <code>&amp;</code></h3>\n<p>假设原来的 <code>flags</code> 是十进制 <code>5</code>：</p>\n<pre><code>     5      →  0b0000 0101\n&amp;  (~2)     →  0b1111 1101\n--------------------------\n               0b0000 0101   →  5\n</code></pre>\n<p>因为 <code>0b0000 0101</code> 的第 1 位本来就是 0，结果没变；<br>\n如果原来是 <code>6</code> (<code>0b0000 0110</code>)：</p>\n<pre><code>     6      →  0b0000 0110\n&amp;  (~2)     →  0b1111 1101\n--------------------------\n               0b0000 0100   →  4\n</code></pre>\n<p>可以看到第 1 位被成功清 0，其余位保持不变。</p>\n<hr>\n<h3>✅ 一句话结论</h3>\n<p><code>flags &amp;= ~2</code> 就是 <strong>把 flags 的第 1 位（bit 1）强制置 0</strong>   ，其余位原封不动。</p>\n</div>"</script></body></html>
