<script>
    
        document.getElementById('article').innerHTML = 
        "<div><h3>TypeScript 枚举类型详解</h3>\n<p>TypeScript 的枚举（Enum）是一种特殊的类型，用于定义一组命名的常量。枚举提供了一种将一组相关的常量组织在一起的方式，使代码更加清晰和易于维护。以下是 TypeScript 枚举类型的详细解析：</p>\n<hr>\n<h4>1. <strong>枚举的定义</strong></h4>\n<p>枚举使用 <code>enum</code> 关键字定义，可以包含一组数值或字符串常量。</p>\n<p><strong>示例</strong>  ：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">Direction</span> {\n  <span class=\"hljs-title class_\">Up</span>,    <span class=\"hljs-comment\">// 默认值为 0</span>\n  <span class=\"hljs-title class_\">Down</span>,  <span class=\"hljs-comment\">// 默认值为 1</span>\n  <span class=\"hljs-title class_\">Left</span>,  <span class=\"hljs-comment\">// 默认值为 2</span>\n  <span class=\"hljs-title class_\">Right</span>  <span class=\"hljs-comment\">// 默认值为 3</span>\n}\n</code></pre>\n<hr>\n<h4>2. <strong>数值枚举</strong></h4>\n<ul>\n<li><strong>默认行为</strong>  ：数值枚举的成员默认从 0 开始递增。</li>\n<li><strong>自定义值</strong>  ：可以为枚举成员指定初始值，后续成员会依次递增。</li>\n</ul>\n<p><strong>示例</strong>  ：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">Response</span> {\n  <span class=\"hljs-title class_\">No</span> = <span class=\"hljs-number\">0</span>,\n  <span class=\"hljs-title class_\">Yes</span> = <span class=\"hljs-number\">1</span>\n}\n\n<span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">Status</span> {\n  <span class=\"hljs-title class_\">Active</span> = <span class=\"hljs-number\">1</span>,\n  <span class=\"hljs-title class_\">Inactive</span>,  <span class=\"hljs-comment\">// 值为 2</span>\n  <span class=\"hljs-title class_\">Pending</span>    <span class=\"hljs-comment\">// 值为 3</span>\n}\n</code></pre>\n<ul>\n<li><strong>反向映射</strong>  ：数值枚举在编译后会同时生成从值到名称的反向映射。</li>\n</ul>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">Color</span> {\n  <span class=\"hljs-title class_\">Red</span> = <span class=\"hljs-number\">1</span>,\n  <span class=\"hljs-title class_\">Green</span>,\n  <span class=\"hljs-title class_\">Blue</span>\n}\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title class_\">Color</span>.<span class=\"hljs-property\">Red</span>);    <span class=\"hljs-comment\">// 输出: 1</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title class_\">Color</span>[<span class=\"hljs-number\">1</span>]);     <span class=\"hljs-comment\">// 输出: &quot;Red&quot;</span>\n</code></pre>\n<hr>\n<h4>3. <strong>字符串枚举</strong></h4>\n<ul>\n<li><strong>特点</strong>  ：字符串枚举没有反向映射，成员必须显式初始化。</li>\n<li><strong>用途</strong>  ：适用于需要更具可读性和安全性的场景。</li>\n</ul>\n<p><strong>示例</strong>  ：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">Direction</span> {\n  <span class=\"hljs-title class_\">Up</span> = <span class=\"hljs-string\">&quot;UP&quot;</span>,\n  <span class=\"hljs-title class_\">Down</span> = <span class=\"hljs-string\">&quot;DOWN&quot;</span>,\n  <span class=\"hljs-title class_\">Left</span> = <span class=\"hljs-string\">&quot;LEFT&quot;</span>,\n  <span class=\"hljs-title class_\">Right</span> = <span class=\"hljs-string\">&quot;RIGHT&quot;</span>\n}\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title class_\">Direction</span>.<span class=\"hljs-property\">Up</span>);    <span class=\"hljs-comment\">// 输出: &quot;UP&quot;</span>\n</code></pre>\n<hr>\n<h4>4. <strong>异构枚举</strong></h4>\n<ul>\n<li><strong>特点</strong>  ：枚举成员可以同时包含数值和字符串，但不建议使用，因为会失去反向映射和部分类型安全。</li>\n</ul>\n<p><strong>示例</strong>  ：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">MixedEnum</span> {\n  <span class=\"hljs-title class_\">No</span> = <span class=\"hljs-number\">0</span>,\n  <span class=\"hljs-title class_\">Yes</span> = <span class=\"hljs-string\">&quot;YES&quot;</span>\n}\n</code></pre>\n<hr>\n<h4>5. <strong>常量枚举</strong></h4>\n<ul>\n<li><strong>定义</strong>  ：使用 <code>const enum</code> 关键字，编译时会内联枚举的定义。</li>\n<li><strong>优点</strong>  ：减少运行时开销，因为枚举在编译后会被直接替换为对应的值。</li>\n<li><strong>限制</strong>  ：只能在属性、索引访问表达式、导入/导出的命名空间或类型查询中使用。</li>\n</ul>\n<p><strong>示例</strong>  ：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">Direction</span> {\n  <span class=\"hljs-title class_\">Up</span>,\n  <span class=\"hljs-title class_\">Down</span>,\n  <span class=\"hljs-title class_\">Left</span>,\n  <span class=\"hljs-title class_\">Right</span>\n}\n\n<span class=\"hljs-keyword\">let</span> <span class=\"hljs-attr\">dir</span>: <span class=\"hljs-title class_\">Direction</span> = <span class=\"hljs-title class_\">Direction</span>.<span class=\"hljs-property\">Up</span>;\n</code></pre>\n<p>编译后：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">let</span> dir = <span class=\"hljs-number\">0</span> <span class=\"hljs-comment\">/* Up */</span>;\n</code></pre>\n<hr>\n<h4>6. <strong>枚举成员的类型</strong></h4>\n<ul>\n<li>枚举成员的类型是枚举类型本身。</li>\n<li>枚举类型可以与其他类型联合使用。</li>\n</ul>\n<p><strong>示例</strong>  ：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">Color</span> {\n  <span class=\"hljs-title class_\">Red</span>,\n  <span class=\"hljs-title class_\">Green</span>,\n  <span class=\"hljs-title class_\">Blue</span>\n}\n\n<span class=\"hljs-keyword\">let</span> <span class=\"hljs-attr\">c</span>: <span class=\"hljs-title class_\">Color</span> = <span class=\"hljs-title class_\">Color</span>.<span class=\"hljs-property\">Green</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">printColor</span>(<span class=\"hljs-params\"><span class=\"hljs-attr\">color</span>: <span class=\"hljs-title class_\">Color</span></span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(color);\n}\n\n<span class=\"hljs-title function_\">printColor</span>(<span class=\"hljs-title class_\">Color</span>.<span class=\"hljs-property\">Red</span>);    <span class=\"hljs-comment\">// 输出: 0</span>\n</code></pre>\n<hr>\n<h4>7. <strong>使用枚举的最佳实践</strong></h4>\n<ul>\n<li><strong>可读性</strong>  ：使用枚举可以提高代码的可读性和可维护性，避免使用魔术数字或字符串。</li>\n<li><strong>类型安全</strong>  ：枚举提供了类型安全，防止无效值被赋值。</li>\n<li><strong>性能考虑</strong>  ：在性能敏感的场景中，考虑使用 <code>const enum</code> 或对象字面量来替代传统枚举。</li>\n<li><strong>避免过度使用</strong>  ：不要为简单的布尔值或少量状态使用枚举，可以考虑使用联合类型或字面量类型。</li>\n</ul>\n<hr>\n<h4>8. <strong>枚举与联合类型的比较</strong></h4>\n<ul>\n<li><strong>枚举</strong>  ：适用于一组固定的、相关的常量，提供了更好的可读性和类型安全。</li>\n<li><strong>联合类型</strong>  ：适用于简单的、不相关的常量集合，更加灵活。</li>\n</ul>\n<p><strong>示例</strong>  ：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-comment\">// 使用枚举</span>\n<span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">Status</span> {\n  <span class=\"hljs-title class_\">Active</span>,\n  <span class=\"hljs-title class_\">Inactive</span>\n}\n\n<span class=\"hljs-comment\">// 使用联合类型</span>\n<span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">StatusUnion</span> = <span class=\"hljs-string\">&quot;active&quot;</span> | <span class=\"hljs-string\">&quot;inactive&quot;</span>;\n</code></pre>\n<hr>\n<h4>9. <strong>枚举的编译结果</strong></h4>\n<ul>\n<li><strong>数值枚举</strong>  ：编译后会生成一个双向映射的对象。</li>\n<li><strong>字符串枚举</strong>  ：编译后会生成一个单向映射的对象。</li>\n<li><strong>常量枚举</strong>  ：编译后会内联替换为对应的值。</li>\n</ul>\n<p><strong>示例</strong>  ：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">Direction</span> {\n  <span class=\"hljs-title class_\">Up</span>,\n  <span class=\"hljs-title class_\">Down</span>\n}\n</code></pre>\n<p>编译后：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">var</span> <span class=\"hljs-title class_\">Direction</span>;\n(<span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">Direction</span>) {\n  <span class=\"hljs-title class_\">Direction</span>[<span class=\"hljs-title class_\">Direction</span>[<span class=\"hljs-string\">&quot;Up&quot;</span>] = <span class=\"hljs-number\">0</span>] = <span class=\"hljs-string\">&quot;Up&quot;</span>;\n  <span class=\"hljs-title class_\">Direction</span>[<span class=\"hljs-title class_\">Direction</span>[<span class=\"hljs-string\">&quot;Down&quot;</span>] = <span class=\"hljs-number\">1</span>] = <span class=\"hljs-string\">&quot;Down&quot;</span>;\n})(<span class=\"hljs-title class_\">Direction</span> || (<span class=\"hljs-title class_\">Direction</span> = {}));\n</code></pre>\n<hr>\n<h4>10. <strong>总结</strong></h4>\n<ul>\n<li><strong>枚举</strong>  是 TypeScript 中定义一组命名常量的强大工具。</li>\n<li><strong>数值枚举</strong>  和<strong>字符串枚举</strong>  各有优缺点，应根据具体需求选择。</li>\n<li><strong>常量枚举</strong>  提供了更好的性能，但使用场景有限。</li>\n<li>在设计 API 或库时，考虑枚举对编译结果和运行时性能的影响。</li>\n</ul>\n<p>通过合理使用枚举，可以使代码更加清晰、易于维护，并提高类型安全性。</p>\n</div>";
      </script></body></html>
