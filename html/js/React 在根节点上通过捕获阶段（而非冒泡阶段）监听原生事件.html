<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p>是的，<strong>React 在根节点（如 <code>document</code> 或 React 17+ 的应用挂载节点）上通过捕获阶段（<code>capture: true</code>）监听原生事件</strong>   ，这是其合成事件系统能够可靠运行的核心设计之一。以下是详细解释：</p>\n<hr>\n<h3>1. <strong>React 事件监听的核心机制</strong></h3>\n<h4>（1）事件委托到根节点</h4>\n<ul>\n<li><strong>React 16 及之前</strong>   ：所有事件委托到 <code>document</code> 节点。</li>\n<li><strong>React 17+</strong>   ：事件委托到应用挂载的根 DOM 节点（如 <code>ReactDOM.createRoot(root).render()</code>）。</li>\n<li><strong>监听阶段</strong>   ：<br>\nReact 在根节点上通过<strong>捕获阶段</strong>   （而非冒泡阶段）监听原生事件。例如：<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// React 内部的简化逻辑</span>\nrootNode.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&quot;click&quot;</span>, dispatchEvent, <span class=\"hljs-literal\">true</span>); <span class=\"hljs-comment\">// 第三个参数 true 表示捕获阶段</span>\n</code></pre>\n</li>\n</ul>\n<h4>（2）为什么用捕获阶段？</h4>\n<ul>\n<li><strong>确保优先拦截事件</strong>   ：<br>\n捕获阶段早于目标阶段和冒泡阶段触发。即使子组件调用 <code>e.nativeEvent.stopPropagation()</code> 阻止原生事件冒泡，React 仍能在捕获阶段获取事件。</li>\n<li><strong>绕过第三方库的干扰</strong>   ：<br>\n某些库可能会阻止事件冒泡，但无法阻止捕获阶段的监听。</li>\n</ul>\n<hr>\n<h3>2. <strong>完整事件流程（以点击事件为例）</strong></h3>\n<ol>\n<li>\n<p><strong>用户点击 <code>&lt;button&gt;</code></strong>   ：<br>\n浏览器生成原生 <code>click</code> 事件，按顺序触发：</p>\n<ul>\n<li><strong>捕获阶段</strong>   ：从 <code>window</code> → <code>document</code> → ... → <code>&lt;button&gt;</code> 的父节点。</li>\n<li><strong>目标阶段</strong>   ：触发 <code>&lt;button&gt;</code> 上的原生事件。</li>\n<li><strong>冒泡阶段</strong>   ：从 <code>&lt;button&gt;</code> → 父节点 → ... → <code>document</code>（如果未被阻止）。</li>\n</ul>\n</li>\n<li>\n<p><strong>React 的捕获监听</strong>   ：<br>\nReact 的根节点在捕获阶段监听到事件，调用 <code>dispatchEvent</code>：</p>\n<ul>\n<li>通过 <code>event.target</code> 找到实际点击的 DOM 节点。</li>\n<li>根据 Fiber 树（虚拟 DOM）定位对应的 React 组件。</li>\n</ul>\n</li>\n<li>\n<p><strong>合成事件的派发</strong>   ：<br>\nReact <strong>手动模拟</strong>   事件流程：</p>\n<ul>\n<li><strong>捕获阶段</strong>   ：从根组件向下调用 <code>onClickCapture</code>。</li>\n<li><strong>冒泡阶段</strong>   ：从目标组件向上调用 <code>onClick</code>（除非调用 <code>e.stopPropagation()</code>）。</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h3>3. <strong>关键验证：<code>e.nativeEvent.stopPropagation()</code> 无效的原因</strong></h3>\n<pre><code class=\"language-jsx\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">App</span> = (<span class=\"hljs-params\"></span>) =&gt; {\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">handleClick</span> = (<span class=\"hljs-params\">e</span>) =&gt; {\n    e.<span class=\"hljs-property\">nativeEvent</span>.<span class=\"hljs-title function_\">stopPropagation</span>(); <span class=\"hljs-comment\">// 阻止原生冒泡</span>\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;Button clicked&quot;</span>);\n  };\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> console.log(&quot;Div clicked&quot;)}&gt;\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{handleClick}</span>&gt;</span>Click Me<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span></span>\n  );\n};\n</code></pre>\n<h4>输出：</h4>\n<pre><code>Button clicked\nDiv clicked // 合成事件仍触发！\n</code></pre>\n<ul>\n<li><strong>原因</strong>   ：<br>\n<code>e.nativeEvent.stopPropagation()</code> 只能阻止原生事件冒泡到 <code>&lt;div&gt;</code> 的原生监听器，但 React 已在捕获阶段获取事件，并独立触发了合成事件冒泡。</li>\n</ul>\n<hr>\n<h3>4. <strong>特殊情况：阻止合成事件冒泡</strong></h3>\n<p>若想同时阻止原生和合成事件冒泡，需：</p>\n<pre><code class=\"language-jsx\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">handleClick</span> = (<span class=\"hljs-params\">e</span>) =&gt; {\n  e.<span class=\"hljs-title function_\">stopPropagation</span>(); <span class=\"hljs-comment\">// 阻止合成事件冒泡</span>\n  e.<span class=\"hljs-property\">nativeEvent</span>.<span class=\"hljs-title function_\">stopPropagation</span>(); <span class=\"hljs-comment\">// 阻止原生事件冒泡</span>\n};\n</code></pre>\n<hr>\n<h3>5. **React 17+ 的变化</h3>\n<ul>\n<li><strong>事件委托节点变化</strong>   ：<br>\n从 <code>document</code> 改为应用挂载的根节点（如 <code>const root = ReactDOM.createRoot(app)</code>）。</li>\n<li><strong>隔离多版本 React</strong>   ：<br>\n避免多个 React 版本的事件在 <code>document</code> 上冲突。</li>\n<li><strong>机制不变</strong>   ：<br>\n仍通过捕获阶段监听原生事件，合成事件冒泡仍是独立模拟的。</li>\n</ul>\n<hr>\n<h3>6. **总结</h3>\n<table>\n<thead>\n<tr>\n<th>行为</th>\n<th>原生 DOM 事件</th>\n<th>React 合成事件</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>e.nativeEvent.stopPropagation()</code></td>\n<td>❌ 阻止后续原生冒泡</td>\n<td>✅ 无影响</td>\n</tr>\n<tr>\n<td><code>e.stopPropagation()</code></td>\n<td>✅ 无影响</td>\n<td>❌ 阻止合成事件冒泡</td>\n</tr>\n<tr>\n<td>React 根节点监听</td>\n<td>捕获阶段（<code>capture: true</code>）</td>\n<td>手动模拟捕获/冒泡</td>\n</tr>\n</tbody>\n</table>\n<p><strong>核心结论</strong>   ：<br>\nReact 通过在根节点的<strong>捕获阶段</strong>   监听原生事件，确保即使原生冒泡被阻止，合成事件仍能正常触发。合成事件的冒泡是 React 手动模拟的，与原生事件无关。</p>\n</div>";
      </script></body></html>
