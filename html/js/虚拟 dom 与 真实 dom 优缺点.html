<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="虚拟 dom 与 真实 dom 优缺点",document.getElementById("article").innerHTML='<div><p>下面从「性能」「开发体验」「可维护性」「SEO 与无障碍」「内存占用」等维度，把虚拟 DOM（Virtual DOM）和真实 DOM（Real DOM）放在一起做对比。内容力求一句话说清一个要点，方便记忆。</p>\n<hr>\n<ol>\n<li>性能维度</li>\n</ol>\n<ul>\n<li>\n<p>真实 DOM<br>\n‑ 优点：浏览器原生实现，最终渲染路径最短；简单静态页面时开销极低。<br>\n‑ 缺点：单个节点操作昂贵（重排、重绘）；批量更新时无法自动做 diff，需开发者手动优化（innerHTML、DocumentFragment、cloneNode 等）。</p>\n</li>\n<li>\n<p>虚拟 DOM<br>\n‑ 优点：把多次 DOM 操作先收集到 JS 对象里，一次性计算最小变更集（diff + patch），减少重排重绘；跨平台（可生成 Web DOM、Native View、小程序节点等）。<br>\n‑ 缺点：首次渲染要多一次「JS 对象 → 真实 DOM」的构建；极端简单、纯静态页面时反而多了一层开销。</p>\n</li>\n</ul>\n<hr>\n<ol start="2">\n<li>开发体验</li>\n</ol>\n<ul>\n<li>\n<p>真实 DOM<br>\n‑ 优点：API 简单直观，无学习成本。<br>\n‑ 缺点：状态与视图手动同步，模板字符串或拼接 HTML 容易写出 XSS；复杂交互时代码量爆炸。</p>\n</li>\n<li>\n<p>虚拟 DOM<br>\n‑ 优点：声明式 UI（状态驱动视图），组件化心智模型统一；热重载、时间旅行调试等生态工具成熟。<br>\n‑ 缺点：需要构建工具链（Babel、Vite、Webpack）；对新人而言「JSX/模板 → 虚拟 DOM」这一层抽象需理解。</p>\n</li>\n</ul>\n<hr>\n<ol start="3">\n<li>可维护性</li>\n</ol>\n<ul>\n<li>真实 DOM：业务逻辑和 DOM 操作耦合，随着需求增长，代码易腐烂。</li>\n<li>虚拟 DOM：通过「数据不可变 + 纯函数组件」天然可测试；配合 TypeScript 类型系统，重构风险低。</li>\n</ul>\n<hr>\n<ol start="4">\n<li>SEO / 首屏 / 无障碍</li>\n</ol>\n<ul>\n<li>\n<p>真实 DOM<br>\n‑ 首屏直出 HTML，无需 JS 即可被搜索引擎抓取；无障碍属性可直接写在标签。<br>\n‑ CSR（纯客户端渲染）时与虚拟 DOM 面临同样 SEO 难题。</p>\n</li>\n<li>\n<p>虚拟 DOM<br>\n‑ 需要 SSR/SSG（Next.js、Nuxt、Remix 等）解决 SEO 与首屏白屏；渲染到字符串后同样可携带无障碍属性，但需框架支持 hydration。</p>\n</li>\n</ul>\n<hr>\n<ol start="5">\n<li>内存与运行时</li>\n</ol>\n<ul>\n<li>真实 DOM：节点本身就占内存，无额外 JS 对象。</li>\n<li>虚拟 DOM：额外维护一棵 JS 树，内存占用更高；但现代设备上差异可忽略，React 17 后还通过并发特性把长任务切片，降低卡顿。</li>\n</ul>\n<hr>\n<p>一句话总结\n真实 DOM 像「手动挡」—— 直接、无中间商，但复杂场景下需要自己精打细算；<br>\n虚拟 DOM 像「自动挡」—— 牺牲一点初速和油耗，换来大多数时候更平顺、易维护的驾驶体验。</p>\n</div>'</script></body></html>
