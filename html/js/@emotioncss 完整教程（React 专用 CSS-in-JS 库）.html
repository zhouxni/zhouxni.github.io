">return</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">className</span>=<span class="hljs-string">{box}</span>&gt;</span>Hello Emotion<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>;\n}\n</code></pre>\n<h3>2. 嵌套 &amp; 伪类（和 Less/Sass 一样）</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> card = css`<span class="language-css">\n  <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;\n  <span class="hljs-attribute">background</span>: white;\n\n  &amp;<span class="hljs-selector-pseudo">:hover</span> {\n    <span class="hljs-attribute">transform</span>: <span class="hljs-built_in">scale</span>(<span class="hljs-number">1.05</span>);\n  }\n\n  <span class="hljs-selector-class">.title</span> {\n    <span class="hljs-attribute">font-size</span>: <span class="hljs-number">20px</span>;\n    <span class="hljs-attribute">font-weight</span>: bold;\n  }\n`</span>;\n</code></pre>\n<h3>3. 动态样式（根据 props/变量切换）</h3>\n<p><strong>这是 CSS-in-JS 最大优势：JS 变量直接进样式</strong></p>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> <span class="hljs-title function_">Button</span> = (<span class="hljs-params">{ primary }</span>) =&gt; {\n  <span class="hljs-keyword">const</span> btn = css`<span class="language-css">\n    <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span> <span class="hljs-number">20px</span>;\n    <span class="hljs-attribute">background</span>: </span><span class="hljs-subst">${primary ? <span class="hljs-string">&quot;blue&quot;</span> : <span class="hljs-string">&quot;gray&quot;</span>}</span><span class="language-css">;\n    <span class="hljs-attribute">color</span>: white;\n  `</span>;\n\n  <span class="hljs-keyword">return</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">className</span>=<span class="hljs-string">{btn}</span>&gt;</span>按钮<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span></span>;\n};\n</code></pre>\n<h3>4. 对象写法（适合喜欢 JS 对象的人）</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> style = <span class="hljs-title function_">css</span>({\n  <span class="hljs-attr">width</span>: <span class="hljs-number">100</span>,\n  <span class="hljs-attr">height</span>: <span class="hljs-number">100</span>,\n  <span class="hljs-attr">backgroundColor</span>: <span class="hljs-string">&quot;red&quot;</span>,\n  <span class="hljs-string">&quot;&amp;:hover&quot;</span>: {\n    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0.8</span>,\n  },\n});\n</code></pre>\n<hr>\n<h2>三、高级功能</h2>\n<h3>1. 全局样式：<code>injectGlobal</code></h3>\n<p>用来重置样式、定义全局 CSS：</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { injectGlobal } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@emotion/css&quot;</span>;\n\ninjectGlobal<span class="hljs-string">`\n  * {\n    margin: 0;\n    padding: 0;\n    box-sizing: border-box;\n  }\n  body {\n    font-family: Arial;\n  }\n`</span>;\n</code></pre>\n<h3>2. 样式组合（合并多个 class）</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> base = css`<span class="language-css"><span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>;`</span>\n<span class="hljs-keyword">const</span> primary = css`<span class="language-css"><span class="hljs-attribute">background</span>: blue;`</span>\n\n<span class="hljs-comment">// 合并</span>\n&lt;div className={<span class="hljs-string">`<span class="hljs-subst">${base}</span> <span class="hljs-subst">${primary}</span>`</span>} /&gt;\n</code></pre>\n<h3>3. 关键帧动画：<code>keyframes</code></h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { css, keyframes } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@emotion/css&quot;</span>;\n\n<span class="hljs-keyword">const</span> fade = keyframes<span class="hljs-string">`\n  from { opacity: 0; }\n  to { opacity: 1; }\n`</span>;\n\n<span class="hljs-keyword">const</span> ani = css`<span class="language-css">\n  <span class="hljs-attribute">animation</span>: </span><span class="hljs-subst">${fade}</span><span class="language-css"> <span class="hljs-number">1s</span> ease;\n`</span>;\n</code></pre>\n<hr>\n<h2>四、和 React 最佳实践（推荐写法）</h2>\n<h3>组件内直接写，干净、无冗余</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { css } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@emotion/css&quot;</span>;\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">Card</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">className</span>=<span class="hljs-string">{card}</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">h2</span> <span class="hljs-attr">className</span>=<span class="hljs-string">{title}</span>&gt;</span>卡片标题<span class="hljs-tag">&lt;/<span class="hljs-name">h2</span>&gt;</span>\n    <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>\n  );\n}\n\n<span class="hljs-comment">// 样式写在组件底部，不污染逻辑</span>\n<span class="hljs-keyword">const</span> card = css`<span class="language-css">\n  <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;\n  <span class="hljs-attribute">border-radius</span>: <span class="hljs-number">10px</span>;\n  <span class="hljs-attribute">box-shadow</span>: <span class="hljs-number">0</span> <span class="hljs-number">2px</span> <span class="hljs-number">10px</span> <span class="hljs-number">#0001</span>;\n`</span>;\n<span class="hljs-keyword">const</span> title = css`<span class="language-css">\n  <span class="hljs-attribute">font-size</span>: <span class="hljs-number">18px</span>;\n  <span class="hljs-attribute">color</span>: <span class="hljs-number">#333</span>;\n`</span>;\n</code></pre>\n<hr>\n<h2>五、@emotion/css 优点</h2>\n<p>✅ <strong>轻量</strong>   ：比 styled-components 小很多<br>\n✅ <strong>零配置</strong>   ：直接安装即用，不需要 babel 配置<br>\n✅ <strong>原生 CSS 语法</strong>   ：和写 Less/Sass 无区别<br>\n✅ <strong>动态样式极强</strong>   ：JS 变量直接插值<br>\n✅ <strong>自动生成唯一 class</strong>   ：无样式冲突<br>\n✅ <strong>服务端渲染友好</strong>   ：SSR 开箱即用<br>\n✅ <strong>React 官方推荐</strong>   ：与 React 18+ 完美兼容</p>\n<hr>\n<h2>六、和其他方案对比</h2>\n<table>\n<thead>\n<tr>\n<th>方案</th>\n<th>体积</th>\n<th>学习成本</th>\n<th>动态样式</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>@emotion/css</strong></td>\n<td>极小</td>\n<td>极低</td>\n<td>✅ 极强</td>\n</tr>\n<tr>\n<td>styled-components</td>\n<td>较大</td>\n<td>中等</td>\n<td>✅ 强</td>\n</tr>\n<tr>\n<td>原生 CSS</td>\n<td>-</td>\n<td>低</td>\n<td>❌ 弱</td>\n</tr>\n<tr>\n<td>Tailwind</td>\n<td>-</td>\n<td>中等</td>\n<td>✅ 强</td>\n</tr>\n</tbody>\n</table>\n<p><strong>一句话总结：</strong><br>\n想在 React 里写<strong>原生 CSS + 动态变量 + 无冲突</strong>   ，选 <strong>@emotion/css</strong>   最舒服。</p>\n<hr>\n<h3>总结</h3>\n<ol>\n<li><code>@emotion/css</code> = <strong>轻量版 CSS-in-JS</strong></li>\n<li>核心 API：<code>css</code>（生成样式）、<code>injectGlobal</code>（全局样式）、<code>keyframes</code>（动画）</li>\n<li>支持<strong>嵌套、伪类、动态变量、样式组合</strong></li>\n<li>适合所有 React 项目，<strong>无需配置、直接使用</strong></li>\n<li>是目前最简洁、高效的 React 样式方案之一</li>\n</ol>\n</div>'</script></body></html>
