<script>
      document.title = 'PerformanceObserver 详解'
        document.getElementById('article').innerHTML = 
        "<div><p><code>PerformanceObserver</code> 是 Web Performance API 的一部分，用于观察和收集性能指标数据。它提供了一种高效的方式来获取性能条目，而不会对页面性能产生显著影响。</p>\n<h2>基本概念</h2>\n<p><code>PerformanceObserver</code> 允许开发者：</p>\n<ul>\n<li>观察特定类型的性能条目</li>\n<li>在性能条目被记录时接收通知</li>\n<li>访问历史性能条目</li>\n</ul>\n<h2>创建 PerformanceObserver</h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> observer = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">PerformanceObserver</span>(callback);\n</code></pre>\n<p>其中 <code>callback</code> 是一个函数，当新的性能条目被记录时会调用它。</p>\n<h2>常用方法</h2>\n<h3>1. observe()</h3>\n<pre><code class=\"language-javascript\">observer.<span class=\"hljs-title function_\">observe</span>(options);\n</code></pre>\n<p><code>options</code> 是一个对象，可以包含以下属性：</p>\n<ul>\n<li><code>entryTypes</code>: 要观察的性能条目类型数组</li>\n<li><code>type</code>: 单个条目类型（与 <code>entryTypes</code> 互斥）</li>\n<li><code>buffered</code>: 布尔值，是否包含缓冲区中的历史条目</li>\n</ul>\n<h3>2. disconnect()</h3>\n<p>停止观察性能条目：</p>\n<pre><code class=\"language-javascript\">observer.<span class=\"hljs-title function_\">disconnect</span>();\n</code></pre>\n<h3>3. takeRecords()</h3>\n<p>获取当前存储在观察者缓冲区中的性能条目：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> entries = observer.<span class=\"hljs-title function_\">takeRecords</span>();\n</code></pre>\n<h2>性能条目类型</h2>\n<p>常见的性能条目类型包括：</p>\n<ul>\n<li><code>navigation</code>: 导航相关指标</li>\n<li><code>resource</code>: 资源加载指标</li>\n<li><code>paint</code>: 绘制指标（如首次绘制、首次内容绘制）</li>\n<li><code>longtask</code>: 长任务（超过50ms的任务）</li>\n<li><code>mark</code>: 自定义性能标记</li>\n<li><code>measure</code>: 自定义性能测量</li>\n<li><code>element</code>: 元素时间指标</li>\n<li><code>event</code>: 事件时间指标</li>\n<li><code>largest-contentful-paint</code>: 最大内容绘制</li>\n<li><code>layout-shift</code>: 布局偏移</li>\n</ul>\n<h2>使用示例</h2>\n<h3>基本用法</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> observer = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">PerformanceObserver</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">list</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">const</span> entry <span class=\"hljs-keyword\">of</span> list.<span class=\"hljs-title function_\">getEntries</span>()) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(entry);\n  }\n});\n\nobserver.<span class=\"hljs-title function_\">observe</span>({ <span class=\"hljs-attr\">entryTypes</span>: [<span class=\"hljs-string\">&#x27;paint&#x27;</span>, <span class=\"hljs-string\">&#x27;resource&#x27;</span>] });\n</code></pre>\n<h3>观察 LCP (最大内容绘制)</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> observer = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">PerformanceObserver</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">list</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">const</span> entries = list.<span class=\"hljs-title function_\">getEntries</span>();\n  <span class=\"hljs-keyword\">const</span> lastEntry = entries[entries.<span class=\"hljs-property\">length</span> - <span class=\"hljs-number\">1</span>];\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;LCP:&#x27;</span>, lastEntry.<span class=\"hljs-property\">renderTime</span> || lastEntry.<span class=\"hljs-property\">loadTime</span>);\n});\n\nobserver.<span class=\"hljs-title function_\">observe</span>({ <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">&#x27;largest-contentful-paint&#x27;</span>, <span class=\"hljs-attr\">buffered</span>: <span class=\"hljs-literal\">true</span> });\n</code></pre>\n<h3>观察 CLS (累计布局偏移)</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">let</span> cls = <span class=\"hljs-number\">0</span>;\n<span class=\"hljs-keyword\">const</span> observer = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">PerformanceObserver</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">list</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">const</span> entry <span class=\"hljs-keyword\">of</span> list.<span class=\"hljs-title function_\">getEntries</span>()) {\n    <span class=\"hljs-keyword\">if</span> (!entry.<span class=\"hljs-property\">hadRecentInput</span>) {\n      cls += entry.<span class=\"hljs-property\">value</span>;\n    }\n  }\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Current CLS:&#x27;</span>, cls);\n});\n\nobserver.<span class=\"hljs-title function_\">observe</span>({ <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">&#x27;layout-shift&#x27;</span>, <span class=\"hljs-attr\">buffered</span>: <span class=\"hljs-literal\">true</span> });\n</code></pre>\n<h2>注意事项</h2>\n<ol>\n<li><strong>性能影响</strong>  ：<code>PerformanceObserver</code> 本身设计为轻量级，但过多的回调处理可能影响性能</li>\n<li><strong>浏览器支持</strong>  ：不是所有性能条目类型在所有浏览器中都可用</li>\n<li><strong>缓冲区限制</strong>  ：浏览器可能会限制性能条目的缓冲区大小</li>\n<li><strong>生命周期</strong>  ：观察者需要在页面生命周期早期创建才能捕获所有相关指标</li>\n</ol>\n<h2>最佳实践</h2>\n<ol>\n<li>尽早初始化观察者（最好在 <code>&lt;head&gt;</code> 中）</li>\n<li>只观察需要的性能条目类型</li>\n<li>处理完数据后及时断开观察者</li>\n<li>使用 <code>buffered: true</code> 获取历史数据</li>\n<li>考虑使用 <code>takeRecords()</code> 定期清理缓冲区</li>\n</ol>\n<p><code>PerformanceObserver</code> 是监控 Web 性能的强大工具，特别适合用于收集 Core Web Vitals 和其他关键性能指标。</p>\n</div>";
      </script></body></html>
