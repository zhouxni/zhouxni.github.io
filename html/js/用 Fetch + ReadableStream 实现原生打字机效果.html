&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;typewriter&quot;</span>&gt;</span><span class="hljs-tag">&lt;<span class="hljs-name">span</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;cursor&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">span</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>\n\n    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">\n      <span class="hljs-comment">// 获取 DOM 元素</span>\n      <span class="hljs-keyword">const</span> typewriterEl = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">getElementById</span>(<span class="hljs-string">&quot;typewriter&quot;</span>);\n      <span class="hljs-keyword">const</span> cursorEl = typewriterEl.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">&quot;.cursor&quot;</span>);\n\n      <span class="hljs-comment">// 核心：流式读取并渲染打字机效果</span>\n      <span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">streamTypewriter</span>(<span class="hljs-params"></span>) {\n        <span class="hljs-keyword">try</span> {\n          <span class="hljs-comment">// 1. 发送 fetch 请求（这里用本地文本模拟，可替换为接口地址）</span>\n          <span class="hljs-keyword">const</span> response = <span class="hljs-keyword">await</span> <span class="hljs-title function_">fetch</span>(<span class="hljs-string">&quot;/text.txt&quot;</span>); <span class="hljs-comment">// 替换成你的接口 URL</span>\n\n          <span class="hljs-comment">// 2. 检查响应状态</span>\n          <span class="hljs-keyword">if</span> (!response.<span class="hljs-property">ok</span>) <span class="hljs-keyword">throw</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Error</span>(<span class="hljs-string">&quot;请求失败&quot;</span>);\n          <span class="hljs-keyword">if</span> (!response.<span class="hljs-property">body</span>) <span class="hljs-keyword">throw</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Error</span>(<span class="hljs-string">&quot;浏览器不支持流式读取&quot;</span>);\n\n          <span class="hljs-comment">// 3. 获取读取器</span>\n          <span class="hljs-keyword">const</span> reader = response.<span class="hljs-property">body</span>.<span class="hljs-title function_">getReader</span>();\n          <span class="hljs-comment">// 文本解码器（处理中文/特殊字符）</span>\n          <span class="hljs-keyword">const</span> decoder = <span class="hljs-keyword">new</span> <span class="hljs-title class_">TextDecoder</span>(<span class="hljs-string">&quot;utf-8&quot;</span>);\n          <span class="hljs-comment">// 存储已渲染的文本</span>\n          <span class="hljs-keyword">let</span> renderedText = <span class="hljs-string">&quot;&quot;</span>;\n\n          <span class="hljs-comment">// 4. 循环读取数据流</span>\n          <span class="hljs-keyword">while</span> (<span class="hljs-literal">true</span>) {\n            <span class="hljs-keyword">const</span> { done, value } = <span class="hljs-keyword">await</span> reader.<span class="hljs-title function_">read</span>();\n\n            <span class="hljs-comment">// 读取完毕，退出循环</span>\n            <span class="hljs-keyword">if</span> (done) {\n              <span class="hljs-comment">// 保留光标</span>\n              typewriterEl.<span class="hljs-property">innerHTML</span> =\n                renderedText + <span class="hljs-string">&#x27;&lt;span class=&quot;cursor&quot;&gt;&lt;/span&gt;&#x27;</span>;\n              <span class="hljs-keyword">break</span>;\n            }\n\n            <span class="hljs-comment">// 5. 解码二进制数据为文本</span>\n            <span class="hljs-keyword">const</span> chunk = decoder.<span class="hljs-title function_">decode</span>(value, { <span class="hljs-attr">stream</span>: <span class="hljs-literal">true</span> });\n\n            <span class="hljs-comment">// 6. 逐字追加（核心打字效果）</span>\n            <span class="hljs-keyword">for</span> (<span class="hljs-keyword">const</span> char <span class="hljs-keyword">of</span> chunk) {\n              renderedText += char;\n              <span class="hljs-comment">// 每次追加一个字就渲染，带光标</span>\n              typewriterEl.<span class="hljs-property">innerHTML</span> =\n                renderedText + <span class="hljs-string">&#x27;&lt;span class=&quot;cursor&quot;&gt;&lt;/span&gt;&#x27;</span>;\n              <span class="hljs-comment">// 控制打字速度（毫秒）</span>\n              <span class="hljs-keyword">await</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Promise</span>(<span class="hljs-function">(<span class="hljs-params">resolve</span>) =&gt;</span> <span class="hljs-built_in">setTimeout</span>(resolve, <span class="hljs-number">50</span>));\n            }\n          }\n        } <span class="hljs-keyword">catch</span> (err) {\n          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;流式读取失败：&quot;</span>, err);\n          typewriterEl.<span class="hljs-property">innerHTML</span> =\n            <span class="hljs-string">&#x27;加载失败，请重试&lt;span class=&quot;cursor&quot;&gt;&lt;/span&gt;&#x27;</span>;\n        }\n      }\n\n      <span class="hljs-comment">// 启动</span>\n      <span class="hljs-title function_">streamTypewriter</span>();\n    </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n  <span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>\n<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span>\n</code></pre>\n<h2>关键知识点解析</h2>\n<h3>1. 核心 API 作用</h3>\n<ul>\n<li><code>fetch</code>：发起网络请求，支持<strong>流式响应</strong></li>\n<li><code>response.body</code>：返回 <code>ReadableStream</code> 可读流对象</li>\n<li><code>getReader()</code>：创建流读取器，<strong>逐块读取二进制数据</strong></li>\n<li><code>TextDecoder</code>：将二进制流解码为文本（必须处理中文乱码）</li>\n<li><code>reader.read()</code>：返回 <code>{ done: boolean, value: Uint8Array }</code>\n<ul>\n<li><code>done: true</code>：数据读取完毕</li>\n<li><code>value</code>：本次读取的二进制数据块</li>\n</ul>\n</li>\n</ul>\n<h3>2. 打字机效果核心逻辑</h3>\n<ol>\n<li>流式读取：<strong>不用等全部数据加载完</strong>   ，来一段渲染一段</li>\n<li>逐字渲染：把读取到的文本<strong>一个字一个字追加</strong>   到页面</li>\n<li>延时控制：通过 <code>setTimeout</code> 控制打字速度</li>\n<li>光标动画：CSS 闪烁模拟真实打字光标</li>\n</ol>\n<h3>3. 适配真实接口</h3>\n<p>把 <code>fetch</code> 地址换成你的后端接口即可：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 示例：对接后端流式接口</span>\n<span class="hljs-keyword">const</span> response = <span class="hljs-keyword">await</span> <span class="hljs-title function_">fetch</span>(<span class="hljs-string">&quot;https://api.xxx.com/stream&quot;</span>, {\n  <span class="hljs-attr">method</span>: <span class="hljs-string">&quot;POST&quot;</span>,\n  <span class="hljs-attr">headers</span>: { <span class="hljs-string">&quot;Content-Type&quot;</span>: <span class="hljs-string">&quot;application/json&quot;</span> },\n  <span class="hljs-attr">body</span>: <span class="hljs-title class_">JSON</span>.<span class="hljs-title function_">stringify</span>({ <span class="hljs-attr">prompt</span>: <span class="hljs-string">&quot;你好&quot;</span> }),\n});\n</code></pre>\n<h3>4. 必知优化点</h3>\n<ul>\n<li><strong>乱码解决</strong>   ：必须用 <code>TextDecoder(\'utf-8\')</code> 解码</li>\n<li><strong>性能</strong>   ：流式读取不会占用大量内存，适合长文本</li>\n<li><strong>兼容性</strong>   ：支持所有现代浏览器（Chrome/Firefox/Safari 14.1+）</li>\n<li><strong>速度调节</strong>   ：修改 <code>setTimeout</code> 数值（越小打字越快）</li>\n</ul>\n<h2>极简版核心代码（方便集成）</h2>\n<pre><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">typewriter</span>(<span class="hljs-params">url, element</span>) {\n  <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> <span class="hljs-title function_">fetch</span>(url);\n  <span class="hljs-keyword">const</span> reader = res.<span class="hljs-property">body</span>.<span class="hljs-title function_">getReader</span>();\n  <span class="hljs-keyword">const</span> decoder = <span class="hljs-keyword">new</span> <span class="hljs-title class_">TextDecoder</span>();\n  <span class="hljs-keyword">let</span> text = <span class="hljs-string">&quot;&quot;</span>;\n\n  <span class="hljs-keyword">while</span> (<span class="hljs-literal">true</span>) {\n    <span class="hljs-keyword">const</span> { done, value } = <span class="hljs-keyword">await</span> reader.<span class="hljs-title function_">read</span>();\n    <span class="hljs-keyword">if</span> (done) <span class="hljs-keyword">break</span>;\n\n    <span class="hljs-keyword">const</span> chunk = decoder.<span class="hljs-title function_">decode</span>(value);\n    <span class="hljs-keyword">for</span> (<span class="hljs-keyword">const</span> char <span class="hljs-keyword">of</span> chunk) {\n      text += char;\n      element.<span class="hljs-property">textContent</span> = text;\n      <span class="hljs-keyword">await</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Promise</span>(<span class="hljs-function">(<span class="hljs-params">r</span>) =&gt;</span> <span class="hljs-built_in">setTimeout</span>(r, <span class="hljs-number">50</span>));\n    }\n  }\n}\n\n<span class="hljs-comment">// 使用</span>\n<span class="hljs-title function_">typewriter</span>(<span class="hljs-string">&quot;/text.txt&quot;</span>, <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">getElementById</span>(<span class="hljs-string">&quot;app&quot;</span>));\n</code></pre>\n<h3>总结</h3>\n<ol>\n<li>核心依赖：<code>fetch</code> + <code>response.body.getReader()</code> + <code>TextDecoder</code></li>\n<li>实现原理：<strong>流式读取 + 逐字渲染 + 延时控制</strong></li>\n<li>优势：原生实现、无需第三方库、内存占用低、体验流畅</li>\n<li>可直接用于：AI 对话、长文本加载、直播字幕等场景</li>\n</ol>\n</div>'</script></body></html>
