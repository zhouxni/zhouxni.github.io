<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="webpack output.library 详解",document.getElementById("article").innerHTML="<div><p><code>output.library</code> 是 Webpack 配置中的一个重要选项，用于指定打包后的模块如何被暴露为库，以便在其他环境中被引用和使用。以下是对 <code>output.library</code> 的详细解析：</p>\n<h3>一、作用</h3>\n<ul>\n<li><strong>定义库名称</strong>  ：<code>output.library</code> 用于指定打包后库的名称，使其可以被其他脚本访问。</li>\n<li><strong>控制暴露方式</strong>  ：结合 <code>output.libraryTarget</code> 使用，可以控制库如何被暴露（如全局变量、AMD、CommonJS 等）。</li>\n</ul>\n<h3>二、取值方式</h3>\n<p><code>output.library</code> 可以接受多种类型的值，包括字符串、字符串数组、对象等。</p>\n<ol>\n<li><strong>字符串形式</strong>  ：\n<ul>\n<li>示例：<code>output: { library: 'MyLibrary' }</code></li>\n<li>作用：将库暴露为全局变量 <code>MyLibrary</code>。</li>\n</ul>\n</li>\n<li><strong>字符串数组形式</strong>  ：\n<ul>\n<li>示例：<code>output: { library: ['MyNamespace', 'MyLibrary'] }</code></li>\n<li>作用：将库暴露为嵌套命名空间中的变量，如 <code>MyNamespace.MyLibrary</code>。</li>\n</ul>\n</li>\n<li><strong>对象形式</strong>  ：\n<ul>\n<li>示例：<code>output: { library: { name: 'MyLibrary', type: 'umd' } }</code></li>\n<li>作用：提供更精细的控制，可以指定库的名称和暴露方式（通过 <code>type</code> 字段）。</li>\n</ul>\n</li>\n</ol>\n<h3>三、常用配置</h3>\n<ol>\n<li><strong>全局变量暴露</strong>  ：\n<ul>\n<li>配置：<code>output: { library: 'MyLibrary', libraryTarget: 'var' }</code></li>\n<li>作用：将库暴露为全局变量 <code>MyLibrary</code>，可以通过 <code>MyLibrary.someMethod()</code> 调用。</li>\n</ul>\n</li>\n<li><strong>通过 <code>this</code> 对象暴露</strong>  ：\n<ul>\n<li>配置：<code>output: { library: 'MyLibrary', libraryTarget: 'this' }</code></li>\n<li>作用：将库暴露为 <code>this</code> 对象的属性，可以通过 <code>this.MyLibrary.someMethod()</code> 调用。</li>\n</ul>\n</li>\n<li><strong>通过 <code>window</code> 对象暴露（浏览器环境）</strong>  ：\n<ul>\n<li>配置：<code>output: { library: 'MyLibrary', libraryTarget: 'window' }</code></li>\n<li>作用：将库暴露为 <code>window</code> 对象的属性，可以通过 <code>window.MyLibrary.someMethod()</code> 调用。</li>\n</ul>\n</li>\n<li><strong>UMD 暴露</strong>  ：\n<ul>\n<li>配置：<code>output: { library: 'MyLibrary', libraryTarget: 'umd' }</code></li>\n<li>作用：生成一个 UMD（Universal Module Definition）模块，兼容 AMD、CommonJS 和全局变量。</li>\n</ul>\n</li>\n<li><strong>CommonJS 暴露</strong>  ：\n<ul>\n<li>配置：<code>output: { library: 'MyLibrary', libraryTarget: 'commonjs2' }</code></li>\n<li>作用：将库暴露为 CommonJS 模块，可以通过 <code>const MyLibrary = require('my-library'); MyLibrary.someMethod();</code> 调用。</li>\n</ul>\n</li>\n<li><strong>AMD 暴露</strong>  ：\n<ul>\n<li>配置：<code>output: { library: 'MyLibrary', libraryTarget: 'amd' }</code></li>\n<li>作用：将库暴露为 AMD 模块，可以通过 <code>require(['MyLibrary'], function(MyLibrary) { MyLibrary.someMethod(); });</code> 调用。</li>\n</ul>\n</li>\n</ol>\n<h3>四、注意事项</h3>\n<ul>\n<li><strong>结合 <code>libraryTarget</code> 使用</strong>  ：<code>output.library</code> 通常与 <code>output.libraryTarget</code> 一起使用，以指定库的暴露方式和名称。</li>\n<li><strong>避免命名冲突</strong>  ：在选择库名称时，应避免与全局作用域中的已有变量冲突。</li>\n<li><strong>考虑模块系统</strong>  ：根据目标环境选择合适的模块系统（如 CommonJS、AMD、UMD 等）。</li>\n</ul>\n<h3>五、实际应用</h3>\n<p>在开发可重用模块或库时，<code>output.library</code> 是一个非常重要的配置选项。通过合理配置 <code>output.library</code> 和 <code>output.libraryTarget</code>，可以确保库在不同环境中都能被正确引用和使用。</p>\n</div>"</script></body></html>
