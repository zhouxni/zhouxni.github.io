<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../css/github-markdown.min.css">
    <link rel="stylesheet" href="../../css/github.min.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }
  </style></head>
  
  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p><code>steps()</code> 是 CSS 动画中一种特殊的时序函数，它可以让动画以离散的步进方式运行，而不是默认的平滑过渡。</p>\n<h2>基本语法</h2>\n<pre><code class=\"language-css\"><span class=\"hljs-attribute\">animation-timing-function</span>: <span class=\"hljs-built_in\">steps</span>(n, [start|end]);\n</code></pre>\n<ul>\n<li><strong>n</strong>  ：正整数，表示动画被分成多少步</li>\n<li><strong>start</strong>  /<strong>end</strong>  （可选）：指定每一步变化发生在步进的开始还是结束（默认为 <code>end</code>）</li>\n</ul>\n<h2>参数详解</h2>\n<h3>1. 步数 (n)</h3>\n<p>定义动画被分成多少等份。例如：</p>\n<pre><code class=\"language-css\"><span class=\"hljs-comment\">/* 动画分4步完成 */</span>\n<span class=\"hljs-attribute\">animation-timing-function</span>: <span class=\"hljs-built_in\">steps</span>(<span class=\"hljs-number\">4</span>);\n</code></pre>\n<h3>2. 方向 (start/end)</h3>\n<ul>\n<li><strong>end</strong>  （默认值）：变化发生在每一步的结束</li>\n<li><strong>start</strong>  ：变化发生在每一步的开始</li>\n</ul>\n<pre><code class=\"language-css\"><span class=\"hljs-comment\">/* 4步，每步开始时变化 */</span>\n<span class=\"hljs-attribute\">animation-timing-function</span>: <span class=\"hljs-built_in\">steps</span>(<span class=\"hljs-number\">4</span>, start);\n\n<span class=\"hljs-comment\">/* 4步，每步结束时变化（默认） */</span>\n<span class=\"hljs-attribute\">animation-timing-function</span>: <span class=\"hljs-built_in\">steps</span>(<span class=\"hljs-number\">4</span>, end);\n</code></pre>\n<h2>视觉差异</h2>\n<p>假设我们有一个从左到右移动的动画：</p>\n<ul>\n<li><strong>steps(4, end)</strong>  ：元素会在每25%时间点结束时&quot;跳跃&quot;到新位置</li>\n<li><strong>steps(4, start)</strong>  ：元素会在每25%时间点开始时立即&quot;跳跃&quot;到新位置</li>\n</ul>\n<h2>实际应用示例</h2>\n<h3>1. 帧动画（精灵图）</h3>\n<pre><code class=\"language-css\"><span class=\"hljs-selector-class\">.sprite</span> {\n  <span class=\"hljs-attribute\">width</span>: <span class=\"hljs-number\">100px</span>;\n  <span class=\"hljs-attribute\">height</span>: <span class=\"hljs-number\">100px</span>;\n  <span class=\"hljs-attribute\">background-image</span>: <span class=\"hljs-built_in\">url</span>(<span class=\"hljs-string\">&#x27;sprite-sheet.png&#x27;</span>);\n  <span class=\"hljs-attribute\">animation</span>: play <span class=\"hljs-number\">1s</span> <span class=\"hljs-built_in\">steps</span>(<span class=\"hljs-number\">6</span>) infinite;\n}\n\n<span class=\"hljs-keyword\">@keyframes</span> play {\n  <span class=\"hljs-selector-tag\">from</span> { <span class=\"hljs-attribute\">background-position</span>: <span class=\"hljs-number\">0</span> <span class=\"hljs-number\">0</span>; }\n  <span class=\"hljs-selector-tag\">to</span> { <span class=\"hljs-attribute\">background-position</span>: -<span class=\"hljs-number\">600px</span> <span class=\"hljs-number\">0</span>; }\n}\n</code></pre>\n<h3>2. 打字机效果</h3>\n<pre><code class=\"language-css\"><span class=\"hljs-selector-class\">.typewriter</span> {\n  <span class=\"hljs-attribute\">width</span>: <span class=\"hljs-number\">0</span>;\n  <span class=\"hljs-attribute\">overflow</span>: hidden;\n  <span class=\"hljs-attribute\">white-space</span>: nowrap;\n  <span class=\"hljs-attribute\">animation</span>: typing <span class=\"hljs-number\">4s</span> <span class=\"hljs-built_in\">steps</span>(<span class=\"hljs-number\">40</span>) forwards;\n}\n\n<span class=\"hljs-keyword\">@keyframes</span> typing {\n  <span class=\"hljs-selector-tag\">from</span> { <span class=\"hljs-attribute\">width</span>: <span class=\"hljs-number\">0</span> }\n  <span class=\"hljs-selector-tag\">to</span> { <span class=\"hljs-attribute\">width</span>: <span class=\"hljs-number\">100%</span> }\n}\n</code></pre>\n<h3>3. 加载指示器</h3>\n<pre><code class=\"language-css\"><span class=\"hljs-selector-class\">.loader</span> {\n  <span class=\"hljs-attribute\">width</span>: <span class=\"hljs-number\">0%</span>;\n  <span class=\"hljs-attribute\">height</span>: <span class=\"hljs-number\">5px</span>;\n  <span class=\"hljs-attribute\">background</span>: blue;\n  <span class=\"hljs-attribute\">animation</span>: loading <span class=\"hljs-number\">2s</span> <span class=\"hljs-built_in\">steps</span>(<span class=\"hljs-number\">10</span>) infinite;\n}\n\n<span class=\"hljs-keyword\">@keyframes</span> loading {\n  <span class=\"hljs-selector-tag\">from</span> { <span class=\"hljs-attribute\">width</span>: <span class=\"hljs-number\">0%</span> }\n  <span class=\"hljs-selector-tag\">to</span> { <span class=\"hljs-attribute\">width</span>: <span class=\"hljs-number\">100%</span> }\n}\n</code></pre>\n<h2>注意事项</h2>\n<ol>\n<li><code>steps()</code> 只能用于 <code>animation-timing-function</code>，不能用于 <code>transition-timing-function</code></li>\n<li>步数必须为正整数</li>\n<li>与 <code>cubic-bezier()</code> 不同，<code>steps()</code> 创建的是离散的、非连续的动画效果</li>\n<li>对于复杂的步进动画，可能需要精确计算关键帧位置</li>\n</ol>\n<h2>简写形式</h2>\n<p>在 <code>animation</code> 简写属性中使用：</p>\n<pre><code class=\"language-css\"><span class=\"hljs-selector-class\">.element</span> {\n  <span class=\"hljs-attribute\">animation</span>: move <span class=\"hljs-number\">2s</span> <span class=\"hljs-built_in\">steps</span>(<span class=\"hljs-number\">5</span>, start) infinite;\n}\n</code></pre>\n<p><code>steps()</code> 函数为创建特定类型的动画效果提供了强大的控制能力，特别是需要精确控制动画节奏或创建帧动画时非常有用。</p>\n</div>";
      </script></body></html>
