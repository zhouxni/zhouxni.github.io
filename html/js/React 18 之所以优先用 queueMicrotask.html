<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="React 18 之所以优先用 queueMicrotask",document.getElementById("article").innerHTML='<div><p>React 18 之所以<strong>优先用 <code>queueMicrotask</code></strong>   ，而不是裸露的 <code>Promise.then</code>，主要有四个原因：语义、性能、兼容性和可控性。</p>\n<hr>\n<h3>1. 语义更纯粹</h3>\n<ul>\n<li><code>queueMicrotask</code> <strong>唯一目的</strong>   就是把回调排进微任务队列，不携带任何“异步成功/失败”的语义。</li>\n<li><code>Promise.then</code> 隐含“<strong>异步成功</strong>   ”含义，容易让读源码的人误以为这里有 Promise 链或错误处理逻辑，造成误解。</li>\n</ul>\n<hr>\n<h3>2. <strong>避免创建多余的 Promise 对象</strong></h3>\n<ul>\n<li>每次 <code>Promise.resolve().then(...)</code> 都会<strong>新建一个 Promise 实例</strong>   ；在高频调度（如输入框连续更新、动画）下会产生<strong>大量临时对象</strong>   ，增加 GC 压力。</li>\n<li><code>queueMicrotask</code> 只是往浏览器提供的微任务队列里塞一个函数指针，<strong>零额外内存分配</strong>   ，更轻量。</li>\n</ul>\n<hr>\n<h3>3. <strong>可移植性与未来兼容性</strong></h3>\n<ul>\n<li><code>queueMicrotask</code> 是 <strong>WHATWG HTML 标准</strong>   定义的浏览器专用 API，语义稳定；</li>\n<li>React 的调度包（<code>scheduler</code>）既要跑在浏览器，也要跑在 <strong>Node.js/React Native/测试环境</strong>   等。\n<ul>\n<li>Node.js 同样有 <code>queueMicrotask</code>，而 <code>MessageChannel</code>/<code>setImmediate</code> 在 Node 与浏览器表现不同。</li>\n<li>因此 React 在源码里做了分级降级：<pre><code>1. queueMicrotask（优先）\n2. MessageChannel（浏览器专用）\n3. setTimeout（兜底）\n</code></pre>\n</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3>4. <strong>可控的“批处理边界”</strong></h3>\n<ul>\n<li>React 需要确保<strong>同一轮事件循环内所有 setState 全部收集完毕</strong>   后，再进行一次统一的调和与提交。</li>\n<li><code>queueMicrotask</code> 的回调永远在当前调用栈清空后、下一个宏任务之前执行，<strong>时序可预测</strong>   。</li>\n<li>如果使用 <code>Promise.then</code>，一旦外层代码里有 <code>await</code> 或自定义的 <code>Promise</code> 链，就可能把更新拆散到不同微任务，破坏批处理。</li>\n</ul>\n<hr>\n<h3>源码佐证（简化）</h3>\n<pre><code class="language-js"><span class="hljs-comment">// packages/scheduler/src/forks/Scheduler.js</span>\n<span class="hljs-keyword">const</span> scheduleMicrotask = <span class="hljs-keyword">typeof</span> queueMicrotask === <span class="hljs-string">&#x27;function&#x27;</span>\n  ? queueMicrotask\n  : <span class="hljs-keyword">typeof</span> <span class="hljs-title class_">Promise</span> !== <span class="hljs-string">&#x27;undefined&#x27;</span>\n  ? <span class="hljs-function"><span class="hljs-params">cb</span> =&gt;</span> <span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">resolve</span>(<span class="hljs-literal">null</span>).<span class="hljs-title function_">then</span>(cb).<span class="hljs-title function_">catch</span>(handleError)\n  : <span class="hljs-keyword">typeof</span> <span class="hljs-title class_">MessageChannel</span> !== <span class="hljs-string">&#x27;undefined&#x27;</span>\n  ? <span class="hljs-comment">/* …MessageChannel… */</span>\n  : <span class="hljs-built_in">setTimeout</span>;\n</code></pre>\n<p>可以看到优先级：<code>queueMicrotask</code> &gt; <code>Promise</code> &gt; <code>MessageChannel</code> &gt; <code>setTimeout</code>。</p>\n<hr>\n<h3>一句话总结</h3>\n<p><code>queueMicrotask</code> 比 <code>Promise.then</code> <strong>语义更纯粹、内存更省、时序更可控</strong>   ，因此 React 18 把它作为微任务调度的首选。</p>\n</div>'</script></body></html>
