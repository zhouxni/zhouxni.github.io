<!DOCTYPE html><html lang="en"><head>

    <link rel="stylesheet" href="../../css/github.min.css">
  <style>

    body {
      margin: 0;

      box-sizing: border-box;
      min-width: 200px;

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p>异步组件是 Vue.js 中一种优化应用性能的重要技术，它允许你将组件分割成小块，按需加载。下面详细介绍 Vue2 中的异步组件。</p>\n<h2>基本概念</h2>\n<p>异步组件是指在需要时才从服务器加载的组件，而不是在初始加载时就包含在主 bundle 中。这对于大型应用尤其有用，可以减少初始加载时间。</p>\n<h2>创建异步组件的几种方式</h2>\n<h3>1. 工厂函数方式</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-title class_\">Vue</span>.<span class=\"hljs-title function_\">component</span>(<span class=\"hljs-string\">&#x27;async-component&#x27;</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">resolve, reject</span>) {\n  <span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-comment\">// 向 `resolve` 回调传递组件定义</span>\n    <span class=\"hljs-title function_\">resolve</span>({\n      <span class=\"hljs-attr\">template</span>: <span class=\"hljs-string\">&#x27;&lt;div&gt;I am async!&lt;/div&gt;&#x27;</span>\n    })\n  }, <span class=\"hljs-number\">1000</span>)\n})\n</code></pre>\n<h3>2. Promise 方式（推荐）</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-title class_\">Vue</span>.<span class=\"hljs-title function_\">component</span>(\n  <span class=\"hljs-string\">&#x27;async-webpack-example&#x27;</span>,\n  <span class=\"hljs-comment\">// 这个动态导入会返回一个 Promise 对象</span>\n  <span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./my-async-component&#x27;</span>)\n)\n</code></pre>\n<h3>3. 高级异步组件（2.3.0+）</h3>\n<p>从 Vue 2.3.0 开始，可以使用更高级的异步组件定义方式：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">AsyncComponent</span> = (<span class=\"hljs-params\"></span>) =&gt; ({\n  <span class=\"hljs-comment\">// 需要加载的组件 (应该是一个 `Promise` 对象)</span>\n  <span class=\"hljs-attr\">component</span>: <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./MyComponent.vue&#x27;</span>),\n  <span class=\"hljs-comment\">// 异步组件加载时使用的组件</span>\n  <span class=\"hljs-attr\">loading</span>: <span class=\"hljs-title class_\">LoadingComponent</span>,\n  <span class=\"hljs-comment\">// 加载失败时使用的组件</span>\n  <span class=\"hljs-attr\">error</span>: <span class=\"hljs-title class_\">ErrorComponent</span>,\n  <span class=\"hljs-comment\">// 展示加载时组件的延时时间。默认值是 200 (毫秒)</span>\n  <span class=\"hljs-attr\">delay</span>: <span class=\"hljs-number\">200</span>,\n  <span class=\"hljs-comment\">// 如果提供了超时时间且组件加载也超时了，</span>\n  <span class=\"hljs-comment\">// 则使用加载失败时使用的组件。默认值是：`Infinity`</span>\n  <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">3000</span>\n})\n\n<span class=\"hljs-title class_\">Vue</span>.<span class=\"hljs-title function_\">component</span>(<span class=\"hljs-string\">&#x27;async-component&#x27;</span>, <span class=\"hljs-title class_\">AsyncComponent</span>)\n</code></pre>\n<h2>路由中的异步组件</h2>\n<p>在 Vue Router 中也可以使用异步组件来实现路由懒加载：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> router = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">VueRouter</span>({\n  <span class=\"hljs-attr\">routes</span>: [\n    {\n      <span class=\"hljs-attr\">path</span>: <span class=\"hljs-string\">&#x27;/foo&#x27;</span>,\n      <span class=\"hljs-attr\">component</span>: <span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./Foo.vue&#x27;</span>)\n    }\n  ]\n})\n</code></pre>\n<h2>异步组件的加载状态</h2>\n<p>高级异步组件可以处理加载状态：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">AsyncComponent</span> = (<span class=\"hljs-params\"></span>) =&gt; ({\n  <span class=\"hljs-attr\">component</span>: <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./MyComponent.vue&#x27;</span>),\n  <span class=\"hljs-attr\">loading</span>: {\n    <span class=\"hljs-attr\">template</span>: <span class=\"hljs-string\">&#x27;&lt;div&gt;Loading...&lt;/div&gt;&#x27;</span>\n  },\n  <span class=\"hljs-attr\">error</span>: {\n    <span class=\"hljs-attr\">template</span>: <span class=\"hljs-string\">&#x27;&lt;div&gt;Error loading component&lt;/div&gt;&#x27;</span>\n  },\n  <span class=\"hljs-attr\">delay</span>: <span class=\"hljs-number\">200</span>,\n  <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">3000</span>\n})\n</code></pre>\n<h2>命名 chunk</h2>\n<p>在使用 Webpack 时，可以使用特殊的注释语法来为异步 chunk 命名：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">Foo</span> = (<span class=\"hljs-params\"></span>) =&gt; <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-comment\">/* webpackChunkName: &quot;group-foo&quot; */</span> <span class=\"hljs-string\">&#x27;./Foo.vue&#x27;</span>)\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">Bar</span> = (<span class=\"hljs-params\"></span>) =&gt; <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-comment\">/* webpackChunkName: &quot;group-foo&quot; */</span> <span class=\"hljs-string\">&#x27;./Bar.vue&#x27;</span>)\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">Baz</span> = (<span class=\"hljs-params\"></span>) =&gt; <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-comment\">/* webpackChunkName: &quot;group-foo&quot; */</span> <span class=\"hljs-string\">&#x27;./Baz.vue&#x27;</span>)\n</code></pre>\n<p>这样 Webpack 会将这三个组件打包到同一个异步 chunk 中。</p>\n<h2>注意事项</h2>\n<ol>\n<li><strong>错误处理</strong>  ：确保为异步组件提供错误处理，特别是当网络状况不佳时。</li>\n<li><strong>加载指示器</strong>  ：为用户提供加载状态的反馈，提升用户体验。</li>\n<li><strong>合理分块</strong>  ：不要过度拆分，平衡初始加载时间和后续交互体验。</li>\n<li><strong>预加载</strong>  ：对于重要但非初始路由的组件，可以考虑使用 <code>&lt;link rel=&quot;preload&quot;&gt;</code> 进行预加载。</li>\n</ol>\n<h2>与 Vuex 配合使用</h2>\n<p>异步组件也可以与 Vuex 配合使用：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">AsyncComponent</span> = (<span class=\"hljs-params\"></span>) =&gt; ({\n  <span class=\"hljs-attr\">component</span>: <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./MyComponent.vue&#x27;</span>),\n  <span class=\"hljs-attr\">loading</span>: <span class=\"hljs-title class_\">LoadingComponent</span>,\n  <span class=\"hljs-attr\">error</span>: <span class=\"hljs-title class_\">ErrorComponent</span>,\n  <span class=\"hljs-attr\">delay</span>: <span class=\"hljs-number\">200</span>,\n  <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">3000</span>,\n  <span class=\"hljs-title function_\">beforeEnter</span> (to, <span class=\"hljs-keyword\">from</span>, next) {\n    store.<span class=\"hljs-title function_\">dispatch</span>(<span class=\"hljs-string\">&#x27;fetchData&#x27;</span>).<span class=\"hljs-title function_\">then</span>(next).<span class=\"hljs-title function_\">catch</span>(next)\n  }\n})\n</code></pre>\n<p>异步组件是 Vue 应用性能优化的重要手段，合理使用可以显著提升大型应用的加载速度和用户体验。</p>\n</div>";
      </script></body></html>
