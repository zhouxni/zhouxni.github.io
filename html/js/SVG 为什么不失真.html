<script>
      document.title = 'SVG 为什么不失真'
        document.getElementById('article').innerHTML = 
        "<div><p>SVG（可缩放矢量图形，Scalable Vector Graphics）之所以不失真，主要归因于其基于<strong>矢量图形</strong>  的本质，而非传统的基于像素的位图图像。以下是详细解释：</p>\n<hr>\n<h3><strong>1. 矢量图形的本质</strong></h3>\n<ul>\n<li><strong>数学描述</strong>  ：<br>\nSVG图形由数学公式（如点、线、曲线、形状）定义，而非像素网格。例如，一个圆形可以用中心点和半径描述，矩形用位置和尺寸描述。\n<ul>\n<li><strong>示例</strong>  ：一个SVG圆定义为 <code>&lt;circle cx=&quot;50&quot; cy=&quot;50&quot; r=&quot;40&quot;/&gt;</code>，无论放大多少倍，始终保持完美圆形。</li>\n</ul>\n</li>\n<li><strong>分辨率无关</strong>  ：<br>\n由于基于数学公式，SVG图形与分辨率无关。放大或缩小时，浏览器重新计算图形的数学描述并重新渲染，而非拉伸像素。</li>\n</ul>\n<hr>\n<h3><strong>2. 与位图图像的对比</strong></h3>\n<ul>\n<li><strong>位图图像（如JPEG、PNG）</strong>  ：<br>\n由固定数量的像素组成。放大时，像素被拉伸，导致模糊或锯齿（失真）。\n<ul>\n<li><strong>示例</strong>  ：一张100x100像素的图片放大到200x200像素时，每个像素被放大为4个像素，细节丢失。</li>\n</ul>\n</li>\n<li><strong>SVG的优势</strong>  ：<br>\n无论放大到何种尺寸，SVG始终根据数学公式重新绘制，保持清晰锐利。</li>\n</ul>\n<hr>\n<h3><strong>3. 渲染机制</strong></h3>\n<ul>\n<li><strong>动态渲染</strong>  ：<br>\n浏览器在渲染SVG时，根据当前视口大小和缩放比例实时计算图形的形状和位置。\n<ul>\n<li><strong>示例</strong>  ：在网页中缩放SVG图形时，浏览器会重新计算每个路径和形状的坐标，确保平滑显示。</li>\n</ul>\n</li>\n<li><strong>硬件加速</strong>  ：<br>\n现代浏览器利用GPU加速SVG渲染，进一步提升性能和缩放效果。</li>\n</ul>\n<hr>\n<h3><strong>4. 文件结构</strong></h3>\n<ul>\n<li><strong>XML格式</strong>  ：<br>\nSVG文件是文本文件，包含XML标签描述图形元素（如<code>&lt;path&gt;</code>、<code>&lt;rect&gt;</code>、<code>&lt;circle&gt;</code>）。\n<ul>\n<li><strong>示例</strong>  ：以下SVG代码定义了一个简单的红色圆形：<pre><code class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">svg</span> <span class=\"hljs-attr\">width</span>=<span class=\"hljs-string\">&quot;100&quot;</span> <span class=\"hljs-attr\">height</span>=<span class=\"hljs-string\">&quot;100&quot;</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">circle</span> <span class=\"hljs-attr\">cx</span>=<span class=\"hljs-string\">&quot;50&quot;</span> <span class=\"hljs-attr\">cy</span>=<span class=\"hljs-string\">&quot;50&quot;</span> <span class=\"hljs-attr\">r</span>=<span class=\"hljs-string\">&quot;40&quot;</span> <span class=\"hljs-attr\">fill</span>=<span class=\"hljs-string\">&quot;red&quot;</span>/&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">svg</span>&gt;</span>\n</code></pre>\n</li>\n<li>放大或缩小时，浏览器解析这些标签并重新计算渲染。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>5. 实际应用场景</strong></h3>\n<ul>\n<li><strong>图标和Logo</strong>  ：<br>\nSVG图标可无损缩放到任意尺寸，适合响应式设计。</li>\n<li><strong>数据可视化</strong>  ：<br>\n图表和地图使用SVG可保持缩放时的清晰度。</li>\n<li><strong>动画和交互</strong>  ：<br>\nSVG支持CSS和JavaScript动画，且缩放时动画效果依然平滑。</li>\n</ul>\n<hr>\n<h3><strong>总结</strong></h3>\n<p>SVG不失真的核心原因是其<strong>基于数学公式的矢量描述</strong>  ，而非像素网格。这种特性使得SVG图形在任意缩放比例下都能保持清晰锐利，非常适合需要高分辨率和动态缩放的场景。</p>\n</div>";
      </script></body></html>
