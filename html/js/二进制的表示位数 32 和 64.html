<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="二进制的表示位数 32 和 64",document.getElementById("article").innerHTML='<div><p>在 JavaScript 中，二进制的表示位数与操作场景相关，存在 <strong>32 位</strong>   和 <strong>64 位</strong>   两种情况，核心区别在于“数值存储格式”和“位运算逻辑”的分离设计：</p>\n<h3>1. 数值的底层存储：始终是 64 位双精度浮点数</h3>\n<p>JavaScript 中所有 Number 类型的数值（包括整数、小数），<strong>底层存储格式都是 64 位双精度浮点数</strong>   （遵循 IEEE 754 标准），结构为：</p>\n<ul>\n<li>1 位符号位</li>\n<li>11 位指数位</li>\n<li>52 位尾数位</li>\n</ul>\n<p>这意味着：</p>\n<ul>\n<li>无论整数还是小数，存储时都占用 64 位空间；</li>\n<li>即使是二进制表示的整数（如 <code>0b101</code>），存储时也会被转换为 64 位浮点数格式。</li>\n</ul>\n<h3>2. 位运算时的临时转换：强制转为 32 位有符号整数</h3>\n<p>当使用 <strong>位运算符</strong>   （如 <code>&amp;</code>、<code>|</code>、<code>^</code>、<code>~</code>、<code>&lt;&lt;</code>、<code>&gt;&gt;</code>、<code>&gt;&gt;&gt;</code>）时，JavaScript 会先将 64 位浮点数 <strong>临时转换为 32 位有符号整数（补码表示）</strong>   ，运算完成后再转回 64 位浮点数。</p>\n<p>例如：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 数值 3 的 64 位存储是浮点数格式</span>\n<span class="hljs-comment">// 位运算时转为 32 位整数：00000000 00000000 00000000 00000011</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-number">3</span> &amp; <span class="hljs-number">1</span>); <span class="hljs-comment">// 输出 1（位运算结果）</span>\n</code></pre>\n<p>关键特性：</p>\n<ul>\n<li>32 位有符号整数的范围是 <code>-2^31</code>（-2147483648）到 <code>2^31 - 1</code>（2147483647）；</li>\n<li>超出此范围的整数进行位运算时，会先截断为 32 位（可能导致精度丢失）。</li>\n</ul>\n<h3>3. 总结：64 位存储，32 位运算</h3>\n<p>| 场景               | 位数  | 用途                             |\n| ------------------ | ----- | -------------------------------- | ------------------------------ |\n| 数值存储（Number） | 64 位 | 表示所有整数、小数，保证精度范围 |\n| 位运算（&amp;、        | 等）  | 32 位                            | 临时转换为整数，执行二进制操作 |</p>\n<p>简单说：JavaScript 用 64 位存所有数，但做位运算时会临时切成 32 位整数处理，运算后再转回去。</p>\n</div>'</script></body></html>
