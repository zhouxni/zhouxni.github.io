<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Function.prototype 详解",document.getElementById("article").innerHTML='<div><p><code>Function.prototype</code> 是 JavaScript 中所有函数对象的原型对象。它本身是一个函数对象，但非常特殊——它没有可执行体，在调用时始终返回 <code>undefined</code>。它的存在意义是为所有函数实例提供共享的属性和方法。</p>\n<h3>1. 基础信息</h3>\n<ul>\n<li><strong>类型</strong>   ：函数对象（但不可执行）</li>\n<li><strong>用途</strong>   ：所有函数的原型（构造函数、箭头函数、方法等）</li>\n<li><strong>构造器</strong>   ：<code>Function</code>（<code>Function.prototype</code> 的唯一实例）</li>\n<li><strong>原型链顶端</strong>   ：<code>Function.prototype</code> 的原型是 <code>Object.prototype</code></li>\n</ul>\n<h3>2. 共享的属性和方法</h3>\n<p>所有函数都会继承以下常用方法：</p>\n<ul>\n<li><code>call(thisArg, ...args)</code>：调用函数并指定 <code>this</code> 和参数。</li>\n<li><code>apply(thisArg, argsArray)</code>：类似 <code>call</code>，但参数以数组形式传递。</li>\n<li><code>bind(thisArg, ...args)</code>：返回一个新函数，永久绑定 <code>this</code> 和部分参数。</li>\n<li><code>toString()</code>：返回函数的源代码字符串。</li>\n<li><code>length</code>：表示函数形参的数量（不包括剩余参数）。</li>\n<li><code>name</code>：函数的名称（匿名函数可能为空字符串）。</li>\n</ul>\n<h3>3. 特殊行为</h3>\n<ul>\n<li><strong>不可作为构造函数</strong>   ：<code>new Function.prototype()</code> 会抛出 <code>TypeError</code>。</li>\n<li><strong>调用时返回 <code>undefined</code></strong>   ：<code>Function.prototype()</code> 直接返回 <code>undefined</code>。</li>\n<li><strong>原型链示例</strong>   ：<pre><code class="language-js"><span class="hljs-keyword">function</span> <span class="hljs-title function_">example</span>(<span class="hljs-params"></span>) {}\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(example.<span class="hljs-property">__proto__</span> === <span class="hljs-title class_">Function</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>); <span class="hljs-comment">// true</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title class_">Function</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">__proto__</span> === <span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>); <span class="hljs-comment">// true</span>\n</code></pre>\n</li>\n</ul>\n<h3>4. 示例代码</h3>\n<pre><code class="language-js"><span class="hljs-comment">// 所有函数共享的方法</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">greet</span>(<span class="hljs-params">name</span>) {\n  <span class="hljs-keyword">return</span> <span class="hljs-string">`Hello, <span class="hljs-subst">${name}</span>!`</span>;\n}\n\n<span class="hljs-comment">// 使用 call 改变 this</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(greet.<span class="hljs-title function_">call</span>(<span class="hljs-literal">null</span>, <span class="hljs-string">&quot;Alice&quot;</span>)); <span class="hljs-comment">// &quot;Hello, Alice!&quot;</span>\n\n<span class="hljs-comment">// 检查继承</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(greet.<span class="hljs-title function_">hasOwnProperty</span>(<span class="hljs-string">&quot;call&quot;</span>)); <span class="hljs-comment">// false</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(greet.<span class="hljs-property">__proto__</span>.<span class="hljs-title function_">hasOwnProperty</span>(<span class="hljs-string">&quot;call&quot;</span>)); <span class="hljs-comment">// true</span>\n</code></pre>\n<h3>5. 总结</h3>\n<p><code>Function.prototype</code> 是 JavaScript 函数系统的核心部分，确保所有函数具有一致的行为（如 <code>call</code>/<code>apply</code>）。它本身是一个“空函数”，但通过原型链为函数实例提供了关键能力。</p>\n</div>'</script></body></html>
