<script>
            document.getElementById('article').innerHTML = 
            "<div><p>JavaScript 中的继承方式多种多样，以下是常见的几种方式及其示例代码：</p>\n<hr>\n<h3>1. <strong>原型链继承</strong></h3>\n<ul>\n<li><strong>原理</strong>  ：将子类的原型指向父类的实例。</li>\n<li><strong>特点</strong>  ：子类实例共享父类实例的引用属性。</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Parent</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">colors</span> = [<span class=\"hljs-string\">&#x27;red&#x27;</span>, <span class=\"hljs-string\">&#x27;blue&#x27;</span>, <span class=\"hljs-string\">&#x27;green&#x27;</span>];\n}\n\n<span class=\"hljs-title class_\">Parent</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>.<span class=\"hljs-property\">getColor</span> = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">colors</span>;\n};\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Child</span>(<span class=\"hljs-params\"></span>) {}\n\n<span class=\"hljs-title class_\">Child</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span> = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Parent</span>();\n<span class=\"hljs-title class_\">Child</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>.<span class=\"hljs-property\">constructor</span> = <span class=\"hljs-title class_\">Child</span>;\n\n<span class=\"hljs-keyword\">const</span> child1 = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Child</span>();\nchild1.<span class=\"hljs-property\">colors</span>.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">&#x27;black&#x27;</span>);\n\n<span class=\"hljs-keyword\">const</span> child2 = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Child</span>();\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(child2.<span class=\"hljs-property\">colors</span>); <span class=\"hljs-comment\">// [&#x27;red&#x27;, &#x27;blue&#x27;, &#x27;green&#x27;, &#x27;black&#x27;]，共享了引用</span>\n</code></pre>\n<hr>\n<h3>2. <strong>借用构造函数继承（伪经典继承）</strong></h3>\n<ul>\n<li><strong>原理</strong>  ：在子类构造函数中调用父类构造函数。</li>\n<li><strong>特点</strong>  ：子类实例不共享父类引用属性。</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Parent</span>(<span class=\"hljs-params\">name</span>) {\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span> = name;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">colors</span> = [<span class=\"hljs-string\">&#x27;red&#x27;</span>, <span class=\"hljs-string\">&#x27;blue&#x27;</span>, <span class=\"hljs-string\">&#x27;green&#x27;</span>];\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Child</span>(<span class=\"hljs-params\">name</span>) {\n  <span class=\"hljs-title class_\">Parent</span>.<span class=\"hljs-title function_\">call</span>(<span class=\"hljs-variable language_\">this</span>, name); <span class=\"hljs-comment\">// 借用构造函数</span>\n}\n\n<span class=\"hljs-keyword\">const</span> child1 = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Child</span>(<span class=\"hljs-string\">&#x27;Alice&#x27;</span>);\nchild1.<span class=\"hljs-property\">colors</span>.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">&#x27;black&#x27;</span>);\n\n<span class=\"hljs-keyword\">const</span> child2 = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Child</span>(<span class=\"hljs-string\">&#x27;Bob&#x27;</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(child2.<span class=\"hljs-property\">colors</span>); <span class=\"hljs-comment\">// [&#x27;red&#x27;, &#x27;blue&#x27;, &#x27;green&#x27;]，不共享</span>\n</code></pre>\n<hr>\n<h3>3. <strong>组合继承</strong></h3>\n<ul>\n<li><strong>原理</strong>  ：结合原型链继承和借用构造函数继承。</li>\n<li><strong>特点</strong>  ：避免引用属性共享，但父类构造函数会被调用两次。</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Parent</span>(<span class=\"hljs-params\">name</span>) {\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span> = name;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">colors</span> = [<span class=\"hljs-string\">&#x27;red&#x27;</span>, <span class=\"hljs-string\">&#x27;blue&#x27;</span>, <span class=\"hljs-string\">&#x27;green&#x27;</span>];\n}\n\n<span class=\"hljs-title class_\">Parent</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>.<span class=\"hljs-property\">sayName</span> = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span>);\n};\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Child</span>(<span class=\"hljs-params\">name, age</span>) {\n  <span class=\"hljs-title class_\">Parent</span>.<span class=\"hljs-title function_\">call</span>(<span class=\"hljs-variable language_\">this</span>, name); <span class=\"hljs-comment\">// 第二次调用</span>\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">age</span> = age;\n}\n\n<span class=\"hljs-title class_\">Child</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span> = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Parent</span>(); <span class=\"hljs-comment\">// 第一次调用</span>\n<span class=\"hljs-title class_\">Child</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>.<span class=\"hljs-property\">constructor</span> = <span class=\"hljs-title class_\">Child</span>;\n\n<span class=\"hljs-keyword\">const</span> child1 = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Child</span>(<span class=\"hljs-string\">&#x27;Alice&#x27;</span>, <span class=\"hljs-number\">18</span>);\nchild1.<span class=\"hljs-property\">colors</span>.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">&#x27;black&#x27;</span>);\n\n<span class=\"hljs-keyword\">const</span> child2 = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Child</span>(<span class=\"hljs-string\">&#x27;Bob&#x27;</span>, <span class=\"hljs-number\">20</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(child2.<span class=\"hljs-property\">colors</span>); <span class=\"hljs-comment\">// [&#x27;red&#x27;, &#x27;blue&#x27;, &#x27;green&#x27;]</span>\n</code></pre>\n<hr>\n<h3>4. <strong>原型式继承</strong></h3>\n<ul>\n<li><strong>原理</strong>  ：使用 <code>Object.create()</code> 实现继承。</li>\n<li><strong>特点</strong>  ：简单，但无法传递参数。</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> parent = {\n  <span class=\"hljs-attr\">colors</span>: [<span class=\"hljs-string\">&#x27;red&#x27;</span>, <span class=\"hljs-string\">&#x27;blue&#x27;</span>, <span class=\"hljs-string\">&#x27;green&#x27;</span>],\n  <span class=\"hljs-attr\">getColor</span>: <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">colors</span>;\n  }\n};\n\n<span class=\"hljs-keyword\">const</span> child1 = <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">create</span>(parent);\nchild1.<span class=\"hljs-property\">colors</span>.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">&#x27;black&#x27;</span>);\n\n<span class=\"hljs-keyword\">const</span> child2 = <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">create</span>(parent);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(child2.<span class=\"hljs-property\">colors</span>); <span class=\"hljs-comment\">// [&#x27;red&#x27;, &#x27;blue&#x27;, &#x27;green&#x27;, &#x27;black&#x27;]，共享了引用</span>\n</code></pre>\n<hr>\n<h3>5. <strong>寄生式继承</strong></h3>\n<ul>\n<li><strong>原理</strong>  ：在原型式继承的基础上封装增强功能。</li>\n<li><strong>特点</strong>  ：灵活性高，但同样存在引用共享问题。</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createObject</span>(<span class=\"hljs-params\">o</span>) {\n  <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">F</span>(<span class=\"hljs-params\"></span>) {}\n  F.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span> = o;\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title function_\">F</span>();\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">extend</span>(<span class=\"hljs-params\">o, additionalProperties</span>) {\n  <span class=\"hljs-keyword\">const</span> obj = <span class=\"hljs-title function_\">createObject</span>(o);\n  <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">assign</span>(obj, additionalProperties);\n  <span class=\"hljs-keyword\">return</span> obj;\n}\n\n<span class=\"hljs-keyword\">const</span> parent = {\n  <span class=\"hljs-attr\">colors</span>: [<span class=\"hljs-string\">&#x27;red&#x27;</span>, <span class=\"hljs-string\">&#x27;blue&#x27;</span>, <span class=\"hljs-string\">&#x27;green&#x27;</span>]\n};\n\n<span class=\"hljs-keyword\">const</span> child1 = <span class=\"hljs-title function_\">extend</span>(parent, { <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&#x27;Alice&#x27;</span> });\nchild1.<span class=\"hljs-property\">colors</span>.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">&#x27;black&#x27;</span>);\n\n<span class=\"hljs-keyword\">const</span> child2 = <span class=\"hljs-title function_\">extend</span>(parent, { <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&#x27;Bob&#x27;</span> });\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(child2.<span class=\"hljs-property\">colors</span>); <span class=\"hljs-comment\">// [&#x27;red&#x27;, &#x27;blue&#x27;, &#x27;green&#x27;, &#x27;black&#x27;]，共享了引用</span>\n</code></pre>\n<hr>\n<h3>6. <strong>寄生组合式继承</strong></h3>\n<ul>\n<li><strong>原理</strong>  ：结合寄生式继承和组合式继承，避免多次调用父类构造函数。</li>\n<li><strong>特点</strong>  ：被认为是最理想的继承方式。</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Parent</span>(<span class=\"hljs-params\">name</span>) {\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span> = name;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">colors</span> = [<span class=\"hljs-string\">&#x27;red&#x27;</span>, <span class=\"hljs-string\">&#x27;blue&#x27;</span>, <span class=\"hljs-string\">&#x27;green&#x27;</span>];\n}\n\n<span class=\"hljs-title class_\">Parent</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>.<span class=\"hljs-property\">sayName</span> = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span>);\n};\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Child</span>(<span class=\"hljs-params\">name, age</span>) {\n  <span class=\"hljs-title class_\">Parent</span>.<span class=\"hljs-title function_\">call</span>(<span class=\"hljs-variable language_\">this</span>, name); <span class=\"hljs-comment\">// 借用构造函数</span>\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">age</span> = age;\n}\n\n<span class=\"hljs-comment\">// 寄生组合继承的实现</span>\n<span class=\"hljs-title class_\">Child</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span> = <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-title class_\">Parent</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>);\n<span class=\"hljs-title class_\">Child</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>.<span class=\"hljs-property\">constructor</span> = <span class=\"hljs-title class_\">Child</span>;\n\n<span class=\"hljs-keyword\">const</span> child1 = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Child</span>(<span class=\"hljs-string\">&#x27;Alice&#x27;</span>, <span class=\"hljs-number\">18</span>);\nchild1.<span class=\"hljs-property\">colors</span>.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">&#x27;black&#x27;</span>);\n\n<span class=\"hljs-keyword\">const</span> child2 = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Child</span>(<span class=\"hljs-string\">&#x27;Bob&#x27;</span>, <span class=\"hljs-number\">20</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(child2.<span class=\"hljs-property\">colors</span>); <span class=\"hljs-comment\">// [&#x27;red&#x27;, &#x27;blue&#x27;, &#x27;green&#x27;]</span>\n</code></pre>\n<hr>\n<h3>7. <strong>ES6 类继承</strong></h3>\n<ul>\n<li><strong>原理</strong>  ：使用 <code>class</code> 和 <code>extends</code> 关键字。</li>\n<li><strong>特点</strong>  ：语法简洁，符合现代 JavaScript 编程风格。</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Parent</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\">name</span>) {\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span> = name;\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">colors</span> = [<span class=\"hljs-string\">&#x27;red&#x27;</span>, <span class=\"hljs-string\">&#x27;blue&#x27;</span>, <span class=\"hljs-string\">&#x27;green&#x27;</span>];\n  }\n\n  <span class=\"hljs-title function_\">sayName</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span>);\n  }\n}\n\n<span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Child</span> <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-title class_ inherited__\">Parent</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\">name, age</span>) {\n    <span class=\"hljs-variable language_\">super</span>(name); <span class=\"hljs-comment\">// 调用父类构造函数</span>\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">age</span> = age;\n  }\n}\n\n<span class=\"hljs-keyword\">const</span> child1 = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Child</span>(<span class=\"hljs-string\">&#x27;Alice&#x27;</span>, <span class=\"hljs-number\">18</span>);\nchild1.<span class=\"hljs-property\">colors</span>.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">&#x27;black&#x27;</span>);\n\n<span class=\"hljs-keyword\">const</span> child2 = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Child</span>(<span class=\"hljs-string\">&#x27;Bob&#x27;</span>, <span class=\"hljs-number\">20</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(child2.<span class=\"hljs-property\">colors</span>); <span class=\"hljs-comment\">// [&#x27;red&#x27;, &#x27;blue&#x27;, &#x27;green&#x27;]</span>\n</code></pre>\n<hr>\n<h3><strong>总结</strong></h3>\n<ul>\n<li><strong>推荐使用 ES6 类继承</strong>  ：语法简洁，功能强大，符合现代 JavaScript 编程风格。</li>\n<li><strong>寄生组合继承</strong>  ：在需要兼容 ES5 或更早版本时，可以考虑使用，因为它性能较好且避免了父类构造函数的多次调用。</li>\n<li><strong>避免使用原型链继承和借用构造函数</strong>  ：前者无法传递参数且共享引用属性，后者无法复用方法。</li>\n</ul>\n</div>";
          </script></body></html>
