<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Next.jsпјҲApp Routerпјүдёӯе®һзҺ°и·Ҝз”ұжӢҰжҲӘ",document.getElementById("article").innerHTML='<div><p>еңЁ Next.jsпјҲApp Routerпјүдёӯе®һзҺ°и·Ҝз”ұжӢҰжҲӘпјҲRoute InterceptionпјүпјҢеҸҜд»ҘйҖҡиҝҮ <strong>еҠЁжҖҒи·Ҝз”ұ</strong>   гҖҒ<strong>дёӯй—ҙд»¶пјҲMiddlewareпјү</strong>   жҲ– <strong>еёғеұҖпјҲLayoutпјү</strong>   з»“еҗҲжқЎд»¶жёІжҹ“жқҘе®һзҺ°гҖӮд»ҘдёӢжҳҜе…·дҪ“ж–№жЎҲпјҡ</p>\n<hr>\n<h3><strong>1. дёӯй—ҙд»¶пјҲMiddlewareпјүе…ЁеұҖжӢҰжҲӘ</strong></h3>\n<p>йҖӮз”ЁдәҺ <strong>е…ЁеұҖи·Ҝз”ұе®ҲеҚ«</strong>   пјҲеҰӮиә«д»ҪйӘҢиҜҒгҖҒжқғйҷҗжҺ§еҲ¶пјүгҖӮ<br>\nеңЁйЎ№зӣ®ж №зӣ®еҪ•еҲӣе»ә <code>middleware.js</code>пјҡ</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// middleware.js</span>\n<span class="hljs-keyword">import</span> { <span class="hljs-title class_">NextResponse</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;next/server&quot;</span>;\n<span class="hljs-keyword">import</span> { verifyToken } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;./lib/auth&quot;</span>;\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">middleware</span>(<span class="hljs-params">request</span>) {\n  <span class="hljs-keyword">const</span> token = request.<span class="hljs-property">cookies</span>.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;token&quot;</span>)?.<span class="hljs-property">value</span>;\n  <span class="hljs-keyword">const</span> { pathname } = request.<span class="hljs-property">nextUrl</span>;\n\n  <span class="hljs-comment">// жӢҰжҲӘжңӘзҷ»еҪ•з”ЁжҲ·и®ҝй—® /dashboard</span>\n  <span class="hljs-keyword">if</span> (pathname.<span class="hljs-title function_">startsWith</span>(<span class="hljs-string">&quot;/dashboard&quot;</span>) &amp;&amp; !token) {\n    <span class="hljs-keyword">return</span> <span class="hljs-title class_">NextResponse</span>.<span class="hljs-title function_">redirect</span>(<span class="hljs-keyword">new</span> <span class="hljs-title function_">URL</span>(<span class="hljs-string">&quot;/login&quot;</span>, request.<span class="hljs-property">url</span>));\n  }\n\n  <span class="hljs-comment">// жӢҰжҲӘе·Ізҷ»еҪ•з”ЁжҲ·и®ҝй—® /login жҲ– /register</span>\n  <span class="hljs-keyword">if</span> ([<span class="hljs-string">&quot;/login&quot;</span>, <span class="hljs-string">&quot;/register&quot;</span>].<span class="hljs-title function_">includes</span>(pathname) &amp;&amp; token) {\n    <span class="hljs-keyword">return</span> <span class="hljs-title class_">NextResponse</span>.<span class="hljs-title function_">redirect</span>(<span class="hljs-keyword">new</span> <span class="hljs-title function_">URL</span>(<span class="hljs-string">&quot;/dashboard&quot;</span>, request.<span class="hljs-property">url</span>));\n  }\n\n  <span class="hljs-keyword">return</span> <span class="hljs-title class_">NextResponse</span>.<span class="hljs-title function_">next</span>();\n}\n\n<span class="hljs-comment">// й…ҚзҪ®жӢҰжҲӘиҢғеӣҙпјҲеҸҜйҖүпјү</span>\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> config = {\n  <span class="hljs-attr">matcher</span>: [<span class="hljs-string">&quot;/dashboard/:path*&quot;</span>, <span class="hljs-string">&quot;/login&quot;</span>, <span class="hljs-string">&quot;/register&quot;</span>],\n};\n</code></pre>\n<hr>\n<h3><strong>2. еҠЁжҖҒи·Ҝз”ұеұҖйғЁжӢҰжҲӘ</strong></h3>\n<p>йҖӮз”ЁдәҺ <strong>жҢүйңҖжӢҰжҲӘзү№е®ҡи·Ҝз”ұ</strong>   пјҲеҰӮжЁЎжҖҒжЎҶеҸ еҠ и·Ҝз”ұпјүгҖӮ</p>\n<h4><strong>(1) е®ҡд№үжӢҰжҲӘи·Ҝз”ұз»“жһ„</strong></h4>\n<pre><code>app\nв”ңв”Җв”Җ @auth\nв”Ӯ   в””в”Җв”Җ login\nв”Ӯ       в””в”Җв”Җ page.tsx  # жӢҰжҲӘеҗҺзҡ„жЁЎжҖҒжЎҶеҶ…е®№\nв”ңв”Җв”Җ login\nв”Ӯ   в””в”Җв”Җ page.tsx      # еҺҹе§Ӣзҷ»еҪ•йЎө\nв””в”Җв”Җ layout.tsx        # еӨ„зҗҶжӢҰжҲӘйҖ»иҫ‘\n</code></pre>\n<h4><strong>(2) еңЁеёғеұҖдёӯеӨ„зҗҶжӢҰжҲӘйҖ»иҫ‘</strong></h4>\n<pre><code class="language-tsx"><span class="hljs-comment">// app/layout.tsx</span>\n<span class="hljs-keyword">import</span> { <span class="hljs-title class_">InterceptedLogin</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@/components/intercepted-login&quot;</span>;\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">Layout</span>(<span class="hljs-params">{ children }: { children: React.ReactNode }</span>) {\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;&gt;</span>\n      {children}\n      {/* жӢҰжҲӘ /login ж—¶жҳҫзӨәжЁЎжҖҒжЎҶ */}\n      <span class="hljs-tag">&lt;<span class="hljs-name">InterceptedLogin</span> /&gt;</span>\n    <span class="hljs-tag">&lt;/&gt;</span></span>\n  );\n}\n</code></pre>\n<h4><strong>(3) е®ҡд№үжӢҰжҲӘз»„д»¶</strong></h4>\n<pre><code class="language-tsx"><span class="hljs-comment">// components/intercepted-login.tsx</span>\n<span class="hljs-string">&quot;use client&quot;</span>;\n\n<span class="hljs-keyword">import</span> { usePathname } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;next/navigation&quot;</span>;\n<span class="hljs-keyword">import</span> { <span class="hljs-title class_">Modal</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@/components/ui/modal&quot;</span>;\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">InterceptedLogin</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> pathname = <span class="hljs-title function_">usePathname</span>();\n  <span class="hljs-keyword">const</span> isIntercepted = pathname === <span class="hljs-string">&quot;/@auth/login&quot;</span>;\n\n  <span class="hljs-keyword">if</span> (!isIntercepted) <span class="hljs-keyword">return</span> <span class="hljs-literal">null</span>;\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">Modal</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">className</span>=<span class="hljs-string">&quot;p-4&quot;</span>&gt;</span>\n        <span class="hljs-tag">&lt;<span class="hljs-name">h1</span>&gt;</span>зҷ»еҪ•пјҲжЁЎжҖҒжЎҶпјү<span class="hljs-tag">&lt;/<span class="hljs-name">h1</span>&gt;</span>\n        {/* жӯӨеӨ„ж”ҫзҪ®зҷ»еҪ•иЎЁеҚ• */}\n      <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>\n    <span class="hljs-tag">&lt;/<span class="hljs-name">Modal</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<hr>\n<h3><strong>3. и·Ҝз”ұз»„пјҲRoute Groupsпјү + жқЎд»¶жёІжҹ“</strong></h3>\n<p>йҖӮз”ЁдәҺ <strong>еҲҶз»„и·Ҝз”ұзҡ„жқғйҷҗжҺ§еҲ¶</strong>   гҖӮ</p>\n<h4><strong>(1) еҲӣе»әи·Ҝз”ұз»„</strong></h4>\n<pre><code>app\nв”ңв”Җв”Җ (auth)\nв”Ӯ   в”ңв”Җв”Җ login\nв”Ӯ   в”Ӯ   в””в”Җв”Җ page.tsx\nв”Ӯ   в””в”Җв”Җ register\nв”Ӯ       в””в”Җв”Җ page.tsx\nв”ңв”Җв”Җ (protected)\nв”Ӯ   в””в”Җв”Җ dashboard\nв”Ӯ       в””в”Җв”Җ page.tsx\nв””в”Җв”Җ layout.tsx\n</code></pre>\n<h4><strong>(2) еңЁеёғеұҖдёӯж ЎйӘҢжқғйҷҗ</strong></h4>\n<pre><code class="language-tsx"><span class="hljs-comment">// app/(protected)/layout.tsx</span>\n<span class="hljs-keyword">import</span> { redirect } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;next/navigation&quot;</span>;\n<span class="hljs-keyword">import</span> { getSession } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@/lib/auth&quot;</span>;\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">ProtectedLayout</span>(<span class="hljs-params">{\n  children,\n}: {\n  children: React.ReactNode;\n}</span>) {\n  <span class="hljs-keyword">const</span> session = <span class="hljs-keyword">await</span> <span class="hljs-title function_">getSession</span>();\n\n  <span class="hljs-keyword">if</span> (!session) {\n    <span class="hljs-title function_">redirect</span>(<span class="hljs-string">&quot;/login&quot;</span>); <span class="hljs-comment">// жңӘзҷ»еҪ•еҲҷйҮҚе®ҡеҗ‘</span>\n  }\n\n  <span class="hljs-keyword">return</span> <span class="language-xml"><span class="hljs-tag">&lt;&gt;</span>{children}<span class="hljs-tag">&lt;/&gt;</span></span>;\n}\n</code></pre>\n<hr>\n<h3><strong>4. й«ҳзә§еңәжҷҜпјҡе№¶иЎҢи·Ҝз”ұпјҲParallel Routesпјү</strong></h3>\n<p>йҖӮз”ЁдәҺ <strong>еӨҚжқӮжӢҰжҲӘйҖ»иҫ‘</strong>   пјҲеҰӮеҗҢж—¶еұ•зӨәдё»йЎөйқўе’ҢжӢҰжҲӘеҶ…е®№пјүгҖӮ</p>\n<h4><strong>(1) е®ҡд№үе№¶иЎҢи·Ҝз”ұз»“жһ„</strong></h4>\n<pre><code>app\nв”ңв”Җв”Җ @modal\nв”Ӯ   в””в”Җв”Җ (.)login      # (.)иЎЁзӨәзӣёеҜ№и·Ҝеҫ„\nв”Ӯ       в””в”Җв”Җ page.tsx\nв”ңв”Җв”Җ login\nв”Ӯ   в””в”Җв”Җ page.tsx\nв””в”Җв”Җ layout.tsx\n</code></pre>\n<h4><strong>(2) й…ҚзҪ®еёғеұҖж–Үд»¶</strong></h4>\n<pre><code class="language-tsx"><span class="hljs-comment">// app/layout.tsx</span>\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">Layout</span>(<span class="hljs-params">{\n  children,\n  modal,\n}: {\n  children: React.ReactNode;\n  modal: React.ReactNode;\n}</span>) {\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;&gt;</span>\n      {children}\n      {modal}\n    <span class="hljs-tag">&lt;/&gt;</span></span>\n  );\n}\n</code></pre>\n<p>и®ҝй—® <code>/login</code> ж—¶пјҡ</p>\n<ul>\n<li>й»ҳи®ӨжҳҫзӨә <code>login/page.tsx</code></li>\n<li>и®ҝй—® <code>/(@modal)/login</code> дјҡеҗҢж—¶жёІжҹ“дё»йЎөйқўе’ҢжЁЎжҖҒжЎҶгҖӮ</li>\n</ul>\n<hr>\n<h3><strong>5. еҜ№жҜ”дёҺйҖүеһӢ</strong></h3>\n<table>\n<thead>\n<tr>\n<th>ж–№жЎҲ</th>\n<th>йҖӮз”ЁеңәжҷҜ</th>\n<th>дјҳзӮ№</th>\n<th>зјәзӮ№</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>дёӯй—ҙд»¶</strong></td>\n<td>е…ЁеұҖжқғйҷҗжҺ§еҲ¶</td>\n<td>з»ҹдёҖз®ЎзҗҶпјҢжҖ§иғҪеҘҪ</td>\n<td>ж— жі•еӨ„зҗҶеӨҚжқӮ UI жӢҰжҲӘ</td>\n</tr>\n<tr>\n<td><strong>еҠЁжҖҒи·Ҝз”ұ</strong></td>\n<td>жЁЎжҖҒжЎҶ/еұҖйғЁжӢҰжҲӘ</td>\n<td>зҒөжҙ»жҗӯй…Қ UI</td>\n<td>йңҖиҰҒжүӢеҠЁеӨ„зҗҶи·Ҝз”ұз»“жһ„</td>\n</tr>\n<tr>\n<td><strong>и·Ҝз”ұз»„ + еёғеұҖ</strong></td>\n<td>еҲҶз»„и·Ҝз”ұжқғйҷҗ</td>\n<td>йҖ»иҫ‘жё…жҷ°</td>\n<td>д»…йҖӮз”ЁдәҺз»„еҶ…и·Ҝз”ұ</td>\n</tr>\n<tr>\n<td><strong>е№¶иЎҢи·Ҝз”ұ</strong></td>\n<td>еҗҢж—¶еұ•зӨәдё»йЎөйқўе’ҢжӢҰжҲӘеҶ…е®№</td>\n<td>ж”ҜжҢҒеӨҚжқӮеңәжҷҜ</td>\n<td>й…ҚзҪ®иҫғеӨҚжқӮ</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>еёёи§Ғй—®йўҳ</strong></h3>\n<h4><strong>Q1: еҰӮдҪ•иҺ·еҸ–жӢҰжҲӘеүҚзҡ„и·Ҝз”ұи·Ҝеҫ„пјҹ</strong></h4>\n<ul>\n<li>еңЁдёӯй—ҙд»¶дёӯйҖҡиҝҮ <code>request.nextUrl</code> иҺ·еҸ–пјҡ<pre><code class="language-javascript"><span class="hljs-keyword">const</span> referer = request.<span class="hljs-property">headers</span>.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;referer&quot;</span>);\n</code></pre>\n</li>\n<li>еңЁе®ўжҲ·з«ҜйҖҡиҝҮ <code>useRouter</code>пјҡ<pre><code class="language-tsx"><span class="hljs-keyword">const</span> router = <span class="hljs-title function_">useRouter</span>();\n<span class="hljs-keyword">const</span> previousPath = router.<span class="hljs-title function_">back</span>();\n</code></pre>\n</li>\n</ul>\n<h4><strong>Q2: еҰӮдҪ•еҸ–ж¶ҲжӢҰжҲӘпјҹ</strong></h4>\n<ul>\n<li>дҪҝз”Ё <code>router.replace()</code> жё…йҷӨжӢҰжҲӘзҠ¶жҖҒпјҡ<pre><code class="language-tsx">router.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;/dashboard&quot;</span>, { <span class="hljs-attr">scroll</span>: <span class="hljs-literal">false</span> });\n</code></pre>\n</li>\n</ul>\n<h4><strong>Q3: еҰӮдҪ•еҢәеҲҶзЎ¬еҜјиҲӘе’Ңе®ўжҲ·з«ҜеҜјиҲӘпјҹ</strong></h4>\n<ul>\n<li>еңЁдёӯй—ҙд»¶дёӯжЈҖжҹҘ <code>request.headers.get(\'sec-fetch-mode\') === \'navigate\'</code>гҖӮ</li>\n</ul>\n<hr>\n<p>жҢүйңҖйҖүжӢ©дёҠиҝ°ж–№жЎҲеҚіеҸҜе®һзҺ° Next.js App Router зҡ„и·Ҝз”ұжӢҰжҲӘгҖӮеҰӮжһңйңҖиҰҒжӣҙе…·дҪ“зҡ„е®һзҺ°пјҲеҰӮз»“еҗҲиә«д»ҪйӘҢиҜҒеә“пјүпјҢеҸҜд»ҘиҝӣдёҖжӯҘиҜҙжҳҺйңҖжұӮпјҒ</p>\n</div>'</script></body></html>
