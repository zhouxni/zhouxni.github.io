<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="TypeScript  readonly 与 as const 的区别",document.getElementById("article").innerHTML='<div><p><code>readonly</code> 和 <code>as const</code> 都是 TypeScript 中用于创建不可变数据的工具，但它们有不同的行为和适用场景。</p>\n<h2>主要区别</h2>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th><code>readonly</code></th>\n<th><code>as const</code></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>作用范围</strong></td>\n<td>仅当前层级属性</td>\n<td>所有嵌套层级（深度只读）</td>\n</tr>\n<tr>\n<td><strong>类型影响</strong></td>\n<td>保持原有类型</td>\n<td>转为字面量类型（更严格）</td>\n</tr>\n<tr>\n<td><strong>适用场景</strong></td>\n<td>接口/类型定义</td>\n<td>值字面量</td>\n</tr>\n<tr>\n<td><strong>可变性</strong></td>\n<td>仅禁止直接修改</td>\n<td>完全不可变</td>\n</tr>\n</tbody>\n</table>\n<h2><code>readonly</code> 的特性</h2>\n<ol>\n<li>\n<p><strong>仅作用于当前层级</strong></p>\n<pre><code class="language-typescript"><span class="hljs-keyword">interface</span> <span class="hljs-title class_">Person</span> {\n  <span class="hljs-keyword">readonly</span> <span class="hljs-attr">name</span>: <span class="hljs-built_in">string</span>;\n  <span class="hljs-keyword">readonly</span> <span class="hljs-attr">address</span>: {\n    <span class="hljs-attr">street</span>: <span class="hljs-built_in">string</span>;\n    <span class="hljs-attr">city</span>: <span class="hljs-built_in">string</span>;\n  };\n}\n\n<span class="hljs-keyword">const</span> <span class="hljs-attr">person</span>: <span class="hljs-title class_">Person</span> = {\n  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Alice&quot;</span>,\n  <span class="hljs-attr">address</span>: { <span class="hljs-attr">street</span>: <span class="hljs-string">&quot;Main&quot;</span>, <span class="hljs-attr">city</span>: <span class="hljs-string">&quot;NY&quot;</span> },\n};\nperson.<span class="hljs-property">name</span> = <span class="hljs-string">&quot;Bob&quot;</span>; <span class="hljs-comment">// ❌ 错误</span>\nperson.<span class="hljs-property">address</span>.<span class="hljs-property">city</span> = <span class="hljs-string">&quot;Boston&quot;</span>; <span class="hljs-comment">// ✅ 允许（嵌套属性可变）</span>\n</code></pre>\n</li>\n<li>\n<p><strong>可应用于接口、类型和类属性</strong></p>\n<pre><code class="language-typescript"><span class="hljs-keyword">class</span> <span class="hljs-title class_">User</span> {\n  <span class="hljs-keyword">readonly</span> <span class="hljs-attr">id</span>: <span class="hljs-built_in">string</span>;\n  <span class="hljs-title function_">constructor</span>(<span class="hljs-params"><span class="hljs-attr">id</span>: <span class="hljs-built_in">string</span></span>) {\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">id</span> = id;\n  }\n}\n</code></pre>\n</li>\n</ol>\n<h2><code>as const</code> 的特性</h2>\n<ol>\n<li>\n<p><strong>深度只读</strong></p>\n<pre><code class="language-typescript"><span class="hljs-keyword">const</span> person = {\n  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Alice&quot;</span>,\n  <span class="hljs-attr">address</span>: {\n    <span class="hljs-attr">street</span>: <span class="hljs-string">&quot;Main&quot;</span>,\n    <span class="hljs-attr">city</span>: <span class="hljs-string">&quot;NY&quot;</span>,\n  },\n} <span class="hljs-keyword">as</span> <span class="hljs-keyword">const</span>;\n\nperson.<span class="hljs-property">name</span> = <span class="hljs-string">&quot;Bob&quot;</span>; <span class="hljs-comment">// ❌ 错误</span>\nperson.<span class="hljs-property">address</span>.<span class="hljs-property">city</span> = <span class="hljs-string">&quot;Boston&quot;</span>; <span class="hljs-comment">// ❌ 错误（嵌套属性也是只读）</span>\n</code></pre>\n</li>\n<li>\n<p><strong>字面量类型锁定</strong></p>\n<pre><code class="language-typescript"><span class="hljs-keyword">const</span> colors = [<span class="hljs-string">&quot;red&quot;</span>, <span class="hljs-string">&quot;green&quot;</span>, <span class="hljs-string">&quot;blue&quot;</span>] <span class="hljs-keyword">as</span> <span class="hljs-keyword">const</span>;\n<span class="hljs-comment">// 类型为 readonly [&quot;red&quot;, &quot;green&quot;, &quot;blue&quot;]（精确字面量元组）</span>\n\n<span class="hljs-keyword">const</span> status = <span class="hljs-string">&quot;success&quot;</span> <span class="hljs-keyword">as</span> <span class="hljs-keyword">const</span>;\n<span class="hljs-comment">// 类型为 &quot;success&quot;（不是 string）</span>\n</code></pre>\n</li>\n<li>\n<p><strong>仅适用于值（不能用于类型定义）</strong></p>\n<pre><code class="language-typescript"><span class="hljs-comment">// ❌ 错误用法</span>\n<span class="hljs-keyword">type</span> <span class="hljs-title class_">Person</span> = {\n  <span class="hljs-attr">name</span>: <span class="hljs-built_in">string</span>;\n  <span class="hljs-attr">age</span>: <span class="hljs-built_in">number</span>;\n} <span class="hljs-keyword">as</span> <span class="hljs-keyword">const</span>;\n\n<span class="hljs-comment">// ✅ 正确用法</span>\n<span class="hljs-keyword">const</span> person = {\n  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Alice&quot;</span>,\n  <span class="hljs-attr">age</span>: <span class="hljs-number">30</span>\n} <span class="hljs-keyword">as</span> <span class="hljs-keyword">const</span>;\n</code></pre>\n</li>\n</ol>\n<h2>何时使用哪个？</h2>\n<ul>\n<li>\n<p>使用 <code>readonly</code> 当：</p>\n<ul>\n<li>你需要定义不可变的接口或类型</li>\n<li>你只需要浅层不可变性</li>\n<li>你需要保留原始类型（不想要字面量类型）</li>\n</ul>\n</li>\n<li>\n<p>使用 <code>as const</code> 当：</p>\n<ul>\n<li>你需要深度不可变的对象</li>\n<li>你需要精确的字面量类型</li>\n<li>你处理的是值而不是类型定义</li>\n</ul>\n</li>\n</ul>\n</div>'</script></body></html>
