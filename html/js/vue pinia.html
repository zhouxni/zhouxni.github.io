<script>
      document.title = 'vue pinia'
        document.getElementById('article').innerHTML = 
        "<div><p><strong>Vue Pinia 配置详解</strong></p>\n<p>Pinia 是 Vue 的状态管理库，提供了一种更简单、更现代的状态管理方式，特别适用于 Vue 3。以下是 Pinia 的详细配置和使用指南：</p>\n<h3>一、安装与配置</h3>\n<ol>\n<li>\n<p><strong>安装 Pinia</strong></p>\n<p>使用 npm 或 yarn 安装 Pinia：</p>\n<pre><code class=\"language-sh\">npm install pinia\n</code></pre>\n<p>或</p>\n<pre><code class=\"language-sh\">yarn add pinia\n</code></pre>\n</li>\n<li>\n<p><strong>创建 Pinia 实例并挂载到 Vue 应用</strong></p>\n<p>在 <code>main.js</code> 或 <code>main.ts</code> 中，创建 Pinia 实例并将其挂载到 Vue 应用上：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { createApp } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vue&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> { createPinia } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;pinia&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">App</span> <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;./App.vue&#x27;</span>;\n\n<span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-title function_\">createApp</span>(<span class=\"hljs-title class_\">App</span>);\n<span class=\"hljs-keyword\">const</span> pinia = <span class=\"hljs-title function_\">createPinia</span>();\n\napp.<span class=\"hljs-title function_\">use</span>(pinia);\napp.<span class=\"hljs-title function_\">mount</span>(<span class=\"hljs-string\">&#x27;#app&#x27;</span>);\n</code></pre>\n</li>\n</ol>\n<h3>二、定义 Store</h3>\n<p>在 Pinia 中，Store 是用于管理状态的核心概念。你可以使用 <code>defineStore</code> 函数来定义一个 Store。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { defineStore } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;pinia&#x27;</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">const</span> useCounterStore = <span class=\"hljs-title function_\">defineStore</span>(<span class=\"hljs-string\">&#x27;counter&#x27;</span>, {\n  <span class=\"hljs-attr\">state</span>: <span class=\"hljs-function\">() =&gt;</span> ({\n    <span class=\"hljs-attr\">count</span>: <span class=\"hljs-number\">0</span>,\n  }),\n  <span class=\"hljs-attr\">getters</span>: {\n    <span class=\"hljs-attr\">doubleCount</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> state.<span class=\"hljs-property\">count</span> * <span class=\"hljs-number\">2</span>,\n  },\n  <span class=\"hljs-attr\">actions</span>: {\n    <span class=\"hljs-title function_\">increment</span>(<span class=\"hljs-params\"></span>) {\n      <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">count</span>++;\n    },\n    <span class=\"hljs-title function_\">decrement</span>(<span class=\"hljs-params\"></span>) {\n      <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">count</span>--;\n    },\n  },\n});\n</code></pre>\n<ul>\n<li><strong>state</strong>  ：定义 Store 中的状态数据，通常是响应式的。</li>\n<li><strong>getters</strong>  ：类似于 Vue 组件中的计算属性，用于派生状态。</li>\n<li><strong>actions</strong>  ：用于修改状态或执行复杂的业务逻辑，可以包含异步操作。</li>\n</ul>\n<h3>三、在组件中使用 Store</h3>\n<p>在 Vue 组件中，你可以通过 <code>useStore</code> 钩子来访问和使用 Store。</p>\n<pre><code class=\"language-html\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">template</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>Count: {{ counter.count }}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>Double Count: {{ counter.doubleCount }}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> @<span class=\"hljs-attr\">click</span>=<span class=\"hljs-string\">&quot;counter.increment&quot;</span>&gt;</span>Increment<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> @<span class=\"hljs-attr\">click</span>=<span class=\"hljs-string\">&quot;counter.decrement&quot;</span>&gt;</span>Decrement<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">template</span>&gt;</span>\n\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n<span class=\"hljs-keyword\">import</span> { useCounterStore } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;@/stores/counter&#x27;</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-title function_\">setup</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">const</span> counter = <span class=\"hljs-title function_\">useCounterStore</span>();\n    <span class=\"hljs-keyword\">return</span> { counter };\n  },\n};\n</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n</code></pre>\n<h3>四、Pinia 的重要特性</h3>\n<ol>\n<li><strong>模块化</strong>  ：Pinia 允许你将状态管理拆分成多个 Store，每个 Store 可以包含自己的状态、getter 和 action，有助于代码的模块化和可维护性。</li>\n<li><strong>TypeScript 支持</strong>  ：Pinia 提供了对 TypeScript 的良好支持，包括类型推断和自动补全功能。</li>\n<li><strong>响应式系统</strong>  ：Pinia 是基于 Vue 3 的响应式系统构建的，状态会自动响应变化，并触发组件的更新。</li>\n<li><strong>插件系统</strong>  ：Pinia 允许通过插件来扩展其功能，例如支持服务器端渲染或添加额外的中间件。</li>\n<li><strong>持久化存储</strong>  ：通过插件机制，如 <code>pinia-plugin-persistedstate</code>，可以轻松地实现状态的持久化存储。</li>\n<li><strong>Devtools 支持</strong>  ：Pinia 支持 Vue Devtools，提供了追踪 actions 和 mutations 的时间线、时间旅行和热更新等功能，方便开发者调试。</li>\n</ol>\n<h3>五、高级用法</h3>\n<ol>\n<li><strong>动态参数传递</strong>  ：在创建 Store 时，可以传递不同的参数来初始化 Store 状态。</li>\n<li><strong>状态监听</strong>  ：可以通过 <code>watch</code> API 或 Pinia 提供的 <code>subscribe</code> 方法来监听 Store 中某个状态的变化。</li>\n<li><strong>映射辅助函数</strong>  ：Pinia 提供了如 <code>mapStores</code>、<code>mapState</code> 和 <code>mapActions</code> 等辅助函数，使得在组件中使用 Store 更加方便。</li>\n<li><strong>SSR 支持</strong>  ：Pinia 支持服务端渲染，这对于构建需要 SSR 的应用是一个重要的特性。</li>\n</ol>\n<h3>六、示例项目结构</h3>\n<p>为了更好地组织代码，你可以在项目中创建一个 <code>stores</code> 文件夹，用于存放所有的 Store 文件。例如：</p>\n<pre><code>src/\n├── stores/\n│   ├── counter.js\n│   ├── user.js\n│   └── index.js\n├── main.js\n└── App.vue\n</code></pre>\n<p>在 <code>index.js</code> 文件中，你可以统一导出所有的 Store，方便在组件中使用：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { createPinia } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;pinia&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> { useCounterStore } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;./counter&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> { useUserStore } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;./user&#x27;</span>;\n\n<span class=\"hljs-keyword\">const</span> pinia = <span class=\"hljs-title function_\">createPinia</span>();\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> pinia;\n\n<span class=\"hljs-keyword\">export</span> { useCounterStore, useUserStore };\n</code></pre>\n<p>这样，在组件中就可以通过 <code>import { useCounterStore, useUserStore } from '@/stores'</code> 来引入需要的 Store。</p>\n</div>";
      </script></body></html>
