  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
      document.title = '小程序分包加载机制解析'
        document.getElementById('article').innerHTML = 
        "<div><p>关于小程序启动时的分包下载行为，以下是详细说明：</p>\n<h2>一、普通分包在启动时的加载规则</h2>\n<p><strong>不会自动下载</strong>  普通分包。小程序启动时的默认加载行为如下：</p>\n<ol>\n<li><strong>主包必下载</strong>  ：\n<ul>\n<li>启动时必定会下载主包（包含app.js、app.json等）</li>\n<li>主包大小限制：不超过2MB</li>\n</ul>\n</li>\n<li><strong>普通分包按需加载</strong>  ：\n<ul>\n<li>只有访问到分包页面时才会触发下载</li>\n<li>首次访问分包页面会有短暂加载等待</li>\n</ul>\n</li>\n</ol>\n<h2>二、分包预下载配置</h2>\n<p>可以通过<code>app.json</code>配置分包预下载策略：</p>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;preloadRule&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;pages/index/index&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n      <span class=\"hljs-attr\">&quot;network&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;wifi&quot;</span><span class=\"hljs-punctuation\">,</span>\n      <span class=\"hljs-attr\">&quot;packages&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-string\">&quot;packageA&quot;</span><span class=\"hljs-punctuation\">]</span>\n    <span class=\"hljs-punctuation\">}</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<p>配置参数说明：</p>\n<ul>\n<li><code>network</code>：预下载网络条件（all/wifi）</li>\n<li><code>packages</code>：指定要预下载的分包名或根路径</li>\n</ul>\n<h2>三、分包加载优化建议</h2>\n<ol>\n<li><strong>合理规划分包</strong>  ：\n<ul>\n<li>主包保留最核心代码</li>\n<li>按功能模块划分分包</li>\n</ul>\n</li>\n<li><strong>预加载策略</strong>  ：<pre><code class=\"language-json\"><span class=\"hljs-comment\">// 示例：首页空闲时预加载可能访问的分包</span>\n<span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;preloadRule&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;pages/index/index&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n      <span class=\"hljs-attr\">&quot;network&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;wifi&quot;</span><span class=\"hljs-punctuation\">,</span>\n      <span class=\"hljs-attr\">&quot;packages&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-string\">&quot;shopping&quot;</span><span class=\"hljs-punctuation\">,</span> <span class=\"hljs-string\">&quot;user&quot;</span><span class=\"hljs-punctuation\">]</span>\n    <span class=\"hljs-punctuation\">}</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n</li>\n<li><strong>分包大小控制</strong>  ：\n<ul>\n<li>单个分包不超过2MB</li>\n<li>总包大小不超过20MB（微信限制）</li>\n</ul>\n</li>\n</ol>\n<h2>四、不同场景下的加载行为</h2>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>加载行为</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>冷启动</td>\n<td>只下载主包</td>\n</tr>\n<tr>\n<td>首次访问分包页面</td>\n<td>下载对应分包</td>\n</tr>\n<tr>\n<td>配置了预加载</td>\n<td>满足条件时自动后台下载</td>\n</tr>\n<tr>\n<td>再次访问已下载分包</td>\n<td>直接使用本地缓存</td>\n</tr>\n</tbody>\n</table>\n<h2>五、检查分包加载状态</h2>\n<p>可通过API获取分包信息：</p>\n<pre><code class=\"language-javascript\">wx.<span class=\"hljs-title function_\">loadSubpackage</span>({\n  <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&#x27;packageName&#x27;</span>,\n  <span class=\"hljs-attr\">success</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">res</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;分包加载完成&#x27;</span>)\n  },\n  <span class=\"hljs-attr\">fail</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">err</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;分包加载失败&#x27;</span>, err)\n  }\n})\n</code></pre>\n<h2>六、注意事项</h2>\n<ol>\n<li>分包路径必须在<code>app.json</code>中明确定义：<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;subpackages&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span>\n    <span class=\"hljs-punctuation\">{</span>\n      <span class=\"hljs-attr\">&quot;root&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;packageA&quot;</span><span class=\"hljs-punctuation\">,</span>\n      <span class=\"hljs-attr\">&quot;pages&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-string\">&quot;page1&quot;</span><span class=\"hljs-punctuation\">,</span> <span class=\"hljs-string\">&quot;page2&quot;</span><span class=\"hljs-punctuation\">]</span>\n    <span class=\"hljs-punctuation\">}</span>\n  <span class=\"hljs-punctuation\">]</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n</li>\n<li>分包内的静态资源需使用相对路径引用</li>\n<li>TabBar页面必须放在主包内</li>\n</ol>\n<p>通过合理使用分包策略，可以显著提升小程序的启动速度和使用体验。建议对非首屏必需的功能模块采用分包设计，并结合预加载策略优化用户体验。</p>\n</div>";
      </script></body></html>
