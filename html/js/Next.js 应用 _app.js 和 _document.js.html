<!DOCTYPE html><html lang="en"><head>

<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p>在 Next.js 应用里，<code>_app.js</code> 和 <code>_document.js</code> 是两个特殊的文件，它们在应用的渲染流程中起着关键作用。下面为你详细介绍它们的作用以及使用场景。</p>\n<h3>一、<code>_app.js</code> 的作用</h3>\n<p><code>_app.js</code> 是 Next.js 应用的根组件，所有页面都会继承它。其主要作用如下：</p>\n<h4>1. 全局状态和上下文管理</h4>\n<p>你可以在 <code>_app.js</code> 中初始化全局状态，像 Redux store、Context API 等都能在这里初始化。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// _app.js</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Provider</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&quot;react-redux&quot;</span>;\n<span class=\"hljs-keyword\">import</span> store <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&quot;../store&quot;</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">MyApp</span>(<span class=\"hljs-params\">{ Component, pageProps }</span>) {\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Provider</span> <span class=\"hljs-attr\">store</span>=<span class=\"hljs-string\">{store}</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Component</span> {<span class=\"hljs-attr\">...pageProps</span>} /&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Provider</span>&gt;</span></span>\n  );\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> <span class=\"hljs-title class_\">MyApp</span>;\n</code></pre>\n<h4>2. 全局样式和 CSS 模块</h4>\n<p>可以在 <code>_app.js</code> 中引入全局 CSS 文件或者 CSS 模块。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// _app.js</span>\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-string\">&quot;../styles/globals.css&quot;</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">MyApp</span>(<span class=\"hljs-params\">{ Component, pageProps }</span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Component</span> {<span class=\"hljs-attr\">...pageProps</span>} /&gt;</span></span>;\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> <span class=\"hljs-title class_\">MyApp</span>;\n</code></pre>\n<h4>3. 路由事件监听</h4>\n<p>借助 <code>next/router</code>，可以监听路由变化事件，比如路由开始切换、切换完成等。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// _app.js</span>\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">Router</span> <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&quot;next/router&quot;</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">MyApp</span>(<span class=\"hljs-params\">{ Component, pageProps }</span>) {\n  <span class=\"hljs-title class_\">React</span>.<span class=\"hljs-title function_\">useEffect</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">handleStart</span> = (<span class=\"hljs-params\">url</span>) =&gt; {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Loading: <span class=\"hljs-subst\">${url}</span>`</span>);\n    };\n    <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">handleComplete</span> = (<span class=\"hljs-params\">url</span>) =&gt; {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Finished loading: <span class=\"hljs-subst\">${url}</span>`</span>);\n    };\n\n    <span class=\"hljs-title class_\">Router</span>.<span class=\"hljs-property\">events</span>.<span class=\"hljs-title function_\">on</span>(<span class=\"hljs-string\">&quot;routeChangeStart&quot;</span>, handleStart);\n    <span class=\"hljs-title class_\">Router</span>.<span class=\"hljs-property\">events</span>.<span class=\"hljs-title function_\">on</span>(<span class=\"hljs-string\">&quot;routeChangeComplete&quot;</span>, handleComplete);\n\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-function\">() =&gt;</span> {\n      <span class=\"hljs-title class_\">Router</span>.<span class=\"hljs-property\">events</span>.<span class=\"hljs-title function_\">off</span>(<span class=\"hljs-string\">&quot;routeChangeStart&quot;</span>, handleStart);\n      <span class=\"hljs-title class_\">Router</span>.<span class=\"hljs-property\">events</span>.<span class=\"hljs-title function_\">off</span>(<span class=\"hljs-string\">&quot;routeChangeComplete&quot;</span>, handleComplete);\n    };\n  }, []);\n\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Component</span> {<span class=\"hljs-attr\">...pageProps</span>} /&gt;</span></span>;\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> <span class=\"hljs-title class_\">MyApp</span>;\n</code></pre>\n<h4>4. 页面过渡动画</h4>\n<p>能够在页面切换时添加过渡动画。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// _app.js</span>\n<span class=\"hljs-keyword\">import</span> { useEffect } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&quot;react&quot;</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">AnimatePresence</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&quot;framer-motion&quot;</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">MyApp</span>(<span class=\"hljs-params\">{ Component, pageProps, router }</span>) {\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">AnimatePresence</span> <span class=\"hljs-attr\">exitBeforeEnter</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Component</span> {<span class=\"hljs-attr\">...pageProps</span>} <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">{router.route}</span> /&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">AnimatePresence</span>&gt;</span></span>\n  );\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> <span class=\"hljs-title class_\">MyApp</span>;\n</code></pre>\n<h3>二、<code>_document.js</code> 的作用</h3>\n<p><code>_document.js</code> 用于自定义应用的 HTML 结构，它会在服务器端渲染时执行，客户端不会对其进行水合操作。主要作用如下：</p>\n<h4>1. 自定义 HTML 标签</h4>\n<p>可以自定义 <code>&lt;html&gt;</code> 和 <code>&lt;body&gt;</code> 标签。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// _document.js</span>\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">Document</span>, { <span class=\"hljs-title class_\">Html</span>, <span class=\"hljs-title class_\">Head</span>, <span class=\"hljs-title class_\">Main</span>, <span class=\"hljs-title class_\">NextScript</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&quot;next/document&quot;</span>;\n\n<span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">MyDocument</span> <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-title class_ inherited__\">Document</span> {\n  <span class=\"hljs-title function_\">render</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">return</span> (\n      <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">&quot;zh-CN&quot;</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Head</span> /&gt;</span>\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span> <span class=\"hljs-attr\">className</span>=<span class=\"hljs-string\">&quot;custom-body&quot;</span>&gt;</span>\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Main</span> /&gt;</span>\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">NextScript</span> /&gt;</span>\n        <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Html</span>&gt;</span></span>\n    );\n  }\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> <span class=\"hljs-title class_\">MyDocument</span>;\n</code></pre>\n<h4>2. 添加自定义元标签</h4>\n<p>能够在 <code>&lt;head&gt;</code> 标签中添加自定义的元标签，如 favicon、SEO 标签等。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// _document.js</span>\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">Document</span>, { <span class=\"hljs-title class_\">Html</span>, <span class=\"hljs-title class_\">Head</span>, <span class=\"hljs-title class_\">Main</span>, <span class=\"hljs-title class_\">NextScript</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&quot;next/document&quot;</span>;\n\n<span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">MyDocument</span> <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-title class_ inherited__\">Document</span> {\n  <span class=\"hljs-title function_\">render</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">return</span> (\n      <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Html</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Head</span>&gt;</span>\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">link</span> <span class=\"hljs-attr\">rel</span>=<span class=\"hljs-string\">&quot;shortcut icon&quot;</span> <span class=\"hljs-attr\">href</span>=<span class=\"hljs-string\">&quot;/favicon.ico&quot;</span> /&gt;</span>\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;theme-color&quot;</span> <span class=\"hljs-attr\">content</span>=<span class=\"hljs-string\">&quot;#123456&quot;</span> /&gt;</span>\n        <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Head</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Main</span> /&gt;</span>\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">NextScript</span> /&gt;</span>\n        <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Html</span>&gt;</span></span>\n    );\n  }\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> <span class=\"hljs-title class_\">MyDocument</span>;\n</code></pre>\n<h4>3. 自定义脚本和样式</h4>\n<p>可以添加全局脚本或者内联样式。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// _document.js</span>\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">Document</span>, { <span class=\"hljs-title class_\">Html</span>, <span class=\"hljs-title class_\">Head</span>, <span class=\"hljs-title class_\">Main</span>, <span class=\"hljs-title class_\">NextScript</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&quot;next/document&quot;</span>;\n\n<span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">MyDocument</span> <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-title class_ inherited__\">Document</span> {\n  <span class=\"hljs-title function_\">render</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">return</span> (\n      <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Html</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Head</span>&gt;</span>\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span> <span class=\"hljs-attr\">src</span>=<span class=\"hljs-string\">&quot;https://cdn.example.com/script.js&quot;</span> /&gt;</span><span class=\"language-handlebars\"><span class=\"language-xml\">\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">style</span> <span class=\"hljs-attr\">jsx</span> <span class=\"hljs-attr\">global</span>&gt;</span><span class=\"language-css\">{`\n            <span class=\"hljs-selector-tag\">body</span> {\n              <span class=\"hljs-attribute\">margin</span>: <span class=\"hljs-number\">0</span>;\n              <span class=\"hljs-attribute\">font-family</span>:\n                -apple-system, BlinkMacSystemFont, <span class=\"hljs-string\">&quot;Segoe UI&quot;</span>, Roboto;\n            }\n          `}</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">style</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Head</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Main</span> /&gt;</span>\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">NextScript</span> /&gt;</span>\n        <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">Html</span>&gt;</span></span></span></span>\n    );\n  }\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> <span class=\"hljs-title class_\">MyDocument</span>;\n</code></pre>\n<h3>三、两者的主要区别</h3>\n<table>\n<thead>\n<tr>\n<th><strong>特性</strong></th>\n<th><strong>_app.js</strong></th>\n<th><strong>_document.js</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>执行位置</strong></td>\n<td>服务端和客户端</td>\n<td>仅服务端</td>\n</tr>\n<tr>\n<td><strong>是否参与水合</strong></td>\n<td>是</td>\n<td>否</td>\n</tr>\n<tr>\n<td><strong>主要用途</strong></td>\n<td>管理全局状态、样式和路由事件</td>\n<td>自定义 HTML 结构和元数据</td>\n</tr>\n<tr>\n<td><strong>常用场景</strong></td>\n<td>Redux 初始化、全局 CSS 引入</td>\n<td>添加自定义 HTML 标签、元标签</td>\n</tr>\n<tr>\n<td><strong>渲染时机</strong></td>\n<td>在页面组件之前</td>\n<td>在应用初始化之前</td>\n</tr>\n</tbody>\n</table>\n<h3>四、注意事项</h3>\n<ol>\n<li><strong>避免在 <code>_document.js</code> 中使用 React 组件</strong>   ：<code>_document.js</code> 运行在服务器端，不能使用需要浏览器环境的 React 特性，如 <code>useState</code>、<code>useEffect</code> 等。</li>\n<li><strong>谨慎修改 <code>_document.js</code></strong>   ：不正确的修改可能会破坏 Next.js 的默认行为，比如影响自动静态优化。</li>\n<li><strong>优先使用 <code>_app.js</code></strong>   ：大多数情况下，应用的自定义需求都可以在 <code>_app.js</code> 中实现，应尽量避免修改 <code>_document.js</code>。</li>\n</ol>\n<p>通过合理使用 <code>_app.js</code> 和 <code>_document.js</code>，你可以更好地控制 Next.js 应用的全局行为和 HTML 结构，从而优化应用的性能和用户体验。</p>\n</div>";
      </script></body></html>
