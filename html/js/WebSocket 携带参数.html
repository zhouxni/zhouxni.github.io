<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="WebSocket 携带参数",document.getElementById("article").innerHTML='<div><p>WebSocket 只能把参数放在「握手阶段」里，没有「请求头」以外的第二个地方可以放数据，所以常见做法只有两类：</p>\n<ol>\n<li>把参数拼在 <strong>URL Query</strong></li>\n<li>把参数塞进 <strong>自定义请求头</strong></li>\n</ol>\n<p>浏览器端代码示例对比一目了然：</p>\n<pre><code class="language-js"><span class="hljs-comment">// 1. Query 参数（所有浏览器都支持）</span>\n<span class="hljs-keyword">const</span> ws1 = <span class="hljs-keyword">new</span> <span class="hljs-title class_">WebSocket</span>(<span class="hljs-string">`wss://example.com/ws?token=abc123&amp;room=42`</span>);\n\n<span class="hljs-comment">// 2. 自定义头参数（仅支持浏览器原生 WebSocket 的 Sec-WebSocket-Protocol 字段；</span>\n<span class="hljs-comment">//    其他字段会被浏览器拒绝，需要借助 Socket.IO、ws 等库或自己实现子协议）</span>\n<span class="hljs-keyword">const</span> ws2 = <span class="hljs-keyword">new</span> <span class="hljs-title class_">WebSocket</span>(\n  <span class="hljs-string">&quot;wss://example.com/ws&quot;</span>,\n  [<span class="hljs-string">&quot;chat&quot;</span>, <span class="hljs-string">&quot;token=abc123&quot;</span>, <span class="hljs-string">&quot;room=42&quot;</span>], <span class="hljs-comment">// 子协议字段</span>\n);\n</code></pre>\n<p>服务端如何取到它们：</p>\n<table>\n<thead>\n<tr>\n<th>语言/库</th>\n<th>取 Query 参数</th>\n<th>取自定义头/子协议</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Node.js (ws)</td>\n<td><code>url.parse(req.url, true).query.token</code></td>\n<td><code>req.headers[\'sec-websocket-protocol\']</code></td>\n</tr>\n<tr>\n<td>Go (gorilla)</td>\n<td><code>r.URL.Query().Get(&quot;token&quot;)</code></td>\n<td><code>r.Header.Get(&quot;Sec-Websocket-Protocol&quot;)</code></td>\n</tr>\n<tr>\n<td>Java (Spring)</td>\n<td><code>@RequestParam String token</code></td>\n<td><code>ServerHttpRequest.getHeaders()</code></td>\n</tr>\n</tbody>\n</table>\n<h3>⚠️ 注意事项</h3>\n<ul>\n<li><strong>大小限制</strong>   ：URL 长度通常 2K~8K，再大就别用 Query 了。</li>\n<li><strong>敏感信息</strong>   ：Token 放 Query 会被日志记录，建议用 HTTPS/WSS 并尽快在服务端把 token 转存到会话上下文。</li>\n<li><strong>浏览器限制</strong>   ：除了 <code>Sec-WebSocket-Protocol</code>，其余自定义头浏览器不会发；若一定要放其他头，需要 Socket.IO 这类库在「握手」后第一条消息里发送。</li>\n</ul>\n<p>一句话总结：<br>\n<strong>浏览器 ⇒ URL Query（最通用）或 Sec-WebSocket-Protocol；</strong><br>\n<strong>非浏览器 ⇒ 可以随便加自定义头。</strong></p>\n</div>'</script></body></html>
