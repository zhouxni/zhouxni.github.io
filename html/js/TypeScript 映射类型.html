<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="TypeScript 映射类型",document.getElementById("article").innerHTML='<div><p>TypeScript 的映射类型（Mapped Types）是一种强大的类型转换工具，它允许你基于已有类型创建新类型，通过遍历已有类型的属性并对每个属性进行转换。</p>\n<h3>映射类型的基本语法</h3>\n<p>映射类型的基本形式如下：</p>\n<pre><code class="language-typescript"><span class="hljs-keyword">type</span> <span class="hljs-title class_">MappedType</span>&lt;T&gt; = {\n  [P <span class="hljs-keyword">in</span> keyof T]: T[P];\n};\n</code></pre>\n<ul>\n<li><code>keyof T</code> 获取类型 <code>T</code> 所有属性名组成的联合类型</li>\n<li><code>P in ...</code> 遍历这个联合类型，<code>P</code> 代表每个属性名</li>\n<li><code>T[P]</code> 获取属性 <code>P</code> 的类型</li>\n</ul>\n<h3>常用映射类型操作</h3>\n<h4>1. 只读映射（Readonly）</h4>\n<p>创建一个所有属性都是只读的新类型：</p>\n<pre><code class="language-typescript"><span class="hljs-keyword">type</span> <span class="hljs-title class_">Readonly</span>&lt;T&gt; = {\n  <span class="hljs-keyword">readonly</span> [P <span class="hljs-keyword">in</span> keyof T]: T[P];\n};\n\n<span class="hljs-comment">// 使用示例</span>\n<span class="hljs-keyword">interface</span> <span class="hljs-title class_">User</span> {\n  <span class="hljs-attr">name</span>: <span class="hljs-built_in">string</span>;\n  <span class="hljs-attr">age</span>: <span class="hljs-built_in">number</span>;\n}\n\n<span class="hljs-keyword">type</span> <span class="hljs-title class_">ReadonlyUser</span> = <span class="hljs-title class_">Readonly</span>&lt;<span class="hljs-title class_">User</span>&gt;;\n<span class="hljs-comment">// 等价于：{ readonly name: string; readonly age: number; }</span>\n</code></pre>\n<h4>2. 可选映射（Partial）</h4>\n<p>创建一个所有属性都是可选的新类型：</p>\n<pre><code class="language-typescript"><span class="hljs-keyword">type</span> <span class="hljs-title class_">Partial</span>&lt;T&gt; = {\n  [P <span class="hljs-keyword">in</span> keyof T]?: T[P];\n};\n\n<span class="hljs-comment">// 使用示例</span>\n<span class="hljs-keyword">type</span> <span class="hljs-title class_">PartialUser</span> = <span class="hljs-title class_">Partial</span>&lt;<span class="hljs-title class_">User</span>&gt;;\n<span class="hljs-comment">// 等价于：{ name?: string; age?: number; }</span>\n</code></pre>\n<h4>3. 选取部分属性（Pick）</h4>\n<p>从类型中选取指定的属性：</p>\n<pre><code class="language-typescript"><span class="hljs-keyword">type</span> <span class="hljs-title class_">Pick</span>&lt;T, K <span class="hljs-keyword">extends</span> keyof T&gt; = {\n  [P <span class="hljs-keyword">in</span> K]: T[P];\n};\n\n<span class="hljs-comment">// 使用示例</span>\n<span class="hljs-keyword">type</span> <span class="hljs-title class_">UserName</span> = <span class="hljs-title class_">Pick</span>&lt;<span class="hljs-title class_">User</span>, <span class="hljs-string">&quot;name&quot;</span>&gt;;\n<span class="hljs-comment">// 等价于：{ name: string; }</span>\n</code></pre>\n<h4>4. 排除部分属性（Omit）</h4>\n<p>从类型中排除指定的属性：</p>\n<pre><code class="language-typescript"><span class="hljs-keyword">type</span> <span class="hljs-title class_">Omit</span>&lt;T, K <span class="hljs-keyword">extends</span> keyof <span class="hljs-built_in">any</span>&gt; = <span class="hljs-title class_">Pick</span>&lt;T, <span class="hljs-title class_">Exclude</span>&lt;keyof T, K&gt;&gt;;\n\n<span class="hljs-comment">// 使用示例</span>\n<span class="hljs-keyword">type</span> <span class="hljs-title class_">UserAge</span> = <span class="hljs-title class_">Omit</span>&lt;<span class="hljs-title class_">User</span>, <span class="hljs-string">&quot;name&quot;</span>&gt;;\n<span class="hljs-comment">// 等价于：{ age: number; }</span>\n</code></pre>\n<h4>5. 条件类型映射</h4>\n<p>结合条件类型进行更复杂的映射：</p>\n<pre><code class="language-typescript"><span class="hljs-keyword">type</span> <span class="hljs-title class_">Nullable</span>&lt;T&gt; = {\n  [P <span class="hljs-keyword">in</span> keyof T]: T[P] | <span class="hljs-literal">null</span>;\n};\n\n<span class="hljs-comment">// 使用示例</span>\n<span class="hljs-keyword">type</span> <span class="hljs-title class_">NullableUser</span> = <span class="hljs-title class_">Nullable</span>&lt;<span class="hljs-title class_">User</span>&gt;;\n<span class="hljs-comment">// 等价于：{ name: string | null; age: number | null; }</span>\n</code></pre>\n<h4>6. 键名重映射（Key Remapping）</h4>\n<p>TypeScript 4.1 引入了键名重映射，可以修改属性名：</p>\n<pre><code class="language-typescript"><span class="hljs-keyword">type</span> <span class="hljs-title class_">MapToGetters</span>&lt;T&gt; = {\n  [P <span class="hljs-keyword">in</span> keyof T <span class="hljs-keyword">as</span> <span class="hljs-string">`get<span class="hljs-subst">${Capitalize&lt;<span class="hljs-built_in">string</span> &amp; P&gt;}</span>`</span>]: <span class="hljs-function">() =&gt;</span> T[P];\n};\n\n<span class="hljs-comment">// 使用示例</span>\n<span class="hljs-keyword">type</span> <span class="hljs-title class_">UserGetters</span> = <span class="hljs-title class_">MapToGetters</span>&lt;<span class="hljs-title class_">User</span>&gt;;\n<span class="hljs-comment">// 等价于：{ getName: () =&gt; string; getAge: () =&gt; number; }</span>\n</code></pre>\n<p>当在键名重映射中返回 never 时，该属性会被从结果类型中移除：</p>\n<pre><code class="language-typescript"><span class="hljs-keyword">type</span> <span class="hljs-title class_">FilterKeys</span>&lt;T, <span class="hljs-title class_">Condition</span>&gt; = {\n  [P <span class="hljs-keyword">in</span> keyof T <span class="hljs-keyword">as</span> T[P] <span class="hljs-keyword">extends</span> <span class="hljs-title class_">Condition</span> ? P : <span class="hljs-built_in">never</span>]: T[P];\n};\n\n<span class="hljs-comment">// 示例：过滤出类型为 string 的属性</span>\n<span class="hljs-keyword">interface</span> <span class="hljs-title class_">Example</span> {\n  <span class="hljs-attr">name</span>: <span class="hljs-built_in">string</span>;\n  <span class="hljs-attr">age</span>: <span class="hljs-built_in">number</span>;\n  <span class="hljs-attr">email</span>: <span class="hljs-built_in">string</span>;\n  <span class="hljs-attr">active</span>: <span class="hljs-built_in">boolean</span>;\n}\n\n<span class="hljs-comment">// 只保留 string 类型的属性</span>\n<span class="hljs-keyword">type</span> <span class="hljs-title class_">StringProperties</span> = <span class="hljs-title class_">FilterKeys</span>&lt;<span class="hljs-title class_">Example</span>, <span class="hljs-built_in">string</span>&gt;;\n<span class="hljs-comment">// 结果：{ name: string; email: string; }</span>\n</code></pre>\n<h3>映射类型的应用场景</h3>\n<ol>\n<li><strong>类型转换</strong>   ：快速创建与原始类型相关但有细微差别的类型</li>\n<li><strong>工具类型</strong>   ：实现如 <code>Partial</code>、<code>Readonly</code> 等通用工具类型</li>\n<li><strong>属性修饰</strong>   ：批量修改属性的只读性、可选性或类型</li>\n<li><strong>API 适配</strong>   ：将一种数据结构转换为另一种适配不同 API 的结构</li>\n</ol>\n<h3>注意事项</h3>\n<ul>\n<li>映射类型是<strong>同态</strong>   的，它会保留原始类型的结构信息</li>\n<li>可以通过 <code>+</code> 或 <code>-</code> 显式添加或移除 <code>readonly</code> 和 <code>?</code> 修饰符：<pre><code class="language-typescript"><span class="hljs-keyword">type</span> <span class="hljs-title class_">MyType</span>&lt;T&gt; = {\n  -<span class="hljs-keyword">readonly</span> [P <span class="hljs-keyword">in</span> keyof T]-?: T[P];\n};\n</code></pre>\n</li>\n<li>结合 <code>infer</code> 关键字可以实现更复杂的类型提取和转换</li>\n</ul>\n<p>映射类型是 TypeScript 类型系统中非常强大的特性，熟练掌握可以极大提升类型定义的灵活性和可维护性。</p>\n</div>'</script></body></html>
