<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = '微信小程序 EventChannel'
        document.getElementById('article').innerHTML = 
        "<div><p><strong>微信小程序中的 EventChannel 是一种用于页面间通信的机制，尤其适用于数据量较大时的场景。</strong></p>\n<h3><strong>EventChannel 的特点</strong></h3>\n<ol>\n<li><strong>高效通信</strong>  ：EventChannel 允许在两个页面之间建立一个直接的数据通道，避免了通过全局变量或本地存储等方式进行通信的性能开销。</li>\n<li><strong>双向通信</strong>  ：EventChannel 支持页面之间的双向通信，即父页面可以向子页面发送消息，子页面也可以向父页面发送消息。</li>\n<li><strong>事件驱动</strong>  ：通过 &quot;派发事件&quot; 及 &quot;注册这些事件的监听器&quot; 来实现基于事件的页面通信。</li>\n</ol>\n<h3><strong>EventChannel 的使用方法</strong></h3>\n<ol>\n<li><strong>创建数据通道</strong>  ：当一个页面通过 <code>wx.navigateTo</code> 方法打开另一个页面时，这两个页面之间就会建立一条 EventChannel 数据通道。</li>\n<li><strong>获取 EventChannel 对象</strong>  ：\n<ul>\n<li>被打开的页面可以通过 <code>this.getOpenerEventChannel()</code> 方法获得一个 EventChannel 对象。</li>\n<li>在 <code>wx.navigateTo</code> 的 <code>success</code> 回调中也包含一个 EventChannel 对象。</li>\n</ul>\n</li>\n<li><strong>发送和监听事件</strong>  ：\n<ul>\n<li>使用 <code>emit</code> 方法发送事件，并可以携带数据。</li>\n<li>使用 <code>on</code> 方法监听事件，并在事件触发时执行相应的处理函数。</li>\n</ul>\n</li>\n</ol>\n<h3><strong>示例代码</strong></h3>\n<p><strong>父页面（A 页面）</strong>  ：</p>\n<pre><code class=\"language-javascript\">wx.<span class=\"hljs-title function_\">navigateTo</span>({\n  <span class=\"hljs-attr\">url</span>: <span class=\"hljs-string\">&#x27;/pages/child/child&#x27;</span>,\n  <span class=\"hljs-attr\">events</span>: {\n    <span class=\"hljs-comment\">// 监听子页面发送过来的事件</span>\n    <span class=\"hljs-attr\">messageFromChild</span>: <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">data</span>) {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;收到子页面的消息:&#x27;</span>, data);\n    }\n  },\n  <span class=\"hljs-attr\">success</span>: <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">res</span>) {\n    <span class=\"hljs-comment\">// 保存 EventChannel 对象</span>\n    <span class=\"hljs-keyword\">var</span> channel = res.<span class=\"hljs-property\">eventChannel</span>;\n    <span class=\"hljs-comment\">// 向子页面发送事件和数据</span>\n    channel.<span class=\"hljs-title function_\">emit</span>(<span class=\"hljs-string\">&#x27;messageFromParent&#x27;</span>, { <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">&#x27;这是父页面的消息&#x27;</span> });\n  }\n});\n</code></pre>\n<p><strong>子页面（B 页面）</strong>  ：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-title class_\">Page</span>({\n  <span class=\"hljs-attr\">onLoad</span>: <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">options</span>) {\n    <span class=\"hljs-keyword\">const</span> eventChannel = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-title function_\">getOpenerEventChannel</span>();\n    <span class=\"hljs-comment\">// 向父页面发送事件和数据</span>\n    eventChannel.<span class=\"hljs-title function_\">emit</span>(<span class=\"hljs-string\">&#x27;messageFromChild&#x27;</span>, { <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">&#x27;这是子页面的消息&#x27;</span> });\n    <span class=\"hljs-comment\">// 监听父页面发送过来的事件</span>\n    eventChannel.<span class=\"hljs-title function_\">on</span>(<span class=\"hljs-string\">&#x27;messageFromParent&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">data</span>) {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;收到父页面的消息:&#x27;</span>, data);\n    });\n  }\n});\n</code></pre>\n<h3><strong>EventChannel 的优势</strong></h3>\n<ul>\n<li><strong>支持复杂数据类型</strong>  ：可以直接传递对象、数组等复杂数据类型，无需担心 URL 长度限制或特殊字符的编码问题。</li>\n<li><strong>代码简洁</strong>  ：通过事件机制实现页面通信，代码逻辑清晰，易于维护。</li>\n<li><strong>实时通信</strong>  ：适合需要频繁交互或实时更新数据的场景。</li>\n</ul>\n<h3><strong>注意事项</strong></h3>\n<ul>\n<li><strong>事件名称唯一性</strong>  ：为了避免事件冲突，应确保事件名称在页面间是唯一的。</li>\n<li><strong>生命周期管理</strong>  ：EventChannel 的生命周期与页面绑定，当页面销毁时，EventChannel 也会自动关闭。因此，无需手动管理其生命周期。</li>\n<li><strong>性能优化</strong>  ：虽然 EventChannel 适用于大数据量传输，但在实际使用中仍需注意性能优化，避免频繁创建和销毁 EventChannel 对象。</li>\n</ul>\n</div>";</script></body></html>
