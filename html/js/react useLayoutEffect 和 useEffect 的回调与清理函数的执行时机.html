    <article id="article" class="markdown-body"></article>
  

<script>
            document.getElementById('article').innerHTML = 
            "<div><p>在 React 的 commit 阶段中，<code>useLayoutEffect</code> 和 <code>useEffect</code> 的回调与清理函数的执行时机<strong>完全不同</strong>   ，具体如下：</p>\n<h3><strong>1. <code>useLayoutEffect</code></strong></h3>\n<ul>\n<li><strong>回调函数</strong>   ：组件加载和依赖项变化时在 <strong>Layout 阶段同步执行</strong>   （DOM 变更后、浏览器绘制前）。</li>\n<li><strong>清理函数</strong>   ：组件卸载和依赖项变化时时在 <strong>Mutation 阶段同步执行</strong>   （先于新的 <code>useLayoutEffect</code> 回调）；。</li>\n</ul>\n<h3><strong>2. <code>useEffect</code></strong></h3>\n<ul>\n<li><strong>回调函数</strong>   ：组件加载和依赖项变化时在 <strong>Layout 阶段完成后异步执行</strong>   （浏览器绘制后，通过 <code>requestIdleCallback</code> 或 <code>Promise.then</code> 调度）；</li>\n<li><strong>清理函数</strong>   ：组件加载和依赖项变化时在 <strong>Layout 阶段完成后异步执行</strong>   （但在浏览器下次绘制前完成）。</li>\n</ul>\n<pre><code class=\"language-javascript\">commitBeforeMutationEffects start\ncommitBeforeMutationEffects end\ncommitMutationEffects start\ncount 同步变化 --清理\ncommitMutationEffects end\ncommitLayoutEffects start\ncount 同步变化\ncommitLayoutEffects end\ncount 变化 --清理\ncount 变化\n</code></pre>\n</div>";
          </script></body></html>
