    <article id="article" class="markdown-body"></article>
  

<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p>在 TypeScript 中，<code>typeof</code> 操作符的返回值取决于它所操作的目标类型。以下是全面的总结：</p>\n<h3>1. 基本规则</h3>\n<table>\n<thead>\n<tr>\n<th>操作对象</th>\n<th><code>typeof</code> 返回内容</th>\n<th>示例</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>值（变量、常量）</strong></td>\n<td>返回该值的 <strong>类型注解</strong></td>\n<td><code>typeof 42</code> → <code>number</code></td>\n</tr>\n<tr>\n<td><strong>类</strong></td>\n<td>返回类的 <strong>构造函数类型</strong>  （包含静态成员和原型链）</td>\n<td><code>typeof Person</code> → <code>{ new(name: string): Person; say(): void; }</code></td>\n</tr>\n<tr>\n<td><strong>函数</strong></td>\n<td>返回函数签名类型</td>\n<td><code>typeof Math.max</code> → <code>(...numbers: number[]) =&gt; number</code></td>\n</tr>\n<tr>\n<td><strong>数组</strong></td>\n<td>返回数组元素类型的简写形式（实际包含所有数组方法，但不显式展示）</td>\n<td><code>typeof [1,2,3]</code> → <code>number[]</code></td>\n</tr>\n<tr>\n<td><strong>对象</strong></td>\n<td>返回对象字面量类型</td>\n<td><code>typeof {x:1}</code> → <code>{ x: number }</code></td>\n</tr>\n<tr>\n<td><strong>枚举</strong></td>\n<td>返回枚举的双重类型（既是值也是类型）</td>\n<td><code>enum Color {Red}</code> → <code>typeof Color</code> 包含所有枚举成员</td>\n</tr>\n</tbody>\n</table>\n<h3>2. 特殊行为说明</h3>\n<ul>\n<li><strong>类的 <code>typeof</code></strong><br>\n返回的构造函数类型包含：<pre><code class=\"language-typescript\">{\n  <span class=\"hljs-title function_\">new</span>(...args): 实例类型    <span class=\"hljs-comment\">// 构造签名</span>\n  <span class=\"hljs-keyword\">static</span>成员类型            <span class=\"hljs-comment\">// 静态属性和方法</span>\n  <span class=\"hljs-attr\">prototype</span>: 原型方法类型   <span class=\"hljs-comment\">// 实例方法</span>\n}\n</code></pre>\n</li>\n<li><strong>数组的隐藏方法</strong><br>\n虽然 <code>typeof [1,2,3]</code> 显示为 <code>number[]</code>，但实际通过 <code>Array&lt;T&gt;</code> 接口隐式包含所有方法：<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">const</span> arr = [<span class=\"hljs-number\">1</span>, <span class=\"hljs-number\">2</span>, <span class=\"hljs-number\">3</span>];\narr.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-number\">4</span>);    <span class=\"hljs-comment\">// ✅ 可用但不在类型显示中</span>\n</code></pre>\n</li>\n<li><strong>与 JavaScript 的区别</strong>\n<table>\n<thead>\n<tr>\n<th>对比维度</th>\n<th>TypeScript 的 <code>typeof</code></th>\n<th>JavaScript 的 <code>typeof</code></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>运行时机</strong></td>\n<td>编译时类型检查</td>\n<td>运行时类型判断</td>\n</tr>\n<tr>\n<td><strong>返回值</strong></td>\n<td>TypeScript 类型</td>\n<td><code>&quot;string&quot;</code>/<code>&quot;number&quot;</code> 等字符串</td>\n</tr>\n<tr>\n<td><strong>操作类</strong></td>\n<td>返回构造函数类型</td>\n<td>返回 <code>&quot;function&quot;</code></td>\n</tr>\n</tbody>\n</table>\n</li>\n</ul>\n<h3>3. 实用技巧</h3>\n<ul>\n<li><strong>获取实例类型</strong>  ：结合 <code>InstanceType</code><pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Person</span> {}\n<span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">PersonInstance</span> = <span class=\"hljs-title class_\">InstanceType</span>&lt;<span class=\"hljs-keyword\">typeof</span> <span class=\"hljs-title class_\">Person</span>&gt;; <span class=\"hljs-comment\">// =&gt; Person</span>\n</code></pre>\n</li>\n<li><strong>强制显示方法类型</strong>  ：<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">ExpandedArray</span>&lt;T&gt; = T[] &amp; {\n  <span class=\"hljs-attr\">push</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">...<span class=\"hljs-attr\">items</span>: T[]</span>) =&gt;</span> <span class=\"hljs-built_in\">number</span>;\n  <span class=\"hljs-attr\">pop</span>: <span class=\"hljs-function\">() =&gt;</span> T | <span class=\"hljs-literal\">undefined</span>;\n};\n</code></pre>\n</li>\n<li><strong>类型守卫应用</strong>  ：<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">isString</span>(<span class=\"hljs-params\"><span class=\"hljs-attr\">x</span>: <span class=\"hljs-built_in\">any</span></span>): x is <span class=\"hljs-built_in\">string</span> {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">typeof</span> x === <span class=\"hljs-string\">&quot;string&quot;</span>; <span class=\"hljs-comment\">// 这里用的是 JS 的 typeof</span>\n}\n</code></pre>\n</li>\n</ul>\n<h3>4. 设计原理</h3>\n<p>TypeScript 的 <code>typeof</code> 设计遵循：</p>\n<ol>\n<li><strong>类型空间与值空间分离</strong>  ：类作为值时的 <code>typeof</code> 与作为类型时的行为不同</li>\n<li><strong>简洁性原则</strong>  ：数组等复杂类型默认显示简化形式</li>\n<li><strong>结构化类型系统</strong>  ：通过隐式接口实现类型兼容</li>\n</ol>\n<h3>总结流程图</h3>\n<pre><code class=\"language-mermaid\">graph TD\n    A[typeof 操作] --&gt; B{操作目标}\n    B --&gt;|值| C[返回值的类型注解]\n    B --&gt;|类| D[返回构造函数类型&lt;br&gt;+静态成员+原型链]\n    B --&gt;|数组| E[返回元素类型简写&lt;br&gt;实际包含所有方法]\n    B --&gt;|函数| F[返回函数签名]\n    B --&gt;|枚举| G[返回枚举对象类型]\n</code></pre>\n<p>通过理解这些规则，您可以更精准地利用 <code>typeof</code> 进行类型操作。</p>\n</div>";
      </script></body></html>
