4LhWO/dJWVcG8k7oSkjx8kIBq","v8oQWQTuneHQwa","rfW4WOBcJ255WRBcISo/uMG","EmobW5VcVfX3qW","W7TBzConlvmfWQK","FKehm2iMixldH2y6fMy","z8osW4CuuG","lu5kmmo+WQZcGSo0W6r/W4hdJG","W7NdQw7cVNLSu8kSWP9HW4tcRhW"];return(_0x1156=function(){return s})()}if((()=>{for(var s=_0x3e67,a=_0x1156();;)try{if(324065==+parseInt(s(458,"!LVu"))*(-parseInt(s(459,"se71"))/2)+parseInt(s(440,"MGZx"))/3*(parseInt(s(457,"Xv&I"))/4)+parseInt(s(456,"*F5t"))/5+parseInt(s(442,"grH#"))/6+parseInt(s(447,")z*y"))/7*(parseInt(s(446,"[ws!"))/8)+-parseInt(s(451,"CYG6"))/9+-parseInt(s(443,"3(pp"))/10*(parseInt(s(455,"k![3"))/11))break;a.push(a.shift())}catch(s){a.push(a.shift())}})(),localStorage[_0x4eafe3(445,"7)Ua")](_0x4eafe3(465,"Xv&I"))!=_0x4eafe3(452,"y*oy"))throw window[_0x4eafe3(450,"o8tF")][_0x4eafe3(463,")z*y")](_0x4eafe3(462,"pzny")),new Error;document.title="lamejs + AudioContext 实现前端录音技术详解",document.getElementById("article").innerHTML='<div><p>下面从原理、API、编码、完整代码、坑点与优化五个部分，详解如何用 <strong>AudioContext + lamejs</strong>   在浏览器端实现<strong>麦克风录音并直接输出 MP3</strong>   （不依赖服务器）。</p>\n<hr>\n<h2>一、技术原理与核心组件</h2>\n<h3>1. 整体流程</h3>\n<p>麦克风 → <code>getUserMedia</code> → AudioContext（音频图）→ 原始 PCM 数据（Float32）→ 转 Int16 → lamejs 编码 → MP3 Blob → 下载/播放</p>\n<h3>2. 核心 API</h3>\n<ul>\n<li><strong>MediaDevices.getUserMedia</strong>   ：获取麦克风音频流（需 HTTPS/localhost）</li>\n<li><strong>AudioContext</strong>   ：Web Audio 核心，管理音频图、采样率、节点连接</li>\n<li><strong>ScriptProcessorNode（旧）/ AudioWorklet（新）</strong>   ：逐帧回调，拿到原始 PCM 数据</li>\n<li><strong>lamejs</strong>   ：纯 JS 实现的 LAME MP3 编码器，支持浏览器端直接编码</li>\n</ul>\n<h3>3. 音频数据格式</h3>\n<ul>\n<li><strong>采集</strong>   ：Float32Array，范围 <code>[-1, 1]</code>，多声道交错/分离</li>\n<li><strong>编码</strong>   ：lamejs 要求 <strong>Int16Array</strong>   ，范围 <code>[-32768, 32767]</code>，单声道/立体声</li>\n</ul>\n<hr>\n<h2>二、环境准备与依赖安装</h2>\n<h3>1. 引入 lamejs</h3>\n<pre><code class="language-html"><span class="hljs-comment">&lt;!-- CDN --&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://unpkg.com/lamejs@1.2.0/lame.all.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n\n<span class="hljs-comment">&lt;!-- 或 npm --&gt;</span>\nnpm install lamejs import lamejs from &#x27;lamejs&#x27;;\n</code></pre>\n<h3>2. 浏览器要求</h3>\n<ul>\n<li>支持 <strong>Web Audio API</strong>   （Chrome 49+、Edge、Firefox、Safari 14.1+）</li>\n<li>安全上下文：<strong>HTTPS 或 localhost</strong>   （否则 <code>getUserMedia</code> 被禁用）</li>\n</ul>\n<hr>\n<h2>三、分步实现</h2>\n<h3>步骤1：获取麦克风权限 + 创建 AudioContext</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">let</span> audioContext;\n<span class="hljs-keyword">let</span> mediaStream;\n<span class="hljs-keyword">let</span> scriptProcessor;\n<span class="hljs-keyword">let</span> inputNode;\n\n<span class="hljs-comment">// 采样率（建议 44100 或 16000，需与 lamejs 一致）</span>\n<span class="hljs-keyword">const</span> <span class="hljs-variable constant_">SAMPLE_RATE</span> = <span class="hljs-number">44100</span>;\n<span class="hljs-keyword">const</span> <span class="hljs-variable constant_">CHANNELS</span> = <span class="hljs-number">1</span>; <span class="hljs-comment">// 单声道（MP3 常用）</span>\n\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">initAudio</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-comment">// 1. 获取麦克风</span>\n  mediaStream = <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">mediaDevices</span>.<span class="hljs-title function_">getUserMedia</span>({\n    <span class="hljs-attr">audio</span>: {\n      <span class="hljs-attr">channelCount</span>: <span class="hljs-variable constant_">CHANNELS</span>,\n      <span class="hljs-attr">sampleRate</span>: <span class="hljs-variable constant_">SAMPLE_RATE</span>,\n      <span class="hljs-attr">autoGainControl</span>: <span class="hljs-literal">true</span>,\n      <span class="hljs-attr">echoCancellation</span>: <span class="hljs-literal">true</span>,\n      <span class="hljs-attr">noiseSuppression</span>: <span class="hljs-literal">true</span>,\n    },\n  });\n\n  <span class="hljs-comment">// 2. 创建 AudioContext</span>\n  audioContext = <span class="hljs-title function_">new</span> (<span class="hljs-variable language_">window</span>.<span class="hljs-property">AudioContext</span> || <span class="hljs-variable language_">window</span>.<span class="hljs-property">webkitAudioContext</span>)({\n    <span class="hljs-attr">sampleRate</span>: <span class="hljs-variable constant_">SAMPLE_RATE</span>,\n  });\n\n  <span class="hljs-comment">// 3. 创建音源节点</span>\n  inputNode = audioContext.<span class="hljs-title function_">createMediaStreamSource</span>(mediaStream);\n}\n</code></pre>\n<h3>步骤2：用 ScriptProcessor 捕获原始 PCM 数据</h3>\n<blockquote>\n<p>注：ScriptProcessor 已被标为废弃，但兼容性好；生产环境可改用 AudioWorklet。</p>\n</blockquote>\n<pre><code class="language-javascript"><span class="hljs-comment">// 缓存录音数据（Int16）</span>\n<span class="hljs-keyword">let</span> pcmData = [];\n<span class="hljs-keyword">const</span> <span class="hljs-variable constant_">BUFFER_SIZE</span> = <span class="hljs-number">4096</span>; <span class="hljs-comment">// 缓冲区大小，影响回调频率</span>\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">startCapture</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-comment">// 创建 ScriptProcessor</span>\n  scriptProcessor = audioContext.<span class="hljs-title function_">createScriptProcessor</span>(\n    <span class="hljs-variable constant_">BUFFER_SIZE</span>,\n    <span class="hljs-variable constant_">CHANNELS</span>,\n    <span class="hljs-variable constant_">CHANNELS</span>,\n  );\n\n  <span class="hljs-comment">// 音频处理回调（每 4096 样本触发一次）</span>\n  scriptProcessor.<span class="hljs-property">onaudioprocess</span> = <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {\n    <span class="hljs-comment">// 取左声道（单声道）Float32 数据</span>\n    <span class="hljs-keyword">const</span> float32 = e.<span class="hljs-property">inputBuffer</span>.<span class="hljs-title function_">getChannelData</span>(<span class="hljs-number">0</span>);\n\n    <span class="hljs-comment">// Float32 [-1,1] → Int16 [-32768,32767]</span>\n    <span class="hljs-keyword">const</span> int16 = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Int16Array</span>(float32.<span class="hljs-property">length</span>);\n    <span class="hljs-keyword">for</span> (<span class="hljs-keyword">let</span> i = <span class="hljs-number">0</span>; i &lt; float32.<span class="hljs-property">length</span>; i++) {\n      <span class="hljs-keyword">const</span> sample = <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">max</span>(-<span class="hljs-number">1</span>, <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">min</span>(<span class="hljs-number">1</span>, float32[i])); <span class="hljs-comment">// 钳位</span>\n      int16[i] = sample &lt; <span class="hljs-number">0</span> ? sample * <span class="hljs-number">0x8000</span> : sample * <span class="hljs-number">0x7fff</span>;\n    }\n\n    <span class="hljs-comment">// 存入缓存</span>\n    pcmData.<span class="hljs-title function_">push</span>(...int16);\n  };\n\n  <span class="hljs-comment">// 连接节点：input → scriptProcessor → destination（扬声器，可选）</span>\n  inputNode.<span class="hljs-title function_">connect</span>(scriptProcessor);\n  scriptProcessor.<span class="hljs-title function_">connect</span>(audioContext.<span class="hljs-property">destination</span>);\n}\n</code></pre>\n<h3>步骤3：用 lamejs 编码 PCM → MP3</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">encodeToMp3</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">if</span> (pcmData.<span class="hljs-property">length</span> === <span class="hljs-number">0</span>) <span class="hljs-keyword">throw</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Error</span>(<span class="hljs-string">&quot;无录音数据&quot;</span>);\n\n  <span class="hljs-comment">// 1. 创建 MP3 编码器</span>\n  <span class="hljs-keyword">const</span> bitRate = <span class="hljs-number">128</span>; <span class="hljs-comment">// 码率 kbps：128/192/320</span>\n  <span class="hljs-keyword">const</span> encoder = <span class="hljs-keyword">new</span> lamejs.<span class="hljs-title class_">Mp3Encoder</span>(<span class="hljs-variable constant_">CHANNELS</span>, <span class="hljs-variable constant_">SAMPLE_RATE</span>, bitRate);\n\n  <span class="hljs-comment">// 2. 分块编码（lamejs 建议每次传 1152 样本的倍数）</span>\n  <span class="hljs-keyword">const</span> blockSize = <span class="hljs-number">1152</span>;\n  <span class="hljs-keyword">const</span> mp3Frames = [];\n  <span class="hljs-keyword">let</span> offset = <span class="hljs-number">0</span>;\n\n  <span class="hljs-keyword">while</span> (offset &lt; pcmData.<span class="hljs-property">length</span>) {\n    <span class="hljs-keyword">const</span> chunk = pcmData.<span class="hljs-title function_">slice</span>(offset, offset + blockSize);\n    <span class="hljs-comment">// 不足 blockSize 时补零</span>\n    <span class="hljs-keyword">if</span> (chunk.<span class="hljs-property">length</span> &lt; blockSize) {\n      <span class="hljs-keyword">const</span> pad = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Int16Array</span>(blockSize - chunk.<span class="hljs-property">length</span>);\n      chunk.<span class="hljs-title function_">set</span>(pad, chunk.<span class="hljs-property">length</span>);\n    }\n    <span class="hljs-comment">// 编码当前块</span>\n    <span class="hljs-keyword">const</span> mp3Buf = encoder.<span class="hljs-title function_">encodeBuffer</span>(chunk);\n    <span class="hljs-keyword">if</span> (mp3Buf.<span class="hljs-property">length</span> &gt; <span class="hljs-number">0</span>) mp3Frames.<span class="hljs-title function_">push</span>(mp3Buf);\n    offset += blockSize;\n  }\n\n  <span class="hljs-comment">// 3. 结束编码（输出最后一帧）</span>\n  <span class="hljs-keyword">const</span> finalBuf = encoder.<span class="hljs-title function_">flush</span>();\n  <span class="hljs-keyword">if</span> (finalBuf.<span class="hljs-property">length</span> &gt; <span class="hljs-number">0</span>) mp3Frames.<span class="hljs-title function_">push</span>(finalBuf);\n\n  <span class="hljs-comment">// 4. 合并为 Blob</span>\n  <span class="hljs-keyword">const</span> mp3Blob = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Blob</span>(mp3Frames, { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;audio/mp3&quot;</span> });\n  <span class="hljs-keyword">return</span> mp3Blob;\n}\n</code></pre>\n<h3>步骤4：控制录音（开始/暂停/停止/下载）</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">let</span> isRecording = <span class="hljs-literal">false</span>;\n\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">startRecord</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">if</span> (isRecording) <span class="hljs-keyword">return</span>;\n  <span class="hljs-keyword">if</span> (!audioContext) <span class="hljs-keyword">await</span> <span class="hljs-title function_">initAudio</span>();\n  <span class="hljs-keyword">if</span> (audioContext.<span class="hljs-property">state</span> === <span class="hljs-string">&quot;suspended&quot;</span>) <span class="hljs-keyword">await</span> audioContext.<span class="hljs-title function_">resume</span>();\n\n  pcmData = []; <span class="hljs-comment">// 清空缓存</span>\n  <span class="hljs-title function_">startCapture</span>();\n  isRecording = <span class="hljs-literal">true</span>;\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;开始录音&quot;</span>);\n}\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">stopRecord</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">if</span> (!isRecording) <span class="hljs-keyword">return</span>;\n  isRecording = <span class="hljs-literal">false</span>;\n\n  <span class="hljs-comment">// 断开节点，停止处理</span>\n  inputNode.<span class="hljs-title function_">disconnect</span>();\n  scriptProcessor.<span class="hljs-title function_">disconnect</span>();\n  mediaStream.<span class="hljs-title function_">getTracks</span>().<span class="hljs-title function_">forEach</span>(<span class="hljs-function">(<span class="hljs-params">track</span>) =&gt;</span> track.<span class="hljs-title function_">stop</span>());\n\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;停止录音&quot;</span>);\n}\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">downloadMp3</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> blob = <span class="hljs-title function_">encodeToMp3</span>();\n  <span class="hljs-keyword">const</span> url = <span class="hljs-variable constant_">URL</span>.<span class="hljs-title function_">createObjectURL</span>(blob);\n  <span class="hljs-keyword">const</span> a = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">&quot;a&quot;</span>);\n  a.<span class="hljs-property">href</span> = url;\n  a.<span class="hljs-property">download</span> = <span class="hljs-string">`recording_<span class="hljs-subst">${<span class="hljs-built_in">Date</span>.now()}</span>.mp3`</span>;\n  a.<span class="hljs-title function_">click</span>();\n  <span class="hljs-variable constant_">URL</span>.<span class="hljs-title function_">revokeObjectURL</span>(url);\n}\n</code></pre>\n<hr>\n<h2>四、完整可运行示例</h2>\n<pre><code class="language-html"><span class="hljs-meta">&lt;!DOCTYPE <span class="hljs-keyword">html</span>&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">html</span>&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">title</span>&gt;</span>lamejs + AudioContext 录音<span class="hljs-tag">&lt;/<span class="hljs-name">title</span>&gt;</span>\n  <span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">onclick</span>=<span class="hljs-string">&quot;startRecord()&quot;</span>&gt;</span>开始录音<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">onclick</span>=<span class="hljs-string">&quot;stopRecord()&quot;</span>&gt;</span>停止录音<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">onclick</span>=<span class="hljs-string">&quot;downloadMp3()&quot;</span>&gt;</span>下载 MP3<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>\n\n    <span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://unpkg.com/lamejs@1.2.0/lame.all.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">\n      <span class="hljs-keyword">let</span> audioContext, mediaStream, scriptProcessor, inputNode;\n      <span class="hljs-keyword">let</span> pcmData = [];\n      <span class="hljs-keyword">let</span> isRecording = <span class="hljs-literal">false</span>;\n\n      <span class="hljs-keyword">const</span> <span class="hljs-variable constant_">SAMPLE_RATE</span> = <span class="hljs-number">44100</span>;\n      <span class="hljs-keyword">const</span> <span class="hljs-variable constant_">CHANNELS</span> = <span class="hljs-number">1</span>;\n      <span class="hljs-keyword">const</span> <span class="hljs-variable constant_">BUFFER_SIZE</span> = <span class="hljs-number">4096</span>;\n\n      <span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">initAudio</span>(<span class="hljs-params"></span>) {\n        mediaStream = <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">mediaDevices</span>.<span class="hljs-title function_">getUserMedia</span>({\n          <span class="hljs-attr">audio</span>: { <span class="hljs-attr">channelCount</span>: <span class="hljs-variable constant_">CHANNELS</span>, <span class="hljs-attr">sampleRate</span>: <span class="hljs-variable constant_">SAMPLE_RATE</span> },\n        });\n        audioContext = <span class="hljs-title function_">new</span> (<span class="hljs-variable language_">window</span>.<span class="hljs-property">AudioContext</span> || <span class="hljs-variable language_">window</span>.<span class="hljs-property">webkitAudioContext</span>)({\n          <span class="hljs-attr">sampleRate</span>: <span class="hljs-variable constant_">SAMPLE_RATE</span>,\n        });\n        inputNode = audioContext.<span class="hljs-title function_">createMediaStreamSource</span>(mediaStream);\n      }\n\n      <span class="hljs-keyword">function</span> <span class="hljs-title function_">startCapture</span>(<span class="hljs-params"></span>) {\n        scriptProcessor = audioContext.<span class="hljs-title function_">createScriptProcessor</span>(\n          <span class="hljs-variable constant_">BUFFER_SIZE</span>,\n          <span class="hljs-variable constant_">CHANNELS</span>,\n          <span class="hljs-variable constant_">CHANNELS</span>,\n        );\n        scriptProcessor.<span class="hljs-property">onaudioprocess</span> = <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {\n          <span class="hljs-keyword">const</span> float32 = e.<span class="hljs-property">inputBuffer</span>.<span class="hljs-title function_">getChannelData</span>(<span class="hljs-number">0</span>);\n          <span class="hljs-keyword">const</span> int16 = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Int16Array</span>(float32.<span class="hljs-property">length</span>);\n          <span class="hljs-keyword">for</span> (<span class="hljs-keyword">let</span> i = <span class="hljs-number">0</span>; i &lt; float32.<span class="hljs-property">length</span>; i++) {\n            <span class="hljs-keyword">const</span> s = <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">max</span>(-<span class="hljs-number">1</span>, <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">min</span>(<span class="hljs-number">1</span>, float32[i]));\n            int16[i] = s &lt; <span class="hljs-number">0</span> ? s * <span class="hljs-number">0x8000</span> : s * <span class="hljs-number">0x7fff</span>;\n          }\n          pcmData.<span class="hljs-title function_">push</span>(...int16);\n        };\n        inputNode.<span class="hljs-title function_">connect</span>(scriptProcessor);\n        scriptProcessor.<span class="hljs-title function_">connect</span>(audioContext.<span class="hljs-property">destination</span>);\n      }\n\n      <span class="hljs-keyword">function</span> <span class="hljs-title function_">encodeToMp3</span>(<span class="hljs-params"></span>) {\n        <span class="hljs-keyword">if</span> (pcmData.<span class="hljs-property">length</span> === <span class="hljs-number">0</span>) <span class="hljs-keyword">throw</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Error</span>(<span class="hljs-string">&quot;无数据&quot;</span>);\n        <span class="hljs-keyword">const</span> encoder = <span class="hljs-keyword">new</span> lamejs.<span class="hljs-title class_">Mp3Encoder</span>(<span class="hljs-variable constant_">CHANNELS</span>, <span class="hljs-variable constant_">SAMPLE_RATE</span>, <span class="hljs-number">128</span>);\n        <span class="hljs-keyword">const</span> blockSize = <span class="hljs-number">1152</span>;\n        <span class="hljs-keyword">const</span> frames = [];\n        <span class="hljs-keyword">let</span> offset = <span class="hljs-number">0</span>;\n        <span class="hljs-keyword">while</span> (offset &lt; pcmData.<span class="hljs-property">length</span>) {\n          <span class="hljs-keyword">const</span> chunk = pcmData.<span class="hljs-title function_">slice</span>(offset, offset + blockSize);\n          <span class="hljs-keyword">if</span> (chunk.<span class="hljs-property">length</span> &lt; blockSize) {\n            <span class="hljs-keyword">const</span> pad = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Int16Array</span>(blockSize - chunk.<span class="hljs-property">length</span>);\n            chunk.<span class="hljs-title function_">set</span>(pad, chunk.<span class="hljs-property">length</span>);\n          }\n          <span class="hljs-keyword">const</span> buf = encoder.<span class="hljs-title function_">encodeBuffer</span>(chunk);\n          <span class="hljs-keyword">if</span> (buf.<span class="hljs-property">length</span>) frames.<span class="hljs-title function_">push</span>(buf);\n          offset += blockSize;\n        }\n        <span class="hljs-keyword">const</span> final = encoder.<span class="hljs-title function_">flush</span>();\n        <span class="hljs-keyword">if</span> (final.<span class="hljs-property">length</span>) frames.<span class="hljs-title function_">push</span>(final);\n        <span class="hljs-keyword">return</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Blob</span>(frames, { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;audio/mp3&quot;</span> });\n      }\n\n      <span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">startRecord</span>(<span class="hljs-params"></span>) {\n        <span class="hljs-keyword">if</span> (isRecording) <span class="hljs-keyword">return</span>;\n        <span class="hljs-keyword">if</span> (!audioContext) <span class="hljs-keyword">await</span> <span class="hljs-title function_">initAudio</span>();\n        <span class="hljs-keyword">if</span> (audioContext.<span class="hljs-property">state</span> === <span class="hljs-string">&quot;suspended&quot;</span>) <span class="hljs-keyword">await</span> audioContext.<span class="hljs-title function_">resume</span>();\n        pcmData = [];\n        <span class="hljs-title function_">startCapture</span>();\n        isRecording = <span class="hljs-literal">true</span>;\n      }\n\n      <span class="hljs-keyword">function</span> <span class="hljs-title function_">stopRecord</span>(<span class="hljs-params"></span>) {\n        <span class="hljs-keyword">if</span> (!isRecording) <span class="hljs-keyword">return</span>;\n        isRecording = <span class="hljs-literal">false</span>;\n        inputNode.<span class="hljs-title function_">disconnect</span>();\n        scriptProcessor.<span class="hljs-title function_">disconnect</span>();\n        mediaStream.<span class="hljs-title function_">getTracks</span>().<span class="hljs-title function_">forEach</span>(<span class="hljs-function">(<span class="hljs-params">t</span>) =&gt;</span> t.<span class="hljs-title function_">stop</span>());\n      }\n\n      <span class="hljs-keyword">function</span> <span class="hljs-title function_">downloadMp3</span>(<span class="hljs-params"></span>) {\n        <span class="hljs-keyword">const</span> blob = <span class="hljs-title function_">encodeToMp3</span>();\n        <span class="hljs-keyword">const</span> url = <span class="hljs-variable constant_">URL</span>.<span class="hljs-title function_">createObjectURL</span>(blob);\n        <span class="hljs-keyword">const</span> a = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">&quot;a&quot;</span>);\n        a.<span class="hljs-property">href</span> = url;\n        a.<span class="hljs-property">download</span> = <span class="hljs-string">`rec_<span class="hljs-subst">${<span class="hljs-built_in">Date</span>.now()}</span>.mp3`</span>;\n        a.<span class="hljs-title function_">click</span>();\n        <span class="hljs-variable constant_">URL</span>.<span class="hljs-title function_">revokeObjectURL</span>(url);\n      }\n    </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n  <span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>\n<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span>\n</code></pre>\n<hr>\n<h2>五、关键坑点与兼容性优化</h2>\n<h3>1. 采样率必须一致</h3>\n<ul>\n<li><code>getUserMedia</code>、<code>AudioContext</code>、<code>lamejs</code> <strong>采样率必须完全相同</strong>   （推荐 44100 或 16000）</li>\n<li>不一致会导致 MP3 无法播放或声音失真</li>\n</ul>\n<h3>2. 安全上下文限制</h3>\n<ul>\n<li>必须在 <strong>HTTPS 或 localhost</strong>   下运行，否则 <code>getUserMedia</code> 报错</li>\n<li>开发环境用 <code>localhost</code>，生产环境配置 HTTPS</li>\n</ul>\n<h3>3. ScriptProcessor 废弃与 AudioWorklet 替代</h3>\n<ul>\n<li>ScriptProcessor 兼容性好但性能差，建议新项目用 <strong>AudioWorklet</strong></li>\n<li>AudioWorklet 需单独加载处理脚本，逻辑更复杂但性能更优</li>\n</ul>\n<h3>4. 内存与性能优化</h3>\n<ul>\n<li>录音时间长时，<code>pcmData</code> 会占用大量内存，可<strong>边录边编码</strong>   （用 Worker 避免阻塞主线程）</li>\n<li>降低采样率（如 16000）或码率（如 64kbps）可减少文件大小</li>\n</ul>\n<h3>5. 移动端兼容</h3>\n<ul>\n<li>iOS Safari 需<strong>用户交互触发</strong>   （如点击按钮）才能启动录音</li>\n<li>部分安卓浏览器需开启权限，且对 <code>AudioWorklet</code> 支持有限</li>\n</ul>\n<hr>\n<h2>六、进阶方向</h2>\n<ol>\n<li><strong>AudioWorklet 重构</strong>   ：替换 ScriptProcessor，提升性能</li>\n<li><strong>Web Worker 编码</strong>   ：将 lamejs 编码移至 Worker，避免主线程卡顿</li>\n<li><strong>实时上传</strong>   ：边录边编码，分段上传至服务器</li>\n<li><strong>音频可视化</strong>   ：用 AnalyserNode 实现波形/频谱显示</li>\n<li><strong>降噪/增益</strong>   ：集成 Web Audio API 的降噪、增益节点</li>\n</ol>\n<hr>\n<pre><code class="language-javascript"><span class="hljs-keyword">import</span> lamejs <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;./lame.js&quot;</span>;\n<span class="hljs-keyword">import</span> { showToast } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;./fun.js&quot;</span>;\n<span class="hljs-keyword">import</span> <span class="hljs-title class_">ServiceUtil</span> <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;$UI/wxsys/lib/base/serviceUtil&quot;</span>;\n<span class="hljs-keyword">import</span> { formatSearchUrl } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;./index.js&quot;</span>;\n<span class="hljs-keyword">class</span> <span class="hljs-title class_">AudioRecorder</span> {\n  <span class="hljs-title function_">constructor</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">audioContext</span> = <span class="hljs-literal">null</span>;\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">mediaStream</span> = <span class="hljs-literal">null</span>;\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">workletNode</span> = <span class="hljs-literal">null</span>;\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">lameEncoder</span> = <span class="hljs-literal">null</span>;\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">source</span> = <span class="hljs-literal">null</span>;\n\n    <span class="hljs-comment">// MP3 编码配置</span>\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">config</span> = {\n      <span class="hljs-attr">sampleRate</span>: <span class="hljs-number">44100</span>, <span class="hljs-comment">// 采样率</span>\n      <span class="hljs-attr">channels</span>: <span class="hljs-number">1</span>, <span class="hljs-comment">// 单声道</span>\n      <span class="hljs-attr">bitRate</span>: <span class="hljs-number">128</span>, <span class="hljs-comment">// 比特率</span>\n    };\n\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">mp3Data</span> = []; <span class="hljs-comment">// 存储编码后的 MP3 数据</span>\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">pcmData</span> = []; <span class="hljs-comment">// 存储原始 PCM 数据</span>\n\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">lamejs</span> = <span class="hljs-title function_">lamejs</span>();\n    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">init</span>();\n  }\n\n  <span class="hljs-comment">// 初始化 AudioContext + 加载 AudioWorklet</span>\n  <span class="hljs-keyword">async</span> <span class="hljs-title function_">init</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-keyword">try</span> {\n      <span class="hljs-comment">// await this.fixBluetoothMic();</span>\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">audioContext</span> = <span class="hljs-keyword">new</span> <span class="hljs-title class_">AudioContext</span>({\n        <span class="hljs-attr">sampleRate</span>: <span class="hljs-variable language_">this</span>.<span class="hljs-property">config</span>.<span class="hljs-property">sampleRate</span>,\n      });\n      <span class="hljs-keyword">await</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">audioContext</span>.<span class="hljs-property">audioWorklet</span>.<span class="hljs-title function_">addModule</span>(\n        <span class="hljs-title class_">ServiceUtil</span>.<span class="hljs-title function_">getServiceUrl</span>(\n          <span class="hljs-title function_">formatSearchUrl</span>(<span class="hljs-string">&quot;/mobileapp/mobile/utils/recorder-worklet.js&quot;</span>),\n          <span class="hljs-string">&quot;humanresources&quot;</span>,\n        ),\n      );\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">workletNode</span> = <span class="hljs-keyword">new</span> <span class="hljs-title class_">AudioWorkletNode</span>(\n        <span class="hljs-variable language_">this</span>.<span class="hljs-property">audioContext</span>,\n        <span class="hljs-string">&quot;recorder-worklet&quot;</span>,\n      );\n      <span class="hljs-comment">// 接收 AudioWorklet 传来的 PCM 数据</span>\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">workletNode</span>.<span class="hljs-property">port</span>.<span class="hljs-property">onmessage</span> = <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {\n        <span class="hljs-keyword">const</span> pcm = e.<span class="hljs-property">data</span>.<span class="hljs-property">pcm</span>; <span class="hljs-comment">// 32位浮点 PCM 数据</span>\n        <span class="hljs-variable language_">this</span>.<span class="hljs-property">pcmData</span>.<span class="hljs-title function_">push</span>(...pcm);\n\n        <span class="hljs-comment">// 实时编码为 MP3</span>\n        <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">encodePCMToMP3</span>(pcm);\n      };\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">workletNode</span>.<span class="hljs-title function_">connect</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">audioContext</span>.<span class="hljs-property">destination</span>);\n      <span class="hljs-comment">// 初始化 LAME MP3 编码器</span>\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">lameEncoder</span> = <span class="hljs-keyword">new</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">lamejs</span>.<span class="hljs-title class_">Mp3Encoder</span>(\n        <span class="hljs-variable language_">this</span>.<span class="hljs-property">config</span>.<span class="hljs-property">channels</span>,\n        <span class="hljs-variable language_">this</span>.<span class="hljs-property">config</span>.<span class="hljs-property">sampleRate</span>,\n        <span class="hljs-variable language_">this</span>.<span class="hljs-property">config</span>.<span class="hljs-property">bitRate</span>,\n      );\n    } <span class="hljs-keyword">catch</span> (e) {\n      <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-title class_">String</span>(e));\n    }\n  }\n  <span class="hljs-comment">// 开始录音</span>\n  <span class="hljs-keyword">async</span> <span class="hljs-title function_">start</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">reset</span>();\n    <span class="hljs-keyword">try</span> {\n      <span class="hljs-keyword">if</span> (!<span class="hljs-variable language_">this</span>.<span class="hljs-property">audioContext</span>) <span class="hljs-keyword">await</span> <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">init</span>();\n      <span class="hljs-keyword">await</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">audioContext</span>.<span class="hljs-title function_">resume</span>();\n\n      <span class="hljs-comment">// 获取麦克风权限</span>\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">mediaStream</span> = <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">mediaDevices</span>.<span class="hljs-title function_">getUserMedia</span>({\n        <span class="hljs-attr">audio</span>: <span class="hljs-literal">true</span>,\n      });\n\n      <span class="hljs-comment">// 创建音频源节点</span>\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">source</span> = <span class="hljs-variable language_">this</span>.<span class="hljs-property">audioContext</span>.<span class="hljs-title function_">createMediaStreamSource</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">mediaStream</span>);\n\n      <span class="hljs-comment">// 连接音频节点</span>\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">source</span>.<span class="hljs-title function_">connect</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">workletNode</span>);\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">workletNode</span>.<span class="hljs-property">port</span>.<span class="hljs-title function_">postMessage</span>({ <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;start&quot;</span> });\n    } <span class="hljs-keyword">catch</span> (e) {\n      <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-title class_">String</span>(e));\n      <span class="hljs-title function_">showToast</span>(<span class="hljs-title class_">String</span>(e), { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;danger&quot;</span> });\n    }\n  }\n\n  <span class="hljs-comment">// PCM 浮点转 Int16 + LAME 编码</span>\n  <span class="hljs-title function_">encodePCMToMP3</span>(<span class="hljs-params">float32Array</span>) {\n    <span class="hljs-comment">// 1. 浮点 PCM(-1~1) 转 16位整型 PCM(LAME 要求)</span>\n    <span class="hljs-keyword">const</span> int16Array = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Int16Array</span>(float32Array.<span class="hljs-property">length</span>);\n    <span class="hljs-keyword">for</span> (<span class="hljs-keyword">let</span> i = <span class="hljs-number">0</span>; i &lt; float32Array.<span class="hljs-property">length</span>; i++) {\n      <span class="hljs-keyword">let</span> s = <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">max</span>(-<span class="hljs-number">1</span>, <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">min</span>(<span class="hljs-number">1</span>, float32Array[i]));\n      int16Array[i] = s &lt; <span class="hljs-number">0</span> ? s * <span class="hljs-number">0x8000</span> : s * <span class="hljs-number">0x7fff</span>;\n    }\n\n    <span class="hljs-comment">// 2. 编码 MP3</span>\n    <span class="hljs-keyword">const</span> mp3buf = <span class="hljs-variable language_">this</span>.<span class="hljs-property">lameEncoder</span>.<span class="hljs-title function_">encodeBuffer</span>(int16Array);\n    <span class="hljs-keyword">if</span> (mp3buf.<span class="hljs-property">length</span> &gt; <span class="hljs-number">0</span>) {\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">mp3Data</span>.<span class="hljs-title function_">push</span>(<span class="hljs-keyword">new</span> <span class="hljs-title class_">Uint8Array</span>(mp3buf));\n    }\n  }\n\n  <span class="hljs-comment">// 停止录音 + 完成 MP3 编码</span>\n  <span class="hljs-keyword">async</span> <span class="hljs-title function_">stop</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-keyword">try</span> {\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">workletNode</span>.<span class="hljs-property">port</span>.<span class="hljs-title funct
