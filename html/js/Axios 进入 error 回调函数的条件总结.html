<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'Axios 进入 error 回调函数的条件总结'
        document.getElementById('article').innerHTML = 
        "<div><p>Axios 的 <code>error</code> 回调函数（在拦截器或 <code>.catch()</code> 中）会在以下情况下触发：</p>\n<hr>\n<p><strong>1. 请求阶段错误（<code>request.use</code> 的 <code>error</code> 回调）</strong><br>\n<strong>触发条件</strong></p>\n<ol>\n<li>请求拦截器内部抛出错误<pre><code class=\"language-javascript\">axios.<span class=\"hljs-property\">interceptors</span>.<span class=\"hljs-property\">request</span>.<span class=\"hljs-title function_\">use</span>(\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">config</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">&quot;手动抛出错误&quot;</span>); <span class=\"hljs-comment\">// 进入 error 回调</span>\n  },\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;拦截器捕获错误:&quot;</span>, error.<span class=\"hljs-property\">message</span>);\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">reject</span>(error);\n  }\n);\n</code></pre>\n</li>\n<li>修改 <code>config</code> 时发生错误<pre><code class=\"language-javascript\">axios.<span class=\"hljs-property\">interceptors</span>.<span class=\"hljs-property\">request</span>.<span class=\"hljs-title function_\">use</span>(\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">config</span>) =&gt;</span> {\n    config.<span class=\"hljs-property\">headers</span>.<span class=\"hljs-property\">Authorization</span> = <span class=\"hljs-literal\">undefined</span>.<span class=\"hljs-property\">token</span>; <span class=\"hljs-comment\">// 访问不存在的属性</span>\n    <span class=\"hljs-keyword\">return</span> config;\n  },\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;拦截器捕获错误:&quot;</span>, error); <span class=\"hljs-comment\">// TypeError</span>\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">reject</span>(error);\n  }\n);\n</code></pre>\n</li>\n<li>同步代码报错（如语法错误）<pre><code class=\"language-javascript\">axios.<span class=\"hljs-property\">interceptors</span>.<span class=\"hljs-property\">request</span>.<span class=\"hljs-title function_\">use</span>(\n  <span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">parse</span>(<span class=\"hljs-string\">&quot;invalid json&quot;</span>); <span class=\"hljs-comment\">// 语法错误</span>\n    <span class=\"hljs-keyword\">return</span> config;\n  },\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;拦截器捕获错误:&quot;</span>, error); <span class=\"hljs-comment\">// SyntaxError</span>\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">reject</span>(error);\n  }\n);\n</code></pre>\n</li>\n</ol>\n<hr>\n<p><strong>2. 响应阶段错误（<code>response.use</code> 的 <code>error</code> 回调）</strong><br>\n<strong>触发条件</strong></p>\n<ol>\n<li>HTTP 状态码非 2xx（如 404、500）<pre><code class=\"language-javascript\">axios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&quot;/api/not-found&quot;</span>)\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;HTTP 错误:&quot;</span>, error.<span class=\"hljs-property\">response</span>.<span class=\"hljs-property\">status</span>); <span class=\"hljs-comment\">// 404</span>\n  });\n</code></pre>\n</li>\n<li>网络错误（无响应）<pre><code class=\"language-javascript\">axios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&quot;http://nonexistent-domain.com&quot;</span>)\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;网络错误:&quot;</span>, error.<span class=\"hljs-property\">message</span>); <span class=\"hljs-comment\">// &quot;Network Error&quot;</span>\n  });\n</code></pre>\n</li>\n<li>响应数据解析失败（如无效 JSON）<pre><code class=\"language-javascript\">axios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&quot;/api/invalid-json&quot;</span>, { <span class=\"hljs-attr\">responseType</span>: <span class=\"hljs-string\">&quot;json&quot;</span> })\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;JSON 解析错误:&quot;</span>, error.<span class=\"hljs-property\">message</span>); <span class=\"hljs-comment\">// &quot;Unexpected token...&quot;</span>\n  });\n</code></pre>\n</li>\n<li>拦截器内部抛出错误<pre><code class=\"language-javascript\">axios.<span class=\"hljs-property\">interceptors</span>.<span class=\"hljs-property\">response</span>.<span class=\"hljs-title function_\">use</span>(\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">response</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (response.<span class=\"hljs-property\">data</span>.<span class=\"hljs-property\">code</span> !== <span class=\"hljs-number\">200</span>) {\n      <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">&quot;业务逻辑错误&quot;</span>); <span class=\"hljs-comment\">// 进入 error 回调</span>\n    }\n    <span class=\"hljs-keyword\">return</span> response;\n  },\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;拦截器捕获错误:&quot;</span>, error.<span class=\"hljs-property\">message</span>);\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">reject</span>(error);\n  }\n);\n</code></pre>\n</li>\n</ol>\n<hr>\n<p><strong>3. 全局错误处理（<code>.catch()</code>）</strong><br>\n所有未被拦截器处理的错误（包括请求和响应阶段的错误）最终会传递到 <code>.catch()</code>：</p>\n<pre><code class=\"language-javascript\">axios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&quot;/api/data&quot;</span>)\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">response</span>) =&gt;</span> { ... })\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (error.<span class=\"hljs-property\">response</span>) {\n      <span class=\"hljs-comment\">// HTTP 错误（4xx/5xx）</span>\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;HTTP 错误:&quot;</span>, error.<span class=\"hljs-property\">response</span>.<span class=\"hljs-property\">status</span>);\n    } <span class=\"hljs-keyword\">else</span> <span class=\"hljs-keyword\">if</span> (error.<span class=\"hljs-property\">request</span>) {\n      <span class=\"hljs-comment\">// 网络错误（无响应）</span>\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;网络错误:&quot;</span>, error.<span class=\"hljs-property\">message</span>);\n    } <span class=\"hljs-keyword\">else</span> {\n      <span class=\"hljs-comment\">// 其他错误（如拦截器内部错误）</span>\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&quot;其他错误:&quot;</span>, error.<span class=\"hljs-property\">message</span>);\n    }\n  });\n</code></pre>\n<hr>\n<p><strong>4. 错误处理流程图</strong></p>\n<pre><code class=\"language-mermaid\">graph TD\n  A[发起请求] --&gt; B{请求拦截器}\n  B --&gt;|成功| C[发送请求]\n  B --&gt;|失败| D[进入 request.use 的 error 回调]\n  C --&gt; E{服务器响应}\n  E --&gt;|2xx| F[进入 response.use 的 success 回调]\n  E --&gt;|非2xx/网络错误| G[进入 response.use 的 error 回调]\n  F --&gt; H[返回数据]\n  G --&gt; I[传递到 .catch()]\n  D --&gt; I\n</code></pre>\n<hr>\n<p><strong>5. 总结</strong></p>\n<table>\n<thead>\n<tr>\n<th>错误类型</th>\n<th>触发位置</th>\n<th>示例场景</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>请求拦截器错误</td>\n<td><code>request.use</code> 的 <code>error</code> 回调</td>\n<td>修改 <code>config</code> 时报错、手动抛出错误</td>\n</tr>\n<tr>\n<td>HTTP 错误（4xx/5xx）</td>\n<td><code>response.use</code> 的 <code>error</code> 回调</td>\n<td>404、500 等状态码</td>\n</tr>\n<tr>\n<td>网络错误（无响应）</td>\n<td><code>response.use</code> 的 <code>error</code> 回调</td>\n<td>断网、域名不存在</td>\n</tr>\n<tr>\n<td>响应数据解析错误</td>\n<td><code>response.use</code> 的 <code>error</code> 回调</td>\n<td>无效 JSON、<code>responseType</code> 不匹配</td>\n</tr>\n<tr>\n<td>拦截器未处理的错误</td>\n<td>最终传递到 <code>.catch()</code></td>\n<td>所有未被拦截器捕获的错误</td>\n</tr>\n</tbody>\n</table>\n<p>关键点：</p>\n<ol>\n<li>拦截器的 <code>error</code> 回调 仅处理当前阶段的错误（请求或响应）。</li>\n<li>必须返回 <code>Promise.reject(error)</code> 以确保错误能传递到下一阶段。</li>\n<li>最终错误处理建议放在 <code>.catch()</code> 中统一管理。</li>\n</ol>\n</div>";</script></body></html>
