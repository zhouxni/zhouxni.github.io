<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="seo hreflang 标签的作用",document.getElementById("article").innerHTML='<div><p><strong>hreflang</strong>   是一个 HTML 或 HTTP 标签，用于向搜索引擎指明<strong>网页的不同语言或地区版本</strong>  ，帮助搜索引擎将用户引导至最合适的页面版本。</p>\n<hr>\n<h2><strong>1. hreflang 的主要作用</strong></h2>\n<p>✅ <strong>解决多语言/多地区网站的 SEO 问题</strong></p>\n<ul>\n<li>避免不同语言版本的页面被搜索引擎视为<strong>重复内容</strong>  。</li>\n<li>确保用户看到<strong>符合其语言或地区的正确版本</strong>  （如英文用户看到英文版，法国用户看到法语版）。</li>\n</ul>\n<p>✅ <strong>提升用户体验和转化率</strong></p>\n<ul>\n<li>减少用户因语言/地区不匹配而跳出。</li>\n<li>适用于电商、新闻、博客等多语言网站。</li>\n</ul>\n<p>✅ <strong>优化国际 SEO 排名</strong></p>\n<ul>\n<li>帮助搜索引擎理解网站的结构，提高特定地区搜索结果的排名。</li>\n</ul>\n<hr>\n<h2><strong>2. hreflang 的常见使用场景</strong></h2>\n<p>🌍 <strong>多语言网站</strong></p>\n<ul>\n<li>例如：\n<ul>\n<li><code>example.com/en/</code>（英文）</li>\n<li><code>example.com/es/</code>（西班牙语）</li>\n<li><code>example.com/fr/</code>（法语）</li>\n</ul>\n</li>\n</ul>\n<p>🇺🇸 <strong>多地区网站（相同语言，不同国家）</strong></p>\n<ul>\n<li>例如：\n<ul>\n<li><code>example.com/us/</code>（美国英语）</li>\n<li><code>example.com/uk/</code>（英国英语）</li>\n<li><code>example.com/au/</code>（澳大利亚英语）</li>\n</ul>\n</li>\n</ul>\n<p>🌐 <strong>多语言+多地区混合</strong></p>\n<ul>\n<li>例如：\n<ul>\n<li><code>example.com/en-us/</code>（美国英语）</li>\n<li><code>example.com/en-gb/</code>（英国英语）</li>\n<li><code>example.com/fr-fr/</code>（法国法语）</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h2><strong>3. hreflang 的语法格式</strong></h2>\n<h3><strong>(1) HTML 头部（推荐）</strong></h3>\n<p>在 <code>&lt;head&gt;</code> 部分添加：</p>\n<pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;alternate&quot;</span> <span class="hljs-attr">hreflang</span>=<span class="hljs-string">&quot;语言代码&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;对应URL&quot;</span> /&gt;</span>\n</code></pre>\n<p><strong>示例</strong>  （英语、西班牙语、法语）：</p>\n<pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;alternate&quot;</span> <span class="hljs-attr">hreflang</span>=<span class="hljs-string">&quot;en&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;https://example.com/en/&quot;</span> /&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;alternate&quot;</span> <span class="hljs-attr">hreflang</span>=<span class="hljs-string">&quot;es&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;https://example.com/es/&quot;</span> /&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;alternate&quot;</span> <span class="hljs-attr">hreflang</span>=<span class="hljs-string">&quot;fr&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;https://example.com/fr/&quot;</span> /&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;alternate&quot;</span> <span class="hljs-attr">hreflang</span>=<span class="hljs-string">&quot;x-default&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;https://example.com/&quot;</span> /&gt;</span>\n</code></pre>\n<ul>\n<li><code>x-default</code>：默认版本，用于不匹配任何语言的用户。</li>\n</ul>\n<h3><strong>(2) HTTP 头部（适合非 HTML 文件）</strong></h3>\n<pre><code class="language-http"><span class="hljs-attribute">Link</span><span class="hljs-punctuation">: </span>&lt;https://example.com/en/&gt;; rel=&quot;alternate&quot;; hreflang=&quot;en&quot;\n</code></pre>\n<h3><strong>(3) XML Sitemap 中声明</strong></h3>\n<p>在 Sitemap 中添加 <code>&lt;xhtml:link&gt;</code> 标签：</p>\n<pre><code class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">url</span>&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">loc</span>&gt;</span>https://example.com/en/<span class="hljs-tag">&lt;/<span class="hljs-name">loc</span>&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">xhtml:link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;alternate&quot;</span> <span class="hljs-attr">hreflang</span>=<span class="hljs-string">&quot;es&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;https://example.com/es/&quot;</span> /&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">xhtml:link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;alternate&quot;</span> <span class="hljs-attr">hreflang</span>=<span class="hljs-string">&quot;fr&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;https://example.com/fr/&quot;</span> /&gt;</span>\n<span class="hljs-tag">&lt;/<span class="hljs-name">url</span>&gt;</span>\n</code></pre>\n<hr>\n<h2><strong>4. hreflang 的注意事项</strong></h2>\n<p>⚠️ <strong>语言代码格式</strong></p>\n<ul>\n<li>使用 <strong>ISO 639-1</strong>   语言代码（如 <code>en</code>、<code>es</code>、<code>fr</code>）。</li>\n<li>地区代码可选（如 <code>en-US</code>、<code>es-ES</code>）。</li>\n</ul>\n<p>⚠️ <strong>双向链接</strong></p>\n<ul>\n<li>每个语言的页面必须<strong>互相指向对方</strong>  ，否则可能失效。</li>\n<li>例如：英文页需指向西班牙语页，西班牙语页也需指向英文页。</li>\n</ul>\n<p>⚠️ <strong>与 Canonical 标签的关系</strong></p>\n<ul>\n<li><code>hreflang</code> 和 <code>canonical</code> 可以共存，但 <code>canonical</code> 应指向当前页面的首选版本。</li>\n</ul>\n<p>⚠️ <strong>常见错误</strong><br>\n❌ 漏掉某些语言的链接<br>\n❌ 使用错误的语言/地区代码（如 <code>uk</code> 应该是 <code>en-GB</code>）<br>\n❌ 忘记添加 <code>x-default</code></p>\n<hr>\n<h2><strong>5. 如何验证 hreflang 是否生效？</strong></h2>\n<p>🔍 <strong>Google Search Console</strong>   → 国际定位报告<br>\n🔍 <strong>第三方工具</strong>  ：</p>\n<ul>\n<li><a href="https://technicalseo.com/tools/hreflang/" target="_blank">hreflang tester</a></li>\n<li><a href="https://sitebulb.com/" target="_blank">Sitebulb</a></li>\n</ul>\n<hr>\n<h3><strong>总结</strong></h3>\n<p><code>hreflang</code> 是多语言/多地区网站的<strong>必备 SEO 标签</strong>  ，能有效解决语言版本冲突，提升用户体验和搜索排名。正确使用可避免重复内容问题，并确保用户访问最合适的页面版本！ 🌍</p>\n</div>'</script></body></html>
