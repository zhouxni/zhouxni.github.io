ass="hljs-title function_">create</span>({\n  <span class="hljs-attr">baseURL</span>: <span class="hljs-string">&quot;https://api.example.com&quot;</span>,\n  <span class="hljs-attr">timeout</span>: <span class="hljs-number">10000</span>,\n});\n\n<span class="hljs-comment">// 2. 应用重试插件（默认配置）</span>\n<span class="hljs-title function_">axiosRetry</span>(axiosInstance, {\n  <span class="hljs-attr">retries</span>: <span class="hljs-number">3</span>, <span class="hljs-comment">// 核心配置：最大重试次数</span>\n});\n\n<span class="hljs-comment">// 3. 正常发起请求（失败自动重试）</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">fetchData</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">try</span> {\n    <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> axiosInstance.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;/data&quot;</span>);\n    <span class="hljs-keyword">return</span> res.<span class="hljs-property">data</span>;\n  } <span class="hljs-keyword">catch</span> (err) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;请求最终失败（已重试3次）:&quot;</span>, err);\n  }\n}\n</code></pre>\n<h3>三、核心配置项全解析</h3>\n<p><code>axios-retry</code> 的第二个参数是配置对象，以下是所有配置项的详细说明（按优先级排序）：</p>\n<table>\n<thead>\n<tr>\n<th>配置项</th>\n<th>类型</th>\n<th>默认值</th>\n<th>核心作用</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>retries</code></td>\n<td>number</td>\n<td>3</td>\n<td>最大重试次数（0 表示禁用重试）</td>\n</tr>\n<tr>\n<td><code>retryCondition</code></td>\n<td>function(error)</td>\n<td>内置判断逻辑（见下文）</td>\n<td>自定义「是否触发重试」的条件（返回 true 则重试）</td>\n</tr>\n<tr>\n<td><code>retryDelay</code></td>\n<td>function(retryCount, error)</td>\n<td>(count) =&gt; count * 100</td>\n<td>重试延迟策略（返回毫秒数，控制两次重试的间隔）</td>\n</tr>\n<tr>\n<td><code>onRetry</code></td>\n<td>function(retryCount, error, config)</td>\n<td>undefined</td>\n<td>重试前的钩子函数（可用于打印日志、修改请求配置）</td>\n</tr>\n<tr>\n<td><code>shouldResetTimeout</code></td>\n<td>boolean</td>\n<td>false</td>\n<td>重试时是否重置超时时间（避免剩余超时时间不足）</td>\n</tr>\n<tr>\n<td><code>httpMethodsToRetry</code></td>\n<td>string[]</td>\n<td>[\'get\', \'head\', \'options\', \'delete\', \'put\', \'trace\']</td>\n<td>允许重试的 HTTP 方法（默认仅幂等请求）</td>\n</tr>\n<tr>\n<td><code>statusCodesToRetry</code></td>\n<td>number[]/function</td>\n<td>[408, 429, 500, 502, 503, 504]</td>\n<td>触发重试的 HTTP 状态码（支持数组/自定义函数）</td>\n</tr>\n<tr>\n<td><code>exclude</code></td>\n<td>function(config)</td>\n<td>undefined</td>\n<td>排除特定请求不参与重试（返回 true 则跳过重试）</td>\n</tr>\n</tbody>\n</table>\n<h4>关键配置项深度讲解</h4>\n<h5>1. retryCondition（重试条件）</h5>\n<p>默认逻辑：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 内置默认 retryCondition</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">defaultRetryCondition</span> = (<span class="hljs-params">error</span>) =&gt; {\n  <span class="hljs-comment">// 1. 网络错误（无响应）：如超时、断网、DNS 解析失败</span>\n  <span class="hljs-comment">// 2. 服务器错误：匹配 statusCodesToRetry 中的状态码</span>\n  <span class="hljs-comment">// 3. 方法匹配：属于 httpMethodsToRetry 中的方法</span>\n  <span class="hljs-keyword">return</span> (\n    !error.<span class="hljs-property">response</span> ||\n    (error.<span class="hljs-property">response</span>.<span class="hljs-property">status</span> &amp;&amp;\n      statusCodesToRetry.<span class="hljs-title function_">includes</span>(error.<span class="hljs-property">response</span>.<span class="hljs-property">status</span>) &amp;&amp;\n      httpMethodsToRetry.<span class="hljs-title function_">includes</span>(error.<span class="hljs-property">config</span>.<span class="hljs-property">method</span>.<span class="hljs-title function_">toLowerCase</span>()))\n  );\n};\n</code></pre>\n<p>自定义示例（精准控制）：</p>\n<pre><code class="language-javascript"><span class="hljs-title function_">axiosRetry</span>(axiosInstance, {\n  <span class="hljs-attr">retries</span>: <span class="hljs-number">3</span>,\n  <span class="hljs-attr">retryCondition</span>: <span class="hljs-function">(<span class="hljs-params">error</span>) =&gt;</span> {\n    <span class="hljs-comment">// 场景1：仅对 503/504 错误重试</span>\n    <span class="hljs-keyword">if</span> (error.<span class="hljs-property">response</span>?.<span class="hljs-property">status</span> === <span class="hljs-number">503</span> || error.<span class="hljs-property">response</span>?.<span class="hljs-property">status</span> === <span class="hljs-number">504</span>) {\n      <span class="hljs-keyword">return</span> <span class="hljs-literal">true</span>;\n    }\n    <span class="hljs-comment">// 场景2：网络超时也重试</span>\n    <span class="hljs-keyword">if</span> (error.<span class="hljs-property">code</span> === <span class="hljs-string">&quot;ECONNABORTED&quot;</span>) {\n      <span class="hljs-keyword">return</span> <span class="hljs-literal">true</span>;\n    }\n    <span class="hljs-comment">// 其他情况不重试</span>\n    <span class="hljs-keyword">return</span> <span class="hljs-literal">false</span>;\n  },\n});\n</code></pre>\n<h5>2. retryDelay（延迟策略）</h5>\n<p>内置两种常用策略（需手动引入）：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">import</span> axiosRetry, { exponentialDelay, randomDelay } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;axios-retry&quot;</span>;\n\n<span class="hljs-comment">// 策略1：指数退避（推荐）—— 重试次数越多，延迟越长</span>\n<span class="hljs-title function_">axiosRetry</span>(axiosInstance, {\n  <span class="hljs-attr">retries</span>: <span class="hljs-number">3</span>,\n  <span class="hljs-comment">// 第1次重试延迟 1s，第2次 2s，第3次 4s（指数增长）</span>\n  <span class="hljs-attr">retryDelay</span>: exponentialDelay,\n  <span class="hljs-comment">// 自定义指数退避：exponentialDelay(retryCount, baseDelay = 1000)</span>\n  <span class="hljs-comment">// retryDelay: (count) =&gt; exponentialDelay(count, 2000), // 基础延迟 2s</span>\n});\n\n<span class="hljs-comment">// 策略2：随机延迟（避免请求峰值）</span>\n<span class="hljs-title function_">axiosRetry</span>(axiosInstance, {\n  <span class="hljs-attr">retries</span>: <span class="hljs-number">3</span>,\n  <span class="hljs-comment">// 延迟在 100ms ~ 2000ms 之间随机</span>\n  <span class="hljs-attr">retryDelay</span>: randomDelay,\n  <span class="hljs-comment">// 自定义随机范围：randomDelay(min = 0, max = 1000)</span>\n  <span class="hljs-comment">// retryDelay: () =&gt; randomDelay(500, 3000),</span>\n});\n\n<span class="hljs-comment">// 自定义延迟（灵活控制）</span>\n<span class="hljs-title function_">axiosRetry</span>(axiosInstance, {\n  <span class="hljs-attr">retries</span>: <span class="hljs-number">3</span>,\n  <span class="hljs-attr">retryDelay</span>: <span class="hljs-function">(<span class="hljs-params">retryCount, error</span>) =&gt;</span> {\n    <span class="hljs-comment">// 针对不同错误设置不同延迟</span>\n    <span class="hljs-keyword">if</span> (error.<span class="hljs-property">response</span>?.<span class="hljs-property">status</span> === <span class="hljs-number">429</span>) {\n      <span class="hljs-comment">// 限流错误</span>\n      <span class="hljs-comment">// 从响应头获取推荐延迟（如 Retry-After）</span>\n      <span class="hljs-keyword">const</span> retryAfter = error.<span class="hljs-property">response</span>.<span class="hljs-property">headers</span>[<span class="hljs-string">&quot;retry-after&quot;</span>];\n      <span class="hljs-keyword">return</span> (retryAfter ? <span class="hljs-title class_">Number</span>(retryAfter) : retryCount) * <span class="hljs-number">1000</span>;\n    }\n    <span class="hljs-keyword">return</span> retryCount * <span class="hljs-number">1000</span>; <span class="hljs-comment">// 普通错误按次数延迟</span>\n  },\n});\n</code></pre>\n<h5>3. shouldResetTimeout（超时重置）</h5>\n<p><strong>核心避坑点</strong>   ：默认 <code>false</code> 时，重试会沿用「剩余超时时间」，比如：</p>\n<ul>\n<li>初始超时 10s，第一次请求耗时 8s 失败，重试时只剩 2s 超时；</li>\n<li>配置 <code>shouldResetTimeout: true</code> 后，每次重试都会重置为初始超时时间（10s）。</li>\n</ul>\n<p>示例：</p>\n<pre><code class="language-javascript"><span class="hljs-title function_">axiosRetry</span>(axiosInstance, {\n  <span class="hljs-attr">retries</span>: <span class="hljs-number">3</span>,\n  <span class="hljs-attr">shouldResetTimeout</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 关键配置：重试重置超时</span>\n  <span class="hljs-attr">timeout</span>: <span class="hljs-number">10000</span>,\n});\n</code></pre>\n<h5>4. exclude（排除特定请求）</h5>\n<p>针对部分请求禁用重试（比如支付接口）：</p>\n<pre><code class="language-javascript"><span class="hljs-title function_">axiosRetry</span>(axiosInstance, {\n  <span class="hljs-attr">retries</span>: <span class="hljs-number">3</span>,\n  <span class="hljs-comment">// 排除 /pay 路径的请求不重试</span>\n  <span class="hljs-attr">exclude</span>: <span class="hljs-function">(<span class="hljs-params">config</span>) =&gt;</span> {\n    <span class="hljs-keyword">return</span> config.<span class="hljs-property">url</span>?.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&quot;/pay&quot;</span>);\n  },\n});\n</code></pre>\n<h3>四、高级用法</h3>\n<h4>1. 单个请求覆盖全局配置</h4>\n<p>全局配置是「默认值」，可在单个请求中自定义重试规则：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 场景1：单个请求禁用重试</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">fetchCriticalData</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> axiosInstance.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;/critical-data&quot;</span>, {\n    <span class="hljs-string">&quot;axios-retry&quot;</span>: {\n      <span class="hljs-attr">retries</span>: <span class="hljs-number">0</span>, <span class="hljs-comment">// 覆盖全局配置，禁用重试</span>\n    },\n  });\n  <span class="hljs-keyword">return</span> res.<span class="hljs-property">data</span>;\n}\n\n<span class="hljs-comment">// 场景2：单个请求自定义重试次数/延迟</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">fetchLargeData</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> axiosInstance.<span class="hljs-title function_">post</span>(\n    <span class="hljs-string">&quot;/large-data&quot;</span>,\n    { <span class="hljs-attr">data</span>: {} },\n    {\n      <span class="hljs-string">&quot;axios-retry&quot;</span>: {\n        <span class="hljs-attr">retries</span>: <span class="hljs-number">5</span>, <span class="hljs-comment">// 重试5次</span>\n        <span class="hljs-attr">retryDelay</span>: <span class="hljs-function">() =&gt;</span> <span class="hljs-number">2000</span>, <span class="hljs-comment">// 每次延迟2s</span>\n        <span class="hljs-attr">retryCondition</span>: <span class="hljs-function">(<span class="hljs-params">err</span>) =&gt;</span> err.<span class="hljs-property">response</span>?.<span class="hljs-property">status</span> === <span class="hljs-number">500</span>, <span class="hljs-comment">// 仅500错误重试</span>\n      },\n    },\n  );\n  <span class="hljs-keyword">return</span> res.<span class="hljs-property">data</span>;\n}\n</code></pre>\n<h4>2. 结合 axios 拦截器使用</h4>\n<p><code>axios-retry</code> 本质是通过拦截器实现，可与自定义拦截器配合（注意执行顺序）：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 1. 先注册 axios-retry（底层拦截器）</span>\n<span class="hljs-title function_">axiosRetry</span>(axiosInstance, { <span class="hljs-attr">retries</span>: <span class="hljs-number">3</span> });\n\n<span class="hljs-comment">// 2. 再注册自定义请求拦截器（上层）</span>\naxiosInstance.<span class="hljs-property">interceptors</span>.<span class="hljs-property">request</span>.<span class="hljs-title function_">use</span>(\n  <span class="hljs-function">(<span class="hljs-params">config</span>) =&gt;</span> {\n    <span class="hljs-comment">// 给所有请求加 token</span>\n    config.<span class="hljs-property">headers</span>.<span class="hljs-property">Authorization</span> = <span class="hljs-string">&quot;Bearer &quot;</span> + <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">getItem</span>(<span class="hljs-string">&quot;token&quot;</span>);\n    <span class="hljs-keyword">return</span> config;\n  },\n  <span class="hljs-function">(<span class="hljs-params">err</span>) =&gt;</span> <span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">reject</span>(err),\n);\n\n<span class="hljs-comment">// 3. 自定义响应拦截器</span>\naxiosInstance.<span class="hljs-property">interceptors</span>.<span class="hljs-property">response</span>.<span class="hljs-title function_">use</span>(\n  <span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> res,\n  <span class="hljs-function">(<span class="hljs-params">err</span>) =&gt;</span> {\n    <span class="hljs-comment">// 可在这里判断是否是重试后的最终错误</span>\n    <span class="hljs-keyword">if</span> (err.<span class="hljs-property">config</span>[<span class="hljs-string">&quot;axios-retry&quot;</span>].<span class="hljs-property">retryCount</span> &gt;= <span class="hljs-number">3</span>) {\n      <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;重试次数用尽，触发降级逻辑&quot;</span>);\n    }\n    <span class="hljs-keyword">return</span> <span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">reject</span>(err);\n  },\n);\n</code></pre>\n<h4>3. 处理 POST 请求重试（谨慎！）</h4>\n<p>默认情况下，<code>axios-retry</code> 不重试 POST 请求（非幂等），如需开启需显式配置：</p>\n<pre><code class="language-javascript"><span class="hljs-title function_">axiosRetry</span>(axiosInstance, {\n  <span class="hljs-attr">retries</span>: <span class="hljs-number">2</span>,\n  <span class="hljs-comment">// 1. 允许 POST 方法重试</span>\n  <span class="hljs-attr">httpMethodsToRetry</span>: [<span class="hljs-string">&quot;get&quot;</span>, <span class="hljs-string">&quot;post&quot;</span>],\n  <span class="hljs-comment">// 2. 仅对 5xx 错误重试（避免参数错误重试）</span>\n  <span class="hljs-attr">retryCondition</span>: <span class="hljs-function">(<span class="hljs-params">err</span>) =&gt;</span> {\n    <span class="hljs-keyword">return</span> err.<span class="hljs-property">response</span>?.<span class="hljs-property">status</span> &gt;= <span class="hljs-number">500</span> &amp;&amp; err.<span class="hljs-property">response</span>?.<span class="hljs-property">status</span> &lt; <span class="hljs-number">600</span>;\n  },\n  <span class="hljs-comment">// 3. 重置超时（可选）</span>\n  <span class="hljs-attr">shouldResetTimeout</span>: <span class="hljs-literal">true</span>,\n});\n</code></pre>\n<blockquote>\n<p>重要提醒：POST 重试仅适用于「幂等的 POST 接口」（如查询类 POST），绝对不要对「创建/支付类 POST」重试，否则会导致重复提交！</p>\n</blockquote>\n<h3>五、避坑指南</h3>\n<ol>\n<li>\n<p><strong>重试次数计数问题</strong>   ：\n<code>axios-retry</code> 会在请求配置中添加 <code>retryCount</code> 字段（<code>config[\'axios-retry\'].retryCount</code>），可用于判断当前是第几次重试。</p>\n</li>\n<li>\n<p><strong>超时时间叠加问题</strong>   ：\n必须配置 <code>shouldResetTimeout: true</code>，否则重试时超时时间会叠加缩短（比如初始 10s，第一次失败后只剩 5s，第二次只剩 0s）。</p>\n</li>\n<li>\n<p><strong>取消请求（CancelToken/AbortController）</strong>   ：\n如果请求被手动取消（如 AbortController.abort()），<code>axios-retry</code> 不会重试该请求（内置判断逻辑会跳过）。</p>\n</li>\n<li>\n<p><strong>重复请求去重</strong>   ：\n<code>axios-retry</code> 不会处理「重复请求」，如需避免同一时间多次重试同一请求，需额外结合 <code>axios-cache-adapter</code> 或手动加锁。</p>\n</li>\n<li>\n<p><strong>错误信息丢失</strong>   ：\n重试后的错误会保留原始错误信息，可通过 <code>err.config[\'axios-retry\'].originalError</code> 获取第一次的错误。</p>\n</li>\n</ol>\n<h3>六、源码核心逻辑（简化版）</h3>\n<p>理解底层逻辑可避免踩坑，以下是 <code>axios-retry</code> 核心代码简化版：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">axiosRetry</span>(<span class="hljs-params">axiosInstance, options</span>) {\n  <span class="hljs-comment">// 注册响应拦截器（核心）</span>\n  axiosInstance.<span class="hljs-property">interceptors</span>.<span class="hljs-property">response</span>.<span class="hljs-title function_">use</span>(\n    <span class="hljs-function">(<span class="hljs-params">response</span>) =&gt;</span> response, <span class="hljs-comment">// 成功响应直接返回</span>\n    <span class="hljs-title function_">async</span> (error) =&gt; {\n      <span class="hljs-keyword">const</span> config = error.<span class="hljs-property">config</span>;\n      <span class="hljs-comment">// 初始化重试配置</span>\n      config[<span class="hljs-string">&quot;axios-retry&quot;</span>] = config[<span class="hljs-string">&quot;axios-retry&quot;</span>] || {\n        <span class="hljs-attr">retryCount</span>: <span class="hljs-number">0</span>,\n        <span class="hljs-attr">originalConfig</span>: { ...config },\n      };\n\n      <span class="hljs-comment">// 判断是否需要重试</span>\n      <span class="hljs-keyword">const</span> shouldRetry =\n        config[<span class="hljs-string">&quot;axios-retry&quot;</span>].<span class="hljs-property">retryCount</span> &lt; options.<span class="hljs-property">retries</span> &amp;&amp;\n        options.<span class="hljs-title function_">retryCondition</span>(error) &amp;&amp;\n        !config.<span class="hljs-property">cancelToken</span>; <span class="hljs-comment">// 取消请求不重试</span>\n\n      <span class="hljs-keyword">if</span> (shouldRetry) {\n        <span class="hljs-comment">// 增加重试计数</span>\n        config[<span class="hljs-string">&quot;axios-retry&quot;</span>].<span class="hljs-property">retryCount</span> += <span class="hljs-number">1</span>;\n        <span class="hljs-comment">// 执行 onRetry 钩子</span>\n        <span class="hljs-keyword">if</span> (options.<span class="hljs-property">onRetry</span>) {\n          options.<span class="hljs-title function_">onRetry</span>(config[<span class="hljs-string">&quot;axios-retry&quot;</span>].<span class="hljs-property">retryCount</span>, error, config);\n        }\n        <span class="hljs-comment">// 延迟后重新发起请求</span>\n        <span class="hljs-keyword">await</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Promise</span>(<span class="hljs-function">(<span class="hljs-params">resolve</span>) =&gt;</span>\n          <span class="hljs-built_in">setTimeout</span>(\n            resolve,\n            options.<span class="hljs-title function_">retryDelay</span>(config[<span class="hljs-string">&quot;axios-retry&quot;</span>].<span class="hljs-property">retryCount</span>, error),\n          ),\n        );\n        <span class="hljs-comment">// 重置超时（如果配置）</span>\n        <span class="hljs-keyword">if</span> (options.<span class="hljs-property">shouldResetTimeout</span>) {\n          config.<span class="hljs-property">timeout</span> = config[<span class="hljs-string">&quot;axios-retry&quot;</span>].<span class="hljs-property">originalConfig</span>.<span class="hljs-property">timeout</span>;\n        }\n        <span class="hljs-comment">// 重新发起请求</span>\n        <span class="hljs-keyword">return</span> <span class="hljs-title function_">axiosInstance</span>(config);\n      }\n\n      <span class="hljs-comment">// 不满足重试条件，抛出最终错误</span>\n      <span class="hljs-keyword">return</span> <span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">reject</span>(error);\n    },\n  );\n}\n</code></pre>\n<h3>总结</h3>\n<ol>\n<li><code>axios-retry</code> 是 axios 重试的最佳实践，核心通过拦截器实现，配置项覆盖「次数、延迟、条件、钩子」全场景；</li>\n<li>核心避坑点：<code>shouldResetTimeout: true</code>（重置超时）、POST 重试仅用于幂等接口、排除关键请求（如支付）；</li>\n<li>高级用法：单个请求覆盖全局配置、结合拦截器、自定义延迟策略（指数退避优先）。</li>\n</ol>\n<p>如果需要针对「特定场景（如限流重试、分布式系统重试）」或「源码调试」进一步讲解，可以告诉我。</p>\n</div>'</script></body></html>
