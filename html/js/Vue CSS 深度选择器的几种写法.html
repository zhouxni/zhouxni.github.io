<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Vue CSS 深度选择器的几种写法",document.getElementById("article").innerHTML='<div><p>在 Vue 中，当需要修改子组件样式时，由于 scoped 样式的限制，需要使用深度选择器来穿透作用域。以下是几种常见的写法：</p>\n<h2>1. <code>&gt;&gt;&gt;</code> 选择器（原生 CSS）</h2>\n<pre><code class="language-css"><span class="hljs-selector-class">.parent</span> &gt;&gt;&gt; <span class="hljs-selector-class">.child</span> {\n  <span class="hljs-attribute">color</span>: red;\n}\n</code></pre>\n<h2>2. <code>/deep/</code> 选择器</h2>\n<pre><code class="language-css"><span class="hljs-selector-class">.parent</span> /deep/ <span class="hljs-selector-class">.child</span> {\n  <span class="hljs-attribute">color</span>: red;\n}\n</code></pre>\n<h2>3. <code>::v-deep</code> 选择器（Vue 推荐）</h2>\n<pre><code class="language-css"><span class="hljs-selector-class">.parent</span> ::v-deep .child {\n  <span class="hljs-attribute">color</span>: red;\n}\n</code></pre>\n<p>或者简写为：</p>\n<pre><code class="language-css">::v-deep .child {\n  <span class="hljs-attribute">color</span>: red;\n}\n</code></pre>\n<h2>4. <code>:deep()</code> 选择器（Vue 3+ 推荐）</h2>\n<pre><code class="language-css"><span class="hljs-selector-class">.parent</span> :<span class="hljs-built_in">deep</span>(.child) {\n  <span class="hljs-attribute">color</span>: red;\n}\n</code></pre>\n<h2>注意事项</h2>\n<ol>\n<li><code>&gt;&gt;&gt;</code> 和 <code>/deep/</code> 在 Sass/SCSS 等预处理器中可能无法正常工作</li>\n<li>Vue 3 推荐使用 <code>:deep()</code> 选择器</li>\n<li>在 Vue 2 中，<code>::v-deep</code> 是推荐用法</li>\n<li>这些选择器仅在使用 scoped 样式时才需要</li>\n</ol>\n<h2>示例</h2>\n<pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">style</span> <span class="hljs-attr">scoped</span>&gt;</span><span class="language-css">\n  <span class="hljs-comment">/* Vue 3 推荐 */</span>\n  :<span class="hljs-built_in">deep</span>(.child-component) {\n    <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#f0f0f0</span>;\n  }\n\n  <span class="hljs-comment">/* Vue 2 推荐 */</span>\n  ::v-deep .child-component {\n    <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>;\n  }\n</span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>\n</code></pre>\n<p>选择哪种写法取决于你使用的 Vue 版本和 CSS 预处理器。</p>\n</div>'</script></body></html>
