<script>
            document.getElementById('article').innerHTML = 
            "<div><p>React 的事件机制主要包括事件注册和事件分发两个核心部分，以下是详细的解析：</p>\n<h3>一、事件注册</h3>\n<ol>\n<li><strong>事件绑定位置</strong>  ：\n<ul>\n<li>在 React 中，事件并没有直接绑定到具体的 DOM 节点上，而是绑定在了 <code>document</code> 上（React 17 之后是绑定在 <code>#root</code> 节点上）。这种方式被称为<strong>事件委托</strong>  。</li>\n<li>通过事件委托，React 可以减少内存消耗，提升性能，因为一种事件类型只需要在 <code>document</code> 上注册一次。</li>\n</ul>\n</li>\n<li><strong>注册过程</strong>  ：\n<ul>\n<li>当组件挂载时，React 会根据组件内声明的事件类型（如 <code>onClick</code>、<code>onChange</code> 等），在 <code>document</code> 上添加相应的事件监听器，并指定统一的事件处理程序 <code>dispatchEvent</code>。</li>\n<li>React 会将所有的事件和事件类型以及 React 组件进行关联，并将这个关系保存在一个对象中（键值对），以便在事件触发时能够查找到对应的事件处理函数。</li>\n</ul>\n</li>\n<li><strong>事件存储</strong>  ：\n<ul>\n<li>React 会将事件处理函数存储在一个名为 <code>listenerBank</code> 的对象中，以便在事件触发时能够快速地查找到并执行。</li>\n</ul>\n</li>\n</ol>\n<h3>二、事件分发</h3>\n<ol>\n<li><strong>事件触发</strong>  ：\n<ul>\n<li>当用户在浏览器中与页面进行交互时，会触发原生的 DOM 事件。</li>\n<li>这些原生事件会被 React 捕获，并从原生事件中获取到原生节点。</li>\n</ul>\n</li>\n<li><strong>事件合成</strong>  ：\n<ul>\n<li>React 会根据原生事件生成一个<strong>合成事件</strong>  （<code>SyntheticEvent</code>）。合成事件是 React 对原生事件的封装，它提供了跨浏览器的兼容性，并增加了额外的功能和优化。</li>\n<li>合成事件对象会被重用，所有属性在事件处理函数执行后会被置为 <code>null</code>，以节省内存。如果需要保留事件对象的属性，可以调用 <code>event.persist()</code> 方法。</li>\n</ul>\n</li>\n<li><strong>事件分发</strong>  ：\n<ul>\n<li>React 会根据事件触发的原生节点，找到对应的 React 组件实例。</li>\n<li>然后，React 会从 <code>listenerBank</code> 中查找到该组件实例上注册的事件处理函数，并按照冒泡或捕获的顺序依次执行它们。</li>\n<li>事件处理函数会接收到一个合成事件对象作为参数，该对象包含了与原生事件相关的所有信息。</li>\n</ul>\n</li>\n<li><strong>事件冒泡与捕获</strong>  ：\n<ul>\n<li>React 的合成事件默认只支持事件冒泡。如果需要捕获阶段的事件处理，可以使用原生的 <code>addEventListener</code> 方法进行注册。</li>\n<li>原生事件阻止冒泡会阻止合成事件的触发，但合成事件的阻止冒泡不会影响原生事件。因此，建议尽量不要混合使用原生事件和合成事件。</li>\n</ul>\n</li>\n</ol>\n<h3>三、总结</h3>\n<p>React 的事件机制通过事件委托和事件合成等方式，实现了高效的事件处理和跨浏览器的兼容性。事件注册阶段将事件绑定到 <code>document</code> 上，并存储在 <code>listenerBank</code> 中；事件分发阶段则根据触发的事件类型和目标节点，查找到对应的事件处理函数并执行。这种机制减少了内存消耗，提升了性能，并对开发者更加友好。</p>\n</div>";
          </script></body></html>
