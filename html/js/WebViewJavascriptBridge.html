<script>
            document.getElementById('article').innerHTML = 
            "<div><p><code>window.WebViewJavascriptBridge</code> 是 WebViewJavascriptBridge 库在 JavaScript 环境中用于与原生应用进行通信的核心对象。以下是对其配置的详细解释：</p>\n<h3>一、初始化</h3>\n<p>在使用 <code>window.WebViewJavascriptBridge</code> 之前，必须确保桥接对象已经初始化。通常，这需要在 WebView 加载完成后进行。初始化代码通常如下：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">setupWebViewJavascriptBridge</span>(<span class=\"hljs-params\">callback</span>) {\n  <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">WebViewJavascriptBridge</span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">callback</span>(<span class=\"hljs-title class_\">WebViewJavascriptBridge</span>);\n  }\n  <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">WVJBCallbacks</span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">WVJBCallbacks</span>.<span class=\"hljs-title function_\">push</span>(callback);\n  }\n  <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">WVJBCallbacks</span> = [callback];\n  <span class=\"hljs-keyword\">var</span> <span class=\"hljs-title class_\">WVJBIframe</span> = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">&#x27;iframe&#x27;</span>);\n  <span class=\"hljs-title class_\">WVJBIframe</span>.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">display</span> = <span class=\"hljs-string\">&#x27;none&#x27;</span>;\n  <span class=\"hljs-title class_\">WVJBIframe</span>.<span class=\"hljs-property\">src</span> = <span class=\"hljs-string\">&#x27;https://__bridge_loaded__&#x27;</span>; <span class=\"hljs-comment\">// 或 &#x27;wvjbscheme://__BRIDGE_LOADED__&#x27;</span>\n  <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">documentElement</span>.<span class=\"hljs-title function_\">appendChild</span>(<span class=\"hljs-title class_\">WVJBIframe</span>);\n  <span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-property\">documentElement</span>.<span class=\"hljs-title function_\">removeChild</span>(<span class=\"hljs-title class_\">WVJBIframe</span>);\n  }, <span class=\"hljs-number\">0</span>);\n}\n\n<span class=\"hljs-title function_\">setupWebViewJavascriptBridge</span>(<span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">bridge</span>) {\n  <span class=\"hljs-comment\">// 初始化完成后，bridge 对象即可用于与原生应用通信</span>\n  <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">WebViewJavascriptBridge</span> = bridge;\n});\n</code></pre>\n<h3>二、注册处理器</h3>\n<p>通过 <code>registerHandler</code> 方法，可以在 JavaScript 中注册一个处理器，用于接收来自原生应用的消息。处理器的名称需要与原生应用中注册的处理器名称一致。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">WebViewJavascriptBridge</span>.<span class=\"hljs-title function_\">registerHandler</span>(<span class=\"hljs-string\">&#x27;handlerName&#x27;</span>, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">data, responseCallback</span>) {\n  <span class=\"hljs-comment\">// 处理来自原生应用的消息</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Received data from native:&#x27;</span>, data);\n\n  <span class=\"hljs-comment\">// 如果需要，可以向原生应用返回结果</span>\n  <span class=\"hljs-title function_\">responseCallback</span>(<span class=\"hljs-string\">&#x27;Response from JS&#x27;</span>);\n});\n</code></pre>\n<h3>三、发送消息</h3>\n<p>使用 <code>callHandler</code> 方法，可以向原生应用发送消息。需要指定原生应用中注册的处理器名称，以及要发送的数据。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">WebViewJavascriptBridge</span>.<span class=\"hljs-title function_\">callHandler</span>(<span class=\"hljs-string\">&#x27;nativeHandler&#x27;</span>, { <span class=\"hljs-attr\">key</span>: <span class=\"hljs-string\">&#x27;value&#x27;</span> }, <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">responseData</span>) {\n  <span class=\"hljs-comment\">// 处理原生应用返回的结果</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Response from native:&#x27;</span>, responseData);\n});\n</code></pre>\n<h3>四、默认处理器</h3>\n<p>可以设置一个默认处理器，用于处理未明确指定处理器的消息。这通常用于处理一些通用的或未预料的消息。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">WebViewJavascriptBridge</span>.<span class=\"hljs-title function_\">setDefaultHandler</span>(<span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">data, responseCallback</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;Default handler received data:&#x27;</span>, data);\n  <span class=\"hljs-title function_\">responseCallback</span>(<span class=\"hljs-string\">&#x27;Default response from JS&#x27;</span>);\n});\n</code></pre>\n<h3>五、注意事项</h3>\n<ol>\n<li><strong>初始化顺序</strong>  ：确保在 WebView 加载完成后初始化 <code>window.WebViewJavascriptBridge</code>。</li>\n<li><strong>处理器名称</strong>  ：JavaScript 和原生应用中注册的处理器名称必须一致。</li>\n<li><strong>消息格式</strong>  ：发送和接收的消息可以是字符串、对象或其他数据类型，但建议统一格式以便于处理。</li>\n<li><strong>错误处理</strong>  ：在回调函数中实现错误处理逻辑，以应对可能的通信错误。</li>\n</ol>\n<h3>六、应用场景</h3>\n<p><code>window.WebViewJavascriptBridge</code> 广泛应用于混合应用开发中，特别是当需要在 WebView 中显示网页内容，并与原生应用进行交互时。通过该桥接对象，可以实现网页与原生应用之间的数据传递、事件通知等功能。</p>\n</div>";
          </script></body></html>
