<script>
            document.getElementById('article').innerHTML = 
            "<div><p>PM2 是一个流行的 Node.js 进程管理器，其负载均衡功能主要通过 <strong>Cluster 模式</strong>   实现。以下是 PM2 负载均衡的详细工作原理：</p>\n<h2>1. 核心机制：Cluster 模式</h2>\n<p>PM2 利用 Node.js 内置的 <code>cluster</code> 模块实现负载均衡：</p>\n<ul>\n<li><strong>主进程 (Master)</strong>  ：负责管理和调度</li>\n<li><strong>子进程 (Worker)</strong>  ：多个独立 Node.js 实例处理请求</li>\n</ul>\n<h2>2. 工作流程</h2>\n<ol>\n<li><strong>进程创建</strong>  ：\n<ul>\n<li>主进程 fork 出多个 Worker 进程</li>\n<li>每个 Worker 运行相同的应用代码</li>\n<li>Worker 共享服务器端口（由主进程统一绑定）</li>\n</ul>\n</li>\n<li><strong>请求分发</strong>  ：\n<ul>\n<li>主进程监听端口，接收所有传入请求</li>\n<li>使用 <strong>Round-Robin 轮询算法</strong>   将请求分配给 Worker</li>\n<li>每个 Worker 独立处理分配到的请求</li>\n</ul>\n</li>\n<li><strong>负载监控</strong>  ：\n<ul>\n<li>PM2 持续监控各 Worker 的资源使用情况</li>\n<li>可根据负载自动调整进程数量</li>\n</ul>\n</li>\n</ol>\n<h2>3. 关键特性</h2>\n<ul>\n<li><strong>自动重启</strong>  ：崩溃的 Worker 会被立即重启</li>\n<li><strong>零停机重启</strong>  ：<code>pm2 reload</code> 实现无缝更新</li>\n<li><strong>动态扩展</strong>  ：可随时增减 Worker 数量</li>\n<li><strong>日志聚合</strong>  ：所有 Worker 日志统一管理</li>\n</ul>\n<h2>4. 配置方式</h2>\n<pre><code class=\"language-sh\"><span class=\"hljs-comment\"># 启动4个Worker进程</span>\npm2 start app.js -i 4\n\n<span class=\"hljs-comment\"># 动态调整Worker数量</span>\npm2 scale app +2  <span class=\"hljs-comment\"># 增加2个</span>\npm2 scale app 8   <span class=\"hljs-comment\"># 设为8个</span>\n\n<span class=\"hljs-comment\"># 最大内存限制(自动重启超限Worker)</span>\npm2 start app.js -i max --max-memory-restart 200M\n</code></pre>\n<h2>5. 适用场景</h2>\n<ul>\n<li><strong>CPU密集型应用</strong>  ：Node.js单线程限制，多进程可充分利用多核CPU</li>\n<li><strong>高可用服务</strong>  ：单个Worker崩溃不影响整体服务</li>\n<li><strong>Web服务器</strong>  ：HTTP/HTTPS/WebSocket服务</li>\n</ul>\n<h2>6. 性能考量</h2>\n<ul>\n<li><strong>进程通信</strong>  ：Worker间不共享内存，需通过IPC通信</li>\n<li><strong>内存占用</strong>  ：每个Worker独立V8实例，内存开销较大</li>\n<li><strong>最佳实践</strong>  ：Worker数量通常设为CPU核心数或略多</li>\n</ul>\n<p>PM2的负载均衡是进程级的解决方案，适合单机多核环境。对于跨机器负载均衡，建议结合Nginx等反向代理使用。</p>\n</div>";
          </script></body></html>
