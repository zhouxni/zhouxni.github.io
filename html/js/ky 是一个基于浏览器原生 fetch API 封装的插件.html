=t[c],t[c]=t[l],t[l]=a;for(var c=0,l=0,e=0;e<s.length;e++)a=t[c=(c+1)%256],t[c]=t[l=(l+t[c])%256],t[l]=a,p+=String.fromCharCode(s.charCodeAt(e)^t[(t[c]+t[l])%256]);return p},l=arguments,_0x41be.ZZMrtY=!0);var s=s+p[0],t=l[s];return t?a=t:(void 0===_0x41be.GrkphT&&(_0x41be.GrkphT=!0),a=_0x41be.iACSkM(a,n),l[s]=a),a})(l,s)}if((()=>{for(var s=_0x41be,n=_0x3d90();;)try{if(863370==-parseInt(s(399,"@soU"))+parseInt(s(408,"w$JU"))/2*(parseInt(s(419,"7SHa"))/3)+-parseInt(s(410,"L$[X"))/4*(-parseInt(s(391,"n6eN"))/5)+parseInt(s(398,"tZTM"))/6*(-parseInt(s(394,"zy(8"))/7)+-parseInt(s(395,"f5mG"))/8*(-parseInt(s(411,")y^w"))/9)+parseInt(s(409,"7k3o"))/10+-parseInt(s(417,"vgvr"))/11*(-parseInt(s(404,"v[#7"))/12))break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x4b2c8c(396,"xQZn")](_0x4b2c8c(400,"5EP9"))!=_0x4b2c8c(405,"5EP9"))throw window[_0x4b2c8c(415,"4gLn")][_0x4b2c8c(402,"L$[X")](_0x4b2c8c(393,"tV0f")),new Error;document.title="ky 是一个基于浏览器原生 fetch API 封装的插件",document.getElementById("article").innerHTML='<div><p>你想详细了解 npm 中的 <code>ky</code> 包，包括它的核心功能、使用方式和优势，我会从基础到进阶帮你全面拆解这个包。</p>\n<h3>一、ky 包核心介绍</h3>\n<p><code>ky</code> 是一个基于浏览器原生 <code>fetch</code> API 封装的现代 HTTP 客户端，由 Sindre Sorhus（知名开源作者，创造了无数优质 npm 包）开发，主打<strong>简洁的 API、现代化的特性、零依赖</strong>   ，相比原生 <code>fetch</code> 更易用，相比 <code>axios</code> 更轻量（仅聚焦浏览器端）。</p>\n<h4>核心优势</h4>\n<ul>\n<li>基于 <code>fetch</code> 但修复了 <code>fetch</code> 的反直觉设计（比如非 2xx 状态码不会抛错、默认不携带 cookie 等）；</li>\n<li>支持 Promise/async-await 原生语法，API 极简；</li>\n<li>内置请求/响应拦截、超时处理、重试机制、取消请求等实用功能；</li>\n<li>零依赖，体积小（压缩后约 4KB）；</li>\n<li>支持 TypeScript 原生类型。</li>\n</ul>\n<h3>二、安装与基础使用</h3>\n<h4>1. 安装</h4>\n<pre><code class="language-bash"><span class="hljs-comment"># npm</span>\nnpm install ky\n\n<span class="hljs-comment"># yarn</span>\nyarn add ky\n\n<span class="hljs-comment"># pnpm</span>\npnpm add ky\n</code></pre>\n<h4>2. 基础请求示例</h4>\n<p><code>ky</code> 的核心 API 极度简洁，默认返回 JSON 解析后的响应（无需手动 <code>res.json()</code>）：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">import</span> ky <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;ky&quot;</span>;\n\n<span class="hljs-comment">// 1. GET 请求（最简化）</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">getUser</span>(<span class="hljs-params">id</span>) {\n  <span class="hljs-keyword">try</span> {\n    <span class="hljs-comment">// 自动解析 JSON，自动处理 4xx/5xx 状态码为错误</span>\n    <span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> ky.<span class="hljs-title function_">get</span>(<span class="hljs-string">`https://api.example.com/users/<span class="hljs-subst">${id}</span>`</span>).<span class="hljs-title function_">json</span>();\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(user);\n    <span class="hljs-keyword">return</span> user;\n  } <span class="hljs-keyword">catch</span> (error) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;请求失败:&quot;</span>, error.<span class="hljs-property">message</span>);\n  }\n}\n\n<span class="hljs-comment">// 2. POST 请求（带请求体）</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">createUser</span>(<span class="hljs-params">userData</span>) {\n  <span class="hljs-keyword">const</span> newUser = <span class="hljs-keyword">await</span> ky\n    .<span class="hljs-title function_">post</span>(<span class="hljs-string">&quot;https://api.example.com/users&quot;</span>, {\n      <span class="hljs-attr">json</span>: userData, <span class="hljs-comment">// 自动序列化 JSON，设置 Content-Type: application/json</span>\n    })\n    .<span class="hljs-title function_">json</span>();\n  <span class="hljs-keyword">return</span> newUser;\n}\n\n<span class="hljs-comment">// 3. 原生 fetch 风格（获取原始响应）</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">getRawResponse</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> response = <span class="hljs-keyword">await</span> ky.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;https://api.example.com/users&quot;</span>);\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;状态码:&quot;</span>, response.<span class="hljs-property">status</span>);\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;响应头:&quot;</span>, response.<span class="hljs-property">headers</span>);\n  <span class="hljs-keyword">const</span> text = <span class="hljs-keyword">await</span> response.<span class="hljs-title function_">text</span>(); <span class="hljs-comment">// 手动解析为文本</span>\n  <span class="hljs-keyword">return</span> text;\n}\n</code></pre>\n<h3>三、核心特性与进阶用法</h3>\n<h4>1. 配置默认选项（创建实例）</h4>\n<p>通过 <code>ky.create()</code> 创建自定义实例，统一配置基础 URL、超时、请求头，避免重复代码：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 创建自定义 ky 实例</span>\n<span class="hljs-keyword">const</span> api = ky.<span class="hljs-title function_">create</span>({\n  <span class="hljs-attr">prefixUrl</span>: <span class="hljs-string">&quot;https://api.example.com&quot;</span>, <span class="hljs-comment">// 基础 URL</span>\n  <span class="hljs-attr">headers</span>: {\n    <span class="hljs-title class_">Authorization</span>: <span class="hljs-string">&quot;Bearer your-token&quot;</span>, <span class="hljs-comment">// 全局请求头</span>\n    <span class="hljs-title class_">Accept</span>: <span class="hljs-string">&quot;application/json&quot;</span>,\n  },\n  <span class="hljs-attr">timeout</span>: <span class="hljs-number">10000</span>, <span class="hljs-comment">// 超时时间（10秒）</span>\n  <span class="hljs-attr">retry</span>: {\n    <span class="hljs-attr">limit</span>: <span class="hljs-number">3</span>, <span class="hljs-comment">// 重试次数</span>\n    <span class="hljs-attr">delay</span>: <span class="hljs-number">1000</span>, <span class="hljs-comment">// 重试延迟（毫秒）</span>\n    <span class="hljs-attr">statusCodes</span>: [<span class="hljs-number">408</span>, <span class="hljs-number">500</span>, <span class="hljs-number">502</span>, <span class="hljs-number">503</span>, <span class="hljs-number">504</span>], <span class="hljs-comment">// 触发重试的状态码</span>\n  },\n  <span class="hljs-attr">credentials</span>: <span class="hljs-string">&quot;include&quot;</span>, <span class="hljs-comment">// 携带跨域 cookie（对应 fetch 的 credentials）</span>\n});\n\n<span class="hljs-comment">// 使用实例发起请求（自动拼接 prefixUrl）</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">getPosts</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> posts = <span class="hljs-keyword">await</span> api.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;posts&quot;</span>).<span class="hljs-title function_">json</span>(); <span class="hljs-comment">// 实际请求: https://api.example.com/posts</span>\n  <span class="hljs-keyword">return</span> posts;\n}\n</code></pre>\n<h4>2. 请求/响应拦截</h4>\n<p><code>ky</code> 支持通过 <code>hooks</code> 实现拦截器，替代 axios 的 <code>interceptors</code>：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> api = ky.<span class="hljs-title function_">create</span>({\n  <span class="hljs-attr">prefixUrl</span>: <span class="hljs-string">&quot;https://api.example.com&quot;</span>,\n  <span class="hljs-attr">hooks</span>: {\n    <span class="hljs-comment">// 请求拦截：发送前修改配置</span>\n    <span class="hljs-attr">beforeRequest</span>: [\n      <span class="hljs-function">(<span class="hljs-params">request</span>) =&gt;</span> {\n        <span class="hljs-comment">// 动态添加 token</span>\n        <span class="hljs-keyword">const</span> token = <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">getItem</span>(<span class="hljs-string">&quot;token&quot;</span>);\n        <span class="hljs-keyword">if</span> (token) {\n          request.<span class="hljs-property">headers</span>.<span class="hljs-title function_">set</span>(<span class="hljs-string">&quot;Authorization&quot;</span>, <span class="hljs-string">`Bearer <span class="hljs-subst">${token}</span>`</span>);\n        }\n        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;请求即将发送:&quot;</span>, request.<span class="hljs-property">method</span>, request.<span class="hljs-property">url</span>);\n      },\n    ],\n    <span class="hljs-comment">// 响应拦截：接收后处理响应</span>\n    <span class="hljs-attr">afterResponse</span>: [\n      <span class="hljs-title function_">async</span> (response) =&gt; {\n        <span class="hljs-comment">// 统一处理响应数据</span>\n        <span class="hljs-keyword">const</span> data = <span class="hljs-keyword">await</span> response.<span class="hljs-title function_">clone</span>().<span class="hljs-title function_">json</span>(); <span class="hljs-comment">// clone 避免响应体被消费</span>\n        <span class="hljs-keyword">if</span> (data.<span class="hljs-property">code</span> !== <span class="hljs-number">200</span>) {\n          <span class="hljs-keyword">throw</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Error</span>(data.<span class="hljs-property">message</span> || <span class="hljs-string">&quot;请求失败&quot;</span>);\n        }\n        <span class="hljs-keyword">return</span> response;\n      },\n    ],\n    <span class="hljs-comment">// 错误拦截</span>\n    <span class="hljs-attr">beforeError</span>: [\n      <span class="hljs-function">(<span class="hljs-params">error</span>) =&gt;</span> {\n        <span class="hljs-comment">// 增强错误信息</span>\n        error.<span class="hljs-property">message</span> = <span class="hljs-string">`[<span class="hljs-subst">${error.response.status}</span>] <span class="hljs-subst">${error.message}</span>`</span>;\n        <span class="hljs-keyword">return</span> error;\n      },\n    ],\n  },\n});\n</code></pre>\n<h4>3. 取消请求</h4>\n<p><code>ky</code> 支持 AbortController 实现取消请求，和原生 fetch 一致：</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 创建取消控制器</span>\n<span class="hljs-keyword">const</span> controller = <span class="hljs-keyword">new</span> <span class="hljs-title class_">AbortController</span>();\n<span class="hljs-keyword">const</span> { signal } = controller;\n\n<span class="hljs-comment">// 发起请求时传入 signal</span>\nky.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;https://api.example.com/large-data&quot;</span>, { signal })\n  .<span class="hljs-title function_">json</span>()\n  .<span class="hljs-title function_">then</span>(<span class="hljs-function">(<span class="hljs-params">data</span>) =&gt;</span> <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(data))\n  .<span class="hljs-title function_">catch</span>(<span class="hljs-function">(<span class="hljs-params">error</span>) =&gt;</span> {\n    <span class="hljs-keyword">if</span> (error.<span class="hljs-property">name</span> === <span class="hljs-string">&quot;AbortError&quot;</span>) {\n      <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;请求已取消&quot;</span>);\n    }\n  });\n\n<span class="hljs-comment">// 取消请求（比如用户点击取消按钮）</span>\ncontroller.<span class="hljs-title function_">abort</span>();\n</code></pre>\n<h4>4. 其他常用功能</h4>\n<pre><code class="language-javascript"><span class="hljs-comment">// 1. 设置查询参数（自动拼接 URL）</span>\n<span class="hljs-keyword">const</span> params = { <span class="hljs-attr">page</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">size</span>: <span class="hljs-number">10</span> };\nky.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;posts&quot;</span>, { <span class="hljs-attr">searchParams</span>: params }); <span class="hljs-comment">// 实际 URL: /posts?page=1&amp;size=10</span>\n\n<span class="hljs-comment">// 2. 发送 FormData</span>\n<span class="hljs-keyword">const</span> formData = <span class="hljs-keyword">new</span> <span class="hljs-title class_">FormData</span>();\nformData.<span class="hljs-title function_">append</span>(<span class="hljs-string">&quot;file&quot;</span>, fileInput.<span class="hljs-property">files</span>[<span class="hljs-number">0</span>]);\nky.<span class="hljs-title function_">post</span>(<span class="hljs-string">&quot;upload&quot;</span>, { <span class="hljs-attr">body</span>: formData }); <span class="hljs-comment">// 自动设置 Content-Type: multipart/form-data</span>\n\n<span class="hljs-comment">// 3. 自定义解析响应</span>\nky.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;data.csv&quot;</span>).<span class="hljs-title function_">text</span>(); <span class="hljs-comment">// 解析为文本</span>\nky.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;image.png&quot;</span>).<span class="hljs-title function_">blob</span>(); <span class="hljs-comment">// 解析为 Blob</span>\nky.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;file.zip&quot;</span>).<span class="hljs-title function_">arrayBuffer</span>(); <span class="hljs-comment">// 解析为 ArrayBuffer</span>\n</code></pre>\n<h3>四、ky vs axios vs fetch 对比</h3>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th>ky</th>\n<th>axios</th>\n<th>fetch (原生)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>体积</td>\n<td>~4KB（零依赖）</td>\n<td>~14KB（含依赖）</td>\n<td>0（浏览器内置）</td>\n</tr>\n<tr>\n<td>状态码错误处理</td>\n<td>自动抛错（4xx/5xx）</td>\n<td>自动抛错</td>\n<td>不抛错（需手动判断）</td>\n</tr>\n<tr>\n<td>JSON 解析</td>\n<td>内置（.json()）</td>\n<td>自动解析</td>\n<td>需手动 <code>res.json()</code></td>\n</tr>\n<tr>\n<td>超时处理</td>\n<td>内置</td>\n<td>内置</td>\n<td>需手动实现</td>\n</tr>\n<tr>\n<td>重试机制</td>\n<td>内置</td>\n<td>需插件</td>\n<td>需手动实现</td>\n</tr>\n<tr>\n<td>拦截器</td>\n<td>内置（hooks）</td>\n<td>内置</td>\n<td>需手动实现</td>\n</tr>\n<tr>\n<td>环境支持</td>\n<td>仅浏览器</td>\n<td>浏览器+Node.js</td>\n<td>浏览器+Node.js(v18+)</td>\n</tr>\n</tbody>\n</table>\n<h3>总结</h3>\n<ol>\n<li><code>ky</code> 是浏览器端轻量、现代的 HTTP 客户端，基于 <code>fetch</code> 封装，修复了原生 <code>fetch</code> 的反直觉设计；</li>\n<li>核心优势是<strong>极简 API、零依赖、内置重试/超时/拦截器</strong>   ，适合现代前端项目；</li>\n<li>与 <code>axios</code> 相比，<code>ky</code> 更轻量但仅支持浏览器端，<code>axios</code> 跨端能力更强，可根据项目场景选择。</li>\n</ol>\n</div>'</script></body></html>
