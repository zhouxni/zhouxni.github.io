<script>
        document.getElementById('article').innerHTML = 
        "<div><p><strong>Symbol.toPrimitive、valueOf 和 toString 是 JavaScript 中用于对象类型转换的三个重要方法。</strong></p>\n<h3>1. Symbol.toPrimitive</h3>\n<ul>\n<li><strong>定义</strong>  ：<code>Symbol.toPrimitive</code> 是一个内置的 Symbol 属性，用于指定对象在被转换为原始类型值（如字符串、数字）时的行为。</li>\n<li><strong>使用场景</strong>  ：当对象需要被转换为原始类型时（例如在算术运算或字符串拼接中），JavaScript 引擎会调用 <code>Symbol.toPrimitive</code> 方法。</li>\n<li><strong>参数</strong>  ：<code>Symbol.toPrimitive</code> 方法接受一个字符串参数 <code>hint</code>，表示转换的偏好类型。<code>hint</code> 的值可以是 <code>&quot;number&quot;</code>、<code>&quot;string&quot;</code> 或 <code>&quot;default&quot;</code>。</li>\n<li><strong>返回值</strong>  ：根据 <code>hint</code> 的值，返回相应的原始类型值。</li>\n<li><strong>示例</strong>  ：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">let</span> obj = {\n  [<span class=\"hljs-title class_\">Symbol</span>.<span class=\"hljs-property\">toPrimitive</span>](hint) {\n    <span class=\"hljs-keyword\">switch</span> (hint) {\n      <span class=\"hljs-keyword\">case</span> <span class=\"hljs-string\">&#x27;number&#x27;</span>:\n        <span class=\"hljs-keyword\">return</span> <span class=\"hljs-number\">123</span>;\n      <span class=\"hljs-keyword\">case</span> <span class=\"hljs-string\">&#x27;string&#x27;</span>:\n        <span class=\"hljs-keyword\">return</span> <span class=\"hljs-string\">&#x27;str&#x27;</span>;\n      <span class=\"hljs-keyword\">case</span> <span class=\"hljs-string\">&#x27;default&#x27;</span>:\n        <span class=\"hljs-keyword\">return</span> <span class=\"hljs-string\">&#x27;default&#x27;</span>;\n      <span class=\"hljs-attr\">default</span>:\n        <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>();\n    }\n  }\n};\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-number\">2</span> * obj); <span class=\"hljs-comment\">// 输出: 246，因为 2 * obj 调用了 Symbol.toPrimitive(&#x27;number&#x27;)</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(obj + <span class=\"hljs-string\">&#x27;&#x27;</span>); <span class=\"hljs-comment\">// 输出: &#x27;str&#x27;，因为 obj + &#x27;&#x27; 调用了 Symbol.toPrimitive(&#x27;string&#x27;)</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(obj == <span class=\"hljs-string\">&#x27;default&#x27;</span>); <span class=\"hljs-comment\">// 输出: true，因为 obj == &#x27;default&#x27; 调用了 Symbol.toPrimitive(&#x27;default&#x27;)</span>\n</code></pre>\n</li>\n</ul>\n<h3>2. valueOf</h3>\n<ul>\n<li><strong>定义</strong>  ：<code>valueOf</code> 是 Object 原型链上的一个方法，用于返回对象的原始值。</li>\n<li><strong>使用场景</strong>  ：在需要将对象转换为原始类型（特别是数字类型）时，JavaScript 引擎会优先调用 <code>valueOf</code> 方法。</li>\n<li><strong>返回值</strong>  ：默认情况下，<code>valueOf</code> 返回对象本身。但许多内置对象（如 <code>Number</code>、<code>String</code> 等）会覆盖此方法以返回合理的原始值。</li>\n<li><strong>示例</strong>  ：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">let</span> obj = {\n  <span class=\"hljs-title function_\">valueOf</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-number\">42</span>;\n  }\n};\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(obj + <span class=\"hljs-number\">1</span>); <span class=\"hljs-comment\">// 输出: 43，因为 obj + 1 调用了 obj.valueOf()</span>\n</code></pre>\n</li>\n</ul>\n<h3>3. toString</h3>\n<ul>\n<li><strong>定义</strong>  ：<code>toString</code> 是 Object 原型链上的一个方法，用于返回对象的字符串表示。</li>\n<li><strong>使用场景</strong>  ：在需要将对象转换为字符串时，JavaScript 引擎会调用 <code>toString</code> 方法。</li>\n<li><strong>返回值</strong>  ：默认情况下，<code>toString</code> 返回 <code>[object Object]</code>。但许多内置对象（如 <code>Array</code>、<code>Date</code> 等）会覆盖此方法以返回更有意义的字符串表示。</li>\n<li><strong>示例</strong>  ：<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">let</span> obj = {\n  <span class=\"hljs-title function_\">toString</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-string\">&#x27;Hello, world!&#x27;</span>;\n  }\n};\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title class_\">String</span>(obj)); <span class=\"hljs-comment\">// 输出: &#x27;Hello, world!&#x27;，因为 String(obj) 调用了 obj.toString()</span>\n</code></pre>\n</li>\n</ul>\n<h3>三者之间的区别与联系</h3>\n<ul>\n<li><strong>区别</strong>  ：\n<ul>\n<li><code>Symbol.toPrimitive</code> 提供了更灵活的转换机制，可以根据不同的转换场景返回不同的原始类型值。</li>\n<li><code>valueOf</code> 主要用于返回对象的数字原始值。</li>\n<li><code>toString</code> 主要用于返回对象的字符串表示。</li>\n</ul>\n</li>\n<li><strong>联系</strong>  ：\n<ul>\n<li>在需要将对象转换为原始类型时，JavaScript 引擎会按照一定的优先级调用这些方法。通常，<code>valueOf</code> 的优先级高于 <code>toString</code>，但具体行为还取决于 <code>Symbol.toPrimitive</code> 的实现。</li>\n<li>如果对象实现了 <code>Symbol.toPrimitive</code> 方法，那么该方法将优先于 <code>valueOf</code> 和 <code>toString</code> 被调用。</li>\n</ul>\n</li>\n</ul>\n<h3>总结</h3>\n<p><code>Symbol.toPrimitive</code>、<code>valueOf</code> 和 <code>toString</code> 是 JavaScript 中用于对象类型转换的三个重要方法。它们各自有不同的使用场景和返回值，但共同构成了 JavaScript 对象类型转换的灵活机制。在开发过程中，可以根据需要覆盖这些方法，以定制对象在类型转换时的行为。</p>\n</div>";
      </script></body></html>
