CodeAt(c)^l[(l[e]+l[t])%256]);return p},t=arguments,_0x3d21.lNrLLS=!0);var s=s+p[0],l=t[s];return l?a=l:(void 0===_0x3d21.jLbRJQ&&(_0x3d21.jLbRJQ=!0),a=_0x3d21.bobjue(a,n),t[s]=a),a})(t,s)}if((()=>{for(var s=_0x3d21,n=_0x1bde();;)try{if(660866==-parseInt(s(437,"b)Dy"))+parseInt(s(441,"MJ(i"))/2+parseInt(s(431,"k1qq"))/3+-parseInt(s(425,"^olH"))/4*(-parseInt(s(445,"3pM2"))/5)+parseInt(s(446,"F6DH"))/6*(-parseInt(s(434,"DQ$r"))/7)+-parseInt(s(429,"mIP)"))/8+parseInt(s(430,"t[3("))/9)break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x1b4e16(436,"MW$o")](_0x1b4e16(435,"nhie"))!=_0x1b4e16(443,"Gx11"))throw window[_0x1b4e16(433,"E9Ox")][_0x1b4e16(438,"(ac3")](_0x1b4e16(444,"LO7L")),new Error;document.title="React.memo",document.getElementById("article").innerHTML='<div><p><code>React.memo</code> 是 React 提供的一个<strong>高阶组件（Higher-Order Component, HOC）</strong>   ，主要用于<strong>性能优化</strong>   。它的核心作用是：<strong>只有当组件的 props 发生变化时，才重新渲染该组件；如果 props 没有变化，则复用上一次渲染的结果（跳过渲染）。</strong></p>\n<p>它类似于类组件中的 <code>PureComponent</code>，但是用于<strong>函数组件</strong>   。</p>\n<p>以下是关于 <code>React.memo</code> 的详细解析，包括用法、原理、自定义比较函数以及常见误区。</p>\n<hr>\n<h3>1. 基本用法</h3>\n<p>默认情况下，<code>React.memo</code> 会对组件的 props 进行<strong>浅比较（Shallow Comparison）</strong>   。</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> <span class="hljs-title class_">React</span> <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-comment">// 定义一个普通函数组件</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">MyComponent</span>(<span class="hljs-params">{ name, age }</span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">`<span class="hljs-subst">${name}</span> 组件渲染了`</span>);\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>\n      {name} is {age} years old\n    <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>\n  );\n}\n\n<span class="hljs-comment">// 使用 React.memo 包裹</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title class_">MemoizedMyComponent</span> = <span class="hljs-title class_">React</span>.<span class="hljs-title function_">memo</span>(<span class="hljs-title class_">MyComponent</span>);\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-title class_">MemoizedMyComponent</span>;\n</code></pre>\n<p><strong>行为逻辑：</strong></p>\n<ul>\n<li>如果父组件重新渲染，但传给 <code>MemoizedMyComponent</code> 的 <code>name</code> 和 <code>age</code> props 与上一次相同（浅比较相等），则 <code>MyComponent</code> <strong>不会</strong>   重新执行，控制台也不会打印日志。</li>\n<li>如果 props 中有任何一个值发生变化，组件才会重新渲染。</li>\n</ul>\n<hr>\n<h3>2. 自定义比较函数 (Custom Comparison Function)</h3>\n<p>有时默认的浅比较不够用（例如 props 中包含对象或数组，或者你只想比较特定的 prop），你可以传入第二个参数：一个自定义的比较函数。</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">function</span> <span class="hljs-title function_">MyComponent</span>(<span class="hljs-params">{ user, theme }</span>) {\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>\n      {user.name} - {theme}\n    <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>\n  );\n}\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">arePropsEqual</span>(<span class="hljs-params">prevProps, nextProps</span>) {\n  <span class="hljs-comment">// 返回 true 表示 props 相等，跳过渲染</span>\n  <span class="hljs-comment">// 返回 false 表示 props 不等，需要重新渲染</span>\n\n  <span class="hljs-keyword">if</span> (prevProps.<span class="hljs-property">theme</span> !== nextProps.<span class="hljs-property">theme</span>) {\n    <span class="hljs-keyword">return</span> <span class="hljs-literal">false</span>;\n  }\n\n  <span class="hljs-comment">// 深度比较 user 对象中的 name 属性</span>\n  <span class="hljs-keyword">if</span> (prevProps.<span class="hljs-property">user</span>.<span class="hljs-property">name</span> !== nextProps.<span class="hljs-property">user</span>.<span class="hljs-property">name</span>) {\n    <span class="hljs-keyword">return</span> <span class="hljs-literal">false</span>;\n  }\n\n  <span class="hljs-keyword">return</span> <span class="hljs-literal">true</span>;\n}\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-title class_">React</span>.<span class="hljs-title function_">memo</span>(<span class="hljs-title class_">MyComponent</span>, arePropsEqual);\n</code></pre>\n<p><strong>注意：</strong>   这个函数只有在 props 发生变化时才会被调用。如果返回 <code>true</code>，React 会跳过渲染；如果返回 <code>false</code>，React 会继续渲染。</p>\n<hr>\n<h3>3. 核心原理与限制</h3>\n<h4>A. 浅比较 (Shallow Comparison)</h4>\n<p>默认的浅比较意味着：</p>\n<ul>\n<li>对于基本类型（string, number, boolean）：比较值是否相等。</li>\n<li>对于引用类型（object, array, function）：比较<strong>内存地址</strong>   是否相同。</li>\n</ul>\n<p><strong>常见陷阱：</strong><br>\n如果父组件每次渲染都创建一个新的对象或函数作为 prop 传给子组件，即使内容一样，内存地址也不同，<code>React.memo</code> 会认为 props 变了，从而导致<strong>优化失效</strong>   。</p>\n<pre><code class="language-jsx"><span class="hljs-comment">// ❌ 错误示范：优化失效</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">Parent</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> [count, setCount] = <span class="hljs-title function_">useState</span>(<span class="hljs-number">0</span>);\n\n  <span class="hljs-comment">// 每次 Parent 渲染，config 都是一个新的对象引用</span>\n  <span class="hljs-keyword">const</span> config = { <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;dark&quot;</span> };\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">onClick</span>=<span class="hljs-string">{()</span> =&gt;</span> setCount((c) =&gt; c + 1)}&gt;Count: {count}<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">Child</span> <span class="hljs-attr">config</span>=<span class="hljs-string">{config}</span> /&gt;</span>\n    <span class="hljs-tag">&lt;/&gt;</span></span>\n  );\n}\n\n<span class="hljs-comment">// ✅ 正确示范：使用 useMemo 稳定对象引用</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">Parent</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> [count, setCount] = <span class="hljs-title function_">useState</span>(<span class="hljs-number">0</span>);\n\n  <span class="hljs-keyword">const</span> config = <span class="hljs-title function_">useMemo</span>(<span class="hljs-function">() =&gt;</span> ({ <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;dark&quot;</span> }), []);\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">onClick</span>=<span class="hljs-string">{()</span> =&gt;</span> setCount((c) =&gt; c + 1)}&gt;Count: {count}<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">Child</span> <span class="hljs-attr">config</span>=<span class="hljs-string">{config}</span> /&gt;</span>\n    <span class="hljs-tag">&lt;/&gt;</span></span>\n  );\n}\n</code></pre>\n<h4>B. 仅针对 Props</h4>\n<p><code>React.memo</code> <strong>只检查 props 的变化</strong>   。</p>\n<ul>\n<li>如果组件内部使用了 <code>useState</code> 或 <code>useReducer</code>，当 state 变化时，<strong>无论 memo 是否存在，组件都会重新渲染</strong>   。</li>\n<li>如果组件依赖了 Context (<code>useContext</code>)，当 Context 值变化时，组件也会重新渲染。</li>\n</ul>\n<h4>C. 不阻止子组件渲染</h4>\n<p><code>React.memo</code> 只能防止<strong>当前组件</strong>   的渲染函数执行。如果当前组件渲染了（或者没被 memo 住），它内部的子组件依然会根据它们自己的逻辑进行渲染。</p>\n<hr>\n<h3>4. 什么时候使用 React.memo？</h3>\n<p>不要盲目地在所有组件上使用 <code>React.memo</code>，因为它本身也有开销（存储上次 props、执行比较函数）。</p>\n<p><strong>适用场景：</strong></p>\n<ol>\n<li><strong>纯展示组件</strong>   ：组件的渲染完全依赖于 props，且渲染开销较大（如长列表项、复杂的图表）。</li>\n<li><strong>频繁父级更新</strong>   ：父组件经常因为自身的 state 变化而重渲染，但传递给子组件的 props 实际上并没有变。</li>\n<li><strong>回调函数稳定</strong>   ：配合 <code>useCallback</code> 使用，确保传给子组件的函数 props 也是稳定的。</li>\n</ol>\n<p><strong>不适用场景：</strong></p>\n<ol>\n<li>组件渲染非常快（简单的 div 或文本），memo 的开销可能大于渲染本身的开销。</li>\n<li>props 经常变化，或者 props 本身就是频繁变化的对象/数组（且无法稳定引用）。</li>\n<li>组件内部 state 变化频率远高于 props 变化频率。</li>\n</ol>\n<hr>\n<h3>5. 完整最佳实践示例</h3>\n<p>结合 <code>useCallback</code> 和 <code>useMemo</code> 来最大化 <code>React.memo</code> 的效果。</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> <span class="hljs-title class_">React</span>, { useState, useCallback, useMemo } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-comment">// 子组件：使用 memo 优化</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title class_">ListItem</span> = <span class="hljs-title class_">React</span>.<span class="hljs-title function_">memo</span>(<span class="hljs-function">(<span class="hljs-params">{ item, onSelect }</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">`Rendering item: <span class="hljs-subst">${item.id}</span>`</span>);\n  <span class="hljs-keyword">return</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">li</span> <span class="hljs-attr">onClick</span>=<span class="hljs-string">{()</span> =&gt;</span> onSelect(item.id)}&gt;{item.name}<span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span></span>;\n});\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">App</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> [items] = <span class="hljs-title function_">useState</span>([\n    { <span class="hljs-attr">id</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Apple&quot;</span> },\n    { <span class="hljs-attr">id</span>: <span class="hljs-number">2</span>, <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Banana&quot;</span> },\n    { <span class="hljs-attr">id</span>: <span class="hljs-number">3</span>, <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Orange&quot;</span> },\n  ]);\n\n  <span class="hljs-keyword">const</span> [count, setCount] = <span class="hljs-title function_">useState</span>(<span class="hljs-number">0</span>);\n  <span class="hljs-keyword">const</span> [selectedId, setSelectedId] = <span class="hljs-title function_">useState</span>(<span class="hljs-literal">null</span>);\n\n  <span class="hljs-comment">// ⚠️ 关键：使用 useCallback 稳定函数引用</span>\n  <span class="hljs-comment">// 如果不加 useCallback，每次 App 渲染，handleSelect 都会变，导致 ListItem 全部重渲染</span>\n  <span class="hljs-keyword">const</span> handleSelect = <span class="hljs-title function_">useCallback</span>(<span class="hljs-function">(<span class="hljs-params">id</span>) =&gt;</span> {\n    <span class="hljs-title function_">setSelectedId</span>(id);\n  }, []);\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">h1</span>&gt;</span>Count: {count}<span class="hljs-tag">&lt;/<span class="hljs-name">h1</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">onClick</span>=<span class="hljs-string">{()</span> =&gt;</span> setCount((c) =&gt; c + 1)}&gt;Increment Count<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>\n\n      <span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>\n        {items.map((item) =&gt; (\n          <span class="hljs-tag">&lt;<span class="hljs-name">ListItem</span> <span class="hljs-attr">key</span>=<span class="hljs-string">{item.id}</span> <span class="hljs-attr">item</span>=<span class="hljs-string">{item}</span> <span class="hljs-attr">onSelect</span>=<span class="hljs-string">{handleSelect}</span> /&gt;</span>\n        ))}\n      <span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span>\n\n      <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Selected: {selectedId}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>\n    <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>\n  );\n}\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-title class_">App</span>;\n</code></pre>\n<h3>总结</h3>\n<table>\n<thead>\n<tr>\n<th style="text-align:left">特性</th>\n<th style="text-align:left">描述</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td style="text-align:left"><strong>类型</strong></td>\n<td style="text-align:left">高阶组件 (HOC)</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>作用</strong></td>\n<td style="text-align:left">记忆组件，仅在 props 变化时重渲染</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>比较方式</strong></td>\n<td style="text-align:left">默认浅比较，可自定义深度比较函数</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>局限性</strong></td>\n<td style="text-align:left">不监测 State 和 Context 变化；需配合 <code>useMemo</code>/<code>useCallback</code> 避免引用类型失效</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>性能权衡</strong></td>\n<td style="text-align:left">适用于渲染成本高或父组件频繁更新的场景；简单组件慎用</td>\n</tr>\n</tbody>\n</table>\n<p>合理使用 <code>React.memo</code> 可以显著减少不必要的 DOM 操作和 JavaScript 执行，提升大型 React 应用的流畅度。</p>\n</div>'</script></body></html>
