<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="二进制格式",document.getElementById("article").innerHTML="<div><p>在计算机中，“二进制格式”通常指<strong>二进制数据的组织规则或存储结构</strong>   。它规定了二进制序列（0和1）如何被解析为有意义的信息（如文件、数据结构、协议等）。不同的二进制格式适用于不同场景，例如存储图像、音频、执行程序等。</p>\n<h3><strong>核心概念</strong></h3>\n<p>二进制本身是无意义的0/1序列，而<strong>二进制格式</strong>   就是给这些序列“定义规则”的约定，包括：</p>\n<ul>\n<li>数据的分段方式（哪些位代表什么含义）；</li>\n<li>数值的表示方法（如整数、浮点数的编码规则）；</li>\n<li>结构标识（如文件头、校验位、长度信息等）。</li>\n</ul>\n<h3><strong>常见二进制格式分类</strong></h3>\n<h4>1. <strong>文件格式（存储类）</strong></h4>\n<p>几乎所有非纯文本文件（如图片、音频、视频、压缩包）都采用二进制格式存储，例如：</p>\n<ul>\n<li><strong>图像</strong>   ：PNG、JPEG、GIF（包含像素数据、颜色表、压缩算法标识等）；</li>\n<li><strong>音频</strong>   ：MP3、WAV（包含采样率、声道数、音频波形数据等）；</li>\n<li><strong>视频</strong>   ：MP4、AVI（包含帧数据、编码格式、时间戳等）；</li>\n<li><strong>压缩文件</strong>   ：ZIP、7Z（包含文件列表、压缩数据块、校验信息等）。</li>\n</ul>\n<p><strong>示例</strong>   ：PNG文件的前8字节固定为 <code>137 80 78 71 13 10 26 10</code>（二进制对应值），作为“文件标识”，告诉程序“这是PNG格式”。</p>\n<h4>2. <strong>数据交换格式（通信/传输类）</strong></h4>\n<p>在网络传输或程序间数据交换时，二进制格式比文本格式（如JSON）更紧凑高效，例如：</p>\n<ul>\n<li><strong>Protocol Buffers（Protobuf）</strong>   ：Google设计的二进制序列化格式，用于替代JSON/XML，体积小、解析快；</li>\n<li><strong>MessagePack</strong>   ：类似JSON的二进制格式，支持多语言，比JSON更省空间；</li>\n<li><strong>二进制协议</strong>   ：如HTTP/2的帧格式、WebSocket的二进制帧，规定了数据传输的结构（如长度、类型、 payload）。</li>\n</ul>\n<h4>3. <strong>内存中的二进制数据结构</strong></h4>\n<p>程序运行时，内存中的数据（如变量、对象）本质上是二进制格式，由编程语言或操作系统定义规则：</p>\n<ul>\n<li><strong>整数</strong>   ：用二进制补码表示（如32位整数、64位整数）；</li>\n<li><strong>浮点数</strong>   ：遵循IEEE 754标准（如32位单精度、64位双精度）；</li>\n<li><strong>结构体</strong>   ：如C语言的<code>struct</code>，按固定偏移量存储不同字段（例如：前4字节是ID，接下来8字节是时间戳）。</li>\n</ul>\n<h3><strong>与文本格式的对比</strong></h3>\n<table>\n<thead>\n<tr>\n<th>特点</th>\n<th>二进制格式</th>\n<th>文本格式（如JSON、XML）</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>可读性</strong></td>\n<td>人类不可直接阅读（需解析工具）</td>\n<td>可直接阅读（字符序列）</td>\n</tr>\n<tr>\n<td><strong>体积</strong></td>\n<td>更紧凑（无冗余字符）</td>\n<td>较冗余（包含引号、逗号等分隔符）</td>\n</tr>\n<tr>\n<td><strong>解析效率</strong></td>\n<td>更快（无需字符转义/解析）</td>\n<td>较慢（需处理字符编码和语法）</td>\n</tr>\n<tr>\n<td><strong>灵活性</strong></td>\n<td>需严格遵循格式规则</td>\n<td>格式松散，易扩展</td>\n</tr>\n</tbody>\n</table>\n<h3><strong>前端中的二进制格式处理</strong></h3>\n<p>前端通过以下API操作二进制格式数据：</p>\n<ul>\n<li><code>ArrayBuffer</code>：表示内存中的原始二进制数据块；</li>\n<li><code>TypedArray</code>（如<code>Uint8Array</code>、<code>Float32Array</code>）：按特定类型（整数、浮点数）解析<code>ArrayBuffer</code>；</li>\n<li><code>Blob</code>：表示二进制文件对象，可用于下载或上传；</li>\n<li><code>DataView</code>：灵活读取<code>ArrayBuffer</code>中不同类型的数据（如从任意位置读取16位整数）。</li>\n</ul>\n<h3><strong>总结</strong></h3>\n<p>二进制格式是对“0和1序列”的结构化约定，目的是让计算机（或程序）能准确解析数据的含义。它广泛用于存储、传输、数据交换等场景，核心优势是<strong>高效（体积小、解析快）</strong>   ，但需要提前约定规则才能使用。</p>\n</div>"</script></body></html>
