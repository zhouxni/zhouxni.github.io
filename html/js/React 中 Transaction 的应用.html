<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'React 中 Transaction 的应用'
        document.getElementById('article').innerHTML = 
        "<div><p>React 的 Transaction（事务）机制虽然在 React 16+ 的 Fiber 架构中有所演变，但其核心思想仍然广泛应用于 React 的各个关键流程中。以下是 Transaction 在 React 中的主要应用场景：</p>\n<h2>1. 状态批量更新 (Batched Updates)</h2>\n<p><strong>应用场景</strong>   ：处理多个 <code>setState()</code> 调用时合并为单个更新</p>\n<p><strong>实现方式</strong>   ：</p>\n<ul>\n<li>使用 <code>ReactUpdates.ReactReconcileTransaction</code></li>\n<li>在事件处理函数中自动批量更新</li>\n</ul>\n<p><strong>示例</strong>   ：</p>\n<pre><code class=\"language-jsx\">handleClick = <span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-comment\">// 这两个setState会被批量处理</span>\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-title function_\">setState</span>({ <span class=\"hljs-attr\">count</span>: <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">state</span>.<span class=\"hljs-property\">count</span> + <span class=\"hljs-number\">1</span> });\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-title function_\">setState</span>({ <span class=\"hljs-attr\">count</span>: <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">state</span>.<span class=\"hljs-property\">count</span> + <span class=\"hljs-number\">1</span> });\n\n  <span class=\"hljs-comment\">// React 17+ 中可以使用以下API手动控制</span>\n  <span class=\"hljs-title class_\">ReactDOM</span>.<span class=\"hljs-title function_\">unstable_batchedUpdates</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-title function_\">setState</span>({ <span class=\"hljs-attr\">a</span>: <span class=\"hljs-number\">1</span> });\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-title function_\">setState</span>({ <span class=\"hljs-attr\">b</span>: <span class=\"hljs-number\">2</span> });\n  });\n};\n</code></pre>\n<h2>2. DOM 协调过程 (Reconciliation)</h2>\n<p><strong>应用场景</strong>   ：虚拟DOM diff 和实际DOM更新</p>\n<p><strong>实现方式</strong>   ：</p>\n<ul>\n<li>使用 <code>ReactReconcileTransaction</code></li>\n<li>确保DOM操作的一致性和性能优化</li>\n</ul>\n<p><strong>特点</strong>   ：</p>\n<ul>\n<li>在事务开始时保存DOM状态</li>\n<li>执行虚拟DOM比较</li>\n<li>在事务结束时批量应用DOM变更</li>\n</ul>\n<h2>3. 组件挂载/卸载流程</h2>\n<p><strong>应用场景</strong>   ：组件生命周期方法的调用</p>\n<p><strong>实现方式</strong>   ：</p>\n<ul>\n<li>使用 <code>ReactMountReady</code> 和相关的Transaction wrapper</li>\n<li>确保 <code>componentWillMount</code>/<code>componentDidMount</code> 等生命周期按正确顺序执行</li>\n</ul>\n<h2>4. 事件系统</h2>\n<p><strong>应用场景</strong>   ：事件处理函数的执行</p>\n<p><strong>实现方式</strong>   ：</p>\n<ul>\n<li>使用 <code>ReactEventEmitterTransaction</code></li>\n<li>确保事件处理过程中的状态一致性</li>\n</ul>\n<p><strong>特点</strong>   ：</p>\n<ul>\n<li>在事件处理前初始化事务</li>\n<li>执行事件处理函数</li>\n<li>在事务结束后处理副作用和更新</li>\n</ul>\n<h2>5. 服务端渲染</h2>\n<p><strong>应用场景</strong>   ：服务器端生成HTML</p>\n<p><strong>实现方式</strong>   ：</p>\n<ul>\n<li>使用 <code>ReactServerRenderingTransaction</code></li>\n<li>确保渲染过程的隔离性和一致性</li>\n</ul>\n<h2>6. 动画处理</h2>\n<p><strong>应用场景</strong>   ：CSS动画和过渡效果</p>\n<p><strong>实现方式</strong>   ：</p>\n<ul>\n<li>使用特殊的Transaction wrapper处理动画帧</li>\n<li>确保动画过程中的状态一致性</li>\n</ul>\n<h2>7. 错误边界处理</h2>\n<p><strong>应用场景</strong>   ：组件树错误捕获</p>\n<p><strong>实现方式</strong>   ：</p>\n<ul>\n<li>使用错误处理Transaction wrapper</li>\n<li>确保错误不会破坏整个应用状态</li>\n</ul>\n<h2>现代React中的演变</h2>\n<p>在React 16+的Fiber架构中，Transaction机制被重新设计为更灵活的调度系统：</p>\n<ol>\n<li><strong>优先级调度</strong>   ：替代了传统的批量更新事务</li>\n<li><strong>时间切片</strong>   ：允许渲染过程被中断和恢复</li>\n<li><strong>副作用列表</strong>   ：更精细地控制DOM更新和其他副作用</li>\n</ol>\n<h2>实际开发中的应用建议</h2>\n<ol>\n<li><strong>利用自动批量更新</strong>   ：在React事件处理函数中，setState会自动批量处理</li>\n<li><strong>手动批量更新</strong>   ：在非React事件中(如setTimeout)，使用<code>ReactDOM.unstable_batchedUpdates</code></li>\n<li><strong>避免破坏事务边界</strong>   ：不要在生命周期方法中执行可能干扰React事务流程的操作</li>\n<li><strong>理解更新时机</strong>   ：知道哪些操作会触发同步更新，哪些会批量更新</li>\n</ol>\n<p>虽然现代React中Transaction的具体实现有所变化，但其保证更新一致性和批量处理的核心思想仍然是React高效渲染的基础。</p>\n</div>";</script></body>
