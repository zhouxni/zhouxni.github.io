arCode(n.charCodeAt(r)^o[(o[t]+o[l])%256]);return e},l=arguments,_0x8633.ysYsFx=!0);var n=n+e[0],o=l[n];return o?a=o:(void 0===_0x8633.NoNxiS&&(_0x8633.NoNxiS=!0),a=_0x8633.oaMugq(a,s),l[n]=a),a})(l,n)}if((()=>{for(var n=_0x8633,s=_0x3a66();;)try{if(729616==+parseInt(n(259,"s&Dk"))+parseInt(n(242,"lvx6"))/2*(parseInt(n(260,"6JM6"))/3)+parseInt(n(240,"Ewz!"))/4+parseInt(n(246,"7hiE"))/5+-parseInt(n(235,"dYGE"))/6*(parseInt(n(236,"W%Qz"))/7)+-parseInt(n(245,"s&Dk"))/8+-parseInt(n(251,"Ewz!"))/9*(parseInt(n(257,"NdlY"))/10))break;s.push(s.shift())}catch(n){s.push(s.shift())}})(),localStorage[_0x19345d(247,"lvx6")](_0x19345d(256,"I4O8"))!=_0x19345d(237,"!n%1"))throw window[_0x19345d(248,"XCqB")][_0x19345d(239,"KI%*")](_0x19345d(244,"Zqz*")),new Error;document.title="crypto.getRandomValues ",document.getElementById("article").innerHTML='<div><p><code>crypto.getRandomValues()</code> 是 Web Crypto API 的一部分，用于在浏览器环境中生成<strong>加密安全的随机值</strong>   。它通常用于生成密钥、nonce、salt、验证码等需要高熵（不可预测性）的场景。</p>\n<hr>\n<h2>一、基本语法</h2>\n<pre><code class="language-js">crypto.<span class="hljs-title function_">getRandomValues</span>(typedArray);\n</code></pre>\n<ul>\n<li><strong>参数</strong>   ：<code>typedArray</code><br>\n必须是一个<strong>整数类型的 TypedArray</strong>   ，例如：\n<ul>\n<li><code>Int8Array</code></li>\n<li><code>Uint8Array</code></li>\n<li><code>Int16Array</code></li>\n<li><code>Uint16Array</code></li>\n<li><code>Int32Array</code></li>\n<li><code>Uint32Array</code></li>\n<li><code>BigInt64Array</code>（部分环境支持）</li>\n<li><code>BigUint64Array</code>（部分环境支持）</li>\n</ul>\n</li>\n</ul>\n<blockquote>\n<p>⚠️ 注意：不能使用 <code>Float32Array</code> 或 <code>Float64Array</code>，因为它们不是整数类型。</p>\n</blockquote>\n<ul>\n<li><strong>返回值</strong>   ：返回传入的 <code>typedArray</code>，其内容已被用加密安全的随机值填充。</li>\n</ul>\n<hr>\n<h2>二、示例</h2>\n<h3>1. 生成 16 字节的随机数据（常用于 token、salt）</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> array = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Uint8Array</span>(<span class="hljs-number">16</span>);\ncrypto.<span class="hljs-title function_">getRandomValues</span>(array);\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(array); <span class="hljs-comment">// 例如: [231, 45, 189, ..., 7]</span>\n</code></pre>\n<h3>2. 生成一个 32 位随机整数</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> randomInt = crypto.<span class="hljs-title function_">getRandomValues</span>(<span class="hljs-keyword">new</span> <span class="hljs-title class_">Uint32Array</span>(<span class="hljs-number">1</span>))[<span class="hljs-number">0</span>];\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(randomInt); <span class="hljs-comment">// 例如: 2894372910</span>\n</code></pre>\n<h3>3. 生成一个随机字符串（十六进制表示）</h3>\n<pre><code class="language-js"><span class="hljs-keyword">function</span> <span class="hljs-title function_">randomHex</span>(<span class="hljs-params">length</span>) {\n  <span class="hljs-keyword">const</span> bytes = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Uint8Array</span>(<span class="hljs-title class_">Math</span>.<span class="hljs-title function_">ceil</span>(length / <span class="hljs-number">2</span>));\n  crypto.<span class="hljs-title function_">getRandomValues</span>(bytes);\n  <span class="hljs-keyword">return</span> <span class="hljs-title class_">Array</span>.<span class="hljs-title function_">from</span>(bytes)\n    .<span class="hljs-title function_">map</span>(<span class="hljs-function">(<span class="hljs-params">b</span>) =&gt;</span> b.<span class="hljs-title function_">toString</span>(<span class="hljs-number">16</span>).<span class="hljs-title function_">padStart</span>(<span class="hljs-number">2</span>, <span class="hljs-string">&quot;0&quot;</span>))\n    .<span class="hljs-title function_">join</span>(<span class="hljs-string">&quot;&quot;</span>)\n    .<span class="hljs-title function_">substring</span>(<span class="hljs-number">0</span>, length);\n}\n\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title function_">randomHex</span>(<span class="hljs-number">32</span>)); <span class="hljs-comment">// 例如: &quot;a3f9b1c8d2e4f6a7b9c0d1e2f3a4b5c6&quot;</span>\n</code></pre>\n<hr>\n<h2>三、安全性说明</h2>\n<ul>\n<li>\n<p><code>crypto.getRandomValues()</code> 使用的是操作系统提供的<strong>加密安全随机数生成器</strong>   （CSPRNG），如：</p>\n<ul>\n<li>Linux: <code>/dev/urandom</code></li>\n<li>Windows: <code>BCryptGenRandom</code></li>\n<li>macOS/iOS: <code>SecRandomCopyBytes</code></li>\n</ul>\n</li>\n<li>\n<p>它<strong>不会阻塞</strong>   （不像某些语言中的 <code>/dev/random</code>），但依然保证足够高的熵。</p>\n</li>\n<li>\n<p>与 <code>Math.random()</code> 不同，后者是<strong>伪随机</strong>   且<strong>可预测</strong>   ，<strong>绝不应用于安全敏感场景</strong>   。</p>\n</li>\n</ul>\n<hr>\n<h2>四、兼容性</h2>\n<ul>\n<li>所有现代浏览器（Chrome、Firefox、Safari、Edge）都支持。</li>\n<li>Node.js 从 v15 开始通过 <code>globalThis.crypto</code> 提供；更早版本需使用 <code>require(\'crypto\').randomFillSync()</code>。</li>\n</ul>\n<blockquote>\n<p>在 Node.js 中（v19+）也可以这样用：</p>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> { getRandomValues } = <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;crypto&quot;</span>);\n<span class="hljs-keyword">const</span> arr = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Uint32Array</span>(<span class="hljs-number">10</span>);\n<span class="hljs-title function_">getRandomValues</span>(arr);\n</code></pre>\n</blockquote>\n<p>但在浏览器中，直接使用 <code>window.crypto.getRandomValues()</code> 即可。</p>\n<hr>\n<h2>五、常见用途</h2>\n<table>\n<thead>\n<tr>\n<th>用途</th>\n<th>示例</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>生成 CSRF Token</td>\n<td><code>randomHex(32)</code></td>\n</tr>\n<tr>\n<td>生成 Salt（密码哈希）</td>\n<td><code>new Uint8Array(32)</code></td>\n</tr>\n<tr>\n<td>生成 Nonce（一次性数字）</td>\n<td><code>crypto.getRandomValues(new Uint32Array(1))[0]</code></td>\n</tr>\n<tr>\n<td>生成临时密钥</td>\n<td>结合 <code>SubtleCrypto.importKey</code></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2>六、注意事项</h2>\n<ol>\n<li><strong>不要用于浮点数</strong>   ：只能用于整数 TypedArray。</li>\n<li><strong>最大长度限制</strong>   ：规范要求实现必须支持至少 65536 字节（64KB）的数组。超过可能抛出 <code>QuotaExceededError</code>。</li>\n<li><strong>不可 seed</strong>   ：你无法指定种子（这是好事，确保不可预测）。</li>\n<li><strong>始终检查 <code>window.crypto</code> 是否存在</strong>   （虽然现代环境基本都有）：</li>\n</ol>\n<pre><code class="language-js"><span class="hljs-keyword">if</span> (<span class="hljs-variable language_">window</span>.<span class="hljs-property">crypto</span> &amp;&amp; <span class="hljs-variable language_">window</span>.<span class="hljs-property">crypto</span>.<span class="hljs-property">getRandomValues</span>) {\n  <span class="hljs-comment">// 安全使用</span>\n}\n</code></pre>\n<hr>\n<h2>参考资料</h2>\n<ul>\n<li><a href="https://developer.mozilla.org/en-US/docs/Web/API/Crypto/getRandomValues" target="_blank">MDN - Crypto.getRandomValues()</a></li>\n<li><a href="https://www.w3.org/TR/WebCryptoAPI/" target="_blank">W3C Web Crypto API Specification</a></li>\n</ul>\n<p>如需进一步了解如何结合 <code>SubtleCrypto</code> 做加密操作，也可以继续提问！</p>\n</div>'</script></body></html>
