<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="负小数转二进制",document.getElementById("article").innerHTML='<div><p>把 <strong>-6.625</strong>   转成「二进制」要分两步：</p>\n<ol>\n<li>先处理 <strong>6.625</strong>   的纯二进制表示；</li>\n<li>再在最前面加 <strong>负号</strong>   （或给出补码/IEEE-754 形式）。</li>\n</ol>\n<hr>\n<h3>✅ 1. 整数部分 6 → 二进制</h3>\n<pre><code>6 ÷ 2 = 3 … 0\n3 ÷ 2 = 1 … 1\n1 ÷ 2 = 0 … 1   → 110\n</code></pre>\n<h3>✅ 2. 小数部分 0.625 → 二进制</h3>\n<pre><code>0.625 × 2 = 1.25   整数 1   余 0.25\n0.25  × 2 = 0.5    整数 0   余 0.5\n0.5   × 2 = 1.0    整数 1   余 0   → 结束\n→ 0.101\n</code></pre>\n<hr>\n<h3>✅ 3. 合并并加负号</h3>\n<pre><code>-6.625₁₀ = -110.101₂\n</code></pre>\n<hr>\n<h3>✅ 4. 若想得到 <strong>IEEE-754 64 位机器码</strong></h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> buf = <span class="hljs-keyword">new</span> <span class="hljs-title class_">ArrayBuffer</span>(<span class="hljs-number">8</span>);\n<span class="hljs-keyword">new</span> <span class="hljs-title class_">DataView</span>(buf).<span class="hljs-title function_">setFloat64</span>(<span class="hljs-number">0</span>, -<span class="hljs-number">6.625</span>);\n<span class="hljs-keyword">const</span> bits = [...<span class="hljs-keyword">new</span> <span class="hljs-title class_">Uint8Array</span>(buf)]\n  .<span class="hljs-title function_">map</span>(<span class="hljs-function">(<span class="hljs-params">b</span>) =&gt;</span> b.<span class="hljs-title function_">toString</span>(<span class="hljs-number">2</span>).<span class="hljs-title function_">padStart</span>(<span class="hljs-number">8</span>, <span class="hljs-string">&quot;0&quot;</span>))\n  .<span class="hljs-title function_">join</span>(<span class="hljs-string">&quot;&quot;</span>);\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(bits);\n<span class="hljs-comment">// 11000000 00011010 10100000 ... (64 位)</span>\n</code></pre>\n<hr>\n<h3>✅ 总结</h3>\n<table>\n<thead>\n<tr>\n<th>形式</th>\n<th>结果</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>纯二进制</td>\n<td><strong>-110.101₂</strong></td>\n</tr>\n<tr>\n<td>IEEE-754 64 位</td>\n<td><code>110000000001101010000000…</code> (共 64 位)</td>\n</tr>\n</tbody>\n</table>\n</div>'</script></body></html>
