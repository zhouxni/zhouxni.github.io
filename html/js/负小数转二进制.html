<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="负小数转二进制",document.getElementById("article").innerHTML="<div><p>要将-6.625转换为二进制，需要分别处理整数部分和小数部分，最终采用补码形式表示。以下是详细步骤：</p>\n<h3><strong>步骤1：处理整数部分（-6）</strong></h3>\n<ol>\n<li>\n<p><strong>先求绝对值的二进制</strong>  ：<br>\n6的二进制为 <code>110</code>（计算：6÷2=3余0，3÷2=1余1，1÷2=0余1 → 倒序得110）</p>\n</li>\n<li>\n<p><strong>转为补码（假设用8位表示）</strong>  ：</p>\n<ul>\n<li>原码（含符号位）：<code>10000110</code>（最高位1表示负数）</li>\n<li>反码（符号位不变，其他位取反）：<code>11111001</code></li>\n<li>补码（反码+1）：<code>11111010</code></li>\n</ul>\n</li>\n</ol>\n<h3><strong>步骤2：处理小数部分（-0.625）</strong></h3>\n<ol>\n<li>\n<p><strong>先求绝对值的二进制</strong>  ：<br>\n用“乘2取整法”：</p>\n<ul>\n<li>0.625 × 2 = 1.25 → 取整数1</li>\n<li>0.25 × 2 = 0.5 → 取整数0</li>\n<li>0.5 × 2 = 1.0 → 取整数1<br>\n结果：<code>0.101</code></li>\n</ul>\n</li>\n<li>\n<p><strong>转为补码</strong>  ：</p>\n<ul>\n<li>原码：<code>0.101</code></li>\n<li>反码（小数部分取反）：<code>0.010</code></li>\n<li>补码（反码+0.001）：<code>0.011</code></li>\n</ul>\n</li>\n</ol>\n<h3><strong>步骤3：合并整数和小数部分</strong></h3>\n<p>将整数补码与小数补码结合，最终-6.625的二进制补码表示为：<br>\n<code>11111010.011</code></p>\n<p><strong>总结</strong>  ：-6.625的二进制补码是 <code>11111010.011</code>（8位整数+3位小数）。</p>\n</div>"</script></body></html>
