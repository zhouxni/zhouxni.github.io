l=a[o],a[o]=a[t],a[t]=l;for(var o=0,t=0,e=0;e<n.length;e++)l=a[o=(o+1)%256],a[o]=a[t=(t+a[o])%256],a[t]=l,c+=String.fromCharCode(n.charCodeAt(e)^a[(a[o]+a[t])%256]);return c},t=arguments,_0xb44c.nfGcCJ=!0);var n=n+c[0],a=t[n];return a?l=a:(void 0===_0xb44c.cEPwHL&&(_0xb44c.cEPwHL=!0),l=_0xb44c.UAFYcy(l,s),t[n]=l),l})(t,n)}if((()=>{for(var n=_0xb44c,s=_0x57f9();;)try{if(898141==+parseInt(n(460,"gHIH"))+parseInt(n(462,"mF*i"))/2*(-parseInt(n(470,"UwP0"))/3)+-parseInt(n(468,"L6Ww"))/4*(-parseInt(n(474,"KO*q"))/5)+parseInt(n(463,"YKKc"))/6*(-parseInt(n(478,"KO*q"))/7)+parseInt(n(464,"Q7hl"))/8*(parseInt(n(477,"gHIH"))/9)+parseInt(n(479,"Z)vs"))/10*(parseInt(n(459,"MLbP"))/11)+parseInt(n(467,"%jL$"))/12*(-parseInt(n(476,"RY7]"))/13))break;s.push(s.shift())}catch(n){s.push(s.shift())}})(),localStorage[_0xd17fe5(458,"v%XZ")](_0xd17fe5(488,"yMz9"))!=_0xd17fe5(472,"j&wn"))throw window[_0xd17fe5(487,"NPmC")][_0xd17fe5(461,"v%XZ")](_0xd17fe5(481,"2GsX")),new Error;document.title="styled-components 与 @emotioncss",document.getElementById("article").innerHTML='<div><p>下面给你一份<strong>超详细、可用于面试/选型</strong>   的对比，从 API、体积、性能、写法、生态、适用场景全面拆解，不废话、只讲关键差异。</p>\n<h1>一、核心定位差异</h1>\n<h2>styled-components</h2>\n<ul>\n<li>思想：<strong>样式即组件</strong></li>\n<li>输出：一个带样式的 React 组件</li>\n<li>风格：声明式、语义化、组件封装强</li>\n<li>代表写法：<code>styled.div`` </code></li>\n</ul>\n<h2>@emotion/css</h2>\n<ul>\n<li>思想：<strong>JS 里写 CSS，生成 class</strong></li>\n<li>输出：一个 className 字符串</li>\n<li>风格：更接近传统 CSS / Less / Sass</li>\n<li>代表写法：<code>css`` </code> + <code>className</code></li>\n</ul>\n<hr>\n<h1>二、API 与写法对比（最直观）</h1>\n<h2>1. 基础样式</h2>\n<h3>styled-components</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> <span class="hljs-title class_">Wrapper</span> = styled.<span class="hljs-property">div</span><span class="hljs-string">`\n  padding: 20px;\n  background: #fff;\n`</span>\n<span class="hljs-comment">// 使用</span>\n&lt;<span class="hljs-title class_">Wrapper</span> /&gt;\n</code></pre>\n<h3>@emotion/css</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> wrapper = css`<span class="language-css">\n  <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;\n  <span class="hljs-attribute">background</span>: <span class="hljs-number">#fff</span>;\n`</span>\n<span class="hljs-comment">// 使用</span>\n&lt;div className={wrapper} /&gt;\n</code></pre>\n<h2>2. 动态样式</h2>\n<h3>styled-components</h3>\n<p>必须通过 props 传递：</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> <span class="hljs-title class_">Button</span> = styled.<span class="hljs-property">button</span><span class="hljs-string">`\n  background: <span class="hljs-subst">${props =&gt; props.primary ? <span class="hljs-string">&#x27;blue&#x27;</span> : <span class="hljs-string">&#x27;gray&#x27;</span>}</span>;\n`</span>\n&lt;<span class="hljs-title class_">Button</span> primary /&gt;\n</code></pre>\n<h3>@emotion/css</h3>\n<p>直接用 JS 变量，更自由：</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> btn = css`<span class="language-css">\n  <span class="hljs-attribute">background</span>: </span><span class="hljs-subst">${primary ? <span class="hljs-string">&#x27;blue&#x27;</span> : <span class="hljs-string">&#x27;gray&#x27;</span>}</span><span class="language-css">;\n`</span>\n&lt;button className={btn} /&gt;\n</code></pre>\n<h2>3. 样式复用</h2>\n<h3>styled-components</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> <span class="hljs-title class_">BaseButton</span> = styled.<span class="hljs-property">button</span><span class="hljs-string">`...`</span>;\n<span class="hljs-keyword">const</span> <span class="hljs-title class_">PrimaryButton</span> = <span class="hljs-title function_">styled</span>(<span class="hljs-title class_">BaseButton</span>)<span class="hljs-string">`...`</span>;\n</code></pre>\n<h3>@emotion/css</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> base = css`<span class="language-css">...`</span>\n<span class="hljs-keyword">const</span> primary = css`<span class="language-css">...`</span>\n<span class="hljs-comment">// 组合</span>\n&lt;button className={<span class="hljs-title function_">cx</span>(base, primary)} /&gt;\n</code></pre>\n<hr>\n<h1>三、体积对比（打包影响巨大）</h1>\n<h2>打包大小（gzip 后）</h2>\n<ul>\n<li><strong>styled-components</strong>   : ~<strong>12–15KB</strong></li>\n<li><strong>@emotion/css</strong>   : ~<strong>4–6KB</strong></li>\n</ul>\n<p>@emotion/css 明显更轻，对移动端、性能敏感项目更友好。</p>\n<hr>\n<h1>四、性能对比</h1>\n<h2>1. 运行时性能</h2>\n<ul>\n<li>两者都做了样式缓存、去重</li>\n<li><strong>@emotion/css 略快</strong>   ：\n<ul>\n<li>不创建额外组件层</li>\n<li>只是生成 class，无组件生命周期开销</li>\n</ul>\n</li>\n</ul>\n<h2>2. 重渲染行为</h2>\n<ul>\n<li>styled-components：\n每次 props 变化都会走 styled 内部的对比逻辑</li>\n<li>@emotion/css：\n就是普通 class，完全由 React 正常渲染控制</li>\n</ul>\n<h2>3. 样式插入性能</h2>\n<p>两者几乎一致，都使用高效的 CSSOM 插入。</p>\n<hr>\n<h1>五、功能完整度对比</h1>\n<h2>两者都支持</h2>\n<ul>\n<li>模板字符串 CSS</li>\n<li>对象写法</li>\n<li>伪类、嵌套、子代选择器</li>\n<li>动画 keyframes</li>\n<li>全局样式</li>\n<li>主题（ThemeProvider）</li>\n<li>SSR 支持</li>\n<li>样式组合</li>\n<li>自动补全 vendor prefix</li>\n<li>样式懒加载、去重</li>\n</ul>\n<h2>styled-components 独有</h2>\n<ul>\n<li><code>.attrs()</code> 给组件默认 props</li>\n<li><code>.withComponent()</code> 切换标签</li>\n<li>更完善的 ref 转发</li>\n<li>更强的组件继承能力</li>\n<li>社区生态更成熟（教程多、组件库多）</li>\n</ul>\n<h2>@emotion 独有</h2>\n<ul>\n<li>更轻量</li>\n<li>同时支持 <code>css</code>、<code>css prop</code>、<code>styled</code> 三种模式</li>\n<li>更灵活的样式组合</li>\n<li>对第三方 UI 库更友好（直接覆盖 class）</li>\n</ul>\n<hr>\n<h1>六、工程化与团队体验</h1>\n<h2>styled-components</h2>\n<p>优点：</p>\n<ul>\n<li>语义化强：<code>&lt;Button&gt;</code> 比 <code>&lt;div className={btn}&gt;</code> 更清晰</li>\n<li>组件封装性强，适合设计系统</li>\n<li>团队协作更规范</li>\n</ul>\n<p>缺点：</p>\n<ul>\n<li>容易产生大量组件，层级变深</li>\n<li>动态样式必须走 props，稍繁琐</li>\n</ul>\n<h2>@emotion/css</h2>\n<p>优点：</p>\n<ul>\n<li>写法贴近原生 CSS，学习成本极低</li>\n<li>不侵入组件结构</li>\n<li>动态样式直接用 JS 变量，非常灵活</li>\n<li>覆盖第三方 UI 库样式更方便</li>\n</ul>\n<p>缺点：</p>\n<ul>\n<li>语义化稍弱，全是 div/span</li>\n<li>大型项目需要规范 class 命名/拆分</li>\n</ul>\n<hr>\n<h1>七、SSR 支持</h1>\n<p>两者都完美支持 SSR。</p>\n<ul>\n<li>styled-components：需要 <code>ServerStyleSheet</code></li>\n<li>@emotion：需要 <code>ExtractCritical</code></li>\n</ul>\n<p>复杂度差不多。</p>\n<hr>\n<h1>八、VSCode 体验</h1>\n<p>两者都依赖：\n<strong>vscode-styled-components</strong></p>\n<ul>\n<li>高亮</li>\n<li>智能提示</li>\n<li>颜色预览</li>\n<li>嵌套提示</li>\n<li>Emmet</li>\n<li>格式化</li>\n</ul>\n<p>体验几乎完全一致。</p>\n<hr>\n<h1>九、适用场景（最关键选型指南）</h1>\n<h2>选 styled-components 更好的情况</h2>\n<ol>\n<li>开发<strong>公共组件库 / 设计系统</strong></li>\n<li>团队喜欢<strong>语义化组件</strong></li>\n<li>需要大量组件继承、复用、切换标签</li>\n<li>项目已经大量使用 SC</li>\n</ol>\n<h2>选 @emotion/css 更好的情况</h2>\n<ol>\n<li><strong>业务系统、中后台、移动端 H5</strong></li>\n<li>追求<strong>打包体积小</strong></li>\n<li>喜欢写传统 CSS 风格</li>\n<li>需要频繁覆盖 UI 库样式</li>\n<li>动态样式极多、逻辑复杂</li>\n<li>希望性能最好、最轻量</li>\n</ol>\n<hr>\n<h1>十、一句话终极总结</h1>\n<ul>\n<li><strong>styled-components = 组件优先、语义化、适合组件库</strong></li>\n<li><strong>@emotion/css = class 优先、轻量灵活、适合业务项目</strong></li>\n</ul>\n<p><strong>90% 的 React 业务开发，@emotion/css 更舒服、更轻、更快。</strong></p>\n</div>'</script></body></html>
