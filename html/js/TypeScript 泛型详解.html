<!DOCTYPE html><html lang="en"><head>

    body {

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
        document.getElementById('article').innerHTML = 
        "<div><p>泛型是 TypeScript 中非常重要的特性，它允许我们创建可重用的组件，这些组件可以支持多种类型而不只是一个特定类型。</p>\n<h2>1. 泛型基础</h2>\n<h3>1.1 泛型函数</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-comment\">// 普通函数只能返回特定类型</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">identity</span>(<span class=\"hljs-params\"><span class=\"hljs-attr\">arg</span>: <span class=\"hljs-built_in\">number</span></span>): <span class=\"hljs-built_in\">number</span> {\n  <span class=\"hljs-keyword\">return</span> arg;\n}\n\n<span class=\"hljs-comment\">// 泛型函数可以适用于多种类型</span>\n<span class=\"hljs-keyword\">function</span> identity&lt;T&gt;(<span class=\"hljs-attr\">arg</span>: T): T {\n  <span class=\"hljs-keyword\">return</span> arg;\n}\n\n<span class=\"hljs-comment\">// 使用方式</span>\n<span class=\"hljs-keyword\">let</span> output1 = identity&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">&quot;myString&quot;</span>); <span class=\"hljs-comment\">// 显式指定类型</span>\n<span class=\"hljs-keyword\">let</span> output2 = <span class=\"hljs-title function_\">identity</span>(<span class=\"hljs-string\">&quot;myString&quot;</span>); <span class=\"hljs-comment\">// 类型推断</span>\n</code></pre>\n<h3>1.2 泛型接口</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">GenericIdentityFn</span>&lt;T&gt; {\n  (<span class=\"hljs-attr\">arg</span>: T): T;\n}\n\n<span class=\"hljs-keyword\">function</span> identity&lt;T&gt;(<span class=\"hljs-attr\">arg</span>: T): T {\n  <span class=\"hljs-keyword\">return</span> arg;\n}\n\n<span class=\"hljs-keyword\">let</span> <span class=\"hljs-attr\">myIdentity</span>: <span class=\"hljs-title class_\">GenericIdentityFn</span>&lt;<span class=\"hljs-built_in\">number</span>&gt; = identity;\n</code></pre>\n<h3>1.3 泛型类</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">GenericNumber</span>&lt;T&gt; {\n  <span class=\"hljs-attr\">zeroValue</span>: T;\n  <span class=\"hljs-attr\">add</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\"><span class=\"hljs-attr\">x</span>: T, <span class=\"hljs-attr\">y</span>: T</span>) =&gt;</span> T;\n}\n\n<span class=\"hljs-keyword\">let</span> myGenericNumber = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">GenericNumber</span>&lt;<span class=\"hljs-built_in\">number</span>&gt;();\nmyGenericNumber.<span class=\"hljs-property\">zeroValue</span> = <span class=\"hljs-number\">0</span>;\nmyGenericNumber.<span class=\"hljs-property\">add</span> = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">x, y</span>) { <span class=\"hljs-keyword\">return</span> x + y; };\n</code></pre>\n<h2>2. 泛型约束</h2>\n<h3>2.1 基本约束</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">Lengthwise</span> {\n  <span class=\"hljs-attr\">length</span>: <span class=\"hljs-built_in\">number</span>;\n}\n\n<span class=\"hljs-keyword\">function</span> loggingIdentity&lt;T <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-title class_\">Lengthwise</span>&gt;(<span class=\"hljs-attr\">arg</span>: T): T {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(arg.<span class=\"hljs-property\">length</span>); <span class=\"hljs-comment\">// 现在编译器知道arg有length属性</span>\n  <span class=\"hljs-keyword\">return</span> arg;\n}\n</code></pre>\n<h3>2.2 在泛型约束中使用类型参数</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">function</span> getProperty&lt;T, K <span class=\"hljs-keyword\">extends</span> keyof T&gt;(<span class=\"hljs-attr\">obj</span>: T, <span class=\"hljs-attr\">key</span>: K) {\n  <span class=\"hljs-keyword\">return</span> obj[key];\n}\n\n<span class=\"hljs-keyword\">let</span> x = { <span class=\"hljs-attr\">a</span>: <span class=\"hljs-number\">1</span>, <span class=\"hljs-attr\">b</span>: <span class=\"hljs-number\">2</span>, <span class=\"hljs-attr\">c</span>: <span class=\"hljs-number\">3</span> };\n<span class=\"hljs-title function_\">getProperty</span>(x, <span class=\"hljs-string\">&quot;a&quot;</span>); <span class=\"hljs-comment\">// 正确</span>\n<span class=\"hljs-title function_\">getProperty</span>(x, <span class=\"hljs-string\">&quot;m&quot;</span>); <span class=\"hljs-comment\">// 错误: m不是x的属性</span>\n</code></pre>\n<h3>2.3 使用类类型约束</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">function</span> create&lt;T&gt;(<span class=\"hljs-attr\">c</span>: { <span class=\"hljs-title function_\">new</span>(): T }): T {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title function_\">c</span>();\n}\n</code></pre>\n<h2>3. 高级泛型技术</h2>\n<h3>3.1 泛型默认类型</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">Box</span>&lt;T = <span class=\"hljs-built_in\">string</span>&gt; {\n  <span class=\"hljs-attr\">value</span>: T;\n}\n\n<span class=\"hljs-keyword\">let</span> <span class=\"hljs-attr\">box1</span>: <span class=\"hljs-title class_\">Box</span> = { <span class=\"hljs-attr\">value</span>: <span class=\"hljs-string\">&quot;hello&quot;</span> }; <span class=\"hljs-comment\">// T默认为string</span>\n<span class=\"hljs-keyword\">let</span> <span class=\"hljs-attr\">box2</span>: <span class=\"hljs-title class_\">Box</span>&lt;<span class=\"hljs-built_in\">number</span>&gt; = { <span class=\"hljs-attr\">value</span>: <span class=\"hljs-number\">42</span> };\n</code></pre>\n<h3>3.2 条件类型</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">NonNullable</span>&lt;T&gt; = T <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-literal\">null</span> | <span class=\"hljs-literal\">undefined</span> ? <span class=\"hljs-built_in\">never</span> : T;\n</code></pre>\n<h3>3.3 映射类型</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">Readonly</span>&lt;T&gt; = {\n  <span class=\"hljs-keyword\">readonly</span> [P <span class=\"hljs-keyword\">in</span> keyof T]: T[P];\n};\n\n<span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">Partial</span>&lt;T&gt; = {\n  [P <span class=\"hljs-keyword\">in</span> keyof T]?: T[P];\n};\n</code></pre>\n<h3>3.4 类型推断</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">ReturnType</span>&lt;T&gt; = T <span class=\"hljs-title function_\">extends</span> (...<span class=\"hljs-attr\">args</span>: <span class=\"hljs-built_in\">any</span>[]) =&gt; infer R ? R : <span class=\"hljs-built_in\">any</span>;\n</code></pre>\n<h2>4. 实用泛型示例</h2>\n<h3>4.1 泛型函数示例</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">function</span> merge&lt;T, U&gt;(<span class=\"hljs-attr\">obj1</span>: T, <span class=\"hljs-attr\">obj2</span>: U): T &amp; U {\n  <span class=\"hljs-keyword\">return</span> { ...obj1, ...obj2 };\n}\n\n<span class=\"hljs-keyword\">const</span> merged = <span class=\"hljs-title function_\">merge</span>({ <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&quot;Alice&quot;</span> }, { <span class=\"hljs-attr\">age</span>: <span class=\"hljs-number\">30</span> });\n</code></pre>\n<h3>4.2 泛型接口示例</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">Result</span>&lt;T&gt; {\n  <span class=\"hljs-attr\">data</span>: T | <span class=\"hljs-literal\">null</span>;\n  <span class=\"hljs-attr\">error</span>: <span class=\"hljs-built_in\">string</span> | <span class=\"hljs-literal\">null</span>;\n}\n\n<span class=\"hljs-keyword\">function</span> fetchData&lt;T&gt;(<span class=\"hljs-attr\">url</span>: <span class=\"hljs-built_in\">string</span>): <span class=\"hljs-title class_\">Result</span>&lt;T&gt; {\n  <span class=\"hljs-comment\">// 实现数据获取逻辑</span>\n}\n</code></pre>\n<h3>4.3 泛型类示例</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">DataStorage</span>&lt;T&gt; {\n  <span class=\"hljs-keyword\">private</span> <span class=\"hljs-attr\">data</span>: T[] = [];\n\n  <span class=\"hljs-title function_\">addItem</span>(<span class=\"hljs-params\"><span class=\"hljs-attr\">item</span>: T</span>) {\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">data</span>.<span class=\"hljs-title function_\">push</span>(item);\n  }\n\n  <span class=\"hljs-title function_\">getItem</span>(<span class=\"hljs-attr\">index</span>: <span class=\"hljs-built_in\">number</span>): T {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">data</span>[index];\n  }\n}\n\n<span class=\"hljs-keyword\">const</span> textStorage = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">DataStorage</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;();\ntextStorage.<span class=\"hljs-title function_\">addItem</span>(<span class=\"hljs-string\">&quot;Hello&quot;</span>);\n</code></pre>\n<h2>5. 常见问题与解决方案</h2>\n<h3>5.1 泛型与any的区别</h3>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th>泛型</th>\n<th>any</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>类型安全</td>\n<td>是</td>\n<td>否</td>\n</tr>\n<tr>\n<td>类型推断</td>\n<td>支持</td>\n<td>不支持</td>\n</tr>\n<tr>\n<td>代码提示</td>\n<td>有</td>\n<td>无</td>\n</tr>\n<tr>\n<td>适用场景</td>\n<td>需要类型安全的多类型支持</td>\n<td>不关心类型时</td>\n</tr>\n</tbody>\n</table>\n<h3>5.2 泛型约束的最佳实践</h3>\n<ol>\n<li><strong>尽量使用约束</strong>  ：避免使用过于宽泛的类型</li>\n<li><strong>合理命名类型参数</strong>  ：如 <code>T</code>, <code>K</code>, <code>V</code> 等约定俗成的名称</li>\n<li><strong>避免过度使用</strong>  ：不是所有情况都需要泛型</li>\n</ol>\n<h3>5.3 复杂泛型的调试技巧</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-comment\">// 使用类型打印辅助工具</span>\n<span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">Debug</span>&lt;T&gt; = { [K <span class=\"hljs-keyword\">in</span> keyof T]: T[K] };\n\n<span class=\"hljs-comment\">// 或者使用条件类型来查看中间类型</span>\n<span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">Check</span>&lt;T&gt; = T <span class=\"hljs-title function_\">extends</span> (infer U)[] ? U : T;\n</code></pre>\n<h2>6. 实际应用场景</h2>\n<h3>6.1 API响应处理</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">ApiResponse</span>&lt;T&gt; {\n  <span class=\"hljs-attr\">success</span>: <span class=\"hljs-built_in\">boolean</span>;\n  <span class=\"hljs-attr\">data</span>?: T;\n  <span class=\"hljs-attr\">error</span>?: <span class=\"hljs-built_in\">string</span>;\n}\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">fetchUser</span>(<span class=\"hljs-params\"></span>): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-title class_\">ApiResponse</span>&lt;<span class=\"hljs-title class_\">User</span>&gt;&gt; {\n  <span class=\"hljs-comment\">// 实现获取用户逻辑</span>\n}\n</code></pre>\n<h3>6.2 高阶组件</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">function</span> withLoading&lt;T&gt;(<span class=\"hljs-title class_\">WrappedComponent</span>: <span class=\"hljs-title class_\">React</span>.<span class=\"hljs-property\">ComponentType</span>&lt;T&gt;) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-function\">(<span class=\"hljs-params\"><span class=\"hljs-attr\">props</span>: T &amp; { isLoading: <span class=\"hljs-built_in\">boolean</span> }</span>) =&gt;</span> (\n    props.<span class=\"hljs-property\">isLoading</span> ? <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Spinner</span> /&gt;</span></span> : <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">WrappedComponent</span> {<span class=\"hljs-attr\">...props</span>} /&gt;</span></span>\n  );\n}\n</code></pre>\n<h3>6.3 状态管理</h3>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">Store</span>&lt;T&gt; {\n  <span class=\"hljs-attr\">state</span>: T;\n  <span class=\"hljs-attr\">setState</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\"><span class=\"hljs-attr\">newState</span>: <span class=\"hljs-title class_\">Partial</span>&lt;T&gt;</span>) =&gt;</span> <span class=\"hljs-built_in\">void</span>;\n}\n\n<span class=\"hljs-keyword\">function</span> createStore&lt;T&gt;(<span class=\"hljs-attr\">initialState</span>: T): <span class=\"hljs-title class_\">Store</span>&lt;T&gt; {\n  <span class=\"hljs-comment\">// 实现store创建逻辑</span>\n}\n</code></pre>\n<p>通过掌握泛型，你可以编写更灵活、更可重用的TypeScript代码，同时保持类型安全。泛型是TypeScript强大类型系统的核心特性之一，合理使用可以大大提高代码质量和开发效率。</p>\n</div>";
      </script></body></html>
