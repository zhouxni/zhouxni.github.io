 class="hljs-params"></span>) {\n    <span class="hljs-keyword">if</span> (!wx.<span class="hljs-property">cloud</span>) {\n      <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;请使用 2.2.3 或以上的基础库以使用云能力&quot;</span>);\n    } <span class="hljs-keyword">else</span> {\n      wx.<span class="hljs-property">cloud</span>.<span class="hljs-title function_">init</span>({\n        <span class="hljs-attr">env</span>: <span class="hljs-string">&quot;你的环境ID&quot;</span>, <span class="hljs-comment">// 替换为实际环境ID</span>\n        <span class="hljs-attr">traceUser</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 开启用户访问追踪</span>\n      });\n    }\n  },\n});\n</code></pre>\n<h4>3. 目录结构</h4>\n<pre><code>miniprogram/       # 小程序前端代码\ncloudfunctions/    # 云函数根目录（自动生成）\n  └── login/       # 云函数示例\n      ├── index.js # 函数入口\n      └── package.json\n</code></pre>\n<hr>\n<h3>三、四大核心能力详解</h3>\n<h4>1. 云数据库（NoSQL JSON文档型）</h4>\n<ul>\n<li><strong>特性</strong>   ：文档型、自动索引、支持小程序端/云函数端读写、权限控制、实时数据推送。</li>\n<li><strong>基础操作（小程序端）</strong></li>\n</ul>\n<pre><code class="language-javascript"><span class="hljs-comment">// 1. 获取数据库引用</span>\n<span class="hljs-keyword">const</span> db = wx.<span class="hljs-property">cloud</span>.<span class="hljs-title function_">database</span>();\n<span class="hljs-keyword">const</span> _ = db.<span class="hljs-property">command</span>; <span class="hljs-comment">// 操作符（如gt、lt、and、or）</span>\n\n<span class="hljs-comment">// 2. 新增数据</span>\ndb.<span class="hljs-title function_">collection</span>(<span class="hljs-string">&quot;users&quot;</span>)\n  .<span class="hljs-title function_">add</span>({\n    <span class="hljs-attr">data</span>: {\n      <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;张三&quot;</span>,\n      <span class="hljs-attr">age</span>: <span class="hljs-number">25</span>,\n      <span class="hljs-attr">createTime</span>: db.<span class="hljs-title function_">serverDate</span>(), <span class="hljs-comment">// 服务端时间</span>\n    },\n  })\n  .<span class="hljs-title function_">then</span>(<span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;新增成功&quot;</span>, res.<span class="hljs-property">_id</span>);\n  });\n\n<span class="hljs-comment">// 3. 查询数据</span>\ndb.<span class="hljs-title function_">collection</span>(<span class="hljs-string">&quot;users&quot;</span>)\n  .<span class="hljs-title function_">where</span>({\n    <span class="hljs-attr">age</span>: _.<span class="hljs-title function_">gt</span>(<span class="hljs-number">20</span>),\n  })\n  .<span class="hljs-title function_">get</span>()\n  .<span class="hljs-title function_">then</span>(<span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;查询结果&quot;</span>, res.<span class="hljs-property">data</span>);\n  });\n\n<span class="hljs-comment">// 4. 更新数据</span>\ndb.<span class="hljs-title function_">collection</span>(<span class="hljs-string">&quot;users&quot;</span>)\n  .<span class="hljs-title function_">doc</span>(<span class="hljs-string">&quot;文档ID&quot;</span>)\n  .<span class="hljs-title function_">update</span>({\n    <span class="hljs-attr">data</span>: { <span class="hljs-attr">age</span>: <span class="hljs-number">26</span> },\n  });\n\n<span class="hljs-comment">// 5. 删除数据</span>\ndb.<span class="hljs-title function_">collection</span>(<span class="hljs-string">&quot;users&quot;</span>).<span class="hljs-title function_">doc</span>(<span class="hljs-string">&quot;文档ID&quot;</span>).<span class="hljs-title function_">remove</span>();\n</code></pre>\n<ul>\n<li><strong>云函数端操作</strong>   ：不受小程序端权限限制，适合批量/敏感操作。</li>\n</ul>\n<h4>2. 云存储（文件托管+CDN）</h4>\n<ul>\n<li><strong>特性</strong>   ：支持上传/下载/删除、自动CDN加速、文件管理、权限控制、大小限制（单文件≤100MB）。</li>\n<li><strong>基础操作</strong></li>\n</ul>\n<pre><code class="language-javascript"><span class="hljs-comment">// 上传文件</span>\nwx.<span class="hljs-property">cloud</span>.<span class="hljs-title function_">uploadFile</span>({\n  <span class="hljs-attr">cloudPath</span>: <span class="hljs-string">&quot;avatar/用户ID.png&quot;</span>, <span class="hljs-comment">// 云端路径</span>\n  <span class="hljs-attr">filePath</span>: <span class="hljs-string">&quot;本地临时路径&quot;</span>, <span class="hljs-comment">// 从wx.chooseImage等获取</span>\n  <span class="hljs-attr">success</span>: <span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;文件ID&quot;</span>, res.<span class="hljs-property">fileID</span>);\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;访问链接&quot;</span>, res.<span class="hljs-property">tempFileURL</span>);\n  },\n});\n\n<span class="hljs-comment">// 下载文件</span>\nwx.<span class="hljs-property">cloud</span>.<span class="hljs-title function_">downloadFile</span>({\n  <span class="hljs-attr">fileID</span>: <span class="hljs-string">&quot;云文件ID&quot;</span>,\n  <span class="hljs-attr">success</span>: <span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;本地路径&quot;</span>, res.<span class="hljs-property">tempFilePath</span>);\n  },\n});\n</code></pre>\n<h4>3. 云函数（云端Node.js运行环境）</h4>\n<ul>\n<li><strong>特性</strong>   ：运行在腾讯云Node.js环境、天然鉴权、可访问数据库/存储/微信开放接口、处理跨域/敏感逻辑/复杂计算。</li>\n<li><strong>创建与部署</strong>\n<ol>\n<li>开发者工具 → 右键<code>cloudfunctions</code> → 新建Node.js云函数（如<code>getUserInfo</code>）。</li>\n<li>编写<code>index.js</code>：</li>\n</ol>\n</li>\n</ul>\n<pre><code class="language-javascript"><span class="hljs-comment">// cloudfunctions/getUserInfo/index.js</span>\n<span class="hljs-built_in">exports</span>.<span class="hljs-property">main</span> = <span class="hljs-title function_">async</span> (event, context) =&gt; {\n  <span class="hljs-comment">// event: 小程序端传入参数 + 微信上下文（openid/appid等）</span>\n  <span class="hljs-comment">// context: 运行环境信息</span>\n  <span class="hljs-keyword">const</span> { userInfo } = context;\n  <span class="hljs-keyword">const</span> db = cloud.<span class="hljs-title function_">database</span>();\n\n  <span class="hljs-comment">// 示例：查询当前用户数据</span>\n  <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> db\n    .<span class="hljs-title function_">collection</span>(<span class="hljs-string">&quot;users&quot;</span>)\n    .<span class="hljs-title function_">where</span>({\n      <span class="hljs-attr">_openid</span>: userInfo.<span class="hljs-property">openId</span>,\n    })\n    .<span class="hljs-title function_">get</span>();\n\n  <span class="hljs-keyword">return</span> {\n    <span class="hljs-attr">user</span>: userInfo,\n    <span class="hljs-attr">data</span>: res.<span class="hljs-property">data</span>,\n  };\n};\n</code></pre>\n<ol start="3">\n<li>右键函数 → 上传并部署（云端安装依赖）。</li>\n</ol>\n<ul>\n<li><strong>小程序端调用</strong></li>\n</ul>\n<pre><code class="language-javascript">wx.<span class="hljs-property">cloud</span>\n  .<span class="hljs-title function_">callFunction</span>({\n    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;getUserInfo&quot;</span>, <span class="hljs-comment">// 函数名</span>\n    <span class="hljs-attr">data</span>: {\n      <span class="hljs-comment">/* 传入参数 */</span>\n    },\n  })\n  .<span class="hljs-title function_">then</span>(<span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;云函数返回&quot;</span>, res.<span class="hljs-property">result</span>);\n  });\n</code></pre>\n<h4>4. 云调用（免鉴权调用微信开放接口）</h4>\n<ul>\n<li>基于云函数，免<code>access_token</code>直接调用微信服务端API（如发送模板消息、获取 UnionID）。</li>\n<li>示例：发送模板消息</li>\n</ul>\n<pre><code class="language-javascript"><span class="hljs-comment">// 云函数中</span>\n<span class="hljs-keyword">const</span> cloud = <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;wx-server-sdk&quot;</span>);\ncloud.<span class="hljs-title function_">init</span>();\n<span class="hljs-built_in">exports</span>.<span class="hljs-property">main</span> = <span class="hljs-title function_">async</span> () =&gt; {\n  <span class="hljs-keyword">try</span> {\n    <span class="hljs-keyword">const</span> result = <span class="hljs-keyword">await</span> cloud.<span class="hljs-property">openapi</span>.<span class="hljs-property">templateMessage</span>.<span class="hljs-title function_">send</span>({\n      <span class="hljs-attr">touser</span>: <span class="hljs-string">&quot;用户openid&quot;</span>,\n      <span class="hljs-attr">template_id</span>: <span class="hljs-string">&quot;模板ID&quot;</span>,\n      <span class="hljs-attr">page</span>: <span class="hljs-string">&quot;pages/index/index&quot;</span>,\n      <span class="hljs-attr">data</span>: {\n        <span class="hljs-comment">/* 模板数据 */</span>\n      },\n    });\n    <span class="hljs-keyword">return</span> result;\n  } <span class="hljs-keyword">catch</span> (err) {\n    <span class="hljs-keyword">return</span> err;\n  }\n};\n</code></pre>\n<hr>\n<h3>四、权限与安全（核心）</h3>\n<h4>1. 数据库权限（两种模式）</h4>\n<ul>\n<li><strong>仅创建者可读写</strong>   ：默认，<code>_openid</code>自动绑定，数据隔离最安全。</li>\n<li><strong>所有用户可读，仅创建者可写</strong>   ：适合公开内容（如文章列表）。</li>\n<li><strong>自定义安全规则</strong>   ：控制台 → 数据库 → 安全规则，编写JSON规则精细控制。</li>\n</ul>\n<pre><code class="language-json"><span class="hljs-comment">// 示例：仅本人可修改自己的数据</span>\n<span class="hljs-punctuation">{</span>\n  <span class="hljs-attr">&quot;read&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;write&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;doc._openid == auth.openid&quot;</span>\n<span class="hljs-punctuation">}</span>\n</code></pre>\n<h4>2. 云存储权限</h4>\n<ul>\n<li>支持私有/公有读，精细控制文件访问范围。</li>\n</ul>\n<h4>3. 最佳实践</h4>\n<ul>\n<li>小程序端<strong>只做展示与简单查询</strong>   ，<strong>写操作/敏感读/批量操作必须走云函数</strong>   。</li>\n<li>用<code>_openid</code>实现用户数据强隔离。</li>\n<li>云函数做参数校验与权限判断。</li>\n</ul>\n<hr>\n<h3>五、典型场景实战示例</h3>\n<h4>1. 用户登录与信息存储</h4>\n<pre><code class="language-javascript"><span class="hljs-comment">// 小程序端</span>\nwx.<span class="hljs-title function_">getUserProfile</span>({\n  <span class="hljs-attr">desc</span>: <span class="hljs-string">&quot;用于完善会员资料&quot;</span>,\n  <span class="hljs-attr">success</span>: <span class="hljs-function">(<span class="hljs-params">res</span>) =&gt;</span> {\n    wx.<span class="hljs-property">cloud</span>.<span class="hljs-title function_">callFunction</span>({\n      <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;login&quot;</span>,\n      <span class="hljs-attr">data</span>: { <span class="hljs-attr">userInfo</span>: res.<span class="hljs-property">userInfo</span> },\n    });\n  },\n});\n\n<span class="hljs-comment">// 云函数 login</span>\n<span class="hljs-built_in">exports</span>.<span class="hljs-property">main</span> = <span class="hljs-title function_">async</span> (event, context) =&gt; {\n  <span class="hljs-keyword">const</span> { openId } = context.<span class="hljs-property">userInfo</span>;\n  <span class="hljs-keyword">const</span> db = cloud.<span class="hljs-title function_">database</span>();\n  <span class="hljs-comment">//  upsert：存在则更新，不存在则创建</span>\n  <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">collection</span>(<span class="hljs-string">&quot;users&quot;</span>).<span class="hljs-title function_">where</span>({ <span class="hljs-attr">_openid</span>: openId }).<span class="hljs-title function_">update</span>({\n    <span class="hljs-attr">data</span>: event.<span class="hljs-property">userInfo</span>,\n    <span class="hljs-attr">upsert</span>: <span class="hljs-literal">true</span>,\n  });\n  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span> };\n};\n</code></pre>\n<h4>2. 图片上传与展示</h4>\n<pre><code class="language-javascript"><span class="hljs-comment">// 选择并上传</span>\nwx.<span class="hljs-title function_">chooseImage</span>({\n  <span class="hljs-attr">count</span>: <span class="hljs-number">1</span>,\n  <span class="hljs-attr">success</span>: <span class="hljs-function"><span class="hljs-params">res</span> =&gt;</span> {\n    <span class="hljs-keyword">const</span> filePath = res.<span class="hljs-property">tempFilePaths</span>[<span class="hljs-number">0</span>]\n    wx.<span class="hljs-property">cloud</span>.<span class="hljs-title function_">uploadFile</span>({\n      <span class="hljs-attr">cloudPath</span>: <span class="hljs-string">`photos/<span class="hljs-subst">${<span class="hljs-built_in">Date</span>.now()}</span>.png`</span>,\n      filePath,\n      <span class="hljs-attr">success</span>: <span class="hljs-function"><span class="hljs-params">res</span> =&gt;</span> {\n        <span class="hljs-comment">// 保存fileID到数据库</span>\n        db.<span class="hljs-title function_">collection</span>(<span class="hljs-string">&#x27;photos&#x27;</span>).<span class="hljs-title function_">add</span>({<span class="hljs-attr">data</span>: {<span class="hljs-attr">fileID</span>: res.<span class="hljs-property">fileID</span>}})\n      }\n    })\n  }\n})\n\n<span class="hljs-comment">// 页面展示（直接用fileID）</span>\n&lt;image src=<span class="hljs-string">&quot;{{fileID}}&quot;</span> mode=<span class="hljs-string">&quot;widthFix&quot;</span> /&gt;\n</code></pre>\n<hr>\n<h3>六、云开发控制台（可视化管理）</h3>\n<ul>\n<li><strong>数据库</strong>   ：增删改查、索引管理、安全规则、数据导出。</li>\n<li><strong>存储管理</strong>   ：文件上传/删除/权限、批量操作。</li>\n<li><strong>云函数</strong>   ：代码编辑、部署、日志、监控、版本管理。</li>\n<li><strong>运营分析</strong>   ：用户访问、调用统计、异常监控。</li>\n</ul>\n<hr>\n<h3>七、计费与配额（2026年）</h3>\n<ul>\n<li><strong>免费额度</strong>   （单环境）：\n<ul>\n<li>数据库：5GB存储 + 每日5万次读 + 3万次写。</li>\n<li>云存储：5GB存储 + 每月15GB下载流量。</li>\n<li>云函数：每月40万GBs调用时长 + 100万次调用。</li>\n</ul>\n</li>\n<li><strong>超出部分</strong>   ：按量付费，价格低廉（详见微信云开发定价页）。</li>\n</ul>\n<hr>\n<h3>八、总结与最佳实践</h3>\n<p>云开发极大降低小程序后端门槛，适合<strong>快速原型、轻量应用、个人开发者、中小企业</strong>   。</p>\n<p><strong>核心原则</strong>   ：</p>\n<ol>\n<li>前端轻量化，复杂逻辑上云函数。</li>\n<li>权限最小化，数据强隔离。</li>\n<li>云函数做校验与安全兜底。</li>\n<li>分环境开发（test/prod）。</li>\n</ol>\n</div>'</script></body></html>
