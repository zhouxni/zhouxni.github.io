  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p>在 Webpack 中使用 <code>dotenv</code> 可以方便地管理和设置环境变量，以下是详细步骤和示例：</p>\n<h3>步骤 1：安装 <code>dotenv</code>  <code>cross-env</code></h3>\n<p>首先，在你的项目中安装 <code>dotenv</code> 库，它可以帮助你加载 <code>.env</code> 文件中的环境变量。在项目根目录下打开终端，执行以下命令：</p>\n<pre><code class=\"language-sh\">npm install dotenv cross-env --save-dev\n</code></pre>\n<h3>步骤 2：创建 <code>.env</code> 文件</h3>\n<p>在项目根目录下创建 <code>.env</code> 文件，用于存储环境变量。例如，你可以创建以下内容：</p>\n<pre><code class=\"language-plaintext\">NODE_ENV=development\nAPI_URL=https://api.example.com\n</code></pre>\n<p>你可以根据项目需求添加更多的环境变量。同时，为了区分不同环境，你还可以创建 <code>.env.development</code>、<code>.env.production</code> 等文件，分别用于开发环境和生产环境。</p>\n<h3>步骤 3：在 Webpack 配置中使用 <code>dotenv</code></h3>\n<p>在 Webpack 配置文件（通常是 <code>webpack.config.js</code>）中引入 <code>dotenv</code> 并加载环境变量，然后使用 <code>DefinePlugin</code> 将这些环境变量注入到你的应用中。</p>\n<pre><code>&quot;dev&quot;: &quot; cross-env NODE_ENV=prod  npx webpack-dev-server&quot;,\n</code></pre>\n<pre><code>const webpack = require('webpack');\nconst dotenv = require('dotenv');\n\n// 根据不同环境加载不同的.env文件\nconst env = dotenv.config({ path: `.env.${process.env.NODE_ENV}` }).parsed;\n\n// 将环境变量转换为适合 DefinePlugin 的格式\nconst envKeys = Object.keys(env).reduce((prev, next) =&gt; {\n    prev[`process.env.${next}`] = JSON.stringify(env[next]);\n    return prev;\n}, {});\n\nmodule.exports = {\n    // 其他 Webpack 配置项...\n    plugins: [\n        // 使用 DefinePlugin 将环境变量注入到应用中\n        new webpack.DefinePlugin(envKeys)\n    ]\n};\n    \n</code></pre>\n<h3>步骤 4：在代码中使用环境变量</h3>\n<p>配置完成后，你就可以在项目代码中使用这些环境变量了。例如，在 JavaScript 文件中：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">if</span> (process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">NODE_ENV</span> === <span class=\"hljs-string\">&#x27;development&#x27;</span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;当前处于开发环境&#x27;</span>);\n}\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;API 地址:&#x27;</span>, process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">API_URL</span>);\n</code></pre>\n<h3>注意事项</h3>\n<ul>\n<li><strong>文件优先级</strong>  ：如果同时存在 <code>.env</code> 和 <code>.env.development</code> 文件，<code>.env.development</code> 文件中的变量会覆盖 <code>.env</code> 文件中同名的变量。</li>\n<li><strong>安全性</strong>  ：不要在 <code>.env</code> 文件中存储敏感信息，如数据库密码、API 密钥等。如果需要存储敏感信息，可以使用 <code>.env.local</code> 文件，该文件通常会被 <code>.gitignore</code> 忽略，不会被提交到版本控制系统中。</li>\n</ul>\n<p>通过以上步骤，你就可以在 Webpack 项目中使用 <code>dotenv</code> 方便地管理和设置环境变量了。</p>\n</div>";
      </script></body></html>
