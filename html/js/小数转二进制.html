<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="小数转二进制",document.getElementById("article").innerHTML='<div><p>小数部分与整数部分 <strong>分开处理</strong>   ：</p>\n<ol>\n<li><strong>整数部分</strong>   ：除 2 取余，倒着排。</li>\n<li><strong>小数部分</strong>   ：乘 2 取整，顺序排。</li>\n<li>合并：整数 + 小数，中间加小数点。</li>\n</ol>\n<hr>\n<h3>✅ 例子：把 13.375₁₀ 转二进制</h3>\n<h4>① 整数 13</h4>\n<pre><code>13 ÷ 2 = 6 … 1\n6  ÷ 2 = 3 … 0\n3  ÷ 2 = 1 … 1\n1  ÷ 2 = 0 … 1      → 1101\n</code></pre>\n<h4>② 小数 0.375</h4>\n<pre><code>0.375 × 2 = 0.75   整数位 0\n0.75  × 2 = 1.5    整数位 1\n0.5   × 2 = 1.0    整数位 1   （余 0，结束）\n→ 011\n</code></pre>\n<h4>③ 合并</h4>\n<pre><code>1101.011₂\n</code></pre>\n<p>所以 <strong>13.375₁₀ = 1101.011₂</strong></p>\n<hr>\n<h3>✅ 无限循环怎么办？</h3>\n<p>有些小数乘不尽，如 0.1：</p>\n<pre><code>0.1 × 2 = 0.2  0\n0.2 × 2 = 0.4  0\n0.4 × 2 = 0.8  0\n0.8 × 2 = 1.6  1\n0.6 × 2 = 1.2  1\n0.2 × 2 = 0.4  0   ← 开始循环\n→ 0.0001100110011…\n</code></pre>\n<p>此时只能<strong>截断</strong>   或按所需精度保留位数。</p>\n<hr>\n<h3>✅ JavaScript 查看</h3>\n<pre><code class="language-js">(<span class="hljs-number">13.375</span>).<span class="hljs-title function_">toString</span>(<span class="hljs-number">2</span>); <span class="hljs-comment">// &quot;1101.011&quot;</span>\n(<span class="hljs-number">0.1</span>).<span class="hljs-title function_">toString</span>(<span class="hljs-number">2</span>); <span class="hljs-comment">// &quot;0.000110011001100110011001100110011001100110011001101&quot;</span>\n</code></pre>\n<hr>\n<h3>✅ 口诀</h3>\n<blockquote>\n<p><strong>整数除 2 倒着排，小数乘 2 正着排；循环截断按需求。</strong></p>\n</blockquote>\n</div>'</script></body></html>
