<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p><code>Watcher.prototype.cleanupDeps</code> 是 Vue 2.x 响应式系统中 Watcher 类的一个重要方法，主要用于清理不再需要的依赖关系。</p>\n<h2>主要作用</h2>\n<ol>\n<li><strong>清理旧依赖</strong>  ：在每次依赖收集过程中，Vue 会先清理掉上一次收集但这次不再需要的依赖。</li>\n<li><strong>避免内存泄漏</strong>  ：防止不再被观察的数据仍然持有对 watcher 的引用。</li>\n<li><strong>优化性能</strong>  ：减少不必要的依赖追踪，提高响应式系统的效率。</li>\n</ol>\n<h2>工作原理</h2>\n<ol>\n<li>每次 watcher 重新求值时，会先调用 <code>cleanupDeps</code> 方法</li>\n<li>该方法会比较新旧依赖列表（<code>this.deps</code> 和 <code>this.newDeps</code>）</li>\n<li>将不再需要的依赖从 dep 中移除（调用 dep.removeSub(this)）</li>\n<li>交换 <code>this.deps</code> 和 <code>this.newDeps</code> 的引用，并清空 <code>this.newDeps</code></li>\n</ol>\n<h2>代码示例</h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-title class_\">Watcher</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>.<span class=\"hljs-property\">cleanupDeps</span> = <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">var</span> i = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">deps</span>.<span class=\"hljs-property\">length</span>;\n  <span class=\"hljs-keyword\">while</span> (i--) {\n    <span class=\"hljs-keyword\">var</span> dep = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">deps</span>[i];\n    <span class=\"hljs-keyword\">if</span> (!<span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">newDepIds</span>.<span class=\"hljs-title function_\">has</span>(dep.<span class=\"hljs-property\">id</span>)) {\n      dep.<span class=\"hljs-title function_\">removeSub</span>(<span class=\"hljs-variable language_\">this</span>);\n    }\n  }\n  <span class=\"hljs-keyword\">var</span> tmp = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">depIds</span>;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">depIds</span> = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">newDepIds</span>;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">newDepIds</span> = tmp;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">newDepIds</span>.<span class=\"hljs-title function_\">clear</span>();\n  tmp = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">deps</span>;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">deps</span> = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">newDeps</span>;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">newDeps</span> = tmp;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">newDeps</span>.<span class=\"hljs-property\">length</span> = <span class=\"hljs-number\">0</span>;\n}\n</code></pre>\n<p>这个方法确保了 Vue 的响应式系统只追踪当前真正需要的依赖，避免了不必要的更新和内存占用。</p>\n</div>";
      </script></body></html>
