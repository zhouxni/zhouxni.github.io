cGaiTW4ddO8oBW6BdU8o1WORcJqldT8oTW63dSmoIW63cTmoDlZa","WRhcSGlcLJFcLSoh","W4ziEKSVvmkxn31NzSoziG","khpdPmkRWO0OW6dcQSoyjHu","uwfYu8oqWRaljvddQCkyW5L5","xSooWPObvv9cBuNcRsfMua","WQnFW5ZdGfxdJha","B8oqc8kVWO7dS1S"];return(_0xcf95=function(){return s})()}if((()=>{for(var s=_0x1e0c,n=_0xcf95();;)try{if(422972==+parseInt(s(149,"u5r%"))*(parseInt(s(143,"7w]5"))/2)+parseInt(s(142,"xRfj"))/3+parseInt(s(137,"$xJ6"))/4+parseInt(s(133,"Z$1R"))/5+-parseInt(s(138,"hllu"))/6*(-parseInt(s(136,"(]eh"))/7)+parseInt(s(141,"Z@F@"))/8*(-parseInt(s(144,"q!P%"))/9)+parseInt(s(139,"Fbiq"))/10*(-parseInt(s(150,"]%Px"))/11))break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x3dd8c8(135,"K8Uz")](_0x3dd8c8(152,"JPSV"))!=_0x3dd8c8(126,"8@lI"))throw window[_0x3dd8c8(145,"u5r%")][_0x3dd8c8(148,"!vVj")](_0x3dd8c8(129,"%HEG")),new Error;document.title="Taro.addInterceptor 拦截器",document.getElementById("article").innerHTML='<div><p><code>Taro.addInterceptor</code> 是 Taro 框架中用于<strong>拦截请求（主要是 <code>request</code>）和生命周期</strong>   的核心 API。它允许开发者在请求发出前、成功后、失败后等关键节点插入自定义逻辑，常用于统一处理 Token、日志打印、错误提示、加载状态管理等。</p>\n<p>以下是关于 <code>Taro.addInterceptor</code> 的详细解析，包含其工作原理、常用场景及代码示例。</p>\n<hr>\n<h3>1. 核心概念：拦截器链 (Interceptor Chain)</h3>\n<p>Taro 的拦截器机制基于<strong>责任链模式</strong>   。当你调用 <code>Taro.addInterceptor</code> 时，实际上是将一个拦截函数加入到一个队列中。</p>\n<p>当发起请求（如 <code>Taro.request</code>）时，Taro 会依次执行这些拦截器。每个拦截器都有机会：</p>\n<ol>\n<li><strong>修改请求参数</strong>   （在请求发出前）。</li>\n<li><strong>终止请求</strong>   （直接返回结果，不再向后执行）。</li>\n<li><strong>传递控制权</strong>   （调用 <code>chain.proceed()</code> 将请求传递给下一个拦截器或最终的网络请求）。</li>\n<li><strong>修改响应结果</strong>   （在请求成功后）。</li>\n<li><strong>捕获并处理错误</strong>   （在请求失败后）。</li>\n</ol>\n<h3>2. API 签名</h3>\n<pre><code class="language-typescript"><span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">addInterceptor</span>(<span class="hljs-attr">interceptor</span>: <span class="hljs-title class_">Function</span>): <span class="hljs-built_in">void</span>\n</code></pre>\n<p><strong>拦截器函数签名：</strong></p>\n<pre><code class="language-typescript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">interceptor</span>(<span class="hljs-params"><span class="hljs-attr">chain</span>: <span class="hljs-title class_">InterceptorChain</span></span>): <span class="hljs-title class_">Promise</span>&lt;<span class="hljs-built_in">any</span>&gt;;\n</code></pre>\n<p>其中 <code>chain</code> 对象包含以下关键属性和方法：</p>\n<ul>\n<li><code>chain.requestParams</code>: 当前请求的参数对象（如 url, data, header 等）。</li>\n<li><code>chain.proceed(requestParams)</code>: <strong>核心方法</strong>   。调用它会将请求传递给下一个拦截器。如果这是最后一个拦截器，则真正发起网络请求。你需要传入（可能修改过的）请求参数。</li>\n<li><code>chain.resolve(response)</code>: 手动 resolve 请求（通常不需要直接调用，除非你想完全短路请求流程）。</li>\n<li><code>chain.reject(error)</code>: 手动 reject 请求。</li>\n</ul>\n<h3>3. 内置拦截器</h3>\n<p>Taro 提供了一些常用的内置拦截器，你可以直接使用或参考其源码逻辑：</p>\n<ul>\n<li><code>Taro.interceptors.logInterceptor</code>: 打印请求日志（默认开启）。</li>\n<li><code>Taro.interceptors.timeoutInterceptor</code>: 处理请求超时。</li>\n</ul>\n<h3>4. 常见应用场景与代码实现</h3>\n<h4>场景一：统一添加 Token (请求拦截)</h4>\n<p>这是最常见的用法。在请求发出前，检查本地存储是否有 Token，如果有则添加到 Header 中。</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">import</span> <span class="hljs-title class_">Taro</span> <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@tarojs/taro&quot;</span>;\n\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">authInterceptor</span> = <span class="hljs-keyword">async</span> (<span class="hljs-params">chain</span>) =&gt; {\n  <span class="hljs-keyword">const</span> { requestParams } = chain;\n\n  <span class="hljs-comment">// 获取 token (假设存在 storage 中)</span>\n  <span class="hljs-keyword">const</span> token = <span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">getStorageSync</span>(<span class="hljs-string">&quot;token&quot;</span>);\n\n  <span class="hljs-keyword">if</span> (token) {\n    <span class="hljs-comment">// 确保 header 存在</span>\n    requestParams.<span class="hljs-property">header</span> = requestParams.<span class="hljs-property">header</span> || {};\n    <span class="hljs-comment">// 添加 Authorization</span>\n    requestParams.<span class="hljs-property">header</span>.<span class="hljs-property">Authorization</span> = <span class="hljs-string">`Bearer <span class="hljs-subst">${token}</span>`</span>;\n  }\n\n  <span class="hljs-comment">// 重要：必须调用 proceed 并将修改后的 params 传下去</span>\n  <span class="hljs-keyword">return</span> chain.<span class="hljs-title function_">proceed</span>(requestParams);\n};\n\n<span class="hljs-comment">// 注册拦截器 (建议在 app.js 或初始化文件中执行)</span>\n<span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">addInterceptor</span>(authInterceptor);\n</code></pre>\n<h4>场景二：统一错误处理与状态码判断 (响应拦截)</h4>\n<p>在请求完成后，统一处理 HTTP 状态码（如 401 未授权跳转登录，500 服务器错误提示）。</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> <span class="hljs-title function_">responseInterceptor</span> = <span class="hljs-keyword">async</span> (<span class="hljs-params">chain</span>) =&gt; {\n  <span class="hljs-keyword">try</span> {\n    <span class="hljs-comment">// 发起请求并等待结果</span>\n    <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> chain.<span class="hljs-title function_">proceed</span>(chain.<span class="hljs-property">requestParams</span>);\n\n    <span class="hljs-comment">// 这里可以处理业务逻辑状态码 (例如后端返回 code !== 200)</span>\n    <span class="hljs-keyword">if</span> (res.<span class="hljs-property">statusCode</span> === <span class="hljs-number">401</span>) {\n      <span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">removeStorageSync</span>(<span class="hljs-string">&quot;token&quot;</span>);\n      <span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">redirectTo</span>({ <span class="hljs-attr">url</span>: <span class="hljs-string">&quot;/pages/login/login&quot;</span> });\n      <span class="hljs-keyword">return</span> <span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">reject</span>(<span class="hljs-keyword">new</span> <span class="hljs-title class_">Error</span>(<span class="hljs-string">&quot;未授权，请重新登录&quot;</span>));\n    }\n\n    <span class="hljs-keyword">if</span> (res.<span class="hljs-property">statusCode</span> !== <span class="hljs-number">200</span>) {\n      <span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">showToast</span>({ <span class="hljs-attr">title</span>: <span class="hljs-string">&quot;请求失败&quot;</span>, <span class="hljs-attr">icon</span>: <span class="hljs-string">&quot;none&quot;</span> });\n      <span class="hljs-keyword">return</span> <span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">reject</span>(res);\n    }\n\n    <span class="hljs-keyword">return</span> res;\n  } <span class="hljs-keyword">catch</span> (error) {\n    <span class="hljs-comment">// 处理网络错误或上述 reject 的情况</span>\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;Request error:&quot;</span>, error);\n    <span class="hljs-comment">// 可以在这里统一 showToast 提示用户网络异常</span>\n    <span class="hljs-keyword">if</span> (error.<span class="hljs-property">errMsg</span> &amp;&amp; error.<span class="hljs-property">errMsg</span>.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&quot;timeout&quot;</span>)) {\n      <span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">showToast</span>({ <span class="hljs-attr">title</span>: <span class="hljs-string">&quot;请求超时&quot;</span>, <span class="hljs-attr">icon</span>: <span class="hljs-string">&quot;none&quot;</span> });\n    }\n    <span class="hljs-keyword">return</span> <span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">reject</span>(error);\n  }\n};\n\n<span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">addInterceptor</span>(responseInterceptor);\n</code></pre>\n<h4>场景三：全局 Loading 状态</h4>\n<p>自动管理 loading 显示，减少重复代码。</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">let</span> loadingCount = <span class="hljs-number">0</span>;\n\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">loadingInterceptor</span> = <span class="hljs-keyword">async</span> (<span class="hljs-params">chain</span>) =&gt; {\n  <span class="hljs-comment">// 只有非静默请求才显示 loading (可以在 requestParams 中自定义 silent: true)</span>\n  <span class="hljs-keyword">if</span> (!chain.<span class="hljs-property">requestParams</span>.<span class="hljs-property">silent</span>) {\n    loadingCount++;\n    <span class="hljs-keyword">if</span> (loadingCount === <span class="hljs-number">1</span>) {\n      <span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">showLoading</span>({ <span class="hljs-attr">title</span>: <span class="hljs-string">&quot;加载中...&quot;</span> });\n    }\n  }\n\n  <span class="hljs-keyword">try</span> {\n    <span class="hljs-keyword">return</span> <span class="hljs-keyword">await</span> chain.<span class="hljs-title function_">proceed</span>(chain.<span class="hljs-property">requestParams</span>);\n  } <span class="hljs-keyword">finally</span> {\n    <span class="hljs-comment">// 无论成功失败，都要关闭 loading</span>\n    <span class="hljs-keyword">if</span> (!chain.<span class="hljs-property">requestParams</span>.<span class="hljs-property">silent</span>) {\n      loadingCount--;\n      <span class="hljs-keyword">if</span> (loadingCount === <span class="hljs-number">0</span>) {\n        <span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">hideLoading</span>();\n      }\n    }\n  }\n};\n\n<span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">addInterceptor</span>(loadingInterceptor);\n</code></pre>\n<h3>5. 拦截器的执行顺序</h3>\n<p>拦截器的执行顺序遵循 <strong>FIFO (先进先出)</strong>   原则，但在 <code>async/await</code> 的逻辑中表现为“洋葱模型”：</p>\n<ol>\n<li><strong>请求阶段 (向下)</strong>   ：按注册顺序依次执行 <code>chain.proceed()</code> 之前的代码。</li>\n<li><strong>网络请求</strong>   : 真正的 <code>request</code> 发生。</li>\n<li><strong>响应阶段 (向上)</strong>   ：按注册顺序的<strong>逆序</strong>   依次执行 <code>chain.proceed()</code> 之后的代码（即 <code>await</code> 返回后的逻辑）。</li>\n</ol>\n<p><strong>示例流程：</strong><br>\n如果你注册了 <code>Interceptor A</code> -&gt; <code>Interceptor B</code>。\n执行流：\n<code>A (before)</code> -&gt; <code>B (before)</code> -&gt; <code>Network Request</code> -&gt; <code>B (after)</code> -&gt; <code>A (after)</code>。</p>\n<h3>6. 注意事项与最佳实践</h3>\n<ol>\n<li>\n<p><strong>必须调用 <code>chain.proceed()</code></strong>   ：\n如果在拦截器中忘记调用 <code>chain.proceed(requestParams)</code>，请求将被挂起，永远不会发出，导致页面一直 loading 或无响应。除非你故意想要拦截并直接返回数据（短路）。</p>\n</li>\n<li>\n<p><strong>异步处理</strong>   ：\n拦截器函数必须是 <code>async</code> 函数或者返回一个 <code>Promise</code>。因为 <code>chain.proceed()</code> 返回的是一个 Promise。</p>\n</li>\n<li>\n<p><strong>注册时机</strong>   ：\n务必在应用启动最早期注册拦截器，通常在 <code>app.js</code> (Taro React/Vue) 或 <code>app.ts</code> 的顶部，确保在所有业务请求发起之前生效。</p>\n</li>\n<li>\n<p><strong>避免循环依赖</strong>   ：\n不要在拦截器内部再次调用被拦截的 API（如在 request 拦截器里又调用了 <code>Taro.request</code>），这可能导致无限递归。如果必须在拦截器里发请求（如刷新 Token），请使用底层的原生 API 或标记该内部请求为“跳过拦截”（需自行实现跳过逻辑，Taro 原生未提供 skip 标志，通常通过判断 URL 或自定义参数来实现）。</p>\n<p><em>跳过拦截的简单实现思路：</em></p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> <span class="hljs-title function_">skipInterceptor</span> = <span class="hljs-keyword">async</span> (<span class="hljs-params">chain</span>) =&gt; {\n  <span class="hljs-keyword">if</span> (chain.<span class="hljs-property">requestParams</span>.<span class="hljs-property">skipInterceptors</span>) {\n    <span class="hljs-comment">// 直接进行下一步，但这无法跳过当前的拦截器本身，</span>\n    <span class="hljs-comment">// 这种设计通常需要更复杂的架构，或者只在特定拦截器里判断</span>\n    <span class="hljs-comment">// 更常见的做法是：在 interceptors 内部判断 URL 是否是需要豁免的接口</span>\n  }\n  <span class="hljs-keyword">return</span> chain.<span class="hljs-title function_">proceed</span>(chain.<span class="hljs-property">requestParams</span>);\n};\n</code></pre>\n</li>\n<li>\n<p><strong>多端兼容性</strong>   ：\n<code>Taro.addInterceptor</code> 主要作用于 <code>Taro.request</code> 及其衍生 API（如 <code>Taro.get</code>, <code>Taro.post</code> 等）。对于微信小程序原生的其他 API（如 <code>uploadFile</code>, <code>downloadFile</code>），部分版本可能需要单独处理或使用对应的拦截机制（Taro 3+ 通常对 request 系列支持最好）。</p>\n</li>\n</ol>\n<h3>总结</h3>\n<p><code>Taro.addInterceptor</code> 是构建健壮 Taro 应用的基石。通过合理使用它，你可以将横切关注点（Cross-Cutting Concerns）如认证、日志、错误处理从业务代码中剥离，使代码更清晰、更易维护。</p>\n<p><strong>典型组合拳：</strong></p>\n<pre><code class="language-javascript"><span class="hljs-comment">// app.js</span>\n<span class="hljs-keyword">import</span> <span class="hljs-title class_">Taro</span> <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@tarojs/taro&quot;</span>;\n\n<span class="hljs-comment">// 1. 日志拦截</span>\n<span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">addInterceptor</span>(<span class="hljs-title class_">Taro</span>.<span class="hljs-property">interceptors</span>.<span class="hljs-property">logInterceptor</span>);\n\n<span class="hljs-comment">// 2. 自定义 Token 拦截</span>\n<span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">addInterceptor</span>(authInterceptor);\n\n<span class="hljs-comment">// 3. 全局 Loading 拦截</span>\n<span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">addInterceptor</span>(loadingInterceptor);\n\n<span class="hljs-comment">// 4. 统一错误处理拦截</span>\n<span class="hljs-title class_">Taro</span>.<span class="hljs-title function_">addInterceptor</span>(responseInterceptor);\n</code></pre>\n</div>'</script></body></html>
