<script>
        document.getElementById('article').innerHTML = 
        "<div><p>是的，React 和 Vue 在进行虚拟 DOM 的 Diff 算法时，<strong>都会优先比较节点的 <code>tag</code>（或组件类型）和 <code>key</code> 是否相同</strong>  ，以此判断是否可以复用现有节点。这是两者优化渲染性能的共同策略，但具体实现细节有所不同：</p>\n<hr>\n<h3>1. <strong>React 的 Diff 策略</strong></h3>\n<ul>\n<li><strong>比较顺序</strong>  ：\n<ol>\n<li><strong><code>key</code> 和 <code>elementType</code>（或 <code>tag</code>）</strong>  ：React 会先检查新旧节点的 <code>key</code> 是否相同，如果 <code>key</code> 不同直接销毁并重建节点；如果 <code>key</code> 相同，再比较节点的类型（如 <code>div</code>、<code>ComponentA</code> 等）。</li>\n<li><strong>递归子节点</strong>  ：对子节点列表，React 会通过 <code>key</code> 匹配新旧节点，然后按顺序递归比较（或使用更高效的算法如 Fiber 的链表结构）。</li>\n</ol>\n</li>\n<li><strong>关键点</strong>  ：\n<ul>\n<li>如果 <code>key</code> 相同但类型不同（如从 <code>&lt;div&gt;</code> 变成 <code>&lt;span&gt;</code>），React 会销毁整个子树并重建。</li>\n<li>如果没有显式定义 <code>key</code>，React 会默认使用索引（<code>index</code>）作为 <code>key</code>，可能导致低效更新（如列表中间插入元素时）。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3>2. <strong>Vue 的 Diff 策略</strong></h3>\n<ul>\n<li><strong>比较顺序</strong>  ：\n<ol>\n<li><strong><code>key</code> 和 <code>tag</code></strong>  ：Vue 同样优先检查 <code>key</code> 和标签名（如 <code>div</code>、<code>MyComponent</code>）是否相同。如果不同，直接替换节点。</li>\n<li><strong>子节点优化</strong>  ：Vue 对子节点的 Diff 采用双端对比算法（头-头、尾-尾、头-尾、尾-头），结合 <code>key</code> 快速匹配移动节点。</li>\n</ol>\n</li>\n<li><strong>关键点</strong>  ：\n<ul>\n<li>和 React 类似，<code>key</code> 是 Vue 判断节点可复用的核心依据。未定义 <code>key</code> 时，Vue 也会使用索引，但会通过双端比较减少不必要的操作。</li>\n<li>Vue 对静态节点（无动态绑定的节点）会直接跳过 Diff，提升性能。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3>3. <strong>共同点与差异</strong></h3>\n<table>\n<thead>\n<tr>\n<th><strong>对比项</strong></th>\n<th><strong>React</strong></th>\n<th><strong>Vue</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>核心比较逻辑</strong></td>\n<td><code>key</code> + <code>elementType</code></td>\n<td><code>key</code> + <code>tag</code></td>\n</tr>\n<tr>\n<td><strong>子节点 Diff</strong></td>\n<td>递归（Fiber 优化）</td>\n<td>双端对比 + <code>key</code> 匹配</td>\n</tr>\n<tr>\n<td><strong>未定义 <code>key</code></strong></td>\n<td>使用 <code>index</code>，可能低效</td>\n<td>使用 <code>index</code>，但双端对比优化</td>\n</tr>\n<tr>\n<td><strong>静态优化</strong></td>\n<td>通过 <code>React.memo</code> 或 <code>shouldComponentUpdate</code></td>\n<td>自动标记静态节点跳过 Diff</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>4. <strong>为什么 <code>key</code> 重要？</strong></h3>\n<ul>\n<li><strong>唯一标识</strong>  ：<code>key</code> 帮助框架识别节点的稳定性（如列表项的唯一 ID），避免因顺序变化导致的无效更新。</li>\n<li><strong>性能优化</strong>  ：正确的 <code>key</code>（如数据库 ID）比 <code>index</code> 更能减少 DOM 操作。</li>\n</ul>\n<hr>\n<h3>示例说明</h3>\n<pre><code class=\"language-jsx\"><span class=\"hljs-comment\">// React：key 不同时，节点会被销毁并重建</span>\n&lt;div key=<span class=\"hljs-string\">&quot;a&quot;</span>&gt;<span class=\"hljs-title class_\">Old</span>&lt;<span class=\"hljs-regexp\">/div&gt; → &lt;p key=&quot;b&quot;&gt;New&lt;/</span>p&gt; <span class=\"hljs-comment\">// 销毁 div，创建 p</span>\n\n<span class=\"hljs-comment\">// Vue：类似逻辑</span>\n<span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">template</span> <span class=\"hljs-attr\">v-if</span>=<span class=\"hljs-string\">&quot;show&quot;</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span> <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">&quot;a&quot;</span>&gt;</span>Old<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span> \n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">template</span>&gt;</span></span>\n<span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">template</span> <span class=\"hljs-attr\">v-else</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span> <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">&quot;b&quot;</span>&gt;</span>New<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span>  // 销毁 div，创建 p\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">template</span>&gt;</span></span>\n</code></pre>\n<hr>\n<p>总结：React 和 Vue 都依赖 <code>key</code> 和节点类型判断复用性，但子节点 Diff 的具体算法不同（React 偏向递归，Vue 偏向双端对比）。正确使用 <code>key</code> 是两者高效更新的关键。</p>\n</div>";
      </script></body></html>
