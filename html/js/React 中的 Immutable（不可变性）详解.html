OBgqDrZa7W5tcR8ouW6tdM0JdH1ddJSoYsfT9ymorDSonW5y","WOTwA8otW4i","b8kvW6aGW5jEpxW0WPFdNSkqW6C","jqhdVwtdPrxdQZ3dOG"];return(_0xd02e=function(){return s})()}if((()=>{for(var s=_0x1721,n=_0xd02e();;)try{if(965271==-parseInt(s(335,"0Wr7"))+-parseInt(s(339,"I)%d"))/2+-parseInt(s(332,"q1H["))/3+-parseInt(s(338,"H7tC"))/4+-parseInt(s(340,"BM@)"))/5*(-parseInt(s(341,"I)%d"))/6)+parseInt(s(334,"ms)1"))/7+parseInt(s(343,"IB]["))/8)break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x5a2256(347,"9*l2")](_0x5a2256(345,"8]qi"))!=_0x5a2256(349,"BM@)"))throw window[_0x5a2256(344,"[6Na")][_0x5a2256(337,"ms)1")](_0x5a2256(348,"dX7!")),new Error;document.title="React 中的 Immutable（不可变性）详解",document.getElementById("article").innerHTML='<div><p>Immutable（不可变性）是 React 核心设计思想之一，<strong>指数据一旦创建就不能被修改</strong>   ，修改数据必须生成新的数据副本，而非直接修改原数据。</p>\n<p>它是 React 性能优化、状态管理、数据追踪的关键基础，也是 React 区别于其他框架的核心特性。</p>\n<hr>\n<h2>一、为什么 React 必须用 Immutable？</h2>\n<p>React 的核心更新机制依赖 <strong>引用对比（<code>===</code>）</strong>   ：</p>\n<ol>\n<li>React 判断组件是否重渲染，是对比 <code>state/props</code> 的<strong>内存地址</strong>   ，而非数据内容</li>\n<li>如果直接修改原对象/数组（可变操作），内存地址不变 → React 认为数据没变化 → <strong>组件不更新</strong></li>\n<li>不可变性保证每次修改都生成新引用 → React 能精准感知变化 → 正确触发更新</li>\n</ol>\n<h3>反例（错误写法：直接修改原数据）</h3>\n<pre><code class="language-jsx"><span class="hljs-comment">// ❌ 直接修改 state，React 检测不到变化，组件不刷新</span>\n<span class="hljs-keyword">const</span> [user, setUser] = <span class="hljs-title function_">useState</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;张三&quot;</span>, <span class="hljs-attr">age</span>: <span class="hljs-number">18</span> });\n\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">changeAge</span> = (<span class="hljs-params"></span>) =&gt; {\n  user.<span class="hljs-property">age</span> = <span class="hljs-number">19</span>; <span class="hljs-comment">// 直接修改原对象，引用未变</span>\n  <span class="hljs-title function_">setUser</span>(user); <span class="hljs-comment">// 无效更新</span>\n};\n</code></pre>\n<h3>正例（正确写法：保持不可变性）</h3>\n<pre><code class="language-jsx"><span class="hljs-comment">// ✅ 创建新对象，引用改变，React 正常更新</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">changeAge</span> = (<span class="hljs-params"></span>) =&gt; {\n  <span class="hljs-title function_">setUser</span>({\n    ...user, <span class="hljs-comment">// 拷贝原有属性</span>\n    <span class="hljs-attr">age</span>: <span class="hljs-number">19</span>, <span class="hljs-comment">// 覆盖修改的属性</span>\n  });\n};\n</code></pre>\n<hr>\n<h2>二、原生 JS 实现 Immutable（基础方案）</h2>\n<p>无需第三方库，用 ES6 语法就能实现基础不可变性：</p>\n<h3>1. 对象的不可变修改</h3>\n<pre><code class="language-jsx"><span class="hljs-comment">// 新增/修改属性</span>\n<span class="hljs-keyword">const</span> newObj = { ...oldObj, <span class="hljs-attr">key</span>: newValue };\n\n<span class="hljs-comment">// 删除属性</span>\n<span class="hljs-keyword">const</span> { deleteKey, ...newObj } = oldObj;\n\n<span class="hljs-comment">// 嵌套对象（必须逐层拷贝）</span>\n<span class="hljs-keyword">const</span> [state, setState] = <span class="hljs-title function_">useState</span>({ <span class="hljs-attr">a</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">b</span>: { <span class="hljs-attr">c</span>: <span class="hljs-number">2</span> } });\n<span class="hljs-title function_">setState</span>({\n  ...state,\n  <span class="hljs-attr">b</span>: { ...state.<span class="hljs-property">b</span>, <span class="hljs-attr">c</span>: <span class="hljs-number">3</span> }, <span class="hljs-comment">// 嵌套层也要新建引用</span>\n});\n</code></pre>\n<h3>2. 数组的不可变修改</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> [list, setList] = <span class="hljs-title function_">useState</span>([<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>]);\n\n<span class="hljs-comment">// 新增元素</span>\n<span class="hljs-title function_">setList</span>([...list, <span class="hljs-number">4</span>]);\n<span class="hljs-comment">// 头部新增</span>\n<span class="hljs-title function_">setList</span>([<span class="hljs-number">0</span>, ...list]);\n\n<span class="hljs-comment">// 修改元素</span>\n<span class="hljs-title function_">setList</span>(list.<span class="hljs-title function_">map</span>(<span class="hljs-function">(<span class="hljs-params">item</span>) =&gt;</span> (item === <span class="hljs-number">2</span> ? <span class="hljs-number">20</span> : item)));\n\n<span class="hljs-comment">// 删除元素</span>\n<span class="hljs-title function_">setList</span>(list.<span class="hljs-title function_">filter</span>(<span class="hljs-function">(<span class="hljs-params">item</span>) =&gt;</span> item !== <span class="hljs-number">3</span>));\n\n<span class="hljs-comment">// 禁止使用：push/pop/unshift/splice/sort 等直接修改原数组的方法</span>\n</code></pre>\n<hr>\n<h2>三、进阶：Immutable.js 库（深度不可变）</h2>\n<p>原生方案在<strong>多层嵌套数据</strong>   下会非常繁琐（需要逐层拷贝），推荐使用官方推荐的 <strong>Immutable.js</strong>   ：</p>\n<ul>\n<li>彻底实现数据不可变，所有修改都返回新数据</li>\n<li>内置高效结构共享，性能远超原生深拷贝</li>\n<li>自带丰富的 API（Map/List/Set 等）</li>\n</ul>\n<h3>1. 安装</h3>\n<pre><code class="language-bash">npm install immutable\n<span class="hljs-comment"># 或</span>\nyarn add immutable\n</code></pre>\n<h3>2. 基础使用</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { <span class="hljs-title class_">Map</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;immutable&quot;</span>;\n\n<span class="hljs-comment">// 创建不可变 Map</span>\n<span class="hljs-keyword">const</span> user = <span class="hljs-title class_">Map</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;张三&quot;</span>, <span class="hljs-attr">age</span>: <span class="hljs-number">18</span> });\n\n<span class="hljs-comment">// 修改数据：返回新对象，原数据不变</span>\n<span class="hljs-keyword">const</span> newUser = user.<span class="hljs-title function_">set</span>(<span class="hljs-string">&quot;age&quot;</span>, <span class="hljs-number">19</span>);\n\n<span class="hljs-comment">// 获取数据</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(newUser.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;age&quot;</span>)); <span class="hljs-comment">// 19</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(user.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;age&quot;</span>)); <span class="hljs-comment">// 18（原数据未被修改）</span>\n</code></pre>\n<h3>3. 在 React 中使用</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { <span class="hljs-title class_">Map</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;immutable&quot;</span>;\n<span class="hljs-keyword">import</span> { useState } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">App</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-comment">// 用 Immutable Map 作为 state</span>\n  <span class="hljs-keyword">const</span> [user, setUser] = <span class="hljs-title function_">useState</span>(<span class="hljs-title class_">Map</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;张三&quot;</span>, <span class="hljs-attr">age</span>: <span class="hljs-number">18</span> }));\n\n  <span class="hljs-keyword">const</span> <span class="hljs-title function_">changeAge</span> = (<span class="hljs-params"></span>) =&gt; {\n    <span class="hljs-comment">// 直接 set，自动生成新引用</span>\n    <span class="hljs-title function_">setUser</span>(user.<span class="hljs-title function_">set</span>(<span class="hljs-string">&quot;age&quot;</span>, user.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;age&quot;</span>) + <span class="hljs-number">1</span>));\n  };\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>年龄：{user.get(&quot;age&quot;)}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">onClick</span>=<span class="hljs-string">{changeAge}</span>&gt;</span>增加年龄<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>\n    <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<hr>\n<h2>四、替代方案：Immer（更简洁的不可变方案）</h2>\n<p>Immer 是目前 React 社区<strong>最流行</strong>   的不可变方案，用<strong>写可变代码的语法，实现不可变效果</strong>   ，零学习成本。</p>\n<h3>1. 安装</h3>\n<pre><code class="language-bash">npm install immer\n</code></pre>\n<h3>2. 在 React 中使用（核心：<code>produce</code> 函数）</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { produce } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;immer&quot;</span>;\n<span class="hljs-keyword">import</span> { useState } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">App</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> [user, setUser] = <span class="hljs-title function_">useState</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;张三&quot;</span>, <span class="hljs-attr">age</span>: <span class="hljs-number">18</span> });\n\n  <span class="hljs-keyword">const</span> <span class="hljs-title function_">changeAge</span> = (<span class="hljs-params"></span>) =&gt; {\n    <span class="hljs-comment">// ✅ 直接&quot;修改&quot;数据，Immer 自动生成新对象</span>\n    <span class="hljs-title function_">setUser</span>(\n      <span class="hljs-title function_">produce</span>(<span class="hljs-function">(<span class="hljs-params">draft</span>) =&gt;</span> {\n        draft.<span class="hljs-property">age</span> = <span class="hljs-number">19</span>;\n      }),\n    );\n  };\n\n  <span class="hljs-keyword">return</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>年龄：{user.age}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span></span>;\n}\n</code></pre>\n<h3>3. 在 useState 中简化版</h3>\n<pre><code class="language-jsx"><span class="hljs-comment">// 嵌套数据也能直接修改，无需逐层拷贝</span>\n<span class="hljs-title function_">setUser</span>(\n  <span class="hljs-title function_">produce</span>(<span class="hljs-function">(<span class="hljs-params">draft</span>) =&gt;</span> {\n    draft.<span class="hljs-property">info</span>.<span class="hljs-property">address</span>.<span class="hljs-property">city</span> = <span class="hljs-string">&quot;北京&quot;</span>;\n  }),\n);\n</code></pre>\n<hr>\n<h2>五、三种方案对比</h2>\n<table>\n<thead>\n<tr>\n<th>方案</th>\n<th>优点</th>\n<th>缺点</th>\n<th>适用场景</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>原生 ES6</td>\n<td>无依赖、简单</td>\n<td>嵌套数据繁琐、易出错</td>\n<td>简单状态、小型项目</td>\n</tr>\n<tr>\n<td>Immutable.js</td>\n<td>性能极致、功能强大</td>\n<td>API 独特、需学习、数据类型不兼容</td>\n<td>复杂大型项目、大量嵌套数据</td>\n</tr>\n<tr>\n<td>Immer</td>\n<td>语法极简、零学习成本、兼容原生</td>\n<td>极小性能开销</td>\n<td>绝大多数 React 项目（推荐）</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2>六、核心总结</h2>\n<ol>\n<li><strong>不可变性是 React 的灵魂</strong>   ：保证组件能正确感知数据变化、触发重渲染</li>\n<li><strong>禁止直接修改 state/props</strong>   ：永远用新对象/数组替换原数据</li>\n<li><strong>简单数据用 ES6 扩展运算符</strong>   ，<strong>复杂数据用 Immer</strong>   （首选），<strong>超大型项目用 Immutable.js</strong></li>\n<li>不可变性带来的好处：可预测数据、易于调试、方便回溯状态、优化渲染性能</li>\n</ol>\n<h3>总结</h3>\n<ol>\n<li>React 靠<strong>引用对比</strong>   判断更新，必须保证<strong>数据不可变</strong></li>\n<li>原生：<code>...</code> 扩展运算符实现基础不可变</li>\n<li>推荐：<strong>Immer</strong>   用最简单的语法实现不可变</li>\n<li>高阶：<strong>Immutable.js</strong>   极致性能处理复杂数据</li>\n</ol>\n</div>'</script></body></html>
