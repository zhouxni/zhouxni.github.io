<script>
        document.getElementById('article').innerHTML = 
        "<div><p><code>npx</code> 的工作流程可以分为 <strong>本地优先检查 → 远程下载执行 → 清理缓存</strong>   三个阶段，以下是详细步骤和底层逻辑：</p>\n<hr>\n<h3><strong>1. 完整工作流程</strong></h3>\n<h4><strong>阶段 1：检查本地依赖</strong></h4>\n<ol>\n<li><strong>解析命令</strong><br>\n输入 <code>npx &lt;包名&gt;</code> 后，<code>npx</code> 首先检查当前项目的 <code>node_modules/.bin/</code> 目录下是否存在对应的可执行文件。\n<ul>\n<li>如果本地已安装（如通过 <code>npm install &lt;包名&gt;</code>），直接运行本地版本。</li>\n<li><strong>示例</strong>  ：<pre><code class=\"language-sh\">npx eslint  <span class=\"hljs-comment\"># 优先使用本地安装的 eslint</span>\n</code></pre>\n</li>\n</ul>\n</li>\n<li><strong>检查全局缓存</strong><br>\n若本地未找到，检查是否在全局 <code>node_modules</code> 中（即用户通过 <code>npm install -g &lt;包名&gt;</code> 安装过）。</li>\n</ol>\n<h4><strong>阶段 2：远程下载执行（若本地不存在）</strong></h4>\n<ol start=\"3\">\n<li><strong>临时下载包</strong><br>\n如果本地和全局均未找到包，<code>npx</code> 会：\n<ul>\n<li>从 npm 仓库下载最新版本的包（或指定版本，如 <code>npx &lt;包名&gt;@版本号</code>）。</li>\n<li>将包缓存在 <code>~/.npm/_npx/</code> 目录（以唯一哈希 ID 命名文件夹）。</li>\n</ul>\n</li>\n<li><strong>执行包命令</strong>\n<ul>\n<li>解压下载的包，运行其 <code>package.json</code> 中 <code>bin</code> 字段指定的可执行文件。</li>\n<li><strong>示例</strong>  ：<pre><code class=\"language-sh\">npx create-react-app@5.0.0 my-app  <span class=\"hljs-comment\"># 下载指定版本并执行</span>\n</code></pre>\n</li>\n</ul>\n</li>\n</ol>\n<h4><strong>阶段 3：执行后清理</strong></h4>\n<ol start=\"5\">\n<li><strong>自动清理（默认行为）</strong>\n<ul>\n<li>执行完成后，临时下载的包会被自动删除，<strong>不会保存到项目的 <code>node_modules</code></strong>  。</li>\n<li>可通过 <code>--no-clean</code> 参数保留缓存（用于调试）：<pre><code class=\"language-sh\">npx --no-clean cowsay <span class=\"hljs-string\">&quot;Hello&quot;</span>  <span class=\"hljs-comment\"># 保留临时文件</span>\n</code></pre>\n</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h3><strong>2. 底层机制</strong></h3>\n<h4><strong>关键目录</strong></h4>\n<table>\n<thead>\n<tr>\n<th>路径</th>\n<th>作用</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>./node_modules/.bin/</code></td>\n<td>存储本地安装包的可执行文件（软链接）。</td>\n</tr>\n<tr>\n<td><code>~/.npm/_npx/</code></td>\n<td>存储 <code>npx</code> 临时下载的包（按哈希ID）。</td>\n</tr>\n</tbody>\n</table>\n<h4><strong>环境变量控制</strong></h4>\n<ul>\n<li><code>--no-install</code>：强制使用本地包，拒绝远程下载。<pre><code class=\"language-sh\">npx --no-install prettier  <span class=\"hljs-comment\"># 仅用本地版本，找不到则报错</span>\n</code></pre>\n</li>\n<li><code>--ignore-existing</code>：忽略本地包，强制下载远程版本。<pre><code class=\"language-sh\">npx --ignore-existing tsc  <span class=\"hljs-comment\"># 总是下载最新 TypeScript</span>\n</code></pre>\n</li>\n</ul>\n<hr>\n<h3><strong>3. 特殊场景处理</strong></h3>\n<h4><strong>场景 1：运行非 <code>bin</code> 文件</strong></h4>\n<p>若需直接执行包内的某个 JS 文件（非 <code>bin</code> 入口）：</p>\n<pre><code class=\"language-sh\">npx -p &lt;包名&gt; node &lt;包内路径&gt;\n<span class=\"hljs-comment\"># 示例：执行包内脚本</span>\nnpx -p lodash node -e <span class=\"hljs-string\">&quot;console.log(require(&#x27;lodash&#x27;).VERSION)&quot;</span>\n</code></pre>\n<h4><strong>场景 2：多包组合操作</strong></h4>\n<p>通过 <code>-p</code> 参数临时安装多个包，组合使用：</p>\n<pre><code class=\"language-sh\">npx -p cowsay -p lolcatjs <span class=\"hljs-string\">&#x27;cowsay &quot;Hello&quot; | lolcatjs&#x27;</span>\n<span class=\"hljs-comment\"># 先安装 cowsay 和 lolcatjs，再执行管道命令</span>\n</code></pre>\n<h4><strong>场景 3：指定 Node 版本</strong></h4>\n<p>通过 <code>-p node@版本</code> 临时使用特定 Node 环境：</p>\n<pre><code class=\"language-sh\">npx -p node@14 node -v  <span class=\"hljs-comment\"># 临时使用 Node.js 14</span>\n</code></pre>\n<hr>\n<h3><strong>4. 安全性与性能</strong></h3>\n<h4><strong>安全性</strong></h4>\n<ul>\n<li><strong>风险</strong>  ：远程包可能包含恶意代码（尤其是不明确的第三方包）。</li>\n<li><strong>防护</strong>  ：\n<ul>\n<li>使用前检查包来源（如 <code>npm view &lt;包名&gt;</code>）。</li>\n<li>对敏感操作优先使用本地已知版本。</li>\n</ul>\n</li>\n</ul>\n<h4><strong>性能</strong></h4>\n<ul>\n<li><strong>网络依赖</strong>  ：首次运行远程包需下载，受网络速度影响。</li>\n<li><strong>缓存优化</strong>  ：同一版本的包在缓存有效期内不会重复下载。</li>\n</ul>\n<hr>\n<h3><strong>总结</strong></h3>\n<pre><code class=\"language-mermaid\">flowchart TB\n  A[输入 npx &lt;包名&gt;] --&gt; B{本地是否存在?}\n  B --&gt;|是| C[执行本地版本]\n  B --&gt;|否| D{全局是否存在?}\n  D --&gt;|是| E[执行全局版本]\n  D --&gt;|否| F[从 npm 下载最新版]\n  F --&gt; G[解压到临时目录]\n  G --&gt; H[执行包命令]\n  H --&gt; I[自动清理缓存]\n</code></pre>\n<p><code>npx</code> 的设计平衡了便捷性和隔离性，适合现代 JavaScript 生态的灵活需求。使用时需权衡 <strong>快速体验</strong>   和 <strong>环境稳定性</strong>  ，关键场景建议固化依赖到 <code>package.json</code>。</p>\n</div>";
      </script></body></html>
