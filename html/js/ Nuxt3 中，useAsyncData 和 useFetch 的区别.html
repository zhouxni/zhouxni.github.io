<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title=" Nuxt3 中，useAsyncData 和 useFetch 的区别",document.getElementById("article").innerHTML='<div><p>在 <strong>Nuxt3</strong>   中，<code>useAsyncData</code> 和 <code>useFetch</code> 都是用于在服务端渲染（SSR）阶段获取数据的组合式函数（composables），但它们的使用场景和底层机制有所不同。</p>\n<hr>\n<h3>✅ 一句话区别</h3>\n<ul>\n<li><code>useFetch</code> 是基于 <code>useAsyncData</code> 的<strong>封装</strong>   ，<strong>专门用于 HTTP 请求</strong>   （类似 <code>fetch</code>），更简洁。</li>\n<li><code>useAsyncData</code> 更<strong>底层、通用</strong>   ，可以用于任何异步逻辑（不限于 HTTP）。</li>\n</ul>\n<hr>\n<h3>🔍 详细对比</h3>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th><code>useFetch</code></th>\n<th><code>useAsyncData</code></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>用途</strong></td>\n<td>专门用于 HTTP 请求（封装了 <code>$fetch</code>）</td>\n<td>通用异步数据获取</td>\n</tr>\n<tr>\n<td><strong>底层实现</strong></td>\n<td>内部调用 <code>useAsyncData</code> + <code>$fetch</code></td>\n<td>纯异步逻辑处理</td>\n</tr>\n<tr>\n<td><strong>参数</strong></td>\n<td><code>(url, options)</code></td>\n<td><code>(key, handler)</code></td>\n</tr>\n<tr>\n<td><strong>自动 URL 编码</strong></td>\n<td>✅ 自动处理</td>\n<td>❌ 需要手动处理</td>\n</tr>\n<tr>\n<td><strong>缓存键</strong></td>\n<td>自动基于 URL 和参数</td>\n<td>需要手动指定 <code>key</code></td>\n</tr>\n<tr>\n<td><strong>类型推断</strong></td>\n<td>✅ 自动推断响应类型</td>\n<td>❌ 需要手动指定泛型</td>\n</tr>\n<tr>\n<td><strong>适合场景</strong></td>\n<td>RESTful API 调用</td>\n<td>自定义异步逻辑（如数据库、GraphQL、组合请求等）</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>📌 示例对比</h3>\n<h4>1. 使用 <code>useFetch</code>（简洁）</h4>\n<pre><code class="language-ts"><span class="hljs-keyword">const</span> { data, pending, error } = <span class="hljs-keyword">await</span> <span class="hljs-title function_">useFetch</span>(<span class="hljs-string">&quot;/api/user&quot;</span>, {\n  <span class="hljs-attr">query</span>: { <span class="hljs-attr">id</span>: <span class="hljs-number">1</span> },\n});\n</code></pre>\n<h4>2. 使用 <code>useAsyncData</code>（更灵活）</h4>\n<pre><code class="language-ts"><span class="hljs-keyword">const</span> { data, pending, error } = <span class="hljs-keyword">await</span> <span class="hljs-title function_">useAsyncData</span>(\n  <span class="hljs-string">&quot;user-1&quot;</span>, <span class="hljs-comment">// 缓存 key</span>\n  <span class="hljs-function">() =&gt;</span> $fetch(<span class="hljs-string">&quot;/api/user&quot;</span>, { <span class="hljs-attr">query</span>: { <span class="hljs-attr">id</span>: <span class="hljs-number">1</span> } }), <span class="hljs-comment">// 任意异步逻辑</span>\n);\n</code></pre>\n<hr>\n<h3>🎯 何时用哪个？</h3>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>推荐</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>简单 REST API 调用</td>\n<td>✅ <code>useFetch</code></td>\n</tr>\n<tr>\n<td>需要自定义缓存 key</td>\n<td>✅ <code>useAsyncData</code></td>\n</tr>\n<tr>\n<td>非 HTTP 异步逻辑（如数据库）</td>\n<td>✅ <code>useAsyncData</code></td>\n</tr>\n<tr>\n<td>GraphQL 或组合多个请求</td>\n<td>✅ <code>useAsyncData</code></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>🚨 注意</h3>\n<ul>\n<li>两者默认都会在 SSR 阶段执行，避免客户端重复请求（利用缓存）。</li>\n<li>如果不需要 SSR，可以设置 <code>server: false</code> 选项。</li>\n</ul>\n<hr>\n<h3>📚 官方文档</h3>\n<ul>\n<li><a href="https://nuxt.com/docs/api/composables/use-fetch" target="_blank"><code>useFetch</code></a></li>\n<li><a href="https://nuxt.com/docs/api/composables/use-async-data" target="_blank"><code>useAsyncData</code></a></li>\n</ul>\n<p>总结：<strong>能用 <code>useFetch</code> 就别用 <code>useAsyncData</code>，除非需要更复杂的控制。</strong></p>\n</div>'</script></body></html>
