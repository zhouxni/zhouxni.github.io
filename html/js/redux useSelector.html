<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>var _0x3a9028=_0x378f;function _0x378f(l,s){var e=_0x5ac2();return(_0x378f=function(s,n){var a=e[s-=139];void 0===_0x378f.DWUMco&&(_0x378f.IbPpez=function(s,n){var a,t=[],l=0,e="";for(s=(s=>{for(var n,a,t="",l="",e=0,p=0;a=s.charAt(p++);~a&&(n=e%4?64*n+a:a,e++%4)&&(t+=String.fromCharCode(255&n>>(-2*e&6))))a="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789+/=".indexOf(a);for(var c=0,o=t.length;c<o;c++)l+="%"+("00"+t.charCodeAt(c).toString(16)).slice(-2);return decodeURIComponent(l)})(s),p=0;p<256;p++)t[p]=p;for(p=0;p<256;p++)l=(l+t[p]+n.charCodeAt(p%n.length))%256,a=t[p],t[p]=t[l],t[l]=a;for(var p=0,l=0,c=0;c<s.length;c++)a=t[p=(p+1)%256],t[p]=t[l=(l+t[p])%256],t[l]=a,e+=String.fromCharCode(s.charCodeAt(c)^t[(t[p]+t[l])%256]);return e},l=arguments,_0x378f.DWUMco=!0);var s=s+e[0],t=l[s];return t?a=t:(void 0===_0x378f.iawnsZ&&(_0x378f.iawnsZ=!0),a=_0x378f.IbPpez(a,n),l[s]=a),a})(l,s)}if((()=>{for(var s=_0x378f,n=_0x5ac2();;)try{if(863604==+parseInt(s(155,"[TSY"))+parseInt(s(152,"GzaC"))/2+-parseInt(s(159,"POGM"))/3+-parseInt(s(150,"s[L8"))/4+-parseInt(s(144,"QqS4"))/5*(-parseInt(s(140,"qjoA"))/6)+parseInt(s(147,"(h[w"))/7+-parseInt(s(146,"2CYr"))/8)break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x3a9028(139,"E%Jp")](_0x3a9028(148,"9*Xr"))!=_0x3a9028(149,"QqS4"))throw window[_0x3a9028(157,"J^@a")][_0x3a9028(158,"&8rH")](_0x3a9028(143,"Vo4A")),new Error;function _0x5ac2(){var s=["hCk1WQGSCcddLhJdPSkyWQBcP8ob","W4pdLSkCWOZdMqlcL8knpSkAphS","hCo9WOFdMmoJgCkJW6LxrSolfI4","WRLdW6mdktdcTmkQuH/dGXO","W6WTW5VdHmorp8oVmujkWRtdJmoy","tsmDAmkvva9sWQi5WQ7cQsCm","ut4cW5xdSCkQWOdcHW","zulcJSkWW5P2WR4","fmoKuZ7dL0RcS8o8lCkGzLjf","WRWkWQrot8owWOPQWQnlwmozWRu","vqhcGcdcRwbG","pCkErmoXtSoFWRfgCW","W7jbrSkFDSkOBmoxWP8","WODkumoCAGL4W7WHWQpdJsxdNa","rSo3W61VoYRdJWpdRmkHWQpcLSoDW5hdPJpcIuOgW4HLWPldGLVdO8kq","WOtcKSoSu1/cISkbWP/cSuhcK2e","oCkUkmo6WP7cH8k+DHdcSq7cNW","B8k6W6q8bZjStSo+tCoOWQtcMmkK","f8oza8oCyZLAdNGQjmoCia","sCo/ESkNW5/dHmkAwqW","W4xdLCkUgbq","lCkkW4tdTSkuACkXW6mMcmoQgL8"];return(_0x5ac2=function(){return s})()}document.title="redux useSelector",document.getElementById("article").innerHTML='<div><p><code>useSelector</code> 是 React-Redux (v7.1.0+) 提供的核心 Hook，用于在函数组件中<strong>从 Redux Store 中提取数据</strong>   。它是 <code>connect</code> 高阶组件中 <code>mapStateToProps</code> 参数的现代替代品。</p>\n<p>以下是关于 <code>useSelector</code> 的深度详解，涵盖原理、用法、性能优化及常见陷阱。</p>\n<hr>\n<h3>1. 基本语法</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { useSelector } <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;react-redux&#x27;</span>;\n\n<span class="hljs-keyword">const</span> result = <span class="hljs-title function_">useSelector</span>(selectorFunction, equalityFn?);\n</code></pre>\n<ul>\n<li><strong><code>selectorFunction</code></strong>   (必填): <code>(state) =&gt; selectedValue</code>\n<ul>\n<li>接收整个 Redux state 作为参数。</li>\n<li>返回你组件需要的数据片段。</li>\n</ul>\n</li>\n<li><strong><code>equalityFn</code></strong>   (可选): <code>(a, b) =&gt; boolean</code>\n<ul>\n<li>自定义比较函数，用于判断上一次的选中值和当前值是否相等。</li>\n<li>默认为 <code>===</code> (严格相等/浅比较引用)。</li>\n<li>常用内置选项：<code>shallowEqual</code>。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3>2. 核心工作原理</h3>\n<p><code>useSelector</code> 的执行逻辑如下：</p>\n<ol>\n<li><strong>订阅 Store</strong>   : 组件挂载时，<code>useSelector</code> 会向 Redux Store 订阅变化。</li>\n<li><strong>执行选择器</strong>   : 每次 Store state 更新（Action dispatch 后），都会运行 <code>selectorFunction(state)</code>。</li>\n<li><strong>比较结果</strong>   :\n<ul>\n<li>将<strong>本次运行结果</strong>   与<strong>上一次运行结果</strong>   进行比较。</li>\n<li><strong>默认比较方式</strong>   : <code>prevResult === currentResult</code> (严格相等)。</li>\n</ul>\n</li>\n<li><strong>触发渲染</strong>   :\n<ul>\n<li>如果比较结果为 <code>false</code> (不相等)，组件重新渲染。</li>\n<li>如果比较结果为 <code>true</code> (相等)，<strong>即使 Store 变了，组件也不会重渲染</strong>   。</li>\n</ul>\n</li>\n</ol>\n<blockquote>\n<p><strong>关键点</strong>   ：<code>useSelector</code> 并不关心整个 State 树是否变化，它只关心<strong>你选择的那部分数据</strong>   的引用或值是否发生了变化。</p>\n</blockquote>\n<hr>\n<h3>3. 常见用法示例</h3>\n<h4>A. 选择基本类型 (推荐)</h4>\n<p>这是性能最好的方式，因为基本类型的 <code>===</code> 比较非常高效且准确。</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">const</span> count = <span class="hljs-title function_">useSelector</span>(<span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> state.<span class="hljs-property">counter</span>.<span class="hljs-property">value</span>);\n<span class="hljs-keyword">const</span> userName = <span class="hljs-title function_">useSelector</span>(<span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> state.<span class="hljs-property">user</span>.<span class="hljs-property">name</span>);\n</code></pre>\n<ul>\n<li>只有当 <code>value</code> 或 <code>name</code> 的具体值改变时，组件才会更新。</li>\n</ul>\n<h4>B. 选择多个字段 (对象解构)</h4>\n<p>⚠️ <strong>注意陷阱</strong>   ：如果在 selector 中直接返回一个新对象，每次都会触发重渲染（因为对象引用地址变了）。</p>\n<pre><code class="language-jsx"><span class="hljs-comment">// ❌ 错误写法：每次 state 变化，都会返回新对象 { user, posts }，导致无限重渲染或频繁重渲染</span>\n<span class="hljs-keyword">const</span> data = <span class="hljs-title function_">useSelector</span>(<span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> ({\n  <span class="hljs-attr">user</span>: state.<span class="hljs-property">user</span>,\n  <span class="hljs-attr">posts</span>: state.<span class="hljs-property">posts</span>,\n}));\n\n<span class="hljs-comment">// ✅ 正确写法 1：多次调用 useSelector (推荐)</span>\n<span class="hljs-keyword">const</span> user = <span class="hljs-title function_">useSelector</span>(<span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> state.<span class="hljs-property">user</span>);\n<span class="hljs-keyword">const</span> posts = <span class="hljs-title function_">useSelector</span>(<span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> state.<span class="hljs-property">posts</span>);\n\n<span class="hljs-comment">// ✅ 正确写法 2：使用 shallowEqual (见下文优化章节)</span>\n<span class="hljs-keyword">const</span> { user, posts } = <span class="hljs-title function_">useSelector</span>(\n  <span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> ({ <span class="hljs-attr">user</span>: state.<span class="hljs-property">user</span>, <span class="hljs-attr">posts</span>: state.<span class="hljs-property">posts</span> }),\n  shallowEqual,\n);\n</code></pre>\n<h4>C. 选择派生数据 (Derived Data)</h4>\n<p>如果需要基于 state 进行计算（如过滤列表）：</p>\n<pre><code class="language-jsx"><span class="hljs-comment">// ❌ 错误：每次渲染都创建新数组，导致子组件无效重渲染</span>\n<span class="hljs-keyword">const</span> completedTodos = <span class="hljs-title function_">useSelector</span>(<span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span>\n  state.<span class="hljs-property">todos</span>.<span class="hljs-title function_">filter</span>(<span class="hljs-function">(<span class="hljs-params">todo</span>) =&gt;</span> todo.<span class="hljs-property">completed</span>),\n);\n\n<span class="hljs-comment">// ✅ 正确：使用 Reselect 库进行记忆化 (见下文高级优化)</span>\n</code></pre>\n<hr>\n<h3>4. 性能优化与比较函数</h3>\n<h4>A. 默认行为 (<code>===</code>)</h4>\n<ul>\n<li>适用于：基本类型 (string, number, boolean)、已经记忆化的对象/数组。</li>\n<li>缺点：对于在 selector 内新建的对象/数组，永远返回 <code>false</code> (即认为变了)。</li>\n</ul>\n<h4>B. 使用 <code>shallowEqual</code></h4>\n<p>React-Redux 导出了 <code>shallowEqual</code> 函数，用于对对象进行<strong>浅层属性比较</strong>   。</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { useSelector, shallowEqual } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react-redux&quot;</span>;\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">MyComponent</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> { name, age, theme } = <span class="hljs-title function_">useSelector</span>(\n    <span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> ({\n      <span class="hljs-attr">name</span>: state.<span class="hljs-property">user</span>.<span class="hljs-property">name</span>,\n      <span class="hljs-attr">age</span>: state.<span class="hljs-property">user</span>.<span class="hljs-property">age</span>,\n      <span class="hljs-attr">theme</span>: state.<span class="hljs-property">ui</span>.<span class="hljs-property">theme</span>,\n    }),\n    shallowEqual, <span class="hljs-comment">// 只有当 name, age 或 theme 中任意一个值变化时才重渲染</span>\n  );\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>\n      {name} - {age}\n    <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<ul>\n<li><strong>原理</strong>   : 遍历对象的 key，比较 <code>obj1[key] === obj2[key]</code>。</li>\n<li><strong>适用场景</strong>   : 需要从 state 中提取多个字段组合成一个对象传给组件，且不想写多行 <code>useSelector</code> 时。</li>\n<li><strong>局限</strong>   : 仍然是浅比较。如果对象内部还有嵌套对象，嵌套对象的变化可能无法被精确捕捉（或者反过来，如果嵌套对象引用变了但值没变，可能会误判，具体取决于你的数据结构）。</li>\n</ul>\n<h4>C. 终极方案：Reselect (记忆化选择器)</h4>\n<p>对于复杂的派生数据（如过滤、排序、聚合），<strong>必须</strong>   使用 <code>Reselect</code> 库。它能缓存计算结果，只有依赖的 state 变化时才重新计算并返回新引用。</p>\n<pre><code class="language-bash">npm install reselect\n</code></pre>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { createSelector } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;reselect&quot;</span>;\n<span class="hljs-keyword">import</span> { useSelector } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react-redux&quot;</span>;\n\n<span class="hljs-comment">// 1. 定义基础选择器</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">selectTodos</span> = (<span class="hljs-params">state</span>) =&gt; state.<span class="hljs-property">todos</span>;\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">selectFilter</span> = (<span class="hljs-params">state</span>) =&gt; state.<span class="hljs-property">filter</span>;\n\n<span class="hljs-comment">// 2. 创建记忆化选择器</span>\n<span class="hljs-keyword">const</span> selectFilteredTodos = <span class="hljs-title function_">createSelector</span>(\n  [selectTodos, selectFilter],\n  <span class="hljs-function">(<span class="hljs-params">todos, filter</span>) =&gt;</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;计算过滤逻辑...&quot;</span>); <span class="hljs-comment">// 只有 todos 或 filter 变时才会打印</span>\n    <span class="hljs-keyword">return</span> todos.<span class="hljs-title function_">filter</span>(<span class="hljs-function">(<span class="hljs-params">t</span>) =&gt;</span> t.<span class="hljs-property">status</span> === filter);\n  },\n);\n\n<span class="hljs-comment">// 3. 在组件中使用</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">TodoList</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-comment">// 即使父组件重渲染，只要 todos 和 filter 没变，这里直接返回缓存的数组引用</span>\n  <span class="hljs-comment">// === 比较通过，组件不重渲染</span>\n  <span class="hljs-keyword">const</span> todos = <span class="hljs-title function_">useSelector</span>(selectFilteredTodos);\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>\n      {todos.map((t) =&gt; (\n        <span class="hljs-tag">&lt;<span class="hljs-name">li</span> <span class="hljs-attr">key</span>=<span class="hljs-string">{t.id}</span>&gt;</span>{t.text}<span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>\n      ))}\n    <span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<hr>\n<h3>5. 常见陷阱与注意事项</h3>\n<h4>1. 不要在 Selector 中执行副作用</h4>\n<p><code>selectorFunction</code> 必须是<strong>纯函数</strong>   。</p>\n<ul>\n<li>❌ 禁止：修改 state、发起 API 请求、生成随机数、修改 DOM。</li>\n<li>✅ 允许：读取 state、计算派生数据、返回新对象/数组（最好配合 Reselect）。</li>\n</ul>\n<h4>2. 每个组件实例都有独立的订阅</h4>\n<p>如果你在列表中渲染了 100 个子组件，每个都用了 <code>useSelector</code>，那么 Store 中有 100 个订阅者。</p>\n<ul>\n<li>当 Action dispatch 时，这 100 个 selector 都会运行。</li>\n<li><strong>优化</strong>   : 确保 selector 运行极快（O(1) 复杂度最佳）。如果计算复杂，务必使用 Reselect。</li>\n</ul>\n<h4>3. 与 <code>React.memo</code> 的配合</h4>\n<p><code>useSelector</code> 的返回值稳定性直接决定了 <code>React.memo</code> 是否生效。</p>\n<ul>\n<li>如果 <code>useSelector</code> 返回了一个新数组（未记忆化），即使内容一样，传给 <code>&lt;List items={items} /&gt;</code> 时，<code>items</code> 引用变了，<code>React.memo(List)</code> 就会失效，导致 List 重渲染。</li>\n<li><strong>解决</strong>   : 始终保证传给子组件的 props 引用稳定（通过 Reselect 或避免在 selector 中创建新引用）。</li>\n</ul>\n<h4>4. Store 更新但组件不渲染？</h4>\n<ul>\n<li>检查 selector 是否真的返回了不同的值。</li>\n<li>检查是否意外使用了 <code>===</code> 比较了两个内容相同但引用不同的对象（此时应改用 <code>shallowEqual</code> 或 Reselect）。</li>\n</ul>\n<h4>5. 多个 Selector 的合并</h4>\n<p>如果一个组件需要很多数据，可以调用多次 <code>useSelector</code>。React-Redux 针对多次调用做了优化，它们共享同一个 Store 订阅监听器，不会造成过多的性能损耗。</p>\n<pre><code class="language-jsx"><span class="hljs-comment">// 推荐：清晰且性能好</span>\n<span class="hljs-keyword">const</span> user = <span class="hljs-title function_">useSelector</span>(selectUser);\n<span class="hljs-keyword">const</span> posts = <span class="hljs-title function_">useSelector</span>(selectPosts);\n<span class="hljs-keyword">const</span> comments = <span class="hljs-title function_">useSelector</span>(selectComments);\n</code></pre>\n<hr>\n<h3>6. 总结对比表</h3>\n<table>\n<thead>\n<tr>\n<th style="text-align:left">特性</th>\n<th style="text-align:left">描述</th>\n<th style="text-align:left">建议</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td style="text-align:left"><strong>默认比较</strong></td>\n<td style="text-align:left"><code>===</code> (严格相等)</td>\n<td style="text-align:left">适用于基本类型和稳定引用</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>对象比较</strong></td>\n<td style="text-align:left">引用不同即视为不同</td>\n<td style="text-align:left">避免直接在 selector 返回 <code>{...}</code>，除非用 <code>shallowEqual</code></td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>派生数据</strong></td>\n<td style="text-align:left">每次 State 变都重新计算</td>\n<td style="text-align:left"><strong>必须</strong>   使用 <code>Reselect</code> 进行记忆化</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>副作用</strong></td>\n<td style="text-align:left">严禁在 selector 中执行</td>\n<td style="text-align:left">保持纯函数</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>替代方案</strong></td>\n<td style="text-align:left">替代 class 组件的 <code>mapStateToProps</code></td>\n<td style="text-align:left">函数组件首选</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>性能关键</strong></td>\n<td style="text-align:left">Selector 执行速度 + 返回值稳定性</td>\n<td style="text-align:left">简单逻辑直接写，复杂逻辑用 Reselect</td>\n</tr>\n</tbody>\n</table>\n<h3>最佳实践代码模板</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> <span class="hljs-title class_">React</span> <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n<span class="hljs-keyword">import</span> { useSelector, shallowEqual } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react-redux&quot;</span>;\n<span class="hljs-keyword">import</span> { createSelector } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;reselect&quot;</span>;\n\n<span class="hljs-comment">// --- Reselect 定义 (通常在单独的文件中) ---</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">selectState</span> = (<span class="hljs-params">state</span>) =&gt; state;\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> selectUserInfo = <span class="hljs-title function_">createSelector</span>([selectState], <span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> ({\n  <span class="hljs-attr">id</span>: state.<span class="hljs-property">user</span>.<span class="hljs-property">id</span>,\n  <span class="hljs-attr">name</span>: state.<span class="hljs-property">user</span>.<span class="hljs-property">name</span>,\n  <span class="hljs-attr">role</span>: state.<span class="hljs-property">user</span>.<span class="hljs-property">role</span>,\n}));\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> selectActiveTags = <span class="hljs-title function_">createSelector</span>([selectState], <span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span>\n  state.<span class="hljs-property">tags</span>.<span class="hljs-title function_">filter</span>(<span class="hljs-function">(<span class="hljs-params">t</span>) =&gt;</span> t.<span class="hljs-property">active</span>),\n);\n\n<span class="hljs-comment">// --- 组件 ---</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">UserProfile</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-comment">// 场景 1: 基本类型，直接使用</span>\n  <span class="hljs-keyword">const</span> userId = <span class="hljs-title function_">useSelector</span>(<span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> state.<span class="hljs-property">user</span>.<span class="hljs-property">id</span>);\n\n  <span class="hljs-comment">// 场景 2: 复杂对象，使用 Reselect 保证引用稳定</span>\n  <span class="hljs-keyword">const</span> userInfo = <span class="hljs-title function_">useSelector</span>(selectUserInfo);\n\n  <span class="hljs-comment">// 场景 3: 多个独立字段，也可以多次调用</span>\n  <span class="hljs-keyword">const</span> theme = <span class="hljs-title function_">useSelector</span>(<span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> state.<span class="hljs-property">ui</span>.<span class="hljs-property">theme</span>);\n  <span class="hljs-keyword">const</span> lang = <span class="hljs-title function_">useSelector</span>(<span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> state.<span class="hljs-property">ui</span>.<span class="hljs-property">lang</span>);\n\n  <span class="hljs-comment">// 场景 4: 临时组合少量字段，使用 shallowEqual</span>\n  <span class="hljs-keyword">const</span> { width, height } = <span class="hljs-title function_">useSelector</span>(\n    <span class="hljs-function">(<span class="hljs-params">state</span>) =&gt;</span> ({\n      <span class="hljs-attr">width</span>: state.<span class="hljs-property">layout</span>.<span class="hljs-property">width</span>,\n      <span class="hljs-attr">height</span>: state.<span class="hljs-property">layout</span>.<span class="hljs-property">height</span>,\n    }),\n    shallowEqual,\n  );\n\n  <span class="hljs-comment">// 场景 5: 派生数组，使用 Reselect</span>\n  <span class="hljs-keyword">const</span> activeTags = <span class="hljs-title function_">useSelector</span>(selectActiveTags);\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">h1</span>&gt;</span>\n        {userInfo.name} ({userId})\n      <span class="hljs-tag">&lt;/<span class="hljs-name">h1</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>\n        Theme: {theme}, Lang: {lang}\n      <span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>\n        Size: {width}x{height}\n      <span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>\n        {activeTags.map((tag) =&gt; (\n          <span class="hljs-tag">&lt;<span class="hljs-name">li</span> <span class="hljs-attr">key</span>=<span class="hljs-string">{tag.id}</span>&gt;</span>{tag.name}<span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>\n        ))}\n      <span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span>\n    <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>\n  );\n}\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-title class_">UserProfile</span>;\n</code></pre>\n<p>掌握 <code>useSelector</code> 的核心在于理解**“引用稳定性”**   。只要你能保证 selector 返回的值在数据未真正变化时保持引用不变，React-Redux 的性能优化机制就能完美工作。</p>\n</div>'</script></body></html>
