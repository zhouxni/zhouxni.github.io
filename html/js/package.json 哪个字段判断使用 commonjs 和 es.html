<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'package.json 哪个字段判断使用 commonjs 和 es'
        document.getElementById('article').innerHTML = 
        "<div><p>在 <code>package.json</code> 中，<strong>模块系统（CommonJS 或 ES Modules）的判定</strong>  主要通过以下字段控制：</p>\n<hr>\n<h3><strong>1. 核心字段</strong></h3>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>用途</th>\n<th>默认值</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong><code>&quot;type&quot;</code></strong></td>\n<td>定义 <code>.js</code> 文件的默认模块类型：&lt;br/&gt; <code>&quot;commonjs&quot;</code>（默认）或 <code>&quot;module&quot;</code>（ESM）</td>\n<td><code>&quot;commonjs&quot;</code></td>\n</tr>\n<tr>\n<td><strong><code>&quot;main&quot;</code></strong></td>\n<td>项目入口文件（CommonJS 优先），如 <code>index.js</code></td>\n<td>-</td>\n</tr>\n<tr>\n<td><strong><code>&quot;module&quot;</code></strong></td>\n<td>ESM 格式的入口文件（如 <code>index.mjs</code>），供支持 ESM 的工具（如 Webpack）使用</td>\n<td>-</td>\n</tr>\n<tr>\n<td><strong><code>&quot;exports&quot;</code></strong></td>\n<td>更灵活的入口定义，可区分 CommonJS 和 ESM（Node.js 12+ 支持）</td>\n<td>-</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>2. 文件扩展名规则</strong></h3>\n<ul>\n<li><strong><code>.js</code></strong><br>\n行为由 <code>&quot;type&quot;</code> 字段决定：\n<ul>\n<li><code>&quot;type&quot;: &quot;commonjs&quot;</code> → 解析为 CommonJS</li>\n<li><code>&quot;type&quot;: &quot;module&quot;</code> → 解析为 ESM</li>\n</ul>\n</li>\n<li><strong><code>.cjs</code></strong><br>\n强制视为 CommonJS（忽略 <code>&quot;type&quot;</code>）。</li>\n<li><strong><code>.mjs</code></strong><br>\n强制视为 ESM（忽略 <code>&quot;type&quot;</code>）。</li>\n</ul>\n<hr>\n<h3><strong>3. 示例配置</strong></h3>\n<h4><strong>场景 1：纯 CommonJS 项目</strong></h4>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;type&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;commonjs&quot;</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">&quot;main&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;./index.js&quot;</span>  <span class=\"hljs-comment\">// CommonJS 入口</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<h4><strong>场景 2：纯 ESM 项目</strong></h4>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;type&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;module&quot;</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">&quot;main&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;./index.js&quot;</span><span class=\"hljs-punctuation\">,</span>  <span class=\"hljs-comment\">// ESM 入口（因为 &quot;type&quot;: &quot;module&quot;）</span>\n  <span class=\"hljs-attr\">&quot;module&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;./index.mjs&quot;</span> <span class=\"hljs-comment\">// 可选，供打包工具使用</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<h4><strong>场景 3：混合模式（同时支持 CJS 和 ESM）</strong></h4>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;type&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;commonjs&quot;</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">&quot;main&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;./index.cjs&quot;</span><span class=\"hljs-punctuation\">,</span>       <span class=\"hljs-comment\">// CommonJS 入口</span>\n  <span class=\"hljs-attr\">&quot;module&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;./index.mjs&quot;</span><span class=\"hljs-punctuation\">,</span>     <span class=\"hljs-comment\">// ESM 入口</span>\n  <span class=\"hljs-attr\">&quot;exports&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;require&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;./index.cjs&quot;</span><span class=\"hljs-punctuation\">,</span>  <span class=\"hljs-comment\">// CJS 导入时使用</span>\n    <span class=\"hljs-attr\">&quot;import&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;./index.mjs&quot;</span>    <span class=\"hljs-comment\">// ESM 导入时使用</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<hr>\n<h3><strong>4. 关键注意事项</strong></h3>\n<ol>\n<li><strong><code>&quot;type&quot;</code> 的优先级低于文件扩展名</strong>  ：\n<ul>\n<li><code>.mjs</code> 或 <code>.cjs</code> 会覆盖 <code>&quot;type&quot;</code> 的设置。</li>\n</ul>\n</li>\n<li><strong>工具链兼容性</strong>  ：\n<ul>\n<li>旧版 Node.js（&lt; 12）可能不支持 <code>&quot;exports&quot;</code> 或 <code>&quot;type&quot;: &quot;module&quot;</code>。</li>\n<li>Webpack/Rollup 等打包工具会优先读取 <code>&quot;module&quot;</code> 字段（如果存在）。</li>\n</ul>\n</li>\n<li><strong>ESM 与 CommonJS 的互操作</strong>  ：\n<ul>\n<li>在 ESM 项目中（<code>&quot;type&quot;: &quot;module&quot;</code>），可通过 <code>import</code> 加载 CommonJS 模块，但部分高级特性（如动态 <code>require()</code>）不可用。</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h3><strong>5. 如何验证模块类型？</strong></h3>\n<ul>\n<li>在项目中创建测试文件：<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// test.js</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-keyword\">import</span>.<span class=\"hljs-property\">meta</span>.<span class=\"hljs-property\">url</span>); <span class=\"hljs-comment\">// 如果输出 URL，则为 ESM；否则为 CJS</span>\n</code></pre>\n</li>\n<li>运行命令：<pre><code class=\"language-sh\">node test.js\n</code></pre>\n</li>\n</ul>\n<hr>\n<p>通过合理配置这些字段，可以明确控制项目的模块系统行为。更多细节参考 <a href=\"https://nodejs.org/api/packages.html#packages_determining_module_system\">Node.js 官方文档</a>。</p>\n</div>";</script></body></html>
