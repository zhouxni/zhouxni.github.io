<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'proxy 代理'
        document.getElementById('article').innerHTML = 
        "<div><p><strong><code>Proxy</code> 对象本身不会自动代理对象的所有层级</strong>  ，它只会代理第一层对象的操作。如果需要代理嵌套对象，需要手动实现递归代理。以下是详细解释：</p>\n<hr>\n<h3><strong>1. Proxy 的基本行为</strong></h3>\n<ul>\n<li><strong>代理第一层对象</strong>  ：<code>Proxy</code> 可以拦截并自定义对第一层对象属性的访问、赋值、删除等操作。</li>\n<li><strong>默认不代理嵌套对象</strong>  ：当访问嵌套对象时，返回的是原始嵌套对象，而不是代理对象。</li>\n</ul>\n<hr>\n<h3><strong>2. 示例：Proxy 对嵌套对象的默认行为</strong></h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> target = {\n  <span class=\"hljs-attr\">a</span>: <span class=\"hljs-number\">1</span>,\n  <span class=\"hljs-attr\">nested</span>: {\n    <span class=\"hljs-attr\">b</span>: <span class=\"hljs-number\">2</span>\n  }\n};\n\n<span class=\"hljs-keyword\">const</span> proxy = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Proxy</span>(target, {\n  <span class=\"hljs-title function_\">get</span>(<span class=\"hljs-params\">target, prop, receiver</span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Getting <span class=\"hljs-subst\">${prop}</span>`</span>);\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Reflect</span>.<span class=\"hljs-title function_\">get</span>(target, prop, receiver);\n  }\n});\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(proxy.<span class=\"hljs-property\">a</span>); <span class=\"hljs-comment\">// 输出 &quot;Getting a&quot;，然后输出 1</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(proxy.<span class=\"hljs-property\">nested</span>.<span class=\"hljs-property\">b</span>); <span class=\"hljs-comment\">// 输出 &quot;Getting nested&quot;，然后输出 2（没有触发 &quot;Getting b&quot;）</span>\n</code></pre>\n<p><strong>解释</strong>  ：</p>\n<ul>\n<li>访问 <code>proxy.a</code> 时，触发了 <code>get</code> 捕获器。</li>\n<li>访问 <code>proxy.nested.b</code> 时，只触发了 <code>proxy.nested</code> 的 <code>get</code> 捕获器，返回了原始的 <code>nested</code> 对象，而不是代理对象。</li>\n</ul>\n<hr>\n<h3><strong>3. 如何代理对象的所有层级</strong></h3>\n<p>如果需要代理嵌套对象，可以在 <code>get</code> 捕获器中递归创建代理。</p>\n<h4><strong>示例：递归代理嵌套对象</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createDeepProxy</span>(<span class=\"hljs-params\">target</span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Proxy</span>(target, {\n    <span class=\"hljs-title function_\">get</span>(<span class=\"hljs-params\">target, prop, receiver</span>) {\n      <span class=\"hljs-keyword\">const</span> value = <span class=\"hljs-title class_\">Reflect</span>.<span class=\"hljs-title function_\">get</span>(target, prop, receiver);\n      <span class=\"hljs-keyword\">if</span> (<span class=\"hljs-keyword\">typeof</span> value === <span class=\"hljs-string\">&#x27;object&#x27;</span> &amp;&amp; value !== <span class=\"hljs-literal\">null</span>) {\n        <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">createDeepProxy</span>(value); <span class=\"hljs-comment\">// 递归创建代理</span>\n      }\n      <span class=\"hljs-keyword\">return</span> value;\n    }\n  });\n}\n\n<span class=\"hljs-keyword\">const</span> target = {\n  <span class=\"hljs-attr\">a</span>: <span class=\"hljs-number\">1</span>,\n  <span class=\"hljs-attr\">nested</span>: {\n    <span class=\"hljs-attr\">b</span>: <span class=\"hljs-number\">2</span>\n  }\n};\n\n<span class=\"hljs-keyword\">const</span> deepProxy = <span class=\"hljs-title function_\">createDeepProxy</span>(target);\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(deepProxy.<span class=\"hljs-property\">a</span>); <span class=\"hljs-comment\">// 输出 1</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(deepProxy.<span class=\"hljs-property\">nested</span>.<span class=\"hljs-property\">b</span>); <span class=\"hljs-comment\">// 输出 2（现在嵌套对象也被代理了）</span>\n</code></pre>\n<p><strong>解释</strong>  ：</p>\n<ul>\n<li><code>createDeepProxy</code> 函数递归地为嵌套对象创建代理。</li>\n<li>访问 <code>deepProxy.nested.b</code> 时，<code>nested</code> 对象也被代理了。</li>\n</ul>\n<hr>\n<h3><strong>4. 注意事项</strong></h3>\n<ul>\n<li><strong>性能考虑</strong>  ：递归代理嵌套对象可能会增加性能开销，特别是在对象结构复杂或深度嵌套的情况下。</li>\n<li><strong>循环引用</strong>  ：处理循环引用时需要小心，避免无限递归。可以通过记录已经代理过的对象来避免重复代理。</li>\n<li><strong>实际需求</strong>  ：根据实际需求决定是否需要代理嵌套对象。如果只需要代理第一层，可以省略递归代理。</li>\n</ul>\n<hr>\n<h3><strong>5. 总结</strong></h3>\n<ul>\n<li><strong><code>Proxy</code> 不会自动代理对象的所有层级</strong>  ，它只代理第一层对象。</li>\n<li><strong>如果需要代理嵌套对象</strong>  ，需要手动实现递归代理，通常通过递归函数实现。</li>\n<li><strong>根据实际需求</strong>  选择是否代理嵌套对象，权衡性能和功能需求。</li>\n</ul>\n<hr>\n<h3><strong>扩展：Proxy 与 Object.defineProperty 的对比</strong></h3>\n<ul>\n<li><strong><code>Object.defineProperty</code></strong>  ：\n<ul>\n<li>只能劫持对象的已有属性，无法监听属性的添加和删除。</li>\n<li>处理嵌套对象时需要递归遍历，容易出错且性能较差。</li>\n</ul>\n</li>\n<li><strong><code>Proxy</code></strong>  ：\n<ul>\n<li>可以代理对象的所有操作，包括属性访问、赋值、删除等。</li>\n<li>提供了更强大和灵活的响应式系统，可以处理嵌套对象（需要手动实现）。</li>\n</ul>\n</li>\n</ul>\n<p><code>Proxy</code> 是现代 JavaScript 开发中推荐使用的方式，特别是在需要处理复杂对象结构时。</p>\n</div>";</script></body></html>
