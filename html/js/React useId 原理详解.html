%256],l[t]=a,o+=String.fromCharCode(s.charCodeAt(p)^l[(l[e]+l[t])%256]);return o},t=arguments,_0x2354.ETyHFj=!0);var s=s+o[0],l=t[s];return l?a=l:(void 0===_0x2354.wnaWpf&&(_0x2354.wnaWpf=!0),a=_0x2354.XMpAKF(a,n),t[s]=a),a})(t,s)}var _0xebceec=_0x2354;if((()=>{for(var s=_0x2354,n=_0x2ad0();;)try{if(941492==-parseInt(s(319,"v1VV"))*(-parseInt(s(313,"&e&E"))/2)+parseInt(s(310,"^Tm!"))/3+-parseInt(s(312,"kA6V"))/4+parseInt(s(316,"Lo)7"))/5*(parseInt(s(302,"qKI4"))/6)+parseInt(s(307,"Cipi"))/7*(-parseInt(s(308,"!8WS"))/8)+parseInt(s(300,"%(9Y"))/9+-parseInt(s(305,"O]rZ"))/10)break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0xebceec(303,"v1VV")](_0xebceec(301,"cMeZ"))!=_0xebceec(325,"!8WS"))throw window[_0xebceec(321,"&e&E")][_0xebceec(322,"XfCA")](_0xebceec(320,"^Tm!")),new Error;document.title="React useId 原理详解",document.getElementById("article").innerHTML='<div><p><code>useId</code> 是 React 18 推出的<strong>专为生成稳定、唯一、服务端渲染（SSR）安全</strong>   ID 的 Hook，核心解决 <strong>客户端/服务端 ID 不一致</strong>   、<strong>多根节点冲突</strong>   、<strong>手动写 ID 易重复</strong>   三大问题。</p>\n<h2>一、核心作用（一句话总结）</h2>\n<p>生成<strong>全局唯一、跨服务端/客户端一致、不随渲染顺序乱变</strong>   的字符串，用于：</p>\n<ul>\n<li>表单 <code>label</code> 关联 <code>input</code>（<code>htmlFor</code> + <code>id</code>）</li>\n<li>ARIA 属性（<code>aria-labelledby</code>、<code>aria-describedby</code>）</li>\n<li>第三方库需要唯一 DOM ID 的场景</li>\n</ul>\n<h2>二、核心原理（底层逻辑）</h2>\n<h3>1. 核心设计思想</h3>\n<ol>\n<li><strong>树状层级生成</strong>   ：基于组件树的<strong>层级路径</strong>   生成 ID，不是随机数，保证 SSR/CSR 一致；</li>\n<li><strong>隔离作用域</strong>   ：支持<strong>多根节点（multiple roots）</strong>   隔离，不同根节点的 ID 不冲突；</li>\n<li><strong>自增计数器</strong>   ：同组件内多次调用 <code>useId</code> 时，用计数器区分，保证唯一性。</li>\n</ol>\n<h3>2. 生成公式（最关键）</h3>\n<p>最终 ID = <strong>根节点唯一标识</strong>   + <strong>组件树层级路径</strong>   + <strong>同组件内调用序号</strong></p>\n<pre><code>// 示例格式\n:r0:0-1 → 根节点0 + 层级路径0-1 + 第1次调用\n:r1:2-3 → 根节点1 + 层级路径2-3 + 第1次调用\n</code></pre>\n<h3>3. 关键依赖：React Fiber 树</h3>\n<p><code>useId</code> 完全依赖 <strong>Fiber 树</strong>   （React 内部的虚拟DOM树）：</p>\n<ul>\n<li>Fiber 节点有固定的<strong>层级、父节点关系</strong>   ，渲染顺序不影响层级；</li>\n<li>服务端渲染（SSR）和客户端渲染（CSR）生成的 Fiber 树结构完全一致 → ID 一致。</li>\n</ul>\n<hr>\n<h2>三、详细执行流程（源码级简化版）</h2>\n<h3>步骤1：根节点初始化（createRoot）</h3>\n<p>创建 React 根节点时，会给根节点分配一个<strong>唯一标识</strong>   （<code>rootId</code>，默认 <code>:r0</code>、<code>:r1</code>...），用于多根隔离。</p>\n<pre><code class="language-js"><span class="hljs-comment">// 内部伪代码</span>\n<span class="hljs-keyword">const</span> root1 = <span class="hljs-title function_">createRoot</span>(el1); <span class="hljs-comment">// rootId = :r0</span>\n<span class="hljs-keyword">const</span> root2 = <span class="hljs-title function_">createRoot</span>(el2); <span class="hljs-comment">// rootId = :r1</span>\n</code></pre>\n<h3>步骤2：组件挂载，生成层级 ID</h3>\n<p>组件首次渲染时，React 会根据该组件在 Fiber 树中的<strong>层级路径</strong>   ，生成一个<strong>基础 ID</strong>   。</p>\n<ul>\n<li>层级路径是<strong>稳定不变</strong>   的（只要组件树结构不变）；</li>\n<li>哪怕组件重新渲染、状态变化，基础 ID 也不会变。</li>\n</ul>\n<h3>步骤3：同组件多次调用，计数器自增</h3>\n<p>一个组件内多次调用 <code>useId</code>，会用<strong>本地计数器</strong>   追加后缀，保证不重复：</p>\n<pre><code class="language-js"><span class="hljs-keyword">function</span> <span class="hljs-title function_">MyComponent</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> id1 = <span class="hljs-title function_">useId</span>(); <span class="hljs-comment">// :r0:0 → 计数器 0</span>\n  <span class="hljs-keyword">const</span> id2 = <span class="hljs-title function_">useId</span>(); <span class="hljs-comment">// :r0:1 → 计数器 1</span>\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>\n      {id1}-{id2}\n    <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<h3>步骤4：最终 ID 拼接</h3>\n<p>把「根标识 + 层级路径 + 计数器」拼接成最终唯一 ID。</p>\n<hr>\n<h2>四、为什么不用随机数/自增变量？（useId 解决的痛点）</h2>\n<h3>1. ❌ 错误方案1：Math.random()</h3>\n<pre><code class="language-js"><span class="hljs-comment">// 危险！SSR 会报错</span>\n<span class="hljs-keyword">const</span> id = <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">random</span>().<span class="hljs-title function_">toString</span>(<span class="hljs-number">36</span>).<span class="hljs-title function_">slice</span>(<span class="hljs-number">2</span>);\n</code></pre>\n<ul>\n<li>服务端渲染一次，客户端渲染一次，<strong>ID 不一致</strong>   → React 水合失败（hydration error）。</li>\n</ul>\n<h3>2. ❌ 错误方案2：全局计数器</h3>\n<pre><code class="language-js"><span class="hljs-comment">// 危险！多根节点冲突、渲染顺序影响 ID</span>\n<span class="hljs-keyword">let</span> count = <span class="hljs-number">0</span>;\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">useBadId</span> = (<span class="hljs-params"></span>) =&gt; ++count;\n</code></pre>\n<ul>\n<li>组件渲染顺序变化 → 计数器值变化 → ID 改变；</li>\n<li>多根节点共享计数器 → ID 冲突。</li>\n</ul>\n<h3>3. ✅ useId 优势</h3>\n<ul>\n<li><strong>SSR 安全</strong>   ：基于 Fiber 树层级，服务端/客户端生成结果完全一致；</li>\n<li><strong>多根隔离</strong>   ：不同根节点的 ID 自带根标识，永不冲突；</li>\n<li><strong>稳定不变</strong>   ：组件重渲染、状态变化，ID 始终不变；</li>\n<li><strong>唯一不重复</strong>   ：层级+计数器双重保证。</li>\n</ul>\n<hr>\n<h2>五、源码核心简化版（看懂核心逻辑）</h2>\n<p>React 内部源码（去除冗余后）：</p>\n<pre><code class="language-js"><span class="hljs-comment">// 1. 每个 Fiber 节点存储自己的基础 ID</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">getFiberId</span>(<span class="hljs-params">fiber</span>) {\n  <span class="hljs-keyword">if</span> (fiber.<span class="hljs-property">id</span>) <span class="hljs-keyword">return</span> fiber.<span class="hljs-property">id</span>;\n  <span class="hljs-comment">// 基于父节点 ID 生成层级 ID</span>\n  <span class="hljs-keyword">const</span> parentId = <span class="hljs-title function_">getFiberId</span>(fiber.<span class="hljs-property">return</span>);\n  fiber.<span class="hljs-property">id</span> = parentId + <span class="hljs-string">&quot;-&quot;</span> + fiber.<span class="hljs-property">index</span>;\n  <span class="hljs-keyword">return</span> fiber.<span class="hljs-property">id</span>;\n}\n\n<span class="hljs-comment">// 2. useId 核心实现</span>\n<span class="hljs-keyword">let</span> counter = <span class="hljs-number">0</span>;\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">useId</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> fiber = <span class="hljs-title function_">getCurrentFiber</span>(); <span class="hljs-comment">// 获取当前组件的 Fiber 节点</span>\n  <span class="hljs-keyword">const</span> rootId = fiber.<span class="hljs-property">root</span>.<span class="hljs-property">id</span>; <span class="hljs-comment">// 根节点标识 :r0</span>\n  <span class="hljs-keyword">const</span> treeId = <span class="hljs-title function_">getFiberId</span>(fiber); <span class="hljs-comment">// 层级路径</span>\n  <span class="hljs-keyword">const</span> localId = counter++; <span class="hljs-comment">// 同组件内计数器</span>\n  <span class="hljs-keyword">return</span> <span class="hljs-string">`<span class="hljs-subst">${rootId}</span>:<span class="hljs-subst">${treeId}</span><span class="hljs-subst">${localId}</span>`</span>;\n}\n</code></pre>\n<hr>\n<h2>六、使用规则与注意事项</h2>\n<h3>1. ✅ 正确用法</h3>\n<pre><code class="language-js"><span class="hljs-keyword">import</span> { useId } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">FormItem</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> id = <span class="hljs-title function_">useId</span>(); <span class="hljs-comment">// 生成唯一 ID</span>\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">label</span> <span class="hljs-attr">htmlFor</span>=<span class="hljs-string">{id}</span>&gt;</span>用户名<span class="hljs-tag">&lt;/<span class="hljs-name">label</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">input</span> <span class="hljs-attr">id</span>=<span class="hljs-string">{id}</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;text&quot;</span> /&gt;</span>\n    <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<h3>2. ❌ 禁止用法</h3>\n<ol>\n<li><strong>不要用作列表 key</strong>   ：key 应该用数据唯一标识（id），<code>useId</code> 是 DOM ID；</li>\n<li><strong>不要在条件渲染/循环中调用</strong>   ：会破坏计数器稳定性；</li>\n<li><strong>不要手动拼接作为 CSS 选择器</strong>   ：<code>useId</code> 生成的 ID 以 <code>:</code> 开头，是合法 DOM ID，但不适合做 CSS 选择器。</li>\n</ol>\n<h3>3. 自定义前缀（React 18.2+）</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> id = <span class="hljs-title function_">useId</span>({ <span class="hljs-attr">prefix</span>: <span class="hljs-string">&quot;my-app&quot;</span> });\n<span class="hljs-comment">// 输出：my-app:r0:0</span>\n</code></pre>\n<hr>\n<h2>七、总结</h2>\n<h3>核心关键点回顾</h3>\n<ol>\n<li><strong>本质</strong>   ：基于 <strong>Fiber 树层级</strong>   生成的<strong>稳定唯一 ID</strong>   ，不是随机数；</li>\n<li><strong>核心公式</strong>   ：根节点标识 + 组件层级路径 + 同组件计数器；</li>\n<li><strong>最大价值</strong>   ：<strong>SSR 水合安全</strong>   、<strong>多根节点隔离</strong>   、<strong>ID 稳定不重复</strong>   ；</li>\n<li><strong>使用场景</strong>   ：表单关联、ARIA 属性、DOM 唯一标识，<strong>禁止做列表 key</strong>   。</li>\n</ol>\n</div>'</script></body></html>
