<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p>Husky 可以通过 Git 钩子在提交前运行检查脚本，如果检查失败（脚本返回非零退出码），则会阻止提交。以下是详细实现方法：</p>\n<h2>1. 基本阻止提交配置</h2>\n<h3>1.1 安装 Husky</h3>\n<pre><code class=\"language-sh\">npm install husky --save-dev\n</code></pre>\n<h3>1.2 初始化 Husky</h3>\n<pre><code class=\"language-sh\">npx husky install\n</code></pre>\n<h3>1.3 创建 pre-commit 钩子</h3>\n<pre><code class=\"language-sh\">npx husky add .husky/pre-commit <span class=\"hljs-string\">&quot;npm test&quot;</span>\n<span class=\"hljs-comment\"># 或手动创建 .husky/pre-commit 文件</span>\n</code></pre>\n<h2>2. 阻止提交的几种方式</h2>\n<h3>2.1 使用测试失败阻止</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-meta\">#!/usr/bin/env sh</span>\n. <span class=\"hljs-string\">&quot;<span class=\"hljs-subst\">$(dirname <span class=\"hljs-string\">&quot;<span class=\"hljs-variable\">$0</span>&quot;</span>)</span>/_/husky.sh&quot;</span>\n\n<span class=\"hljs-comment\"># 如果测试失败，脚本会返回非0状态码，阻止提交</span>\nnpm <span class=\"hljs-built_in\">test</span>\n</code></pre>\n<h3>2.2 使用 ESLint 检查阻止</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-meta\">#!/usr/bin/env sh</span>\n. <span class=\"hljs-string\">&quot;<span class=\"hljs-subst\">$(dirname <span class=\"hljs-string\">&quot;<span class=\"hljs-variable\">$0</span>&quot;</span>)</span>/_/husky.sh&quot;</span>\n\n<span class=\"hljs-comment\"># 检查JS/TS文件，有错误则阻止提交</span>\nnpx eslint --max-warnings 0 src/**/*.{js,jsx,ts,tsx}\n</code></pre>\n<h3>2.3 使用 lint-staged 精确检查</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-meta\">#!/usr/bin/env sh</span>\n. <span class=\"hljs-string\">&quot;<span class=\"hljs-subst\">$(dirname <span class=\"hljs-string\">&quot;<span class=\"hljs-variable\">$0</span>&quot;</span>)</span>/_/husky.sh&quot;</span>\n\n<span class=\"hljs-comment\"># 只检查暂存区的文件</span>\nnpx lint-staged\n</code></pre>\n<h2>3. 高级阻止逻辑</h2>\n<h3>3.1 自定义检查脚本</h3>\n<p>创建 <code>scripts/pre-commit-check.js</code>:</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-meta\">#!/usr/bin/env node</span>\n<span class=\"hljs-keyword\">const</span> process = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;process&#x27;</span>)\n\n<span class=\"hljs-keyword\">try</span> {\n  <span class=\"hljs-comment\">// 你的检查逻辑</span>\n  <span class=\"hljs-keyword\">if</span> (someCondition) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;发现不允许提交的内容&#x27;</span>)\n    process.<span class=\"hljs-title function_\">exit</span>(<span class=\"hljs-number\">1</span>) <span class=\"hljs-comment\">// 非0退出码会阻止提交</span>\n  }\n  process.<span class=\"hljs-title function_\">exit</span>(<span class=\"hljs-number\">0</span>) <span class=\"hljs-comment\">// 0表示允许提交</span>\n} <span class=\"hljs-keyword\">catch</span> (error) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;检查出错:&#x27;</span>, error)\n  process.<span class=\"hljs-title function_\">exit</span>(<span class=\"hljs-number\">1</span>)\n}\n</code></pre>\n<p>然后在 pre-commit 中调用：</p>\n<pre><code class=\"language-sh\"><span class=\"hljs-meta\">#!/usr/bin/env sh</span>\n. <span class=\"hljs-string\">&quot;<span class=\"hljs-subst\">$(dirname <span class=\"hljs-string\">&quot;<span class=\"hljs-variable\">$0</span>&quot;</span>)</span>/_/husky.sh&quot;</span>\n\nnode scripts/pre-commit-check.js\n</code></pre>\n<h3>3.2 多条件检查</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-meta\">#!/usr/bin/env sh</span>\n. <span class=\"hljs-string\">&quot;<span class=\"hljs-subst\">$(dirname <span class=\"hljs-string\">&quot;<span class=\"hljs-variable\">$0</span>&quot;</span>)</span>/_/husky.sh&quot;</span>\n\n<span class=\"hljs-comment\"># 按顺序执行检查，任何一个失败都会阻止提交</span>\nnpm run lint &amp;&amp; \\\nnpm run <span class=\"hljs-built_in\">test</span> &amp;&amp; \\\nnpm run type-check\n</code></pre>\n<h2>4. 优化用户体验</h2>\n<h3>4.1 友好的错误提示</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-meta\">#!/usr/bin/env sh</span>\n. <span class=\"hljs-string\">&quot;<span class=\"hljs-subst\">$(dirname <span class=\"hljs-string\">&quot;<span class=\"hljs-variable\">$0</span>&quot;</span>)</span>/_/husky.sh&quot;</span>\n\n<span class=\"hljs-keyword\">if</span> ! npm run lint; <span class=\"hljs-keyword\">then</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;&quot;</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;❌ ESLint 检查失败，提交被阻止&quot;</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;💡 尝试运行: npm run lint:fix&quot;</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;&quot;</span>\n  <span class=\"hljs-built_in\">exit</span> 1\n<span class=\"hljs-keyword\">fi</span>\n</code></pre>\n<h3>4.2 跳过检查的方法（紧急情况）</h3>\n<pre><code class=\"language-sh\">git commit --no-verify -m <span class=\"hljs-string\">&quot;紧急修复&quot;</span>\n</code></pre>\n<h2>5. 完整配置示例</h2>\n<h3>package.json</h3>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;scripts&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;prepare&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;husky install&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;lint&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;eslint src --ext .js,.jsx,.ts,.tsx&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;lint:fix&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;eslint --fix src --ext .js,.jsx,.ts,.tsx&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;test&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;jest&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;type-check&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;tsc --noEmit&quot;</span>\n  <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">&quot;lint-staged&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;*.{js,jsx,ts,tsx}&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span>\n      <span class=\"hljs-string\">&quot;eslint --fix --max-warnings 0&quot;</span><span class=\"hljs-punctuation\">,</span>\n      <span class=\"hljs-string\">&quot;prettier --write&quot;</span>\n    <span class=\"hljs-punctuation\">]</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<h3>.husky/pre-commit</h3>\n<pre><code class=\"language-sh\"><span class=\"hljs-meta\">#!/usr/bin/env sh</span>\n. <span class=\"hljs-string\">&quot;<span class=\"hljs-subst\">$(dirname <span class=\"hljs-string\">&quot;<span class=\"hljs-variable\">$0</span>&quot;</span>)</span>/_/husky.sh&quot;</span>\n\n<span class=\"hljs-comment\"># 彩色输出</span>\nRED=<span class=\"hljs-string\">&#x27;\\033[0;31m&#x27;</span>\nNC=<span class=\"hljs-string\">&#x27;\\033[0m&#x27;</span>\n\n<span class=\"hljs-keyword\">if</span> ! npx lint-staged; <span class=\"hljs-keyword\">then</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;&quot;</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;<span class=\"hljs-variable\">${RED}</span>🚫 提交被阻止：代码检查未通过<span class=\"hljs-variable\">${NC}</span>&quot;</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;💡 尝试运行: npm run lint:fix&quot;</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;&quot;</span>\n  <span class=\"hljs-built_in\">exit</span> 1\n<span class=\"hljs-keyword\">fi</span>\n\n<span class=\"hljs-keyword\">if</span> ! npm run type-check; <span class=\"hljs-keyword\">then</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;&quot;</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;<span class=\"hljs-variable\">${RED}</span>🚫 提交被阻止：类型检查失败<span class=\"hljs-variable\">${NC}</span>&quot;</span>\n  <span class=\"hljs-built_in\">echo</span> <span class=\"hljs-string\">&quot;&quot;</span>\n  <span class=\"hljs-built_in\">exit</span> 1\n<span class=\"hljs-keyword\">fi</span>\n</code></pre>\n<h2>6. 注意事项</h2>\n<ol>\n<li><strong>确保钩子文件可执行</strong>  ：<pre><code class=\"language-sh\"><span class=\"hljs-built_in\">chmod</span> +x .husky/pre-commit\n</code></pre>\n</li>\n<li><strong>Windows 兼容性</strong>  ：\n<ul>\n<li>使用 Git Bash 或 WSL</li>\n<li>确保行尾是 LF 而非 CRLF</li>\n</ul>\n</li>\n<li><strong>性能考虑</strong>  ：\n<ul>\n<li>检查应该快速完成</li>\n<li>对于大项目，考虑增量检查</li>\n</ul>\n</li>\n<li><strong>团队协作</strong>  ：\n<ul>\n<li>将 .husky 目录加入版本控制</li>\n<li>在文档中说明检查规则</li>\n</ul>\n</li>\n</ol>\n<p>通过这种配置，你可以确保只有通过所有检查的代码才能被提交到代码库，从而保持代码质量。</p>\n</div>";
      </script></body></html>
