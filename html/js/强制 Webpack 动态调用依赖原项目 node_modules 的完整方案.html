<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="强制 Webpack 动态调用依赖原项目 node_modules 的完整方案",document.getElementById("article").innerHTML='<div><p>当需要确保动态调用的 Webpack 配置中的 loader 和 plugin 强制使用原项目的 node_modules 时，可以采用以下综合解决方案：</p>\n<h2>核心强制方案</h2>\n<h3>1. 绝对路径解析（最可靠方案）</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> path = <span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;path&#x27;</span>);\n<span class="hljs-keyword">const</span> originalProjectRoot = <span class="hljs-string">&#x27;/absolute/path/to/original/project&#x27;</span>;\n\n<span class="hljs-comment">// 强制解析函数</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">resolveOriginal</span>(<span class="hljs-params">moduleName</span>) {\n  <span class="hljs-keyword">return</span> <span class="hljs-built_in">require</span>.<span class="hljs-title function_">resolve</span>(moduleName, {\n    <span class="hljs-attr">paths</span>: [path.<span class="hljs-title function_">join</span>(originalProjectRoot, <span class="hljs-string">&#x27;node_modules&#x27;</span>)]\n  });\n}\n\n<span class="hljs-variable language_">module</span>.<span class="hljs-property">exports</span> = {\n  <span class="hljs-attr">module</span>: {\n    <span class="hljs-attr">rules</span>: [\n      {\n        <span class="hljs-attr">test</span>: <span class="hljs-regexp">/\\.js$/</span>,\n        <span class="hljs-attr">use</span>: {\n          <span class="hljs-attr">loader</span>: <span class="hljs-title function_">resolveOriginal</span>(<span class="hljs-string">&#x27;babel-loader&#x27;</span>), <span class="hljs-comment">// 强制使用原项目的 loader</span>\n          <span class="hljs-attr">options</span>: {\n            <span class="hljs-attr">presets</span>: [<span class="hljs-title function_">resolveOriginal</span>(<span class="hljs-string">&#x27;@babel/preset-env&#x27;</span>)]\n          }\n        }\n      }\n    ]\n  },\n  <span class="hljs-attr">plugins</span>: [\n    <span class="hljs-title function_">new</span> (<span class="hljs-built_in">require</span>(<span class="hljs-title function_">resolveOriginal</span>(<span class="hljs-string">&#x27;html-webpack-plugin&#x27;</span>)))() <span class="hljs-comment">// 强制使用原项目的 plugin</span>\n  ]\n};\n</code></pre>\n<h3>2. 模块解析劫持（强制锁定）</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> path = <span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;path&#x27;</span>);\n<span class="hljs-keyword">const</span> originalRequire = <span class="hljs-built_in">require</span>;\n\n<span class="hljs-comment">// 1. 锁定原项目 node_modules 路径</span>\n<span class="hljs-keyword">const</span> originalNodeModules = path.<span class="hljs-title function_">join</span>(<span class="hljs-string">&#x27;/path/to/original/project&#x27;</span>, <span class="hljs-string">&#x27;node_modules&#x27;</span>);\n\n<span class="hljs-comment">// 2. 劫持 require 函数</span>\n<span class="hljs-variable language_">global</span>.<span class="hljs-property">require</span> = <span class="hljs-keyword">function</span>(<span class="hljs-params">moduleName</span>) {\n  <span class="hljs-keyword">try</span> {\n    <span class="hljs-comment">// 优先尝试从原项目 node_modules 加载</span>\n    <span class="hljs-keyword">return</span> <span class="hljs-title function_">originalRequire</span>(path.<span class="hljs-title function_">join</span>(originalNodeModules, moduleName));\n  } <span class="hljs-keyword">catch</span> (e) {\n    <span class="hljs-comment">// 回退到正常 require</span>\n    <span class="hljs-keyword">return</span> <span class="hljs-title function_">originalRequire</span>(moduleName);\n  }\n};\n\n<span class="hljs-comment">// 3. 确保 loader 也走这个逻辑</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title class_">Module</span> = <span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;module&#x27;</span>);\n<span class="hljs-keyword">const</span> originalLoader = <span class="hljs-title class_">Module</span>.<span class="hljs-property">_load</span>;\n<span class="hljs-title class_">Module</span>.<span class="hljs-property">_load</span> = <span class="hljs-keyword">function</span>(<span class="hljs-params">request, parent</span>) {\n  <span class="hljs-keyword">if</span> (request.<span class="hljs-title function_">startsWith</span>(<span class="hljs-string">&#x27;babel-loader&#x27;</span>) || request.<span class="hljs-title function_">endsWith</span>(<span class="hljs-string">&#x27;loader&#x27;</span>)) {\n    <span class="hljs-keyword">try</span> {\n      <span class="hljs-keyword">return</span> <span class="hljs-title function_">originalLoader</span>(path.<span class="hljs-title function_">join</span>(originalNodeModules, request), parent);\n    } <span class="hljs-keyword">catch</span> (e) {}\n  }\n  <span class="hljs-keyword">return</span> <span class="hljs-title function_">originalLoader</span>(request, parent);\n};\n</code></pre>\n<h2>环境级强制方案</h2>\n<h3>1. 修改 NODE_PATH 环境变量（最彻底）</h3>\n<pre><code class="language-javascript">process.<span class="hljs-property">env</span>.<span class="hljs-property">NODE_PATH</span> = path.<span class="hljs-title function_">join</span>(<span class="hljs-string">&#x27;/path/to/original/project&#x27;</span>, <span class="hljs-string">&#x27;node_modules&#x27;</span>);\n<span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;module&#x27;</span>).<span class="hljs-property">Module</span>.<span class="hljs-title function_">_initPaths</span>(); <span class="hljs-comment">// 重载模块解析路径</span>\n\n<span class="hljs-comment">// 后续所有 require 都会优先从指定路径查找</span>\n<span class="hljs-keyword">const</span> webpack = <span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;webpack&#x27;</span>); <span class="hljs-comment">// 现在强制使用原项目的 webpack</span>\n</code></pre>\n<h3>2. 使用 <code>--module-path</code> 参数启动</h3>\n<pre><code class="language-sh">node --module-path /path/to/original/project/node_modules your-script.js\n</code></pre>\n<h2>Webpack 配置级强制方案</h2>\n<h3>1. 双重锁定配置</h3>\n<pre><code class="language-javascript"><span class="hljs-variable language_">module</span>.<span class="hljs-property">exports</span> = {\n  <span class="hljs-attr">resolve</span>: {\n    <span class="hljs-attr">modules</span>: [\n      path.<span class="hljs-title function_">join</span>(<span class="hljs-string">&#x27;/path/to/original/project&#x27;</span>, <span class="hljs-string">&#x27;node_modules&#x27;</span>), <span class="hljs-comment">// 主锁定</span>\n      <span class="hljs-string">&#x27;node_modules&#x27;</span> <span class="hljs-comment">// 后备</span>\n    ],\n    <span class="hljs-attr">alias</span>: {\n      <span class="hljs-comment">// 关键包强制锁定</span>\n      <span class="hljs-string">&#x27;babel-loader$&#x27;</span>: path.<span class="hljs-title function_">join</span>(<span class="hljs-string">&#x27;/path/to/original/project&#x27;</span>, <span class="hljs-string">&#x27;node_modules/babel-loader&#x27;</span>),\n      <span class="hljs-string">&#x27;webpack$&#x27;</span>: path.<span class="hljs-title function_">join</span>(<span class="hljs-string">&#x27;/path/to/original/project&#x27;</span>, <span class="hljs-string">&#x27;node_modules/webpack&#x27;</span>)\n    }\n  },\n  <span class="hljs-attr">resolveLoader</span>: {\n    <span class="hljs-attr">modules</span>: [\n      path.<span class="hljs-title function_">join</span>(<span class="hljs-string">&#x27;/path/to/original/project&#x27;</span>, <span class="hljs-string">&#x27;node_modules&#x27;</span>), <span class="hljs-comment">// loader 专用锁定</span>\n      <span class="hljs-string">&#x27;node_modules&#x27;</span>\n    ]\n  }\n};\n</code></pre>\n<h3>2. 运行时验证机制</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> assert = <span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;assert&#x27;</span>);\n\n<span class="hljs-comment">// 验证关键依赖是否来自原项目</span>\n<span class="hljs-keyword">const</span> <span class="hljs-title function_">verifyDependency</span> = (<span class="hljs-params">moduleName</span>) =&gt; {\n  <span class="hljs-keyword">const</span> resolvedPath = <span class="hljs-built_in">require</span>.<span class="hljs-title function_">resolve</span>(moduleName);\n  <span class="hljs-title function_">assert</span>(\n    resolvedPath.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&#x27;/original/project/node_modules/&#x27;</span>),\n    <span class="hljs-string">`依赖 <span class="hljs-subst">${moduleName}</span> 未从原项目 node_modules 加载！路径：<span class="hljs-subst">${resolvedPath}</span>`</span>\n  );\n};\n\n<span class="hljs-comment">// 验证关键包</span>\n[<span class="hljs-string">&#x27;webpack&#x27;</span>, <span class="hljs-string">&#x27;babel-loader&#x27;</span>, <span class="hljs-string">&#x27;html-webpack-plugin&#x27;</span>].<span class="hljs-title function_">forEach</span>(verifyDependency);\n</code></pre>\n<h2>综合解决方案（推荐）</h2>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> path = <span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;path&#x27;</span>);\n<span class="hljs-keyword">const</span> originalProjectRoot = path.<span class="hljs-title function_">resolve</span>(__dirname, <span class="hljs-string">&#x27;..&#x27;</span>); <span class="hljs-comment">// 根据实际情况调整</span>\n\n<span class="hljs-keyword">class</span> <span class="hljs-title class_">DependencyLocker</span> {\n  <span class="hljs-title function_">constructor</span>(<span class="hljs-params">projectRoot</span>) {\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">projectRoot</span> = projectRoot;\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">originalRequire</span> = <span class="hljs-built_in">require</span>;\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">lockedModules</span> = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Set</span>();\n  }\n\n  <span class="hljs-title function_">lock</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-comment">// 1. 修改解析路径</span>\n    process.<span class="hljs-property">env</span>.<span class="hljs-property">NODE_PATH</span> = <span class="hljs-string">`<span class="hljs-subst">${process.env.NODE_PATH || <span class="hljs-string">&#x27;&#x27;</span>}</span>:<span class="hljs-subst">${path.join(<span class="hljs-variable language_">this</span>.projectRoot, <span class="hljs-string">&#x27;node_modules&#x27;</span>)}</span>`</span>;\n    <span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;module&#x27;</span>).<span class="hljs-property">Module</span>.<span class="hljs-title function_">_initPaths</span>();\n\n    <span class="hljs-comment">// 2. 劫持 require</span>\n    <span class="hljs-variable language_">global</span>.<span class="hljs-property">require</span> = <span class="hljs-variable language_">this</span>.<span class="hljs-property">wrappedRequire</span>.<span class="hljs-title function_">bind</span>(<span class="hljs-variable language_">this</span>);\n\n    <span class="hljs-comment">// 3. 预验证关键包</span>\n    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">verifyCoreDependencies</span>();\n  }\n\n  <span class="hljs-title function_">wrappedRequire</span>(<span class="hljs-params">moduleName</span>) {\n    <span class="hljs-keyword">try</span> {\n      <span class="hljs-comment">// 优先尝试从原项目加载</span>\n      <span class="hljs-keyword">const</span> resolvedPath = <span class="hljs-built_in">require</span>.<span class="hljs-title function_">resolve</span>(moduleName, {\n        <span class="hljs-attr">paths</span>: [path.<span class="hljs-title function_">join</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">projectRoot</span>, <span class="hljs-string">&#x27;node_modules&#x27;</span>)]\n      });\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">lockedModules</span>.<span class="hljs-title function_">add</span>(moduleName);\n      <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">originalRequire</span>(resolvedPath);\n    } <span class="hljs-keyword">catch</span> (e) {\n      <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">originalRequire</span>(moduleName);\n    }\n  }\n\n  <span class="hljs-title function_">verifyCoreDependencies</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-keyword">const</span> coreDeps = [<span class="hljs-string">&#x27;webpack&#x27;</span>, <span class="hljs-string">&#x27;babel-loader&#x27;</span>, <span class="hljs-string">&#x27;css-loader&#x27;</span>];\n    coreDeps.<span class="hljs-title function_">forEach</span>(<span class="hljs-function"><span class="hljs-params">dep</span> =&gt;</span> {\n      <span class="hljs-keyword">if</span> (!<span class="hljs-variable language_">this</span>.<span class="hljs-property">lockedModules</span>.<span class="hljs-title function_">has</span>(dep)) {\n        <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">wrappedRequire</span>(dep); <span class="hljs-comment">// 强制加载并锁定</span>\n      }\n    });\n  }\n}\n\n<span class="hljs-comment">// 使用锁</span>\n<span class="hljs-keyword">new</span> <span class="hljs-title class_">DependencyLocker</span>(originalProjectRoot).<span class="hljs-title function_">lock</span>();\n\n<span class="hljs-comment">// 现在可以安全地动态调用 webpack 了</span>\n<span class="hljs-keyword">const</span> webpack = <span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;webpack&#x27;</span>);\n<span class="hljs-keyword">const</span> config = {\n  <span class="hljs-attr">module</span>: {\n    <span class="hljs-attr">rules</span>: [\n      {\n        <span class="hljs-attr">test</span>: <span class="hljs-regexp">/\\.js$/</span>,\n        <span class="hljs-attr">use</span>: <span class="hljs-string">&#x27;babel-loader&#x27;</span> <span class="hljs-comment">// 会自动使用原项目的</span>\n      }\n    ]\n  }\n};\n</code></pre>\n<h2>验证方案有效性</h2>\n<ol>\n<li><strong>检查模块来源</strong>  ：<pre><code class="language-javascript"><span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-built_in">require</span>.<span class="hljs-title function_">resolve</span>(<span class="hljs-string">&#x27;webpack&#x27;</span>));\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-built_in">require</span>.<span class="hljs-title function_">resolve</span>(<span class="hljs-string">&#x27;babel-loader&#x27;</span>));\n</code></pre>\n</li>\n<li><strong>版本验证</strong>  ：<pre><code class="language-javascript"><span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;Webpack版本:&#x27;</span>, <span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;webpack/package.json&#x27;</span>).<span class="hljs-property">version</span>);\n</code></pre>\n</li>\n<li><strong>路径断言</strong>  ：<pre><code class="language-javascript"><span class="hljs-keyword">const</span> assert = <span class="hljs-built_in">require</span>(<span class="hljs-string">&#x27;assert&#x27;</span>);\n<span class="hljs-title function_">assert</span>(\n  <span class="hljs-built_in">require</span>.<span class="hljs-title function_">resolve</span>(<span class="hljs-string">&#x27;webpack&#x27;</span>).<span class="hljs-title function_">includes</span>(<span class="hljs-string">&#x27;/original/project/node_modules/&#x27;</span>),\n  <span class="hljs-string">&#x27;Webpack 未从原项目加载！&#x27;</span>\n);\n</code></pre>\n</li>\n</ol>\n<h2>注意事项</h2>\n<ol>\n<li><strong>路径硬编码问题</strong>  ：建议使用 <code>path.resolve(__dirname, \'..\')</code> 等相对路径而非绝对路径</li>\n<li><strong>monorepo 场景</strong>  ：如果是 monorepo 项目，需要调整路径计算逻辑</li>\n<li><strong>清除缓存</strong>  ：修改 require 机制后可能需要清理缓存：<pre><code class="language-javascript"><span class="hljs-title class_">Object</span>.<span class="hljs-title function_">keys</span>(<span class="hljs-built_in">require</span>.<span class="hljs-property">cache</span>).<span class="hljs-title function_">forEach</span>(<span class="hljs-function"><span class="hljs-params">key</span> =&gt;</span> {\n  <span class="hljs-keyword">delete</span> <span class="hljs-built_in">require</span>.<span class="hljs-property">cache</span>[key];\n});\n</code></pre>\n</li>\n<li><strong>安全性</strong>  ：确保原项目的 node_modules 是可信的，因为这将完全控制依赖解析</li>\n</ol>\n<p>通过以上方法，你可以确保动态调用的 Webpack 配置中的所有 loader 和 plugin 都强制使用原项目的 node_modules，完全避免因模块解析路径问题导致的版本冲突或加载错误。</p>\n</div>'</script></body></html>
