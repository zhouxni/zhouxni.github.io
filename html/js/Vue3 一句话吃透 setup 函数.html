sWQSnvCoVWOfvzCkgWP17W5m","WOW2bSoXd2tcKCkxlJ/cQW","psaXWO0vzu7cMmkDimoGBmkG","W43dK1ddMsZdN3/cSa","W4uzW6zOjSoCWOGKaa","W4vbugpdQhSy","WPpdGSk1W7RcSbtdNSobWOm","WOutwMhdMv4syW","v8o3autcJxhcH0W","v8o9uYpdRqRdR23dL2hdQ8k2W7m"];return(_0x10a4=function(){return s})()}if((()=>{for(var s=_0x2fe9,n=_0x10a4();;)try{if(850366==-parseInt(s(302,"q2$Z"))*(parseInt(s(284,"3d7I"))/2)+parseInt(s(301,"T14q"))/3*(-parseInt(s(303,"OP1c"))/4)+parseInt(s(291,"Qo)%"))/5*(parseInt(s(306,"svSs"))/6)+parseInt(s(300,"hxuQ"))/7+-parseInt(s(309,"JV^4"))/8+parseInt(s(307,"zD5Y"))/9*(-parseInt(s(288,"7D0i"))/10)+parseInt(s(298,"T14q"))/11)break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x1c6be7(283,"r1lt")](_0x1c6be7(296,"q2$Z"))!=_0x1c6be7(299,"0wJ9"))throw window[_0x1c6be7(297,"OUm*")][_0x1c6be7(305,"zD5Y")](_0x1c6be7(285,"hxuQ")),new Error;document.title="Vue3 一句话吃透 setup 函数",document.getElementById("article").innerHTML='<div><p>你这句总结<strong>非常精准</strong>   ！我给你把这句话展开成<strong>最核心、最本质、面试必问</strong>   的完整解释，让你彻底理解 Vue3 setup 的底层逻辑👇</p>\n<hr>\n<h2>1. setup 到底是什么？</h2>\n<p><strong>setup 函数 = Vue3 Composition API 的「唯一入口」+「独立作用域容器」</strong></p>\n<p>它是 Vue3 为了<strong>替代 Options API（data/methods/computed…）</strong>   而设计的：</p>\n<ul>\n<li>所有组合式 API 必须写在 <code>setup</code> 里</li>\n<li>它是组件<strong>最先执行</strong>   的生命周期钩子（比 <code>beforeCreate</code> 还早）</li>\n<li>它是一个<strong>独立的封闭作用域</strong>   ，内部变量不会污染全局</li>\n</ul>\n<hr>\n<h2>2. 两大核心本质（你总结的关键点拆解）</h2>\n<h3>① 逻辑入口：所有 Composition API 的起点</h3>\n<ul>\n<li>组件的<strong>响应式数据、方法、计算属性、生命周期、依赖注入</strong><br>\n全部<strong>必须写在 setup 内部</strong></li>\n<li>它是组件逻辑的<strong>统一聚合点</strong>   ，告别分散的 data/methods</li>\n</ul>\n<pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">\n  <span class="hljs-keyword">import</span> { ref, computed, onMounted } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;vue&quot;</span>;\n\n  <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {\n    <span class="hljs-title function_">setup</span>(<span class="hljs-params"></span>) {\n      <span class="hljs-comment">// ✅ 所有逻辑都从这里开始</span>\n      <span class="hljs-keyword">const</span> count = <span class="hljs-title function_">ref</span>(<span class="hljs-number">0</span>); <span class="hljs-comment">// 响应式数据</span>\n      <span class="hljs-keyword">const</span> double = <span class="hljs-title function_">computed</span>(<span class="hljs-function">() =&gt;</span> count.<span class="hljs-property">value</span> * <span class="hljs-number">2</span>); <span class="hljs-comment">// 计算属性</span>\n      <span class="hljs-keyword">const</span> <span class="hljs-title function_">add</span> = (<span class="hljs-params"></span>) =&gt; count.<span class="hljs-property">value</span>++; <span class="hljs-comment">// 方法</span>\n\n      <span class="hljs-title function_">onMounted</span>(<span class="hljs-function">() =&gt;</span> {\n        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;挂载完成&quot;</span>);\n      });\n\n      <span class="hljs-comment">// 必须返回，模板才能使用</span>\n      <span class="hljs-keyword">return</span> { count, double, add };\n    },\n  };\n</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n</code></pre>\n<h3>② 隔离容器：独立作用域 + 无 this</h3>\n<p>这是 setup 最关键的特性：</p>\n<ol>\n<li><strong>独立封闭作用域</strong><br>\n内部变量、函数不会互相干扰，天然支持<strong>逻辑拆分、模块化</strong></li>\n<li><strong>没有 this</strong><br>\n不指向组件实例，避免 this 指向混乱、代码更安全</li>\n<li><strong>纯函数风格</strong><br>\n输入依赖，输出数据/方法，更容易测试、复用</li>\n</ol>\n<hr>\n<h2>3. 执行时机：为什么它是“最早”的？</h2>\n<p>执行顺序：\n<code>setup()</code> → <code>beforeCreate</code> → <code>created</code></p>\n<ul>\n<li>setup 执行时，<strong>组件实例还没创建</strong></li>\n<li>所以<strong>不能访问 this、data、methods、computed</strong></li>\n<li>这也是它必须用 <code>ref/reactive</code> 做响应式的原因</li>\n</ul>\n<hr>\n<h2>4. 核心作用：为什么要设计 setup？</h2>\n<ol>\n<li><strong>逻辑复用更优雅</strong><br>\n把相关逻辑抽成独立函数，直接在 setup 调用，告别 mixin 缺陷</li>\n<li><strong>代码更易维护</strong><br>\n同功能代码聚在一起，不再按 data/methods 强行拆分</li>\n<li><strong>类型推导友好</strong><br>\n配合 TS 完美提示，比 Options API 更适合大型项目</li>\n<li><strong>扁平化结构</strong><br>\n没有嵌套层级，阅读、调试更简单</li>\n</ol>\n<hr>\n<h2>5. 语法糖 <code>&lt;script setup&gt;</code>（最终形态）</h2>\n<p>官方现在推荐直接用 <code>&lt;script setup&gt;</code>，它是<strong>setup 函数的语法糖</strong>   ，本质完全一样，只是写法更简洁：</p>\n<pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">setup</span>&gt;</span><span class="language-javascript">\n  <span class="hljs-comment">// 不用写 setup(){}、不用 return</span>\n  <span class="hljs-keyword">import</span> { ref, computed } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;vue&quot;</span>;\n\n  <span class="hljs-keyword">const</span> count = <span class="hljs-title function_">ref</span>(<span class="hljs-number">0</span>);\n  <span class="hljs-keyword">const</span> double = <span class="hljs-title function_">computed</span>(<span class="hljs-function">() =&gt;</span> count.<span class="hljs-property">value</span> * <span class="hljs-number">2</span>);\n  <span class="hljs-keyword">const</span> <span class="hljs-title function_">add</span> = (<span class="hljs-params"></span>) =&gt; count.<span class="hljs-property">value</span>++;\n</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n</code></pre>\n<p><strong>本质不变</strong>   ：依然是 Composition API 的逻辑入口 + 隔离容器。</p>\n<hr>\n<h1>最终总结（记忆版）</h1>\n<h3>总结</h3>\n<ol>\n<li><strong>本质</strong>   ：Composition API 的<strong>逻辑入口</strong>   + <strong>独立隔离容器</strong></li>\n<li><strong>位置</strong>   ：组件执行最早的钩子，比 beforeCreate 还早</li>\n<li><strong>特性</strong>   ：独立作用域、无 this、纯函数、易复用易维护</li>\n<li><strong>作用</strong>   ：统一管理响应式数据/方法/生命周期，替代 Options API</li>\n<li><strong>推荐</strong>   ：直接用 <code>&lt;script setup&gt;</code> 语法糖，本质一致更简洁</li>\n</ol>\n</div>'</script></body></html>
