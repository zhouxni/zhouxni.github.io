<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="vue3 宏指令",document.getElementById("article").innerHTML="<div><p>Vue 3 引入了一些编译宏（Compile-time Macros），这些宏指令在代码编译阶段被处理，提供了一种更简洁的方式来编写和维护代码。以下是 Vue 3 中主要的宏指令及其用途：</p>\n<ol>\n<li><strong><code>defineProps</code></strong>  ：\n<ul>\n<li>用于声明组件的 props。</li>\n<li>示例：<code>const props = defineProps(['title', 'likes'])</code>。</li>\n<li>也可以与 TypeScript 结合使用，提供类型安全。</li>\n</ul>\n</li>\n<li><strong><code>defineEmits</code></strong>  ：\n<ul>\n<li>用于声明组件可能触发的事件。</li>\n<li>示例：<code>const emit = defineEmits(['change', 'delete'])</code>。</li>\n<li>同样支持 TypeScript 类型声明。</li>\n</ul>\n</li>\n<li><strong><code>defineExpose</code></strong>  ：\n<ul>\n<li>用于显式地指定哪些属性和方法可以被父组件访问。</li>\n<li>示例：<code>defineExpose({ method1, property1 })</code>。</li>\n</ul>\n</li>\n<li><strong><code>withDefaults</code></strong>  ：\n<ul>\n<li>用于为 <code>defineProps</code> 定义的 props 提供默认值。</li>\n<li>示例：<code>const props = withDefaults(defineProps&lt;Props&gt;(), { message: 'hello' })</code>。</li>\n</ul>\n</li>\n<li><strong><code>defineOptions</code></strong>  ：\n<ul>\n<li>用于定义组件选项，如 <code>name</code>、<code>inheritAttrs</code> 等。</li>\n<li>示例：<code>defineOptions({ name: 'MyComponent', inheritAttrs: false })</code>。</li>\n</ul>\n</li>\n<li><strong><code>defineSlots</code></strong>  ：\n<ul>\n<li>在使用 TypeScript 时为插槽定义类型。</li>\n<li>示例：<code>const slots = defineSlots&lt;{ default: (props: { item: string }) =&gt; any }&gt;()</code>。</li>\n</ul>\n</li>\n<li><strong><code>defineModel</code></strong>  （3.4+ 版本）：\n<ul>\n<li>用于简化 <code>v-model</code> 的使用。</li>\n<li>示例：<code>const model = defineModel&lt;string&gt;({ default: '' })</code>。</li>\n</ul>\n</li>\n</ol>\n<p>这些宏指令主要用在 <code>&lt;script setup&gt;</code> 语法中，它们提供了更简洁的语法和更好的类型推断，有助于减少样板代码，提高代码的可读性和维护性。需要注意的是，这些宏指令在编译阶段会被转换为高效的代码，并在最终生成的代码中可能不会被直接保留。</p>\n</div>"</script></body></html>
