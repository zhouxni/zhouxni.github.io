<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="vue3 静态提升",document.getElementById("article").innerHTML='<div><p><strong>Vue 3 静态提升</strong>  是 Vue 3 框架在编译阶段实施的一种重要优化技术，旨在减少运行时的开销，提高应用程序的渲染性能。以下是关于 Vue 3 静态提升的详细介绍：</p>\n<h3>一、静态提升的概念</h3>\n<p>静态提升是指在编译阶段将模板中的静态节点提升为常量，以避免在每次渲染时重新计算这些节点。静态节点是指在渲染过程中不会发生变化的部分，例如固定的文本、样式、属性等。通过静态提升，Vue 3 可以在渲染时直接复用这些静态节点，从而减少不必要的 DOM 操作和虚拟 DOM 的更新。</p>\n<h3>二、静态提升的工作原理</h3>\n<p>静态提升的实现主要分为两个阶段：</p>\n<ol>\n<li><strong>transform 阶段</strong>  ：\n<ul>\n<li>Vue 3 的编译器在编译过程中会遍历抽象语法树（AST），识别出模板中的静态节点。</li>\n<li>对这些静态节点进行标记和处理，并将它们添加到根节点的 <code>hoists</code> 数组中。</li>\n</ul>\n</li>\n<li><strong>generate 阶段</strong>  ：\n<ul>\n<li>遍历 <code>hoists</code> 数组，在渲染函数外生成存储静态节点虚拟 DOM 的 <code>_hoisted_x</code> 变量。</li>\n<li>在渲染函数中使用这些 <code>_hoisted_x</code> 变量来表示静态节点，从而避免在每次渲染时都重新生成这些节点的虚拟 DOM。</li>\n</ul>\n</li>\n</ol>\n<h3>三、静态提升的优势</h3>\n<ol>\n<li><strong>减少运行时开销</strong>  ：\n<ul>\n<li>通过静态提升，Vue 3 可以避免在每次渲染时都重新创建静态节点的虚拟 DOM，从而减少了运行时的计算和资源消耗。</li>\n</ul>\n</li>\n<li><strong>提高渲染性能</strong>  ：\n<ul>\n<li>静态节点在渲染时可以直接复用，减少了 DOM 操作和虚拟 DOM 的更新次数，从而提高了渲染性能。</li>\n</ul>\n</li>\n<li><strong>优化代码结构</strong>  ：\n<ul>\n<li>静态提升使得渲染函数更加简洁和高效，减少了不必要的代码重复和冗余。</li>\n</ul>\n</li>\n</ol>\n<h3>四、静态提升的示例</h3>\n<p>以下是一个简单的示例，展示了静态提升在实际应用中的效果：</p>\n<pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span>&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">h1</span>&gt;</span>静态标题<span class="hljs-tag">&lt;/<span class="hljs-name">h1</span>&gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>{{ 动态内容 }}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>\n  <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>\n<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span>\n\n<span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">setup</span>&gt;</span><span class="language-javascript">\n<span class="hljs-keyword">import</span> { ref } <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;vue&#x27;</span>;\n\n<span class="hljs-keyword">const</span> 动态内容 = <span class="hljs-title function_">ref</span>(<span class="hljs-string">&#x27;这是动态内容&#x27;</span>);\n</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n</code></pre>\n<p>在这个示例中，<code>&lt;h1&gt;静态标题&lt;/h1&gt;</code> 是一个静态节点，而 <code>&lt;p&gt;{{ 动态内容 }}&lt;/p&gt;</code> 是一个动态节点。在编译阶段，Vue 3 会将 <code>&lt;h1&gt;静态标题&lt;/h1&gt;</code> 提升为常量，并在渲染时直接复用。这样，在每次渲染时，Vue 3 只需要更新动态节点的内容，而无需重新创建静态节点的虚拟 DOM。</p>\n<h3>五、静态提升的注意事项</h3>\n<ol>\n<li><strong>静态节点的识别</strong>  ：\n<ul>\n<li>静态节点必须是在渲染过程中不会发生变化的部分。如果某个节点在渲染时可能会发生变化（例如通过 v-if、v-show 等指令控制其显示/隐藏），则它不能被视为静态节点。</li>\n</ul>\n</li>\n<li><strong>与动态节点的结合</strong>  ：\n<ul>\n<li>在实际应用中，静态节点和动态节点通常会结合在一起使用。Vue 3 的静态提升技术可以确保在渲染时只更新必要的部分，从而提高性能。</li>\n</ul>\n</li>\n<li><strong>编译选项</strong>  ：\n<ul>\n<li>静态提升是 Vue 3 编译器的一个默认优化选项。在大多数情况下，开发者无需手动配置即可享受其带来的性能提升。然而，在某些特殊情况下（例如需要调试或分析编译过程时），开发者可能需要关闭静态提升功能。</li>\n</ul>\n</li>\n</ol>\n</div>'</script></body></html>
