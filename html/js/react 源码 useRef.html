<script>
      document.title = 'react 源码 useRef'
        document.getElementById('article').innerHTML = 
        "<div><p><code>useRef</code> 是 React 的一个 Hook，用于在函数组件中持有一个可变的引用对象（ref）。它通常用于访问 DOM 元素或存储任意可变值，而不会触发组件的重新渲染。以下是对 <code>useRef</code> 的详细解析，包括其源码实现和实际应用。</p>\n<hr>\n<h3><strong>一、<code>useRef</code> 的基本用法</strong></h3>\n<pre><code class=\"language-jsx\"><span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">React</span>, { useRef } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;react&#x27;</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">MyComponent</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> inputRef = <span class=\"hljs-title function_\">useRef</span>(<span class=\"hljs-literal\">null</span>);\n\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">handleClick</span> = (<span class=\"hljs-params\"></span>) =&gt; {\n    <span class=\"hljs-keyword\">if</span> (inputRef.<span class=\"hljs-property\">current</span>) {\n      inputRef.<span class=\"hljs-property\">current</span>.<span class=\"hljs-title function_\">focus</span>(); <span class=\"hljs-comment\">// 访问 DOM 元素</span>\n    }\n  };\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">input</span> <span class=\"hljs-attr\">ref</span>=<span class=\"hljs-string\">{inputRef}</span> <span class=\"hljs-attr\">type</span>=<span class=\"hljs-string\">&quot;text&quot;</span> /&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{handleClick}</span>&gt;</span>Focus Input<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<ul>\n<li><strong>创建一个 ref 对象</strong>  ：<code>const inputRef = useRef(null);</code> 创建一个初始值为 <code>null</code> 的 ref 对象。</li>\n<li><strong>访问 DOM 元素</strong>  ：通过 <code>inputRef.current</code> 访问绑定的 DOM 元素。</li>\n<li><strong>不会触发重新渲染</strong>  ：修改 <code>ref.current</code> 的值不会触发组件的重新渲染。</li>\n</ul>\n<hr>\n<h3><strong>二、<code>useRef</code> 的源码实现</strong></h3>\n<p>虽然 React 的源码是用 C++ 和 JavaScript 混合编写的，且具体实现细节可能因版本而异，但我们可以基于 React 的设计理念和公开文档，理解 <code>useRef</code> 的核心实现原理。</p>\n<h4><strong>核心源码概念（简化版）</strong></h4>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">useRef</span>(<span class=\"hljs-params\">initialValue</span>) {\n  <span class=\"hljs-keyword\">const</span> hook = {\n    <span class=\"hljs-attr\">current</span>: initialValue, <span class=\"hljs-comment\">// 初始值</span>\n  };\n\n  <span class=\"hljs-comment\">// 假设有一个全局的 hooks 数组来存储 hook 对象</span>\n  <span class=\"hljs-comment\">// 在实际 React 实现中，hooks 是通过链表结构管理的</span>\n  <span class=\"hljs-keyword\">if</span> (!currentlyRenderingFiber.<span class=\"hljs-property\">alternate</span>) {\n    <span class=\"hljs-comment\">// 初次渲染时，将 hook 对象存储到 fiber 的 hooks 链表中</span>\n    currentlyRenderingFiber.<span class=\"hljs-property\">hooks</span>.<span class=\"hljs-title function_\">push</span>(hook);\n  } <span class=\"hljs-keyword\">else</span> {\n    <span class=\"hljs-comment\">// 更新时，从 alternate fiber 的 hooks 链表中获取之前的 hook 对象</span>\n    <span class=\"hljs-keyword\">const</span> oldHookIndex = <span class=\"hljs-comment\">// ... 找到对应的 hook 索引</span>\n    <span class=\"hljs-keyword\">const</span> oldHook = currentlyRenderingFiber.<span class=\"hljs-property\">alternate</span>.<span class=\"hljs-property\">hooks</span>[oldHookIndex];\n    hook.<span class=\"hljs-property\">current</span> = oldHook.<span class=\"hljs-property\">current</span>; <span class=\"hljs-comment\">// 保持 current 的值跨渲染保持一致</span>\n  }\n\n  <span class=\"hljs-keyword\">return</span> hook;\n}\n</code></pre>\n<h4><strong>源码解析</strong></h4>\n<ol>\n<li><strong>Hook 对象</strong>  ：\n<ul>\n<li><code>useRef</code> 返回一个包含 <code>current</code> 属性的对象。</li>\n<li><code>current</code> 属性保存了 ref 的当前值。</li>\n</ul>\n</li>\n<li><strong>Hooks 链表</strong>  ：\n<ul>\n<li>在 React 内部，每个组件的 Fiber 节点维护一个 hooks 链表，用于存储该组件的所有 hooks。</li>\n<li>初次渲染时，<code>useRef</code> 创建的 hook 对象被添加到 hooks 链表中。</li>\n<li>更新时，React 从 alternate Fiber 的 hooks 链表中获取之前的 hook 对象，保持 <code>current</code> 的值跨渲染保持一致。</li>\n</ul>\n</li>\n<li><strong>不会触发重新渲染</strong>  ：\n<ul>\n<li>修改 <code>ref.current</code> 的值不会改变 hook 对象本身，因此不会触发组件的重新渲染。</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h3><strong>三、<code>useRef</code> 的工作原理</strong></h3>\n<ol>\n<li><strong>初次渲染</strong>  ：\n<ul>\n<li>调用 <code>useRef</code> 时，React 创建一个 hook 对象，并将其存储到 Fiber 节点的 hooks 链表中。</li>\n<li>返回的 hook 对象的 <code>current</code> 属性被初始化为传入的初始值。</li>\n</ul>\n</li>\n<li><strong>更新渲染</strong>  ：\n<ul>\n<li>在后续渲染中，React 从 alternate Fiber 的 hooks 链表中获取之前的 hook 对象。</li>\n<li>保持 <code>current</code> 属性的值跨渲染保持一致，除非显式修改。</li>\n</ul>\n</li>\n<li><strong>访问和修改</strong>  ：\n<ul>\n<li>通过 <code>ref.current</code> 访问和修改 ref 的当前值。</li>\n<li>修改 <code>ref.current</code> 不会触发组件的重新渲染。</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h3><strong>四、<code>useRef</code> 的常见应用场景</strong></h3>\n<ol>\n<li><strong>访问 DOM 元素</strong>  ：\n<ul>\n<li>使用 <code>useRef</code> 获取 DOM 元素的引用，以便在组件中直接操作 DOM。</li>\n</ul>\n</li>\n<li><strong>存储任意可变值</strong>  ：\n<ul>\n<li>使用 <code>useRef</code> 存储组件中的任意可变值，如定时器 ID、外部库实例等。</li>\n</ul>\n</li>\n<li><strong>避免不必要的重新渲染</strong>  ：\n<ul>\n<li>使用 <code>useRef</code> 存储不会影响组件渲染状态的值，避免不必要的重新渲染。</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h3><strong>五、<code>useRef</code> 与 <code>useState</code> 的区别</strong></h3>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th><code>useRef</code></th>\n<th><code>useState</code></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>存储值</strong></td>\n<td>任意可变值</td>\n<td>组件状态值</td>\n</tr>\n<tr>\n<td><strong>触发重新渲染</strong></td>\n<td>不会</td>\n<td>会</td>\n</tr>\n<tr>\n<td><strong>典型用途</strong></td>\n<td>访问 DOM 元素、存储可变值</td>\n<td>管理组件状态</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>六、总结</strong></h3>\n<p><code>useRef</code> 是 React 中一个非常有用的 Hook，它允许在函数组件中持有一个可变的引用对象，而不会触发组件的重新渲染。<code>useRef</code> 的核心实现依赖于 React 的 hooks 链表机制，确保了 ref 对象在组件的整个生命周期内保持一致。通过 <code>useRef</code>，开发者可以方便地访问 DOM 元素、存储任意可变值，并优化组件的性能。</p>\n</div>";
      </script></body></html>
