<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="React-Redux 管理全局状态借助了 React 的 Context API",document.getElementById("article").innerHTML='<div><p>是的，React-Redux 管理全局状态<strong>确实借助了 React 的 Context API</strong>   ，但不仅仅是简单地“用了一下”，而是做了<strong>更复杂、更高效的封装和优化</strong>   。</p>\n<hr>\n<h3>✅ 简要回答：</h3>\n<blockquote>\n<p><strong>React-Redux 使用 Context API 来“传递” Redux store，但不直接用 Context 来传递状态值。</strong></p>\n</blockquote>\n<hr>\n<h3>🔍 深入解释：</h3>\n<h4>1. <strong>Context API 的作用：传递 store，而不是状态</strong></h4>\n<p>React-Redux 内部使用 <code>React.createContext()</code> 创建一个 <strong>store context</strong>   ，用来把 Redux store 本身（不是状态）传递给组件树：</p>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> <span class="hljs-title class_">StoreContext</span> = <span class="hljs-title class_">React</span>.<span class="hljs-title function_">createContext</span>(<span class="hljs-literal">null</span>);\n</code></pre>\n<p>这个 context 的值是 Redux 的 <code>store</code>，而不是 <code>store.getState()</code> 的结果。</p>\n<hr>\n<h4>2. <strong>状态订阅机制：用自定义订阅系统，而不是直接依赖 Context 更新</strong></h4>\n<p>React-Redux（v7+）并没有用 Context 的 <code>.Provider</code> 来触发组件更新，而是：</p>\n<ul>\n<li>每个 <code>connect()</code> 或 <code>useSelector()</code> 的组件，都会<strong>直接订阅 Redux store 的变化</strong>   ；</li>\n<li>当 store 状态变化时，React-Redux 会<strong>手动触发组件的重新渲染</strong>   ；</li>\n<li>这样可以避免 Context 带来的<strong>性能问题（如不必要的子树重渲染）</strong>   。</li>\n</ul>\n<blockquote>\n<p>换句话说：Context 只是“传 store”，状态更新不走 Context。</p>\n</blockquote>\n<hr>\n<h4>3. <strong>React-Redux v8 的变化：用了 useSyncExternalStore</strong></h4>\n<p>在新版 React-Redux（v8）中，使用了 React 18 的 <code>useSyncExternalStore</code> hook 来订阅 store，这仍然是<strong>自定义订阅机制</strong>   ，不是直接用 Context 来传递状态。</p>\n<hr>\n<h3>✅ 总结一句话：</h3>\n<blockquote>\n<p><strong>React-Redux 借助 Context 把 Redux store 传下去，但状态更新是通过自定义订阅机制完成的，不是依赖 Context 的 value 变化。</strong></p>\n</blockquote>\n<hr>\n<p>如果你感兴趣，我可以给你看一段 React-Redux 的源码片段来说明这个机制。</p>\n</div>'</script></body></html>
