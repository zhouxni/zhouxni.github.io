tic</code>（默认值）</h3>\n<ul>\n<li>所有元素默认的定位方式。</li>\n<li>忽略 <code>top</code>、<code>bottom</code>、<code>left</code>、<code>right</code> 和 <code>z-index</code>。</li>\n<li>按正常文档流排列。</li>\n</ul>\n<pre><code class="language-css"><span class="hljs-selector-tag">div</span> {\n  <span class="hljs-attribute">position</span>: static;\n} <span class="hljs-comment">/* 等同于不写 */</span>\n</code></pre>\n<hr>\n<h3>2. <code>relative</code>（相对定位）</h3>\n<ul>\n<li>元素仍在正常文档流中，<strong>占据原有空间</strong>   。</li>\n<li>可通过 <code>top</code>/<code>left</code> 等微调位置，<strong>偏移是相对于自身原始位置</strong>   。</li>\n<li><strong>常用来为子元素的 <code>absolute</code> 定位创建包含块</strong>   。</li>\n</ul>\n<pre><code class="language-css"><span class="hljs-selector-class">.box</span> {\n  <span class="hljs-attribute">position</span>: relative;\n  <span class="hljs-attribute">top</span>: <span class="hljs-number">10px</span>; <span class="hljs-comment">/* 向下移动 10px，但原位置仍被占据 */</span>\n}\n</code></pre>\n<hr>\n<h3>3. <code>absolute</code>（绝对定位）</h3>\n<ul>\n<li><strong>脱离文档流</strong>   ，不占空间。</li>\n<li>相对于<strong>最近的非 <code>static</code> 定位祖先元素</strong>   （如 <code>relative</code>/<code>absolute</code>/<code>fixed</code>/<code>sticky</code>）。</li>\n<li>如果没有这样的祖先，则相对于<strong>初始包含块</strong>   （通常是 <code>&lt;html&gt;</code> 或视口）。</li>\n<li>常用于弹层、气泡提示等。</li>\n</ul>\n<pre><code class="language-css"><span class="hljs-selector-class">.popup</span> {\n  <span class="hljs-attribute">position</span>: absolute;\n  <span class="hljs-attribute">top</span>: <span class="hljs-number">0</span>;\n  <span class="hljs-attribute">left</span>: <span class="hljs-number">0</span>; <span class="hljs-comment">/* 相对于最近的定位祖先左上角 */</span>\n}\n</code></pre>\n<hr>\n<h3>4. <code>fixed</code>（固定定位）</h3>\n<ul>\n<li><strong>脱离文档流</strong>   。</li>\n<li><strong>始终相对于浏览器视口</strong>   （viewport），<strong>不随页面滚动而移动</strong>   。</li>\n<li>⚠️ 注意：若祖先有 <code>transform</code>/<code>filter</code> 等，会改变其包含块（见下文）。</li>\n</ul>\n<pre><code class="language-css"><span class="hljs-selector-class">.navbar</span> {\n  <span class="hljs-attribute">position</span>: fixed;\n  <span class="hljs-attribute">top</span>: <span class="hljs-number">0</span>;\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">100%</span>; <span class="hljs-comment">/* 固定在顶部 */</span>\n}\n</code></pre>\n<hr>\n<h3>5. <code>sticky</code>（粘性定位）</h3>\n<ul>\n<li><strong>混合行为</strong>   ：默认像 <code>relative</code>，滚动到阈值后像 <code>fixed</code>。</li>\n<li><strong>不脱离文档流</strong>   。</li>\n<li>必须设置 <code>top</code>/<code>bottom</code>/<code>left</code>/<code>right</code> 才生效。</li>\n<li>粘性范围<strong>受限于父容器边界</strong>   。</li>\n</ul>\n<pre><code class="language-css"><span class="hljs-selector-class">.header</span> {\n  <span class="hljs-attribute">position</span>: sticky;\n  <span class="hljs-attribute">top</span>: <span class="hljs-number">0</span>; <span class="hljs-comment">/* 滚动到顶部时粘住 */</span>\n}\n</code></pre>\n<hr>\n<h2>⚠️ 重要补充：包含块（Containing Block）的影响</h2>\n<table>\n<thead>\n<tr>\n<th>定位值</th>\n<th>包含块是谁？</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>static</code> / <code>relative</code></td>\n<td>父级块容器</td>\n</tr>\n<tr>\n<td><code>absolute</code></td>\n<td>最近的 <code>position</code> ≠ <code>static</code> 的祖先</td>\n</tr>\n<tr>\n<td><code>fixed</code></td>\n<td><strong>视口</strong>   （除非祖先有 <code>transform</code>/<code>filter</code> 等）</td>\n</tr>\n<tr>\n<td><code>sticky</code></td>\n<td>最近的可滚动祖先（或视口）</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>🔥 <strong>常见陷阱</strong>   ：<br>\n如果一个 <code>fixed</code> 元素的祖先设置了 <code>transform: translateX(0)</code>，<br>\n那么该 <code>fixed</code> 元素会<strong>相对于这个祖先定位</strong>   ，<strong>不再固定在视口</strong>   ！</p>\n</blockquote>\n<hr>\n<h2>🧪 浏览器兼容性</h2>\n<table>\n<thead>\n<tr>\n<th>值</th>\n<th>兼容性</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>static</code> / <code>relative</code> / <code>absolute</code> / <code>fixed</code></td>\n<td>所有浏览器（包括 IE6+）</td>\n</tr>\n<tr>\n<td><code>sticky</code></td>\n<td>Chrome ≥ 56, Firefox ≥ 32, Safari ≥ 6.1, Edge ≥ 16（iOS Safari 需 <code>-webkit-sticky</code> 前缀，现代版本已不需要）</td>\n</tr>\n</tbody>\n</table>\n<p>为兼容旧版 Safari，可写：</p>\n<pre><code class="language-css"><span class="hljs-selector-class">.sticky</span> {\n  <span class="hljs-attribute">position</span>: -webkit-sticky;\n  <span class="hljs-attribute">position</span>: sticky;\n  <span class="hljs-attribute">top</span>: <span class="hljs-number">0</span>;\n}\n</code></pre>\n<hr>\n<h2>✅ 总结口诀</h2>\n<blockquote>\n<ul>\n<li><strong><code>static</code></strong>   ：默认不动</li>\n<li><strong><code>relative</code></strong>   ：自己挪，占位留</li>\n<li><strong><code>absolute</code></strong>   ：脱文档，找爹（非 static）</li>\n<li><strong><code>fixed</code></strong>   ：贴视口，滚不动（小心 transform 陷阱！）</li>\n<li><strong><code>sticky</code></strong>   ：先随流，后粘住（只在父内有效）</li>\n</ul>\n</blockquote>\n<hr>\n<p>如果你正在做具体布局，不确定该用哪种 <code>position</code>，欢迎描述需求，我可以帮你选择最合适的方式！</p>\n</div>'</script></body></html>
