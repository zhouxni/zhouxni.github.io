<!DOCTYPE html><html lang="en"><head>

    <link rel="stylesheet" href="../../css/github.min.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }
  </style></head>
  
  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
        document.getElementById('article').innerHTML = 
        "<div><p>ESM (ECMAScript Modules) 是现代浏览器原生支持的 JavaScript 模块系统，它允许开发者以模块化的方式组织和加载 JavaScript 代码。</p>\n<h2>基本用法</h2>\n<p>在 HTML 中通过 <code>&lt;script type=&quot;module&quot;&gt;</code> 标签加载 ESM 模块：</p>\n<pre><code class=\"language-html\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span> <span class=\"hljs-attr\">type</span>=<span class=\"hljs-string\">&quot;module&quot;</span>&gt;</span><span class=\"language-javascript\">\n  <span class=\"hljs-keyword\">import</span> { functionName } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;./module.js&#x27;</span>;\n  <span class=\"hljs-title function_\">functionName</span>();\n</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n</code></pre>\n<h2>主要特性</h2>\n<ol>\n<li><strong>严格模式</strong>  ：模块代码默认在严格模式下运行</li>\n<li><strong>作用域隔离</strong>  ：模块有自己的作用域，不会污染全局</li>\n<li><strong>静态解析</strong>  ：导入导出在编译时确定</li>\n<li><strong>延迟执行</strong>  ：模块默认 defer 加载</li>\n</ol>\n<h2>导入导出语法</h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 导出</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">const</span> name = <span class=\"hljs-string\">&#x27;value&#x27;</span>;\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">func</span>(<span class=\"hljs-params\"></span>) {};\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> someValue;\n\n<span class=\"hljs-comment\">// 导入</span>\n<span class=\"hljs-keyword\">import</span> { name, func } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;./module.js&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> defaultExport <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;./module.js&#x27;</span>;\n<span class=\"hljs-keyword\">import</span> * <span class=\"hljs-keyword\">as</span> <span class=\"hljs-variable language_\">module</span> <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;./module.js&#x27;</span>;\n</code></pre>\n<h2>浏览器支持</h2>\n<p>所有现代浏览器（Chrome、Firefox、Safari、Edge）都支持 ESM。IE 不支持。</p>\n<h2>动态导入</h2>\n<p>使用 <code>import()</code> 函数实现按需加载：</p>\n<pre><code class=\"language-javascript\">button.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">&#x27;click&#x27;</span>, <span class=\"hljs-title function_\">async</span> () =&gt; {\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable language_\">module</span> = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-keyword\">import</span>(<span class=\"hljs-string\">&#x27;./module.js&#x27;</span>);\n  <span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-title function_\">doSomething</span>();\n});\n</code></pre>\n<h2>与 CommonJS 的区别</h2>\n<ol>\n<li>ESM 是静态的（编译时确定依赖），CommonJS 是动态的（运行时加载）</li>\n<li>ESM 支持 tree-shaking，CommonJS 不支持</li>\n<li>ESM 是异步加载，CommonJS 是同步加载</li>\n</ol>\n<h2>注意事项</h2>\n<ul>\n<li>模块文件需要正确的 MIME 类型 (<code>application/javascript</code>)</li>\n<li>跨域模块需要 CORS 头</li>\n<li>模块路径需要完整扩展名或配置服务器重写规则</li>\n</ul>\n<p>ESM 是现代前端开发的标准模块系统，逐渐取代了传统的脚本加载方式。</p>\n</div>";
      </script></body></html>
