<!DOCTYPE html><html lang="en"><head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/github.min.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;

    }

  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
        document.getElementById('article').innerHTML = 
        "<div><p>当你的项目中同时包含 <code>.ts</code> 和 <code>.js</code> 文件，并且想要将它们都输出到 <code>dist</code> 目录时，可以采取以下几种方法：</p>\n<h2>方法 1：使用 <code>allowJs</code> 选项</h2>\n<p>在 <code>tsconfig.json</code> 中启用 <code>allowJs</code> 选项：</p>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;compilerOptions&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;outDir&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;dist&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;allowJs&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">true</span></span><span class=\"hljs-punctuation\">,</span>  <span class=\"hljs-comment\">// 允许编译 JavaScript 文件</span>\n    <span class=\"hljs-attr\">&quot;checkJs&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">false</span></span>  <span class=\"hljs-comment\">// 可选：不对 JS 文件进行类型检查</span>\n  <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">&quot;include&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-string\">&quot;src/**/*.ts&quot;</span><span class=\"hljs-punctuation\">,</span> <span class=\"hljs-string\">&quot;src/**  /*.js&quot;</span><span class=\"hljs-punctuation\">]</span>  <span class=\"hljs-comment\">// 包含 TS 和 JS 文件</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<p>然后运行：</p>\n<pre><code class=\"language-sh\">npx tsc\n</code></pre>\n<h2>方法 2：使用复制工具（推荐）</h2>\n<p>更推荐的做法是只编译 TypeScript 文件，然后使用复制工具将 JavaScript 文件复制到 <code>dist</code> 目录：</p>\n<ol>\n<li>安装 <code>copyfiles</code>：</li>\n</ol>\n<pre><code class=\"language-sh\">npm install copyfiles --save-dev\n</code></pre>\n<ol start=\"2\">\n<li>在 <code>package.json</code> 中添加脚本：</li>\n</ol>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;scripts&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;build&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;tsc &amp;&amp; copyfiles \\&quot;src/**/*.js\\&quot; dist&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;build:watch&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;tsc --watch&quot;</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<h2>方法 3：使用构建工具（如 webpack 或 rollup）</h2>\n<p>如果你使用构建工具，可以配置它们同时处理 TS 和 JS 文件：</p>\n<h3>webpack 示例配置：</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-property\">exports</span> = {\n  <span class=\"hljs-attr\">entry</span>: <span class=\"hljs-string\">&#x27;./src/index.js&#x27;</span>,\n  <span class=\"hljs-attr\">output</span>: {\n    <span class=\"hljs-attr\">path</span>: path.<span class=\"hljs-title function_\">resolve</span>(__dirname, <span class=\"hljs-string\">&#x27;dist&#x27;</span>),\n    <span class=\"hljs-attr\">filename</span>: <span class=\"hljs-string\">&#x27;bundle.js&#x27;</span>\n  },\n  <span class=\"hljs-attr\">module</span>: {\n    <span class=\"hljs-attr\">rules</span>: [\n      {\n        <span class=\"hljs-attr\">test</span>: <span class=\"hljs-regexp\">/\\.ts$/</span>,\n        <span class=\"hljs-attr\">use</span>: <span class=\"hljs-string\">&#x27;ts-loader&#x27;</span>\n      },\n      {\n        <span class=\"hljs-attr\">test</span>: <span class=\"hljs-regexp\">/\\.js$/</span>,\n        <span class=\"hljs-attr\">use</span>: <span class=\"hljs-string\">&#x27;babel-loader&#x27;</span>\n      }\n    ]\n  }\n};\n</code></pre>\n<h2>方法 4：使用 shell 命令组合</h2>\n<p>在 <code>package.json</code> 中：</p>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;scripts&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">&quot;build&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;tsc &amp;&amp; cp -r src/**/*.js dist/&quot;</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">&quot;build:win&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;tsc &amp;&amp; xcopy /s /e /y src\\\\*.js dist\\\\&quot;</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<h2>最佳实践建议</h2>\n<ol>\n<li><strong>推荐方法2</strong>  （使用复制工具），因为：\n<ul>\n<li>保持 TypeScript 只处理 <code>.ts</code> 文件</li>\n<li>明确区分编译和复制过程</li>\n<li>避免 <code>allowJs</code> 可能带来的意外行为</li>\n</ul>\n</li>\n<li>如果项目中有大量 JS 文件需要处理，考虑逐步迁移到 TS 或使用方法3（构建工具）</li>\n<li>对于小型项目，方法1（<code>allowJs</code>）可能是最简单的解决方案</li>\n<li>确保 <code>.js</code> 文件的类型定义（如果有）也被复制到 <code>dist</code> 目录</li>\n</ol>\n</div>";
      </script></body></html>
