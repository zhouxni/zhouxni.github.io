<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="前端阻止冒泡的几种方式",document.getElementById("article").innerHTML='<div><p>在前端开发中，事件冒泡（Event Bubbling）是指事件从触发元素向上传播到父级、祖先级元素的过程。阻止冒泡可以避免事件被不必要的上级元素处理，常见的阻止方式有以下几种：</p>\n<h3>1. 使用 <code>event.stopPropagation()</code></h3>\n<p>这是标准的 W3C 方法，适用于大多数现代浏览器（Chrome、Firefox、Edge、Safari 等），调用后会阻止事件向上冒泡，但不会阻止元素本身的其他事件处理器执行。</p>\n<pre><code class="language-javascript">element.<span class="hljs-title function_">addEventListener</span>(<span class="hljs-string">&quot;click&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params">event</span>) {\n  event.<span class="hljs-title function_">stopPropagation</span>(); <span class="hljs-comment">// 阻止冒泡</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;当前元素的点击事件&quot;</span>);\n});\n</code></pre>\n<h3>2. 使用 <code>event.cancelBubble = true</code></h3>\n<p>这是 IE 浏览器的私有方法（IE 8 及以下），现代浏览器也兼容此写法。设置为 <code>true</code> 时会阻止事件冒泡，效果与 <code>stopPropagation()</code> 类似。</p>\n<pre><code class="language-javascript">element.<span class="hljs-title function_">addEventListener</span>(<span class="hljs-string">&quot;click&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params">event</span>) {\n  event.<span class="hljs-property">cancelBubble</span> = <span class="hljs-literal">true</span>; <span class="hljs-comment">// IE 兼容写法，现代浏览器也支持</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;当前元素的点击事件&quot;</span>);\n});\n</code></pre>\n<h3>3. 在事件处理函数中返回 <code>false</code>（特定场景）</h3>\n<p>在某些框架（如 jQuery）或原生事件属性（如 <code>onclick</code>）中，返回 <code>false</code> 会同时阻止事件冒泡和默认行为（如 <code>&lt;a&gt;</code> 标签跳转、表单提交）。<strong>注意：原生 JavaScript 中 <code>addEventListener</code> 无法通过返回 <code>false</code> 阻止冒泡，仅适用于 <code>onxxx</code> 形式的事件绑定</strong>   。</p>\n<pre><code class="language-html"><span class="hljs-comment">&lt;!-- 原生 onclik 中返回 false --&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">onclick</span>=<span class="hljs-string">&quot;handleClick(event); return false;&quot;</span>&gt;</span>点击<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">\n  <span class="hljs-keyword">function</span> <span class="hljs-title function_">handleClick</span>(<span class="hljs-params">event</span>) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;按钮点击事件&quot;</span>);\n    <span class="hljs-comment">// 这里无需额外阻止冒泡，return false 已包含阻止冒泡和默认行为</span>\n  }\n</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n\n<span class="hljs-comment">&lt;!-- jQuery 中返回 false --&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://code.jquery.com/jquery-3.6.0.min.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">\n  $(<span class="hljs-string">&quot;button&quot;</span>).<span class="hljs-title function_">click</span>(<span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;jQuery 点击事件&quot;</span>);\n    <span class="hljs-keyword">return</span> <span class="hljs-literal">false</span>; <span class="hljs-comment">// 同时阻止冒泡和默认行为</span>\n  });\n</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n</code></pre>\n<h3>4. 使用 <code>event.stopImmediatePropagation()</code>（阻止同元素其他事件）</h3>\n<p>如果同一元素绑定了多个同类型事件处理器，<code>stopImmediatePropagation()</code> 不仅会阻止事件冒泡，还会阻止当前元素后续的事件处理器执行（而 <code>stopPropagation()</code> 只会阻止冒泡，不影响当前元素的其他处理器）。</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> btn = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">&quot;button&quot;</span>);\n\nbtn.<span class="hljs-title function_">addEventListener</span>(<span class="hljs-string">&quot;click&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params">event</span>) {\n  event.<span class="hljs-title function_">stopImmediatePropagation</span>();\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;第一个点击事件&quot;</span>); <span class="hljs-comment">// 会执行</span>\n});\n\nbtn.<span class="hljs-title function_">addEventListener</span>(<span class="hljs-string">&quot;click&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params">event</span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;第二个点击事件&quot;</span>); <span class="hljs-comment">// 不会执行（被 stopImmediatePropagation 阻止）</span>\n});\n</code></pre>\n<h3>总结</h3>\n<ul>\n<li><strong>推荐使用</strong>   ：<code>event.stopPropagation()</code>（标准、清晰，仅阻止冒泡）。</li>\n<li><strong>IE 兼容</strong>   ：<code>event.cancelBubble = true</code>（可配合特性检测兼容旧浏览器）。</li>\n<li><strong>谨慎使用</strong>   ：<code>return false</code>（仅在特定场景生效，且会同时阻止默认行为）。</li>\n<li><strong>特殊需求</strong>   ：<code>event.stopImmediatePropagation()</code>（需要阻止当前元素后续事件时使用）。</li>\n</ul>\n<p>实际开发中，应根据浏览器兼容性和具体需求选择合适的方式，通常现代项目中优先使用 <code>stopPropagation()</code>。</p>\n</div>'</script></body></html>
