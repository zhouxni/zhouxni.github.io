<script>
    
        document.getElementById('article').innerHTML = 
        "<div><p>在 JavaScript 中，创建对象有多种方式，每种方式都有其特点和适用场景。以下是几种常见的创建对象的方式：</p>\n<h3>1. 对象字面量（Object Literal）</h3>\n<p>这是创建对象最简单的方式，使用花括号 <code>{}</code> 直接定义对象及其属性。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> person = {\n  <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&quot;John&quot;</span>,\n  <span class=\"hljs-attr\">age</span>: <span class=\"hljs-number\">30</span>,\n  <span class=\"hljs-title function_\">greet</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Hello, my name is <span class=\"hljs-subst\">${<span class=\"hljs-variable language_\">this</span>.name}</span>`</span>);\n  },\n};\n</code></pre>\n<h3>2. 构造函数（Constructor Function）</h3>\n<p>使用构造函数创建对象，需要定义一个函数并使用 <code>new</code> 关键字实例化。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Person</span>(<span class=\"hljs-params\">name, age</span>) {\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span> = name;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">age</span> = age;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">greet</span> = <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Hello, my name is <span class=\"hljs-subst\">${<span class=\"hljs-variable language_\">this</span>.name}</span>`</span>);\n  };\n}\n\n<span class=\"hljs-keyword\">const</span> person = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Person</span>(<span class=\"hljs-string\">&quot;John&quot;</span>, <span class=\"hljs-number\">30</span>);\n</code></pre>\n<h3>3. Object.create() 方法</h3>\n<p>通过原型继承创建对象，可以指定一个原型对象。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> personPrototype = {\n  <span class=\"hljs-title function_\">greet</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Hello, my name is <span class=\"hljs-subst\">${<span class=\"hljs-variable language_\">this</span>.name}</span>`</span>);\n  },\n};\n\n<span class=\"hljs-keyword\">const</span> person = <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">create</span>(personPrototype);\nperson.<span class=\"hljs-property\">name</span> = <span class=\"hljs-string\">&quot;John&quot;</span>;\nperson.<span class=\"hljs-property\">age</span> = <span class=\"hljs-number\">30</span>;\n</code></pre>\n<h3>4. 类（Class）</h3>\n<p>ES6 引入的类语法，是构造函数的语法糖，更符合面向对象的写法。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Person</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\">name, age</span>) {\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span> = name;\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">age</span> = age;\n  }\n\n  <span class=\"hljs-title function_\">greet</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Hello, my name is <span class=\"hljs-subst\">${<span class=\"hljs-variable language_\">this</span>.name}</span>`</span>);\n  }\n}\n\n<span class=\"hljs-keyword\">const</span> person = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Person</span>(<span class=\"hljs-string\">&quot;John&quot;</span>, <span class=\"hljs-number\">30</span>);\n</code></pre>\n<h3>5. 工厂函数（Factory Function）</h3>\n<p>返回对象的函数，不需要使用 <code>new</code> 关键字。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createPerson</span>(<span class=\"hljs-params\">name, age</span>) {\n  <span class=\"hljs-keyword\">return</span> {\n    name,\n    age,\n    <span class=\"hljs-title function_\">greet</span>(<span class=\"hljs-params\"></span>) {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Hello, my name is <span class=\"hljs-subst\">${<span class=\"hljs-variable language_\">this</span>.name}</span>`</span>);\n    },\n  };\n}\n\n<span class=\"hljs-keyword\">const</span> person = <span class=\"hljs-title function_\">createPerson</span>(<span class=\"hljs-string\">&quot;John&quot;</span>, <span class=\"hljs-number\">30</span>);\n</code></pre>\n<h3>6. 原型模式（Prototype Pattern）</h3>\n<p>先创建一个对象作为原型，再通过它创建新对象。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> personPrototype = {\n  <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&quot;Default&quot;</span>,\n  <span class=\"hljs-attr\">age</span>: <span class=\"hljs-number\">0</span>,\n  <span class=\"hljs-title function_\">greet</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Hello, my name is <span class=\"hljs-subst\">${<span class=\"hljs-variable language_\">this</span>.name}</span>`</span>);\n  },\n};\n\n<span class=\"hljs-keyword\">const</span> person = <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">create</span>(personPrototype);\nperson.<span class=\"hljs-property\">name</span> = <span class=\"hljs-string\">&quot;John&quot;</span>;\nperson.<span class=\"hljs-property\">age</span> = <span class=\"hljs-number\">30</span>;\n</code></pre>\n<h3>7. 混合模式（组合使用构造函数和原型）</h3>\n<p>结合构造函数和原型模式的优点，将实例属性在构造函数中定义，方法在原型上定义。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Person</span>(<span class=\"hljs-params\">name, age</span>) {\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span> = name;\n  <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">age</span> = age;\n}\n\n<span class=\"hljs-title class_\">Person</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>.<span class=\"hljs-property\">greet</span> = <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Hello, my name is <span class=\"hljs-subst\">${<span class=\"hljs-variable language_\">this</span>.name}</span>`</span>);\n};\n\n<span class=\"hljs-keyword\">const</span> person = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Person</span>(<span class=\"hljs-string\">&quot;John&quot;</span>, <span class=\"hljs-number\">30</span>);\n</code></pre>\n<h3>8. ES6 类与继承</h3>\n<p>使用 <code>extends</code> 关键字实现类的继承。</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Animal</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\">name</span>) {\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">name</span> = name;\n  }\n\n  <span class=\"hljs-title function_\">speak</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`<span class=\"hljs-subst\">${<span class=\"hljs-variable language_\">this</span>.name}</span> makes a noise.`</span>);\n  }\n}\n\n<span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Dog</span> <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-title class_ inherited__\">Animal</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\">name</span>) {\n    <span class=\"hljs-variable language_\">super</span>(name);\n  }\n\n  <span class=\"hljs-title function_\">speak</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`<span class=\"hljs-subst\">${<span class=\"hljs-variable language_\">this</span>.name}</span> barks.`</span>);\n  }\n}\n\n<span class=\"hljs-keyword\">const</span> dog = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Dog</span>(<span class=\"hljs-string\">&quot;Buddy&quot;</span>);\n</code></pre>\n<p>以上是 JavaScript 中创建对象的常见方式，每种方式都有其优缺点和适用场景。选择哪种方式取决于你的具体需求和代码风格。</p>\n</div>";
      </script></body></html>
