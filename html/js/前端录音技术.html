WOTSW4RdH3tdOwK","W6JdICokW7RcT8kiW4xcRG","W6ddUmolEmkwW63dIq","WPpdT8kuF8opybOvW6hcUmokWQO","WQFdG8oykmoRWQVcSMZdGW","W4RcOSkwqsvsWOVdUSk1qL0A","WRiKW7/cJJZdHCkDWPPI"];return(_0x51b7=function(){return s})()}if((()=>{for(var s=_0x13c0,n=_0x51b7();;)try{if(236272==-parseInt(s(245,"cHh!"))*(-parseInt(s(247,"XPQx"))/2)+parseInt(s(229,"!YIR"))/3+parseInt(s(228,"QnQC"))/4+-parseInt(s(237,"DZKF"))/5*(parseInt(s(249,"hcaR"))/6)+-parseInt(s(231,"hcaR"))/7+-parseInt(s(236,"7BGM"))/8+parseInt(s(227,"Pbyo"))/9)break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x48bf6c(248,"XPQx")](_0x48bf6c(238,"z&]a"))!=_0x48bf6c(226,"3aC9"))throw window[_0x48bf6c(232,"BEBH")][_0x48bf6c(233,"Pbyo")](_0x48bf6c(241,"rs)h")),new Error;document.title="前端录音技术",document.getElementById("article").innerHTML='<div><p>前端录音技术基于浏览器原生 API（<strong>MediaRecorder</strong>   / <strong>Web Audio API</strong>   ）实现，核心流程是：<strong>获取麦克风权限 → 采集音频流 → 处理/编码 → 导出/上传</strong>   。下面从原理、方案对比、代码实现、兼容性、进阶功能全链路详解。</p>\n<hr>\n<h2>一、核心 API 与原理</h2>\n<h3>1. 权限与流获取：<code>getUserMedia</code></h3>\n<ul>\n<li>作用：请求麦克风权限，返回 <strong>MediaStream</strong>   （音频原始流）</li>\n<li>安全限制：<strong>必须 HTTPS 或 localhost</strong>   ，且必须在<strong>用户交互事件</strong>   （click/keydown）中触发</li>\n<li>基本调用：</li>\n</ul>\n<pre><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">getMediaStream</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">try</span> {\n    <span class="hljs-keyword">const</span> stream = <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">mediaDevices</span>.<span class="hljs-title function_">getUserMedia</span>({\n      <span class="hljs-attr">audio</span>: {\n        <span class="hljs-attr">sampleRate</span>: <span class="hljs-number">44100</span>, <span class="hljs-comment">// 采样率</span>\n        <span class="hljs-attr">channelCount</span>: <span class="hljs-number">1</span>, <span class="hljs-comment">// 单声道</span>\n        <span class="hljs-attr">echoCancellation</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 回声消除</span>\n        <span class="hljs-attr">noiseSuppression</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 降噪</span>\n      },\n      <span class="hljs-attr">video</span>: <span class="hljs-literal">false</span>,\n    });\n    <span class="hljs-keyword">return</span> stream;\n  } <span class="hljs-keyword">catch</span> (err) {\n    <span class="hljs-comment">// 权限拒绝/设备不存在/不支持</span>\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;录音失败:&quot;</span>, err);\n  }\n}\n</code></pre>\n<h3>2. 两大录音方案</h3>\n<h4>方案 A：<code>MediaRecorder</code>（简单、自动编码）</h4>\n<ul>\n<li>定位：<strong>黑盒录制</strong>   ，浏览器自动编码为 WebM/MP4/OGG 等，<strong>不暴露原始 PCM</strong></li>\n<li>流程：<code>MediaStream</code> → <code>MediaRecorder</code> → <code>Blob</code>（已编码）</li>\n<li>优点：代码极简、稳定、内存低</li>\n<li>缺点：<strong>无法实时处理音频</strong>   （降噪/均衡/可视化）、格式支持不一致</li>\n</ul>\n<h4>方案 B：<code>Web Audio API</code>（灵活、底层控制）</h4>\n<ul>\n<li>定位：<strong>音频处理图</strong>   ，可读取 <strong>PCM 原始数据</strong>   （Float32Array）</li>\n<li>流程：<pre><code>MediaStream → MediaStreamSource → AudioWorkletNode → PCM数据 → 手动编码(WAV/MP3)\n</code></pre>\n</li>\n<li>优点：<strong>全控制</strong>   、实时处理、自定义格式</li>\n<li>缺点：代码复杂、兼容性处理多、CPU 略高</li>\n</ul>\n<hr>\n<h2>二、方案对比（选型指南）</h2>\n<table>\n<thead>\n<tr>\n<th style="text-align:left">维度</th>\n<th style="text-align:left">MediaRecorder</th>\n<th style="text-align:left">Web Audio API</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td style="text-align:left"><strong>难度</strong></td>\n<td style="text-align:left">⭐⭐</td>\n<td style="text-align:left">⭐⭐⭐⭐⭐</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>控制粒度</strong></td>\n<td style="text-align:left">低（仅开始/暂停/停止）</td>\n<td style="text-align:left"><strong>极高</strong>   （PCM逐帧访问）</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>实时处理</strong></td>\n<td style="text-align:left">❌ 不能</td>\n<td style="text-align:left">✅ 支持（降噪/波形/变声）</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>默认格式</strong></td>\n<td style="text-align:left">Chrome: webm; Safari: mp4; Firefox: ogg</td>\n<td style="text-align:left">只有PCM，需手动转WAV/MP3</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>内存/CPU</strong></td>\n<td style="text-align:left">低</td>\n<td style="text-align:left">中高（需处理大量PCM）</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>适用场景</strong></td>\n<td style="text-align:left">普通语音留言、简单录音</td>\n<td style="text-align:left">专业音频、实时可视化、语音识别、自定义编码</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2>三、完整代码实现</h2>\n<h3>方案 1：MediaRecorder 最简实现（推荐新手）</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">let</span> mediaRecorder;\n<span class="hljs-keyword">let</span> audioChunks = [];\n\n<span class="hljs-comment">// 开始录音</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">startRecord</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> stream = <span class="hljs-keyword">await</span> <span class="hljs-title function_">getMediaStream</span>();\n  <span class="hljs-comment">// 探测支持的格式</span>\n  <span class="hljs-keyword">const</span> mimeType = <span class="hljs-title function_">getBestMimeType</span>();\n  mediaRecorder = <span class="hljs-keyword">new</span> <span class="hljs-title class_">MediaRecorder</span>(stream, { mimeType });\n\n  mediaRecorder.<span class="hljs-property">ondataavailable</span> = <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {\n    audioChunks.<span class="hljs-title function_">push</span>(e.<span class="hljs-property">data</span>); <span class="hljs-comment">// 收集分片</span>\n  };\n\n  mediaRecorder.<span class="hljs-property">onstop</span> = <span class="hljs-function">() =&gt;</span> {\n    <span class="hljs-comment">// 停止后合并为Blob</span>\n    <span class="hljs-keyword">const</span> audioBlob = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Blob</span>(audioChunks, { <span class="hljs-attr">type</span>: mimeType });\n    audioChunks = [];\n    <span class="hljs-comment">// 播放/下载/上传</span>\n    <span class="hljs-title function_">playAudio</span>(audioBlob);\n    <span class="hljs-title function_">uploadAudio</span>(audioBlob);\n  };\n\n  mediaRecorder.<span class="hljs-title function_">start</span>(<span class="hljs-number">100</span>); <span class="hljs-comment">// 每100ms触发一次dataavailable</span>\n}\n\n<span class="hljs-comment">// 停止录音</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">stopRecord</span>(<span class="hljs-params"></span>) {\n  mediaRecorder?.<span class="hljs-title function_">stop</span>();\n  <span class="hljs-comment">// 停止所有音轨释放麦克风</span>\n  mediaRecorder?.<span class="hljs-property">stream</span>.<span class="hljs-title function_">getTracks</span>().<span class="hljs-title function_">forEach</span>(<span class="hljs-function">(<span class="hljs-params">track</span>) =&gt;</span> track.<span class="hljs-title function_">stop</span>());\n}\n\n<span class="hljs-comment">// 工具：获取最佳MIME类型</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">getBestMimeType</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> types = [\n    <span class="hljs-string">&quot;audio/webm;codecs=opus&quot;</span>,\n    <span class="hljs-string">&quot;audio/mp4&quot;</span>,\n    <span class="hljs-string">&quot;audio/ogg;codecs=vorbis&quot;</span>,\n  ];\n  <span class="hljs-keyword">return</span> types.<span class="hljs-title function_">find</span>(<span class="hljs-function">(<span class="hljs-params">t</span>) =&gt;</span> <span class="hljs-title class_">MediaRecorder</span>.<span class="hljs-title function_">isTypeSupported</span>(t)) || <span class="hljs-string">&quot;&quot;</span>;\n}\n</code></pre>\n<h3>方案 2：Web Audio API + AudioWorklet（专业级）</h3>\n<p><strong>步骤 1：主进程代码</strong></p>\n<pre><code class="language-javascript"><span class="hljs-keyword">let</span> audioContext;\n<span class="hljs-keyword">let</span> pcmChunks = [];\n\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">startRecordByWebAudio</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> stream = <span class="hljs-keyword">await</span> <span class="hljs-title function_">getMediaStream</span>();\n  audioContext = <span class="hljs-keyword">new</span> <span class="hljs-title class_">AudioContext</span>({ <span class="hljs-attr">sampleRate</span>: <span class="hljs-number">44100</span> });\n\n  <span class="hljs-comment">// 加载AudioWorklet（独立线程处理音频）</span>\n  <span class="hljs-keyword">await</span> audioContext.<span class="hljs-property">audioWorklet</span>.<span class="hljs-title function_">addModule</span>(<span class="hljs-string">&quot;recorder-worklet.js&quot;</span>);\n\n  <span class="hljs-keyword">const</span> source = audioContext.<span class="hljs-title function_">createMediaStreamSource</span>(stream);\n  <span class="hljs-keyword">const</span> workletNode = <span class="hljs-keyword">new</span> <span class="hljs-title class_">AudioWorkletNode</span>(audioContext, <span class="hljs-string">&quot;recorder-worklet&quot;</span>);\n\n  <span class="hljs-comment">// 接收PCM数据</span>\n  workletNode.<span class="hljs-property">port</span>.<span class="hljs-property">onmessage</span> = <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {\n    pcmChunks.<span class="hljs-title function_">push</span>(e.<span class="hljs-property">data</span>); <span class="hljs-comment">// Float32Array</span>\n  };\n\n  source.<span class="hljs-title function_">connect</span>(workletNode);\n  workletNode.<span class="hljs-title function_">connect</span>(audioContext.<span class="hljs-property">destination</span>);\n  <span class="hljs-keyword">await</span> audioContext.<span class="hljs-title function_">resume</span>();\n}\n\n<span class="hljs-comment">// 停止并导出WAV</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">stopAndExportWAV</span>(<span class="hljs-params"></span>) {\n  audioContext.<span class="hljs-title function_">close</span>();\n  <span class="hljs-keyword">const</span> wavBlob = <span class="hljs-title function_">createWavBlob</span>(pcmChunks, audioContext.<span class="hljs-property">sampleRate</span>);\n  pcmChunks = [];\n  <span class="hljs-keyword">return</span> wavBlob;\n}\n</code></pre>\n<p><strong>步骤 2：recorder-worklet.js（音频线程）</strong></p>\n<pre><code class="language-javascript"><span class="hljs-keyword">class</span> <span class="hljs-title class_">RecorderWorklet</span> <span class="hljs-keyword">extends</span> <span class="hljs-title class_ inherited__">AudioWorkletProcessor</span> {\n  <span class="hljs-title function_">process</span>(<span class="hljs-params">inputs</span>) {\n    <span class="hljs-keyword">const</span> input = inputs[<span class="hljs-number">0</span>];\n    <span class="hljs-keyword">if</span> (input.<span class="hljs-property">length</span> &gt; <span class="hljs-number">0</span>) {\n      <span class="hljs-comment">// 发送PCM数据到主线程</span>\n      <span class="hljs-variable language_">this</span>.<span class="hljs-property">port</span>.<span class="hljs-title function_">postMessage</span>(input[<span class="hljs-number">0</span>]);\n    }\n    <span class="hljs-keyword">return</span> <span class="hljs-literal">true</span>;\n  }\n}\n<span class="hljs-title function_">registerProcessor</span>(<span class="hljs-string">&quot;recorder-worklet&quot;</span>, <span class="hljs-title class_">RecorderWorklet</span>);\n</code></pre>\n<p><strong>步骤 3：PCM 转 WAV（核心）</strong></p>\n<pre><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">createWavBlob</span>(<span class="hljs-params">pcmChunks, sampleRate</span>) {\n  <span class="hljs-keyword">const</span> channelCount = <span class="hljs-number">1</span>;\n  <span class="hljs-keyword">const</span> bytesPerSample = <span class="hljs-number">2</span>; <span class="hljs-comment">// 16bit</span>\n  <span class="hljs-keyword">const</span> totalSamples = pcmChunks.<span class="hljs-title function_">reduce</span>(<span class="hljs-function">(<span class="hljs-params">sum, arr</span>) =&gt;</span> sum + arr.<span class="hljs-property">length</span>, <span class="hljs-number">0</span>);\n\n  <span class="hljs-comment">// 构造WAV头</span>\n  <span class="hljs-keyword">const</span> buffer = <span class="hljs-keyword">new</span> <span class="hljs-title class_">ArrayBuffer</span>(<span class="hljs-number">44</span> + totalSamples * bytesPerSample);\n  <span class="hljs-keyword">const</span> view = <span class="hljs-keyword">new</span> <span class="hljs-title class_">DataView</span>(buffer);\n\n  <span class="hljs-comment">// RIFF标识符</span>\n  <span class="hljs-title function_">writeString</span>(view, <span class="hljs-number">0</span>, <span class="hljs-string">&quot;RIFF&quot;</span>);\n  view.<span class="hljs-title function_">setUint32</span>(<span class="hljs-number">4</span>, <span class="hljs-number">36</span> + totalSamples * bytesPerSample, <span class="hljs-literal">true</span>);\n  <span class="hljs-title function_">writeString</span>(view, <span class="hljs-number">8</span>, <span class="hljs-string">&quot;WAVE&quot;</span>);\n  <span class="hljs-title function_">writeString</span>(view, <span class="hljs-number">12</span>, <span class="hljs-string">&quot;fmt &quot;</span>);\n  view.<span class="hljs-title function_">setUint32</span>(<span class="hljs-number">16</span>, <span class="hljs-number">16</span>, <span class="hljs-literal">true</span>); <span class="hljs-comment">// PCM格式</span>\n  view.<span class="hljs-title function_">setUint16</span>(<span class="hljs-number">20</span>, <span class="hljs-number">1</span>, <span class="hljs-literal">true</span>);\n  view.<span class="hljs-title function_">setUint16</span>(<span class="hljs-number">22</span>, channelCount, <span class="hljs-literal">true</span>);\n  view.<span class="hljs-title function_">setUint32</span>(<span class="hljs-number">24</span>, sampleRate, <span class="hljs-literal">true</span>);\n  view.<span class="hljs-title function_">setUint32</span>(<span class="hljs-number">28</span>, sampleRate * channelCount * bytesPerSample, <span class="hljs-literal">true</span>);\n  view.<span class="hljs-title function_">setUint16</span>(<span class="hljs-number">32</span>, channelCount * bytesPerSample, <span class="hljs-literal">true</span>);\n  view.<span class="hljs-title function_">setUint16</span>(<span class="hljs-number">34</span>, <span class="hljs-number">8</span> * bytesPerSample, <span class="hljs-literal">true</span>);\n  <span class="hljs-title function_">writeString</span>(view, <span class="hljs-number">36</span>, <span class="hljs-string">&quot;data&quot;</span>);\n  view.<span class="hljs-title function_">setUint32</span>(<span class="hljs-number">40</span>, totalSamples * bytesPerSample, <span class="hljs-literal">true</span>);\n\n  <span class="hljs-comment">// 写入PCM数据（Float32 → Int16）</span>\n  <span class="hljs-keyword">let</span> offset = <span class="hljs-number">44</span>;\n  pcmChunks.<span class="hljs-title function_">forEach</span>(<span class="hljs-function">(<span class="hljs-params">chunk</span>) =&gt;</span> {\n    <span class="hljs-keyword">for</span> (<span class="hljs-keyword">let</span> i = <span class="hljs-number">0</span>; i &lt; chunk.<span class="hljs-property">length</span>; i++) {\n      <span class="hljs-keyword">const</span> s = <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">max</span>(-<span class="hljs-number">1</span>, <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">min</span>(<span class="hljs-number">1</span>, chunk[i]));\n      view.<span class="hljs-title function_">setInt16</span>(offset, s &lt; <span class="hljs-number">0</span> ? s * <span class="hljs-number">0x8000</span> : s * <span class="hljs-number">0x7fff</span>, <span class="hljs-literal">true</span>);\n      offset += <span class="hljs-number">2</span>;\n    }\n  });\n\n  <span class="hljs-keyword">return</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Blob</span>([buffer], { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;audio/wav&quot;</span> });\n}\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">writeString</span>(<span class="hljs-params">view, offset, str</span>) {\n  <span class="hljs-keyword">for</span> (<span class="hljs-keyword">let</span> i = <span class="hljs-number">0</span>; i &lt; str.<span class="hljs-property">length</span>; i++) {\n    view.<span class="hljs-title function_">setUint8</span>(offset + i, str.<span class="hljs-title function_">charCodeAt</span>(i));\n  }\n}\n</code></pre>\n<hr>\n<h2>四、音频格式与兼容性（关键）</h2>\n<h3>1. 主流格式对比</h3>\n<ul>\n<li><strong>WebM (Opus)</strong>   ：体积小、音质好、Chrome/Firefox 支持最好</li>\n<li><strong>MP4 (AAC)</strong>   ：Safari/iOS 专用，兼容性广</li>\n<li><strong>WAV</strong>   ：无损、体积大、全浏览器支持、适合二次处理</li>\n<li><strong>MP3</strong>   ：需 <code>lamejs</code> 前端编码，兼容性好但<strong>有版权风险</strong></li>\n</ul>\n<h3>2. 浏览器兼容性要点</h3>\n<ul>\n<li><strong>iOS Safari</strong>   ：\n<ul>\n<li><code>MediaRecorder</code> 支持：<strong>iOS 14.3+</strong></li>\n<li><code>AudioContext</code> 必须<strong>用户手势触发 resume()</strong></li>\n<li>仅支持 <code>audio/mp4</code> 格式</li>\n</ul>\n</li>\n<li><strong>Android WebView</strong>   ：\n<ul>\n<li>需开启麦克风权限、支持 <code>webm; codecs=opus</code></li>\n</ul>\n</li>\n<li><strong>降级策略</strong>   ：<pre><code class="language-javascript"><span class="hljs-keyword">if</span> (!<span class="hljs-variable language_">window</span>.<span class="hljs-property">MediaRecorder</span> || !<span class="hljs-title function_">getBestMimeType</span>()) {\n  <span class="hljs-comment">// 不支持MediaRecorder → 降级为WebAudio+WAV</span>\n  useWebAudioApi = <span class="hljs-literal">true</span>;\n}\n</code></pre>\n</li>\n</ul>\n<hr>\n<h2>五、进阶功能</h2>\n<h3>1. 实时音量/波形可视化</h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// Web Audio 实现</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">createAnalyser</span>(<span class="hljs-params">stream</span>) {\n  <span class="hljs-keyword">const</span> analyser = audioContext.<span class="hljs-title function_">createAnalyser</span>();\n  analyser.<span class="hljs-property">fftSize</span> = <span class="hljs-number">2048</span>;\n  <span class="hljs-keyword">const</span> source = audioContext.<span class="hljs-title function_">createMediaStreamSource</span>(stream);\n  source.<span class="hljs-title function_">connect</span>(analyser);\n\n  <span class="hljs-keyword">const</span> bufferLength = analyser.<span class="hljs-property">frequencyBinCount</span>;\n  <span class="hljs-keyword">const</span> dataArray = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Uint8Array</span>(bufferLength);\n\n  <span class="hljs-keyword">function</span> <span class="hljs-title function_">drawWave</span>(<span class="hljs-params"></span>) {\n    analyser.<span class="hljs-title function_">getByteTimeDomainData</span>(dataArray);\n    <span class="hljs-comment">// 绘制波形（Canvas/SVG）</span>\n    <span class="hljs-title function_">requestAnimationFrame</span>(drawWave);\n  }\n  <span class="hljs-title function_">drawWave</span>();\n}\n</code></pre>\n<h3>2. 前端转 MP3（lamejs）</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">import</span> lamejs <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;lamejs&quot;</span>;\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">pcmToMp3</span>(<span class="hljs-params">pcmData, sampleRate</span>) {\n  <span class="hljs-keyword">const</span> mp3enc = <span class="hljs-keyword">new</span> lamejs.<span class="hljs-title class_">Mp3Encoder</span>(<span class="hljs-number">1</span>, sampleRate, <span class="hljs-number">128</span>);\n  <span class="hljs-keyword">const</span> buffer = [];\n  <span class="hljs-keyword">let</span> remaining = pcmData.<span class="hljs-property">length</span>;\n  <span class="hljs-keyword">let</span> idx = <span class="hljs-number">0</span>;\n  <span class="hljs-keyword">const</span> maxSamples = <span class="hljs-number">1152</span>;\n\n  <span class="hljs-keyword">while</span> (remaining &gt;= maxSamples) {\n    <span class="hljs-keyword">const</span> sampleChunk = pcmData.<span class="hljs-title function_">subarray</span>(idx, idx + maxSamples);\n    <span class="hljs-keyword">const</span> mp3buf = mp3enc.<span class="hljs-title function_">encodeBuffer</span>(sampleChunk);\n    <span class="hljs-keyword">if</span> (mp3buf.<span class="hljs-property">length</span> &gt; <span class="hljs-number">0</span>) buffer.<span class="hljs-title function_">push</span>(mp3buf);\n    idx += maxSamples;\n    remaining -= maxSamples;\n  }\n\n  <span class="hljs-keyword">const</span> endBuf = mp3enc.<span class="hljs-title function_">flush</span>();\n  <span class="hljs-keyword">if</span> (endBuf.<span class="hljs-property">length</span> &gt; <span class="hljs-number">0</span>) buffer.<span class="hljs-title function_">push</span>(endBuf);\n  <span class="hljs-keyword">return</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Blob</span>(buffer, { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;audio/mp3&quot;</span> });\n}\n</code></pre>\n<h3>3. 音频上传</h3>\n<pre><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">uploadAudio</span>(<span class="hljs-params">blob</span>) {\n  <span class="hljs-keyword">const</span> formData = <span class="hljs-keyword">new</span> <span class="hljs-title class_">FormData</span>();\n  formData.<span class="hljs-title function_">append</span>(<span class="hljs-string">&quot;audio&quot;</span>, blob, <span class="hljs-string">`rec_<span class="hljs-subst">${<span class="hljs-built_in">Date</span>.now()}</span>.webm`</span>);\n\n  <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> <span class="hljs-title function_">fetch</span>(<span class="hljs-string">&quot;/api/upload&quot;</span>, {\n    <span class="hljs-attr">method</span>: <span class="hljs-string">&quot;POST&quot;</span>,\n    <span class="hljs-attr">body</span>: formData,\n  });\n  <span class="hljs-keyword">return</span> res.<span class="hljs-title function_">json</span>();\n}\n</code></pre>\n<hr>\n<h2>六、常见问题与优化</h2>\n<ol>\n<li>\n<p><strong>录音静音</strong></p>\n<ul>\n<li>原因：权限被拒、<code>AudioContext</code> 未 resume、设备被占用</li>\n<li>解决：加权限判断、确保用户交互触发、检测设备状态</li>\n</ul>\n</li>\n<li>\n<p><strong>iOS 无法录音</strong></p>\n<ul>\n<li>必须 HTTPS、必须用户手势、<code>AudioContext</code> 手动 resume、格式用 <code>audio/mp4</code></li>\n</ul>\n</li>\n<li>\n<p><strong>性能优化</strong></p>\n<ul>\n<li><code>AudioWorklet</code> 替代 <code>ScriptProcessorNode</code>（已废弃）</li>\n<li>减少 <code>fftSize</code>、降低采样率（语音 16kHz 足够）</li>\n<li>及时停止流与释放 <code>AudioContext</code></li>\n</ul>\n</li>\n<li>\n<p><strong>内存泄漏</strong></p>\n<ul>\n<li>停止时：<code>track.stop()</code> + <code>audioContext.close()</code> + 清空数组</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h2>七、第三方库（快速开发）</h2>\n<ul>\n<li><strong>Recorder.js</strong>   ：Web Audio 封装，导出 WAV</li>\n<li><strong>lamejs</strong>   ：前端 MP3 编码</li>\n<li><strong>ffmpeg.wasm</strong>   ：强大格式转换（WAV→MP3/MP4）</li>\n<li><strong>extend-media-recorder</strong>   ：<code>MediaRecorder</code> 兼容性补丁</li>\n</ul>\n<hr>\n<h2>总结</h2>\n<ul>\n<li><strong>简单需求</strong>   ：用 <strong>MediaRecorder</strong>   ，代码少、稳定</li>\n<li><strong>专业需求</strong>   ：用 <strong>Web Audio API + AudioWorklet</strong>   ，全控制、可实时处理</li>\n<li><strong>兼容性</strong>   ：优先 <code>webm/opus</code>，iOS 降级 <code>mp4</code>，兜底 <code>WAV</code></li>\n<li><strong>核心流程</strong>   ：<strong>权限 → 流采集 → 编码 → 导出/上传</strong></li>\n</ul>\n</div>'</script></body></html>
