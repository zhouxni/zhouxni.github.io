jQuery 依赖）</td>\n</tr>\n<tr>\n<td><strong>支持复杂动画</strong></td>\n<td>支持颜色、transform（translate/rotate/scale）、scroll、SVG、百分比等</td>\n</tr>\n<tr>\n<td><strong>动画队列 &amp; 并发控制</strong></td>\n<td>支持 <code>queue</code>, <code>delay</code>, <code>loop</code>, <code>easing</code> 等高级控制</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2>🚀 基础用法</h2>\n<h3>1. 安装</h3>\n<pre><code class="language-bash"><span class="hljs-comment"># npm</span>\nnpm install velocity-animate\n\n<span class="hljs-comment"># CDN</span>\n&lt;script src=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/npm/velocity-animate@2.0.6/velocity.min.js&quot;</span>&gt;&lt;/script&gt;\n</code></pre>\n<h3>2. 简单动画示例</h3>\n<pre><code class="language-js"><span class="hljs-comment">// 独立使用（无需 jQuery）</span>\n<span class="hljs-title class_">Velocity</span>(\n  <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">getElementById</span>(<span class="hljs-string">&quot;box&quot;</span>),\n  {\n    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0.5</span>,\n    <span class="hljs-attr">translateX</span>: <span class="hljs-string">&quot;100px&quot;</span>,\n    <span class="hljs-attr">rotateZ</span>: <span class="hljs-string">&quot;45deg&quot;</span>,\n  },\n  {\n    <span class="hljs-attr">duration</span>: <span class="hljs-number">1000</span>,\n    <span class="hljs-attr">easing</span>: <span class="hljs-string">&quot;ease-in-out&quot;</span>,\n  },\n);\n</code></pre>\n<blockquote>\n<p>如果页面有 jQuery，也可以这样写（兼容模式）：</p>\n<pre><code class="language-js">$(<span class="hljs-string">&quot;#box&quot;</span>).<span class="hljs-title function_">velocity</span>({ <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span> }, <span class="hljs-number">500</span>);\n</code></pre>\n</blockquote>\n<hr>\n<h2>🎛️ 动画属性支持</h2>\n<p>Velocity 支持几乎所有可动画的 CSS 属性，包括：</p>\n<ul>\n<li><strong>位置/尺寸</strong>   ：<code>left</code>, <code>top</code>, <code>width</code>, <code>height</code></li>\n<li><strong>Transform</strong>   ：<code>translateX</code>, <code>translateY</code>, <code>rotate</code>, <code>scale</code>, <code>skew</code></li>\n<li><strong>颜色</strong>   ：<code>color</code>, <code>backgroundColor</code>, <code>borderColor</code>（自动解析并插值）</li>\n<li><strong>透明度</strong>   ：<code>opacity</code></li>\n<li><strong>滚动</strong>   ：<code>scrollTop</code>, <code>scrollLeft</code></li>\n<li><strong>SVG 属性</strong>   ：<code>fill</code>, <code>stroke</code>, <code>r</code>, <code>cx</code>, <code>cy</code> 等</li>\n</ul>\n<blockquote>\n<p>💡 注意：使用 <code>transform</code> 相关属性时，<strong>直接写 <code>translateX</code> 而不是 <code>transform: translateX(...)</code></strong>   ，Velocity 会自动合并 transform。</p>\n</blockquote>\n<hr>\n<h2>⚙️ 配置选项（Options）</h2>\n<pre><code class="language-js"><span class="hljs-title class_">Velocity</span>(element, properties, {\n  <span class="hljs-attr">duration</span>: <span class="hljs-number">1000</span>, <span class="hljs-comment">// 毫秒</span>\n  <span class="hljs-attr">easing</span>: <span class="hljs-string">&quot;easeInOutCubic&quot;</span>, <span class="hljs-comment">// 缓动函数（内置多种）</span>\n  <span class="hljs-attr">delay</span>: <span class="hljs-number">200</span>, <span class="hljs-comment">// 延迟（ms）</span>\n  <span class="hljs-attr">loop</span>: <span class="hljs-number">2</span>, <span class="hljs-comment">// 循环次数（或 true 表示无限）</span>\n  <span class="hljs-attr">queue</span>: <span class="hljs-literal">false</span>, <span class="hljs-comment">// 是否加入动画队列（默认 true）</span>\n  <span class="hljs-attr">begin</span>: <span class="hljs-function">() =&gt;</span> {}, <span class="hljs-comment">// 动画开始回调</span>\n  <span class="hljs-attr">complete</span>: <span class="hljs-function">() =&gt;</span> {}, <span class="hljs-comment">// 动画结束回调</span>\n  <span class="hljs-attr">progress</span>: <span class="hljs-function">(<span class="hljs-params">elements, percentComplete, timeRemaining, tweenValue</span>) =&gt;</span> {},\n});\n</code></pre>\n<h3>内置缓动函数（Easing）</h3>\n<ul>\n<li><code>&quot;linear&quot;</code></li>\n<li><code>&quot;easeInSine&quot;</code>, <code>&quot;easeOutQuad&quot;</code>, <code>&quot;easeInOutCubic&quot;</code> 等（共 30+ 种）</li>\n<li>也支持自定义贝塞尔曲线：<code>[0.25, 0.1, 0.25, 1.0]</code></li>\n</ul>\n<hr>\n<h2>🔁 高级功能</h2>\n<h3>1. 动画队列（Queue）</h3>\n<p>默认情况下，对同一元素的多次 <code>Velocity</code> 调用会排队执行：</p>\n<pre><code class="language-js"><span class="hljs-title class_">Velocity</span>(el, { <span class="hljs-attr">x</span>: <span class="hljs-number">100</span> });\n<span class="hljs-title class_">Velocity</span>(el, { <span class="hljs-attr">y</span>: <span class="hljs-number">100</span> }); <span class="hljs-comment">// 等第一个动画结束后才执行</span>\n</code></pre>\n<p>设置 <code>queue: false</code> 可立即中断并开始新动画。</p>\n<h3>2. 动画反转（Reverse）</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> anim = <span class="hljs-title class_">Velocity</span>(el, { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">x</span>: <span class="hljs-number">200</span> }, { <span class="hljs-attr">duration</span>: <span class="hljs-number">1000</span> });\n<span class="hljs-comment">// 之后可以反转</span>\n<span class="hljs-title class_">Velocity</span>.<span class="hljs-title class_">Reverse</span>(anim);\n</code></pre>\n<h3>3. 批量动画（Promise 支持）</h3>\n<pre><code class="language-js"><span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">all</span>([<span class="hljs-title class_">Velocity</span>(el1, { <span class="hljs-attr">x</span>: <span class="hljs-number">100</span> }), <span class="hljs-title class_">Velocity</span>(el2, { <span class="hljs-attr">y</span>: <span class="hljs-number">100</span> })]).<span class="hljs-title function_">then</span>(<span class="hljs-function">() =&gt;</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;All done!&quot;</span>),\n);\n</code></pre>\n<h3>4. UI Pack（额外效果）</h3>\n<p>通过引入 <code>velocity.ui.js</code>，可使用预设效果：</p>\n<pre><code class="language-js"><span class="hljs-comment">// 弹跳进入</span>\n<span class="hljs-title class_">Velocity</span>(el, <span class="hljs-string">&quot;transition.bounceUpIn&quot;</span>, { <span class="hljs-attr">stagger</span>: <span class="hljs-number">200</span> });\n\n<span class="hljs-comment">// 淡出缩放</span>\n<span class="hljs-title class_">Velocity</span>(el, <span class="hljs-string">&quot;callout.shake&quot;</span>);\n</code></pre>\n<blockquote>\n<p>常见效果：<code>fadeIn</code>, <code>fadeOut</code>, <code>slideUpIn</code>, <code>perspectiveLeftIn</code>, <code>bounce</code>, <code>shake</code> 等。</p>\n</blockquote>\n<hr>\n<h2>⚠️ 注意事项</h2>\n<ul>\n<li><strong>不适用于 Canvas/WebGL</strong>   ：仅限 DOM/SVG。</li>\n<li><strong>transform 合并</strong>   ：多次设置 transform 属性会被合并，不会覆盖。</li>\n<li><strong>性能优于 jQuery.animate()</strong>   ：但略逊于 GSAP（尤其在复杂时间轴场景）。</li>\n<li><strong>React/Vue 中使用需谨慎</strong>   ：建议结合 <code>useRef</code> 或 <code>$nextTick</code> 获取真实 DOM。</li>\n</ul>\n<hr>\n<h2>🆚 与其他库对比</h2>\n<table>\n<thead>\n<tr>\n<th>库</th>\n<th>优点</th>\n<th>缺点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Velocity.js</strong></td>\n<td>轻量、语法简单、高性能</td>\n<td>功能不如 GSAP 强大，社区活跃度下降</td>\n</tr>\n<tr>\n<td><strong>GSAP</strong></td>\n<td>功能最全、时间轴、专业级</td>\n<td>体积较大（~40KB），学习曲线稍陡</td>\n</tr>\n<tr>\n<td><strong>Anime.js</strong></td>\n<td>轻量、API 优雅、支持 JS 对象</td>\n<td>不支持 IE11 以下</td>\n</tr>\n<tr>\n<td><strong>Framer Motion</strong></td>\n<td>React 专属、声明式、手势支持</td>\n<td>仅限 React 生态</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2>✅ 适用场景</h2>\n<ul>\n<li>需要高性能但不想引入重型库（如 GSAP）</li>\n<li>项目已用 jQuery，想升级动画性能</li>\n<li>实现交互动效：按钮反馈、页面过渡、列表入场等</li>\n<li>老项目维护（Velocity 在 2014–2018 年非常流行）</li>\n</ul>\n<hr>\n<h2>🔗 学习资源</h2>\n<ul>\n<li>官方文档：<a href="http://velocityjs.org/#documentation" target="_blank">http://velocityjs.org/#documentation</a></li>\n<li>GitHub 示例：<a href="https://github.com/velocity/velocity/tree/master/demos" target="_blank">https://github.com/velocity/velocity/tree/master/demos</a></li>\n<li>CodePen 搜索 “Velocity.js” 查看实战 demo</li>\n</ul>\n<hr>\n<p>如果你有具体动画需求（比如“如何实现卡片翻转”或“列表逐个滑入”），我可以提供完整的 Velocity.js 代码示例！</p>\n</div>'</script></body></html>
