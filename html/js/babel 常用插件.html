<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="babel 常用插件",document.getElementById("article").innerHTML='<div><p>Babel 的插件（Plugins）主要用于 <strong>语法转换</strong>   （将新语法转为旧语法）和 <strong>代码优化</strong>   。以下是一些常用的 Babel 插件，按功能分类：</p>\n<hr>\n<h3><strong>1. 语法转换插件（ES6+ → ES5）</strong></h3>\n<p>这些插件用于将现代 JavaScript 语法转换为兼容旧浏览器的代码：</p>\n<table>\n<thead>\n<tr>\n<th>插件名称</th>\n<th>功能</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>@babel/plugin-transform-arrow-functions</code></td>\n<td>转换箭头函数 <code>() =&gt; {}</code> → <code>function() {}</code></td>\n</tr>\n<tr>\n<td><code>@babel/plugin-transform-template-literals</code></td>\n<td>转换模板字符串 <code>`Hello ${name}`</code> → <code>&quot;Hello &quot; + name</code></td>\n</tr>\n<tr>\n<td><code>@babel/plugin-transform-destructuring</code></td>\n<td>转换解构赋值 <code>const { a } = obj</code> → <code>const a = obj.a</code></td>\n</tr>\n<tr>\n<td><code>@babel/plugin-transform-spread</code></td>\n<td>转换展开运算符 <code>[...arr]</code> → <code>arr.concat()</code></td>\n</tr>\n<tr>\n<td><code>@babel/plugin-transform-classes</code></td>\n<td>转换 <code>class</code> 语法 → ES5 构造函数</td>\n</tr>\n<tr>\n<td><code>@babel/plugin-transform-modules-commonjs</code></td>\n<td>将 ES6 <code>import/export</code> → CommonJS <code>require/module.exports</code></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>2. React 相关插件</strong></h3>\n<table>\n<thead>\n<tr>\n<th>插件名称</th>\n<th>功能</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>@babel/plugin-transform-react-jsx</code></td>\n<td>转换 JSX → <code>React.createElement()</code></td>\n</tr>\n<tr>\n<td><code>@babel/plugin-syntax-jsx</code></td>\n<td>允许解析 JSX（不转换，仅支持语法）</td>\n</tr>\n<tr>\n<td><code>@babel/plugin-transform-react-display-name</code></td>\n<td>自动添加 React 组件的 <code>displayName</code></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>3. 实验性语法支持</strong></h3>\n<p>Babel 允许使用尚未正式进入 JavaScript 标准的语法：</p>\n<table>\n<thead>\n<tr>\n<th>插件名称</th>\n<th>功能</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>@babel/plugin-proposal-decorators</code></td>\n<td>支持装饰器语法 <code>@decorator</code></td>\n</tr>\n<tr>\n<td><code>@babel/plugin-proposal-class-properties</code></td>\n<td>支持类属性 <code>class A { prop = 1 }</code></td>\n</tr>\n<tr>\n<td><code>@babel/plugin-proposal-nullish-coalescing-operator</code></td>\n<td>支持 <code>??</code> 运算符</td>\n</tr>\n<tr>\n<td><code>@babel/plugin-proposal-optional-chaining</code></td>\n<td>支持 <code>?.</code> 可选链</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>4. 代码优化 &amp; 工具类插件</strong></h3>\n<table>\n<thead>\n<tr>\n<th>插件名称</th>\n<th>功能</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>@babel/plugin-transform-runtime</code></td>\n<td>复用 Babel 的 helper 代码，减少打包体积</td>\n</tr>\n<tr>\n<td><code>babel-plugin-lodash</code></td>\n<td>按需引入 Lodash 函数（优化体积）</td>\n</tr>\n<tr>\n<td><code>babel-plugin-import</code></td>\n<td>按需引入组件库（如 Ant Design）</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>5. 其他实用插件</strong></h3>\n<table>\n<thead>\n<tr>\n<th>插件名称</th>\n<th>功能</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>babel-plugin-styled-components</code></td>\n<td>优化 <code>styled-components</code> 的 SSR 和调试</td>\n</tr>\n<tr>\n<td><code>babel-plugin-module-resolver</code></td>\n<td>自定义模块路径别名（类似 Webpack 的 <code>resolve.alias</code>）</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>如何配置插件？</strong></h3>\n<p>在 <code>babel.config.js</code> 或 <code>.babelrc</code> 中：</p>\n<pre><code class="language-javascript"><span class="hljs-variable language_">module</span>.<span class="hljs-property">exports</span> = {\n  <span class="hljs-attr">plugins</span>: [\n    <span class="hljs-string">&quot;@babel/plugin-transform-arrow-functions&quot;</span>, <span class="hljs-comment">// 转换箭头函数</span>\n    <span class="hljs-string">&quot;@babel/plugin-proposal-class-properties&quot;</span>, <span class="hljs-comment">// 支持类属性</span>\n  ],\n  <span class="hljs-attr">presets</span>: [<span class="hljs-string">&quot;@babel/preset-env&quot;</span>], <span class="hljs-comment">// 预设（包含一组插件）</span>\n};\n</code></pre>\n<hr>\n<h3><strong>插件 vs. 预设（Preset）</strong></h3>\n<ul>\n<li><strong>插件（Plugin）</strong>   ：单个功能（如转换箭头函数）。</li>\n<li><strong>预设（Preset）</strong>   ：一组插件的集合（如 <code>@babel/preset-env</code> 包含所有 ES6+ 转换插件）。</li>\n</ul>\n<p><strong>推荐</strong>   ：优先使用预设（如 <code>@babel/preset-env</code>），再按需添加插件。</p>\n<hr>\n<h3><strong>总结</strong></h3>\n<ul>\n<li><strong>语法转换</strong>   ：<code>@babel/plugin-transform-*</code></li>\n<li><strong>React</strong>   ：<code>@babel/plugin-transform-react-*</code></li>\n<li><strong>实验性语法</strong>   ：<code>@babel/plugin-proposal-*</code></li>\n<li><strong>优化</strong>   ：<code>@babel/plugin-transform-runtime</code></li>\n</ul>\n<p>新项目建议直接使用 <code>@babel/preset-env</code> + <code>@babel/preset-react</code>，再按需扩展插件。</p>\n</div>'</script></body></html>
