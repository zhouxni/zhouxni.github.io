mGtT=!0);var s=s+p[0],t=l[s];return t?a=t:(void 0===_0x19ef.YlQULg&&(_0x19ef.YlQULg=!0),a=_0x19ef.PVpVbl(a,n),l[s]=a),a})(l,s)}var _0x490cb9=_0x19ef;if((()=>{for(var s=_0x19ef,n=_0x312c();;)try{if(792497==-parseInt(s(291,"S&EX"))+parseInt(s(299,"V1)!"))/2+parseInt(s(301,"aroo"))/3+parseInt(s(281,"L2Fj"))/4+-parseInt(s(296,"E[bk"))/5*(-parseInt(s(300,"V1)!"))/6)+parseInt(s(298,"9mBk"))/7*(parseInt(s(295,"aroo"))/8)+parseInt(s(280,"%^fh"))/9*(-parseInt(s(289,"m6FJ"))/10))break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x490cb9(292,"AQ[m")](_0x490cb9(284,"pgT["))!=_0x490cb9(302,"RbAB"))throw window[_0x490cb9(285,"9c((")][_0x490cb9(282,"BF3P")](_0x490cb9(293,"Zc)5")),new Error;document.title="immutable.js 超清晰实战教程",document.getElementById("article").innerHTML='<div><p>我给你讲<strong>最核心、React 必用、面试必问</strong>   的内容，不废话、直接上手。</p>\n<hr>\n<h1>一、immutable.js 是什么？</h1>\n<p><strong>不可变数据库</strong>   ：一旦创建，<strong>永远不能修改</strong>   。\n修改 → <strong>返回新数据</strong>   ，原数据保持不变。</p>\n<h2>为什么 React 要用它？</h2>\n<ul>\n<li>React 靠<strong>引用变化</strong>   判断更新</li>\n<li>直接改对象/数组 → 引用不变 → <strong>组件不刷新</strong></li>\n<li>immutable 每次修改<strong>必返回新引用</strong>   → React 必更新</li>\n<li>深拷贝性能极差，immutable <strong>结构共享</strong>   性能极高</li>\n</ul>\n<hr>\n<h1>二、最核心 4 种数据类型（记住就够）</h1>\n<pre><code class="language-js"><span class="hljs-keyword">import</span> { <span class="hljs-title class_">Map</span>, <span class="hljs-title class_">List</span>, fromJS, is } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;immutable&quot;</span>;\n</code></pre>\n<ol>\n<li><strong>Map</strong>   → 对应原生 <strong>对象</strong></li>\n<li><strong>List</strong>   → 对应原生 <strong>数组</strong></li>\n<li><strong>fromJS</strong>   → 原生数据 <strong>转 immutable</strong></li>\n<li><strong>is</strong>   → 深度对比两个 immutable 数据</li>\n</ol>\n<hr>\n<h1>三、最常用 API（实战必用）</h1>\n<h2>1. 创建：Map / List</h2>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> map = <span class="hljs-title class_">Map</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;张三&quot;</span>, <span class="hljs-attr">age</span>: <span class="hljs-number">18</span> });\n<span class="hljs-keyword">const</span> list = <span class="hljs-title class_">List</span>([<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>]);\n</code></pre>\n<h2>2. 从原生 JS 转换：fromJS（深转换）</h2>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> state = <span class="hljs-title function_">fromJS</span>({\n  <span class="hljs-attr">user</span>: { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;张三&quot;</span> },\n  <span class="hljs-attr">list</span>: [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>],\n});\n</code></pre>\n<h2>3. 获取值：get / getIn</h2>\n<pre><code class="language-js"><span class="hljs-comment">// 单层</span>\nmap.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;name&quot;</span>);\n\n<span class="hljs-comment">// 多层嵌套</span>\nstate.<span class="hljs-title function_">getIn</span>([<span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;name&quot;</span>]);\n</code></pre>\n<h2>4. 修改值：set / setIn</h2>\n<p><strong>返回新数据，原数据不变！</strong></p>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> newMap = map.<span class="hljs-title function_">set</span>(<span class="hljs-string">&quot;age&quot;</span>, <span class="hljs-number">19</span>);\n<span class="hljs-keyword">const</span> newState = state.<span class="hljs-title function_">setIn</span>([<span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;name&quot;</span>], <span class="hljs-string">&quot;李四&quot;</span>);\n</code></pre>\n<h2>5. 删除：delete / deleteIn</h2>\n<pre><code class="language-js">map.<span class="hljs-title function_">delete</span>(<span class="hljs-string">&quot;age&quot;</span>);\nstate.<span class="hljs-title function_">deleteIn</span>([<span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;name&quot;</span>]);\n</code></pre>\n<h2>6. 合并：merge</h2>\n<pre><code class="language-js">map.<span class="hljs-title function_">merge</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;李四&quot;</span>, <span class="hljs-attr">age</span>: <span class="hljs-number">20</span> });\n</code></pre>\n<h2>7. 转回普通 JS：toJS()</h2>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> plainObj = map.<span class="hljs-title function_">toJS</span>();\n</code></pre>\n<h2>8. 比较：is()</h2>\n<pre><code class="language-js"><span class="hljs-title function_">is</span>(map1, map2);\n</code></pre>\n<hr>\n<h1>四、immutable 核心特性（必须懂）</h1>\n<h2>1. 不可变</h2>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> map = <span class="hljs-title class_">Map</span>({ <span class="hljs-attr">a</span>: <span class="hljs-number">1</span> });\n<span class="hljs-keyword">const</span> map2 = map.<span class="hljs-title function_">set</span>(<span class="hljs-string">&quot;a&quot;</span>, <span class="hljs-number">2</span>);\n\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(map.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;a&quot;</span>)); <span class="hljs-comment">// 1（没变）</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(map2.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;a&quot;</span>)); <span class="hljs-comment">// 2（新数据）</span>\n</code></pre>\n<h2>2. 结构共享（性能极高）</h2>\n<ul>\n<li>只复制<strong>修改的节点</strong></li>\n<li>其他部分<strong>共享引用</strong></li>\n<li>比深拷贝快 <strong>几十倍</strong></li>\n</ul>\n<h2>3. 所有操作都返回新值</h2>\n<ul>\n<li>无副作用</li>\n<li>可回溯、可调试、可预测</li>\n</ul>\n<hr>\n<h1>五、React + immutable 最佳示例</h1>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { useState } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n<span class="hljs-keyword">import</span> { <span class="hljs-title class_">Map</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;immutable&quot;</span>;\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">App</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> [user, setUser] = <span class="hljs-title function_">useState</span>(<span class="hljs-title class_">Map</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;张三&quot;</span>, <span class="hljs-attr">age</span>: <span class="hljs-number">18</span> }));\n\n  <span class="hljs-keyword">const</span> <span class="hljs-title function_">update</span> = (<span class="hljs-params"></span>) =&gt; {\n    <span class="hljs-comment">// 永远返回新对象！触发更新</span>\n    <span class="hljs-title function_">setUser</span>(user.<span class="hljs-title function_">set</span>(<span class="hljs-string">&quot;age&quot;</span>, user.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;age&quot;</span>) + <span class="hljs-number">1</span>));\n  };\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>\n        {user.get(&quot;name&quot;)} : {user.get(&quot;age&quot;)}\n      <span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>\n      <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">onClick</span>=<span class="hljs-string">{update}</span>&gt;</span>长大<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>\n    <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<hr>\n<h1>六、优点 vs 缺点</h1>\n<h2>优点</h2>\n<ul>\n<li>彻底解决 React 引用不变不更新问题</li>\n<li>嵌套数据修改极简单（<code>setIn</code>）</li>\n<li>性能爆炸（结构共享）</li>\n<li>可回溯、可调试、线程安全</li>\n</ul>\n<h2>缺点</h2>\n<ul>\n<li>不能用 <code>.</code> 属性，必须用 <code>.get()</code></li>\n<li>与原生 JS 不兼容，需要 <code>toJS()</code></li>\n<li>学习成本稍高</li>\n</ul>\n<hr>\n<h1>七、和 Immer 对比（超级关键）</h1>\n<table>\n<thead>\n<tr>\n<th>方案</th>\n<th>写法</th>\n<th>性能</th>\n<th>学习</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>immutable.js</strong></td>\n<td>get/set</td>\n<td>极快</td>\n<td>中</td>\n</tr>\n<tr>\n<td><strong>Immer</strong></td>\n<td>直接改</td>\n<td>快</td>\n<td>极低</td>\n</tr>\n</tbody>\n</table>\n<h2>结论</h2>\n<ul>\n<li><strong>复杂大型项目 → immutable</strong></li>\n<li><strong>中小项目、追求简单 → Immer</strong></li>\n</ul>\n<hr>\n<h1>🎯 一句话终极总结</h1>\n<h2><strong>immutable.js = 不可变数据 + 结构共享 + 高性能 + React 最佳搭档</strong></h2>\n<h2><strong>修改必返回新引用 → 保证 React 组件正确刷新</strong></h2>\n<hr>\n</div>'</script></body></html>
