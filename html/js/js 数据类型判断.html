<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="js 数据类型判断",document.getElementById("article").innerHTML='<div><p>在 JavaScript 中，判断数据类型是一个常见的需求，但由于 JS 的动态类型特性，需要灵活的方法来准确判断类型。以下是 <strong>7 种常用的数据类型判断方法</strong>   ，涵盖基本类型和引用类型：</p>\n<hr>\n<h2><strong>1. <code>typeof</code> 操作符</strong></h2>\n<p><strong>适用场景</strong>   ：判断基本数据类型（<code>string</code>、<code>number</code>、<code>boolean</code>、<code>undefined</code>、<code>symbol</code>、<code>bigint</code>）。<br>\n<strong>局限性</strong>   ：无法区分对象的具体类型（如 <code>Array</code>、<code>Date</code> 等会被误判为 <code>&quot;object&quot;</code>），且 <code>null</code> 会被错误识别为 <code>&quot;object&quot;</code>。</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">typeof</span> <span class="hljs-string">&quot;hello&quot;</span>; <span class="hljs-comment">// &quot;string&quot;</span>\n<span class="hljs-keyword">typeof</span> <span class="hljs-number">42</span>; <span class="hljs-comment">// &quot;number&quot;</span>\n<span class="hljs-keyword">typeof</span> <span class="hljs-literal">true</span>; <span class="hljs-comment">// &quot;boolean&quot;</span>\n<span class="hljs-keyword">typeof</span> <span class="hljs-literal">undefined</span>; <span class="hljs-comment">// &quot;undefined&quot;</span>\n<span class="hljs-keyword">typeof</span> <span class="hljs-title class_">Symbol</span>(); <span class="hljs-comment">// &quot;symbol&quot;</span>\n<span class="hljs-keyword">typeof</span> <span class="hljs-number">10n</span>; <span class="hljs-comment">// &quot;bigint&quot;</span>\n<span class="hljs-keyword">typeof</span> {}; <span class="hljs-comment">// &quot;object&quot;</span>\n<span class="hljs-keyword">typeof</span> []; <span class="hljs-comment">// &quot;object&quot; （无法区分数组）</span>\n<span class="hljs-keyword">typeof</span> <span class="hljs-literal">null</span>; <span class="hljs-comment">// &quot;object&quot; （历史遗留问题）</span>\n<span class="hljs-keyword">typeof</span> <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {}; <span class="hljs-comment">// &quot;function&quot;</span>\n</code></pre>\n<hr>\n<h2><strong>2. <code>instanceof</code> 操作符</strong></h2>\n<p><strong>适用场景</strong>   ：判断对象是否属于某个构造函数的原型链（用于引用类型，如 <code>Array</code>、<code>Date</code> 等）。<br>\n<strong>局限性</strong>   ：无法跨框架（iframe）判断，且不适用于基本类型。</p>\n<pre><code class="language-javascript">[] <span class="hljs-keyword">instanceof</span> <span class="hljs-title class_">Array</span>; <span class="hljs-comment">// true</span>\n<span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>() <span class="hljs-keyword">instanceof</span> <span class="hljs-title class_">Date</span>; <span class="hljs-comment">// true</span>\n<span class="hljs-string">&quot;hello&quot;</span> <span class="hljs-keyword">instanceof</span> <span class="hljs-title class_">String</span>; <span class="hljs-comment">// false （基本类型不适用）</span>\n<span class="hljs-keyword">new</span> <span class="hljs-title class_">String</span>(<span class="hljs-string">&quot;hello&quot;</span>) <span class="hljs-keyword">instanceof</span> <span class="hljs-title class_">String</span>; <span class="hljs-comment">// true （包装对象适用）</span>\n</code></pre>\n<hr>\n<h2><strong>3. <code>Object.prototype.toString.call()</code></strong></h2>\n<p><strong>适用场景</strong>   ：<strong>最准确的类型判断方法</strong>   ，可区分所有内置类型（包括 <code>Array</code>、<code>Date</code>、<code>RegExp</code> 等）。<br>\n<strong>原理</strong>   ：调用对象的 <code>toString</code> 方法，返回 <code>[object Type]</code> 格式的字符串。</p>\n<pre><code class="language-javascript"><span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>(<span class="hljs-string">&quot;hello&quot;</span>); <span class="hljs-comment">// &quot;[object String]&quot;</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>(<span class="hljs-number">42</span>); <span class="hljs-comment">// &quot;[object Number]&quot;</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>(<span class="hljs-literal">true</span>); <span class="hljs-comment">// &quot;[object Boolean]&quot;</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>(<span class="hljs-literal">undefined</span>); <span class="hljs-comment">// &quot;[object Undefined]&quot;</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>(<span class="hljs-literal">null</span>); <span class="hljs-comment">// &quot;[object Null]&quot;</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>([]); <span class="hljs-comment">// &quot;[object Array]&quot;</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>({}); <span class="hljs-comment">// &quot;[object Object]&quot;</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>(<span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>()); <span class="hljs-comment">// &quot;[object Date]&quot;</span>\n<span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>(<span class="hljs-regexp">/regex/</span>); <span class="hljs-comment">// &quot;[object RegExp]&quot;</span>\n</code></pre>\n<p><strong>封装成通用函数</strong>   ：</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">getType</span>(<span class="hljs-params">obj</span>) {\n  <span class="hljs-keyword">return</span> <span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>(obj).<span class="hljs-title function_">slice</span>(<span class="hljs-number">8</span>, -<span class="hljs-number">1</span>).<span class="hljs-title function_">toLowerCase</span>();\n}\n<span class="hljs-title function_">getType</span>([]); <span class="hljs-comment">// &quot;array&quot;</span>\n<span class="hljs-title function_">getType</span>(<span class="hljs-literal">null</span>); <span class="hljs-comment">// &quot;null&quot;</span>\n<span class="hljs-title function_">getType</span>(<span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>()); <span class="hljs-comment">// &quot;date&quot;</span>\n</code></pre>\n<hr>\n<h2><strong>4. <code>Array.isArray()</code></strong></h2>\n<p><strong>适用场景</strong>   ：专门判断是否为数组（比 <code>instanceof</code> 更可靠，可跨框架使用）。</p>\n<pre><code class="language-javascript"><span class="hljs-title class_">Array</span>.<span class="hljs-title function_">isArray</span>([]); <span class="hljs-comment">// true</span>\n<span class="hljs-title class_">Array</span>.<span class="hljs-title function_">isArray</span>({}); <span class="hljs-comment">// false</span>\n<span class="hljs-title class_">Array</span>.<span class="hljs-title function_">isArray</span>(<span class="hljs-string">&quot;hello&quot;</span>); <span class="hljs-comment">// false</span>\n</code></pre>\n<hr>\n<h2><strong>5. <code>constructor</code> 属性</strong></h2>\n<p><strong>适用场景</strong>   ：通过对象的 <code>constructor</code> 属性判断类型（注意：可能被修改，且不适用于 <code>null</code> 和 <code>undefined</code>）。</p>\n<pre><code class="language-javascript"><span class="hljs-string">&quot;hello&quot;</span>.<span class="hljs-property">constructor</span> === <span class="hljs-title class_">String</span>; <span class="hljs-comment">// true</span>\n[<span class="hljs-number">1</span>, <span class="hljs-number">2</span>].<span class="hljs-property">constructor</span> === <span class="hljs-title class_">Array</span>; <span class="hljs-comment">// true</span>\n<span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>().<span class="hljs-property">constructor</span> === <span class="hljs-title class_">Date</span>; <span class="hljs-comment">// true</span>\n<span class="hljs-literal">null</span>.<span class="hljs-property">constructor</span>; <span class="hljs-comment">// 报错（null 无 constructor）</span>\n<span class="hljs-literal">undefined</span>.<span class="hljs-property">constructor</span>; <span class="hljs-comment">// 报错</span>\n</code></pre>\n<p><strong>局限性</strong>   ：</p>\n<ul>\n<li>如果对象的 <code>constructor</code> 被手动修改，判断会失效。</li>\n<li>不适用于基本类型（需先包装成对象）。</li>\n</ul>\n<hr>\n<h2><strong>6. <code>===</code> 直接比较（仅限 <code>null</code> 和 <code>undefined</code>）</strong></h2>\n<p><strong>适用场景</strong>   ：判断 <code>null</code> 或 <code>undefined</code>（因为它们没有包装对象）。</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> value = <span class="hljs-literal">null</span>;\nvalue === <span class="hljs-literal">null</span>; <span class="hljs-comment">// true</span>\nvalue === <span class="hljs-literal">undefined</span>; <span class="hljs-comment">// true</span>\n</code></pre>\n<hr>\n<h2><strong>7. 自定义类型判断（如 <code>Symbol.toStringTag</code>）</strong></h2>\n<p><strong>适用场景</strong>   ：判断自定义类的实例类型（通过 <code>Symbol.toStringTag</code> 定义）。</p>\n<pre><code class="language-javascript"><span class="hljs-keyword">class</span> <span class="hljs-title class_">Person</span> {}\n<span class="hljs-title class_">Person</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>[<span class="hljs-title class_">Symbol</span>.<span class="hljs-property">toStringTag</span>] = <span class="hljs-string">&quot;Person&quot;</span>;\n\n<span class="hljs-keyword">const</span> p = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Person</span>();\n<span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>(p); <span class="hljs-comment">// &quot;[object Person]&quot;</span>\n</code></pre>\n<hr>\n<h2><strong>总结表格</strong></h2>\n<table>\n<thead>\n<tr>\n<th>方法</th>\n<th>适用场景</th>\n<th>局限性</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>typeof</code></td>\n<td>基本类型（除 <code>null</code>）</td>\n<td>无法区分对象具体类型</td>\n</tr>\n<tr>\n<td><code>instanceof</code></td>\n<td>引用类型（如 <code>Array</code>）</td>\n<td>无法跨框架，不适用于基本类型</td>\n</tr>\n<tr>\n<td><code>Object.prototype.toString.call()</code></td>\n<td><strong>所有类型（最准确）</strong></td>\n<td>需封装函数简化</td>\n</tr>\n<tr>\n<td><code>Array.isArray()</code></td>\n<td>仅数组</td>\n<td>仅限数组</td>\n</tr>\n<tr>\n<td><code>constructor</code></td>\n<td>对象类型</td>\n<td>可被修改，不适用于 <code>null/undefined</code></td>\n</tr>\n<tr>\n<td><code>===</code></td>\n<td><code>null</code> 和 <code>undefined</code></td>\n<td>仅限这两个值</td>\n</tr>\n<tr>\n<td><code>Symbol.toStringTag</code></td>\n<td>自定义类型</td>\n<td>需主动定义</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2><strong>推荐实践</strong></h2>\n<ol>\n<li><strong>基本类型</strong>   ：用 <code>typeof</code> + <code>=== null</code> 判断。</li>\n<li><strong>引用类型</strong>   ：优先用 <code>Object.prototype.toString.call()</code>。</li>\n<li><strong>数组</strong>   ：直接用 <code>Array.isArray()</code>。</li>\n<li><strong>自定义类</strong>   ：结合 <code>instanceof</code> 和 <code>Symbol.toStringTag</code>。</li>\n</ol>\n<p><strong>示例：万能类型判断函数</strong></p>\n<pre><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">getType</span>(<span class="hljs-params">value</span>) {\n  <span class="hljs-keyword">if</span> (value === <span class="hljs-literal">null</span>) <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;null&quot;</span>;\n  <span class="hljs-keyword">if</span> (value === <span class="hljs-literal">undefined</span>) <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;undefined&quot;</span>;\n  <span class="hljs-keyword">return</span> <span class="hljs-title class_">Object</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">toString</span>.<span class="hljs-title function_">call</span>(value).<span class="hljs-title function_">slice</span>(<span class="hljs-number">8</span>, -<span class="hljs-number">1</span>).<span class="hljs-title function_">toLowerCase</span>();\n}\n\n<span class="hljs-title function_">getType</span>([]); <span class="hljs-comment">// &quot;array&quot;</span>\n<span class="hljs-title function_">getType</span>(<span class="hljs-literal">null</span>); <span class="hljs-comment">// &quot;null&quot;</span>\n<span class="hljs-title function_">getType</span>(<span class="hljs-keyword">new</span> <span class="hljs-title class_">Map</span>()); <span class="hljs-comment">// &quot;map&quot;</span>\n</code></pre>\n</div>'</script></body></html>
