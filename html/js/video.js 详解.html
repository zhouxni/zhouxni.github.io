  ：重构版本，模块化、Tree-shaking、体积更小（38kB）、性能更优，放弃 IE 支持。</li>\n</ul>\n<hr>\n<h2>二、安装与基础使用</h2>\n<h3>1. 安装方式</h3>\n<h4>CDN 引入（快速使用）</h4>\n<pre><code class="language-html"><span class="hljs-comment">&lt;!-- CSS --&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;https://vjs.zencdn.net/8.23.4/video-js.css&quot;</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;stylesheet&quot;</span> /&gt;</span>\n<span class="hljs-comment">&lt;!-- JS --&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://vjs.zencdn.net/8.23.4/video.min.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n</code></pre>\n<h4>npm 安装（模块化项目）</h4>\n<pre><code class="language-bash"><span class="hljs-comment"># 安装核心库</span>\nnpm install video.js\n<span class="hljs-comment"># 安装 HLS 流媒体插件（可选）</span>\nnpm install @videojs/http-streaming\n</code></pre>\n<h3>2. 基础初始化</h3>\n<h4>方式1：HTML 自动初始化（<code>data-setup</code>）</h4>\n<pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">video</span>\n  <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;my-video&quot;</span>\n  <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;video-js vjs-big-play-centered&quot;</span>\n  <span class="hljs-attr">controls</span>\n  <span class="hljs-attr">preload</span>=<span class="hljs-string">&quot;auto&quot;</span>\n  <span class="hljs-attr">width</span>=<span class="hljs-string">&quot;640&quot;</span>\n  <span class="hljs-attr">height</span>=<span class="hljs-string">&quot;360&quot;</span>\n  <span class="hljs-attr">poster</span>=<span class="hljs-string">&quot;https://example.com/poster.jpg&quot;</span>\n  <span class="hljs-attr">data-setup</span>=<span class="hljs-string">&#x27;{&quot;autoplay&quot;: false, &quot;loop&quot;: false}&#x27;</span>\n&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">source</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://example.com/video.mp4&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;video/mp4&quot;</span> /&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">p</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;vjs-no-js&quot;</span>&gt;</span>请开启 JavaScript 以播放视频<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>\n<span class="hljs-tag">&lt;/<span class="hljs-name">video</span>&gt;</span>\n</code></pre>\n<h4>方式2：JS 手动初始化（推荐，灵活控制）</h4>\n<pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">video</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;my-video&quot;</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;video-js&quot;</span> <span class="hljs-attr">controls</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">video</span>&gt;</span>\n\n<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">\n  <span class="hljs-keyword">import</span> videojs <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;video.js&quot;</span>;\n  <span class="hljs-keyword">import</span> <span class="hljs-string">&quot;video.js/dist/video-js.css&quot;</span>;\n  <span class="hljs-comment">// 初始化</span>\n  <span class="hljs-keyword">const</span> player = <span class="hljs-title function_">videojs</span>(<span class="hljs-string">&quot;my-video&quot;</span>, {\n    <span class="hljs-attr">width</span>: <span class="hljs-number">640</span>,\n    <span class="hljs-attr">height</span>: <span class="hljs-number">360</span>,\n    <span class="hljs-attr">poster</span>: <span class="hljs-string">&quot;https://example.com/poster.jpg&quot;</span>,\n    <span class="hljs-attr">autoplay</span>: <span class="hljs-literal">false</span>, <span class="hljs-comment">// 自动播放（需用户交互触发）</span>\n    <span class="hljs-attr">loop</span>: <span class="hljs-literal">false</span>,\n    <span class="hljs-attr">muted</span>: <span class="hljs-literal">false</span>,\n    <span class="hljs-attr">preload</span>: <span class="hljs-string">&quot;auto&quot;</span>, <span class="hljs-comment">// auto/metadata/none</span>\n    <span class="hljs-attr">controls</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 显示控件</span>\n    <span class="hljs-attr">bigPlayButton</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 显示大播放按钮</span>\n    <span class="hljs-attr">controlBar</span>: {\n      <span class="hljs-comment">// 控制面板配置</span>\n      <span class="hljs-attr">volumePanel</span>: { <span class="hljs-attr">inline</span>: <span class="hljs-literal">false</span> }, <span class="hljs-comment">// 音量面板是否内嵌</span>\n      <span class="hljs-attr">fullscreenToggle</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 全屏按钮</span>\n      <span class="hljs-attr">playbackRateMenuButton</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 倍速按钮</span>\n    },\n  });\n</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n</code></pre>\n<hr>\n<h2>三、核心配置项（v8.x）</h2>\n<h3>1. 基础配置</h3>\n<table>\n<thead>\n<tr>\n<th style="text-align:left">配置项</th>\n<th style="text-align:left">类型</th>\n<th style="text-align:left">默认值</th>\n<th style="text-align:left">说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td style="text-align:left"><code>width</code></td>\n<td style="text-align:left">数字/字符串</td>\n<td style="text-align:left"><code>auto</code></td>\n<td style="text-align:left">播放器宽度（px/百分比）</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>height</code></td>\n<td style="text-align:left">数字/字符串</td>\n<td style="text-align:left"><code>auto</code></td>\n<td style="text-align:left">播放器高度（px/百分比）</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>poster</code></td>\n<td style="text-align:left">字符串</td>\n<td style="text-align:left"><code>\'\'</code></td>\n<td style="text-align:left">封面图 URL</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>autoplay</code></td>\n<td style="text-align:left">布尔/字符串</td>\n<td style="text-align:left"><code>false</code></td>\n<td style="text-align:left">自动播放（<code>true</code>/<code>\'muted\'</code>）</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>loop</code></td>\n<td style="text-align:left">布尔</td>\n<td style="text-align:left"><code>false</code></td>\n<td style="text-align:left">循环播放</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>muted</code></td>\n<td style="text-align:left">布尔</td>\n<td style="text-align:left"><code>false</code></td>\n<td style="text-align:left">默认静音</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>preload</code></td>\n<td style="text-align:left">字符串</td>\n<td style="text-align:left"><code>\'auto\'</code></td>\n<td style="text-align:left">预加载策略</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>controls</code></td>\n<td style="text-align:left">布尔</td>\n<td style="text-align:left"><code>true</code></td>\n<td style="text-align:left">是否显示控件</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>language</code></td>\n<td style="text-align:left">字符串</td>\n<td style="text-align:left"><code>\'en\'</code></td>\n<td style="text-align:left">语言（支持中文 <code>\'zh-CN\'</code>）</td>\n</tr>\n</tbody>\n</table>\n<h3>2. 控件配置（<code>controlBar</code>）</h3>\n<pre><code class="language-javascript"><span class="hljs-attr">controlBar</span>: {\n  <span class="hljs-attr">playToggle</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 播放/暂停按钮</span>\n  <span class="hljs-attr">progressControl</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 进度条</span>\n  <span class="hljs-attr">volumePanel</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 音量面板</span>\n  <span class="hljs-attr">currentTimeDisplay</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 当前时间</span>\n  <span class="hljs-attr">timeDivider</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 时间分隔符</span>\n  <span class="hljs-attr">durationDisplay</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 总时长</span>\n  <span class="hljs-attr">playbackRateMenuButton</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 倍速</span>\n  <span class="hljs-attr">fullscreenToggle</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 全屏</span>\n  <span class="hljs-attr">captionsButton</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 字幕按钮</span>\n}\n</code></pre>\n<hr>\n<h2>四、核心 API 与事件</h2>\n<h3>1. 实例方法（播放控制）</h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// 播放/暂停</span>\nplayer.<span class="hljs-title function_">play</span>();\nplayer.<span class="hljs-title function_">pause</span>();\n<span class="hljs-comment">// 设置/获取当前时间（秒）</span>\nplayer.<span class="hljs-title function_">currentTime</span>(<span class="hljs-number">120</span>); <span class="hljs-comment">// 跳转到 120 秒</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(player.<span class="hljs-title function_">currentTime</span>());\n<span class="hljs-comment">// 设置/获取音量（0-1）</span>\nplayer.<span class="hljs-title function_">volume</span>(<span class="hljs-number">0.5</span>);\n<span class="hljs-comment">// 静音/取消静音</span>\nplayer.<span class="hljs-title function_">muted</span>(<span class="hljs-literal">true</span>);\n<span class="hljs-comment">// 全屏控制</span>\nplayer.<span class="hljs-title function_">requestFullscreen</span>();\nplayer.<span class="hljs-title function_">exitFullscreen</span>();\n<span class="hljs-comment">// 销毁播放器</span>\nplayer.<span class="hljs-title function_">dispose</span>();\n<span class="hljs-comment">// 加载视频源</span>\nplayer.<span class="hljs-title function_">src</span>({ <span class="hljs-attr">src</span>: <span class="hljs-string">&quot;https://example.com/video.mp4&quot;</span>, <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;video/mp4&quot;</span> });\n</code></pre>\n<h3>2. 常用事件（监听播放状态）</h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// 播放</span>\nplayer.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;play&quot;</span>, <span class="hljs-function">() =&gt;</span> <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;开始播放&quot;</span>));\n<span class="hljs-comment">// 暂停</span>\nplayer.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;pause&quot;</span>, <span class="hljs-function">() =&gt;</span> <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;暂停播放&quot;</span>));\n<span class="hljs-comment">// 播放结束</span>\nplayer.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;ended&quot;</span>, <span class="hljs-function">() =&gt;</span> <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;播放结束&quot;</span>));\n<span class="hljs-comment">// 时间更新（每秒触发）</span>\nplayer.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;timeupdate&quot;</span>, <span class="hljs-function">() =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;当前时间：&quot;</span>, player.<span class="hljs-title function_">currentTime</span>());\n});\n<span class="hljs-comment">// 缓冲中</span>\nplayer.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;waiting&quot;</span>, <span class="hljs-function">() =&gt;</span> <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;缓冲中...&quot;</span>));\n<span class="hljs-comment">// 缓冲完成</span>\nplayer.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;canplay&quot;</span>, <span class="hljs-function">() =&gt;</span> <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;缓冲完成，可播放&quot;</span>));\n<span class="hljs-comment">// 错误</span>\nplayer.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;error&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;播放错误：&quot;</span>, e));\n</code></pre>\n<hr>\n<h2>五、高级功能</h2>\n<h3>1. 流媒体播放（HLS/DASH）</h3>\n<p>video.js 需配合 <code>@videojs/http-streaming</code> 插件支持 HLS/DASH：</p>\n<pre><code class="language-bash">npm install @videojs/http-streaming\n</code></pre>\n<pre><code class="language-javascript"><span class="hljs-keyword">import</span> videojs <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;video.js&quot;</span>;\n<span class="hljs-keyword">import</span> <span class="hljs-string">&quot;video.js/dist/video-js.css&quot;</span>;\n<span class="hljs-keyword">import</span> <span class="hljs-string">&quot;@videojs/http-streaming&quot;</span>; <span class="hljs-comment">// 注册 HLS 插件</span>\n\n<span class="hljs-keyword">const</span> player = <span class="hljs-title function_">videojs</span>(<span class="hljs-string">&quot;my-video&quot;</span>, {\n  <span class="hljs-attr">sources</span>: [\n    {\n      <span class="hljs-attr">src</span>: <span class="hljs-string">&quot;https://example.com/stream.m3u8&quot;</span>,\n      <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;application/x-mpegURL&quot;</span>, <span class="hljs-comment">// HLS 类型</span>\n    },\n  ],\n});\n</code></pre>\n<h3>2. 字幕支持（WebVTT）</h3>\n<pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">video</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;my-video&quot;</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;video-js&quot;</span> <span class="hljs-attr">controls</span>&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">source</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;video.mp4&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;video/mp4&quot;</span> /&gt;</span>\n  <span class="hljs-comment">&lt;!-- 中文字幕 --&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">track</span> <span class="hljs-attr">kind</span>=<span class="hljs-string">&quot;subtitles&quot;</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;subs-zh.vtt&quot;</span> <span class="hljs-attr">srclang</span>=<span class="hljs-string">&quot;zh&quot;</span> <span class="hljs-attr">label</span>=<span class="hljs-string">&quot;中文&quot;</span> <span class="hljs-attr">default</span> /&gt;</span>\n  <span class="hljs-comment">&lt;!-- 英文字幕 --&gt;</span>\n  <span class="hljs-tag">&lt;<span class="hljs-name">track</span> <span class="hljs-attr">kind</span>=<span class="hljs-string">&quot;subtitles&quot;</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;subs-en.vtt&quot;</span> <span class="hljs-attr">srclang</span>=<span class="hljs-string">&quot;en&quot;</span> <span class="hljs-attr">label</span>=<span class="hljs-string">&quot;English&quot;</span> /&gt;</span>\n<span class="hljs-tag">&lt;/<span class="hljs-name">video</span>&gt;</span>\n</code></pre>\n<h3>3. 自定义皮肤（CSS）</h3>\n<p>覆盖默认样式，快速定制外观：</p>\n<pre><code class="language-css"><span class="hljs-comment">/* 播放器背景 */</span>\n<span class="hljs-selector-class">.video-js</span> {\n  <span class="hljs-attribute">background</span>: <span class="hljs-number">#000</span>;\n  <span class="hljs-attribute">border-radius</span>: <span class="hljs-number">8px</span>;\n  <span class="hljs-attribute">overflow</span>: hidden;\n}\n<span class="hljs-comment">/* 控制面板背景 */</span>\n<span class="hljs-selector-class">.vjs-control-bar</span> {\n  <span class="hljs-attribute">background</span>: <span class="hljs-built_in">rgba</span>(<span class="hljs-number">0</span>, <span class="hljs-number">0</span>, <span class="hljs-number">0</span>, <span class="hljs-number">0.7</span>);\n}\n<span class="hljs-comment">/* 进度条颜色 */</span>\n<span class="hljs-selector-class">.vjs-play-progress</span> {\n  <span class="hljs-attribute">background</span>: <span class="hljs-number">#ff4d4f</span>;\n}\n<span class="hljs-comment">/* 音量条颜色 */</span>\n<span class="hljs-selector-class">.vjs-volume-level</span> {\n  <span class="hljs-attribute">background</span>: <span class="hljs-number">#fff</span>;\n}\n</code></pre>\n<h3>4. 插件开发（自定义功能）</h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// 注册自定义插件</span>\nvideojs.<span class="hljs-title function_">registerPlugin</span>(<span class="hljs-string">&quot;myPlugin&quot;</span>, <span class="hljs-keyword">function</span> (<span class="hljs-params">options</span>) {\n  <span class="hljs-keyword">const</span> player = <span class="hljs-variable language_">this</span>;\n  <span class="hljs-comment">// 插件逻辑：播放时打印日志</span>\n  player.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;play&quot;</span>, <span class="hljs-function">() =&gt;</span> {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;插件触发：视频开始播放&quot;</span>, options);\n  });\n});\n\n<span class="hljs-comment">// 使用插件</span>\n<span class="hljs-keyword">const</span> player = <span class="hljs-title function_">videojs</span>(<span class="hljs-string">&quot;my-video&quot;</span>);\nplayer.<span class="hljs-title function_">myPlugin</span>({ <span class="hljs-attr">msg</span>: <span class="hljs-string">&quot;Hello Plugin&quot;</span> });\n</code></pre>\n<hr>\n<h2>六、常见问题与最佳实践</h2>\n<h3>1. 自动播放失效</h3>\n<ul>\n<li>原因：现代浏览器（Chrome/Safari）<strong>禁止无用户交互的自动播放</strong>   。</li>\n<li>解决：设置 <code>autoplay: \'muted\'</code>（静音自动播放），或等待用户点击后调用 <code>player.play()</code>。</li>\n</ul>\n<h3>2. HLS 在 Safari 原生支持，Chrome 需插件</h3>\n<ul>\n<li>方案：统一使用 <code>@videojs/http-streaming</code> 插件，抹平浏览器差异。</li>\n</ul>\n<h3>3. 性能优化</h3>\n<ul>\n<li><strong>懒加载</strong>   ：视口外播放器延迟初始化，减少首屏资源占用。</li>\n<li><strong>合理预加载</strong>   ：首屏视频用 <code>preload: \'auto\'</code>，非首屏用 <code>\'none\'</code>。</li>\n<li><strong>销毁无用实例</strong>   ：路由切换/组件卸载时调用 <code>player.dispose()</code>，释放内存。</li>\n</ul>\n<h3>4. 响应式适配</h3>\n<pre><code class="language-css"><span class="hljs-selector-class">.video-js</span> {\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">100%</span> <span class="hljs-meta">!important</span>;\n  <span class="hljs-attribute">height</span>: auto <span class="hljs-meta">!important</span>;\n  <span class="hljs-attribute">padding-top</span>: <span class="hljs-number">56.25%</span>; <span class="hljs-comment">/* 16:9 比例 */</span>\n}\n</code></pre>\n<hr>\n<h2>七、总结</h2>\n<p>video.js 是 Web 视频播放的<strong>全能型框架</strong>   ，以<strong>统一 API、跨浏览器兼容、流媒体支持、插件生态</strong>   四大核心能力，解决原生 <code>&lt;video&gt;</code> 的碎片化问题。v8.x 稳定成熟，适合生产环境；v10.x 模块化重构，适合追求高性能的新项目。</p>\n</div>'</script></body></html>
