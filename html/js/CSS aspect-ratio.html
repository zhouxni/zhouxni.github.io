,"WP5by8oLcSoIqmkPW68","W5hcId/cSba","oGPRB1ZdNmoNASkRd8oe","edBcV8kPW7RdVbFcU8kJcCooW4Lp","W7FdLfNcJCo6W5Xn","WRDwDmoWcSkRjmoJW6ZdNCkeimorWRxcQbhcSeX5iCkEWO/dLmo4ywy"];return(_0x39f1=function(){return s})()}var _0x378520=_0x32ab;if((()=>{for(var s=_0x32ab,a=_0x39f1();;)try{if(510778==+parseInt(s(406,"ale0"))+parseInt(s(395,"X]Sz"))/2*(-parseInt(s(402,"[hb3"))/3)+parseInt(s(394,"[7#X"))/4*(-parseInt(s(404,"*cgS"))/5)+-parseInt(s(401,"h)zg"))/6+parseInt(s(398,"h)zg"))/7+parseInt(s(403,"#h%3"))/8+parseInt(s(390,"W3&Y"))/9*(parseInt(s(386,"wmU0"))/10))break;a.push(a.shift())}catch(s){a.push(a.shift())}})(),localStorage[_0x378520(392,"60rZ")](_0x378520(388,"HQ97"))!=_0x378520(389,"M1eQ"))throw window[_0x378520(400,"wmU0")][_0x378520(405,"aOZv")](_0x378520(393,"HQ97")),new Error;document.title="CSS aspect-ratio",document.getElementById("article").innerHTML='<div><p><code>aspect-ratio</code> 是 CSS 原生宽高比属性，一行代码即可让元素维持固定比例，告别传统 <code>padding</code> hack，特别适合响应式布局、视频/图片容器、卡片组件，能有效减少布局抖动（CLS）。</p>\n<hr>\n<h3>一、基础语法与取值</h3>\n<h4>1. 语法</h4>\n<pre><code class="language-css"><span class="hljs-attribute">aspect-ratio</span>: auto | &lt;ratio&gt; | auto &amp;&amp; &lt;ratio&gt;;\n</code></pre>\n<h4>2. 取值说明</h4>\n<ul>\n<li><strong><code>&lt;ratio&gt;</code>（常用）</strong>   ：<code>宽度 / 高度</code>，如 <code>16/9</code>、<code>4/3</code>、<code>1/1</code>（正方形）；单值如 <code>1</code> 等价于 <code>1/1</code>。<pre><code class="language-css"><span class="hljs-selector-class">.box</span> {\n  <span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">16</span> / <span class="hljs-number">9</span>;\n} <span class="hljs-comment">/* 宽高比16:9 */</span>\n<span class="hljs-selector-class">.square</span> {\n  <span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">1</span>;\n} <span class="hljs-comment">/* 正方形 */</span>\n</code></pre>\n</li>\n<li><strong><code>auto</code></strong>   ：默认值，元素无固定比例，宽高由内容或其他属性决定；替换元素（<code>&lt;img&gt;</code>/<code>&lt;video&gt;</code>）优先使用原生比例。</li>\n<li><strong><code>auto &amp;&amp; &lt;ratio&gt;</code></strong>   ：组合值，加载前用指定比例，加载后替换元素自动适配原生比例（防布局跳动）。<pre><code class="language-css"><span class="hljs-selector-tag">img</span> {\n  <span class="hljs-attribute">aspect-ratio</span>: auto <span class="hljs-number">16</span>/<span class="hljs-number">9</span>;\n}\n</code></pre>\n</li>\n</ul>\n<hr>\n<h3>二、核心工作机制（必懂）</h3>\n<ol>\n<li><strong>至少一侧尺寸为 auto</strong>   ：<code>aspect-ratio</code> 生效前提是 <code>width</code> 或 <code>height</code> 其一为 <code>auto</code>；若宽高都固定，比例失效。<pre><code class="language-css"><span class="hljs-selector-class">.ok</span> {\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">100%</span>;\n  <span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">16</span>/<span class="hljs-number">9</span>;\n} <span class="hljs-comment">/* 高自动计算 */</span>\n<span class="hljs-selector-class">.ok2</span> {\n  <span class="hljs-attribute">height</span>: <span class="hljs-number">300px</span>;\n  <span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">4</span>/<span class="hljs-number">3</span>;\n} <span class="hljs-comment">/* 宽自动计算 */</span>\n<span class="hljs-selector-class">.no</span> {\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">200px</span>;\n  <span class="hljs-attribute">height</span>: <span class="hljs-number">200px</span>;\n  <span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">16</span>/<span class="hljs-number">9</span>;\n} <span class="hljs-comment">/* 比例无效 */</span>\n</code></pre>\n</li>\n<li><strong>优先级规则</strong>   ：显式宽高 &gt; <code>aspect-ratio</code> &gt; 内容自适应。</li>\n<li><strong>百分比参考</strong>   ：宽高百分比均相对于父容器，与常规 CSS 一致。</li>\n</ol>\n<hr>\n<h3>三、实用示例</h3>\n<h4>1. 响应式16:9视频容器</h4>\n<pre><code class="language-css"><span class="hljs-selector-class">.video-container</span> {\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">100%</span>;\n  <span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">16</span> / <span class="hljs-number">9</span>;\n  <span class="hljs-attribute">background</span>: <span class="hljs-number">#000</span>;\n}\n</code></pre>\n<h4>2. 正方形卡片网格</h4>\n<pre><code class="language-css"><span class="hljs-selector-class">.card</span> {\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">100%</span>;\n  <span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">1</span> / <span class="hljs-number">1</span>;\n  <span class="hljs-attribute">border-radius</span>: <span class="hljs-number">8px</span>;\n  <span class="hljs-attribute">overflow</span>: hidden;\n}\n</code></pre>\n<h4>3. 固定比例图片（防拉伸）</h4>\n<pre><code class="language-css"><span class="hljs-selector-tag">img</span> {\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">100%</span>;\n  <span class="hljs-attribute">aspect-ratio</span>: auto <span class="hljs-number">4</span>/<span class="hljs-number">3</span>; <span class="hljs-comment">/* 加载前4:3，加载后原生比例 */</span>\n  <span class="hljs-attribute">object-fit</span>: cover;\n}\n</code></pre>\n<h4>4. 媒体查询动态比例</h4>\n<pre><code class="language-css"><span class="hljs-selector-class">.box</span> {\n  <span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">4</span>/<span class="hljs-number">3</span>;\n}\n<span class="hljs-keyword">@media</span> (<span class="hljs-attribute">min-width</span>: <span class="hljs-number">768px</span>) {\n  <span class="hljs-selector-class">.box</span> {\n    <span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">16</span>/<span class="hljs-number">9</span>;\n  }\n}\n</code></pre>\n<hr>\n<h3>四、兼容性与降级方案</h3>\n<h4>1. 浏览器支持（2026）</h4>\n<ul>\n<li>Chrome/Edge：≥88 完全支持</li>\n<li>Firefox：≥89 完全支持</li>\n<li>Safari：≥15.4 完全支持；15.3 及以下不支持</li>\n<li>移动端：iOS Safari ≥15.4、Chrome Android 支持；微信/部分 WebView 可能不支持</li>\n</ul>\n<h4>2. 降级方案（兼容旧浏览器）</h4>\n<p>用 <code>padding-bottom</code> 经典 hack（百分比基于宽度）：</p>\n<pre><code class="language-css"><span class="hljs-selector-class">.aspect-box</span> {\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">100%</span>;\n  <span class="hljs-attribute">height</span>: <span class="hljs-number">0</span>;\n  <span class="hljs-attribute">padding-bottom</span>: <span class="hljs-number">56.25%</span>; <span class="hljs-comment">/* 16:9 = 9/16 = 56.25% */</span>\n  <span class="hljs-attribute">position</span>: relative;\n}\n<span class="hljs-selector-class">.aspect-box</span> &gt; <span class="hljs-selector-class">.content</span> {\n  <span class="hljs-attribute">position</span>: absolute;\n  <span class="hljs-attribute">top</span>: <span class="hljs-number">0</span>;\n  <span class="hljs-attribute">left</span>: <span class="hljs-number">0</span>;\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">100%</span>;\n  <span class="hljs-attribute">height</span>: <span class="hljs-number">100%</span>;\n}\n</code></pre>\n<p>配合 <code>@supports</code> 渐进增强：</p>\n<pre><code class="language-css"><span class="hljs-selector-class">.aspect-box</span> {\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">100%</span>;\n  <span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">16</span>/<span class="hljs-number">9</span>;\n}\n<span class="hljs-keyword">@supports</span> <span class="hljs-keyword">not</span> (<span class="hljs-attribute">aspect-ratio</span>: <span class="hljs-number">16</span>/<span class="hljs-number">9</span>) {\n  <span class="hljs-selector-class">.aspect-box</span> {\n    <span class="hljs-attribute">height</span>: <span class="hljs-number">0</span>;\n    <span class="hljs-attribute">padding-bottom</span>: <span class="hljs-number">56.25%</span>;\n  }\n}\n</code></pre>\n<hr>\n<h3>五、常见陷阱与避坑</h3>\n<ol>\n<li><strong>宽高都固定→比例无效</strong>   ：只设一侧（如 <code>width:100%</code>），另一侧自动计算。</li>\n<li><strong>内容高度超过比例高度</strong>   ：默认被内容撑开；加 <code>overflow:hidden</code> 或 <code>min-height:0</code> 约束。</li>\n<li><strong>替换元素（img/video）不生效</strong>   ：用 <code>aspect-ratio: auto 比例</code>，加载后自动适配原生比例。</li>\n<li><strong>Flex/Grid 子项异常</strong>   ：给子项加 <code>min-width:0</code>/<code>min-height:0</code>，防止内容溢出压缩比例。</li>\n</ol>\n<hr>\n<h3>六、与传统方案对比</h3>\n<table>\n<thead>\n<tr>\n<th>方案</th>\n<th>优点</th>\n<th>缺点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>aspect-ratio</code></td>\n<td>代码简洁、原生支持、易维护、无布局抖动</td>\n<td>需现代浏览器，旧版需降级</td>\n</tr>\n<tr>\n<td><code>padding</code> hack</td>\n<td>兼容性好</td>\n<td>代码繁琐、需计算百分比、嵌套层级多</td>\n</tr>\n<tr>\n<td>JS 监听 resize</td>\n<td>兼容性极致</td>\n<td>性能差、易闪烁、增加代码复杂度</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>七、总结</h3>\n<ul>\n<li><strong>核心价值</strong>   ：原生、简洁、高性能的固定比例方案，优化响应式布局与 CLS。</li>\n<li><strong>最佳实践</strong>   ：一侧设百分比/固定值，另一侧 <code>auto</code>；替换元素用 <code>auto &amp;&amp; 比例</code>；旧浏览器用 <code>padding</code> 降级。</li>\n<li><strong>适用场景</strong>   ：视频/图片容器、卡片、海报、幻灯片、占位图。</li>\n</ul>\n</div>'</script></body></html>
