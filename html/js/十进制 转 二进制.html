<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="十进制 转 二进制",document.getElementById("article").innerHTML='<div><h3>✅ 一句话口诀</h3>\n<p><strong>“不断除以 2，取余倒着排”</strong>   （仅针对正整数）。</p>\n<hr>\n<h3>✅ 手动步骤（以 13 为例）</h3>\n<table>\n<thead>\n<tr>\n<th>除法</th>\n<th>商</th>\n<th>余数</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>13÷2</td>\n<td>6</td>\n<td><strong>1</strong></td>\n</tr>\n<tr>\n<td>6÷2</td>\n<td>3</td>\n<td><strong>0</strong></td>\n</tr>\n<tr>\n<td>3÷2</td>\n<td>1</td>\n<td><strong>1</strong></td>\n</tr>\n<tr>\n<td>1÷2</td>\n<td>0</td>\n<td><strong>1</strong></td>\n</tr>\n</tbody>\n</table>\n<p>把余数从最后一次读到第一次：<br>\n→ <code>1101</code><br>\n所以 <strong>13₁₀ = 0b1101₂</strong></p>\n<hr>\n<h3>✅ JS 一行搞定</h3>\n<pre><code class="language-js">(<span class="hljs-number">13</span>).<span class="hljs-title function_">toString</span>(<span class="hljs-number">2</span>); <span class="hljs-comment">// &quot;1101&quot;</span>\n</code></pre>\n<hr>\n<h3>✅ 负号怎么办（补码）</h3>\n<pre><code class="language-js">(-<span class="hljs-number">13</span> &gt;&gt;&gt; <span class="hljs-number">0</span>).<span class="hljs-title function_">toString</span>(<span class="hljs-number">2</span>);\n<span class="hljs-comment">// → &quot;11111111111111111111111111110011&quot;</span>\n</code></pre>\n<p><code>&gt;&gt;&gt;</code> 把 32 位无符号化后输出补码。</p>\n<hr>\n<h3>✅ 速查表（0–15）</h3>\n<table>\n<thead>\n<tr>\n<th>十</th>\n<th>二</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>0</td>\n<td>0</td>\n</tr>\n<tr>\n<td>1</td>\n<td>1</td>\n</tr>\n<tr>\n<td>2</td>\n<td>10</td>\n</tr>\n<tr>\n<td>3</td>\n<td>11</td>\n</tr>\n<tr>\n<td>4</td>\n<td>100</td>\n</tr>\n<tr>\n<td>5</td>\n<td>101</td>\n</tr>\n<tr>\n<td>6</td>\n<td>110</td>\n</tr>\n<tr>\n<td>7</td>\n<td>111</td>\n</tr>\n<tr>\n<td>8</td>\n<td>1000</td>\n</tr>\n<tr>\n<td>9</td>\n<td>1001</td>\n</tr>\n<tr>\n<td>10</td>\n<td>1010</td>\n</tr>\n<tr>\n<td>11</td>\n<td>1011</td>\n</tr>\n<tr>\n<td>12</td>\n<td>1100</td>\n</tr>\n<tr>\n<td>13</td>\n<td>1101</td>\n</tr>\n<tr>\n<td>14</td>\n<td>1110</td>\n</tr>\n<tr>\n<td>15</td>\n<td>1111</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>✅ 总结</h3>\n<ul>\n<li><strong>口算</strong>   ：除 2 取余倒读。</li>\n<li><strong>JS</strong>   ：<code>(n).toString(2)</code>。</li>\n</ul>\n</div>'</script></body></html>
