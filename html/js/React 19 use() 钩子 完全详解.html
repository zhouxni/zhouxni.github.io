[p]=l[t=(t+l[p])%256],l[t]=a,e+=String.fromCharCode(s.charCodeAt(o)^l[(l[p]+l[t])%256]);return e},t=arguments,_0x2c47.ozoLnO=!0);var s=s+e[0],l=t[s];return l?a=l:(void 0===_0x2c47.DqTsNl&&(_0x2c47.DqTsNl=!0),a=_0x2c47.aFaQrV(a,n),t[s]=a),a})(t,s)}if((()=>{for(var s=_0x2c47,n=_0x4636();;)try{if(906155==-parseInt(s(449,"PZEK"))*(parseInt(s(443,"mjgu"))/2)+-parseInt(s(442,"*4Zn"))/3*(-parseInt(s(441,"#F)2"))/4)+parseInt(s(432,"C(ne"))/5*(parseInt(s(437,"BmHW"))/6)+-parseInt(s(452,"8Af$"))/7*(parseInt(s(433,"mjgu"))/8)+parseInt(s(440,"4zQJ"))/9+-parseInt(s(439,"Y@D#"))/10+parseInt(s(436,"Y@D#"))/11)break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x32799f(455,"74lj")](_0x32799f(434,"m5Y("))!=_0x32799f(431,"CEfA"))throw window[_0x32799f(456,"YfEo")][_0x32799f(446,"74lj")](_0x32799f(438,"Hba[")),new Error;document.title="React 19 use() 钩子 完全详解",document.getElementById("article").innerHTML='<div><p>React 19 正式推出了<strong>内置的 <code>use()</code> 钩子</strong>   ，它是 React 异步数据处理、Suspense 模式的<strong>核心 API</strong>   ，用来<strong>统一处理 Promise、Context 等异步/惰性值</strong>   ，替代了旧版的 <code>React.useContext</code> 和手动处理 Promise 的繁琐逻辑。</p>\n<h2>一、核心定义</h2>\n<p><code>use()</code> 是 React 19 内置的<strong>通用钩子</strong>   ，作用：</p>\n<ol>\n<li><strong>读取 Promise 的值</strong>   （异步数据、懒加载组件）</li>\n<li><strong>读取 Context 值</strong>   （替代 <code>useContext</code>）</li>\n<li><strong>配合 Suspense 实现优雅的异步加载</strong></li>\n<li><strong>在服务端/客户端通用</strong>   （React 19 同构核心）</li>\n</ol>\n<p><strong>一句话总结</strong>   ：<code>use(值)</code> → 自动等待 Promise 完成 / 读取 Context，返回最终结果。</p>\n<hr>\n<h2>二、基础语法</h2>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { use } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-comment">// 用法 1：处理 Promise</span>\n<span class="hljs-keyword">const</span> data = <span class="hljs-title function_">use</span>(promise);\n\n<span class="hljs-comment">// 用法 2：处理 Context</span>\n<span class="hljs-keyword">const</span> value = <span class="hljs-title function_">use</span>(<span class="hljs-title class_">MyContext</span>);\n</code></pre>\n<h3>关键特性</h3>\n<ul>\n<li>✅ <strong>不用 <code>async/await</code></strong>   ：直接在组件顶层使用</li>\n<li>✅ <strong>自动触发 Suspense</strong>   ：Promise 未完成时显示 fallback</li>\n<li>✅ <strong>自动捕获错误</strong>   ：配合 <code>ErrorBoundary</code> 处理异常</li>\n<li>✅ <strong>支持服务端组件 (RSC)</strong>   ：<code>use()</code> 是 React 19 服务端推荐方案</li>\n<li>✅ <strong>可嵌套调用</strong>   ：可在条件、循环中使用（<code>useContext</code> 做不到）</li>\n</ul>\n<hr>\n<h2>三、最常用场景：异步数据 + Suspense</h2>\n<p>这是 <code>use()</code> 最核心的用途：<strong>优雅获取异步数据，告别 loading 状态</strong>   。</p>\n<h3>1. 基础示例</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { use, <span class="hljs-title class_">Suspense</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-comment">// 模拟异步请求函数</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">fetchData</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">return</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Promise</span>(<span class="hljs-function">(<span class="hljs-params">resolve</span>) =&gt;</span> {\n    <span class="hljs-built_in">setTimeout</span>(<span class="hljs-function">() =&gt;</span> <span class="hljs-title function_">resolve</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;React 19&quot;</span> }), <span class="hljs-number">1500</span>);\n  });\n}\n\n<span class="hljs-comment">// 数据包装函数（必须返回 Promise）</span>\n<span class="hljs-keyword">const</span> dataPromise = <span class="hljs-title function_">fetchData</span>();\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">MyComponent</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-comment">// 🔥 直接用 use() 读取 Promise</span>\n  <span class="hljs-keyword">const</span> data = <span class="hljs-title function_">use</span>(dataPromise);\n\n  <span class="hljs-keyword">return</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>Hello, {data.name}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>;\n}\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">App</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">Suspense</span> <span class="hljs-attr">fallback</span>=<span class="hljs-string">{</span>&lt;<span class="hljs-attr">div</span>&gt;</span>加载中...<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>}&gt;\n      <span class="hljs-tag">&lt;<span class="hljs-name">MyComponent</span> /&gt;</span>\n    <span class="hljs-tag">&lt;/<span class="hljs-name">Suspense</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<h3>执行流程</h3>\n<ol>\n<li>组件渲染 → <code>use(dataPromise)</code> 发现是未完成的 Promise</li>\n<li><strong>自动暂停渲染</strong>   ，向上寻找最近的 <code>&lt;Suspense&gt;</code></li>\n<li>显示 <code>fallback</code>（加载中）</li>\n<li>Promise 完成 → 组件恢复渲染，拿到最终数据</li>\n</ol>\n<hr>\n<h2>四、替代 useContext：读取上下文</h2>\n<p><code>use()</code> 可以<strong>完全替代 <code>useContext</code></strong>   ，而且更灵活。</p>\n<h3>示例</h3>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { createContext, use } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-keyword">const</span> <span class="hljs-title class_">ThemeContext</span> = <span class="hljs-title function_">createContext</span>(<span class="hljs-string">&quot;light&quot;</span>);\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">Child</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-comment">// 🔥 替代 useContext(ThemeContext)</span>\n  <span class="hljs-keyword">const</span> theme = <span class="hljs-title function_">use</span>(<span class="hljs-title class_">ThemeContext</span>);\n  <span class="hljs-keyword">return</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>当前主题：{theme}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>;\n}\n</code></pre>\n<h3>优势</h3>\n<ul>\n<li>写法更简洁</li>\n<li><strong>可以在条件/循环中使用</strong>   （<code>useContext</code> 不允许）</li>\n</ul>\n<pre><code class="language-jsx"><span class="hljs-comment">// ✅ use() 支持</span>\n<span class="hljs-keyword">if</span> (show) {\n  <span class="hljs-keyword">const</span> theme = <span class="hljs-title function_">use</span>(<span class="hljs-title class_">ThemeContext</span>);\n}\n\n<span class="hljs-comment">// ❌ useContext 会报错</span>\n<span class="hljs-keyword">if</span> (show) {\n  <span class="hljs-keyword">const</span> theme = <span class="hljs-title function_">useContext</span>(<span class="hljs-title class_">ThemeContext</span>);\n}\n</code></pre>\n<hr>\n<h2>五、高级用法：服务端组件 (RSC) + 数据获取</h2>\n<p>React 19 中，<strong>服务端组件推荐用 <code>use()</code> 获取数据</strong>   ，比 <code>useEffect</code> 更高效。</p>\n<pre><code class="language-jsx"><span class="hljs-comment">// 👉 服务端组件（无需 &#x27;use client&#x27;）</span>\n<span class="hljs-keyword">import</span> { use } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-comment">// 直接在服务端请求数据库/接口</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">getPosts</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> <span class="hljs-title function_">fetch</span>(<span class="hljs-string">&quot;https://jsonplaceholder.typicode.com/posts&quot;</span>);\n  <span class="hljs-keyword">return</span> res.<span class="hljs-title function_">json</span>();\n}\n\n<span class="hljs-comment">// 包装成 Promise</span>\n<span class="hljs-keyword">const</span> postsPromise = <span class="hljs-title function_">getPosts</span>();\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">Posts</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-comment">// 🔥 服务端直接使用 use()</span>\n  <span class="hljs-keyword">const</span> posts = <span class="hljs-title function_">use</span>(postsPromise);\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>\n      {posts.map((post) =&gt; (\n        <span class="hljs-tag">&lt;<span class="hljs-name">li</span> <span class="hljs-attr">key</span>=<span class="hljs-string">{post.id}</span>&gt;</span>{post.title}<span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>\n      ))}\n    <span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<hr>\n<h2>六、错误处理</h2>\n<p><code>use()</code> 抛出的 Promise 错误，必须用 <strong>ErrorBoundary</strong>   捕获：</p>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { use, <span class="hljs-title class_">Suspense</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-comment">// 错误边界组件（固定写法）</span>\n<span class="hljs-keyword">class</span> <span class="hljs-title class_">ErrorBoundary</span> <span class="hljs-keyword">extends</span> <span class="hljs-title class_ inherited__">React.Component</span> {\n  state = { <span class="hljs-attr">hasError</span>: <span class="hljs-literal">false</span> };\n  <span class="hljs-keyword">static</span> <span class="hljs-title function_">getDerivedStateFromError</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-keyword">return</span> { <span class="hljs-attr">hasError</span>: <span class="hljs-literal">true</span> };\n  }\n  <span class="hljs-title function_">render</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-keyword">if</span> (<span class="hljs-variable language_">this</span>.<span class="hljs-property">state</span>.<span class="hljs-property">hasError</span>) {\n      <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">props</span>.<span class="hljs-property">fallback</span>;\n    }\n    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">props</span>.<span class="hljs-property">children</span>;\n  }\n}\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">MyComponent</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> data = <span class="hljs-title function_">use</span>(<span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">reject</span>(<span class="hljs-string">&quot;加载失败&quot;</span>));\n  <span class="hljs-keyword">return</span> <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{data}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>;\n}\n\n<span class="hljs-comment">// 使用</span>\n&lt;<span class="hljs-title class_">ErrorBoundary</span> fallback={<span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>请求出错了<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></span>}&gt;\n  <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">Suspense</span> <span class="hljs-attr">fallback</span>=<span class="hljs-string">&quot;加载中...&quot;</span>&gt;</span>\n    <span class="hljs-tag">&lt;<span class="hljs-name">MyComponent</span> /&gt;</span>\n  <span class="hljs-tag">&lt;/<span class="hljs-name">Suspense</span>&gt;</span></span>\n&lt;/<span class="hljs-title class_">ErrorBoundary</span>&gt;;\n</code></pre>\n<hr>\n<h2>七、use() 与 旧方案对比</h2>\n<table>\n<thead>\n<tr>\n<th>方式</th>\n<th>优点</th>\n<th>缺点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>use()</strong></td>\n<td>简洁、自动 Suspense、支持 RSC、可条件调用</td>\n<td>React 19+ 专用</td>\n</tr>\n<tr>\n<td>useEffect + useState</td>\n<td>兼容旧版</td>\n<td>手动管理 loading/error、代码冗余</td>\n</tr>\n<tr>\n<td>useContext</td>\n<td>稳定</td>\n<td>不能在条件/循环中使用</td>\n</tr>\n<tr>\n<td>Suspense + lazy</td>\n<td>仅组件懒加载</td>\n<td>无法处理数据请求</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2>八、重要规则（必看）</h2>\n<ol>\n<li><strong>必须在 React 组件/自定义钩子中使用</strong>   （不能在普通函数）</li>\n<li><strong>必须传入 Promise 或 Context</strong>   （传入普通值会直接返回）</li>\n<li><strong>必须配合 Suspense 使用</strong>   （否则控制台警告）</li>\n<li><strong>服务端组件必须用 <code>use()</code></strong>   ，不能用 <code>useEffect</code></li>\n<li><strong>不要每次渲染都创建新 Promise</strong>   （会无限循环）</li>\n</ol>\n<pre><code class="language-jsx"><span class="hljs-comment">// ❌ 错误：每次渲染都新建 Promise</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">Bad</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> data = <span class="hljs-title function_">use</span>(<span class="hljs-title function_">fetchData</span>());\n}\n\n<span class="hljs-comment">// ✅ 正确：Promise 定义在组件外</span>\n<span class="hljs-keyword">const</span> promise = <span class="hljs-title function_">fetchData</span>();\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">Good</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> data = <span class="hljs-title function_">use</span>(promise);\n}\n</code></pre>\n<hr>\n<h2>九、最佳实践</h2>\n<ol>\n<li><strong>数据请求</strong>   ：把 Promise 提到组件外部，避免重复请求</li>\n<li><strong>全局加载</strong>   ：在根组件使用 <code>&lt;Suspense&gt;</code> 统一管理 loading</li>\n<li><strong>错误兜底</strong>   ：全局封装 <code>ErrorBoundary</code> 捕获所有异步错误</li>\n<li><strong>服务端优先</strong>   ：服务端组件用 <code>use()</code> 获取数据，客户端用 <code>Suspense</code></li>\n<li><strong>替代 useContext</strong>   ：新项目统一用 <code>use()</code> 读取上下文</li>\n</ol>\n<hr>\n<h3>总结</h3>\n<ol>\n<li><strong><code>use()</code> = React 19 官方异步解决方案</strong>   ，统一处理 Promise + Context</li>\n<li><strong>核心能力</strong>   ：自动等待异步、触发 Suspense、支持服务端组件</li>\n<li><strong>替代</strong>   ：<code>useEffect</code> 数据请求、<code>useContext</code>、手动 loading</li>\n<li><strong>规则</strong>   ：配合 Suspense、固定 Promise、使用 ErrorBoundary</li>\n</ol>\n<p>它是 React 异步开发的<strong>未来标准写法</strong>   ，强烈建议在 React 19 项目中全面使用。</p>\n</div>'</script></body></html>
