<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="CSS3 贝塞尔曲线",document.getElementById("article").innerHTML='<div><p>CSS3 贝塞尔曲线（cubic-bezier）一句话总结：<br>\n“<strong>一条曲线 = 调速器</strong>   ”，把动画的“速度节奏”画在坐标系上，P1、P2 两点随便拉，0 ~ 1 秒就能跑出任意缓动。</p>\n<p>─────────────────</p>\n<ol>\n<li>语法 &amp; 值域</li>\n</ol>\n<pre><code class="language-css"><span class="hljs-attribute">transition</span>: all <span class="hljs-number">600ms</span> <span class="hljs-built_in">cubic-bezier</span>(x1, y1, x2, y2);\n<span class="hljs-comment">/* x 必须在 [0,1]，y 可以超界，超界就产生 “回弹/过冲” */</span>\n</code></pre>\n<p>─────────────────<br>\n2. 坐标系示意</p>\n<pre><code>y\n1 ├─(x2,y2)         终点(1,1)\n  │\n  │      曲线\n  │\n0 └-----------------→ x\n  0   (x1,y1)      1\n</code></pre>\n<ul>\n<li>起点固定 (0,0)，终点固定 (1,1)。</li>\n<li>你调的是 <strong>两个控制柄</strong>   P1(x1,y1)、P2(x2,y2) 的位置。</li>\n<li><strong>斜率 ≈ 速度</strong>   ：斜率大 → 快，斜率小 → 慢，负斜率 → 反向。</li>\n</ul>\n<p>─────────────────<br>\n3. 官方速查表（常用 4 条）</p>\n<table>\n<thead>\n<tr>\n<th>名字</th>\n<th>曲线</th>\n<th>体感</th>\n<th>代码</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>ease</td>\n<td>.25 .1 .25 1</td>\n<td>默认，柔和</td>\n<td><code>ease</code></td>\n</tr>\n<tr>\n<td>ease-in</td>\n<td>.42 0 1 1</td>\n<td>慢→快</td>\n<td><code>ease-in</code></td>\n</tr>\n<tr>\n<td>ease-out</td>\n<td>0 0 .58 1</td>\n<td>快→慢</td>\n<td><code>ease-out</code></td>\n</tr>\n<tr>\n<td>ease-in-out</td>\n<td>.42 0 .58 1</td>\n<td>慢→快→慢</td>\n<td><code>ease-in-out</code></td>\n</tr>\n</tbody>\n</table>\n<p>─────────────────<br>\n4. 自定义经典曲线</p>\n<pre><code class="language-css"><span class="hljs-comment">/* 急加速急减速（Material Design） */</span>\ncubic-bezier(.<span class="hljs-number">4</span>, <span class="hljs-number">0</span>, .<span class="hljs-number">2</span>, <span class="hljs-number">1</span>)\n\n<span class="hljs-comment">/* 超弹效果（过冲） */</span>\ncubic-bezier(.<span class="hljs-number">68</span>,-<span class="hljs-number">0.55</span>,.<span class="hljs-number">27</span>,<span class="hljs-number">1.55</span>)\n\n<span class="hljs-comment">/* 抽奖转盘：冲→荡→停 */</span>\ncubic-bezier(.<span class="hljs-number">22</span>,.<span class="hljs-number">58</span>,.<span class="hljs-number">12</span>,.<span class="hljs-number">98</span>)\n</code></pre>\n<p>─────────────────<br>\n5. 在线可视化工具</p>\n<ul>\n<li><a href="https://cubic-bezier.com" target="_blank">cubic-bezier.com</a></li>\n<li>Chrome DevTools → Elements → Styles → 点击 cubic-bezier 图标实时拖拽。</li>\n</ul>\n<p>─────────────────<br>\n6. 完整示例</p>\n<pre><code class="language-css"><span class="hljs-selector-class">.ball</span> {\n  <span class="hljs-attribute">width</span>: <span class="hljs-number">40px</span>;\n  <span class="hljs-attribute">height</span>: <span class="hljs-number">40px</span>;\n  <span class="hljs-attribute">background</span>: <span class="hljs-number">#ff4757</span>;\n  <span class="hljs-attribute">transition</span>: transform <span class="hljs-number">800ms</span> <span class="hljs-built_in">cubic-bezier</span>(<span class="hljs-number">0.68</span>, -<span class="hljs-number">0.55</span>, <span class="hljs-number">0.27</span>, <span class="hljs-number">1.55</span>);\n}\n<span class="hljs-selector-class">.ball</span><span class="hljs-selector-pseudo">:hover</span> {\n  <span class="hljs-attribute">transform</span>: <span class="hljs-built_in">translateX</span>(<span class="hljs-number">200px</span>);\n}\n</code></pre>\n<p>─────────────────<br>\n7. 一句话背下来</p>\n<p><strong>x1,x2 控制“时间节奏”，y1,y2 控制“幅度节奏”</strong>   —— 拉一拉曲线，动画就会唱歌。</p>\n</div>'</script></body></html>
