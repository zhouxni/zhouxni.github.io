<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="next 和 nuxt SSR不应该使用传统的状态管理库",document.getElementById("article").innerHTML="<div><p>你说得很对，在服务端渲染（SSR）或服务端组件（Server Components）中，确实不应该使用传统的状态管理库（如Zustand、Redux等），这是由服务端渲染的本质和限制决定的。</p>\n<p>核心原因可以总结为三点：</p>\n<ol>\n<li>\n<p><strong>服务端渲染的无状态特性</strong><br>\n服务端的核心工作是&quot;一次性生成HTML&quot;，每个请求都是独立的、瞬时的，处理完即销毁。而状态管理库的设计初衷是&quot;持续维护动态变化的状态&quot;（如用户交互产生的状态），两者的核心目标不匹配。</p>\n</li>\n<li>\n<p><strong>多请求共享环境的风险</strong><br>\n服务端通常是多请求共享进程/内存的（如Node.js），如果使用全局状态管理，会导致不同用户的请求共享同一状态，引发数据污染（比如用户A的数据被用户B获取）。即使为每个请求创建独立状态实例，也会因无法自动销毁而导致内存泄漏。</p>\n</li>\n<li>\n<p><strong>技术实现的限制</strong><br>\n服务端组件无法使用React hooks（包括状态管理库提供的<code>useStore</code>等钩子），而这些钩子是状态管理库实现响应式更新的核心机制。强行使用会导致报错或不可预期的行为。</p>\n</li>\n</ol>\n<p>正确的做法是：</p>\n<ul>\n<li><strong>服务端</strong>   ：用局部变量、函数参数和props传递数据，专注于数据获取和初始渲染，不涉及&quot;状态管理&quot;概念。</li>\n<li><strong>客户端</strong>   ：在客户端组件（带<code>'use client'</code>）中使用状态管理库，处理交互产生的动态状态。</li>\n<li><strong>衔接方式</strong>   ：服务端将初始数据通过props传递给客户端组件，客户端用这些数据初始化本地状态管理。</li>\n</ul>\n<p>这种分工既发挥了服务端渲染的性能和SEO优势，又保留了客户端状态管理的灵活性，是Next.js等现代框架的最佳实践。</p>\n</div>"</script></body></html>
