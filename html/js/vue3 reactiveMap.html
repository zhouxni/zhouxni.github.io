<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,

      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'vue3 reactiveMap'
        document.getElementById('article').innerHTML = 
        "<div><p>在 Vue 3 中，<code>reactiveMap</code> 是 Vue 内部使用的一个 <strong>全局 WeakMap</strong>  ，主要用于存储原始对象（<code>target</code>）与其对应的响应式代理对象（<code>Proxy</code>）之间的映射关系。它的核心作用是 <strong>避免重复创建响应式代理</strong>  ，确保同一原始对象始终返回同一个代理实例，从而保证响应式数据的一致性。</p>\n<hr>\n<h3>主要作用：</h3>\n<ol>\n<li><strong>性能优化</strong><br>\n当多次对同一个原始对象调用 <code>reactive()</code> 时，<code>reactiveMap</code> 会直接返回已创建的代理，避免重复的 Proxy 构造开销。</li>\n<li><strong>保持引用一致性</strong><br>\n确保在应用的不同部分访问同一对象时，返回的是同一个代理实例，避免因代理不一致导致的响应式更新问题。</li>\n<li><strong>内存管理</strong><br>\n使用 <code>WeakMap</code> 存储，当原始对象不再被引用时，其对应的代理会自动被垃圾回收，防止内存泄漏。</li>\n</ol>\n<hr>\n<h3>源码中的角色：</h3>\n<p>在 Vue 3 的响应式系统源码中（如 <code>reactive.ts</code>），<code>reactiveMap</code> 的定义类似：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">const</span> reactiveMap = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">WeakMap</span>&lt;<span class=\"hljs-title class_\">Target</span>, <span class=\"hljs-built_in\">any</span>&gt;()\n</code></pre>\n<p>当调用 <code>reactive(target)</code> 时，会先检查 <code>reactiveMap</code> 中是否已有该 <code>target</code> 的代理：</p>\n<pre><code class=\"language-typescript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">reactive</span>(<span class=\"hljs-params\"><span class=\"hljs-attr\">target</span>: <span class=\"hljs-title class_\">Target</span></span>) {\n  <span class=\"hljs-keyword\">if</span> (existingProxy) {\n    <span class=\"hljs-keyword\">return</span> existingProxy <span class=\"hljs-comment\">// 直接返回已存在的代理</span>\n  }\n  <span class=\"hljs-keyword\">const</span> proxy = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Proxy</span>(target, handlers) <span class=\"hljs-comment\">// 创建新代理</span>\n  reactiveMap.<span class=\"hljs-title function_\">set</span>(target, proxy) <span class=\"hljs-comment\">// 存储映射</span>\n  <span class=\"hljs-keyword\">return</span> proxy\n}\n</code></pre>\n<hr>\n<h3>开发者注意事项：</h3>\n<ul>\n<li><strong>无需直接操作</strong>  ：<code>reactiveMap</code> 是 Vue 内部实现细节，开发者通常不需要直接使用它。</li>\n<li><strong>原始对象唯一性</strong>  ：如果需要对同一对象多次调用 <code>reactive()</code>，Vue 会自动通过 <code>reactiveMap</code> 优化。</li>\n<li><strong>不可变原则</strong>  ：直接修改 <code>reactiveMap</code> 可能导致响应式系统异常，应始终通过 Vue 提供的 API（如 <code>reactive()</code>、<code>ref()</code>）操作数据。</li>\n</ul>\n<hr>\n<h3>示例：</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { reactive } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vue&#x27;</span>\n\n<span class=\"hljs-keyword\">const</span> obj = { <span class=\"hljs-attr\">count</span>: <span class=\"hljs-number\">0</span> }\n<span class=\"hljs-keyword\">const</span> proxy1 = <span class=\"hljs-title function_\">reactive</span>(obj)\n<span class=\"hljs-keyword\">const</span> proxy2 = <span class=\"hljs-title function_\">reactive</span>(obj) <span class=\"hljs-comment\">// 返回同一个代理</span>\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(proxy1 === proxy2) <span class=\"hljs-comment\">// true</span>\n</code></pre>\n<p>通过 <code>reactiveMap</code>，Vue 确保了 <code>proxy1</code> 和 <code>proxy2</code> 是同一个实例，维护了响应式数据的一致性。</p>\n</div>";</script></body></html>
