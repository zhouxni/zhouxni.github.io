<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="Watcher.prototype.depend 详解",document.getElementById("article").innerHTML='<div><p><code>Watcher.prototype.depend</code> 是 Vue.js 响应式系统中 Watcher 类的一个重要方法，主要用于依赖收集过程中的依赖关系管理。</p>\n<h2>基本功能</h2>\n<p><code>depend</code> 方法的主要作用是让当前 Watcher 收集它所依赖的所有 Dep（依赖项）。这个方法通常在计算属性或渲染 Watcher 中被调用。</p>\n<h2>实现原理</h2>\n<p>在 Vue 2.x 源码中，<code>depend</code> 方法的典型实现如下：</p>\n<pre><code class="language-javascript"><span class="hljs-title class_">Watcher</span>.<span class="hljs-property"><span class="hljs-keyword">prototype</span></span>.<span class="hljs-property">depend</span> = <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">let</span> i = <span class="hljs-variable language_">this</span>.<span class="hljs-property">deps</span>.<span class="hljs-property">length</span>\n  <span class="hljs-keyword">while</span> (i--) {\n    <span class="hljs-variable language_">this</span>.<span class="hljs-property">deps</span>[i].<span class="hljs-title function_">depend</span>()\n  }\n}\n</code></pre>\n<h2>工作流程</h2>\n<ol>\n<li><strong>遍历依赖项</strong>  ：方法会遍历当前 Watcher 的所有依赖项（存储在 <code>this.deps</code> 数组中）</li>\n<li><strong>触发依赖收集</strong>  ：对每个依赖项调用 <code>depend()</code> 方法，这会将该 Watcher 添加到依赖项的订阅者列表中</li>\n<li><strong>建立双向关系</strong>  ：最终在 Watcher 和 Dep 之间建立双向的依赖关系</li>\n</ol>\n<h2>使用场景</h2>\n<p><code>depend</code> 方法主要在以下场景中被调用：</p>\n<ol>\n<li><strong>计算属性</strong>  ：当计算属性被访问时，需要收集它所依赖的数据</li>\n<li><strong>模板渲染</strong>  ：在组件渲染过程中，收集模板中使用的数据的依赖</li>\n<li><strong>watch 选项</strong>  ：在用户定义的 watcher 中收集依赖</li>\n</ol>\n<h2>示例说明</h2>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> vm = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Vue</span>({\n  <span class="hljs-attr">data</span>: {\n    <span class="hljs-attr">firstName</span>: <span class="hljs-string">&#x27;John&#x27;</span>,\n    <span class="hljs-attr">lastName</span>: <span class="hljs-string">&#x27;Doe&#x27;</span>\n  },\n  <span class="hljs-attr">computed</span>: {\n    <span class="hljs-title function_">fullName</span>(<span class="hljs-params"></span>) {\n      <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">firstName</span> + <span class="hljs-string">&#x27; &#x27;</span> + <span class="hljs-variable language_">this</span>.<span class="hljs-property">lastName</span>\n    }\n  }\n})\n</code></pre>\n<p>在这个例子中：</p>\n<ol>\n<li>当 <code>fullName</code> 被访问时，会创建一个 Watcher</li>\n<li>这个 Watcher 会收集 <code>firstName</code> 和 <code>lastName</code> 作为依赖</li>\n<li><code>depend</code> 方法确保这些依赖项也知道这个 Watcher 的存在</li>\n</ol>\n<h2>注意事项</h2>\n<ul>\n<li><code>depend</code> 方法是 Vue 响应式系统的内部实现细节，通常不需要直接调用</li>\n<li>理解这个方法有助于深入理解 Vue 的响应式原理</li>\n<li>在 Vue 3 中，响应式系统重构后，这个方法的实现和概念有所不同</li>\n</ul>\n<p><code>Watcher.prototype.depend</code> 是 Vue 响应式系统中依赖收集的关键环节，确保了数据变化时能够正确通知到所有相关的 Watcher。</p>\n</div>'</script></body></html>
