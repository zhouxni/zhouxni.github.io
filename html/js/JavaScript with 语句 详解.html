function_">log</span>(user.<span class="hljs-property">name</span>);\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(user.<span class="hljs-property">age</span>);\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(user.<span class="hljs-property">city</span>);\n</code></pre>\n<h3>使用 with（简化）</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> user = {\n  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;小明&quot;</span>,\n  <span class="hljs-attr">age</span>: <span class="hljs-number">20</span>,\n  <span class="hljs-attr">city</span>: <span class="hljs-string">&quot;北京&quot;</span>,\n};\n\n<span class="hljs-title function_">with</span> (user) {\n  <span class="hljs-comment">// 直接写属性名，自动从 user 上查找</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(name); <span class="hljs-comment">// 小明</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(age); <span class="hljs-comment">// 20</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(city); <span class="hljs-comment">// 北京</span>\n}\n</code></pre>\n<p><strong>效果完全一样，但代码更简洁</strong>   —— 这是 <code>with</code> 唯一的优点。</p>\n<hr>\n<h2>三、查找规则（重要原理）</h2>\n<p><code>with</code> 代码块内的变量查找顺序：</p>\n<ol>\n<li><strong>先在指定的对象自身查找</strong></li>\n<li>找不到 → 去<strong>原型链</strong>   查找</li>\n<li>还找不到 → 去<strong>外部作用域</strong>   查找</li>\n<li>都找不到 → 报错 <code>ReferenceError</code></li>\n</ol>\n<p>示例：</p>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> a = <span class="hljs-string">&quot;外部变量&quot;</span>;\n<span class="hljs-keyword">const</span> obj = { <span class="hljs-attr">a</span>: <span class="hljs-string">&quot;obj内a&quot;</span> };\n\n<span class="hljs-title function_">with</span> (obj) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(a); <span class="hljs-comment">// 优先用 obj.a → &quot;obj内a&quot;</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(b); <span class="hljs-comment">// 去外部找 → &quot;外部变量&quot;</span>\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(c); <span class="hljs-comment">// 都找不到 → 报错</span>\n}\n</code></pre>\n<hr>\n<h2>四、为什么 with 被禁用/不推荐？（核心坑点）</h2>\n<p>这是面试和实际开发中<strong>最重要的部分</strong>   ，<code>with</code> 有 4 个致命缺陷：</p>\n<h3>1. 严格模式下直接报错</h3>\n<p>ES5 严格模式 <code>\'use strict\'</code> <strong>完全禁用 with</strong>   ，运行直接抛语法错误。</p>\n<pre><code class="language-js"><span class="hljs-meta">&quot;use strict&quot;</span>;\n<span class="hljs-title function_">with</span> ({}) {\n} <span class="hljs-comment">// Uncaught SyntaxError: Strict mode code may not include a with statement</span>\n</code></pre>\n<h3>2. 可读性极差、易出 bug</h3>\n<p>别人（甚至未来的你）无法一眼判断变量是<strong>对象属性</strong>   还是<strong>外部变量</strong>   。</p>\n<pre><code class="language-js"><span class="hljs-keyword">let</span> name = <span class="hljs-string">&quot;全局&quot;</span>;\n<span class="hljs-keyword">const</span> obj = {};\n\n<span class="hljs-title function_">with</span> (obj) {\n  name = <span class="hljs-string">&quot;修改&quot;</span>;\n  <span class="hljs-comment">// 你以为改的是 obj.name？</span>\n  <span class="hljs-comment">// 但 obj 没有 name 属性 → 最终修改了全局变量！</span>\n}\n\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(name); <span class="hljs-comment">// &quot;修改&quot;（全局被污染）</span>\n</code></pre>\n<h3>3. 性能极差</h3>\n<p>JS 引擎<strong>无法提前优化 with 代码块</strong>   ：</p>\n<ul>\n<li>引擎不知道变量来自对象、原型还是外部</li>\n<li>无法做静态分析</li>\n<li>执行速度比普通代码慢很多</li>\n</ul>\n<h3>4. 容易造成变量泄露、意外覆盖</h3>\n<p>是生产环境 bug 的常见源头。</p>\n<hr>\n<h2>五、现代开发：with 的完美替代方案</h2>\n<p>既然 <code>with</code> 禁用又危险，我们用更安全、清晰的写法替代它：</p>\n<h3>方案1：对象解构（最推荐 ✅）</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> user = { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;小明&quot;</span>, <span class="hljs-attr">age</span>: <span class="hljs-number">20</span> };\n\n<span class="hljs-comment">// 解构出变量，清晰、安全、高性能</span>\n<span class="hljs-keyword">const</span> { name, age } = user;\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(name, age);\n</code></pre>\n<h3>方案2：块级作用域 + 简短变量名</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> u = user;\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(u.<span class="hljs-property">name</span>, u.<span class="hljs-property">age</span>);\n</code></pre>\n<h3>方案3：函数传参（封装）</h3>\n<pre><code class="language-js"><span class="hljs-keyword">function</span> <span class="hljs-title function_">print</span>(<span class="hljs-params">{ name, age }</span>) {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(name, age);\n}\n<span class="hljs-title function_">print</span>(user);\n</code></pre>\n<hr>\n<h2>六、总结：你必须记住的 4 点</h2>\n<ol>\n<li><strong>作用</strong>   ：简化对象属性访问，省略 <code>对象.</code></li>\n<li><strong>原理</strong>   ：改变代码块作用域，优先从指定对象查找变量</li>\n<li><strong>现状</strong>   ：<strong>严格模式禁用、现代开发禁止使用</strong></li>\n<li><strong>替代</strong>   ：优先用 <strong>对象解构</strong>   ，清晰安全无性能问题</li>\n</ol>\n<hr>\n<h3>总结</h3>\n<ul>\n<li><code>with</code> 能简化代码，但<strong>弊远大于利</strong></li>\n<li>实际项目、框架、库中<strong>几乎见不到</strong></li>\n<li>面试问到时，重点回答：<strong>用法 + 缺点（严格模式禁用、可读性差、性能差、易出bug）+ 替代方案（解构）</strong></li>\n</ul>\n</div>'</script></body></html>
