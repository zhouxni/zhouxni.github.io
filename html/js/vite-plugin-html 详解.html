<script>
        document.getElementById('article').innerHTML = 
        "<div><p>Vite-plugin-html 深度使用指南</p>\n<p><code>vite-plugin-html</code> 是 Vite 生态中用于增强 HTML 处理能力的核心插件，它提供了比 Vite 原生 HTML 处理更强大的功能。以下是全面解析：</p>\n<hr>\n<p>一、核心功能</p>\n<ol>\n<li>变量注入<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// vite.config.js</span>\n<span class=\"hljs-keyword\">import</span> { createHtmlPlugin } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vite-plugin-html&#x27;</span>\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">plugins</span>: [\n    <span class=\"hljs-title function_\">createHtmlPlugin</span>({\n      <span class=\"hljs-attr\">inject</span>: {\n        <span class=\"hljs-attr\">data</span>: {\n          <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">&#x27;动态标题&#x27;</span>,\n          <span class=\"hljs-attr\">injectScript</span>: <span class=\"hljs-string\">&#x27;&lt;script&gt;console.log(&quot;注入脚本&quot;)&lt;/script&gt;&#x27;</span>\n        }\n      }\n    })\n  ]\n}\n</code></pre>\n<pre><code class=\"language-html\"><span class=\"hljs-comment\">&lt;!-- index.html --&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>&lt;%= title %&gt;<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n&lt;%= injectScript %&gt;\n</code></pre>\n</li>\n<li>多模板支持<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">template</span>: <span class=\"hljs-string\">&#x27;src/custom.html&#x27;</span>, <span class=\"hljs-comment\">// 自定义模板路径</span>\n  <span class=\"hljs-attr\">multiple</span>: {\n    <span class=\"hljs-attr\">index</span>: <span class=\"hljs-string\">&#x27;src/index.html&#x27;</span>,\n    <span class=\"hljs-attr\">about</span>: <span class=\"hljs-string\">&#x27;src/about.html&#x27;</span>\n  }\n})\n</code></pre>\n</li>\n<li>压缩优化<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">minify</span>: {\n    <span class=\"hljs-attr\">collapseWhitespace</span>: <span class=\"hljs-literal\">true</span>,\n    <span class=\"hljs-attr\">keepClosingSlash</span>: <span class=\"hljs-literal\">true</span>,\n    <span class=\"hljs-attr\">removeComments</span>: <span class=\"hljs-literal\">true</span>,\n    <span class=\"hljs-attr\">removeRedundantAttributes</span>: <span class=\"hljs-literal\">true</span>\n  }\n})\n</code></pre>\n</li>\n</ol>\n<hr>\n<p>二、高级应用场景</p>\n<ol>\n<li>环境变量集成</li>\n</ol>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// vite.config.js</span>\n<span class=\"hljs-keyword\">import</span> { loadEnv } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vite&#x27;</span>\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-title function_\">default</span> ({ mode }) =&gt; {\n  <span class=\"hljs-keyword\">const</span> env = <span class=\"hljs-title function_\">loadEnv</span>(mode, process.<span class=\"hljs-title function_\">cwd</span>())\n\n  <span class=\"hljs-keyword\">return</span> {\n    <span class=\"hljs-attr\">plugins</span>: [\n      <span class=\"hljs-title function_\">createHtmlPlugin</span>({\n        <span class=\"hljs-attr\">inject</span>: {\n          <span class=\"hljs-attr\">data</span>: {\n            <span class=\"hljs-attr\">apiBaseUrl</span>: env.<span class=\"hljs-property\">VITE_API_URL</span>\n          }\n        }\n      })\n    ]\n  }\n}\n</code></pre>\n<pre><code class=\"language-html\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n  <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">config</span> = { <span class=\"hljs-attr\">API_URL</span>: <span class=\"hljs-string\">&#x27;&lt;%= apiBaseUrl %&gt;&#x27;</span> }\n</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n</code></pre>\n<ol start=\"2\">\n<li>多入口自动匹配</li>\n</ol>\n<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">pages</span>: [\n    {\n      <span class=\"hljs-attr\">entry</span>: <span class=\"hljs-string\">&#x27;src/main.js&#x27;</span>,\n      <span class=\"hljs-attr\">template</span>: <span class=\"hljs-string\">&#x27;index.html&#x27;</span>,\n      <span class=\"hljs-attr\">filename</span>: <span class=\"hljs-string\">&#x27;index.html&#x27;</span>\n    },\n    {\n      <span class=\"hljs-attr\">entry</span>: <span class=\"hljs-string\">&#x27;src/about.js&#x27;</span>,\n      <span class=\"hljs-attr\">template</span>: <span class=\"hljs-string\">&#x27;about.html&#x27;</span>,\n      <span class=\"hljs-attr\">filename</span>: <span class=\"hljs-string\">&#x27;about.html&#x27;</span>\n    }\n  ]\n})\n</code></pre>\n<ol start=\"3\">\n<li>自定义资源注入</li>\n</ol>\n<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">inject</span>: {\n    <span class=\"hljs-attr\">tags</span>: [\n      {\n        <span class=\"hljs-attr\">tag</span>: <span class=\"hljs-string\">&#x27;script&#x27;</span>,\n        <span class=\"hljs-attr\">attrs</span>: { <span class=\"hljs-attr\">src</span>: <span class=\"hljs-string\">&#x27;/lib/analytics.js&#x27;</span>, <span class=\"hljs-attr\">async</span>: <span class=\"hljs-literal\">true</span> },\n        <span class=\"hljs-attr\">injectTo</span>: <span class=\"hljs-string\">&#x27;head&#x27;</span>\n      },\n      {\n        <span class=\"hljs-attr\">tag</span>: <span class=\"hljs-string\">&#x27;link&#x27;</span>,\n        <span class=\"hljs-attr\">attrs</span>: { <span class=\"hljs-attr\">rel</span>: <span class=\"hljs-string\">&#x27;preload&#x27;</span>, <span class=\"hljs-attr\">href</span>: <span class=\"hljs-string\">&#x27;/fonts/iconfont.woff2&#x27;</span> }\n      }\n    ]\n  }\n})\n</code></pre>\n<hr>\n<p>三、性能优化技巧</p>\n<ol>\n<li>预加载关键资源<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">inject</span>: {\n    <span class=\"hljs-attr\">tags</span>: [\n      {\n        <span class=\"hljs-attr\">tag</span>: <span class=\"hljs-string\">&#x27;link&#x27;</span>,\n        <span class=\"hljs-attr\">attrs</span>: {\n          <span class=\"hljs-attr\">rel</span>: <span class=\"hljs-string\">&#x27;modulepreload&#x27;</span>,\n          <span class=\"hljs-attr\">href</span>: <span class=\"hljs-string\">&#x27;/src/components/CriticalComponent.vue&#x27;</span>\n        }\n      }\n    ]\n  }\n})\n</code></pre>\n</li>\n<li>条件编译<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">inject</span>: {\n    <span class=\"hljs-attr\">data</span>: {\n      <span class=\"hljs-attr\">isProd</span>: process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">NODE_ENV</span> === <span class=\"hljs-string\">&#x27;production&#x27;</span>\n    }\n  }\n})\n</code></pre>\n<pre><code class=\"language-html\">&lt;% if (isProd) { %&gt;\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span> <span class=\"hljs-attr\">src</span>=<span class=\"hljs-string\">&quot;https://cdn.example.com/vue.min.js&quot;</span>&gt;</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n&lt;% } else { %&gt;\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span> <span class=\"hljs-attr\">src</span>=<span class=\"hljs-string\">&quot;/vue.js&quot;</span>&gt;</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n&lt;% } %&gt;\n</code></pre>\n</li>\n<li>SSR 支持<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">ssr</span>: <span class=\"hljs-literal\">true</span>,\n  <span class=\"hljs-attr\">template</span>: <span class=\"hljs-string\">&#x27;src/ssr-template.html&#x27;</span>\n})\n</code></pre>\n</li>\n</ol>\n<hr>\n<p>四、与其他插件组合</p>\n<ol>\n<li>配合 <code>unplugin-auto-import</code></li>\n</ol>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> <span class=\"hljs-title class_\">AutoImport</span> <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;unplugin-auto-import/vite&#x27;</span>\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">plugins</span>: [\n    <span class=\"hljs-title class_\">AutoImport</span>({\n      <span class=\"hljs-attr\">imports</span>: [<span class=\"hljs-string\">&#x27;vue&#x27;</span>],\n      <span class=\"hljs-attr\">dts</span>: <span class=\"hljs-string\">&#x27;src/auto-imports.d.ts&#x27;</span>\n    }),\n    <span class=\"hljs-title function_\">createHtmlPlugin</span>({\n      <span class=\"hljs-attr\">inject</span>: {\n        <span class=\"hljs-attr\">data</span>: {\n          <span class=\"hljs-attr\">autoImport</span>: <span class=\"hljs-string\">&#x27;&lt;script src=&quot;/src/auto-imports.js&quot;&gt;&lt;/script&gt;&#x27;</span>\n        }\n      }\n    })\n  ]\n}\n</code></pre>\n<ol start=\"2\">\n<li>与 <code>vite-plugin-pwa</code> 集成</li>\n</ol>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">VitePWA</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;vite-plugin-pwa&#x27;</span>\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> {\n  <span class=\"hljs-attr\">plugins</span>: [\n    <span class=\"hljs-title class_\">VitePWA</span>(),\n    <span class=\"hljs-title function_\">createHtmlPlugin</span>({\n      <span class=\"hljs-attr\">inject</span>: {\n        <span class=\"hljs-attr\">tags</span>: [\n          {\n            <span class=\"hljs-attr\">tag</span>: <span class=\"hljs-string\">&#x27;link&#x27;</span>,\n            <span class=\"hljs-attr\">attrs</span>: { <span class=\"hljs-attr\">rel</span>: <span class=\"hljs-string\">&#x27;manifest&#x27;</span>, <span class=\"hljs-attr\">href</span>: <span class=\"hljs-string\">&#x27;/manifest.webmanifest&#x27;</span> }\n          }\n        ]\n      }\n    })\n  ]\n}\n</code></pre>\n<hr>\n<p>五、调试技巧</p>\n<ol>\n<li>查看最终生成的 HTML<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">debug</span>: {\n    <span class=\"hljs-attr\">logPath</span>: <span class=\"hljs-literal\">true</span>,  <span class=\"hljs-comment\">// 输出文件路径</span>\n    <span class=\"hljs-attr\">showCompiled</span>: <span class=\"hljs-literal\">true</span>  <span class=\"hljs-comment\">// 显示编译后的模板</span>\n  }\n})\n</code></pre>\n</li>\n<li>自定义日志输出<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-title function_\">onLog</span>(<span class=\"hljs-params\">level, msg</span>) {\n    <span class=\"hljs-keyword\">if</span> (level === <span class=\"hljs-string\">&#x27;warn&#x27;</span>) {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">warn</span>(<span class=\"hljs-string\">&#x27;[HTML Plugin]&#x27;</span>, msg)\n    }\n  }\n})\n</code></pre>\n</li>\n</ol>\n<hr>\n<p>六、最佳实践建议</p>\n<ol>\n<li>项目结构组织<pre><code>src/\n├── html-templates/\n│   ├── base.html\n│   ├── home.html\n│   └── admin.html\n└── vite-plugins/\n    └── html-config.js\n</code></pre>\n</li>\n<li>配置分离<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// vite-plugins/html-config.js</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">htmlPlugin</span> = (<span class=\"hljs-params\">mode</span>) =&gt; <span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">minify</span>: mode === <span class=\"hljs-string\">&#x27;production&#x27;</span>,\n  <span class=\"hljs-attr\">inject</span>: <span class=\"hljs-title function_\">loadEnv</span>(mode, process.<span class=\"hljs-title function_\">cwd</span>())\n})\n\n<span class=\"hljs-comment\">// vite.config.js</span>\n<span class=\"hljs-keyword\">import</span> { htmlPlugin } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;./src/vite-plugins/html-config&#x27;</span>\n</code></pre>\n</li>\n<li>版本控制策略<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">inject</span>: {\n    <span class=\"hljs-attr\">data</span>: {\n      <span class=\"hljs-attr\">buildVersion</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>()\n    }\n  }\n})\n</code></pre>\n<pre><code class=\"language-html\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">&quot;version&quot;</span> <span class=\"hljs-attr\">content</span>=<span class=\"hljs-string\">&quot;&lt;%= buildVersion %&gt;&quot;</span>&gt;</span>\n</code></pre>\n</li>\n</ol>\n<hr>\n<p>常见问题解决方案</p>\n<p>Q1: 变量未正确替换？</p>\n<ul>\n<li>\n<p>确保模板中使用 <code>&lt;%= %&gt;</code> 语法</p>\n</li>\n<li>\n<p>检查数据注入路径是否正确</p>\n</li>\n</ul>\n<p>Q2: 多页面路由冲突？</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">pages</span>: [\n    {\n      <span class=\"hljs-attr\">filename</span>: <span class=\"hljs-string\">&#x27;admin/index.html&#x27;</span>,\n      <span class=\"hljs-attr\">template</span>: <span class=\"hljs-string\">&#x27;admin.html&#x27;</span>\n    }\n  ]\n})\n</code></pre>\n<p>Q3: 如何保留原始注释？</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-title function_\">createHtmlPlugin</span>({\n  <span class=\"hljs-attr\">minify</span>: {\n    <span class=\"hljs-attr\">removeComments</span>: <span class=\"hljs-literal\">false</span>\n  }\n})\n</code></pre>\n<p>通过合理配置 <code>vite-plugin-html</code>，可以实现从简单的变量替换到复杂的多页面应用架构，是 Vite 项目不可或缺的高级工具。</p>\n</div>";
      </script></body></html>
