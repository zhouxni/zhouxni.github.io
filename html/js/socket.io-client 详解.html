1)%256],a[c]=a[l=(l+a[c])%256],a[l]=t,e+=String.fromCharCode(s.charCodeAt(o)^a[(a[c]+a[l])%256]);return e},l=arguments,_0x49c8.QhLmaC=!0);var s=s+e[0],a=l[s];return a?t=a:(void 0===_0x49c8.ZxOpyS&&(_0x49c8.ZxOpyS=!0),t=_0x49c8.LzoNpw(t,n),l[s]=t),t})(l,s)}if((()=>{for(var s=_0x49c8,n=_0x99fd();;)try{if(272989==-parseInt(s(407,"l7kH"))+parseInt(s(402,"]8Q8"))/2*(parseInt(s(413,"t60#"))/3)+parseInt(s(396,"l7kH"))/4*(-parseInt(s(409,"*png"))/5)+parseInt(s(386,"l7kH"))/6*(parseInt(s(401,"xZ3O"))/7)+-parseInt(s(405,"%X9B"))/8+parseInt(s(391,"6kpW"))/9+-parseInt(s(388,"oV1W"))/10*(parseInt(s(389,"ZHt*"))/11))break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x291582(394,"rgcq")](_0x291582(398,"Kc(7"))!=_0x291582(408,"FTcE"))throw window[_0x291582(399,"0HcN")][_0x291582(406,"bi@Y")](_0x291582(390,"MWdA")),new Error;document.title="socket.io-client 详解",document.getElementById("article").innerHTML='<div><p><code>socket.io-client</code> 是 Socket.IO 框架的浏览器/客户端 SDK，核心价值是<strong>在各种环境下稳定实现双向实时通信</strong>   ，自动兼容 WebSocket、HTTP 长轮询等传输，内置重连、心跳、事件系统与多路复用能力，是聊天室、实时协作、推送通知等场景的主流方案。</p>\n<hr>\n<h2>一、核心定位与工作原理</h2>\n<h3>1. 与原生 WebSocket 的区别</h3>\n<ul>\n<li><strong>原生 WebSocket</strong>   ：仅支持 WebSocket 协议，无自动降级、重连、心跳，需手动处理断线与数据序列化。</li>\n<li><strong>socket.io-client</strong>   ：\n<ul>\n<li>优先 WebSocket，失败自动降级为 HTTP 长轮询（XHR/JSONP）。</li>\n<li>内置<strong>心跳检测（ping/pong）</strong>   与<strong>自动重连</strong>   ，解决假死与网络闪断。</li>\n<li>事件驱动，支持<strong>自定义事件、二进制数据、消息确认（ACK）</strong>   。</li>\n<li>支持<strong>命名空间（Namespace）</strong>   与<strong>房间（Room）</strong>   ，实现连接多路复用与分组广播。</li>\n</ul>\n</li>\n</ul>\n<h3>2. 核心架构（v4.x）</h3>\n<ul>\n<li><strong>Manager（管理器）</strong>   ：底层连接管理者，负责传输协商、重连、心跳、会话复用，一个 Manager 可管理多个 Namespace。</li>\n<li><strong>Namespace（命名空间）</strong>   ：逻辑隔离的通信通道（默认 <code>/</code>），独立事件、中间件、房间，复用底层连接。</li>\n<li><strong>Socket（实例）</strong>   ：客户端与服务器的一对一通信对象，属于某个 Namespace，收发事件、加入房间。</li>\n</ul>\n<h3>3. 连接建立流程</h3>\n<ol>\n<li>客户端发起 HTTP 长轮询握手，获取会话 ID（sid）、支持的传输列表、心跳间隔/超时。</li>\n<li>尝试升级到 WebSocket，成功则切换；失败则保持长轮询。</li>\n<li>建立心跳：客户端定时发 <code>ping</code>，服务器回 <code>pong</code>；超时未响应则判定断线，触发重连。</li>\n</ol>\n<hr>\n<h2>二、安装与基础使用</h2>\n<h3>1. 安装（v4.x）</h3>\n<pre><code class="language-bash"><span class="hljs-comment"># npm</span>\nnpm install socket.io-client\n<span class="hljs-comment"># yarn</span>\nyarn add socket.io-client\n<span class="hljs-comment"># pnpm</span>\npnpm add socket.io-client\n</code></pre>\n<h3>2. 引入方式</h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// ES6 模块</span>\n<span class="hljs-keyword">import</span> { io } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;socket.io-client&quot;</span>;\n<span class="hljs-comment">// CommonJS</span>\n<span class="hljs-keyword">const</span> { io } = <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;socket.io-client&quot;</span>);\n<span class="hljs-comment">// CDN（浏览器直接引入）</span>\n<span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.socket.io/4.8.0/socket.io.min.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></span>\n<span class="hljs-comment">// ESM CDN</span>\n<span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="language-javascript">\n  <span class="hljs-keyword">import</span> { io } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;https://cdn.socket.io/4.8.0/socket.io.esm.min.js&quot;</span>;\n</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></span>\n</code></pre>\n<h3>3. 基础连接</h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// 1. 连接同域默认命名空间（/）</span>\n<span class="hljs-keyword">const</span> socket = <span class="hljs-title function_">io</span>();\n\n<span class="hljs-comment">// 2. 连接跨域服务器（需服务端配置 CORS）</span>\n<span class="hljs-keyword">const</span> socket = <span class="hljs-title function_">io</span>(<span class="hljs-string">&quot;https://server-domain.com&quot;</span>);\n\n<span class="hljs-comment">// 3. 连接指定命名空间（/chat）</span>\n<span class="hljs-keyword">const</span> socket = <span class="hljs-title function_">io</span>(<span class="hljs-string">&quot;https://server-domain.com/chat&quot;</span>);\n\n<span class="hljs-comment">// 4. 带配置项连接</span>\n<span class="hljs-keyword">const</span> socket = <span class="hljs-title function_">io</span>(<span class="hljs-string">&quot;https://server-domain.com&quot;</span>, {\n  <span class="hljs-attr">transports</span>: [<span class="hljs-string">&quot;websocket&quot;</span>, <span class="hljs-string">&quot;polling&quot;</span>], <span class="hljs-comment">// 传输优先级</span>\n  <span class="hljs-attr">reconnection</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 开启自动重连</span>\n  <span class="hljs-attr">reconnectionAttempts</span>: <span class="hljs-number">5</span>, <span class="hljs-comment">// 最大重连次数</span>\n  <span class="hljs-attr">reconnectionDelay</span>: <span class="hljs-number">1000</span>, <span class="hljs-comment">// 初始重连间隔（ms）</span>\n  <span class="hljs-attr">pingInterval</span>: <span class="hljs-number">25000</span>, <span class="hljs-comment">// 心跳发送间隔（ms）</span>\n  <span class="hljs-attr">pingTimeout</span>: <span class="hljs-number">5000</span>, <span class="hljs-comment">// 心跳超时时间（ms）</span>\n  <span class="hljs-attr">autoConnect</span>: <span class="hljs-literal">true</span>, <span class="hljs-comment">// 初始化后自动连接</span>\n});\n</code></pre>\n<h3>4. 事件监听与发送</h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// 连接成功</span>\nsocket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;connect&quot;</span>, <span class="hljs-function">() =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;连接成功，socket ID：&quot;</span>, socket.<span class="hljs-property">id</span>);\n  <span class="hljs-comment">// 发送自定义事件（参数可传对象、字符串、二进制）</span>\n  socket.<span class="hljs-title function_">emit</span>(<span class="hljs-string">&quot;message&quot;</span>, { <span class="hljs-attr">user</span>: <span class="hljs-string">&quot;张三&quot;</span>, <span class="hljs-attr">content</span>: <span class="hljs-string">&quot;Hello Server&quot;</span> });\n});\n\n<span class="hljs-comment">// 监听服务器自定义事件</span>\nsocket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;message&quot;</span>, <span class="hljs-function">(<span class="hljs-params">data</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;收到服务器消息：&quot;</span>, data);\n});\n\n<span class="hljs-comment">// 连接断开</span>\nsocket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;disconnect&quot;</span>, <span class="hljs-function">(<span class="hljs-params">reason</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;连接断开，原因：&quot;</span>, reason);\n});\n\n<span class="hljs-comment">// 重连成功</span>\nsocket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;reconnect&quot;</span>, <span class="hljs-function">(<span class="hljs-params">attempt</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;重连成功，尝试次数：&quot;</span>, attempt);\n});\n\n<span class="hljs-comment">// 错误监听</span>\nsocket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;error&quot;</span>, <span class="hljs-function">(<span class="hljs-params">err</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;连接错误：&quot;</span>, err);\n});\n</code></pre>\n<hr>\n<h2>三、核心配置项（v4.x）</h2>\n<h3>1. 连接与重连配置</h3>\n<table>\n<thead>\n<tr>\n<th style="text-align:left">配置项</th>\n<th style="text-align:left">类型</th>\n<th style="text-align:left">默认值</th>\n<th style="text-align:left">说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td style="text-align:left"><code>transports</code></td>\n<td style="text-align:left">数组</td>\n<td style="text-align:left"><code>[&quot;polling&quot;, &quot;websocket&quot;]</code></td>\n<td style="text-align:left">传输优先级，支持 <code>polling</code>/<code>websocket</code>/<code>fetch</code></td>\n</tr>\n<tr>\n<td style="text-align:left"><code>reconnection</code></td>\n<td style="text-align:left">布尔</td>\n<td style="text-align:left"><code>true</code></td>\n<td style="text-align:left">是否开启自动重连</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>reconnectionAttempts</code></td>\n<td style="text-align:left">数字</td>\n<td style="text-align:left"><code>Infinity</code></td>\n<td style="text-align:left">最大重连次数</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>reconnectionDelay</code></td>\n<td style="text-align:left">数字</td>\n<td style="text-align:left"><code>1000</code></td>\n<td style="text-align:left">初始重连间隔（ms），指数退避</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>reconnectionDelayMax</code></td>\n<td style="text-align:left">数字</td>\n<td style="text-align:left"><code>5000</code></td>\n<td style="text-align:left">最大重连间隔（ms）</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>pingInterval</code></td>\n<td style="text-align:left">数字</td>\n<td style="text-align:left"><code>25000</code></td>\n<td style="text-align:left">心跳发送间隔（ms）</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>pingTimeout</code></td>\n<td style="text-align:left">数字</td>\n<td style="text-align:left"><code>5000</code></td>\n<td style="text-align:left">心跳超时时间（ms）</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>autoConnect</code></td>\n<td style="text-align:left">布尔</td>\n<td style="text-align:left"><code>true</code></td>\n<td style="text-align:left">初始化后是否自动连接</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>forceNew</code></td>\n<td style="text-align:left">布尔</td>\n<td style="text-align:left"><code>false</code></td>\n<td style="text-align:left">是否强制创建新 Manager（独立连接）</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>path</code></td>\n<td style="text-align:left">字符串</td>\n<td style="text-align:left"><code>/socket.io</code></td>\n<td style="text-align:left">服务器 Socket.IO 路径</td>\n</tr>\n<tr>\n<td style="text-align:left"><code>query</code></td>\n<td style="text-align:left">对象/字符串</td>\n<td style="text-align:left"><code>{}</code></td>\n<td style="text-align:left">握手时携带的查询参数</td>\n</tr>\n</tbody>\n</table>\n<h3>2. 实例属性与方法</h3>\n<h4>属性</h4>\n<ul>\n<li><code>socket.id</code>：当前会话唯一 ID，连接成功后生成。</li>\n<li><code>socket.connected</code>：布尔值，是否处于连接状态。</li>\n<li><code>socket.disconnected</code>：布尔值，是否处于断开状态。</li>\n</ul>\n<h4>方法</h4>\n<ul>\n<li><code>socket.emit(event, ...args)</code>：发送自定义事件，支持任意参数（对象/二进制）。</li>\n<li><code>socket.on(event, callback)</code>：监听事件，回调接收事件参数。</li>\n<li><code>socket.once(event, callback)</code>：监听事件一次，触发后移除监听。</li>\n<li><code>socket.off(event, callback)</code>：移除事件监听。</li>\n<li><code>socket.close()</code>：主动关闭连接。</li>\n<li><code>socket.open()</code>：手动开启连接（<code>autoConnect: false</code> 时用）。</li>\n</ul>\n<hr>\n<h2>四、高级特性</h2>\n<h3>1. 命名空间（Namespace）</h3>\n<p>同一服务器下逻辑隔离的通信通道，复用底层连接，适合多模块隔离（如 <code>/chat</code>、<code>/admin</code>）。</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 客户端：连接不同命名空间</span>\n<span class="hljs-keyword">const</span> chatSocket = <span class="hljs-title function_">io</span>(<span class="hljs-string">&quot;/chat&quot;</span>);\n<span class="hljs-keyword">const</span> adminSocket = <span class="hljs-title function_">io</span>(<span class="hljs-string">&quot;/admin&quot;</span>);\n\n<span class="hljs-comment">// 服务端（Node.js）：命名空间独立事件</span>\n<span class="hljs-keyword">const</span> io = <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;socket.io&quot;</span>)(server);\n<span class="hljs-keyword">const</span> chatNsp = io.<span class="hljs-title function_">of</span>(<span class="hljs-string">&quot;/chat&quot;</span>);\nchatNsp.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;connection&quot;</span>, <span class="hljs-function">(<span class="hljs-params">socket</span>) =&gt;</span> {\n  socket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;send&quot;</span>, <span class="hljs-function">(<span class="hljs-params">msg</span>) =&gt;</span> chatNsp.<span class="hljs-title function_">emit</span>(<span class="hljs-string">&quot;message&quot;</span>, msg));\n});\n</code></pre>\n<h3>2. 房间（Room）</h3>\n<p>命名空间内的分组机制，服务器端管理，实现<strong>一对一、一对多、多对多</strong>   通信（如群聊、私聊）。</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 客户端：发送加入房间请求</span>\nsocket.<span class="hljs-title function_">emit</span>(<span class="hljs-string">&quot;join:room&quot;</span>, <span class="hljs-string">&quot;room123&quot;</span>);\n\n<span class="hljs-comment">// 服务端：处理房间逻辑</span>\nio.<span class="hljs-title function_">of</span>(<span class="hljs-string">&quot;/chat&quot;</span>).<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;connection&quot;</span>, <span class="hljs-function">(<span class="hljs-params">socket</span>) =&gt;</span> {\n  <span class="hljs-comment">// 加入房间</span>\n  socket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;join:room&quot;</span>, <span class="hljs-function">(<span class="hljs-params">roomId</span>) =&gt;</span> socket.<span class="hljs-title function_">join</span>(roomId));\n  <span class="hljs-comment">// 离开房间</span>\n  socket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;leave:room&quot;</span>, <span class="hljs-function">(<span class="hljs-params">roomId</span>) =&gt;</span> socket.<span class="hljs-title function_">leave</span>(roomId));\n  <span class="hljs-comment">// 向房间广播（除发送者外）</span>\n  socket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;send:room&quot;</span>, <span class="hljs-function">(<span class="hljs-params">data</span>) =&gt;</span>\n    socket.<span class="hljs-title function_">to</span>(data.<span class="hljs-property">roomId</span>).<span class="hljs-title function_">emit</span>(<span class="hljs-string">&quot;room:message&quot;</span>, data),\n  );\n});\n</code></pre>\n<h3>3. 消息确认（ACK）</h3>\n<p>双向回调确认，确保消息被对方接收处理，避免丢失。</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 客户端发送消息并等待确认</span>\nsocket.<span class="hljs-title function_">emit</span>(<span class="hljs-string">&quot;message&quot;</span>, <span class="hljs-string">&quot;Hello&quot;</span>, <span class="hljs-function">(<span class="hljs-params">ack</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;服务器确认：&quot;</span>, ack); <span class="hljs-comment">// 服务器回调返回的数据</span>\n});\n\n<span class="hljs-comment">// 服务端接收并确认</span>\nsocket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;message&quot;</span>, <span class="hljs-function">(<span class="hljs-params">msg, callback</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;收到：&quot;</span>, msg);\n  <span class="hljs-title function_">callback</span>({ <span class="hljs-attr">status</span>: <span class="hljs-string">&quot;ok&quot;</span>, <span class="hljs-attr">time</span>: <span class="hljs-title class_">Date</span>.<span class="hljs-title function_">now</span>() }); <span class="hljs-comment">// 回调确认</span>\n});\n</code></pre>\n<h3>4. 二进制数据传输</h3>\n<p>直接传输 <code>ArrayBuffer</code>、<code>Blob</code>、<code>Buffer</code>，自动序列化/反序列化。</p>\n<pre><code class="language-javascript"><span class="hljs-comment">// 客户端发送二进制</span>\n<span class="hljs-keyword">const</span> buffer = <span class="hljs-keyword">new</span> <span class="hljs-title class_">ArrayBuffer</span>(<span class="hljs-number">8</span>);\nsocket.<span class="hljs-title function_">emit</span>(<span class="hljs-string">&quot;binary&quot;</span>, buffer);\n\n<span class="hljs-comment">// 客户端接收二进制</span>\nsocket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;binary&quot;</span>, <span class="hljs-function">(<span class="hljs-params">data</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;收到二进制：&quot;</span>, data);\n});\n</code></pre>\n<h3>5. 离线事件缓存</h3>\n<p>连接断开时发送的事件会<strong>缓存</strong>   ，重连成功后自动发送，确保离线消息不丢失。</p>\n<pre><code class="language-javascript">socket.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;disconnect&quot;</span>, <span class="hljs-function">() =&gt;</span> {\n  <span class="hljs-comment">// 断开后发送，会缓存</span>\n  socket.<span class="hljs-title function_">emit</span>(<span class="hljs-string">&quot;offline:msg&quot;</span>, <span class="hljs-string">&quot;离线消息&quot;</span>);\n});\n<span class="hljs-comment">// 重连后自动发送缓存事件</span>\n</code></pre>\n<hr>\n<h2>五、v4.x 关键变更（对比 v2.x）</h2>\n<ol>\n<li><strong>协议升级</strong>   ：Socket.IO 协议 v5，Engine.IO 协议 v4，客户端与服务端需版本匹配。</li>\n<li><strong>API 调整</strong>   ：\n<ul>\n<li>移除 <code>io.set()</code>，配置统一在 <code>io()</code> 参数中。</li>\n<li><code>Socket.join()</code>/<code>leave()</code> 改为同步方法。</li>\n<li>移除 <code>socket.binary()</code>，自动识别二进制数据。</li>\n</ul>\n</li>\n<li><strong>模块化</strong>   ：默认 ESM 支持，移除 IE8 兼容。</li>\n<li><strong>新特性</strong>   ：支持 <code>Fetch</code> 传输、捕获所有事件监听、易变事件（Volatile Events）。</li>\n</ol>\n<hr>\n<h2>六、常见问题与最佳实践</h2>\n<h3>1. 跨域问题</h3>\n<ul>\n<li>服务端配置 CORS（Node.js 示例）：</li>\n</ul>\n<pre><code class="language-javascript"><span class="hljs-keyword">const</span> io = <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;socket.io&quot;</span>)(server, {\n  <span class="hljs-attr">cors</span>: {\n    <span class="hljs-attr">origin</span>: <span class="hljs-string">&quot;https://your-frontend.com&quot;</span>, <span class="hljs-comment">// 前端域名</span>\n    <span class="hljs-attr">methods</span>: [<span class="hljs-string">&quot;GET&quot;</span>, <span class="hljs-string">&quot;POST&quot;</span>],\n    <span class="hljs-attr">allowedHeaders</span>: [<span class="hljs-string">&quot;my-custom-header&quot;</span>],\n    <span class="hljs-attr">credentials</span>: <span class="hljs-literal">true</span>,\n  },\n});\n</code></pre>\n<h3>2. 重连优化</h3>\n<ul>\n<li>生产环境设置合理的 <code>pingInterval</code>/<code>pingTimeout</code>（如 25s/5s），避免假死。</li>\n<li>重连次数设为有限值（如 5 次），避免无限重连消耗资源。</li>\n</ul>\n<h3>3. 性能建议</h3>\n<ul>\n<li>多命名空间复用 Manager，减少连接数。</li>\n<li>高频事件用<strong>易变事件（volatile）</strong>   ，网络拥堵时可丢弃旧数据。</li>\n<li>二进制数据优先用 <code>ArrayBuffer</code>，减少序列化开销。</li>\n</ul>\n<hr>\n<h2>七、总结</h2>\n<p><code>socket.io-client</code> 是实时通信的“瑞士军刀”，<strong>自动降级、重连、心跳、事件系统、多路复用</strong>   五大核心能力，大幅降低实时应用开发复杂度。v4.x 版本更稳定、性能更优、API 更简洁，适配现代浏览器与 Node.js 环境。</p>\n</div>'</script></body></html>
