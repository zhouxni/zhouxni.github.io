kz=!0);var n=n+a[0],t=l[n];return t?o=t:(void 0===_0x14bc.NBtGjt&&(_0x14bc.NBtGjt=!0),o=_0x14bc.oGaxoC(o,s),l[n]=o),o})(l,n)}if((()=>{for(var n=_0x14bc,s=_0x4c24();;)try{if(249543==-parseInt(n(217,"^RaV"))+parseInt(n(230,"$5ok"))/2+parseInt(n(227,"okBX"))/3+-parseInt(n(228,"okBX"))/4+-parseInt(n(214,"Yqng"))/5+parseInt(n(221,"@rPp"))/6+parseInt(n(232,"lrJn"))/7)break;s.push(s.shift())}catch(n){s.push(s.shift())}})(),localStorage[_0x168eb0(213,"lQm)")](_0x168eb0(224,"Myd["))!=_0x168eb0(216,"Vj6E"))throw window[_0x168eb0(223,"27br")][_0x168eb0(220,"$5ok")](_0x168eb0(225,"X2h8")),new Error;document.title="微信小程序热启动和冷启动",document.getElementById("article").innerHTML='<div><p>在微信小程序中，<strong>冷启动</strong>   （Cold Start）和<strong>热启动</strong>   （Hot Start）是描述小程序生命周期和加载机制的两个核心概念。理解它们的区别对于优化小程序的<strong>首屏加载速度</strong>   、<strong>用户体验</strong>   以及<strong>性能调优</strong>   至关重要。</p>\n<p>以下是详细的解析：</p>\n<hr>\n<h3>1. 核心定义</h3>\n<h4>❄️ 冷启动 (Cold Start)</h4>\n<ul>\n<li><strong>定义</strong>   ：指用户<strong>首次</strong>   打开小程序，或者小程序被完全销毁后再次打开。</li>\n<li><strong>触发场景</strong>   ：\n<ol>\n<li>用户从未打开过该小程序，首次点击图标进入。</li>\n<li>用户之前打开过，但小程序已经被微信客户端彻底销毁（例如：手机内存不足被系统杀掉、用户手动在后台划掉小程序、长时间未使用被系统回收）。</li>\n<li>开发者调用了 <code>wx.reLaunch</code> 且触发了底层重启逻辑（较少见，通常只是重置页面栈）。</li>\n</ol>\n</li>\n<li><strong>发生过程</strong>   ：\n<ol>\n<li>微信客户端向服务器请求并下载小程序代码包（如果本地没有或版本已更新）。</li>\n<li>解压代码包。</li>\n<li>初始化小程序运行环境（创建沙箱、注入 API）。</li>\n<li>执行 <code>app.js</code> 中的 <code>onLaunch</code> 生命周期。</li>\n<li>渲染首页。</li>\n</ol>\n</li>\n<li><strong>特点</strong>   ：<strong>耗时较长</strong>   ，消耗流量，对性能要求高。</li>\n</ul>\n<h4>🔥 热启动 (Hot Start)</h4>\n<ul>\n<li><strong>定义</strong>   ：指用户已经打开过小程序，将其切换到后台（最小化），然后在<strong>一定时间内</strong>   再次从后台切换回前台。</li>\n<li><strong>触发场景</strong>   ：\n<ol>\n<li>用户按 Home 键离开小程序，几秒或几分钟后通过微信列表或桌面图标重新进入。</li>\n<li>用户在小程序内跳转到其他应用（如打电话），然后返回。</li>\n</ol>\n</li>\n<li><strong>发生过程</strong>   ：\n<ol>\n<li>微信客户端检查小程序实例是否还在内存中。</li>\n<li>如果在存活时间内（默认通常是 <strong>5 分钟</strong>   ，具体由微信客户端策略决定），直接唤醒内存中的实例。</li>\n<li><strong>跳过</strong>   代码下载、解压、环境初始化过程。</li>\n<li><strong>不执行</strong>   <code>onLaunch</code>，而是执行 <code>app.js</code> 中的 <code>onShow</code> 生命周期。</li>\n<li>恢复之前的页面栈和状态。</li>\n</ol>\n</li>\n<li><strong>特点</strong>   ：<strong>速度极快</strong>   （毫秒级），几乎无感知，不消耗额外流量。</li>\n</ul>\n<hr>\n<h3>2. 关键差异对比表</h3>\n<table>\n<thead>\n<tr>\n<th style="text-align:left">特性</th>\n<th style="text-align:left">冷启动 (Cold Start)</th>\n<th style="text-align:left">热启动 (Hot Start)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td style="text-align:left"><strong>代码包状态</strong></td>\n<td style="text-align:left">需下载/解压 (若无缓存)</td>\n<td style="text-align:left">已在内存中，无需下载</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>运行环境</strong></td>\n<td style="text-align:left">重新创建</td>\n<td style="text-align:left">复用现有实例</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>App 生命周期</strong></td>\n<td style="text-align:left">触发 <code>onLaunch</code> -&gt; <code>onShow</code></td>\n<td style="text-align:left"><strong>仅触发</strong>   <code>onShow</code></td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>Page 生命周期</strong></td>\n<td style="text-align:left">触发 <code>onLoad</code> -&gt; <code>onShow</code> -&gt; <code>onReady</code></td>\n<td style="text-align:left">仅触发 <code>onShow</code> (页面保持原有状态)</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>耗时</strong></td>\n<td style="text-align:left">较慢 (几百毫秒到数秒)</td>\n<td style="text-align:left">极快 (几十毫秒)</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>数据状态</strong></td>\n<td style="text-align:left">初始状态 (全局数据需重新获取)</td>\n<td style="text-align:left"><strong>保留</strong>   上次退出时的状态 (变量、页面数据都在)</td>\n</tr>\n<tr>\n<td style="text-align:left"><strong>用户感知</strong></td>\n<td style="text-align:left">可能有白屏或 Loading</td>\n<td style="text-align:left">瞬间恢复</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>3. 生命周期函数的执行逻辑</h3>\n<p>这是开发者最需要关注的部分，直接影响代码逻辑。</p>\n<h4>冷启动流程</h4>\n<pre><code class="language-javascript"><span class="hljs-comment">// app.js</span>\n<span class="hljs-title class_">App</span>({\n  <span class="hljs-title function_">onLaunch</span>(<span class="hljs-params">options</span>) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;冷启动：执行 onLaunch&quot;</span>);\n    <span class="hljs-comment">// 这里通常做：初始化全局数据、检查更新、登录授权</span>\n  },\n  <span class="hljs-title function_">onShow</span>(<span class="hljs-params">options</span>) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;冷启动：接着执行 onShow&quot;</span>);\n    <span class="hljs-comment">// 这里通常做：获取启动参数、统计埋点</span>\n  },\n});\n\n<span class="hljs-comment">// pages/index/index.js</span>\n<span class="hljs-title class_">Page</span>({\n  <span class="hljs-title function_">onLoad</span>(<span class="hljs-params">options</span>) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;冷启动：页面 onLoad 执行，发起网络请求&quot;</span>);\n    <span class="hljs-comment">// 这里通常做：根据 ID 请求接口数据</span>\n  },\n  <span class="hljs-title function_">onShow</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;冷启动：页面 onShow 执行&quot;</span>);\n  },\n  <span class="hljs-title function_">onReady</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;冷启动：页面渲染完成&quot;</span>);\n  },\n});\n</code></pre>\n<h4>热启动流程</h4>\n<pre><code class="language-javascript"><span class="hljs-comment">// app.js</span>\n<span class="hljs-title class_">App</span>({\n  <span class="hljs-title function_">onLaunch</span>(<span class="hljs-params">options</span>) {\n    <span class="hljs-comment">// ❌ 热启动时 NOT 执行！</span>\n  },\n  <span class="hljs-title function_">onShow</span>(<span class="hljs-params">options</span>) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;热启动：仅执行 onShow&quot;</span>);\n    <span class="hljs-comment">// ⚠️ 注意：此时全局数据可能还是旧数据，可能需要刷新</span>\n  },\n});\n\n<span class="hljs-comment">// pages/index/index.js</span>\n<span class="hljs-title class_">Page</span>({\n  <span class="hljs-title function_">onLoad</span>(<span class="hljs-params">options</span>) {\n    <span class="hljs-comment">// ❌ 热启动时 NOT 执行！页面实例还在，数据还在</span>\n  },\n  <span class="hljs-title function_">onShow</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;热启动：页面 onShow 执行&quot;</span>);\n    <span class="hljs-comment">// ⚠️ 关键点：如果需要最新数据，必须在这里重新请求，而不是在 onLoad</span>\n  },\n  <span class="hljs-title function_">onReady</span>(<span class="hljs-params"></span>) {\n    <span class="hljs-comment">// ❌ 热启动时 NOT 执行！DOM 已经存在</span>\n  },\n});\n</code></pre>\n<hr>\n<h3>4. 开发中的常见坑与最佳实践</h3>\n<h4>坑 1：数据不更新</h4>\n<ul>\n<li><strong>现象</strong>   ：用户在后台挂起时，服务器数据变了。用户热启动回来，发现页面显示的还是旧数据。</li>\n<li><strong>原因</strong>   ：热启动不触发 <code>onLoad</code>，只触发 <code>onShow</code>。如果数据请求写在 <code>onLoad</code> 里，热启动时就不会重新拉取。</li>\n<li><strong>解决</strong>   ：将<strong>关键数据的刷新逻辑</strong>   放在 <code>onShow</code> 中，或者在 <code>onShow</code> 中判断是否需要刷新。<pre><code class="language-javascript"><span class="hljs-title function_">onShow</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-comment">// 每次切入前台都检查是否需要刷新数据</span>\n  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">fetchData</span>();\n}\n</code></pre>\n</li>\n</ul>\n<h4>坑 2：重复执行初始化逻辑</h4>\n<ul>\n<li><strong>现象</strong>   ：每次从后台切回前台，都弹窗提示“登录成功”或重复发送统计请求。</li>\n<li><strong>原因</strong>   ：把逻辑全写在 <code>onShow</code> 里，且没有做防抖或状态判断。</li>\n<li><strong>解决</strong>   ：区分 <code>onLaunch</code> (仅冷启动执行) 和 <code>onShow</code> (每次前台都执行)。\n<ul>\n<li><code>onLaunch</code>: 只做一次性的全局初始化（如检查新版本、静默登录）。</li>\n<li><code>onShow</code>: 做每次可见时的逻辑（如刷新列表、记录访问来源）。</li>\n</ul>\n</li>\n</ul>\n<h4>坑 3：内存泄漏</h4>\n<ul>\n<li><strong>现象</strong>   ：小程序越用越卡，最后崩溃。</li>\n<li><strong>原因</strong>   ：热启动会保留之前的页面栈和变量。如果在页面中注册了全局事件监听、定时器 (<code>setInterval</code>)，且在 <code>onUnload</code> 中没有清除，它们会一直占用内存。</li>\n<li><strong>解决</strong>   ：务必在 <code>onUnload</code> 或 <code>onHide</code> 中清理定时器和事件监听。</li>\n</ul>\n<h4>最佳实践：启动策略优化</h4>\n<ol>\n<li>\n<p><strong>利用 <code>onLaunch</code> 做重型任务</strong>   ：\n只有在冷启动时才执行的逻辑（如下载大包资源、复杂的本地数据库初始化）应放在 <code>onLaunch</code>。</p>\n</li>\n<li>\n<p><strong>利用 <code>onShow</code> 做轻量刷新</strong>   ：\n热启动时，用户期望看到最新内容。在 <code>onShow</code> 中发起轻量级的数据校验或增量更新。</p>\n</li>\n<li>\n<p><strong>处理启动参数 (<code>options</code>)</strong>   ：</p>\n<ul>\n<li><code>onLaunch</code> 和 <code>onShow</code> 都能拿到 <code>options</code> (场景值、query 参数等)。</li>\n<li><strong>注意</strong>   ：热启动时，如果是从微信聊天卡片再次点击进入，<code>onShow</code> 可能会拿到新的 <code>query</code> 参数。需要处理这种“带参唤醒”的逻辑，可能需要根据新参数跳转页面或刷新数据。</li>\n</ul>\n</li>\n<li>\n<p><strong>预加载 (Pre-load)</strong>   ：\n在冷启动的 <code>onLaunch</code> 阶段，就可以并行发起首页所需的网络请求，不要等到 <code>pages/onLoad</code> 再发，这样可以节省一个 RTT (往返时延)，显著提升首屏速度。</p>\n</li>\n</ol>\n<h3>5. 如何模拟测试？</h3>\n<p>在微信开发者工具中：</p>\n<ul>\n<li><strong>模拟冷启动</strong>   ：点击工具栏的 <strong>“编译”</strong>   按钮（默认就是冷启动），或者点击右上角的 <strong>“清空缓存” -&gt; “清除数据缓存”</strong>   后重新编译。</li>\n<li><strong>模拟热启动</strong>   ：\n<ol>\n<li>运行小程序。</li>\n<li>点击开发者工具右上角的 <strong>“后台”</strong>   按钮（模拟按 Home 键）。</li>\n<li>等待片刻（或直接）点击 <strong>“前台”</strong>   按钮。</li>\n<li>观察控制台，你会发现 <code>onLaunch</code> 没有打印，只有 <code>onShow</code> 打印了。</li>\n</ol>\n</li>\n</ul>\n<h3>总结</h3>\n<ul>\n<li><strong>冷启动</strong>   = <strong>重新开张</strong>   （慢，走 <code>onLaunch</code> + <code>onLoad</code>）。</li>\n<li><strong>热启动</strong>   = <strong>暂停恢复</strong>   （快，只走 <code>onShow</code>）。</li>\n<li><strong>核心策略</strong>   ：初始化放 <code>onLaunch</code>，数据刷新和场景处理放 <code>onShow</code>，资源清理放 <code>onUnload</code>。</li>\n</ul>\n</div>'</script></body></html>
