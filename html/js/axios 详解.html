    <article id="article" class="markdown-body"></article>
  

<script>
            document.getElementById('article').innerHTML = 
            "<div><p>Axios 是一个基于 Promise 的 HTTP 客户端，用于浏览器和 Node.js，是目前最流行的前端 HTTP 请求库之一。它支持 请求/响应拦截、取消请求、自动转换 JSON 数据、CSRF 防御 等功能。</p>\n<hr>\n<p><strong>1. 安装 Axios</strong><br>\n<strong>(1) 浏览器端（CDN）</strong></p>\n<pre><code class=\"language-html\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span> <span class=\"hljs-attr\">src</span>=<span class=\"hljs-string\">&quot;https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js&quot;</span>&gt;</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n</code></pre>\n<p><strong>(2) npm / yarn</strong></p>\n<pre><code class=\"language-sh\">npm install axios\n<span class=\"hljs-comment\"># 或</span>\nyarn add axios\n</code></pre>\n<p><strong>(3) 在项目中使用</strong></p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">import</span> axios <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">&#x27;axios&#x27;</span>; <span class=\"hljs-comment\">// ES6</span>\n<span class=\"hljs-keyword\">const</span> axios = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">&#x27;axios&#x27;</span>); <span class=\"hljs-comment\">// CommonJS</span>\n</code></pre>\n<hr>\n<p><strong>2. 基本用法</strong><br>\n<strong>(1) GET 请求</strong></p>\n<pre><code class=\"language-javascript\">axios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/users&#x27;</span>)\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">response</span> =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(response.<span class=\"hljs-property\">data</span>); <span class=\"hljs-comment\">// 返回的数据</span>\n  })\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">error</span> =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;请求失败:&#x27;</span>, error);\n  });\n</code></pre>\n<p><strong>(2) POST 请求</strong></p>\n<pre><code class=\"language-javascript\">axios.<span class=\"hljs-title function_\">post</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/users&#x27;</span>, {\n  <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&#x27;John&#x27;</span>,\n  <span class=\"hljs-attr\">age</span>: <span class=\"hljs-number\">30</span>\n})\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">response</span> =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(response.<span class=\"hljs-property\">data</span>);\n  })\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">error</span> =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;请求失败:&#x27;</span>, error);\n  });\n</code></pre>\n<p><strong>(3) 并发请求（<code>axios.all</code> + <code>axios.spread</code>）</strong></p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> getUser = axios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/users/1&#x27;</span>);\n<span class=\"hljs-keyword\">const</span> getPosts = axios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&#x27;https://api.example.com/posts?userId=1&#x27;</span>);\n\naxios.<span class=\"hljs-title function_\">all</span>([getUser, getPosts])\n  .<span class=\"hljs-title function_\">then</span>(axios.<span class=\"hljs-title function_\">spread</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">userResponse, postsResponse</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;用户数据:&#x27;</span>, userResponse.<span class=\"hljs-property\">data</span>);\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;帖子数据:&#x27;</span>, postsResponse.<span class=\"hljs-property\">data</span>);\n  }))\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">error</span> =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">&#x27;并发请求失败:&#x27;</span>, error);\n  });\n</code></pre>\n<hr>\n<p><strong>3. Axios 配置</strong><br>\n<strong>(1) 全局默认配置</strong></p>\n<pre><code class=\"language-javascript\">axios.<span class=\"hljs-property\">defaults</span>.<span class=\"hljs-property\">baseURL</span> = <span class=\"hljs-string\">&#x27;https://api.example.com&#x27;</span>;\naxios.<span class=\"hljs-property\">defaults</span>.<span class=\"hljs-property\">timeout</span> = <span class=\"hljs-number\">5000</span>; <span class=\"hljs-comment\">// 5秒超时</span>\naxios.<span class=\"hljs-property\">defaults</span>.<span class=\"hljs-property\">headers</span>.<span class=\"hljs-property\">common</span>[<span class=\"hljs-string\">&#x27;Authorization&#x27;</span>] = <span class=\"hljs-string\">&#x27;Bearer token123&#x27;</span>;\n</code></pre>\n<p><strong>(2) 实例化自定义配置</strong></p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> api = axios.<span class=\"hljs-title function_\">create</span>({\n  <span class=\"hljs-attr\">baseURL</span>: <span class=\"hljs-string\">&#x27;https://api.example.com&#x27;</span>,\n  <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">3000</span>,\n  <span class=\"hljs-attr\">headers</span>: { <span class=\"hljs-string\">&#x27;X-Custom-Header&#x27;</span>: <span class=\"hljs-string\">&#x27;foobar&#x27;</span> }\n});\n\napi.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&#x27;/users&#x27;</span>).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">response</span> =&gt;</span> { ... });\n</code></pre>\n<p><strong>(3) 请求级别配置</strong></p>\n<pre><code class=\"language-javascript\">axios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&#x27;/users&#x27;</span>, {\n  <span class=\"hljs-attr\">params</span>: { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">1</span> }, <span class=\"hljs-comment\">// 查询参数</span>\n  <span class=\"hljs-attr\">headers</span>: { <span class=\"hljs-string\">&#x27;X-Requested-With&#x27;</span>: <span class=\"hljs-string\">&#x27;XMLHttpRequest&#x27;</span> },\n  <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">2000</span>,\n  <span class=\"hljs-attr\">responseType</span>: <span class=\"hljs-string\">&#x27;json&#x27;</span> <span class=\"hljs-comment\">// 默认是 &#x27;json&#x27;，也可以是 &#x27;arraybuffer&#x27;, &#x27;blob&#x27;, &#x27;document&#x27;, &#x27;text&#x27;</span>\n})\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">response</span> =&gt;</span> { ... });\n</code></pre>\n<hr>\n<p><strong>4. 拦截器（Interceptors）</strong><br>\n<strong>(1) 请求拦截器</strong></p>\n<pre><code class=\"language-javascript\">axios.<span class=\"hljs-property\">interceptors</span>.<span class=\"hljs-property\">request</span>.<span class=\"hljs-title function_\">use</span>(\n  <span class=\"hljs-function\"><span class=\"hljs-params\">config</span> =&gt;</span> {\n    <span class=\"hljs-comment\">// 在发送请求前修改配置（如添加 token）</span>\n    config.<span class=\"hljs-property\">headers</span>.<span class=\"hljs-property\">Authorization</span> = <span class=\"hljs-string\">&#x27;Bearer token123&#x27;</span>;\n    <span class=\"hljs-keyword\">return</span> config;\n  },\n  <span class=\"hljs-function\"><span class=\"hljs-params\">error</span> =&gt;</span> {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">reject</span>(error);\n  }\n);\n</code></pre>\n<p><strong>(2) 响应拦截器</strong></p>\n<pre><code class=\"language-javascript\">axios.<span class=\"hljs-property\">interceptors</span>.<span class=\"hljs-property\">response</span>.<span class=\"hljs-title function_\">use</span>(\n  <span class=\"hljs-function\"><span class=\"hljs-params\">response</span> =&gt;</span> {\n    <span class=\"hljs-comment\">// 对响应数据做处理（如统一错误码）</span>\n    <span class=\"hljs-keyword\">if</span> (response.<span class=\"hljs-property\">data</span>.<span class=\"hljs-property\">code</span> !== <span class=\"hljs-number\">200</span>) {\n      <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">reject</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">&#x27;请求失败&#x27;</span>));\n    }\n    <span class=\"hljs-keyword\">return</span> response.<span class=\"hljs-property\">data</span>;\n  },\n  <span class=\"hljs-function\"><span class=\"hljs-params\">error</span> =&gt;</span> {\n    <span class=\"hljs-comment\">// 处理 HTTP 错误（如 401、404、500）</span>\n    <span class=\"hljs-keyword\">if</span> (error.<span class=\"hljs-property\">response</span>.<span class=\"hljs-property\">status</span> === <span class=\"hljs-number\">401</span>) {\n      <span class=\"hljs-title function_\">alert</span>(<span class=\"hljs-string\">&#x27;请登录！&#x27;</span>);\n    }\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">reject</span>(error);\n  }\n);\n</code></pre>\n<hr>\n<p><strong>5. 取消请求</strong><br>\n<strong>(1) 使用 <code>CancelToken</code>（旧版）</strong></p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> source = axios.<span class=\"hljs-property\">CancelToken</span>.<span class=\"hljs-title function_\">source</span>();\n\naxios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&#x27;/users&#x27;</span>, {\n  <span class=\"hljs-attr\">cancelToken</span>: source.<span class=\"hljs-property\">token</span>\n})\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">response</span> =&gt;</span> { ... })\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">error</span> =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (axios.<span class=\"hljs-title function_\">isCancel</span>(error)) {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;请求被取消:&#x27;</span>, error.<span class=\"hljs-property\">message</span>);\n    }\n  });\n\n<span class=\"hljs-comment\">// 取消请求</span>\nsource.<span class=\"hljs-title function_\">cancel</span>(<span class=\"hljs-string\">&#x27;用户手动取消&#x27;</span>);\n</code></pre>\n<p><strong>(2) 使用 <code>AbortController</code>（新版推荐）</strong></p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> controller = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">AbortController</span>();\n\naxios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&#x27;/users&#x27;</span>, {\n  <span class=\"hljs-attr\">signal</span>: controller.<span class=\"hljs-property\">signal</span>\n})\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">response</span> =&gt;</span> { ... })\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">error</span> =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (error.<span class=\"hljs-property\">name</span> === <span class=\"hljs-string\">&#x27;CanceledError&#x27;</span>) {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;请求被取消&#x27;</span>);\n    }\n  });\n\n<span class=\"hljs-comment\">// 取消请求</span>\ncontroller.<span class=\"hljs-title function_\">abort</span>();\n</code></pre>\n<hr>\n<p><strong>6. 错误处理</strong></p>\n<pre><code class=\"language-javascript\">axios.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">&#x27;/users&#x27;</span>)\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">response</span> =&gt;</span> { ... })\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">error</span> =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (error.<span class=\"hljs-property\">response</span>) {\n      <span class=\"hljs-comment\">// 服务器返回错误（如 404、500）</span>\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;HTTP 错误:&#x27;</span>, error.<span class=\"hljs-property\">response</span>.<span class=\"hljs-property\">status</span>);\n    } <span class=\"hljs-keyword\">else</span> <span class=\"hljs-keyword\">if</span> (error.<span class=\"hljs-property\">request</span>) {\n      <span class=\"hljs-comment\">// 请求已发送但无响应（如网络错误）</span>\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;网络错误:&#x27;</span>, error.<span class=\"hljs-property\">message</span>);\n    } <span class=\"hljs-keyword\">else</span> {\n      <span class=\"hljs-comment\">// 其他错误（如配置错误）</span>\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;请求配置错误:&#x27;</span>, error.<span class=\"hljs-property\">message</span>);\n    }\n  });\n</code></pre>\n<hr>\n<p><strong>7. 文件上传</strong></p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">const</span> formData = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">FormData</span>();\nformData.<span class=\"hljs-title function_\">append</span>(<span class=\"hljs-string\">&#x27;file&#x27;</span>, fileInput.<span class=\"hljs-property\">files</span>[<span class=\"hljs-number\">0</span>]);\n\naxios.<span class=\"hljs-title function_\">post</span>(<span class=\"hljs-string\">&#x27;/upload&#x27;</span>, formData, {\n  <span class=\"hljs-attr\">headers</span>: { <span class=\"hljs-string\">&#x27;Content-Type&#x27;</span>: <span class=\"hljs-string\">&#x27;multipart/form-data&#x27;</span> }\n})\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">response</span> =&gt;</span> { ... });\n</code></pre>\n<hr>\n<p><strong>8. 总结</strong></p>\n<table>\n<thead>\n<tr>\n<th>功能</th>\n<th>Axios 方法</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>GET 请求</td>\n<td><code>axios.get(url[, config])</code></td>\n</tr>\n<tr>\n<td>POST 请求</td>\n<td><code>axios.post(url, data[, config])</code></td>\n</tr>\n<tr>\n<td>并发请求</td>\n<td><code>axios.all([request1, request2])</code></td>\n</tr>\n<tr>\n<td>全局配置</td>\n<td><code>axios.defaults.baseURL = '...'</code></td>\n</tr>\n<tr>\n<td>拦截器</td>\n<td><code>axios.interceptors.request.use()</code></td>\n</tr>\n<tr>\n<td>取消请求</td>\n<td><code>AbortController</code>（推荐）或 <code>CancelToken</code></td>\n</tr>\n<tr>\n<td>错误处理</td>\n<td><code>.catch(error =&gt; { ... })</code></td>\n</tr>\n<tr>\n<td>文件上传</td>\n<td><code>FormData</code> + <code>multipart/form-data</code></td>\n</tr>\n</tbody>\n</table>\n<p>Axios 是前端开发中最强大的 HTTP 客户端之一，适用于 REST API、文件上传、拦截器管理、错误处理 等场景。推荐结合 拦截器 和 AbortController 优化请求管理。 🚀</p>\n</div>";
          </script></body></html>
