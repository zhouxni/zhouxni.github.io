pan>,\n  <span class="hljs-attr">b</span>: <span class="hljs-title class_">Map</span>({ <span class="hljs-attr">c</span>: <span class="hljs-number">2</span>, <span class="hljs-attr">d</span>: <span class="hljs-number">3</span> }), <span class="hljs-comment">// 子节点</span>\n});\n\n<span class="hljs-comment">// 只修改最深层的 d 属性</span>\n<span class="hljs-keyword">const</span> updated = original.<span class="hljs-title function_">setIn</span>([<span class="hljs-string">&quot;b&quot;</span>, <span class="hljs-string">&quot;d&quot;</span>], <span class="hljs-number">99</span>);\n\n<span class="hljs-comment">// 🔥 关键结论</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(original === updated); <span class="hljs-comment">// false → 根节点是全新的！</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(original.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;b&quot;</span>) === updated.<span class="hljs-title function_">get</span>(<span class="hljs-string">&quot;b&quot;</span>)); <span class="hljs-comment">// false → 修改路径节点新建</span>\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(original.<span class="hljs-title function_">getIn</span>([<span class="hljs-string">&quot;b&quot;</span>, <span class="hljs-string">&quot;c&quot;</span>]) === updated.<span class="hljs-title function_">getIn</span>([<span class="hljs-string">&quot;b&quot;</span>, <span class="hljs-string">&quot;c&quot;</span>])); <span class="hljs-comment">// true → 未修改节点完全复用</span>\n</code></pre>\n<hr>\n<h2>为什么必须保证根节点是新的？</h2>\n<ol>\n<li><strong>引用判断极简</strong>   ：只需用 <code>===</code> 比较根引用，就能快速知道数据是否变化（React 性能优化核心）</li>\n<li><strong>不可变性保障</strong>   ：永远不会意外修改原始数据，所有变更都产生新数据，无副作用</li>\n<li><strong>可预测性</strong>   ：数据变更链路清晰，调试、回溯更简单</li>\n</ol>\n<hr>\n<h3>总结</h3>\n<ol>\n<li><strong>根节点 100% 是新的</strong>   ：任何修改操作都会返回全新根引用</li>\n<li><strong>子节点 部分新、部分共享</strong>   ：仅修改路径新建，未修改分支完全复用</li>\n<li><strong>核心价值</strong>   ：用最小性能成本实现了真正的不可变性</li>\n</ol>\n<p>这也是 Immutable.js 能完美适配 React、Redux 等框架的核心原因。</p>\n</div>'</script></body></html>
