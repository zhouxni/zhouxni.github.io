限、网络限速</strong>   。</li>\n<li><strong>无头/有头、CI 友好</strong><br>\n默认<strong>无头模式</strong>   （快、无界面），也可开浏览器；<strong>原生支持并行、重试、报告</strong>   。</li>\n</ol>\n<hr>\n<h3>三、核心概念（层级模型）</h3>\n<p>从外到内：<strong>Playwright → Browser → BrowserContext → Page → Frame → Element</strong></p>\n<table>\n<thead>\n<tr>\n<th>概念</th>\n<th>作用</th>\n<th>类比</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Playwright</strong></td>\n<td>入口，管理浏览器实例</td>\n<td>浏览器管理器</td>\n</tr>\n<tr>\n<td><strong>Browser</strong></td>\n<td>单个浏览器进程（如 Chromium）</td>\n<td>Chrome 窗口</td>\n</tr>\n<tr>\n<td><strong>BrowserContext</strong></td>\n<td>独立上下文（隔离 cookie/存储）</td>\n<td>无痕窗口</td>\n</tr>\n<tr>\n<td><strong>Page</strong></td>\n<td>单个标签页/窗口</td>\n<td>浏览器标签</td>\n</tr>\n<tr>\n<td><strong>Frame</strong></td>\n<td>页面内 iframe</td>\n<td>内嵌网页</td>\n</tr>\n<tr>\n<td><strong>Element</strong></td>\n<td>页面元素（按钮/输入框）</td>\n<td>网页控件</td>\n</tr>\n</tbody>\n</table>\n<p>关键：<strong>Context 级隔离</strong>   ，每个测试用独立 Context，<strong>用后即销毁</strong>   ，彻底避免用例污染。</p>\n<hr>\n<h3>四、安装（以 Node.js 为例）</h3>\n<h4>1. 初始化项目（推荐）</h4>\n<pre><code class="language-bash">npm init playwright@latest\n</code></pre>\n<p>交互式选择：TS/JS、测试目录、是否加 GitHub Actions、是否装浏览器。</p>\n<h4>2. 手动安装</h4>\n<pre><code class="language-bash"><span class="hljs-comment"># 安装库</span>\nnpm i playwright\n<span class="hljs-comment"># 安装浏览器（Chromium/Firefox/WebKit）</span>\nnpx playwright install\n</code></pre>\n<h4>3. Python 安装</h4>\n<pre><code class="language-bash">pip install playwright\nplaywright install\n</code></pre>\n<hr>\n<h3>五、快速上手（示例：百度搜索）</h3>\n<h4>TypeScript 示例（同步风格）</h4>\n<pre><code class="language-typescript"><span class="hljs-keyword">import</span> { test, expect } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@playwright/test&quot;</span>;\n\n<span class="hljs-title function_">test</span>(<span class="hljs-string">&quot;百度搜索 Playwright&quot;</span>, <span class="hljs-title function_">async</span> ({ page }) =&gt; {\n  <span class="hljs-comment">// 1. 访问页面</span>\n  <span class="hljs-keyword">await</span> page.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;https://www.baidu.com&quot;</span>);\n\n  <span class="hljs-comment">// 2. 定位输入框并输入</span>\n  <span class="hljs-keyword">await</span> page.<span class="hljs-title function_">fill</span>(<span class="hljs-string">&quot;#kw&quot;</span>, <span class="hljs-string">&quot;Playwright 详解&quot;</span>);\n\n  <span class="hljs-comment">// 3. 点击搜索按钮</span>\n  <span class="hljs-keyword">await</span> page.<span class="hljs-title function_">click</span>(<span class="hljs-string">&quot;#su&quot;</span>);\n\n  <span class="hljs-comment">// 4. 断言：标题包含关键词</span>\n  <span class="hljs-keyword">await</span> <span class="hljs-title function_">expect</span>(page).<span class="hljs-title function_">toHaveTitle</span>(<span class="hljs-regexp">/Playwright 详解/</span>);\n\n  <span class="hljs-comment">// 5. 截图</span>\n  <span class="hljs-keyword">await</span> page.<span class="hljs-title function_">screenshot</span>({ <span class="hljs-attr">path</span>: <span class="hljs-string">&quot;baidu.png&quot;</span> });\n});\n</code></pre>\n<h4>运行测试</h4>\n<pre><code class="language-bash"><span class="hljs-comment"># 所有浏览器</span>\nnpx playwright <span class="hljs-built_in">test</span>\n<span class="hljs-comment"># 仅 Chromium</span>\nnpx playwright <span class="hljs-built_in">test</span> --project=chromium\n<span class="hljs-comment"># 有头模式（看浏览器）</span>\nnpx playwright <span class="hljs-built_in">test</span> --headed\n<span class="hljs-comment"># 调试模式</span>\nnpx playwright <span class="hljs-built_in">test</span> --debug\n</code></pre>\n<hr>\n<h3>六、核心 API 详解</h3>\n<h4>1. 浏览器与上下文</h4>\n<pre><code class="language-typescript"><span class="hljs-comment">// 启动浏览器</span>\n<span class="hljs-keyword">const</span> browser = <span class="hljs-keyword">await</span> playwright.<span class="hljs-property">chromium</span>.<span class="hljs-title function_">launch</span>({\n  <span class="hljs-attr">headless</span>: <span class="hljs-literal">false</span>, <span class="hljs-comment">// 有头模式</span>\n  <span class="hljs-attr">slowMo</span>: <span class="hljs-number">500</span>, <span class="hljs-comment">// 每个操作延迟 500ms（调试用）</span>\n});\n<span class="hljs-comment">// 创建上下文（独立会话）</span>\n<span class="hljs-keyword">const</span> context = <span class="hljs-keyword">await</span> browser.<span class="hljs-title function_">newContext</span>({\n  <span class="hljs-attr">viewport</span>: { <span class="hljs-attr">width</span>: <span class="hljs-number">1280</span>, <span class="hljs-attr">height</span>: <span class="hljs-number">720</span> }, <span class="hljs-comment">// 视口</span>\n  <span class="hljs-attr">userAgent</span>: <span class="hljs-string">&quot;My Agent&quot;</span>, <span class="hljs-comment">// UA</span>\n  <span class="hljs-attr">geolocation</span>: { <span class="hljs-attr">latitude</span>: <span class="hljs-number">39.9</span>, <span class="hljs-attr">longitude</span>: <span class="hljs-number">116.4</span> }, <span class="hljs-comment">// 地理</span>\n});\n<span class="hljs-comment">// 新建页面</span>\n<span class="hljs-keyword">const</span> page = <span class="hljs-keyword">await</span> context.<span class="hljs-title function_">newPage</span>();\n</code></pre>\n<h4>2. 元素定位（Locator，推荐）</h4>\n<p><strong>Locator 是 Playwright 核心</strong>   ，比 <code>$</code>/<code>$$</code> 更稳定，<strong>自动等待、自动重试</strong>   。</p>\n<pre><code class="language-typescript"><span class="hljs-comment">// 基础定位</span>\n<span class="hljs-keyword">const</span> searchInput = page.<span class="hljs-title function_">locator</span>(<span class="hljs-string">&quot;#kw&quot;</span>); <span class="hljs-comment">// ID</span>\n<span class="hljs-keyword">const</span> searchBtn = page.<span class="hljs-title function_">locator</span>(<span class="hljs-string">&quot;text=百度一下&quot;</span>); <span class="hljs-comment">// 文本</span>\n<span class="hljs-keyword">const</span> menu = page.<span class="hljs-title function_">locator</span>(<span class="hljs-string">&quot;.nav-item&quot;</span>); <span class="hljs-comment">// CSS</span>\n<span class="hljs-keyword">const</span> link = page.<span class="hljs-title function_">locator</span>(<span class="hljs-string">&#x27;a[href*=&quot;about&quot;]&#x27;</span>); <span class="hljs-comment">// 属性包含</span>\n\n<span class="hljs-comment">// 链式定位（父子）</span>\n<span class="hljs-keyword">const</span> item = page.<span class="hljs-title function_">locator</span>(<span class="hljs-string">&quot;.list&quot;</span>).<span class="hljs-title function_">locator</span>(<span class="hljs-string">&quot;.item&quot;</span>);\n\n<span class="hljs-comment">// 过滤定位</span>\n<span class="hljs-keyword">const</span> activeItem = page.<span class="hljs-title function_">locator</span>(<span class="hljs-string">&quot;.item&quot;</span>).<span class="hljs-title function_">filter</span>({ <span class="hljs-attr">hasClass</span>: <span class="hljs-string">&quot;active&quot;</span> });\n\n<span class="hljs-comment">// 断言</span>\n<span class="hljs-keyword">await</span> <span class="hljs-title function_">expect</span>(searchInput).<span class="hljs-title function_">toBeVisible</span>();\n<span class="hljs-keyword">await</span> <span class="hljs-title function_">expect</span>(searchBtn).<span class="hljs-title function_">toHaveText</span>(<span class="hljs-string">&quot;百度一下&quot;</span>);\n</code></pre>\n<h4>3. 常用操作</h4>\n<pre><code class="language-typescript"><span class="hljs-comment">// 导航</span>\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;https://example.com&quot;</span>);\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">goBack</span>();\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">reload</span>();\n\n<span class="hljs-comment">// 输入/点击</span>\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">fill</span>(<span class="hljs-string">&quot;#username&quot;</span>, <span class="hljs-string">&quot;test&quot;</span>);\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">type</span>(<span class="hljs-string">&quot;#password&quot;</span>, <span class="hljs-string">&quot;123456&quot;</span>); <span class="hljs-comment">// 逐字符输入</span>\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">click</span>(<span class="hljs-string">&quot;#submit&quot;</span>);\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">dblclick</span>(<span class="hljs-string">&quot;#edit&quot;</span>);\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">hover</span>(<span class="hljs-string">&quot;#menu&quot;</span>);\n\n<span class="hljs-comment">// 选择/上传</span>\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">selectOption</span>(<span class="hljs-string">&quot;#city&quot;</span>, <span class="hljs-string">&quot;北京&quot;</span>);\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">setInputFiles</span>(<span class="hljs-string">&quot;#file&quot;</span>, <span class="hljs-string">&quot;test.jpg&quot;</span>);\n\n<span class="hljs-comment">// 键盘/鼠标</span>\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">press</span>(<span class="hljs-string">&quot;Enter&quot;</span>);\n<span class="hljs-keyword">await</span> page.<span class="hljs-property">mouse</span>.<span class="hljs-title function_">click</span>(<span class="hljs-number">100</span>, <span class="hljs-number">200</span>);\n\n<span class="hljs-comment">// 等待（极少用，自动等待优先）</span>\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">waitForURL</span>(<span class="hljs-string">&quot;**/result&quot;</span>);\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">waitForSelector</span>(<span class="hljs-string">&quot;.result&quot;</span>);\n</code></pre>\n<h4>4. 网络拦截与模拟</h4>\n<pre><code class="language-typescript"><span class="hljs-comment">// 拦截所有请求</span>\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">route</span>(<span class="hljs-string">&quot;**/*.png&quot;</span>, <span class="hljs-function">(<span class="hljs-params">route</span>) =&gt;</span> route.<span class="hljs-title function_">abort</span>()); <span class="hljs-comment">// 阻止图片</span>\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">route</span>(<span class="hljs-string">&quot;**/api/*&quot;</span>, <span class="hljs-function">(<span class="hljs-params">route</span>) =&gt;</span> {\n  route.<span class="hljs-title function_">fulfill</span>({\n    <span class="hljs-attr">status</span>: <span class="hljs-number">200</span>,\n    <span class="hljs-attr">json</span>: { <span class="hljs-attr">data</span>: <span class="hljs-string">&quot;mock&quot;</span> },\n  });\n});\n</code></pre>\n<h4>5. 截图/视频/跟踪</h4>\n<pre><code class="language-typescript"><span class="hljs-comment">// 截图</span>\n<span class="hljs-keyword">await</span> page.<span class="hljs-title function_">screenshot</span>({ <span class="hljs-attr">path</span>: <span class="hljs-string">&quot;s.png&quot;</span>, <span class="hljs-attr">fullPage</span>: <span class="hljs-literal">true</span> });\n<span class="hljs-comment">// 视频（上下文级别）</span>\n<span class="hljs-keyword">const</span> context = <span class="hljs-keyword">await</span> browser.<span class="hljs-title function_">newContext</span>({ <span class="hljs-attr">recordVideo</span>: { <span class="hljs-attr">dir</span>: <span class="hljs-string">&quot;videos/&quot;</span> } });\n<span class="hljs-comment">// 跟踪（Trace，强力调试）</span>\n<span class="hljs-keyword">await</span> context.<span class="hljs-property">tracing</span>.<span class="hljs-title function_">start</span>({ <span class="hljs-attr">screenshots</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">snapshots</span>: <span class="hljs-literal">true</span> });\n<span class="hljs-comment">// ... 操作 ...</span>\n<span class="hljs-keyword">await</span> context.<span class="hljs-property">tracing</span>.<span class="hljs-title function_">stop</span>({ <span class="hljs-attr">path</span>: <span class="hljs-string">&quot;trace.zip&quot;</span> });\n<span class="hljs-comment">// 查看：npx playwright show-trace trace.zip</span>\n</code></pre>\n<hr>\n<h3>七、测试配置（playwright.config.ts）</h3>\n<pre><code class="language-typescript"><span class="hljs-keyword">import</span> { defineConfig } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@playwright/test&quot;</span>;\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-title function_">defineConfig</span>({\n  <span class="hljs-attr">testDir</span>: <span class="hljs-string">&quot;./tests&quot;</span>, <span class="hljs-comment">// 测试目录</span>\n  <span class="hljs-attr">timeout</span>: <span class="hljs-number">30</span> * <span class="hljs-number">1000</span>, <span class="hljs-comment">// 超时</span>\n  <span class="hljs-attr">retries</span>: <span class="hljs-number">2</span>, <span class="hljs-comment">// 失败重试</span>\n  <span class="hljs-attr">workers</span>: <span class="hljs-number">4</span>, <span class="hljs-comment">// 并行数</span>\n  <span class="hljs-attr">reporter</span>: <span class="hljs-string">&quot;html&quot;</span>, <span class="hljs-comment">// 报告类型</span>\n  <span class="hljs-attr">projects</span>: [\n    {\n      <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;chromium&quot;</span>,\n      <span class="hljs-attr">use</span>: { <span class="hljs-attr">browserName</span>: <span class="hljs-string">&quot;chromium&quot;</span> },\n    },\n    {\n      <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;firefox&quot;</span>,\n      <span class="hljs-attr">use</span>: { <span class="hljs-attr">browserName</span>: <span class="hljs-string">&quot;firefox&quot;</span> },\n    },\n    {\n      <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;webkit&quot;</span>,\n      <span class="hljs-attr">use</span>: { <span class="hljs-attr">browserName</span>: <span class="hljs-string">&quot;webkit&quot;</span> },\n    },\n  ],\n});\n</code></pre>\n<hr>\n<h3>八、调试技巧</h3>\n<ol>\n<li><strong>Codegen 录制</strong></li>\n</ol>\n<pre><code class="language-bash">npx playwright codegen https://www.baidu.com\n</code></pre>\n<p>操作浏览器，<strong>自动生成定位与操作代码</strong>   ，直接复制用。2. <strong>Debug 模式</strong></p>\n<pre><code class="language-bash">npx playwright <span class="hljs-built_in">test</span> --debug\n</code></pre>\n<p>打开调试窗口，<strong>断点、单步、查看元素、网络</strong>   。3. <strong>Trace 跟踪</strong><br>\n测试失败自动生成 <code>trace.zip</code>，用 <code>show-trace</code> 查看<strong>完整操作回放、元素快照、网络请求</strong>   。</p>\n<hr>\n<h3>九、与 Selenium 对比</h3>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th>Playwright</th>\n<th>Selenium</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>通信协议</td>\n<td>原生 DevTools</td>\n<td>WebDriver（中间层）</td>\n</tr>\n<tr>\n<td>自动等待</td>\n<td>✅ 内置</td>\n<td>❌ 需手动写 wait</td>\n</tr>\n<tr>\n<td>驱动管理</td>\n<td>✅ 内置浏览器</td>\n<td>❌ 需手动下载驱动</td>\n</tr>\n<tr>\n<td>稳定性</td>\n<td>高</td>\n<td>中（易受时序影响）</td>\n</tr>\n<tr>\n<td>执行速度</td>\n<td>快</td>\n<td>较慢</td>\n</tr>\n<tr>\n<td>移动端模拟</td>\n<td>✅ 内置设备</td>\n<td>❌ 依赖 Appium</td>\n</tr>\n<tr>\n<td>调试工具</td>\n<td>丰富（Trace/Codegen）</td>\n<td>基础</td>\n</tr>\n</tbody>\n</table>\n<p>结论：<strong>新项目优先 Playwright</strong>   ，老项目可逐步迁移。</p>\n<hr>\n<h3>十、适用场景</h3>\n<ul>\n<li>✅ Web 端到端测试（E2E）</li>\n<li>✅ 跨浏览器兼容性测试</li>\n<li>✅ 爬虫（稳定抓取动态内容）</li>\n<li>✅ 网页截图/PDF 生成</li>\n<li>✅ 自动化表单提交、数据录入</li>\n<li>✅ 移动端 Web 测试</li>\n</ul>\n<hr>\n<h3>十一、学习路径</h3>\n<ol>\n<li>安装并跑通官方示例</li>\n<li>掌握 <strong>Locator</strong>   定位与断言</li>\n<li>学习 <strong>Page/Context</strong>   生命周期</li>\n<li>实践 <strong>网络拦截、设备模拟、调试工具</strong></li>\n<li>集成 CI/CD（GitHub Actions/Jenkins）</li>\n</ol>\n</div>'</script></body></html>
