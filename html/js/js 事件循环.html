  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
        document.getElementById('article').innerHTML = 
        "<div><p>JavaScript 是单线程的编程语言，这意味着它一次只能执行一个任务。事件循环（Event Loop）是 JavaScript 实现异步编程的核心机制，它使得 JavaScript 可以在处理异步操作时不会阻塞主线程。下面详细介绍事件循环的相关概念、工作原理和执行过程。</p>\n<h3>相关概念</h3>\n<h4>1. 调用栈（Call Stack）</h4>\n<p>调用栈是一个栈结构，用于记录函数的调用顺序。当调用一个函数时，该函数会被压入栈顶；当函数执行完毕后，会从栈顶弹出。调用栈遵循后进先出（LIFO）的原则。</p>\n<h4>2. 任务队列（Task Queue）</h4>\n<p>任务队列是一个先进先出（FIFO）的队列，用于存放异步任务完成后的回调函数。任务队列分为宏任务队列（Macro Task Queue）和微任务队列（Micro Task Queue）。</p>\n<ul>\n<li><strong>宏任务</strong>  ：常见的宏任务有 <code>setTimeout</code>、<code>setInterval</code>、<code>setImmediate</code>（Node.js 环境）、<code>requestAnimationFrame</code>（浏览器环境）等。</li>\n<li><strong>微任务</strong>  ：常见的微任务有 <code>Promise.then</code>、<code>MutationObserver</code>（浏览器环境）、<code>process.nextTick</code>（Node.js 环境）等。</li>\n</ul>\n<h4>3. 事件循环（Event Loop）</h4>\n<p>事件循环是一个不断循环的过程，它负责从任务队列中取出任务并将其放入调用栈中执行。</p>\n<h3>工作原理</h3>\n<p>事件循环的工作原理可以概括为以下几个步骤：</p>\n<ol>\n<li><strong>执行同步代码</strong>  ：JavaScript 引擎首先会执行调用栈中的同步代码，将函数依次压入和弹出调用栈。</li>\n<li><strong>处理异步任务</strong>  ：当遇到异步任务（如 <code>setTimeout</code>、<code>Promise</code> 等）时，这些任务会被放入相应的任务队列中等待执行。</li>\n<li><strong>检查微任务队列</strong>  ：当调用栈为空时，事件循环会首先检查微任务队列。如果微任务队列中有任务，则依次将微任务从队列中取出并放入调用栈中执行，直到微任务队列为空。</li>\n<li><strong>检查宏任务队列</strong>  ：当微任务队列为空后，事件循环会从宏任务队列中取出一个任务放入调用栈中执行。执行完该宏任务后，再次检查微任务队列，重复步骤 3 和 4。</li>\n</ol>\n<h3>执行过程示例</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;1. 同步代码开始&#x27;</span>);\n\n<span class=\"hljs-comment\">// 宏任务</span>\n<span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;4. setTimeout 回调执行&#x27;</span>);\n}, <span class=\"hljs-number\">0</span>);\n\n<span class=\"hljs-comment\">// 微任务</span>\n<span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">resolve</span>().<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;3. Promise 微任务执行&#x27;</span>);\n});\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">&#x27;2. 同步代码结束&#x27;</span>);\n</code></pre>\n<p>上述代码的执行过程如下：</p>\n<ol>\n<li>执行同步代码，打印 <code>1. 同步代码开始</code> 和 <code>2. 同步代码结束</code>。</li>\n<li><code>setTimeout</code> 是宏任务，将其回调函数放入宏任务队列中。</li>\n<li><code>Promise.resolve().then</code> 是微任务，将其回调函数放入微任务队列中。</li>\n<li>调用栈为空，事件循环首先检查微任务队列，取出 <code>Promise</code> 的回调函数放入调用栈中执行，打印 <code>3. Promise 微任务执行</code>。</li>\n<li>微任务队列为空，事件循环从宏任务队列中取出 <code>setTimeout</code> 的回调函数放入调用栈中执行，打印 <code>4. setTimeout 回调执行</code>。</li>\n</ol>\n<h3>浏览器环境和 Node.js 环境的差异</h3>\n<ul>\n<li><strong>浏览器环境</strong>  ：事件循环主要处理宏任务和微任务，宏任务队列和微任务队列的处理顺序如上述所述。</li>\n<li><strong>Node.js 环境</strong>  ：Node.js 的事件循环有更复杂的阶段，包括 <code>timers</code>、<code>I/O callbacks</code>、<code>idle, prepare</code>、<code>poll</code>、<code>check</code>、<code>close callbacks</code> 等。在每个阶段，事件循环会处理相应的任务队列。同时，Node.js 还有 <code>process.nextTick</code> 这种特殊的微任务，它会在每个阶段结束后立即执行。</li>\n</ul>\n<p>通过事件循环机制，JavaScript 可以在单线程的情况下高效地处理异步操作，避免了阻塞主线程，提高了程序的性能和响应能力。</p>\n</div>";
      </script></body></html>
