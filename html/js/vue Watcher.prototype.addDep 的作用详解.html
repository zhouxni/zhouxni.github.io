<script>
      document.title = 'vue Watcher.prototype.addDep 的作用详解'
        document.getElementById('article').innerHTML = 
        "<div><p><code>Watcher.prototype.addDep</code> 是 Vue 响应式系统中一个关键方法，它负责建立 Watcher 和 Dep 之间的双向依赖关系。以下是其核心作用的全面分析：</p>\n<h2>一、核心功能</h2>\n<p><code>addDep</code> 方法的主要作用是：</p>\n<ol>\n<li><strong>建立 Watcher 与 Dep 的双向引用</strong>\n<ul>\n<li>让 Watcher 知道它依赖了哪些 Dep（响应式数据的依赖收集器）</li>\n<li>让 Dep 知道有哪些 Watcher 订阅了它的变化</li>\n</ul>\n</li>\n<li><strong>避免重复收集依赖</strong>\n<ul>\n<li>确保同一个 Watcher 不会被重复添加到 Dep 的订阅者列表中</li>\n</ul>\n</li>\n</ol>\n<h2>二、源码实现分析（Vue 2.x）</h2>\n<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// src/core/observer/watcher.js</span>\n<span class=\"hljs-title class_\">Watcher</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>.<span class=\"hljs-property\">addDep</span> = <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">dep: Dep</span>) {\n  <span class=\"hljs-keyword\">const</span> id = dep.<span class=\"hljs-property\">id</span>\n  <span class=\"hljs-keyword\">if</span> (!<span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">newDepIds</span>.<span class=\"hljs-title function_\">has</span>(id)) {\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">newDepIds</span>.<span class=\"hljs-title function_\">add</span>(id)\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">newDeps</span>.<span class=\"hljs-title function_\">push</span>(dep)\n    <span class=\"hljs-keyword\">if</span> (!<span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">depIds</span>.<span class=\"hljs-title function_\">has</span>(id)) {\n      dep.<span class=\"hljs-title function_\">addSub</span>(<span class=\"hljs-variable language_\">this</span>) <span class=\"hljs-comment\">// 关键：将当前Watcher添加到Dep的订阅列表</span>\n    }\n  }\n}\n</code></pre>\n<h2>三、工作流程</h2>\n<ol>\n<li><strong>依赖收集阶段</strong>  ：<pre><code class=\"language-mermaid\">graph LR\n  A[响应式数据getter触发] --&gt; B[检查Dep.target]\n  B --&gt; C{是否有Watcher?}\n  C --&gt;|是| D[调用dep.depend()]\n  D --&gt; E[调用Watcher.addDep(dep)]\n</code></pre>\n</li>\n<li><strong>方法内部执行步骤</strong>  ：\n<ul>\n<li>检查 Dep 的 ID 是否已记录</li>\n<li>如果没有记录：\n<ul>\n<li>添加到 <code>newDepIds</code> 和 <code>newDeps</code> 中</li>\n<li>如果这个 Dep 是新的（不在 <code>depIds</code> 中）：\n<ul>\n<li>调用 <code>dep.addSub(this)</code> 将 Watcher 订阅到 Dep</li>\n</ul>\n</li>\n</ul>\n</li>\n</ul>\n</li>\n</ol>\n<h2>四、为什么需要这个方法？</h2>\n<ol>\n<li><strong>解决重复依赖问题</strong>  ：\n<ul>\n<li>避免同一轮求值中多次添加相同 Dep</li>\n</ul>\n<pre><code class=\"language-javascript\"><span class=\"hljs-attr\">computed</span>: {\n  <span class=\"hljs-title function_\">example</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">a</span> + <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">a</span> <span class=\"hljs-comment\">// 同一属性被多次访问</span>\n  }\n}\n</code></pre>\n</li>\n<li><strong>支持依赖清理</strong>  ：<pre><code class=\"language-javascript\"><span class=\"hljs-comment\">// 每次更新后会清理不再需要的依赖</span>\n<span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-title function_\">cleanupDeps</span>()\n</code></pre>\n</li>\n<li><strong>优化性能</strong>  ：\n<ul>\n<li>使用 Set 结构（<code>newDepIds</code>）快速判断是否已收集</li>\n</ul>\n</li>\n</ol>\n<h2>五、实际应用场景</h2>\n<h3>1. 计算属性场景</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-attr\">computed</span>: {\n  <span class=\"hljs-title function_\">total</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">price</span> * <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">quantity</span>\n  }\n}\n</code></pre>\n<ul>\n<li><code>price</code> 和 <code>quantity</code> 各自的 Dep 都会通过 <code>addDep</code> 被收集</li>\n</ul>\n<h3>2. 条件渲染场景</h3>\n<pre><code class=\"language-html\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span> <span class=\"hljs-attr\">v-if</span>=<span class=\"hljs-string\">&quot;show&quot;</span>&gt;</span>{{ message }}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span>\n</code></pre>\n<ul>\n<li>当 <code>show</code> 为 false 时，<code>message</code> 的 Dep 会被正确清理</li>\n</ul>\n<h2>六、相关属性说明</h2>\n<table>\n<thead>\n<tr>\n<th>属性</th>\n<th>类型</th>\n<th>作用</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>newDepIds</code></td>\n<td>Set</td>\n<td>当前轮次收集的 Dep ID 集合</td>\n</tr>\n<tr>\n<td><code>newDeps</code></td>\n<td>Array</td>\n<td>当前轮次收集的 Dep 实例数组</td>\n</tr>\n<tr>\n<td><code>depIds</code></td>\n<td>Set</td>\n<td>上一轮次收集的 Dep ID 集合</td>\n</tr>\n<tr>\n<td><code>deps</code></td>\n<td>Array</td>\n<td>上一轮次收集的 Dep 实例数组</td>\n</tr>\n</tbody>\n</table>\n<h2>七、与 <code>cleanupDeps</code> 的配合</h2>\n<p>每次更新后调用 <code>cleanupDeps</code>：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-title class_\">Watcher</span>.<span class=\"hljs-property\"><span class=\"hljs-keyword\">prototype</span></span>.<span class=\"hljs-property\">cleanupDeps</span> = <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-comment\">// 移除不再需要的旧依赖</span>\n  <span class=\"hljs-comment\">// 交换 newDeps/deps 和 newDepIds/depIds</span>\n}\n</code></pre>\n<p>这种设计使得 Vue 能够精确追踪动态变化的依赖关系。</p>\n<h2>八、总结</h2>\n<p><code>Watcher.prototype.addDep</code> 是 Vue 响应式系统的桥梁方法，它：</p>\n<ol>\n<li>确保依赖被正确收集</li>\n<li>避免重复收集提高性能</li>\n<li>支持依赖的动态更新</li>\n<li>为计算属性和条件渲染等特性提供基础支持</li>\n</ol>\n<p>理解这个方法的工作机制，有助于深入掌握 Vue 的响应式原理和优化技巧。</p>\n</div>";
      </script></body></html>
