<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>html,
    body {
      margin: 0;
      padding: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto !important;
      padding: 45px 15px;
    }</style></head><body><article id="article" class="markdown-body"></article><script>document.title = 'Canvas 和 SVG'
        document.getElementById('article').innerHTML = 
        "<div><p>Canvas和SVG是两种在Web开发中用于绘制图形的不同技术，它们各有特点和适用场景。以下是Canvas和SVG之间的主要区别：</p>\n<hr>\n<h3><strong>1. 本质与渲染方式</strong></h3>\n<ul>\n<li><strong>Canvas</strong>\n<ul>\n<li><strong>基于像素</strong>  ：Canvas是一个基于位图的绘图环境，通过JavaScript绘制2D图形。</li>\n<li><strong>渲染方式</strong>  ：Canvas通过操作像素来绘制图形，类似于在画布上用画笔作画。一旦绘制完成，图形就固定在像素中，无法直接访问单个图形元素。</li>\n<li><strong>性能特点</strong>  ：适合处理大量动态或复杂图形（如动画、游戏），因为渲染速度快，但重新绘制整个画布代价较高。</li>\n</ul>\n</li>\n<li><strong>SVG</strong>\n<ul>\n<li><strong>基于矢量</strong>  ：SVG是一种基于XML的标记语言，用于描述2D矢量图形。</li>\n<li><strong>渲染方式</strong>  ：SVG图形由数学公式定义，可以无限缩放而不失真。每个图形元素（如矩形、圆形）都是独立的DOM节点。</li>\n<li><strong>性能特点</strong>  ：适合静态或少量动态图形，因为可以单独操作每个元素，但复杂图形或大量元素时性能可能下降。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>2. 交互性与可访问性</strong></h3>\n<ul>\n<li><strong>Canvas</strong>\n<ul>\n<li><strong>交互性</strong>  ：Canvas本身不支持事件绑定到单个图形元素，需要通过手动计算坐标来实现交互。</li>\n<li><strong>可访问性</strong>  ：Canvas图形对屏幕阅读器不友好，除非手动添加ARIA属性或描述文本。</li>\n</ul>\n</li>\n<li><strong>SVG</strong>\n<ul>\n<li><strong>交互性</strong>  ：SVG元素可以直接绑定事件（如<code>onclick</code>、<code>onmouseover</code>），交互更直观。</li>\n<li><strong>可访问性</strong>  ：SVG图形是DOM的一部分，支持屏幕阅读器，且可以通过CSS和JavaScript动态修改。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>3. 文件大小与复杂性</strong></h3>\n<ul>\n<li><strong>Canvas</strong>\n<ul>\n<li><strong>文件大小</strong>  ：通常较小，因为只存储像素数据。</li>\n<li><strong>复杂性</strong>  ：适合处理复杂图形（如游戏场景、数据可视化），但代码量可能较大。</li>\n</ul>\n</li>\n<li><strong>SVG</strong>\n<ul>\n<li><strong>文件大小</strong>  ：可能较大，尤其是复杂图形，因为存储的是矢量描述。</li>\n<li><strong>复杂性</strong>  ：适合简单到中等复杂度的图形（如图标、图表），代码更直观。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>4. 动画支持</strong></h3>\n<ul>\n<li><strong>Canvas</strong>\n<ul>\n<li><strong>动画实现</strong>  ：通过JavaScript逐帧绘制实现动画，适合高性能需求的动画（如游戏、视频处理）。</li>\n<li><strong>工具支持</strong>  ：需要手动控制动画逻辑，但可以利用WebGL等库提升性能。</li>\n</ul>\n</li>\n<li><strong>SVG</strong>\n<ul>\n<li><strong>动画实现</strong>  ：支持CSS动画和SMIL（同步多媒体集成语言），也可以通过JavaScript操作。</li>\n<li><strong>工具支持</strong>  ：动画实现较简单，但性能可能不如Canvas。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>5. 适用场景</strong></h3>\n<ul>\n<li><strong>Canvas</strong>\n<ul>\n<li>适用于：\n<ul>\n<li>动态图形（如游戏、动画）。</li>\n<li>大规模数据可视化（如实时图表）。</li>\n<li>需要高性能渲染的场景。</li>\n</ul>\n</li>\n</ul>\n</li>\n<li><strong>SVG</strong>\n<ul>\n<li>适用于：\n<ul>\n<li>静态或少量动态图形（如图标、按钮）。</li>\n<li>需要高保真缩放的场景（如地图、图表）。</li>\n<li>需要交互和可访问性的场景。</li>\n</ul>\n</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3><strong>6. 浏览器兼容性</strong></h3>\n<ul>\n<li><strong>Canvas</strong>  ：几乎所有现代浏览器都支持，但某些旧版浏览器可能不完全支持。</li>\n<li><strong>SVG</strong>  ：几乎所有现代浏览器都支持，且对旧版浏览器的支持更好。</li>\n</ul>\n<hr>\n<h3><strong>总结对比表</strong></h3>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th>Canvas</th>\n<th>SVG</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>本质</strong></td>\n<td>像素（位图）</td>\n<td>矢量（XML）</td>\n</tr>\n<tr>\n<td><strong>渲染方式</strong></td>\n<td>逐像素绘制</td>\n<td>矢量描述</td>\n</tr>\n<tr>\n<td><strong>交互性</strong></td>\n<td>需手动计算坐标</td>\n<td>直接绑定事件</td>\n</tr>\n<tr>\n<td><strong>可访问性</strong></td>\n<td>较差</td>\n<td>较好</td>\n</tr>\n<tr>\n<td><strong>文件大小</strong></td>\n<td>较小</td>\n<td>可能较大</td>\n</tr>\n<tr>\n<td><strong>动画支持</strong></td>\n<td>高性能，需手动控制</td>\n<td>简单，但性能可能较低</td>\n</tr>\n<tr>\n<td><strong>适用场景</strong></td>\n<td>动态图形、高性能需求</td>\n<td>静态图形、交互性需求</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>选择建议</strong></h3>\n<ul>\n<li>如果需要高性能渲染（如游戏、实时数据可视化），选择<strong>Canvas</strong>  。</li>\n<li>如果需要交互性、可访问性或高保真缩放（如图标、图表），选择<strong>SVG</strong>  。</li>\n<li>在某些复杂场景中，也可以结合两者使用（如用Canvas绘制背景，用SVG绘制图标）。</li>\n</ul>\n<p>希望以上分析能帮助你更好地理解Canvas和SVG的区别！</p>\n</div>";</script></body></html>
