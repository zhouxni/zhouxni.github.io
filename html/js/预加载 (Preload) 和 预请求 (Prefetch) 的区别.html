<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="stylesheet" href="../../css/github-markdown.min.css"><link rel="stylesheet" href="../../css/github.min.css"><style>body,html{margin:0;padding:0}.markdown-body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto!important;padding:45px 15px}.markdown-body pre{border:1px solid #e5e5e5!important;margin-top:var(--base-size-16)!important}</style></head><body><article id="article" class="markdown-body"></article><script>document.title="预加载 (Preload) 和 预请求 (Prefetch) 的区别",document.getElementById("article").innerHTML='<div><p>预加载和预请求都是浏览器提供的资源加载优化技术，但它们的用途和行为有所不同：</p>\n<h2>预加载 (Preload)</h2>\n<ul>\n<li><strong>用途</strong>  ：用于当前页面必定会使用的关键资源</li>\n<li><strong>语法</strong>  ：<code>&lt;link rel=&quot;preload&quot; href=&quot;resource.js&quot; as=&quot;script&quot;&gt;</code></li>\n<li><strong>特点</strong>  ：\n<ul>\n<li>高优先级加载，浏览器会立即开始获取资源</li>\n<li>资源会被缓存但不会执行</li>\n<li>必须指定正确的 <code>as</code> 属性（script, style, font, image等）</li>\n<li>适用于当前导航中很快会用到的资源</li>\n</ul>\n</li>\n</ul>\n<h2>预请求 (Prefetch)</h2>\n<ul>\n<li><strong>用途</strong>  ：用于未来可能需要的资源（如下一个页面可能用到的资源）</li>\n<li><strong>语法</strong>  ：<code>&lt;link rel=&quot;prefetch&quot; href=&quot;next-page-resource.js&quot;&gt;</code></li>\n<li><strong>特点</strong>  ：\n<ul>\n<li>低优先级加载，浏览器在空闲时获取资源</li>\n<li>资源会被缓存供未来使用</li>\n<li>适用于预测用户下一步可能访问的资源</li>\n</ul>\n</li>\n</ul>\n<h2>主要区别</h2>\n<table>\n<thead>\n<tr>\n<th>特性</th>\n<th>Preload</th>\n<th>Prefetch</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>优先级</td>\n<td>高</td>\n<td>低</td>\n</tr>\n<tr>\n<td>用途</td>\n<td>当前页面关键资源</td>\n<td>未来可能需要的资源</td>\n</tr>\n<tr>\n<td>缓存时间</td>\n<td>短（随页面生命周期）</td>\n<td>长（可能跨页面）</td>\n</tr>\n<tr>\n<td>执行</td>\n<td>不自动执行，需后续引用</td>\n<td>不自动执行</td>\n</tr>\n</tbody>\n</table>\n<h2>使用建议</h2>\n<ul>\n<li>使用 <code>preload</code> 优化首屏渲染性能</li>\n<li>使用 <code>prefetch</code> 优化后续导航体验</li>\n<li>不要过度使用，避免浪费带宽</li>\n<li>结合 <code>as</code> 属性和 <code>type</code> 属性确保正确加载</li>\n</ul>\n<p>示例：</p>\n<pre><code class="language-html"><span class="hljs-comment">&lt;!-- 预加载当前页面关键CSS --&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;preload&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;critical.css&quot;</span> <span class="hljs-attr">as</span>=<span class="hljs-string">&quot;style&quot;</span>&gt;</span>\n\n<span class="hljs-comment">&lt;!-- 预请求下一个页面可能需要的JS --&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;prefetch&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;next-page.js&quot;</span>&gt;</span>\n</code></pre>\n</div>'</script></body></html>
