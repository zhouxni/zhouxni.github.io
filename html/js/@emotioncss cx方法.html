de class="language-jsx"><span class="hljs-keyword">const</span> active = <span class="hljs-literal">true</span>;\n\n<span class="hljs-keyword">const</span> base = css`<span class="language-css">...`</span>\n<span class="hljs-keyword">const</span> activeStyle = css`<span class="language-css"> <span class="hljs-attribute">background</span>: red; `</span>\n\n&lt;div className={<span class="hljs-title function_">cx</span>(base, active &amp;&amp; activeStyle)} /&gt;\n</code></pre>\n<ul>\n<li>true → 加上样式</li>\n<li>false → 自动忽略，不会留空字符串、不会留空格</li>\n</ul>\n<p>非常适合：</p>\n<ul>\n<li>选中状态</li>\n<li>禁用状态</li>\n<li>展开/收起</li>\n<li>高亮/默认</li>\n</ul>\n<hr>\n<h2>3. 混合原生 class + emotion 样式</h2>\n<p>可以和第三方 UI 库（AntD、Element）混用</p>\n<pre><code class="language-jsx">&lt;div className={<span class="hljs-title function_">cx</span>(<span class="hljs-string">&quot;ant-card&quot;</span>, myStyle)} /&gt;\n</code></pre>\n<hr>\n<h2>4. 任意数量、任意组合</h2>\n<pre><code class="language-jsx"><span class="hljs-title function_">cx</span>(a, b, isActive &amp;&amp; c, isDisabled &amp;&amp; d, <span class="hljs-string">&quot;global-class&quot;</span>, props.<span class="hljs-property">className</span>);\n</code></pre>\n<p><strong>全部能正确合并！</strong></p>\n<hr>\n<h1>四、cx 自动处理的规则（非常重要）</h1>\n<p>这些规则让你永远不会写出错误的 className：</p>\n<ul>\n<li>自动忽略 <strong>false / null / undefined / 0 / \'\'</strong></li>\n<li>自动清理多余空格</li>\n<li>支持无限个参数</li>\n<li>支持 emotion 生成的 class、原生字符串 class</li>\n<li>不会产生冲突、不会覆盖</li>\n</ul>\n<hr>\n<h1>五、最标准实战示例（可直接复制）</h1>\n<pre><code class="language-jsx"><span class="hljs-keyword">import</span> { css, cx } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@emotion/css&quot;</span>;\n<span class="hljs-keyword">import</span> { useState } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;react&quot;</span>;\n\n<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">Button</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> [active, setActive] = <span class="hljs-title function_">useState</span>(<span class="hljs-literal">false</span>);\n\n  <span class="hljs-keyword">const</span> base = css`<span class="language-css">\n    <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span> <span class="hljs-number">20px</span>;\n    <span class="hljs-attribute">border-radius</span>: <span class="hljs-number">4px</span>;\n    <span class="hljs-attribute">border</span>: none;\n  `</span>;\n\n  <span class="hljs-keyword">const</span> activeStyle = css`<span class="language-css">\n    <span class="hljs-attribute">background</span>: <span class="hljs-number">#1677ff</span>;\n    <span class="hljs-attribute">color</span>: white;\n  `</span>;\n\n  <span class="hljs-keyword">return</span> (\n    <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">button</span>\n      <span class="hljs-attr">className</span>=<span class="hljs-string">{cx(base,</span> <span class="hljs-attr">active</span> &amp;&amp; <span class="hljs-attr">activeStyle</span>)}\n      <span class="hljs-attr">onClick</span>=<span class="hljs-string">{()</span> =&gt;</span> setActive(!active)}\n    &gt;\n      切换状态\n    <span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span></span>\n  );\n}\n</code></pre>\n<hr>\n<h1>六、对比：不用 cx 有多痛苦</h1>\n<pre><code class="language-jsx"><span class="hljs-comment">// ❌ 难看、易错、有空格</span>\nclassName={<span class="hljs-string">`<span class="hljs-subst">${base}</span> <span class="hljs-subst">${active ? activeStyle : <span class="hljs-string">&#x27;&#x27;</span>}</span>`</span>}\n\n<span class="hljs-comment">// ✅ 用 cx 干净优雅</span>\nclassName={<span class="hljs-title function_">cx</span>(base, active &amp;&amp; activeStyle)}\n</code></pre>\n<hr>\n<h1>七、最关键总结（背会）</h1>\n<ol>\n<li><strong>cx 是 @emotion/css 自带的</strong></li>\n<li><strong>用来合并多个 class</strong></li>\n<li><strong>支持条件样式：<code>condition &amp;&amp; style</code></strong></li>\n<li><strong>自动忽略假值、自动去空格</strong></li>\n<li><strong>写动态组件必须用 cx</strong></li>\n</ol>\n</div>'</script></body></html>
