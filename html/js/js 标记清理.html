<script>
        document.getElementById('article').innerHTML = 
        "<div><p>在 JavaScript 中，标记清理（Mark-and-Sweep）是一种常用的垃圾回收算法，用于自动管理内存。这种算法主要用于识别并回收不再需要的内存空间，从而防止内存泄漏。虽然 JavaScript 引擎（如 V8、SpiderMonkey 等）会自动执行垃圾回收，但理解其工作原理有助于编写更高效的代码。</p>\n<h3>标记清理算法的基本步骤</h3>\n<ol>\n<li><strong>标记阶段（Mark Phase）</strong>  ：\n<ul>\n<li>垃圾回收器从一组根对象（通常是全局对象）开始，遍历所有可以通过引用访问的对象。</li>\n<li>所有从根对象可达的对象都会被标记为“活跃”或“不可回收”。</li>\n</ul>\n</li>\n<li><strong>清理阶段（Sweep Phase）</strong>  ：\n<ul>\n<li>遍历堆中的所有对象，回收那些没有被标记为“活跃”的对象。</li>\n<li>这些未标记的对象占用的内存空间被释放，可以供将来分配使用。</li>\n</ul>\n</li>\n</ol>\n<h3>常见的根对象</h3>\n<ul>\n<li>全局对象（如 <code>window</code> 在浏览器环境中）</li>\n<li>当前执行的函数调用栈</li>\n<li>活动的定时器</li>\n<li>事件监听器回调等</li>\n</ul>\n<h3>编写高效代码的建议</h3>\n<p>虽然垃圾回收是自动的，但编写代码时仍可以考虑以下几点以提高内存管理的效率：</p>\n<ol>\n<li><strong>避免全局变量</strong>  ：\n<ul>\n<li>全局变量会一直存在于内存中，直到页面关闭。尽量使用局部变量或块级作用域。</li>\n</ul>\n</li>\n<li><strong>解除不必要的引用</strong>  ：\n<ul>\n<li>如果不再需要某个对象，确保没有引用指向它，以便垃圾回收器可以回收。</li>\n</ul>\n</li>\n<li><strong>小心闭包</strong>  ：\n<ul>\n<li>闭包会捕获并保留其环境中的变量，可能导致内存泄漏。确保闭包只捕获需要的数据。</li>\n</ul>\n</li>\n<li><strong>及时清理事件监听器</strong>  ：\n<ul>\n<li>在不再需要时移除事件监听器，以防止它们持有对对象的引用。</li>\n</ul>\n</li>\n<li><strong>使用 WeakMap 和 WeakSet</strong>  ：\n<ul>\n<li>这些数据结构允许你存储对象引用，但不会阻止垃圾回收器回收这些对象。</li>\n</ul>\n</li>\n</ol>\n<h3>示例</h3>\n<pre><code class=\"language-javascript\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createLeak</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> leakedObject = { <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">&#x27;I will leak&#x27;</span> };\n  <span class=\"hljs-comment\">// 如果这个引用被意外保留，leakedObject 将无法被回收</span>\n  <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">unintendedReference</span> = leakedObject;\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">avoidLeak</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">let</span> largeData = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Array</span>(<span class=\"hljs-number\">1000000</span>).<span class=\"hljs-title function_\">fill</span>(<span class=\"hljs-string\">&#x27;data&#x27;</span>);\n  <span class=\"hljs-comment\">// 使用完 largeData 后，确保没有引用指向它</span>\n  <span class=\"hljs-title function_\">doSomethingWith</span>(largeData);\n  largeData = <span class=\"hljs-literal\">null</span>; <span class=\"hljs-comment\">// 显式解除引用</span>\n}\n</code></pre>\n<p>通过理解标记清理算法和内存管理的基本原则，你可以编写出更高效、更可靠的 JavaScript 代码。</p>\n</div>";
      </script></body></html>
