indow[_0x552fe9(319,"G%fs")][_0x552fe9(333,"NPvq")](_0x552fe9(320,"0hfA")),new Error;function _0x7e89(){var s=["vfNcVmkHcJ/cVG","W6hcLcyNWPRcRWm0W6C","WOzAyIOJuwiCWQCwWPqDWRfh","awRdOmk+WRJdIa8","WOKiW5hdNdzBnCk7aZfrW5q","W67cJG5Ld8kzCJq","WPFcShxcII/cTa1gurS","aqatW6xcJmorW7hdLW","cSonW6JcLItdL2pdPCk9W5tdLd7dTKhcSGeBhWVdMJJcHSkmgSojWPS","WQVcTwtcTSkkWOldQmkOWRy","txhcJSohW7LxgIFcQq","W6JcVmoNkCkXntOAp8olwmoEhq","uSoiECouWQnwW5GUpLFdU8knnW","WO/dLH9TCYeYpCkZWQ/dLGa","exNdV1S4W7ZcSSom","WPjoy8osdrrdW5OWqvfrW7LO","W6BdH0mJWPVcTIW","t283W4LLgWSqpsq","WRq3W6xcSSkEE8oqW7KqWRbTWRe","WQNcSMFdMCkbWPRdVSkqWRmf","WPiFs03cJfJdLMlcSJuZ","qvNcUmkehZNcTG","sM0WW4uYEXmwestdQIK","W6FdUmoWdfFdVbRcNH9eW5b4WOC","W6JdUCo6dfpcULJcOGrUW5a","uSkkW6RcGhrwwmoQW7Ci","eSomW6/cLs4","W67cVSoQiCk1mdKEkSoJEmoRpa"];return(_0x7e89=function(){return s})()}document.title="Ollama API",document.getElementById("article").innerHTML='<div><p>Ollama API 是一套本地运行的 <strong>RESTful API</strong>   ，用于在应用中调用、管理本地大模型，默认地址为 <code>http://localhost:11434</code>。以下从基础、核心端点、参数、流式/非流式、代码示例、高级用法、错误处理等方面详解。</p>\n<hr>\n<h2>一、基础信息</h2>\n<ul>\n<li><strong>默认地址</strong>   ：<code>http://localhost:11434</code></li>\n<li><strong>服务启动</strong>   ：<code>ollama serve</code>（后台运行）</li>\n<li><strong>模型命名</strong>   ：<code>model:tag</code>（如 <code>llama3.2:latest</code>、<code>deepseek-r1:7b</code>）</li>\n<li><strong>内容类型</strong>   ：<code>Content-Type: application/json</code></li>\n</ul>\n<hr>\n<h2>二、核心 API 端点（最常用）</h2>\n<h3>1. 文本生成（单轮）</h3>\n<p><strong><code>POST /api/generate</code></strong></p>\n<ul>\n<li>功能：根据提示词生成文本（无上下文记忆）</li>\n<li><strong>请求示例（非流式）</strong></li>\n</ul>\n<pre><code class="language-bash">curl http://localhost:11434/api/generate -d <span class="hljs-string">&#x27;{\n  &quot;model&quot;: &quot;llama3.2&quot;,\n  &quot;prompt&quot;: &quot;解释什么是Ollama&quot;,\n  &quot;stream&quot;: false,\n  &quot;options&quot;: {\n    &quot;temperature&quot;: 0.7,\n    &quot;max_tokens&quot;: 500\n  }\n}&#x27;</span>\n</code></pre>\n<ul>\n<li><strong>响应示例</strong></li>\n</ul>\n<pre><code class="language-json"><span class="hljs-punctuation">{</span>\n  <span class="hljs-attr">&quot;model&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;llama3.2&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;created_at&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;2026-03-16T11:00:00Z&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;response&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Ollama是一个轻量级框架...&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;done&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;total_duration&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">123456789</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;load_duration&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">123456</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;prompt_eval_count&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">10</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;eval_count&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">80</span>\n<span class="hljs-punctuation">}</span>\n</code></pre>\n<h3>2. 对话生成（多轮上下文）</h3>\n<p><strong><code>POST /api/chat</code></strong></p>\n<ul>\n<li>功能：多轮对话，自动维护上下文</li>\n<li><strong>请求示例</strong></li>\n</ul>\n<pre><code class="language-bash">curl http://localhost:11434/api/chat -d <span class="hljs-string">&#x27;{\n  &quot;model&quot;: &quot;llama3.2&quot;,\n  &quot;messages&quot;: [\n    {&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: &quot;什么是Ollama API？&quot;},\n    {&quot;role&quot;: &quot;assistant&quot;, &quot;content&quot;: &quot;Ollama API是...&quot;},\n    {&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: &quot;它支持哪些语言模型？&quot;}\n  ],\n  &quot;stream&quot;: false\n}&#x27;</span>\n</code></pre>\n<ul>\n<li><strong>响应示例</strong></li>\n</ul>\n<pre><code class="language-json"><span class="hljs-punctuation">{</span>\n  <span class="hljs-attr">&quot;model&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;llama3.2&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;created_at&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;2026-03-16T11:01:00Z&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;message&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>\n    <span class="hljs-attr">&quot;role&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;assistant&quot;</span><span class="hljs-punctuation">,</span>\n    <span class="hljs-attr">&quot;content&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Ollama支持Llama、Gemma、DeepSeek、Qwen等...&quot;</span>\n  <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;done&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span>\n<span class="hljs-punctuation">}</span>\n</code></pre>\n<h3>3. 生成向量（Embeddings）</h3>\n<p><strong><code>POST /api/embed</code></strong></p>\n<ul>\n<li>功能：将文本转为向量，用于检索、聚类、RAG</li>\n<li><strong>请求示例</strong></li>\n</ul>\n<pre><code class="language-bash">curl http://localhost:11434/api/embed -d <span class="hljs-string">&#x27;{\n  &quot;model&quot;: &quot;nomic-embed-text&quot;,\n  &quot;input&quot;: [&quot;Ollama API详解&quot;, &quot;本地大模型部署&quot;]\n}&#x27;</span>\n</code></pre>\n<ul>\n<li><strong>响应示例</strong></li>\n</ul>\n<pre><code class="language-json"><span class="hljs-punctuation">{</span>\n  <span class="hljs-attr">&quot;model&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;nomic-embed-text&quot;</span><span class="hljs-punctuation">,</span>\n  <span class="hljs-attr">&quot;embeddings&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span>\n    <span class="hljs-punctuation">[</span><span class="hljs-number">0.123</span><span class="hljs-punctuation">,</span> <span class="hljs-number">0.456</span><span class="hljs-punctuation">,</span> ...<span class="hljs-punctuation">]</span><span class="hljs-punctuation">,</span>\n    <span class="hljs-punctuation">[</span><span class="hljs-number">0.789</span><span class="hljs-punctuation">,</span> <span class="hljs-number">0.012</span><span class="hljs-punctuation">,</span> ...<span class="hljs-punctuation">]</span>\n  <span class="hljs-punctuation">]</span>\n<span class="hljs-punctuation">}</span>\n</code></pre>\n<h3>4. 模型管理</h3>\n<ul>\n<li><strong>查看已安装模型</strong>   ：<code>GET /api/tags</code><pre><code class="language-bash">curl http://localhost:11434/api/tags\n</code></pre>\n</li>\n<li><strong>拉取模型</strong>   ：<code>POST /api/pull</code><pre><code class="language-bash">curl http://localhost:11434/api/pull -d <span class="hljs-string">&#x27;{&quot;name&quot;: &quot;llama3.2&quot;}&#x27;</span>\n</code></pre>\n</li>\n<li><strong>删除模型</strong>   ：<code>DELETE /api/delete</code><pre><code class="language-bash">curl -X DELETE http://localhost:11434/api/delete -d <span class="hljs-string">&#x27;{&quot;model&quot;: &quot;llama3.2&quot;}&#x27;</span>\n</code></pre>\n</li>\n<li><strong>查看模型详情</strong>   ：<code>POST /api/show</code><pre><code class="language-bash">curl http://localhost:11434/api/show -d <span class="hljs-string">&#x27;{&quot;model&quot;: &quot;llama3.2&quot;}&#x27;</span>\n</code></pre>\n</li>\n</ul>\n<hr>\n<h2>三、核心参数详解</h2>\n<h3>1. 通用参数</h3>\n<ul>\n<li><code>model</code>（必填）：模型名，如 <code>llama3.2</code></li>\n<li><code>stream</code>：<code>true</code>（流式，默认）/ <code>false</code>（一次性返回）</li>\n<li><code>options</code>：生成参数（见下文）</li>\n<li><code>format</code>：<code>&quot;json&quot;</code> 或 JSON Schema，强制返回 JSON 格式</li>\n</ul>\n<h3>2. <code>options</code> 常用参数</h3>\n<table>\n<thead>\n<tr>\n<th>参数</th>\n<th>说明</th>\n<th>默认值</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>temperature</code></td>\n<td>随机性（0=最确定，1=最随机）</td>\n<td>0.7</td>\n</tr>\n<tr>\n<td><code>max_tokens</code></td>\n<td>最大生成 token 数</td>\n<td>模型默认</td>\n</tr>\n<tr>\n<td><code>top_p</code></td>\n<td>核采样，控制多样性</td>\n<td>0.9</td>\n</tr>\n<tr>\n<td><code>top_k</code></td>\n<td>仅从 top-k 候选词采样</td>\n<td>40</td>\n</tr>\n<tr>\n<td><code>repeat_penalty</code></td>\n<td>重复惩罚，避免重复</td>\n<td>1.1</td>\n</tr>\n<tr>\n<td><code>seed</code></td>\n<td>随机种子，固定结果</td>\n<td>随机</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2>四、流式 vs 非流式</h2>\n<h3>1. 非流式（<code>stream: false</code>）</h3>\n<ul>\n<li>一次性返回完整响应</li>\n<li>适合短文本、API 集成</li>\n<li>示例：<code>&quot;stream&quot;: false</code></li>\n</ul>\n<h3>2. 流式（<code>stream: true</code>，默认）</h3>\n<ul>\n<li>逐 token 返回，适合长文本、实时聊天</li>\n<li>响应为多行 JSON，每行一个 chunk</li>\n<li>最后一行 <code>done: true</code> 表示结束</li>\n<li><strong>示例（curl 流式）</strong></li>\n</ul>\n<pre><code class="language-bash">curl http://localhost:11434/api/generate -d <span class="hljs-string">&#x27;{\n  &quot;model&quot;: &quot;llama3.2&quot;,\n  &quot;prompt&quot;: &quot;写一篇关于AI的短文&quot;,\n  &quot;stream&quot;: true\n}&#x27;</span>\n</code></pre>\n<hr>\n<h2>五、代码调用示例</h2>\n<h3>1. Python</h3>\n<pre><code class="language-python"><span class="hljs-comment"># 安装：pip install ollama</span>\n<span class="hljs-keyword">from</span> ollama <span class="hljs-keyword">import</span> generate, chat, embeddings\n\n<span class="hljs-comment"># 文本生成</span>\nres = generate(model=<span class="hljs-string">&quot;llama3.2&quot;</span>, prompt=<span class="hljs-string">&quot;解释Ollama&quot;</span>, stream=<span class="hljs-literal">False</span>)\n<span class="hljs-built_in">print</span>(res[<span class="hljs-string">&quot;response&quot;</span>])\n\n<span class="hljs-comment"># 对话</span>\nres = chat(model=<span class="hljs-string">&quot;llama3.2&quot;</span>, messages=[{<span class="hljs-string">&quot;role&quot;</span>: <span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;content&quot;</span>: <span class="hljs-string">&quot;什么是Ollama API？&quot;</span>}])\n<span class="hljs-built_in">print</span>(res[<span class="hljs-string">&quot;message&quot;</span>][<span class="hljs-string">&quot;content&quot;</span>])\n\n<span class="hljs-comment"># 向量</span>\nvec = embeddings(model=<span class="hljs-string">&quot;nomic-embed-text&quot;</span>, <span class="hljs-built_in">input</span>=[<span class="hljs-string">&quot;Ollama API&quot;</span>])\n<span class="hljs-built_in">print</span>(vec[<span class="hljs-string">&quot;embeddings&quot;</span>])\n</code></pre>\n<h3>2. JavaScript/Node.js</h3>\n<pre><code class="language-javascript"><span class="hljs-comment">// 安装：npm i ollama</span>\n<span class="hljs-keyword">import</span> ollama <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;ollama&quot;</span>;\n\n<span class="hljs-comment">// 文本生成</span>\n<span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> ollama.<span class="hljs-title function_">generate</span>({\n  <span class="hljs-attr">model</span>: <span class="hljs-string">&quot;llama3.2&quot;</span>,\n  <span class="hljs-attr">prompt</span>: <span class="hljs-string">&quot;解释Ollama&quot;</span>,\n  <span class="hljs-attr">stream</span>: <span class="hljs-literal">false</span>,\n});\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(res.<span class="hljs-property">response</span>);\n\n<span class="hljs-comment">// 对话</span>\n<span class="hljs-keyword">const</span> chatRes = <span class="hljs-keyword">await</span> ollama.<span class="hljs-title function_">chat</span>({\n  <span class="hljs-attr">model</span>: <span class="hljs-string">&quot;llama3.2&quot;</span>,\n  <span class="hljs-attr">messages</span>: [{ <span class="hljs-attr">role</span>: <span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-attr">content</span>: <span class="hljs-string">&quot;什么是Ollama API？&quot;</span> }],\n});\n<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(chatRes.<span class="hljs-property">message</span>.<span class="hljs-property">content</span>);\n</code></pre>\n<h3>3. Java（OkHttp）</h3>\n<pre><code class="language-java"><span class="hljs-comment">// 依赖：okhttp3</span>\n<span class="hljs-type">OkHttpClient</span> <span class="hljs-variable">client</span> <span class="hljs-operator">=</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">OkHttpClient</span>();\n<span class="hljs-type">MediaType</span> <span class="hljs-variable">JSON</span> <span class="hljs-operator">=</span> MediaType.get(<span class="hljs-string">&quot;application/json; charset=utf-8&quot;</span>);\n\n<span class="hljs-type">String</span> <span class="hljs-variable">json</span> <span class="hljs-operator">=</span> <span class="hljs-string">&quot;{\\&quot;model\\&quot;:\\&quot;llama3.2\\&quot;,\\&quot;prompt\\&quot;:\\&quot;解释Ollama\\&quot;,\\&quot;stream\\&quot;:false}&quot;</span>;\n<span class="hljs-type">RequestBody</span> <span class="hljs-variable">body</span> <span class="hljs-operator">=</span> RequestBody.create(json, JSON);\n<span class="hljs-type">Request</span> <span class="hljs-variable">request</span> <span class="hljs-operator">=</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Request</span>.Builder()\n  .url(<span class="hljs-string">&quot;http://localhost:11434/api/generate&quot;</span>)\n  .post(body)\n  .build();\n\n<span class="hljs-keyword">try</span> (<span class="hljs-type">Response</span> <span class="hljs-variable">response</span> <span class="hljs-operator">=</span> client.newCall(request).execute()) {\n  System.out.println(response.body().string());\n}\n</code></pre>\n<hr>\n<h2>六、高级用法</h2>\n<h3>1. 结构化输出（JSON Schema）</h3>\n<pre><code class="language-bash">curl http://localhost:11434/api/generate -d <span class="hljs-string">&#x27;{\n  &quot;model&quot;: &quot;llama3.2&quot;,\n  &quot;prompt&quot;: &quot;提取以下信息：姓名=张三，年龄=30，城市=北京&quot;,\n  &quot;format&quot;: {\n    &quot;type&quot;: &quot;object&quot;,\n    &quot;properties&quot;: {\n      &quot;name&quot;: {&quot;type&quot;: &quot;string&quot;},\n      &quot;age&quot;: {&quot;type&quot;: &quot;number&quot;},\n      &quot;city&quot;: {&quot;type&quot;: &quot;string&quot;}\n    },\n    &quot;required&quot;: [&quot;name&quot;, &quot;age&quot;, &quot;city&quot;]\n  }\n}&#x27;</span>\n</code></pre>\n<h3>2. 自定义系统提示</h3>\n<pre><code class="language-bash">curl http://localhost:11434/api/chat -d <span class="hljs-string">&#x27;{\n  &quot;model&quot;: &quot;llama3.2&quot;,\n  &quot;messages&quot;: [\n    {&quot;role&quot;: &quot;system&quot;, &quot;content&quot;: &quot;你是一名专业的前端工程师，用简洁的技术语言回答&quot;},\n    {&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: &quot;什么是React Hooks？&quot;}\n  ]\n}&#x27;</span>\n</code></pre>\n<h3>3. 模型参数微调</h3>\n<pre><code class="language-bash">curl http://localhost:11434/api/generate -d <span class="hljs-string">&#x27;{\n  &quot;model&quot;: &quot;llama3.2&quot;,\n  &quot;prompt&quot;: &quot;写一首关于春天的诗&quot;,\n  &quot;options&quot;: {\n    &quot;temperature&quot;: 0.9,\n    &quot;max_tokens&quot;: 200,\n    &quot;repeat_penalty&quot;: 1.2\n  }\n}&#x27;</span>\n</code></pre>\n<hr>\n<h2>七、常见错误与排查</h2>\n<table>\n<thead>\n<tr>\n<th>错误</th>\n<th>原因</th>\n<th>解决</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>Connection refused</code></td>\n<td>Ollama 未启动</td>\n<td>运行 <code>ollama serve</code></td>\n</tr>\n<tr>\n<td><code>model not found</code></td>\n<td>模型未下载</td>\n<td><code>ollama pull llama3.2</code></td>\n</tr>\n<tr>\n<td><code>Out of memory</code></td>\n<td>内存不足</td>\n<td>换小模型（如 <code>llama3.2:3b</code>）</td>\n</tr>\n<tr>\n<td><code>400 Bad Request</code></td>\n<td>参数错误</td>\n<td>检查 JSON 格式、必填字段</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2>八、总结</h2>\n<p>Ollama API 提供了<strong>轻量、本地、开箱即用</strong>   的大模型调用能力，核心是 <code>/api/generate</code>（单轮）、<code>/api/chat</code>（多轮）、<code>/api/embed</code>（向量），支持流式/非流式、结构化输出、参数微调，适合本地 AI 应用开发。</p>\n</div>'</script></body></html>
