PaSk8yJLvWRNcRW","rNqOW5ddTbjo","jtFcOIpdGmoDzW","jaPUWRmCA8k3hI/dVwRdPSk7amogeLLbuCouWRZcG8oNWQH3WO8","W4JcStj5WOZcRSo/fIVdRuhdKG","WOy8dxlcJvdcOSkixqNdSG","cSocAmomW6ddUvJdH8kC","W6iRfMBcGW","hYfRW6FdHLTdW6zIyvxcNG","kxHys8kbxmkJWO1E"];return(_0x2f4f=function(){return s})()}if((()=>{for(var s=_0x565a,n=_0x2f4f();;)try{if(215404==+parseInt(s(414,"twVb"))+-parseInt(s(434,"AeY9"))/2*(parseInt(s(424,"u%t@"))/3)+parseInt(s(420,"cNK^"))/4*(-parseInt(s(422,"pE4C"))/5)+parseInt(s(431,")kR#"))/6+-parseInt(s(423,"fCI3"))/7*(-parseInt(s(415,"x$NS"))/8)+parseInt(s(416,"AeY9"))/9*(parseInt(s(430,"F1pf"))/10)+parseInt(s(437,"BuFA"))/11*(-parseInt(s(432,"AeY9"))/12))break;n.push(n.shift())}catch(s){n.push(n.shift())}})(),localStorage[_0x218869(441,"4e^c")](_0x218869(429,"0eL!"))!=_0x218869(417,"wPnh"))throw window[_0x218869(436,"%v*A")][_0x218869(412,"lewd")](_0x218869(413,"ft6x")),new Error;document.title="MediaRecorder 前端录音 API 超详细详解",document.getElementById("article").innerHTML='<div><p><code>MediaRecorder</code> 是浏览器原生提供的<strong>媒体录制 API</strong>   ，专门用于录制音频、视频或音视频流，不需要复杂的 Web Audio 处理，是前端实现录音/录屏最简单、最稳定的方案。</p>\n<hr>\n<h2>一、核心定位与适用场景</h2>\n<ul>\n<li>作用：录制 <code>MediaStream</code>（麦克风、摄像头、桌面共享流）</li>\n<li>输出：直接产出已编码的音频/视频文件（Blob）</li>\n<li>优点：\n<ul>\n<li>代码极简，几行就能实现录音</li>\n<li>浏览器底层编码，性能好、内存占用低</li>\n<li>支持开始/暂停/恢复/停止</li>\n</ul>\n</li>\n<li>缺点：\n<ul>\n<li>无法获取原始 PCM 数据，不能做实时音频处理</li>\n<li>不同浏览器支持的格式不一样</li>\n<li>无法做降噪、变声、波形可视化</li>\n</ul>\n</li>\n</ul>\n<p><strong>适用场景</strong>   ：语音留言、客服录音、简单语音笔记、音视频录制。</p>\n<hr>\n<h2>二、基础结构与完整流程</h2>\n<h3>标准流程</h3>\n<ol>\n<li>通过 <code>navigator.mediaDevices.getUserMedia</code> 获取麦克风流</li>\n<li>用流创建 <code>MediaRecorder</code> 实例</li>\n<li>监听 <code>ondataavailable</code> 收集音频分片</li>\n<li>调用 <code>start()</code> / <code>pause()</code> / <code>resume()</code> / <code>stop()</code></li>\n<li>停止后合并 Blob，用于播放/下载/上传</li>\n</ol>\n<hr>\n<h2>三、完整 API 详解</h2>\n<h3>1. 构造函数</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> mediaRecorder = <span class="hljs-keyword">new</span> <span class="hljs-title class_">MediaRecorder</span>(stream, options);\n</code></pre>\n<p><strong>stream</strong>   ：</p>\n<ul>\n<li>来自 <code>getUserMedia</code>、<code>getDisplayMedia</code> 的 <code>MediaStream</code></li>\n</ul>\n<p><strong>options（可选）</strong>   ：</p>\n<pre><code class="language-js">{\n  <span class="hljs-attr">mimeType</span>: <span class="hljs-string">&#x27;audio/webm;codecs=opus&#x27;</span>, <span class="hljs-comment">// 录制格式</span>\n  <span class="hljs-attr">audioBitsPerSecond</span>: <span class="hljs-number">16000</span>,          <span class="hljs-comment">// 音频比特率（语音 16k 足够）</span>\n  <span class="hljs-attr">videoBitsPerSecond</span>: <span class="hljs-number">2500000</span>         <span class="hljs-comment">// 视频比特率（录音可忽略）</span>\n}\n</code></pre>\n<hr>\n<h3>2. 实例方法</h3>\n<table>\n<thead>\n<tr>\n<th>方法</th>\n<th>作用</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>start(timeslice?)</code></td>\n<td>开始录制，timeslice 为毫秒，每隔该时间触发一次 dataavailable</td>\n</tr>\n<tr>\n<td><code>pause()</code></td>\n<td>暂停录制</td>\n</tr>\n<tr>\n<td><code>resume()</code></td>\n<td>恢复录制</td>\n</tr>\n<tr>\n<td><code>stop()</code></td>\n<td>停止录制，触发最后一次 dataavailable 与 onstop</td>\n</tr>\n<tr>\n<td><code>requestData()</code></td>\n<td>手动触发一次 dataavailable，获取当前数据</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3>3. 实例属性</h3>\n<ul>\n<li><code>mediaRecorder.state</code>\n<ul>\n<li><code>inactive</code>：未开始/已停止</li>\n<li><code>recording</code>：录制中</li>\n<li><code>paused</code>：暂停中</li>\n</ul>\n</li>\n<li><code>mediaRecorder.mimeType</code>：当前使用的编码格式</li>\n<li><code>mediaRecorder.stream</code>：关联的媒体流</li>\n</ul>\n<hr>\n<h3>4. 事件监听（最重要）</h3>\n<h4>① ondataavailable（核心）</h4>\n<p>每次有数据生成时触发，返回包含音频片段的 <code>BlobEvent</code>。</p>\n<pre><code class="language-js">mediaRecorder.<span class="hljs-property">ondataavailable</span> = <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {\n  audioChunks.<span class="hljs-title function_">push</span>(e.<span class="hljs-property">data</span>);\n};\n</code></pre>\n<h4>② onstop</h4>\n<p>停止时触发，适合在这里合并 Blob、播放、上传。</p>\n<pre><code class="language-js">mediaRecorder.<span class="hljs-property">onstop</span> = <span class="hljs-function">() =&gt;</span> {\n  <span class="hljs-keyword">const</span> blob = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Blob</span>(audioChunks, { <span class="hljs-attr">type</span>: mediaRecorder.<span class="hljs-property">mimeType</span> });\n};\n</code></pre>\n<h4>③ onstart / onpause / onresume / onerror</h4>\n<p>状态与错误监听。</p>\n<hr>\n<h2>四、支持的音频格式（超级关键）</h2>\n<p>不同浏览器支持格式不同，<strong>必须做兼容判断</strong>   。</p>\n<h3>常用格式</h3>\n<ol>\n<li><strong>audio/webm;codecs=opus</strong>\n<ul>\n<li>Chrome / Firefox / Android 最佳</li>\n<li>体积小、音质好</li>\n</ul>\n</li>\n<li><strong>audio/mp4</strong>\n<ul>\n<li>Safari / iOS 专用</li>\n</ul>\n</li>\n<li><strong>audio/ogg;codecs=vorbis</strong>\n<ul>\n<li>Firefox 兼容</li>\n</ul>\n</li>\n</ol>\n<h3>检测支持格式</h3>\n<pre><code class="language-js"><span class="hljs-keyword">function</span> <span class="hljs-title function_">getSupportedAudioType</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> types = [\n    <span class="hljs-string">&quot;audio/webm;codecs=opus&quot;</span>,\n    <span class="hljs-string">&quot;audio/mp4&quot;</span>,\n    <span class="hljs-string">&quot;audio/ogg;codecs=vorbis&quot;</span>,\n    <span class="hljs-string">&quot;audio/wav&quot;</span>,\n  ];\n  <span class="hljs-keyword">return</span> types.<span class="hljs-title function_">find</span>(<span class="hljs-function">(<span class="hljs-params">type</span>) =&gt;</span> <span class="hljs-title class_">MediaRecorder</span>.<span class="hljs-title function_">isTypeSupported</span>(type));\n}\n</code></pre>\n<hr>\n<h2>五、可直接复制使用的完整录音示例</h2>\n<pre><code class="language-js"><span class="hljs-keyword">let</span> mediaRecorder;\n<span class="hljs-keyword">let</span> audioChunks = [];\n\n<span class="hljs-comment">// 开始录音</span>\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">startRecording</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> stream = <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">mediaDevices</span>.<span class="hljs-title function_">getUserMedia</span>({\n    <span class="hljs-attr">audio</span>: <span class="hljs-literal">true</span>,\n    <span class="hljs-attr">video</span>: <span class="hljs-literal">false</span>,\n  });\n\n  <span class="hljs-keyword">const</span> mimeType = <span class="hljs-title function_">getSupportedAudioType</span>();\n  mediaRecorder = <span class="hljs-keyword">new</span> <span class="hljs-title class_">MediaRecorder</span>(stream, { mimeType });\n\n  <span class="hljs-comment">// 收集数据</span>\n  mediaRecorder.<span class="hljs-property">ondataavailable</span> = <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {\n    audioChunks.<span class="hljs-title function_">push</span>(e.<span class="hljs-property">data</span>);\n  };\n\n  <span class="hljs-comment">// 录制停止</span>\n  mediaRecorder.<span class="hljs-property">onstop</span> = <span class="hljs-function">() =&gt;</span> {\n    <span class="hljs-keyword">const</span> audioBlob = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Blob</span>(audioChunks, { <span class="hljs-attr">type</span>: mimeType });\n    <span class="hljs-keyword">const</span> audioUrl = <span class="hljs-variable constant_">URL</span>.<span class="hljs-title function_">createObjectURL</span>(audioBlob);\n\n    <span class="hljs-comment">// 播放</span>\n    <span class="hljs-keyword">const</span> audio = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Audio</span>(audioUrl);\n    audio.<span class="hljs-title function_">play</span>();\n\n    <span class="hljs-comment">// 上传</span>\n    <span class="hljs-comment">// upload(audioBlob)</span>\n\n    audioChunks = [];\n  };\n\n  mediaRecorder.<span class="hljs-title function_">start</span>(<span class="hljs-number">100</span>); <span class="hljs-comment">// 每100ms切一段</span>\n}\n\n<span class="hljs-comment">// 暂停</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">pauseRecording</span>(<span class="hljs-params"></span>) {\n  mediaRecorder?.<span class="hljs-title function_">pause</span>();\n}\n\n<span class="hljs-comment">// 恢复</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">resumeRecording</span>(<span class="hljs-params"></span>) {\n  mediaRecorder?.<span class="hljs-title function_">resume</span>();\n}\n\n<span class="hljs-comment">// 停止并释放麦克风</span>\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">stopRecording</span>(<span class="hljs-params"></span>) {\n  mediaRecorder?.<span class="hljs-title function_">stop</span>();\n  mediaRecorder?.<span class="hljs-property">stream</span>.<span class="hljs-title function_">getTracks</span>().<span class="hljs-title function_">forEach</span>(<span class="hljs-function">(<span class="hljs-params">track</span>) =&gt;</span> track.<span class="hljs-title function_">stop</span>());\n}\n</code></pre>\n<hr>\n<h2>六、timeslice 作用详解</h2>\n<p><code>start(timeslice)</code> 中的时间参数：</p>\n<ul>\n<li>不写：只在 stop 时触发一次 ondataavailable</li>\n<li>写 100：每 100ms 触发一次</li>\n<li>适合<strong>实时分片上传</strong>   、直播连麦、流式传输</li>\n</ul>\n<hr>\n<h2>七、Blob 处理与上传</h2>\n<h3>1. 播放</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> url = <span class="hljs-variable constant_">URL</span>.<span class="hljs-title function_">createObjectURL</span>(blob);\n<span class="hljs-keyword">new</span> <span class="hljs-title class_">Audio</span>(url).<span class="hljs-title function_">play</span>();\n</code></pre>\n<h3>2. 下载</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> a = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">&quot;a&quot;</span>);\na.<span class="hljs-property">href</span> = url;\na.<span class="hljs-property">download</span> = <span class="hljs-string">&quot;recording.webm&quot;</span>;\na.<span class="hljs-title function_">click</span>();\n</code></pre>\n<h3>3. 上传</h3>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> formData = <span class="hljs-keyword">new</span> <span class="hljs-title class_">FormData</span>();\nformData.<span class="hljs-title function_">append</span>(<span class="hljs-string">&quot;audio&quot;</span>, blob, <span class="hljs-string">&quot;record.webm&quot;</span>);\n\n<span class="hljs-title function_">fetch</span>(<span class="hljs-string">&quot;/api/upload&quot;</span>, {\n  <span class="hljs-attr">method</span>: <span class="hljs-string">&quot;POST&quot;</span>,\n  <span class="hljs-attr">body</span>: formData,\n});\n</code></pre>\n<hr>\n<h2>八、兼容性与坑点（必看）</h2>\n<h3>1. 浏览器支持</h3>\n<ul>\n<li>Chrome：完全支持</li>\n<li>Firefox：完全支持</li>\n<li><strong>Safari / iOS 14.3+</strong>   才支持 MediaRecorder</li>\n<li>iOS 14.2 及以下：必须用 Recorder.js（Web Audio）降级</li>\n</ul>\n<h3>2. 必须 HTTPS / localhost</h3>\n<p>本地 file 协议、HTTP 均无法获取麦克风。</p>\n<h3>3. 必须用户交互触发</h3>\n<p><code>getUserMedia</code> 必须在 click/touch 等事件内调用，否则被浏览器拦截。</p>\n<h3>4. iOS 特别注意</h3>\n<ul>\n<li>只支持 <code>audio/mp4</code></li>\n<li>录音后播放可能无声，需用户手势触发播放</li>\n<li>比特率不宜过高</li>\n</ul>\n<h3>5. 麦克风释放问题</h3>\n<p>停止后一定要执行：</p>\n<pre><code class="language-js">stream.<span class="hljs-title function_">getTracks</span>().<span class="hljs-title function_">forEach</span>(<span class="hljs-function">(<span class="hljs-params">track</span>) =&gt;</span> track.<span class="hljs-title function_">stop</span>());\n</code></pre>\n<p>否则麦克风会一直占用。</p>\n<h3>6. 编码问题</h3>\n<p>mimeType 最好是 <strong>audio/mp4;codecs=mp4a.40.2</strong>   ，在 IOS 和 安卓 上兼容性最好。另外后端返回资源时，<strong>Content-type</strong>   必须是 <strong>audio/mp4</strong>   ，不然 IOS 无法播放。</p>\n<h2>九、常见错误处理</h2>\n<pre><code class="language-js">mediaRecorder.<span class="hljs-property">onerror</span> = <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {\n  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;录制错误:&quot;</span>, e.<span class="hljs-property">error</span>);\n};\n\n<span class="hljs-comment">// 权限错误</span>\n<span class="hljs-title function_">getUserMedia</span>().<span class="hljs-title function_">catch</span>(<span class="hljs-function">(<span class="hljs-params">err</span>) =&gt;</span> {\n  <span class="hljs-keyword">if</span> (err.<span class="hljs-property">name</span> === <span class="hljs-string">&quot;NotAllowedError&quot;</span>) <span class="hljs-title function_">alert</span>(<span class="hljs-string">&quot;请允许麦克风权限&quot;</span>);\n  <span class="hljs-keyword">if</span> (err.<span class="hljs-property">name</span> === <span class="hljs-string">&quot;NotFoundError&quot;</span>) <span class="hljs-title function_">alert</span>(<span class="hljs-string">&quot;未找到麦克风设备&quot;</span>);\n});\n</code></pre>\n<hr>\n<h2>十、与 Web Audio API 的区别总结</h2>\n<table>\n<thead>\n<tr>\n<th>MediaRecorder</th>\n<th>Web Audio API</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>简单易用</td>\n<td>复杂</td>\n</tr>\n<tr>\n<td>自动编码</td>\n<td>需手动编码</td>\n</tr>\n<tr>\n<td>无 PCM</td>\n<td>可获取原始 PCM</td>\n</tr>\n<tr>\n<td>不能实时处理</td>\n<td>可实时处理、可视化、降噪</td>\n</tr>\n<tr>\n<td>适合普通录音</td>\n<td>专业音频需求</td>\n</tr>\n</tbody>\n</table>\n<hr>\n</div>'</script></body></html>
