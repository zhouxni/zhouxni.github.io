tr">defer</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;g-recaptcha&quot;</span> <span class="hljs-attr">data-sitekey</span>=<span class="hljs-string">&quot;你的Site Key&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>\n</code></pre>\n</li>\n</ul>\n<h4>2. reCAPTCHA v2（Invisible 隐形版）</h4>\n<ul>\n<li><strong>交互</strong>   ：无复选框，<strong>绑定提交按钮</strong>   ；后台静默验证，可疑时才弹出挑战。</li>\n<li><strong>触发</strong>   ：表单提交时自动执行 <code>grecaptcha.execute()</code>。</li>\n<li><strong>适用</strong>   ：追求极简体验、不希望打断流程的场景。</li>\n<li><strong>前端</strong><pre><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">button</span>\n  <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;g-recaptcha&quot;</span>\n  <span class="hljs-attr">data-sitekey</span>=<span class="hljs-string">&quot;你的Site Key&quot;</span>\n  <span class="hljs-attr">data-callback</span>=<span class="hljs-string">&quot;onSubmit&quot;</span>\n  <span class="hljs-attr">data-size</span>=<span class="hljs-string">&quot;invisible&quot;</span>\n&gt;</span>\n  提交\n<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>\n</code></pre>\n</li>\n</ul>\n<h4>3. reCAPTCHA v3（无感评分）</h4>\n<ul>\n<li><strong>交互</strong>   ：<strong>全程无感知</strong>   ，后台持续分析行为并返回<strong>风险评分</strong>   （0.0=机器人，1.0=真人）。</li>\n<li><strong>原理</strong>   ：基于<strong>数十种行为特征</strong>   建模，输出评分供业务侧决策。</li>\n<li><strong>适用</strong>   ：全站风控、内容爬取防护、登录/支付等高风险动作。</li>\n<li><strong>前端</strong><pre><code class="language-javascript">grecaptcha.<span class="hljs-title function_">ready</span>(<span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {\n  grecaptcha\n    .<span class="hljs-title function_">execute</span>(<span class="hljs-string">&quot;你的Site Key&quot;</span>, { <span class="hljs-attr">action</span>: <span class="hljs-string">&quot;login&quot;</span> })\n    .<span class="hljs-title function_">then</span>(<span class="hljs-keyword">function</span> (<span class="hljs-params">token</span>) {\n      <span class="hljs-comment">// 将 token 提交到后端验证</span>\n    });\n});\n</code></pre>\n</li>\n</ul>\n<hr>\n<h3>三、核心工作原理</h3>\n<ol>\n<li><strong>数据采集</strong>   ：鼠标轨迹、点击/输入节奏、页面停留、浏览器/设备指纹、网络环境。</li>\n<li><strong>风险评估</strong>   ：机器学习模型生成<strong>行为画像</strong>   ，判断是否符合人类模式。</li>\n<li><strong>决策与响应</strong>\n<ul>\n<li>v2：低风险直接通过；中高风险触发图片挑战。</li>\n<li>v3：返回<strong>0.0–1.0 评分</strong>   ，由业务侧决定放行、二次验证或拦截。</li>\n</ul>\n</li>\n<li><strong>后端验证</strong>   ：前端获取 <code>g-recaptcha-response</code> token，后端用 <strong>Secret Key</strong>   调用 Google API 校验有效性。</li>\n</ol>\n<hr>\n<h3>四、前后端集成流程（通用）</h3>\n<ol>\n<li><strong>申请密钥</strong>   ：在 <a href="https://www.google.com/recaptcha/admin" target="_blank">Google reCAPTCHA 控制台</a> 创建站点，获取 <strong>Site Key（前端）</strong>   和 <strong>Secret Key（后端）</strong>   。</li>\n<li><strong>前端集成</strong>\n<ul>\n<li>加载 <code>api.js</code>。</li>\n<li>渲染 v2 组件或执行 v3 <code>execute()</code>，获取 token。</li>\n<li>将 token 随表单提交到后端。</li>\n</ul>\n</li>\n<li><strong>后端验证（示例：Node.js）</strong><pre><code class="language-javascript"><span class="hljs-keyword">const</span> axios = <span class="hljs-built_in">require</span>(<span class="hljs-string">&quot;axios&quot;</span>);\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">verifyRecaptcha</span>(<span class="hljs-params">token</span>) {\n  <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> axios.<span class="hljs-title function_">post</span>(\n    <span class="hljs-string">&quot;https://www.google.com/recaptcha/api/siteverify&quot;</span>,\n    <span class="hljs-literal">null</span>,\n    {\n      <span class="hljs-attr">params</span>: {\n        <span class="hljs-attr">secret</span>: <span class="hljs-string">&quot;你的Secret Key&quot;</span>,\n        <span class="hljs-attr">response</span>: token,\n      },\n    },\n  );\n  <span class="hljs-keyword">return</span> res.<span class="hljs-property">data</span>.<span class="hljs-property">success</span>; <span class="hljs-comment">// v3 还会返回 score</span>\n}\n</code></pre>\n</li>\n<li><strong>业务决策</strong>   ：验证成功则放行；失败则拒绝或提示重试。</li>\n</ol>\n<hr>\n<h3>五、版本对比与选型建议</h3>\n<table>\n<thead>\n<tr>\n<th>版本</th>\n<th>用户体验</th>\n<th>安全强度</th>\n<th>开发复杂度</th>\n<th>适用场景</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>v2 复选框</td>\n<td>中等（需点击/识图）</td>\n<td>高</td>\n<td>低</td>\n<td>登录、注册、评论</td>\n</tr>\n<tr>\n<td>v2 隐形</td>\n<td>好（无感，可疑才弹）</td>\n<td>高</td>\n<td>中</td>\n<td>表单、购物车提交</td>\n</tr>\n<tr>\n<td>v3</td>\n<td>极佳（全程无感）</td>\n<td>极高（依赖评分策略）</td>\n<td>中高</td>\n<td>全站风控、防爬、支付</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>选型</strong>\n<ul>\n<li>追求<strong>简单稳定</strong>   ：选 <strong>v2 复选框</strong>   。</li>\n<li>追求<strong>体验优先</strong>   ：选 <strong>v2 隐形</strong>   。</li>\n<li>追求<strong>无感+强风控</strong>   ：选 <strong>v3</strong>   ，并合理设置<strong>评分阈值</strong>   （如 &lt;0.5 拦截）。</li>\n</ul>\n</li>\n</ul>\n<hr>\n<h3>六、常见问题与最佳实践</h3>\n<ul>\n<li><strong>密钥泄露</strong>   ：<strong>Secret Key 必须后端保管</strong>   ，严禁暴露在前端代码中。</li>\n<li><strong>v3 评分阈值</strong>   ：建议从 <strong>0.5</strong>   开始，结合业务日志调整。</li>\n<li><strong>绕过风险</strong>   ：仅靠前端验证不安全，<strong>必须后端二次校验 token</strong>   。</li>\n<li><strong>隐私合规</strong>   ：reCAPTCHA 收集用户行为数据，需在隐私政策中说明。</li>\n<li><strong>性能</strong>   ：<code>api.js</code> 用 <code>async defer</code> 加载，避免阻塞渲染。</li>\n</ul>\n<hr>\n<h3>七、与其他验证方案对比</h3>\n<ul>\n<li><strong>传统验证码</strong>   ：体验差、易被 OCR 破解。</li>\n<li><strong>短信/邮箱验证</strong>   ：成本高、有延迟、存在劫持风险。</li>\n<li><strong>reCAPTCHA</strong>   ：平衡<strong>安全、体验、成本</strong>   ，是 Web 主流选择。</li>\n</ul>\n<hr>\n</div>'</script></body></html>
