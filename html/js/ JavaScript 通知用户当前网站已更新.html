\n      navigator.<span class="hljs-property">serviceWorker</span>.<span class="hljs-title function_">addEventListener</span>(<span class="hljs-string">&quot;controllerchange&quot;</span>, <span class="hljs-function">() =&gt;</span> {\n        <span class="hljs-keyword">if</span> (<span class="hljs-title function_">confirm</span>(<span class="hljs-string">&quot;网站已更新，是否立即刷新以加载最新内容？&quot;</span>)) {\n          <span class="hljs-variable language_">window</span>.<span class="hljs-property">location</span>.<span class="hljs-title function_">reload</span>();\n        }\n      });\n\n      <span class="hljs-comment">// 或者主动检查是否有等待中的更新</span>\n      registration.<span class="hljs-property">onupdatefound</span> = <span class="hljs-function">() =&gt;</span> {\n        <span class="hljs-keyword">const</span> newWorker = registration.<span class="hljs-property">installing</span>;\n        <span class="hljs-keyword">if</span> (newWorker) {\n          newWorker.<span class="hljs-property">onstatechange</span> = <span class="hljs-function">() =&gt;</span> {\n            <span class="hljs-keyword">if</span> (\n              newWorker.<span class="hljs-property">state</span> === <span class="hljs-string">&quot;installed&quot;</span> &amp;&amp;\n              navigator.<span class="hljs-property">serviceWorker</span>.<span class="hljs-property">controller</span>\n            ) {\n              <span class="hljs-comment">// 有新版本已安装，但尚未激活（因为旧页面还在用旧 SW）</span>\n              <span class="hljs-title function_">showUpdateNotification</span>(); <span class="hljs-comment">// 自定义提示函数</span>\n            }\n          };\n        }\n      };\n    });\n  });\n}\n\n<span class="hljs-keyword">function</span> <span class="hljs-title function_">showUpdateNotification</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> notice = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">&quot;div&quot;</span>);\n  notice.<span class="hljs-property">innerHTML</span> = <span class="hljs-string">`\n    &lt;div style=&quot;position: fixed; bottom: 20px; right: 20px; background: #4CAF50; color: white; padding: 12px; border-radius: 6px; z-index: 9999;&quot;&gt;\n      🎉 网站已更新！&lt;button onclick=&quot;window.location.reload()&quot; style=&quot;margin-left: 10px;&quot;&gt;立即刷新&lt;/button&gt;\n    &lt;/div&gt;\n  `</span>;\n  <span class="hljs-variable language_">document</span>.<span class="hljs-property">body</span>.<span class="hljs-title function_">appendChild</span>(notice);\n}\n</code></pre>\n<blockquote>\n<p>💡 注意：你的 <code>sw.js</code> 需要正确实现缓存策略（如使用 Workbox 或手动管理 Cache）。</p>\n</blockquote>\n<hr>\n<h3>✅ 方法二：通过 <strong>版本号比对</strong>   （无 Service Worker 也可用）</h3>\n<p>如果你没有使用 PWA，也可以通过比对前端版本号或时间戳来判断是否更新。</p>\n<h4>实现思路：</h4>\n<ul>\n<li>在 HTML 或 JSON 中嵌入当前版本（如 <code>&lt;meta name=&quot;version&quot; content=&quot;1.2.3&quot;&gt;</code>）。</li>\n<li>定期（如每 5 分钟）向服务器请求当前最新版本。</li>\n<li>如果本地版本 ≠ 服务器版本，则提示用户刷新。</li>\n</ul>\n<h4>示例：</h4>\n<pre><code class="language-html"><span class="hljs-comment">&lt;!-- index.html --&gt;</span>\n<span class="hljs-tag">&lt;<span class="hljs-name">meta</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;app-version&quot;</span> <span class="hljs-attr">content</span>=<span class="hljs-string">&quot;20260227.1&quot;</span> /&gt;</span>\n</code></pre>\n<pre><code class="language-js"><span class="hljs-comment">// check-update.js</span>\n<span class="hljs-keyword">const</span> <span class="hljs-variable constant_">CURRENT_VERSION</span> = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(\n  <span class="hljs-string">&#x27;meta[name=&quot;app-version&quot;]&#x27;</span>,\n)?.<span class="hljs-property">content</span>;\n\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">checkForUpdate</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">try</span> {\n    <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> <span class="hljs-title function_">fetch</span>(<span class="hljs-string">&quot;/version.json&quot;</span>); <span class="hljs-comment">// 返回 { version: &quot;20260227.2&quot; }</span>\n    <span class="hljs-keyword">const</span> data = <span class="hljs-keyword">await</span> res.<span class="hljs-title function_">json</span>();\n    <span class="hljs-keyword">if</span> (data.<span class="hljs-property">version</span> !== <span class="hljs-variable constant_">CURRENT_VERSION</span>) {\n      <span class="hljs-title function_">alert</span>(<span class="hljs-string">&quot;网站已更新，请刷新页面以获取最新功能！&quot;</span>);\n      <span class="hljs-comment">// 或显示更友好的 UI 提示</span>\n    }\n  } <span class="hljs-keyword">catch</span> (err) {\n    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">warn</span>(<span class="hljs-string">&quot;无法检查更新&quot;</span>, err);\n  }\n}\n\n<span class="hljs-comment">// 页面加载后开始检查（可选：定时检查）</span>\n<span class="hljs-title function_">checkForUpdate</span>();\n<span class="hljs-comment">// setInterval(checkForUpdate, 5 * 60 * 1000); // 每5分钟检查一次</span>\n</code></pre>\n<p>服务器端需提供 <code>/version.json</code>，例如：</p>\n<pre><code class="language-json"><span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;version&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;20260227.2&quot;</span> <span class="hljs-punctuation">}</span>\n</code></pre>\n<hr>\n<h3>✅ 方法三：利用 <strong>localStorage + 时间戳</strong>   （简单场景）</h3>\n<p>适用于静态网站，每次部署更新一个时间戳文件：</p>\n<pre><code class="language-js"><span class="hljs-keyword">const</span> <span class="hljs-variable constant_">UPDATE_CHECK_KEY</span> = <span class="hljs-string">&quot;lastCheckedUpdate&quot;</span>;\n<span class="hljs-keyword">const</span> <span class="hljs-variable constant_">UPDATE_URL</span> = <span class="hljs-string">&quot;/last-update.txt&quot;</span>; <span class="hljs-comment">// 内容为 Unix 时间戳，如 1708992000</span>\n\n<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">checkSimpleUpdate</span>(<span class="hljs-params"></span>) {\n  <span class="hljs-keyword">const</span> lastChecked = <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">getItem</span>(<span class="hljs-variable constant_">UPDATE_CHECK_KEY</span>);\n  <span class="hljs-keyword">const</span> now = <span class="hljs-title class_">Date</span>.<span class="hljs-title function_">now</span>();\n\n  <span class="hljs-comment">// 每小时最多检查一次</span>\n  <span class="hljs-keyword">if</span> (!lastChecked || now - lastChecked &gt; <span class="hljs-number">3600_000</span>) {\n    <span class="hljs-keyword">try</span> {\n      <span class="hljs-keyword">const</span> res = <span class="hljs-keyword">await</span> <span class="hljs-title function_">fetch</span>(<span class="hljs-variable constant_">UPDATE_URL</span> + <span class="hljs-string">&quot;?t=&quot;</span> + now);\n      <span class="hljs-keyword">const</span> serverTime = <span class="hljs-keyword">await</span> res.<span class="hljs-title function_">text</span>();\n      <span class="hljs-keyword">const</span> buildTime = <span class="hljs-built_in">parseInt</span>(serverTime.<span class="hljs-title function_">trim</span>(), <span class="hljs-number">10</span>);\n\n      <span class="hljs-comment">// 假设本地记录的构建时间（可写在 HTML 里）</span>\n      <span class="hljs-keyword">const</span> localBuildTime = <span class="hljs-variable language_">window</span>.<span class="hljs-property">APP_BUILD_TIME</span> || <span class="hljs-number">0</span>;\n\n      <span class="hljs-keyword">if</span> (buildTime &gt; localBuildTime) {\n        <span class="hljs-title function_">showUpdateBanner</span>();\n      }\n\n      <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">setItem</span>(<span class="hljs-variable constant_">UPDATE_CHECK_KEY</span>, now.<span class="hljs-title function_">toString</span>());\n    } <span class="hljs-keyword">catch</span> (e) {\n      <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;Update check failed&quot;</span>, e);\n    }\n  }\n}\n</code></pre>\n<hr>\n<h3>🔔 用户体验建议：</h3>\n<ul>\n<li>不要强制刷新，应提供“稍后提醒”或“立即刷新”选项。</li>\n<li>使用非阻塞的 UI（如右下角 Toast），而非 <code>alert()</code>。</li>\n<li>对于后台标签页，可在获得焦点时再提示（<code>window.addEventListener(\'focus\', ...)</code>）。</li>\n</ul>\n<hr>\n<h3>总结</h3>\n<table>\n<thead>\n<tr>\n<th>方案</th>\n<th>适用场景</th>\n<th>优点</th>\n<th>缺点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Service Worker 更新检测</td>\n<td>PWA、现代 Web App</td>\n<td>自动化强、标准方案</td>\n<td>需要 SW 支持</td>\n</tr>\n<tr>\n<td>版本号比对</td>\n<td>通用</td>\n<td>简单可控</td>\n<td>需维护版本文件</td>\n</tr>\n<tr>\n<td>时间戳比对</td>\n<td>静态站点</td>\n<td>轻量</td>\n<td>精度较低</td>\n</tr>\n</tbody>\n</table>\n</div>'</script></body></html>
