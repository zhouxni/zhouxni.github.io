<script>
            document.getElementById('article').innerHTML = 
            "<div><p><strong>Webpack 中的 <code>optimization.sideEffects</code> 和 <code>package.json</code> 中的 <code>sideEffects</code> 是两个不同的配置，但它们都与 Tree Shaking 优化有关。</strong></p>\n<h3>Webpack <code>optimization.sideEffects</code></h3>\n<ul>\n<li><strong>作用</strong>  ：<code>optimization.sideEffects</code> 是 Webpack 配置文件中的一个选项，用于指示 Webpack 在进行 Tree Shaking 时如何处理具有副作用的模块。</li>\n<li><strong>默认值</strong>  ：在 Webpack 中，<code>optimization.sideEffects</code> 的默认值为 <code>false</code>。这意味着 Webpack 默认不会移除被标记为无副作用的模块，除非明确开启此功能。</li>\n<li><strong>配置方法</strong>  ：要在 Webpack 中开启 <code>sideEffects</code> 功能，需要在 <code>optimization</code> 配置项中显式设置 <code>sideEffects: true</code>。这样，Webpack 会在打包过程中移除那些没有被使用且被标记为无副作用的模块。</li>\n</ul>\n<h3><code>package.json</code> <code>sideEffects</code></h3>\n<ul>\n<li><strong>作用</strong>  ：<code>package.json</code> 中的 <code>sideEffects</code> 字段用于告诉构建工具（如 Webpack）哪些文件或模块具有副作用。副作用是指模块在执行时除了导出成员之外所做的事情，如修改全局变量、设置事件监听器等。</li>\n<li><strong>默认值</strong>  ：在 <code>package.json</code> 中，<code>sideEffects</code> 字段的默认值为 <code>true</code>。这意味着如果没有明确指定，Webpack 会认为所有模块都可能具有副作用，因此在 Tree Shaking 时会更加谨慎。</li>\n<li><strong>配置方法</strong>  ：要在 <code>package.json</code> 中标记模块为无副作用，可以将 <code>sideEffects</code> 设置为 <code>false</code>。这样，Webpack 在进行 Tree Shaking 时可以更安全地移除未使用的代码。如果只有部分模块有副作用，可以将 <code>sideEffects</code> 设置为一个数组，列出这些具有副作用的模块文件。</li>\n</ul>\n<h3>两者关系</h3>\n<ul>\n<li><strong>配合使用</strong>  ：<code>optimization.sideEffects</code> 和 <code>package.json</code> 中的 <code>sideEffects</code> 需要配合使用才能有效实现 Tree Shaking。Webpack 会读取 <code>package.json</code> 中的 <code>sideEffects</code> 字段来确定哪些模块具有副作用，然后根据 <code>optimization.sideEffects</code> 的设置来决定是否移除这些模块。</li>\n<li><strong>优先级</strong>  ：<code>package.json</code> 中的 <code>sideEffects</code> 字段优先级更高，因为它直接决定了模块是否具有副作用。而 <code>optimization.sideEffects</code> 只是控制 Webpack 是否开启移除无副作用模块的功能。</li>\n</ul>\n<h3>示例</h3>\n<p><strong>webpack.config.js</strong>  ：</p>\n<pre><code class=\"language-javascript\"><span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-property\">exports</span> = {\n  <span class=\"hljs-attr\">mode</span>: <span class=\"hljs-string\">&#x27;production&#x27;</span>,\n  <span class=\"hljs-attr\">optimization</span>: {\n    <span class=\"hljs-attr\">sideEffects</span>: <span class=\"hljs-literal\">true</span>, <span class=\"hljs-comment\">// 开启移除无副作用模块的功能</span>\n  },\n};\n</code></pre>\n<p><strong>package.json</strong>  ：</p>\n<pre><code class=\"language-json\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">&quot;name&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;my-project&quot;</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">&quot;version&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">&quot;1.0.0&quot;</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">&quot;sideEffects&quot;</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">false</span></span> <span class=\"hljs-comment\">// 标记所有模块为无副作用</span>\n<span class=\"hljs-punctuation\">}</span>\n</code></pre>\n<h3>总结</h3>\n<ul>\n<li><strong>Webpack <code>optimization.sideEffects</code></strong>  ：控制 Webpack 是否开启移除无副作用模块的功能，默认值为 <code>false</code>。</li>\n<li><strong><code>package.json</code> <code>sideEffects</code></strong>  ：标记模块是否具有副作用，默认值为 <code>true</code>。</li>\n<li><strong>配合使用</strong>  ：两者需要配合使用才能有效实现 Tree Shaking，优化打包体积。</li>\n</ul>\n</div>";
          </script></body></html>
