  <body>
    <article id="article" class="markdown-body"></article>
  

<script>
            document.getElementById('article').innerHTML = 
            "<div><p><code>@testing-library/react</code> 是一个用于测试 React 组件的库，它提供了一系列 API 来帮助开发者编写清晰、可靠的单元测试。以下是 <code>@testing-library/react</code> 中常用的 API：</p>\n<ol>\n<li><strong><code>render</code></strong>\n<ul>\n<li><strong>作用</strong>  ：渲染一个 React 组件，并返回一个包含渲染结果的对象。</li>\n<li><strong>用法</strong>  ：<code>const { getByText, getByRole, ... } = render(&lt;Component /&gt;);</code></li>\n<li><strong>返回值</strong>  ：一个对象，包含多个查询和调试方法，如 <code>getByText</code>、<code>getByRole</code>、<code>debug</code> 等。</li>\n</ul>\n</li>\n<li><strong><code>screen</code></strong>\n<ul>\n<li><strong>作用</strong>  ：提供全局的 DOM 查询方法，便于在测试中使用。</li>\n<li><strong>用法</strong>  ：<code>screen.getByText('Hello, World!');</code></li>\n<li><strong>特点</strong>  ：<code>screen</code> 对象中的方法与 <code>render</code> 返回的对象中的方法类似，但可以在测试文件的任何地方使用。</li>\n</ul>\n</li>\n<li><strong><code>fireEvent</code></strong>\n<ul>\n<li><strong>作用</strong>  ：模拟用户事件，如点击、输入等。</li>\n<li><strong>用法</strong>  ：<code>fireEvent.click(screen.getByText('Click Me'));</code></li>\n<li><strong>特点</strong>  ：支持多种事件类型，如 <code>click</code>、<code>change</code>、<code>submit</code> 等。</li>\n</ul>\n</li>\n<li><strong>查询方法</strong>\n<ul>\n<li><strong><code>getByText</code></strong>  ：根据文本内容获取元素。</li>\n<li><strong><code>getByRole</code></strong>  ：根据 ARIA 角色获取元素。</li>\n<li><strong><code>getByLabelText</code></strong>  ：根据标签文本获取表单元素。</li>\n<li><strong><code>getByPlaceholderText</code></strong>  ：根据占位符文本获取表单元素。</li>\n<li><strong><code>getByTestId</code></strong>  ：根据 <code>data-testid</code> 属性获取元素。</li>\n<li><strong><code>queryBy*</code></strong>  ：类似于 <code>getBy*</code>，但当元素不存在时返回 <code>null</code> 而不是抛出异常。</li>\n<li><strong><code>getAllBy*</code></strong>  ：获取所有匹配的元素。</li>\n<li><strong><code>queryAllBy*</code></strong>  ：获取所有匹配的元素，当没有元素匹配时返回空数组。</li>\n<li><strong><code>findBy*</code></strong>  ：异步查询元素，用于处理需要等待渲染完成的情况。</li>\n<li><strong><code>findAllBy*</code></strong>  ：异步查询所有匹配的元素。</li>\n</ul>\n</li>\n<li><strong>调试方法</strong>\n<ul>\n<li><strong><code>debug</code></strong>  ：在控制台输出渲染后的 DOM 元素的 HTML 结构，便于调试。</li>\n<li><strong><code>asFragment</code></strong>  ：将渲染后的 DOM 元素转换为 <code>DocumentFragment</code> 对象，便于进行快照测试。</li>\n</ul>\n</li>\n<li><strong>其他实用方法</strong>\n<ul>\n<li><strong><code>rerender</code></strong>  ：重新渲染组件，用于测试组件在不同 props 或状态下的渲染。</li>\n<li><strong><code>unmount</code></strong>  ：卸载组件，用于测试组件的卸载逻辑。</li>\n<li><strong><code>waitFor</code></strong>  ：等待某个条件为真，通常用于处理异步操作。</li>\n</ul>\n</li>\n</ol>\n<p>这些 API 提供了强大的功能，使开发者能够编写出贴近真实使用场景的单元测试，确保组件的正确渲染和行为。在使用这些 API 时，建议结合 <code>@testing-library/jest-dom</code> 提供的断言方法（如 <code>toBeInTheDocument</code>、<code>toHaveTextContent</code> 等）来验证组件的状态和行为。</p>\n</div>";
          </script></body></html>
